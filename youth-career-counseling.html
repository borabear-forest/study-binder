<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진로상담 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --wrong-bg:#f7e9e7;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .toolbar{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .btn{
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:8px 14px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .btn.active{color:var(--accent-dark);font-weight:600;}
  .progress-bar{
    height:8px;
    border-radius:6px;
    background:var(--shadow-dark);
    overflow:hidden;
    margin-bottom:8px;
    box-shadow:inset 2px 2px 4px var(--shadow-dark);
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{font-size:12px;color:var(--sub);margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{
    padding:3px 0;
    line-height:1.6;
  }
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .opt{
    text-align:left;
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
    transition:background .15s ease;
    white-space:pre-wrap;
  }
  .opt:hover{background:#eef1ee;}
  .opt.correct{background:var(--right-bg);color:var(--accent-dark);font-weight:600;box-shadow:none;}
  .opt.wrong{background:var(--wrong-bg);color:var(--wrong);font-weight:600;box-shadow:none;}
  .opt:disabled{cursor:default;}
  .opt:disabled:hover{background:var(--bg-base);}
  .opt.correct:disabled:hover{background:var(--right-bg);}
  .opt.wrong:disabled:hover{background:var(--wrong-bg);}
  .feedback{
    margin-top:12px;
    font-size:13px;
    font-weight:600;
  }
  .feedback.correct-mark{color:var(--accent-dark);}
  .feedback.wrong-mark{color:var(--wrong);}
  .explain{
    margin-top:8px;
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
  .empty{
    text-align:center;
    color:var(--sub);
    padding:60px 0;
    font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">‹ 목록으로</a>
  <h1>진로상담</h1>
  <div class="meta-line" id="metaLine"></div>
  <div class="toolbar">
    <button class="btn active" id="btn-all" onclick="setMode('all')">전체보기</button>
    <button class="btn" id="btn-wrong" onclick="setMode('wrong')">오답만 보기</button>
    <button class="btn" onclick="resetAll()">초기화</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div id="quizArea"></div>
</div>
<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "다음과 관련된 진로상담의 목표는?\n○ 과도한 지위지향적인 직업관 ○ 직업에 대한 전통적인 귀천의식\n○ 블루칼라직에 대한 천시 풍조 ○ 화이트 칼라직에 대한 지나친 선호경향", "options": ["① 자신에 대한 정확한 이해 증진", "② 직업세계에 대한 이해 증진", "③ 진로정보 탐색 및 활용 능력 함양", "④ 합리적인 의사결정 능력 증진", "⑤ 일과 직업에 대한 올바른 가치관과 태도 형성"], "answer": 4, "expl": "지위지향적 직업관, 귀천의식, 블루칼라 천시, 화이트칼라 선호 등은 일과 직업에 대한 왜곡된 가치관·태도 문제이므로 이를 바로잡는 것은 '일과 직업에 대한 올바른 가치관과 태도 형성'이라는 목표에 해당한다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "윌리엄슨(E. Williamson)의 특성-요인 진로상담이론에서 진로문제를 진단하는데 도움을 주기 위한 내용이 아닌 것은?", "options": ["① 진로무선택", "② 불확실한 선택", "③ 현명하지 못한 선택", "④ 성격과 가치관 간의 모순", "⑤ 흥미와 적성 간의 모순"], "answer": 3, "expl": "윌리엄슨의 진단 범주는 진로무선택, 불확실한 선택, 현명하지 못한 선택, 흥미와 적성 간의 모순이며 '성격과 가치관 간의 모순'은 해당 분류에 포함되지 않는다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "진로상담자의 역할로 옳지 않은 것은?", "options": ["① 내담자의 의사결정기술을 향상시킨다.", "② 내담자의 대인관계기술을 향상시킨다.", "③ 내담자의 진로탐색활동을 구체적으로 돕는다.", "④ 내담자가 진로설계를 스스로 할 수 있도록 돕는다.", "⑤ 비표준화된 심리검사는 진로상담에서 활용할 수 없다."], "answer": 4, "expl": "진로상담에서도 표준화 여부와 무관하게 다양한 심리검사(비표준화 검사 포함)를 목적에 맞게 활용할 수 있어 '활용할 수 없다'는 설명은 옳지 않다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "사회인지진로이론(SCCT)에 관한 설명으로 옳지 않은 것은?", "options": ["① 반두라(A. Bandura)는 사회인지이론을 진로의사결정이론에 적용하여 진로선택에서의 자기효능감을 강조하였다.", "② 결과기대는 적응적 진로행동에 대하여 예상되는 결과에 관한 기대와 개인적 신념으로 가치와 관련된다.", "③ 환경맥락적 요인은 근접맥락과 배경맥락으로 세분화된다.", "④ 목표는 특정한 결과에 도움이 되는 행동에 전념하려는 의도나 계획이며, 행동을 자기조절하는데 있어서 중요하다.", "⑤ 자기효능감과 결과기대는 흥미에 영향을 주며, 이것은 다시 진로대안 선택의 목표에 영향을 준다."], "answer": 0, "expl": "SCCT에서 자기효능감과 결과기대는 '흥미'에 영향을 주고, 흥미는 다시 '목표'에 영향을 주는 경로를 가지므로 이 설명은 옳은 진술이며, 오답은 근접맥락/배경맥락 구분(③)이 실제로는 옳고 나머지 중 하나가 부정확하다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "하렌(V. Harren)의 의사결정 과정과 유형에 관한 설명으로 옳지 않은 것은?", "options": ["① 인식단계에서는 개인이 심리적 불균형을 느끼고 어떤 결정을 해야 할 필요성을 인식한다.", "② 계획단계에서는 자신의 선택에 대해 깊이 탐색하고 다각도로 검토하여 선택의 장단점을 명료화한다.", "③ 합리적 유형은 정확한 정보를 수집하고, 논리적으로 의사결정을 해 나가며, 의사결정에 대한 책임을 진다.", "④ 직관적 유형은 의사결정의 기초로 상상을 사용하고, 현재의 감정에 주의를 기울이며, 정서적 감각을 사용한다.", "⑤ 의존적 유형은 의사결정에 대한 개인적인 책임을 부정하고 그 책임을 외부로 돌리는 경향이 있다."], "answer": 1, "expl": "계획단계가 아니라 '혼란단계'에서 여러 대안을 깊이 탐색하고 장단점을 비교하며, 계획단계는 그 이후 구체적인 실행 계획을 세우는 단계이므로 이 설명이 옳지 않다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "타이드만(D. Tiedeman)과 오하라(R. O'Hara)의 진로의사결정이론에 관한 설명으로 옳은 것은?", "options": ["① 인지적 구조의 분화와 통합에 의해 의식적 문제해결 과정을 예상기와 구체화기로 나누어 설명한다.", "② 탐색 단계에서는 자신이 정한 목적을 전반적으로 고려하고, 대안을 추진해 나갈 수 있는 능력과 여건을 평가하며, 대안에 대한 가치를 분석한다.", "③ 선택 단계에서는 가능한 대안을 선택하며, 각 대안의 장단점을 검토하여 서열화 및 조직화한다.", "④ 적응 단계에서는 선택하고 실행을 위한 계획은 할 수 있지만, 적극적으로 실행할 수 있는 조건은 부족하다.", "⑤ 명료화 단계에서는 선택에 대하여 수동적으로 적응하며, 개인의 목표와 포부는 집단의 목표에 동화되고 수정된다."], "answer": 1, "expl": "타이드만과 오하라는 진로의사결정 과정을 예상기(탐색-구체화-선택-명료화)와 구체화기(적응-재정향-통합)로 나누어 설명하였다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "다위스(R. Dawis)와 롭퀴스트(L. Lofquist)의 직업적응이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 직업적응이론은 개인의 직업행동을 설명하는데 한정되고, 개인-환경 조화이론은 가족문제 등 다른 영역까지 확장하여 적용된다.\nㄴ. 개인은 자신과 환경과의 부조화 정도가 받아들일 수 있는 범위이면 별다른 대처 행동 없이 환경에 적응하게 된다.\nㄷ. 적응과정은 유연성, 적극성, 반응성, 인내 등의 적응양식에 따라 달라질 수 있다.\nㄹ. 직업적응을 위한 중요한 지표는 만족과 충족이며, 만족은 외적지표이고, 충족은 내적지표이다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "직업적응이론은 개인-환경 조화이론(더 포괄적인 상위이론)의 한 특수 적용 형태이며, 부조화가 수용 범위 내이면 별다른 대처 없이 적응하고, 유연성·적극성·반응성·인내의 적응양식에 따라 대처가 달라지며 만족(내적)·충족(외적) 지표가 중요하다는 설명들이 대체로 타당하다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "진로전환에 관한 설명으로 옳은 것은?", "options": ["① 슬로스버그(N. Schlossberg)는 전환의 유형으로 예측된 전환, 예측하지 못한 전환, 만성적인 전환, 일어나지 않은 전환으로 나누었다.", "② 윌리암스(D. Williams)는 자발적 전환과 비자발적인 전환으로 나누었다.", "③ 홉슨과 아담스(B. Hopson & J. Adams)는 전환을 증진시키는 요인으로 경제적 안정성, 정서적 안정성, 건강, 이전의 전환기술, 지지적 업무환경, 전환에 대한 지지를 제시하였다.", "④ 슬로스버그, 워터스와 굿맨(N. Schlossberg, E. Waters & J. Goodman)은 전환의 억제요인으로 경제적 불안정, 정서적 불안정, 건강, 적대적 업무환경, 전환관리의 부족을 제시하였다.", "⑤ 굿맨, 슬로스버그와 앤더슨(J. Goodman, N. Schlossberg & M. Anderson)은 진로전환이 마비-최소화-회의감-놓아주기-시험하기-의미찾기-내면화의 7단계 과정을 거쳐서 이루어진다고 하였다."], "answer": 0, "expl": "홉슨과 아담스는 전환을 촉진하는 요인으로 경제적·정서적 안정성, 건강, 이전의 전환기술, 지지적 업무환경, 전환에 대한 지지 등을 제시하였다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "크롬볼츠(J. Krumboltz)의 우연학습이론에서 제시된 5단계 진로상담과정 중 다음 내용과 관련된 단계는?\n○ '지금 마음이 어떤지 이야기 해 주세요.'\n○ 상담자가 내담자의 상황과 감정을 이해하고 있다는 것을 확신하게 하기\n○ '삶에서 의욕적이라고 느꼈던 활동에는 어떤 것들이 있었나요?'\n○ '이러한 의욕적인 활동들을 발견하게 된 계기가 무엇이었나요?'", "options": ["① 내담자의 기대를 이끌기", "② 내담자의 관심이 무엇인지 확인하기", "③ 계획하지 않았던 사건들에서 내담자의 성공적인 과거 경험을 활용하기", "④ 잠재적 기회를 알아차릴 수 있도록 하기", "⑤ 행동하는데 장애물을 극복하기"], "answer": 1, "expl": "과거 성공 경험과 그 계기를 탐색하며 내담자의 감정을 확인하고 공감하는 개입은 계획하지 않은 사건 속 성공 경험을 활용하는 단계에 해당한다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "장애인 진로상담에 관한 설명이 아닌 것은?", "options": ["① 내담자의 장애수용에 대한 상담은 다루지 않는다.", "② 진로 및 직업 선택에서 고용상의 차별이 있는지를 알아본다.", "③ 진로 탐색에서 장애유형에 따른 제한점이 있는지를 고려하여 상담한다.", "④ 내담자의 특성에 따라 찾아가는 상담도 할 수 있다.", "⑤ 진로 및 직업 상담을 위한 장애유형과 수준에 따른 인프라 구축이 되어야 한다."], "answer": 0, "expl": "장애수용은 진로선택과 밀접히 연결된 심리적 과업이므로 장애인 진로상담에서 반드시 다루어야 할 주제이며, '다루지 않는다'는 설명은 옳지 않다."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "구성주의적 진로상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 객관적인 현실보다는 주관적인 관점이나 자기구성적인 이야기를 강조한다.\nㄴ. 진로상담에서 스토리텔링, 내러티브 상담 등으로 다루어진다.\nㄷ. 사회적 구성주의는 내담자가 진로와 관련된 경험에 대해 개인적인 의미를 부여함으로써 진로가 형성된다고 본다.\nㄹ. 개인적 구성주의는 진로발달이 환경에 적응하는 과정을 통해 이루어진다고 본다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "구성주의 진로상담은 주관적 의미부여(ㄱ), 내러티브·스토리텔링(ㄴ), 사회적 구성주의의 의미부여 관점(ㄷ)을 강조하지만, 환경에 적응하는 과정으로 진로발달을 설명하는 것은 개인적 구성주의가 아닌 발달적 관점(수퍼 등)에 가까워 ㄹ은 옳지 않다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "다문화 청소년 진로상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 구성주의 진로상담이 효과적일 수 있다.\nㄴ. 다문화에 대한 사회적 인식을 고려한다.\nㄷ. 문화적 차이로 인한 정체성 혼란을 고려한다.\nㄹ. 다문화에 대한 상담자의 인식과 지식을 고려한다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "다문화 청소년 진로상담에서는 구성주의 접근의 효과성, 사회적 인식, 정체성 혼란, 상담자의 문화적 역량 모두 고려해야 할 요소로 타당하다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "갓프레드슨(L. Gottfredson)의 제한-타협 이론에 관한 설명으로 옳지 않은 것은?", "options": ["① 제한은 아동이 적합하지 않다고 생각하는 진로대안을 받아들이면서 수용가능한 대안으로 확대해 가는 과정이다.", "② 2단계인 성유형 획득단계는 초등학교 저학년 시기로 성역할을 지향한다.", "③ 3단계인 사회적 가치를 획득하는 단계는 아동기에서 청소년기에로 이행하는 시기로, 사회적 가치, 능력, 명성을 지향한다.", "④ 4단계인 내적 자아를 확립하는 단계는 청소년기로, 자신만의 흥미, 적성, 가치관, 성격 등을 이해할 수 있다.", "⑤ 사람들은 자아개념에 부합하는 직업들을 포기할 때 흥미, 명성, 성유형의 순서대로 포기한다."], "answer": 0, "expl": "제한은 수용 불가능한 대안을 '제외'해 나가는 과정이며, '수용가능한 대안으로 확대'해 간다는 설명은 제한의 정의와 반대된다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "진로상담과정에서 보딘(E. Bordin)의 내담자 분류에 관한 설명으로 옳지 않은 것은?", "options": ["① 자아갈등: 자아개념과 심리기능과의 갈등", "② 선택불안: 여러 가지 대안 중에 결정을 내리지 못하고 불안함", "③ 의존성: 개인의 문제를 해결하지 못하고, 생애발달과업 수행을 어려워함", "④ 정보의 부족: 체험의 폭 제한, 체험의 부적절성, 필요한 기술을 습득할 기회가 부족함", "⑤ 확신결여: 선택한 진로에 확신을 갖고 진로상담을 받음"], "answer": 4, "expl": "보딘의 확신결여 범주는 진로 선택에 대한 확신이 '부족'하여 상담을 받는 경우를 의미하며, '확신을 갖고 상담을 받는다'는 설명은 정의와 반대된다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "진로가계도(Career Genogram)에 관한 설명으로 옳지 않은 것은?", "options": ["① 내담자의 진로에 미친 영향을 확인할 수 있다.", "② 내담자의 진로장벽을 확인할 수 있다.", "③ 진로가계도는 내담자에 대한 정보를 수집하는 양적평가방법이다.", "④ 내담자의 진로정보를 여러 가지 방법으로 탐색할 수 있다.", "⑤ 진로가계도 사용목적을 내담자에게 설명해야 한다."], "answer": 2, "expl": "진로가계도는 가족 내 직업 패턴, 가치관, 기대 등을 그림으로 탐색하는 질적 평가 도구이며 '양적평가방법'이라는 설명은 옳지 않다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "진로정보의 평가에 관한 설명으로 옳지 않은 것은?", "options": ["① 정보의 시기를 파악한다.", "② 정보의 출처를 확인한다.", "③ 정보를 직ㆍ간접적 다양한 방법으로 수집한다.", "④ 진로정보를 제공하는 목적은 고려하지 않아도 된다.", "⑤ 습득된 정보들을 일반화시킬 수 있는지 확인한다."], "answer": 3, "expl": "진로정보 평가 시에는 정보 제공의 목적(누가, 왜 만들었는지)도 반드시 고려해야 하며 이를 무시해서는 안 된다."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "진로상담에서 심리검사에 관한 설명으로 옳지 않은 것은?", "options": ["① 적성분류검사(DAT)에는 일반적성검사와 특수적성검사가 있다.", "② 스트롱흥미검사(SII)는 특정 직업에 종사하고 있는 사람들이 비슷한 흥미를 갖고 있다는 전제로 개발되었다.", "③ 쿠더(G. Kuder) 흥미검사(KPR)는 직업, 학교, 여가의 세 가지 영역에서의 활동 중 가장 잘하는 것과 가장 싫어하는 것을 선택하게 하여 적성 영역을 결정하는 검사이다.", "④ 미네소타 직업가치 검사(MIQ)는 직업과 관련된 가치체계를 측정하기 위한 검사이다.", "⑤ 진로성숙도검사(CMI)는 초등학교 6학년부터 고등학교 3학년을 대상으로 진로의사결정에 대한 태도와 능력을 측정하기 위해 개발되었다."], "answer": 2, "expl": "쿠더 흥미검사(KPR)는 활동 선호를 통해 '흥미' 영역을 파악하는 흥미검사이며, 적성 영역을 결정한다는 설명은 검사 목적과 다르다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "진로정보에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 직업에 대한 이해를 향상시킴으로써 합리적인 의사결정을 돕는다.\nㄴ. 읽기 수준이 낮은 내담자는 시청각 자료를 제공하는 것이 효과적이다.\nㄷ. 일과 관련된 교육적, 직업적, 심리사회적인 정보를 의미한다.\nㄹ. 진로정보의 수집과정에서 직접적인 경험에 의한 자료를 활용할 수 있다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "진로정보는 합리적 의사결정을 돕고(ㄱ), 시청각 자료가 읽기수준이 낮은 내담자에게 효과적이며(ㄴ), 교육적·직업적·심리사회적 정보를 포괄하고(ㄷ), 직접경험 자료도 활용 가능하다(ㄹ)는 설명 모두 타당하다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "다음 집단진로상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 진로관련 공동의 목표를 갖는다.\nㄴ. 집단원의 성격 특성에 따른 역효과성의 가능성이 적다.\nㄷ. 집단구성은 집단원을 사전 면담한 후 선정하여 구성한다.\nㄹ. 공통된 직업정보를 효율적으로 제공할 수 있는 기회가 된다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "집단진로상담은 공동목표(ㄱ), 사전면담을 통한 집단구성(ㄷ), 공통 직업정보 제공의 효율성(ㄹ) 면에서 장점이 있으나, 개인상담에 비해 집단원의 성격 특성으로 인한 역효과 가능성은 오히려 존재할 수 있어 ㄴ은 옳지 않다."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "긴즈버그(E. Ginzberg)의 진로발달이론에서 잠정기(tentative phase)의 하위 단계를 모두 고른 것은?\nㄱ. 흥미(interest) ㄴ. 능력(ability) ㄷ. 가치(value) ㄹ. 탐색(exploration)", "options": ["① ㄱ, ㄹ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "긴즈버그의 잠정기는 흥미-능력-가치-전환의 하위단계로 구성되며, 탐색(exploration)은 잠정기가 아닌 현실기의 하위단계에 해당해 ㄹ은 포함되지 않는다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "수퍼(D. Super)의 생애진로발달이론에 관한 설명으로 옳지 않은 것은?", "options": ["① 진로발달을 전 생애적인 발달과정으로 보았다.", "② 아동기부터 일의 세계에 관한 여러 경험을 하게 되면서 일과 관련된 자기개념을 형성한다고 하였다.", "③ 성인기의 진로발달을 이해하기 위해서는 진로적응력의 개념이 중요하다고 보았다.", "④ 진로발달에 있어서 역할과 시간의 개념을 도입하였다.", "⑤ 진로아치모형의 구조에서 아치의 왼쪽에는 사회경제적 요인이 오른쪽에는 개인적 요인이 있다."], "answer": 4, "expl": "수퍼의 진로아치모형에서는 왼쪽에 개인적(생물학적) 요인, 오른쪽에 사회경제적 요인이 배치되므로 이 설명은 좌우가 뒤바뀌어 옳지 않다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "생애진로사정(Life Career Assessment: LCA)에 관한 설명으로 옳지 않은 것은?", "options": ["① 아들러(A. Adler)의 개인심리학에 기초하였다.", "② 내담자의 정보를 수집하는 단계에서 사용될 수 있는 구조화된 면접기법이다.", "③ 상담자와 내담자의 긍정적인 라포 형성에 도움을 준다.", "④ 진로사정, 일상적인 하루, 강점과 장애, 요약 등의 네 부분으로 구성되어 있다.", "⑤ 세상과 개인의 일, 사회(사회적 관계), 성(우정)의 생활영역을 서로 분리해서 다룬다."], "answer": 4, "expl": "생애진로사정에서는 일, 사회적 관계, 우정(성) 등 생활영역들을 서로 '분리'해서 보지 않고 통합적으로 연결지어 이해하려 하므로 '분리해서 다룬다'는 설명은 옳지 않다."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "다음 설명을 모두 충족하는 진로상담 검사는?\n○ 흥미검사로부터 얻어지는 정보를 처리하는 데 어려움을 가지고 있는 사람들을 선별할 수 있다.\n○ 의사결정혼란, 수행불안, 외적갈등이라는 세 개의 하위척도로 구성되었다.\n○ 개인적인 특성에 맞는 진로지도를 할 수 있다.", "options": ["① 진로결정장애검사", "② 진로사고검사", "③ 직업가치관검사", "④ 진로적성검사", "⑤ 성격검사"], "answer": 1, "expl": "의사결정혼란·수행불안·외적갈등의 세 하위척도로 구성되어 흥미검사 결과를 활용하기 어려운 사람을 선별하는 검사는 진로결정장애검사(CDDQ 등)에 해당한다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "샘슨 등(J. Sampson et al.)의 진로의사결정 정도에 따른 내담자 유형에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 우유부단형: 자신의 선택을 이행하기 위해 도움이 필요한 내담자\nㄴ. 우유부단형: 생활 전반에 걸쳐 불안을 동반하는 내담자\nㄷ. 진로결정자: 자신의 선택이 잘 되었음을 명료화하길 원하는 내담자\nㄹ. 진로결정자: 자신이 하고 싶은 것을 결정한 것처럼 보이지만, 그 결정에 확신이 없는 내담자", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "우유부단형은 선택 실행의 어려움(ㄱ)뿐 아니라 전반적인 불안(ㄴ)을 동반하는 경우를 포함하며, 진로결정자는 선택의 명료화를 원하는 경우(ㄷ)와 확신이 부족한 경우(ㄹ) 모두를 포함하는 넓은 범주로 설명된다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "여성 진로상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 성불평등적 요소에 대한 자신의 의견을 표현할 수 있도록 한다.", "② 성역할 고정관념의 내면화 정도를 고려하지 않는다.", "③ 직업의식을 강화하고 가정과 직장 간의 양립방안을 마련할 수 있도록 한다.", "④ 경력단절 가능성에 대비하여 장기적인 진로설계를 고려한다.", "⑤ 취업 장애요인을 극복할 수 있는 구체적인 방안을 모색하도록 지원한다."], "answer": 1, "expl": "여성 진로상담에서는 성역할 고정관념이 내면화된 정도를 반드시 파악하고 고려해야 하며, 이를 '고려하지 않는다'는 설명은 옳지 않다."}, {"no": "23-1", "year": 2024, "qno": 1, "text": "진로상담자가 갖추어야 할 역량으로 옳은 것을 모두 고른 것은?\nㄱ. 진로 관련 이론에 대한 이해 ㄴ. 개인차와 다양성에 대한 이해\nㄷ. 진로검사 수행 역량 ㄹ. 자기성찰과 자기개발 역량", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "진로이론 이해, 개인차·다양성 이해, 진로검사 수행역량, 자기성찰과 자기개발 역량 모두 진로상담자에게 필요한 역량이다."}, {"no": "23-2", "year": 2024, "qno": 2, "text": "진로상담의 목표로 옳은 것을 모두 고른 것은?\nㄱ. 자신에 대한 정확한 이해 증진 ㄴ. 직업세계에 대한 이해 증진\nㄷ. 진로정보 탐색 및 활용능력 함양 ㄹ. 합리적인 의사결정 능력 증진", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "자기이해 증진, 직업세계 이해, 진로정보 탐색·활용, 합리적 의사결정 능력 증진은 모두 대표적인 진로상담의 목표이다."}, {"no": "23-3", "year": 2024, "qno": 3, "text": "윌리암슨(E. Williamson)의 진로상담과정에서 종합단계에 관한 설명으로 옳은 것은?", "options": ["① 내담자의 독특성 또는 개별성을 탐색하기 위하여 사례연구나 검사결과를 통해 자료를 수집하고 요약한다.", "② 내담자의 특성과 문제를 분류하고 교육적, 직업적 능력과 특성을 비교하여 문제의 원인을 찾아낸다.", "③ 새로운 문제가 발생되었을 때 내담자가 바람직한 행동계획을 수행할 수 있도록 계속적으로 돕는다.", "④ 여러 자료로 부터 태도, 흥미, 가정환경, 지식, 학교 성적 등에 대한 자료들을 수집한다.", "⑤ 현재 또는 미래의 바람직한 적응을 위해 무엇을 해야할 지를 함께 상의한다."], "answer": 0, "expl": "종합단계는 사례연구나 검사자료를 통해 내담자의 개별성·독특성을 통합적으로 파악하는 단계이다."}, {"no": "23-4", "year": 2024, "qno": 4, "text": "다음은 홀랜드(J. Holland)의 직업성격유형이론에 관한 설명이다. ( )에 공통으로 들어갈 용어로 옳은 것은?", "options": ["① 정체성(identity)", "② 일치성(congruence)", "③ 계측성(calculus)", "④ 변별성(differentiation)", "⑤ 일관성(consistency)"], "answer": 1, "expl": "개인과 직업환경 유형이 얼마나 맞는지를 나타내는 홀랜드 이론의 핵심 개념은 일치성(congruence)이다."}, {"no": "23-5", "year": 2024, "qno": 5, "text": "진로상담에서 활용하는 진로가계도(Career Genogram)에 관한 설명으로 옳지 않은 것은?", "options": ["① 가족의 맥락 속에서 내담자 이해를 촉진시켜주는 기법이다.", "② 내담자 가족의 지배적인 직업가치를 확인하기 위해 사용할 수 있다.", "③ 남성은 원, 여성은 사각형, 중심인물은 두 겹의 원을 사용하여 진로가계도를 그린다.", "④ 진로정보 수집단계에서 사용될 수 있는 질적 평가과정이다.", "⑤ 내담자의 진로기대형성에 중요한 역할을 한 가족이 누구인지 확인이 가능하다."], "answer": 2, "expl": "가계도에서 통상 남성은 사각형, 여성은 원으로 표시하므로 이 설명은 기호가 반대로 되어 있어 옳지 않다."}, {"no": "23-6", "year": 2024, "qno": 6, "text": "파슨스(F. Parsons)의 특성요인이론에서 자신에 대한 이해를 증진시키기 위한 특성으로 옳지 않은 것은?", "options": ["① 성격", "② 흥미", "③ 적성", "④ 직무", "⑤ 가치"], "answer": 3, "expl": "직무는 개인특성이 아니라 직업(환경) 요인에 해당하므로 자신에 대한 이해를 위한 특성 목록에 포함되지 않는다."}, {"no": "23-7", "year": 2024, "qno": 7, "text": "로우(A. Roe)의 욕구이론에 관한 설명으로 옳은 것은?", "options": ["① 개인의 욕구는 직업선택에 영향을 미치지 않는다.", "② 부모는 아동기 진로발달에 영향을 미치지 않는다.", "③ 직업을 흥미에 기초하여 8개 직업군으로 제안하였다.", "④ 직업에서의 곤란도와 책무성을 고려하여 5개의 직업단계를 설정하였다.", "⑤ 베츠(N. Betz)의 이론을 근거로 직업과 기본욕구 만족 간의 관련성을 설명하였다."], "answer": 2, "expl": "로우는 직업을 흥미에 기초해 8개 군집(직업군)으로 분류하였다."}, {"no": "23-8", "year": 2024, "qno": 8, "text": "하렌(V. Harren)의 진로의사결정유형이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 합리적 유형은 결정에 대한 자신의 책임을 부정한다.\nㄴ. 진로의사결정 단계는 '인식 - 계획 - 확신 - 이행'이다.\nㄷ. 합리적 유형, 직관적 유형, 의존적 유형으로 진로의사결정유형을 분류하고 있다.\nㄹ. 인식단계는 동조, 자율, 상호의존의 3가지의 하위단계로 나누어진다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "하렌은 의사결정을 인식-계획-확신-이행 단계로 설명하고(ㄴ) 합리적·직관적·의존적 유형으로 분류하였으며(ㄷ), 인식단계를 동조-자율-상호의존으로 나누었으나(ㄹ), 합리적 유형은 오히려 책임을 '수용'하는 유형이라 ㄱ은 옳지 않다."}, {"no": "23-9", "year": 2024, "qno": 9, "text": "수퍼(D. Super)의 진로발달단계에서 다음과 같은 발달과업이 수행되는 단계는?", "options": ["① 성장기", "② 탐색기", "③ 확립기", "④ 유지기", "⑤ 쇠퇴기"], "answer": 2, "expl": "정착, 공고화, 발전은 수퍼의 진로발달단계 중 확립기의 하위 과업이다."}, {"no": "23-10", "year": 2024, "qno": 10, "text": "갓프레드슨(L. Gottfredson)의 제한타협이론에서 다음에 해당하는 단계는?", "options": ["① 성역할 지향 단계", "② 외적이며 비교평가 지향 단계", "③ 사회적 가치 지향 단계", "④ 규모와 힘 지향 단계", "⑤ 내적이며 고유한 자기 지향 단계"], "answer": 3, "expl": "힘과 크기의 서열개념 획득, 성인 역할을 통한 직업 인식은 갓프레드슨 이론의 2단계인 규모와 힘 지향 단계의 특징이다."}, {"no": "23-11", "year": 2024, "qno": 11, "text": "다음 이론을 주장한 학자는?", "options": ["① 블라우(P. Blau)", "② 긴즈버그(E. Ginzberg)", "③ 윌리암슨(E. Williamson)", "④ 갓프레드슨(L. Gottfredson)", "⑤ 보딘(E. Bordin)"], "answer": 1, "expl": "진로선택을 환상기-잠정기-현실기의 세 단계로 구분한 학자는 긴즈버그이다."}, {"no": "23-12", "year": 2024, "qno": 12, "text": "타이드만과 오하라(D. Tiedeman & R. O'Hara)의 진로의사결정이론에 관한 설명으로 옳지 않은 것은?", "options": ["① 실천기는 새로운 상황에 순응하는 순응기에서 집단의 요구와 개인의 요구 간에 균형을 이루는 통합기를 거쳐 자신의 의견이나 주장을 행사하는 개혁기로 전개된다.", "② 개인의 진로의사결정 단계를 직업정체감 형성 과정에 따라 예상기와 실천기로 나누어 설명한다.", "③ 구체화 단계에서는 가능한 대안을 선택하며, 각 대안의 장단점을 검토하여 서열화 및 조직화한다.", "④ 선택기는 구체화 과정을 통해 나타난 결과를 토대로 명확한 목표를 설정하는 단계이다.", "⑤ 개인이 일에 직면했을 때 분화와 통합을 통하여 직업정체감을 형성한다고 보았다."], "answer": 0, "expl": "실천기(적응기)는 순응기→개혁기→통합기 순으로 전개되며, '순응기-통합기-개혁기' 순서로 설명한 것은 순서가 바뀌어 옳지 않다."}, {"no": "23-13", "year": 2024, "qno": 13, "text": "다위스와 롭퀴스트(Dawis & Lofquist)가 제시한 직업적응 방식에 관한 설명과 개념을\n바르게 연결한 것은?\nㄱ. 개인이 직업 환경과 개인적 환경 간의 부조화를 참아내는 정도\nㄴ. 개인-환경 간 부조화 상태에서 개인이 직업 환경을 변화시킴으로써 대처하는 방식", "options": ["① ㄱ: 끈기(perseverance), ㄴ: 유연성(flexibility)", "② ㄱ: 끈기(perseverance), ㄴ: 적극성(activeness)", "③ ㄱ: 유연성(flexibility), ㄴ: 적극성(activeness)", "④ ㄱ: 유연성(flexibility), ㄴ: 반응성(reactiveness)", "⑤ ㄱ: 적극성(activeness), ㄴ: 반응성(reactiveness)"], "answer": 2, "expl": "부조화를 참아내는 정도는 유연성(flexibility), 환경을 변화시키려는 대처방식은 적극성(activeness)에 해당한다."}, {"no": "23-14", "year": 2024, "qno": 14, "text": "슐로스버그(N. Schlossberg)가 제시한 진로전환 상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 직업생활 전환에는 청사진과 위협의 양가적인 특성이 있다.", "② 직업생활 전환의 개념을 생애 사건 가운데 결혼 및 출산에 한정하여 설명하고 있다.", "③ 새로운 일자리로 진입하는 경우 기대치 전환이 중요하다고 보고 있다.", "④ 개인의 직업생활 전환에 영향을 주는 요소로 자아(self), 지원(support), 상황(situation), 전략(strategy) 등을 강조한다.", "⑤ 새로운 일자리에 적응하기 위해서는 네트워킹, 가족지원정책, 경제적 안정 등 다양한 차원의 개입이 요구된다."], "answer": 1, "expl": "슐로스버그의 전환이론은 결혼·출산뿐 아니라 은퇴, 실직, 이직 등 생애 전반의 다양한 전환사건을 폭넓게 다루므로 '결혼 및 출산에 한정'된다는 설명은 옳지 않다."}, {"no": "23-15", "year": 2024, "qno": 15, "text": "미러바일(R. Mirabile)의 퇴직자를 위한 카운슬링모델에서 다음이 설명하는 단계는?", "options": ["① 위안(comfort)", "② 성찰(reflection)", "③ 명료화(clarification)", "④ 방향(direction)", "⑤ 관점전환(perspective shift)"], "answer": 1, "expl": "퇴직 충격에서 벗어나 감정을 수용하고 강점·동기·진로유형을 파악하는 단계는 성찰(reflection) 단계에 해당한다."}, {"no": "23-16", "year": 2024, "qno": 16, "text": "크럼볼츠(J. Krumboltz)의 우연학습이론(happenstance learning theory)을 토대로 한 진로상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 진로결정과정에서 개인이 통제하기 어려운 요인들이 영향을 미치고 있음을 강조한다.", "② 내담자가 호소하는 문제도 중요하지만 예기치 않은 사건이나 문제발생을 대비하는 역량을 키워주는 것이 중요하다.", "③ 내담자의 호기심(curiosity), 인내심(persistence), 유연성(flexibility), 낙관성(optimism), 위험감수(risk-taking) 등의 기술을 촉진시킨다.", "④ 미래는 불확실하므로 개인의 특성과 직업의 특성을 연결하는 전통적인 진로상담을 중시한다.", "⑤ 상담의 성공여부는 내담자가 상담실 밖에서 다양한 경험을 위해 얼마나 노력하고 성장하는가에 좌우된다."], "answer": 3, "expl": "우연학습이론은 개인-환경 매칭 중심의 전통적 진로상담보다 우연한 사건을 진로기회로 활용하는 역량 개발을 중시하므로 이 설명은 이론의 취지와 반대된다."}, {"no": "23-17", "year": 2024, "qno": 17, "text": "사회인지진로이론(SCCT)이 진로상담에 주는 시사점으로 옳지 않은 것은?", "options": ["① 내담자의 흥미나 가치, 능력 보다는 진로장벽에 영향을 미치는 환경적 조건을 중시한다.", "② 내담자가 선택 가능한 진로를 일찍 제외하도록 만든 진로장벽을 확인하고 평가하는 것이 중요하다.", "③ 내담자의 잘못된 직업정보를 점검하고 수정하는 것이 중요하다.", "④ 자기효능감 점검, 결과기대에 대한 탐색과 현실성 강화, 진로준비행동 촉진 등이 중요한 개입전략이다.", "⑤ 부적절한 자기효능감이나 결과에 대한 기대 때문에 내담자가 제외한 진로대안들을 다시 확인하는 것이 중요하다."], "answer": 0, "expl": "SCCT는 자기효능감·결과기대·흥미 등 개인 내적 인지변인을 환경적 조건 못지않게 핵심적으로 다루므로, 환경적 조건만을 우선시한다는 설명은 이론의 균형잡힌 관점과 맞지 않는다."}, {"no": "23-18", "year": 2024, "qno": 18, "text": "사비카스( . Savickas)의 진로구성주의에 근거한 진로상담의 전략으로 적절하지 않은 것은?", "options": ["① 심리검사는 개인의 특성에 대한 과학적 접근이므로 표준화검사 결과를 중시한다.", "② 내담자로 하여금 진로나 직업선택과 관련된 본인의 이야기(storytelling)를 하도록 한다.", "③ 내담자의 진로이야기를 끌어내기 위해 진로유형면접(career style interview)을 사용한다.", "④ 진로유형면접 자료를 근거로 내담자의 생애주제(life themes)를 이끌어 낸다.", "⑤ 개인이 환경의 영향을 받기도 하지만, 개인도 환경을 만들어가는 발달의 주체임을 강조한다."], "answer": 0, "expl": "구성주의 진로상담은 표준화 검사결과보다 내담자의 주관적 이야기와 의미부여를 중시하므로, 표준화검사를 중심에 두는 전략은 이 접근과 맞지 않는다."}, {"no": "23-19", "year": 2024, "qno": 19, "text": "합리성을 토대로 한 전통적 진로상담이론의 한계를 극복하기 위해 최근 강조되고 있는 진로상담 대안이론(진로무질서이론 등)이 등장하게 된 배경으로 옳지 않은 것은?", "options": ["① 기존의 이론들은 개인의 진로에 영향을 주는 객관적 맥락과 주관적 맥락의 영향을 모두 포함하지 못하고 있다.", "② 기존의 이론들은 매칭 또는 조화의 역동에만 초점을 두고 인간의 적응적인 특성을 충분히 반영하지 못하고 있다.", "③ 기존의 이론들은 인간이 현상과 경험을 새롭게 해석하고 의미부여하고 있는 점을 간과하고 있다.", "④ 진로발달이 예상하지 못했던 사건과 경험, 즉 우연에 의해 변화될 수 있음을 충분히 고려하지 못하고 있다.", "⑤ 기존의 이론들은 안정보다 변화를 가정하고 있어 이론과 실제가 부합되지 않는 한계가 있다."], "answer": 4, "expl": "기존 전통적 이론들은 오히려 '안정성'을 가정하는 정태적 접근이었고, 대안이론은 변화와 우연을 반영하지 못한 기존 이론의 한계를 극복하려는 시도이므로, '안정보다 변화를 가정'했다는 설명은 사실과 반대된다."}, {"no": "23-20", "year": 2024, "qno": 20, "text": "샘슨 등(J. Sampson et al.)이 제시한 내담자 분류체계를 기준으로 볼 때 '진주'의 진로발달 상태를 바르게 진단한 것은?", "options": ["① 문제의 원인 - 내적 갈등", "② 문제의 원인 - 의존성", "③ 호소영역 - 진로미결정자", "④ 진로의사결정 정도 - 희망과 현실의 괴리", "⑤ 진로의사결정 정도 - 진로결정자"], "answer": 4, "expl": "진로는 결정했지만 실행을 위한 준비행동을 하지 않는 진주의 사례는 진로의사결정 정도 면에서 진로결정자에 해당하되 실행 확신이 부족한 유형으로 분류된다."}, {"no": "23-21", "year": 2024, "qno": 21, "text": "다음의 사례가 보여주는 진로상담기법은?", "options": ["① 진로유형면접(career style interview)", "② 진로성숙도평가(career maturity assessment)", "③ 직업카드", "④ 표준화검사", "⑤ 진로가계도(career genogram)"], "answer": 0, "expl": "역할모델, 좋아하는 잡지·책·영화·교과목·여가 등을 묻는 질문들은 사비카스의 진로유형면접의 대표적 질문 항목이다."}, {"no": "23-22", "year": 2024, "qno": 22, "text": "심리검사를 활용한 진로상담에서 내담자와의 작업동맹 전략으로 옳지 않은 것은?", "options": ["① 내담자가 기대하는 것이 무엇인가와 같은 질문을 통해 촉진적 관계를 형성한다.", "② 내담자의 비합리적인 진로기대 및 진로신념 등을 살펴보면서 내담자의 관점을 수용한다.", "③ 내담자가 가장 중시하는 욕구가 무엇인가를 통해서 내담자의 생활양식을 확인한다.", "④ 내담자에게 특정한 일을 좋아하는 이유 등을 질문하면서 내담자의 문제를 구체화 한다.", "⑤ 내담자가 검사도구의 종류와 특징을 잘 모를 경우 상담자가 주도적으로 검사도구를 선택한다."], "answer": 4, "expl": "검사도구 선택은 내담자에게 충분히 설명하고 협의하여 함께 결정하는 것이 바람직하며, 상담자가 일방적·주도적으로 선택하는 것은 협력적 작업동맹 형성과 맞지 않는다."}, {"no": "23-23", "year": 2024, "qno": 23, "text": "직업분류 및 직업사전에 대한 설명 중 옳지 않은 것은?", "options": ["① 한국표준직업분류에서는 직업을 11개 직업군으로 분류하고 있다.", "② 한국표준직업분류에서는 직능수준을 교육과 훈련정도에 따라 4단계로 구분하고 있다.", "③ 한국고용직업분류는 직업을 대분류, 중분류, 소분류, 세분류로 구분하고 있다.", "④ 한국직업사전의 직업코드에서 마지막 세 자리 숫자는 자료(data), 사람(people), 사물(things)을 의미한다.", "⑤ 한국직업사전에서는 부가직업정보로 직업별 필요한 정규교육수준, 숙련기간, 자격면허 등을 제공하고 있다."], "answer": 3, "expl": "한국직업사전 코드에서 자료·사람·사물을 나타내는 것은 마지막 세 자리가 아니라 별도의 부가직업정보 항목이며, 이 설명은 실제 코드 구조와 일치하지 않는다."}, {"no": "23-24", "year": 2024, "qno": 24, "text": "청소년 집단진로상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단의 형태로 진로상담이 진행됨을 의미한다.", "② 집단의 형태로 진행되어 자기이해의 기회가 없다.", "③ 공통적으로 필요로 하는 직업정보를 효율적으로 제공할 수 있는 기회가 된다.", "④ 자신의 직업적 적합성을 객관적이고 현실적으로 이해할 수 있다.", "⑤ 자신의 진로계획을 검토하게 하는 기회를 제공한다."], "answer": 1, "expl": "집단진로상담에서도 다른 집단원과의 상호작용을 통해 자기이해의 기회를 얻을 수 있으므로 '자기이해의 기회가 없다'는 설명은 옳지 않다."}, {"no": "23-25", "year": 2024, "qno": 25, "text": "다문화 진로상담에 관한 내용을 모두 고른 것은?\nㄱ. 내담자의 문화보다 상담자의 문화를 따르도록 만든다.\nㄴ. 다문화에 대한 상담자의 지식과 인식은 중요하다.\nㄷ. 내담자들이 직면하고 있는 진로문제를 이해하고자 노력한다.\nㄹ. 내담자를 진단할 때 내담자의 문화적 특성을 신중하게 고려한다.", "options": ["① ㄱ, ㄷ", "② ㄴ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "다문화 진로상담은 상담자의 문화적 지식·인식(ㄴ), 내담자가 겪는 진로문제 이해(ㄷ), 문화적 특성을 고려한 진단(ㄹ)이 중요하며, 내담자에게 상담자의 문화를 따르도록 강요하는 것(ㄱ)은 다문화 상담의 원칙에 어긋난다."}];
const STORAGE_KEY = "ycs2_career_v1";
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let mode = "all";

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function setMode(m){
  mode = m;
  document.getElementById('btn-all').classList.toggle('active', m==='all');
  document.getElementById('btn-wrong').classList.toggle('active', m==='wrong');
  render();
}

function resetAll(){
  if(confirm('푼 기록을 모두 초기화할까?')){
    state = {};
    saveState();
    render();
  }
}

function answer(qIdx, optIdx){
  const q = QUESTIONS[qIdx];
  if(state[q.no] !== undefined) return;
  state[q.no] = optIdx;
  saveState();
  render();
}

function updateMeta(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
}

function updateProgress(){
  const total = QUESTIONS.length;
  const done = QUESTIONS.filter(q => state[q.no] !== undefined).length;
  const correct = QUESTIONS.filter(q => state[q.no] === q.answer).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `${done}/${total} 문제 풀이 · 정답 ${correct}개` + (done>0 ? ` (정답률 ${Math.round(correct/done*100)}%)` : '');
}

function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

function render(){
  updateMeta();
  updateProgress();
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  let list = QUESTIONS;
  if(mode === 'wrong'){
    list = QUESTIONS.filter(q => state[q.no] !== undefined && state[q.no] !== q.answer);
  }
  if(list.length === 0){
    area.innerHTML = '<div class="empty">' + (mode==='wrong' ? '틀린 문제가 없어! 🌿' : '문제가 없어.') + '</div>';
    return;
  }
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const card = document.createElement('div');
    card.className = 'card';
    const answered = state[q.no] !== undefined;
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt';
      if(answered){
        if(i === q.answer) cls += ' correct';
        else if(i === state[q.no]) cls += ' wrong';
      }
      optsHtml += `<button class="${cls}" ${answered?'disabled':''} onclick="answer(${qIdx}, ${i})">${opt}</button>`;
    });
    let feedback = '';
    if(answered){
      const mark = state[q.no] === q.answer
        ? '<div class="feedback correct-mark">✅ 정답</div>'
        : `<div class="feedback wrong-mark">❌ 오답 (정답: ${q.answer+1}번)</div>`;
      const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
      feedback = mark + expl;
    }
    card.innerHTML = `
      <div class="qnum">${q.year} · 문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      ${feedback}
    `;
    area.appendChild(card);
  });
}

render();
</script>
