<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진로상담 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .cert-badge{
    display:inline-block;
    font-size:11px;
    color:var(--sub);
    margin:-4px 0 16px;
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .year-pills{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  .pill{
    background:var(--bg-base);
    border:none;
    border-radius:20px;
    padding:7px 16px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .pill.active{
    background:var(--accent);
    color:#fff;
    font-weight:600;
    box-shadow:none;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{padding:3px 0;line-height:1.6;}
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .opt-btn{
    display:block;
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    border-radius:10px;
    padding:9px 12px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    white-space:pre-wrap;
    font-family:inherit;
    cursor:pointer;
  }
  .opt-btn:hover:not(:disabled){background:rgba(0,0,0,0.045);}
  .opt-btn:disabled{cursor:default;}
  .opt-btn.correct-reveal{background:var(--right-bg);color:var(--accent-dark);font-weight:600;}
  .opt-btn.wrong-picked{background:#fbeceb;color:var(--wrong);font-weight:600;}
  .opt-btn.neutral-picked{background:#eef0ef;color:var(--text);font-weight:600;}
  .feedback{margin-top:12px;display:none;}
  .feedback.open{display:block;}
  .feedback-mark{font-size:13px;font-weight:600;color:var(--accent-dark);margin-bottom:8px;}
  .feedback-mark.wrong{color:var(--wrong);}
  .explain{
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">‹ 목록으로</a>
  <h1>진로상담</h1>
  <div class="cert-badge">청소년상담사 2급</div>
  <div class="meta-line" id="metaLine"></div>
  <div class="year-pills" id="yearPills"></div>
  <div id="quizArea"></div>
</div>
<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "다음과 관련된 진로상담의 목표는?\n○ 과도한 지위지향적인 직업관 ○ 직업에 대한 전통적인 귀천의식\n○ 블루칼라직에 대한 천시 풍조 ○ 화이트 칼라직에 대한 지나친 선호경향", "options": ["① 자신에 대한 정확한 이해 증진", "② 직업세계에 대한 이해 증진", "③ 진로정보 탐색 및 활용 능력 함양", "④ 합리적인 의사결정 능력 증진", "⑤ 일과 직업에 대한 올바른 가치관과 태도 형성"], "answer": 4, "expl": "지위지향적 직업관, 귀천의식, 블루칼라 천시, 화이트칼라 선호 등은 일과 직업에 대한 왜곡된 가치관·태도 문제이므로 이를 바로잡는 것은 '일과 직업에 대한 올바른 가치관과 태도 형성'이라는 목표에 해당한다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "윌리엄슨(E. Williamson)의 특성-요인 진로상담이론에서 진로문제를 진단하는데 도움을 주기 위한 내용이 아닌 것은?", "options": ["① 진로무선택", "② 불확실한 선택", "③ 현명하지 못한 선택", "④ 성격과 가치관 간의 모순", "⑤ 흥미와 적성 간의 모순"], "answer": 3, "expl": "윌리엄슨의 진단 범주는 진로무선택, 불확실한 선택, 현명하지 못한 선택, 흥미와 적성 간의 모순이며 '성격과 가치관 간의 모순'은 해당 분류에 포함되지 않는다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "진로상담자의 역할로 옳지 않은 것은?", "options": ["① 내담자의 의사결정기술을 향상시킨다.", "② 내담자의 대인관계기술을 향상시킨다.", "③ 내담자의 진로탐색활동을 구체적으로 돕는다.", "④ 내담자가 진로설계를 스스로 할 수 있도록 돕는다.", "⑤ 비표준화된 심리검사는 진로상담에서 활용할 수 없다."], "answer": 4, "expl": "진로상담에서도 표준화 여부와 무관하게 다양한 심리검사(비표준화 검사 포함)를 목적에 맞게 활용할 수 있어 '활용할 수 없다'는 설명은 옳지 않다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "사회인지진로이론(SCCT)에 관한 설명으로 옳지 않은 것은?", "options": ["① 반두라(A. Bandura)는 사회인지이론을 진로의사결정이론에 적용하여 진로선택에서의 자기효능감을 강조하였다.", "② 결과기대는 적응적 진로행동에 대하여 예상되는 결과에 관한 기대와 개인적 신념으로 가치와 관련된다.", "③ 환경맥락적 요인은 근접맥락과 배경맥락으로 세분화된다.", "④ 목표는 특정한 결과에 도움이 되는 행동에 전념하려는 의도나 계획이며, 행동을 자기조절하는데 있어서 중요하다.", "⑤ 자기효능감과 결과기대는 흥미에 영향을 주며, 이것은 다시 진로대안 선택의 목표에 영향을 준다."], "answer": 0, "expl": "SCCT에서 자기효능감과 결과기대는 '흥미'에 영향을 주고, 흥미는 다시 '목표'에 영향을 주는 경로를 가지므로 이 설명은 옳은 진술이며, 오답은 근접맥락/배경맥락 구분(③)이 실제로는 옳고 나머지 중 하나가 부정확하다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "하렌(V. Harren)의 의사결정 과정과 유형에 관한 설명으로 옳지 않은 것은?", "options": ["① 인식단계에서는 개인이 심리적 불균형을 느끼고 어떤 결정을 해야 할 필요성을 인식한다.", "② 계획단계에서는 자신의 선택에 대해 깊이 탐색하고 다각도로 검토하여 선택의 장단점을 명료화한다.", "③ 합리적 유형은 정확한 정보를 수집하고, 논리적으로 의사결정을 해 나가며, 의사결정에 대한 책임을 진다.", "④ 직관적 유형은 의사결정의 기초로 상상을 사용하고, 현재의 감정에 주의를 기울이며, 정서적 감각을 사용한다.", "⑤ 의존적 유형은 의사결정에 대한 개인적인 책임을 부정하고 그 책임을 외부로 돌리는 경향이 있다."], "answer": 1, "expl": "계획단계가 아니라 '혼란단계'에서 여러 대안을 깊이 탐색하고 장단점을 비교하며, 계획단계는 그 이후 구체적인 실행 계획을 세우는 단계이므로 이 설명이 옳지 않다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "타이드만(D. Tiedeman)과 오하라(R. O'Hara)의 진로의사결정이론에 관한 설명으로 옳은 것은?", "options": ["① 인지적 구조의 분화와 통합에 의해 의식적 문제해결 과정을 예상기와 구체화기로 나누어 설명한다.", "② 탐색 단계에서는 자신이 정한 목적을 전반적으로 고려하고, 대안을 추진해 나갈 수 있는 능력과 여건을 평가하며, 대안에 대한 가치를 분석한다.", "③ 선택 단계에서는 가능한 대안을 선택하며, 각 대안의 장단점을 검토하여 서열화 및 조직화한다.", "④ 적응 단계에서는 선택하고 실행을 위한 계획은 할 수 있지만, 적극적으로 실행할 수 있는 조건은 부족하다.", "⑤ 명료화 단계에서는 선택에 대하여 수동적으로 적응하며, 개인의 목표와 포부는 집단의 목표에 동화되고 수정된다."], "answer": 1, "expl": "타이드만과 오하라는 진로의사결정 과정을 예상기(탐색-구체화-선택-명료화)와 구체화기(적응-재정향-통합)로 나누어 설명하였다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "다위스(R. Dawis)와 롭퀴스트(L. Lofquist)의 직업적응이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 직업적응이론은 개인의 직업행동을 설명하는데 한정되고, 개인-환경 조화이론은 가족문제 등 다른 영역까지 확장하여 적용된다.\nㄴ. 개인은 자신과 환경과의 부조화 정도가 받아들일 수 있는 범위이면 별다른 대처 행동 없이 환경에 적응하게 된다.\nㄷ. 적응과정은 유연성, 적극성, 반응성, 인내 등의 적응양식에 따라 달라질 수 있다.\nㄹ. 직업적응을 위한 중요한 지표는 만족과 충족이며, 만족은 외적지표이고, 충족은 내적지표이다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "직업적응이론은 개인-환경 조화이론(더 포괄적인 상위이론)의 한 특수 적용 형태이며, 부조화가 수용 범위 내이면 별다른 대처 없이 적응하고, 유연성·적극성·반응성·인내의 적응양식에 따라 대처가 달라지며 만족(내적)·충족(외적) 지표가 중요하다는 설명들이 대체로 타당하다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "진로전환에 관한 설명으로 옳은 것은?", "options": ["① 슬로스버그(N. Schlossberg)는 전환의 유형으로 예측된 전환, 예측하지 못한 전환, 만성적인 전환, 일어나지 않은 전환으로 나누었다.", "② 윌리암스(D. Williams)는 자발적 전환과 비자발적인 전환으로 나누었다.", "③ 홉슨과 아담스(B. Hopson & J. Adams)는 전환을 증진시키는 요인으로 경제적 안정성, 정서적 안정성, 건강, 이전의 전환기술, 지지적 업무환경, 전환에 대한 지지를 제시하였다.", "④ 슬로스버그, 워터스와 굿맨(N. Schlossberg, E. Waters & J. Goodman)은 전환의 억제요인으로 경제적 불안정, 정서적 불안정, 건강, 적대적 업무환경, 전환관리의 부족을 제시하였다.", "⑤ 굿맨, 슬로스버그와 앤더슨(J. Goodman, N. Schlossberg & M. Anderson)은 진로전환이 마비-최소화-회의감-놓아주기-시험하기-의미찾기-내면화의 7단계 과정을 거쳐서 이루어진다고 하였다."], "answer": 0, "expl": "홉슨과 아담스는 전환을 촉진하는 요인으로 경제적·정서적 안정성, 건강, 이전의 전환기술, 지지적 업무환경, 전환에 대한 지지 등을 제시하였다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "크롬볼츠(J. Krumboltz)의 우연학습이론에서 제시된 5단계 진로상담과정 중 다음 내용과 관련된 단계는?\n○ '지금 마음이 어떤지 이야기 해 주세요.'\n○ 상담자가 내담자의 상황과 감정을 이해하고 있다는 것을 확신하게 하기\n○ '삶에서 의욕적이라고 느꼈던 활동에는 어떤 것들이 있었나요?'\n○ '이러한 의욕적인 활동들을 발견하게 된 계기가 무엇이었나요?'", "options": ["① 내담자의 기대를 이끌기", "② 내담자의 관심이 무엇인지 확인하기", "③ 계획하지 않았던 사건들에서 내담자의 성공적인 과거 경험을 활용하기", "④ 잠재적 기회를 알아차릴 수 있도록 하기", "⑤ 행동하는데 장애물을 극복하기"], "answer": 1, "expl": "과거 성공 경험과 그 계기를 탐색하며 내담자의 감정을 확인하고 공감하는 개입은 계획하지 않은 사건 속 성공 경험을 활용하는 단계에 해당한다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "장애인 진로상담에 관한 설명이 아닌 것은?", "options": ["① 내담자의 장애수용에 대한 상담은 다루지 않는다.", "② 진로 및 직업 선택에서 고용상의 차별이 있는지를 알아본다.", "③ 진로 탐색에서 장애유형에 따른 제한점이 있는지를 고려하여 상담한다.", "④ 내담자의 특성에 따라 찾아가는 상담도 할 수 있다.", "⑤ 진로 및 직업 상담을 위한 장애유형과 수준에 따른 인프라 구축이 되어야 한다."], "answer": 0, "expl": "장애수용은 진로선택과 밀접히 연결된 심리적 과업이므로 장애인 진로상담에서 반드시 다루어야 할 주제이며, '다루지 않는다'는 설명은 옳지 않다."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "구성주의적 진로상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 객관적인 현실보다는 주관적인 관점이나 자기구성적인 이야기를 강조한다.\nㄴ. 진로상담에서 스토리텔링, 내러티브 상담 등으로 다루어진다.\nㄷ. 사회적 구성주의는 내담자가 진로와 관련된 경험에 대해 개인적인 의미를 부여함으로써 진로가 형성된다고 본다.\nㄹ. 개인적 구성주의는 진로발달이 환경에 적응하는 과정을 통해 이루어진다고 본다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "구성주의 진로상담은 주관적 의미부여(ㄱ), 내러티브·스토리텔링(ㄴ), 사회적 구성주의의 의미부여 관점(ㄷ)을 강조하지만, 환경에 적응하는 과정으로 진로발달을 설명하는 것은 개인적 구성주의가 아닌 발달적 관점(수퍼 등)에 가까워 ㄹ은 옳지 않다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "다문화 청소년 진로상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 구성주의 진로상담이 효과적일 수 있다.\nㄴ. 다문화에 대한 사회적 인식을 고려한다.\nㄷ. 문화적 차이로 인한 정체성 혼란을 고려한다.\nㄹ. 다문화에 대한 상담자의 인식과 지식을 고려한다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "다문화 청소년 진로상담에서는 구성주의 접근의 효과성, 사회적 인식, 정체성 혼란, 상담자의 문화적 역량 모두 고려해야 할 요소로 타당하다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "갓프레드슨(L. Gottfredson)의 제한-타협 이론에 관한 설명으로 옳지 않은 것은?", "options": ["① 제한은 아동이 적합하지 않다고 생각하는 진로대안을 받아들이면서 수용가능한 대안으로 확대해 가는 과정이다.", "② 2단계인 성유형 획득단계는 초등학교 저학년 시기로 성역할을 지향한다.", "③ 3단계인 사회적 가치를 획득하는 단계는 아동기에서 청소년기에로 이행하는 시기로, 사회적 가치, 능력, 명성을 지향한다.", "④ 4단계인 내적 자아를 확립하는 단계는 청소년기로, 자신만의 흥미, 적성, 가치관, 성격 등을 이해할 수 있다.", "⑤ 사람들은 자아개념에 부합하는 직업들을 포기할 때 흥미, 명성, 성유형의 순서대로 포기한다."], "answer": 0, "expl": "제한은 수용 불가능한 대안을 '제외'해 나가는 과정이며, '수용가능한 대안으로 확대'해 간다는 설명은 제한의 정의와 반대된다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "진로상담과정에서 보딘(E. Bordin)의 내담자 분류에 관한 설명으로 옳지 않은 것은?", "options": ["① 자아갈등: 자아개념과 심리기능과의 갈등", "② 선택불안: 여러 가지 대안 중에 결정을 내리지 못하고 불안함", "③ 의존성: 개인의 문제를 해결하지 못하고, 생애발달과업 수행을 어려워함", "④ 정보의 부족: 체험의 폭 제한, 체험의 부적절성, 필요한 기술을 습득할 기회가 부족함", "⑤ 확신결여: 선택한 진로에 확신을 갖고 진로상담을 받음"], "answer": 4, "expl": "보딘의 확신결여 범주는 진로 선택에 대한 확신이 '부족'하여 상담을 받는 경우를 의미하며, '확신을 갖고 상담을 받는다'는 설명은 정의와 반대된다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "진로가계도(Career Genogram)에 관한 설명으로 옳지 않은 것은?", "options": ["① 내담자의 진로에 미친 영향을 확인할 수 있다.", "② 내담자의 진로장벽을 확인할 수 있다.", "③ 진로가계도는 내담자에 대한 정보를 수집하는 양적평가방법이다.", "④ 내담자의 진로정보를 여러 가지 방법으로 탐색할 수 있다.", "⑤ 진로가계도 사용목적을 내담자에게 설명해야 한다."], "answer": 2, "expl": "진로가계도는 가족 내 직업 패턴, 가치관, 기대 등을 그림으로 탐색하는 질적 평가 도구이며 '양적평가방법'이라는 설명은 옳지 않다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "진로정보의 평가에 관한 설명으로 옳지 않은 것은?", "options": ["① 정보의 시기를 파악한다.", "② 정보의 출처를 확인한다.", "③ 정보를 직ㆍ간접적 다양한 방법으로 수집한다.", "④ 진로정보를 제공하는 목적은 고려하지 않아도 된다.", "⑤ 습득된 정보들을 일반화시킬 수 있는지 확인한다."], "answer": 3, "expl": "진로정보 평가 시에는 정보 제공의 목적(누가, 왜 만들었는지)도 반드시 고려해야 하며 이를 무시해서는 안 된다."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "진로상담에서 심리검사에 관한 설명으로 옳지 않은 것은?", "options": ["① 적성분류검사(DAT)에는 일반적성검사와 특수적성검사가 있다.", "② 스트롱흥미검사(SII)는 특정 직업에 종사하고 있는 사람들이 비슷한 흥미를 갖고 있다는 전제로 개발되었다.", "③ 쿠더(G. Kuder) 흥미검사(KPR)는 직업, 학교, 여가의 세 가지 영역에서의 활동 중 가장 잘하는 것과 가장 싫어하는 것을 선택하게 하여 적성 영역을 결정하는 검사이다.", "④ 미네소타 직업가치 검사(MIQ)는 직업과 관련된 가치체계를 측정하기 위한 검사이다.", "⑤ 진로성숙도검사(CMI)는 초등학교 6학년부터 고등학교 3학년을 대상으로 진로의사결정에 대한 태도와 능력을 측정하기 위해 개발되었다."], "answer": 2, "expl": "쿠더 흥미검사(KPR)는 활동 선호를 통해 '흥미' 영역을 파악하는 흥미검사이며, 적성 영역을 결정한다는 설명은 검사 목적과 다르다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "진로정보에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 직업에 대한 이해를 향상시킴으로써 합리적인 의사결정을 돕는다.\nㄴ. 읽기 수준이 낮은 내담자는 시청각 자료를 제공하는 것이 효과적이다.\nㄷ. 일과 관련된 교육적, 직업적, 심리사회적인 정보를 의미한다.\nㄹ. 진로정보의 수집과정에서 직접적인 경험에 의한 자료를 활용할 수 있다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "진로정보는 합리적 의사결정을 돕고(ㄱ), 시청각 자료가 읽기수준이 낮은 내담자에게 효과적이며(ㄴ), 교육적·직업적·심리사회적 정보를 포괄하고(ㄷ), 직접경험 자료도 활용 가능하다(ㄹ)는 설명 모두 타당하다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "다음 집단진로상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 진로관련 공동의 목표를 갖는다.\nㄴ. 집단원의 성격 특성에 따른 역효과성의 가능성이 적다.\nㄷ. 집단구성은 집단원을 사전 면담한 후 선정하여 구성한다.\nㄹ. 공통된 직업정보를 효율적으로 제공할 수 있는 기회가 된다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "집단진로상담은 공동목표(ㄱ), 사전면담을 통한 집단구성(ㄷ), 공통 직업정보 제공의 효율성(ㄹ) 면에서 장점이 있으나, 개인상담에 비해 집단원의 성격 특성으로 인한 역효과 가능성은 오히려 존재할 수 있어 ㄴ은 옳지 않다."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "긴즈버그(E. Ginzberg)의 진로발달이론에서 잠정기(tentative phase)의 하위 단계를 모두 고른 것은?\nㄱ. 흥미(interest) ㄴ. 능력(ability) ㄷ. 가치(value) ㄹ. 탐색(exploration)", "options": ["① ㄱ, ㄹ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "긴즈버그의 잠정기는 흥미-능력-가치-전환의 하위단계로 구성되며, 탐색(exploration)은 잠정기가 아닌 현실기의 하위단계에 해당해 ㄹ은 포함되지 않는다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "수퍼(D. Super)의 생애진로발달이론에 관한 설명으로 옳지 않은 것은?", "options": ["① 진로발달을 전 생애적인 발달과정으로 보았다.", "② 아동기부터 일의 세계에 관한 여러 경험을 하게 되면서 일과 관련된 자기개념을 형성한다고 하였다.", "③ 성인기의 진로발달을 이해하기 위해서는 진로적응력의 개념이 중요하다고 보았다.", "④ 진로발달에 있어서 역할과 시간의 개념을 도입하였다.", "⑤ 진로아치모형의 구조에서 아치의 왼쪽에는 사회경제적 요인이 오른쪽에는 개인적 요인이 있다."], "answer": 4, "expl": "수퍼의 진로아치모형에서는 왼쪽에 개인적(생물학적) 요인, 오른쪽에 사회경제적 요인이 배치되므로 이 설명은 좌우가 뒤바뀌어 옳지 않다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "생애진로사정(Life Career Assessment: LCA)에 관한 설명으로 옳지 않은 것은?", "options": ["① 아들러(A. Adler)의 개인심리학에 기초하였다.", "② 내담자의 정보를 수집하는 단계에서 사용될 수 있는 구조화된 면접기법이다.", "③ 상담자와 내담자의 긍정적인 라포 형성에 도움을 준다.", "④ 진로사정, 일상적인 하루, 강점과 장애, 요약 등의 네 부분으로 구성되어 있다.", "⑤ 세상과 개인의 일, 사회(사회적 관계), 성(우정)의 생활영역을 서로 분리해서 다룬다."], "answer": 4, "expl": "생애진로사정에서는 일, 사회적 관계, 우정(성) 등 생활영역들을 서로 '분리'해서 보지 않고 통합적으로 연결지어 이해하려 하므로 '분리해서 다룬다'는 설명은 옳지 않다."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "다음 설명을 모두 충족하는 진로상담 검사는?\n○ 흥미검사로부터 얻어지는 정보를 처리하는 데 어려움을 가지고 있는 사람들을 선별할 수 있다.\n○ 의사결정혼란, 수행불안, 외적갈등이라는 세 개의 하위척도로 구성되었다.\n○ 개인적인 특성에 맞는 진로지도를 할 수 있다.", "options": ["① 진로결정장애검사", "② 진로사고검사", "③ 직업가치관검사", "④ 진로적성검사", "⑤ 성격검사"], "answer": 1, "expl": "의사결정혼란·수행불안·외적갈등의 세 하위척도로 구성되어 흥미검사 결과를 활용하기 어려운 사람을 선별하는 검사는 진로결정장애검사(CDDQ 등)에 해당한다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "샘슨 등(J. Sampson et al.)의 진로의사결정 정도에 따른 내담자 유형에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 우유부단형: 자신의 선택을 이행하기 위해 도움이 필요한 내담자\nㄴ. 우유부단형: 생활 전반에 걸쳐 불안을 동반하는 내담자\nㄷ. 진로결정자: 자신의 선택이 잘 되었음을 명료화하길 원하는 내담자\nㄹ. 진로결정자: 자신이 하고 싶은 것을 결정한 것처럼 보이지만, 그 결정에 확신이 없는 내담자", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "우유부단형은 선택 실행의 어려움(ㄱ)뿐 아니라 전반적인 불안(ㄴ)을 동반하는 경우를 포함하며, 진로결정자는 선택의 명료화를 원하는 경우(ㄷ)와 확신이 부족한 경우(ㄹ) 모두를 포함하는 넓은 범주로 설명된다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "여성 진로상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 성불평등적 요소에 대한 자신의 의견을 표현할 수 있도록 한다.", "② 성역할 고정관념의 내면화 정도를 고려하지 않는다.", "③ 직업의식을 강화하고 가정과 직장 간의 양립방안을 마련할 수 있도록 한다.", "④ 경력단절 가능성에 대비하여 장기적인 진로설계를 고려한다.", "⑤ 취업 장애요인을 극복할 수 있는 구체적인 방안을 모색하도록 지원한다."], "answer": 1, "expl": "여성 진로상담에서는 성역할 고정관념이 내면화된 정도를 반드시 파악하고 고려해야 하며, 이를 '고려하지 않는다'는 설명은 옳지 않다."}, {"no": "23-1", "year": 2024, "qno": 1, "text": "진로상담자가 갖추어야 할 역량으로 옳은 것을 모두 고른 것은?\nㄱ. 진로 관련 이론에 대한 이해 ㄴ. 개인차와 다양성에 대한 이해\nㄷ. 진로검사 수행 역량 ㄹ. 자기성찰과 자기개발 역량", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "진로이론 이해, 개인차·다양성 이해, 진로검사 수행역량, 자기성찰과 자기개발 역량 모두 진로상담자에게 필요한 역량이다."}, {"no": "23-2", "year": 2024, "qno": 2, "text": "진로상담의 목표로 옳은 것을 모두 고른 것은?\nㄱ. 자신에 대한 정확한 이해 증진 ㄴ. 직업세계에 대한 이해 증진\nㄷ. 진로정보 탐색 및 활용능력 함양 ㄹ. 합리적인 의사결정 능력 증진", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "자기이해 증진, 직업세계 이해, 진로정보 탐색·활용, 합리적 의사결정 능력 증진은 모두 대표적인 진로상담의 목표이다."}, {"no": "23-3", "year": 2024, "qno": 3, "text": "윌리암슨(E. Williamson)의 진로상담과정에서 종합단계에 관한 설명으로 옳은 것은?", "options": ["① 내담자의 독특성 또는 개별성을 탐색하기 위하여 사례연구나 검사결과를 통해 자료를 수집하고 요약한다.", "② 내담자의 특성과 문제를 분류하고 교육적, 직업적 능력과 특성을 비교하여 문제의 원인을 찾아낸다.", "③ 새로운 문제가 발생되었을 때 내담자가 바람직한 행동계획을 수행할 수 있도록 계속적으로 돕는다.", "④ 여러 자료로 부터 태도, 흥미, 가정환경, 지식, 학교 성적 등에 대한 자료들을 수집한다.", "⑤ 현재 또는 미래의 바람직한 적응을 위해 무엇을 해야할 지를 함께 상의한다."], "answer": 0, "expl": "종합단계는 사례연구나 검사자료를 통해 내담자의 개별성·독특성을 통합적으로 파악하는 단계이다."}, {"no": "23-4", "year": 2024, "qno": 4, "text": "다음은 홀랜드(J. Holland)의 직업성격유형이론에 관한 설명이다. ( )에 공통으로 들어갈 용어로 옳은 것은?", "options": ["① 정체성(identity)", "② 일치성(congruence)", "③ 계측성(calculus)", "④ 변별성(differentiation)", "⑤ 일관성(consistency)"], "answer": 1, "expl": "개인과 직업환경 유형이 얼마나 맞는지를 나타내는 홀랜드 이론의 핵심 개념은 일치성(congruence)이다."}, {"no": "23-5", "year": 2024, "qno": 5, "text": "진로상담에서 활용하는 진로가계도(Career Genogram)에 관한 설명으로 옳지 않은 것은?", "options": ["① 가족의 맥락 속에서 내담자 이해를 촉진시켜주는 기법이다.", "② 내담자 가족의 지배적인 직업가치를 확인하기 위해 사용할 수 있다.", "③ 남성은 원, 여성은 사각형, 중심인물은 두 겹의 원을 사용하여 진로가계도를 그린다.", "④ 진로정보 수집단계에서 사용될 수 있는 질적 평가과정이다.", "⑤ 내담자의 진로기대형성에 중요한 역할을 한 가족이 누구인지 확인이 가능하다."], "answer": 2, "expl": "가계도에서 통상 남성은 사각형, 여성은 원으로 표시하므로 이 설명은 기호가 반대로 되어 있어 옳지 않다."}, {"no": "23-6", "year": 2024, "qno": 6, "text": "파슨스(F. Parsons)의 특성요인이론에서 자신에 대한 이해를 증진시키기 위한 특성으로 옳지 않은 것은?", "options": ["① 성격", "② 흥미", "③ 적성", "④ 직무", "⑤ 가치"], "answer": 3, "expl": "직무는 개인특성이 아니라 직업(환경) 요인에 해당하므로 자신에 대한 이해를 위한 특성 목록에 포함되지 않는다."}, {"no": "23-7", "year": 2024, "qno": 7, "text": "로우(A. Roe)의 욕구이론에 관한 설명으로 옳은 것은?", "options": ["① 개인의 욕구는 직업선택에 영향을 미치지 않는다.", "② 부모는 아동기 진로발달에 영향을 미치지 않는다.", "③ 직업을 흥미에 기초하여 8개 직업군으로 제안하였다.", "④ 직업에서의 곤란도와 책무성을 고려하여 5개의 직업단계를 설정하였다.", "⑤ 베츠(N. Betz)의 이론을 근거로 직업과 기본욕구 만족 간의 관련성을 설명하였다."], "answer": 2, "expl": "로우는 직업을 흥미에 기초해 8개 군집(직업군)으로 분류하였다."}, {"no": "23-8", "year": 2024, "qno": 8, "text": "하렌(V. Harren)의 진로의사결정유형이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 합리적 유형은 결정에 대한 자신의 책임을 부정한다.\nㄴ. 진로의사결정 단계는 '인식 - 계획 - 확신 - 이행'이다.\nㄷ. 합리적 유형, 직관적 유형, 의존적 유형으로 진로의사결정유형을 분류하고 있다.\nㄹ. 인식단계는 동조, 자율, 상호의존의 3가지의 하위단계로 나누어진다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "하렌은 의사결정을 인식-계획-확신-이행 단계로 설명하고(ㄴ) 합리적·직관적·의존적 유형으로 분류하였으며(ㄷ), 인식단계를 동조-자율-상호의존으로 나누었으나(ㄹ), 합리적 유형은 오히려 책임을 '수용'하는 유형이라 ㄱ은 옳지 않다."}, {"no": "23-9", "year": 2024, "qno": 9, "text": "수퍼(D. Super)의 진로발달단계에서 다음과 같은 발달과업이 수행되는 단계는?", "options": ["① 성장기", "② 탐색기", "③ 확립기", "④ 유지기", "⑤ 쇠퇴기"], "answer": 2, "expl": "정착, 공고화, 발전은 수퍼의 진로발달단계 중 확립기의 하위 과업이다."}, {"no": "23-10", "year": 2024, "qno": 10, "text": "갓프레드슨(L. Gottfredson)의 제한타협이론에서 다음에 해당하는 단계는?", "options": ["① 성역할 지향 단계", "② 외적이며 비교평가 지향 단계", "③ 사회적 가치 지향 단계", "④ 규모와 힘 지향 단계", "⑤ 내적이며 고유한 자기 지향 단계"], "answer": 3, "expl": "힘과 크기의 서열개념 획득, 성인 역할을 통한 직업 인식은 갓프레드슨 이론의 2단계인 규모와 힘 지향 단계의 특징이다."}, {"no": "23-11", "year": 2024, "qno": 11, "text": "다음 이론을 주장한 학자는?", "options": ["① 블라우(P. Blau)", "② 긴즈버그(E. Ginzberg)", "③ 윌리암슨(E. Williamson)", "④ 갓프레드슨(L. Gottfredson)", "⑤ 보딘(E. Bordin)"], "answer": 1, "expl": "진로선택을 환상기-잠정기-현실기의 세 단계로 구분한 학자는 긴즈버그이다."}, {"no": "23-12", "year": 2024, "qno": 12, "text": "타이드만과 오하라(D. Tiedeman & R. O'Hara)의 진로의사결정이론에 관한 설명으로 옳지 않은 것은?", "options": ["① 실천기는 새로운 상황에 순응하는 순응기에서 집단의 요구와 개인의 요구 간에 균형을 이루는 통합기를 거쳐 자신의 의견이나 주장을 행사하는 개혁기로 전개된다.", "② 개인의 진로의사결정 단계를 직업정체감 형성 과정에 따라 예상기와 실천기로 나누어 설명한다.", "③ 구체화 단계에서는 가능한 대안을 선택하며, 각 대안의 장단점을 검토하여 서열화 및 조직화한다.", "④ 선택기는 구체화 과정을 통해 나타난 결과를 토대로 명확한 목표를 설정하는 단계이다.", "⑤ 개인이 일에 직면했을 때 분화와 통합을 통하여 직업정체감을 형성한다고 보았다."], "answer": 0, "expl": "실천기(적응기)는 순응기→개혁기→통합기 순으로 전개되며, '순응기-통합기-개혁기' 순서로 설명한 것은 순서가 바뀌어 옳지 않다."}, {"no": "23-13", "year": 2024, "qno": 13, "text": "다위스와 롭퀴스트(Dawis & Lofquist)가 제시한 직업적응 방식에 관한 설명과 개념을\n바르게 연결한 것은?\nㄱ. 개인이 직업 환경과 개인적 환경 간의 부조화를 참아내는 정도\nㄴ. 개인-환경 간 부조화 상태에서 개인이 직업 환경을 변화시킴으로써 대처하는 방식", "options": ["① ㄱ: 끈기(perseverance), ㄴ: 유연성(flexibility)", "② ㄱ: 끈기(perseverance), ㄴ: 적극성(activeness)", "③ ㄱ: 유연성(flexibility), ㄴ: 적극성(activeness)", "④ ㄱ: 유연성(flexibility), ㄴ: 반응성(reactiveness)", "⑤ ㄱ: 적극성(activeness), ㄴ: 반응성(reactiveness)"], "answer": 2, "expl": "부조화를 참아내는 정도는 유연성(flexibility), 환경을 변화시키려는 대처방식은 적극성(activeness)에 해당한다."}, {"no": "23-14", "year": 2024, "qno": 14, "text": "슐로스버그(N. Schlossberg)가 제시한 진로전환 상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 직업생활 전환에는 청사진과 위협의 양가적인 특성이 있다.", "② 직업생활 전환의 개념을 생애 사건 가운데 결혼 및 출산에 한정하여 설명하고 있다.", "③ 새로운 일자리로 진입하는 경우 기대치 전환이 중요하다고 보고 있다.", "④ 개인의 직업생활 전환에 영향을 주는 요소로 자아(self), 지원(support), 상황(situation), 전략(strategy) 등을 강조한다.", "⑤ 새로운 일자리에 적응하기 위해서는 네트워킹, 가족지원정책, 경제적 안정 등 다양한 차원의 개입이 요구된다."], "answer": 1, "expl": "슐로스버그의 전환이론은 결혼·출산뿐 아니라 은퇴, 실직, 이직 등 생애 전반의 다양한 전환사건을 폭넓게 다루므로 '결혼 및 출산에 한정'된다는 설명은 옳지 않다."}, {"no": "23-15", "year": 2024, "qno": 15, "text": "미러바일(R. Mirabile)의 퇴직자를 위한 카운슬링모델에서 다음이 설명하는 단계는?", "options": ["① 위안(comfort)", "② 성찰(reflection)", "③ 명료화(clarification)", "④ 방향(direction)", "⑤ 관점전환(perspective shift)"], "answer": 1, "expl": "퇴직 충격에서 벗어나 감정을 수용하고 강점·동기·진로유형을 파악하는 단계는 성찰(reflection) 단계에 해당한다."}, {"no": "23-16", "year": 2024, "qno": 16, "text": "크럼볼츠(J. Krumboltz)의 우연학습이론(happenstance learning theory)을 토대로 한 진로상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 진로결정과정에서 개인이 통제하기 어려운 요인들이 영향을 미치고 있음을 강조한다.", "② 내담자가 호소하는 문제도 중요하지만 예기치 않은 사건이나 문제발생을 대비하는 역량을 키워주는 것이 중요하다.", "③ 내담자의 호기심(curiosity), 인내심(persistence), 유연성(flexibility), 낙관성(optimism), 위험감수(risk-taking) 등의 기술을 촉진시킨다.", "④ 미래는 불확실하므로 개인의 특성과 직업의 특성을 연결하는 전통적인 진로상담을 중시한다.", "⑤ 상담의 성공여부는 내담자가 상담실 밖에서 다양한 경험을 위해 얼마나 노력하고 성장하는가에 좌우된다."], "answer": 3, "expl": "우연학습이론은 개인-환경 매칭 중심의 전통적 진로상담보다 우연한 사건을 진로기회로 활용하는 역량 개발을 중시하므로 이 설명은 이론의 취지와 반대된다."}, {"no": "23-17", "year": 2024, "qno": 17, "text": "사회인지진로이론(SCCT)이 진로상담에 주는 시사점으로 옳지 않은 것은?", "options": ["① 내담자의 흥미나 가치, 능력 보다는 진로장벽에 영향을 미치는 환경적 조건을 중시한다.", "② 내담자가 선택 가능한 진로를 일찍 제외하도록 만든 진로장벽을 확인하고 평가하는 것이 중요하다.", "③ 내담자의 잘못된 직업정보를 점검하고 수정하는 것이 중요하다.", "④ 자기효능감 점검, 결과기대에 대한 탐색과 현실성 강화, 진로준비행동 촉진 등이 중요한 개입전략이다.", "⑤ 부적절한 자기효능감이나 결과에 대한 기대 때문에 내담자가 제외한 진로대안들을 다시 확인하는 것이 중요하다."], "answer": 0, "expl": "SCCT는 자기효능감·결과기대·흥미 등 개인 내적 인지변인을 환경적 조건 못지않게 핵심적으로 다루므로, 환경적 조건만을 우선시한다는 설명은 이론의 균형잡힌 관점과 맞지 않는다."}, {"no": "23-18", "year": 2024, "qno": 18, "text": "사비카스( . Savickas)의 진로구성주의에 근거한 진로상담의 전략으로 적절하지 않은 것은?", "options": ["① 심리검사는 개인의 특성에 대한 과학적 접근이므로 표준화검사 결과를 중시한다.", "② 내담자로 하여금 진로나 직업선택과 관련된 본인의 이야기(storytelling)를 하도록 한다.", "③ 내담자의 진로이야기를 끌어내기 위해 진로유형면접(career style interview)을 사용한다.", "④ 진로유형면접 자료를 근거로 내담자의 생애주제(life themes)를 이끌어 낸다.", "⑤ 개인이 환경의 영향을 받기도 하지만, 개인도 환경을 만들어가는 발달의 주체임을 강조한다."], "answer": 0, "expl": "구성주의 진로상담은 표준화 검사결과보다 내담자의 주관적 이야기와 의미부여를 중시하므로, 표준화검사를 중심에 두는 전략은 이 접근과 맞지 않는다."}, {"no": "23-19", "year": 2024, "qno": 19, "text": "합리성을 토대로 한 전통적 진로상담이론의 한계를 극복하기 위해 최근 강조되고 있는 진로상담 대안이론(진로무질서이론 등)이 등장하게 된 배경으로 옳지 않은 것은?", "options": ["① 기존의 이론들은 개인의 진로에 영향을 주는 객관적 맥락과 주관적 맥락의 영향을 모두 포함하지 못하고 있다.", "② 기존의 이론들은 매칭 또는 조화의 역동에만 초점을 두고 인간의 적응적인 특성을 충분히 반영하지 못하고 있다.", "③ 기존의 이론들은 인간이 현상과 경험을 새롭게 해석하고 의미부여하고 있는 점을 간과하고 있다.", "④ 진로발달이 예상하지 못했던 사건과 경험, 즉 우연에 의해 변화될 수 있음을 충분히 고려하지 못하고 있다.", "⑤ 기존의 이론들은 안정보다 변화를 가정하고 있어 이론과 실제가 부합되지 않는 한계가 있다."], "answer": 4, "expl": "기존 전통적 이론들은 오히려 '안정성'을 가정하는 정태적 접근이었고, 대안이론은 변화와 우연을 반영하지 못한 기존 이론의 한계를 극복하려는 시도이므로, '안정보다 변화를 가정'했다는 설명은 사실과 반대된다."}, {"no": "23-20", "year": 2024, "qno": 20, "text": "샘슨 등(J. Sampson et al.)이 제시한 내담자 분류체계를 기준으로 볼 때 '진주'의 진로발달 상태를 바르게 진단한 것은?", "options": ["① 문제의 원인 - 내적 갈등", "② 문제의 원인 - 의존성", "③ 호소영역 - 진로미결정자", "④ 진로의사결정 정도 - 희망과 현실의 괴리", "⑤ 진로의사결정 정도 - 진로결정자"], "answer": 4, "expl": "진로는 결정했지만 실행을 위한 준비행동을 하지 않는 진주의 사례는 진로의사결정 정도 면에서 진로결정자에 해당하되 실행 확신이 부족한 유형으로 분류된다."}, {"no": "23-21", "year": 2024, "qno": 21, "text": "다음의 사례가 보여주는 진로상담기법은?", "options": ["① 진로유형면접(career style interview)", "② 진로성숙도평가(career maturity assessment)", "③ 직업카드", "④ 표준화검사", "⑤ 진로가계도(career genogram)"], "answer": 0, "expl": "역할모델, 좋아하는 잡지·책·영화·교과목·여가 등을 묻는 질문들은 사비카스의 진로유형면접의 대표적 질문 항목이다."}, {"no": "23-22", "year": 2024, "qno": 22, "text": "심리검사를 활용한 진로상담에서 내담자와의 작업동맹 전략으로 옳지 않은 것은?", "options": ["① 내담자가 기대하는 것이 무엇인가와 같은 질문을 통해 촉진적 관계를 형성한다.", "② 내담자의 비합리적인 진로기대 및 진로신념 등을 살펴보면서 내담자의 관점을 수용한다.", "③ 내담자가 가장 중시하는 욕구가 무엇인가를 통해서 내담자의 생활양식을 확인한다.", "④ 내담자에게 특정한 일을 좋아하는 이유 등을 질문하면서 내담자의 문제를 구체화 한다.", "⑤ 내담자가 검사도구의 종류와 특징을 잘 모를 경우 상담자가 주도적으로 검사도구를 선택한다."], "answer": 4, "expl": "검사도구 선택은 내담자에게 충분히 설명하고 협의하여 함께 결정하는 것이 바람직하며, 상담자가 일방적·주도적으로 선택하는 것은 협력적 작업동맹 형성과 맞지 않는다."}, {"no": "23-23", "year": 2024, "qno": 23, "text": "직업분류 및 직업사전에 대한 설명 중 옳지 않은 것은?", "options": ["① 한국표준직업분류에서는 직업을 11개 직업군으로 분류하고 있다.", "② 한국표준직업분류에서는 직능수준을 교육과 훈련정도에 따라 4단계로 구분하고 있다.", "③ 한국고용직업분류는 직업을 대분류, 중분류, 소분류, 세분류로 구분하고 있다.", "④ 한국직업사전의 직업코드에서 마지막 세 자리 숫자는 자료(data), 사람(people), 사물(things)을 의미한다.", "⑤ 한국직업사전에서는 부가직업정보로 직업별 필요한 정규교육수준, 숙련기간, 자격면허 등을 제공하고 있다."], "answer": 3, "expl": "한국직업사전 코드에서 자료·사람·사물을 나타내는 것은 마지막 세 자리가 아니라 별도의 부가직업정보 항목이며, 이 설명은 실제 코드 구조와 일치하지 않는다."}, {"no": "23-24", "year": 2024, "qno": 24, "text": "청소년 집단진로상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단의 형태로 진로상담이 진행됨을 의미한다.", "② 집단의 형태로 진행되어 자기이해의 기회가 없다.", "③ 공통적으로 필요로 하는 직업정보를 효율적으로 제공할 수 있는 기회가 된다.", "④ 자신의 직업적 적합성을 객관적이고 현실적으로 이해할 수 있다.", "⑤ 자신의 진로계획을 검토하게 하는 기회를 제공한다."], "answer": 1, "expl": "집단진로상담에서도 다른 집단원과의 상호작용을 통해 자기이해의 기회를 얻을 수 있으므로 '자기이해의 기회가 없다'는 설명은 옳지 않다."}, {"no": "23-25", "year": 2024, "qno": 25, "text": "다문화 진로상담에 관한 내용을 모두 고른 것은?\nㄱ. 내담자의 문화보다 상담자의 문화를 따르도록 만든다.\nㄴ. 다문화에 대한 상담자의 지식과 인식은 중요하다.\nㄷ. 내담자들이 직면하고 있는 진로문제를 이해하고자 노력한다.\nㄹ. 내담자를 진단할 때 내담자의 문화적 특성을 신중하게 고려한다.", "options": ["① ㄱ, ㄷ", "② ㄴ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "다문화 진로상담은 상담자의 문화적 지식·인식(ㄴ), 내담자가 겪는 진로문제 이해(ㄷ), 문화적 특성을 고려한 진단(ㄹ)이 중요하며, 내담자에게 상담자의 문화를 따르도록 강요하는 것(ㄱ)은 다문화 상담의 원칙에 어긋난다."}, {"no": "22-1", "year": 2023, "qno": 1, "text": "파슨스(F. Parsons)의 특성요인이론에서 자신에 대한 이해를 증진시키기 위한 내용으로 옳은 것을 모두 고른 것은?\nㄱ. 성격 ㄴ. 적성 ㄷ. 흥미\nㄹ. 직업종류 ㅁ. 가치 ㅂ. 일의 내용", "options": ["① ㄱ, ㄴ, ㄹ", "② ㄱ, ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ, ㅁ", "④ ㄴ, ㄷ, ㄹ, ㅂ", "⑤ ㄴ, ㄷ, ㅁ, ㅂ"], "answer": 2, "expl": "파슨스의 자기이해 요소는 성격, 적성, 흥미, 가치이며 직업종류나 일의 내용은 직업세계에 대한 이해 영역에 해당한다."}, {"no": "22-2", "year": 2023, "qno": 2, "text": "청소년 진로상담자의 역할로 옳지 않은 것은?", "options": ["① 합리적인 의사결정능력을 향상시킨다.", "② 진로 관련 검사를 실시하고 해석한다.", "③ 초등학생에게는 진로인식을 위한 활동을 하도록 한다.", "④ 중학생에게는 진로탐색을 위한 활동을 하도록 한다.", "⑤ 진로선택을 구체적으로 직접 설계해 준다."], "answer": 4, "expl": "진로상담자는 내담자가 스스로 진로를 설계하도록 조력하는 역할이며, 진로선택을 대신 설계해 주는 것은 적절한 역할이 아니다."}, {"no": "22-3", "year": 2023, "qno": 3, "text": "홀랜드(J. Holland)의 직업성격유형이론에 관한 설명이다. ( )에 들어갈 용어를 순서대로 바르게 나열한 것은?\n○ ( ㄱ )은 성격유형과 환경모형 간의 관련 정도를 의미하는 것으로 두 유형 간의 근접성에 따라 설명된다.\n○ 개인과 직업환경 간의 적합성 정도에 관한 것으로, 사람들은 자신의 유형과 비슷하거나 정체성을 갖게 하는 환경 유형에서 일을 할 때 ( ㄴ )이 높아진다.", "options": ["① ㄱ: 변별성, ㄴ: 일치성", "② ㄱ: 일관성, ㄴ: 변별성", "③ ㄱ: 변별성, ㄴ: 일관성", "④ ㄱ: 일관성, ㄴ: 일치성", "⑤ ㄱ: 일치성, ㄴ: 일관성"], "answer": 3, "expl": "육각형 모형에서 유형 간 근접성에 따른 관련 정도는 일관성, 개인과 환경 유형의 적합도는 일치성 개념에 해당한다."}, {"no": "22-4", "year": 2023, "qno": 4, "text": "사회인지진로이론(SCCT)에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 선택모형에서 환경적 배경은 학습경험에 영향을 준다.\nㄴ. 수행모형에서 결과기대는 수행목표를 통해 성취수준에 영향을 준다.\nㄷ. 결과기대는 특정행동을 수행하는 과정으로 목표설정에 영향을 준다.\nㄹ. 자기효능감은 타고나는 것으로 능력에 대한 개인의 신념이다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄱ, ㄹ", "④ ㄴ, ㄷ", "⑤ ㄷ, ㄹ"], "answer": 0, "expl": "선택모형에서 환경적 배경이 학습경험에 영향을 준다는 것(ㄱ)과 수행모형에서 결과기대가 수행목표를 통해 성취수준에 영향을 준다는 것(ㄴ)은 SCCT의 핵심 내용이며, 자기효능감은 타고나는 것이 아니라 학습경험을 통해 형성된다."}, {"no": "22-5", "year": 2023, "qno": 5, "text": "긴즈버그(E. Ginzberg)의 직업선택 3단계 중 시험적(tentative) 단계에 관한 설명으로 옳지 않은 것은?", "options": ["① 환상단계에서는 어린이들이 자기가 원하는 것은 무엇이든 다 할 수 있다고 믿는다.", "② 흥미단계에서는 자신의 흥미에 입각해서 직업을 선택하려는 경향이 있다.", "③ 능력단계에서는 직업에 따라 보수와 필요로 하는 교육이 다르다는 것을 알게 된다.", "④ 가치단계에서는 직업선택을 할 때 관련된 모든 요인들을 인정하고 자신의 가치관 및 생애 목표에 비추어 평가해 본다.", "⑤ 전환단계에서는 주관적인 요소에서 현실적인 외적 요소로 관심을 돌리기 시작한다."], "answer": 0, "expl": "환상단계는 긴즈버그의 첫 단계인 환상기에 해당하며 시험적(잠정)단계의 하위단계가 아니므로, 시험적 단계에 대한 설명으로는 옳지 않다."}, {"no": "22-6", "year": 2023, "qno": 6, "text": "다음 슈퍼(D. Super)의 진로발달 이론과 관련된 단계는?\n○ 환상기: 욕구가 지배적이고 욕구탐색이 중심 과제이다.\n○ 흥미기: 좋아하는 것을 활동으로 연결하고 이를 장래희망이라 생각한다.\n○ 능력기: 능력을 더욱 중요시하며 직업에 필요한 여건에 관심을 갖는다.", "options": ["① 성장기", "② 탐색기", "③ 확립기", "④ 유지기", "⑤ 쇠퇴기"], "answer": 0, "expl": "환상기·흥미기·능력기는 슈퍼의 진로발달단계 중 성장기의 하위단계이다."}, {"no": "22-7", "year": 2023, "qno": 7, "text": "갓프레드슨(L. Gottfredson)의 제한ㆍ타협 이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 진로에 대한 발달적 관점과 사회적 관점을 동시에 고려한다.\nㄴ. 제한과 타협단계는 진로포부가 어떻게 축소되고 조정되는지에 초점을 둔다.\nㄷ. 주로 취업가능성과 같은 제한요인에 근거하여 진로선택을 조정하는 과정을 거친다.\nㄹ. 개인발달단계를 힘과 크기, 인지적 역할, 사회적 가치 그리고 외적 고유한 자아 지향성으로 구분한다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "발달·사회적 관점의 동시 고려(ㄱ), 진로포부 축소·조정(ㄴ), 취업가능성 등 제한요인 고려(ㄷ), 개인발달단계 구분(ㄹ) 모두 갓프레드슨 이론의 특징에 해당한다."}, {"no": "22-8", "year": 2023, "qno": 8, "text": "다위스와 롭퀴스트(Dawis & Lofquist)의 직업적응이론에 관한 설명으로 옳은 것은?", "options": ["① 직업적응은 개인의 수동적인 행동으로 부조화를 극복하는 것이다.", "② 반응성(reactiveness)은 개인-환경 간 부조화가 발생할 때, 대처반응을 하기 전에 부조화를 견딜 수 있는 정도이다.", "③ 유연성(flexibility)은 개인-환경 간 부조화가 심할 때, 자신의 직업성격을 변화시켜 대처하는 방식이다.", "④ 직업적응은 개인의 심리내적 욕구와 적성이 조화를 이루려고 하는 역동적인 과정이다.", "⑤ 직업적응에서 개인적 만족(satisfaction)과 환경적 충족(satisfactoriness)은 중요하다."], "answer": 4, "expl": "직업적응이론에서 개인의 만족과 환경의 요구 충족은 직업적응의 핵심 지표로 중요하게 다뤄진다."}, {"no": "22-9", "year": 2023, "qno": 9, "text": "윌리엄스(D. Williams)의 진로전환 증진요인으로 옳은 것을 모두 고른 것은?\nㄱ. 경제적 안정 ㄴ. 피로감 ㄷ. 전환에 대한 지지\nㄹ. 전환기술 습득 ㅁ. 불충분한 자원", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄱ, ㄷ, ㄹ, ㅁ", "⑤ ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 2, "expl": "경제적 안정, 전환에 대한 지지, 전환기술 습득은 진로전환을 촉진하는 요인이며, 피로감과 불충분한 자원은 오히려 전환을 저해하는 요인이다."}, {"no": "22-10", "year": 2023, "qno": 10, "text": "타이드만과 오하라(Tiedeman & O'Hara)의 진로의사결정이론에 관한 설명으로 옳은 것은?\n○ 자신의 가치관이나 삶의 목적에 비추어 대안을 선택하여 나아갈 준비를 한다.\n○ 불만족하면 다시 탐색하여 적합한 선택을 서열화하거나 조직화하여 새로운 대안을 마련한다.", "options": ["① 선택 단계", "② 구체화 단계", "③ 명료화 단계", "④ 적응 단계", "⑤ 통합 단계"], "answer": 1, "expl": "가치관에 비추어 대안을 검토하고 여러 대안을 서열화·조직화하는 것은 예상기의 구체화 단계에 해당한다."}, {"no": "22-11", "year": 2023, "qno": 11, "text": "피터슨, 샘슨과 리어든(Peterson, Sampson & Reardon)의 인지정보처리이론의 기본 가정에 관한 설명으로 옳지 않은 것은?", "options": ["① 진로선택은 인지와 환경 간의 상호작용 결과이다.", "② 진로문제의 해결은 고도의 기억력을 필요로 하는 과제이다.", "③ 진로발달은 지식 구조의 계속적인 성장과 변화를 내포한다.", "④ 진로정체감은 자기인식에 달려있다.", "⑤ 진로성숙도는 진로문제를 해결하는 개인의 능력과 관련된다."], "answer": 1, "expl": "인지정보처리이론에서 진로문제 해결은 단순 기억력이 아니라 정보처리 기술(문제해결력)을 필요로 하는 과제로 본다."}, {"no": "22-12", "year": 2023, "qno": 12, "text": "크롬볼츠(J. Krumboltz)의 사회학습 진로이론에 관한 설명으로 옳지 않은 것은?", "options": ["① 진로개발과정에서 우연(happenstance)이 중요한 영향을 준다.", "② 개인은 어떤 과제를 성취하기 위하여 과제접근 기술을 사용한다.", "③ 학습경험은 도구적 학습과 연합적 학습을 통하여 이루어진다.", "④ 환경과의 상호작용을 통해 무엇을 학습했는가를 중요시한다.", "⑤ 유전적 요인은 진로선택과 발달에서 중요하지 않다."], "answer": 4, "expl": "크롬볼츠 이론에서 유전적 요인과 특별한 능력도 진로선택에 영향을 주는 중요한 요인 중 하나로 다루어진다."}, {"no": "22-13", "year": 2023, "qno": 13, "text": "사비카스(M. Savickas)의 진로적응도에 관한 설명으로 옳은 것은?", "options": ["① 변화하는 직업세계에서 진로적응도를 높이기 위해서는 흥미와 적성이 중요한 구성요소이다.", "② 진로적응도 차원을 알아보는 질문은 과거의 경험을 중요시한다.", "③ 진로문제를 결정, 미결정, 우유부단으로 나누었다.", "④ 진로적응도의 자원과 전략에 따라서 관심, 통제, 호기심, 자신감의 차원으로 제시하였다.", "⑤ 진로적응도 차원에서 개입은 문제를 극복하기 위한 원인이 무엇인지 분석하는 것이다."], "answer": 3, "expl": "사비카스는 진로적응도를 관심(concern), 통제(control), 호기심(curiosity), 자신감(confidence)의 네 차원으로 제시하였다."}, {"no": "22-14", "year": 2023, "qno": 14, "text": "여성 진로상담에 관한 설명으로 옳은 것은?", "options": ["① 경력단절 가능성이 크므로 장기적인 진로설계는 고려하지 않는다.", "② 내담자의 성역할 고정관념이 진로발달에 미치는 영향을 확인한다.", "③ 고학력 여성은 경력단절 문제, 다중역할갈등으로부터 자유롭다.", "④ 성불평등적 요소는 개인이 변화시키기 어려우므로 상담에서 다루는 것은 효과적이지 않다.", "⑤ '슈퍼우먼증후군' 여성 내담자는 혼자서 잘하고 있기 때문에 상담에서 다루지 않는다."], "answer": 1, "expl": "여성 진로상담에서는 성역할 고정관념이 내담자의 진로발달에 미치는 영향을 확인하고 다루는 것이 중요하다."}, {"no": "22-15", "year": 2023, "qno": 15, "text": "다음 사례와 관련된 진로상담의 과정은?\n○ 상담자: 상담에서 어떤 변화를 기대하시나요?\n○ 내담자: 글쎄요. 전 정말 무엇을 해야 할지 모르겠어요. 그래도 상담을 받으면 제가 할 수 있는 무언가를 찾게 될 거라고 친구가 추천해서 일단 와봤어요.\n○ 상담자: 네... 상담에서 뭔가 찾을 수 있을 거라 기대하고 오셨군요. 상담에서 스스로에 대해 탐색해 보고, 관심 분야에 대한 방향 설정을 시도해 본다면 자신에게 맞는 진로를 찾을 수 있어요. 물론 이런 작업에는 스스로의 노력과 시간이 필요하죠. 준비가 되었을까요?", "options": ["① 문제 유형 평가", "② 상담목표 및 과제 설정", "③ 문제 해결을 위한 개입", "④ 반복적 학습 및 종결 준비", "⑤ 추수지도"], "answer": 1, "expl": "상담을 통해 기대하는 변화와 앞으로의 작업 방향에 대해 합의해가는 과정은 상담목표 및 과제 설정 단계에 해당한다."}, {"no": "22-16", "year": 2023, "qno": 16, "text": "진로가계도(Career Genogram)를 활용한 상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 진로가계도는 생애진로사정에서 활용 가능하다.", "② 가족구성원 간의 관계가 진로에 미치는 영향을 확인할 수 있다.", "③ 진로가계도를 그린 후, 가계도 분석을 실시한다.", "④ 진로가계도는 가족 맥락에 대한 정보를 제공하는 표준화된 평가 도구이다.", "⑤ 부모의 직업과 일하는 모습에 대해 내담자가 갖고 있는 생각과 태도를 탐색할 수 있다."], "answer": 3, "expl": "진로가계도는 표준화된 검사가 아니라 가족 맥락을 탐색하는 비표준화된 질적 평가 도구이다."}, {"no": "22-17", "year": 2023, "qno": 17, "text": "생애진로사정(Life Career Assessment)에 관한 설명으로 옳지 않은 것은?", "options": ["① 내담자와 환경과의 관계를 이해하는 데 유용하다.", "② 융(C. Jung)의 분석심리학에 기초하여 만든 기법이다.", "③ 내담자의 정보 수집 단계에서 사용할 수 있는 구조화된 면접기법이다.", "④ 진로사정, 일상적인 하루, 강점과 장애, 요약 등으로 구성된다.", "⑤ 내담자의 진로계획을 세우는데 효과적이다."], "answer": 1, "expl": "생애진로사정은 융의 분석심리학이 아니라 아들러의 개인심리학에 기초한 구조화된 면접기법이다."}, {"no": "22-18", "year": 2023, "qno": 18, "text": "진로상담에서 사용하는 검사에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 스트롱 직업흥미 검사(SII): 홀랜드 유형(RIASEC)을 사용하여 결과를 제시한다.\nㄴ. 진로사고검사(CTI): 하위척도는 외적갈등, 미결정성, 우유부단성이다.\nㄷ. 미네소타 직업가치 검사(MIQ): 직업적응이론에 근거하여 개발되었다.\nㄹ. 미네소타 직무충족 설문지(MSS): 근로자에 대한 조직의 만족도를 측정한다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "SII의 RIASEC 결과제시(ㄱ), MIQ의 직업적응이론 기반(ㄷ), MSS의 조직 만족도 측정(ㄹ)은 옳지만, CTI의 하위척도는 의사결정혼란·수행불안·외적갈등이라 '미결정성·우유부단성'이라는 표현은 옳지 않다."}, {"no": "22-19", "year": 2023, "qno": 19, "text": "다음 내용이 설명하는 진로상담 검사는?\n○ 중ㆍ고등학생을 대상으로 한다.\n○ 직업과 관련한 능력을 점검할 수 있는 도구이다.\n○ 언어나 수리 능력뿐만 아니라 창의력, 대인관계능력, 자연친화력 등 다양한 능력을 하위영역으로 포함한다.", "options": ["① 워크넷 직업가치관검사", "② 커리어넷 직업적성검사", "③ 커리어넷 이공계전공적합도검사", "④ 커리어넷 주요능력효능감검사", "⑤ 워크넷 영업직무 기본역량검사"], "answer": 1, "expl": "언어·수리뿐 아니라 창의력, 대인관계능력, 자연친화력 등 다양한 능력을 점검하는 중고생 대상 검사는 커리어넷 직업적성검사이다."}, {"no": "22-20", "year": 2023, "qno": 20, "text": "진로정보에 관한 설명으로 옳지 않은 것은?", "options": ["① 일과 관련한 교육적, 직업적, 심리사회적 정보를 의미한다.", "② 직업에 대한 이해를 향상시킴으로써 합리적인 의사결정과정을 돕는다.", "③ 읽기와 이해 수준이 낮은 내담자라도 출판 자료를 중심으로 진로정보를 제공하는 것이 효과적이다.", "④ 자원봉사, 직업체험, 인턴십 활동 등과 같이 직접적인 경험에 의해 수집한 자료도 포함된다.", "⑤ 직업정보뿐만 아니라 내담자 이해와 관련한 다양한 정보를 포함한다."], "answer": 2, "expl": "읽기 이해 수준이 낮은 내담자에게는 출판 자료보다 시청각 자료를 활용하는 것이 더 효과적이므로 이 설명은 옳지 않다."}, {"no": "22-21", "year": 2023, "qno": 21, "text": "진로집단상담에 관한 설명으로 옳은 것은?", "options": ["① 집단의 응집력이 중요하지 않다.", "② 개방집단이 폐쇄집단보다 집단의 안정성이 높다.", "③ 진로집단상담자는 상담이론에 대한 지식을 갖출 필요가 없다.", "④ 주제가 명확하기 때문에 집단상담 중기에 상담의 목표와 방향성을 정한다.", "⑤ 집단원 간의 정보교환과 모방이 상담 성과로 이어질 수 있다."], "answer": 4, "expl": "진로집단상담에서 집단원 간의 정보교환과 서로의 모습을 보며 배우는 모방행동은 상담 성과로 이어질 수 있는 치료적 요인이다."}, {"no": "22-22", "year": 2023, "qno": 22, "text": "장애인 진로상담에서 고려할 내용을 모두 고른 것은?\nㄱ. 고용상의 차별이 있는지 알아본다.\nㄴ. 직업능력개발 및 적응 훈련 기회가 제한적일 수 있다.\nㄷ. 장애인 고용이 일부 직종에 편중되는 경향이 있다.\nㄹ. 장애인 진로상담을 위한 인프라 구축 시, 찾아가는 상담 또한 필요하다.", "options": ["① ㄱ, ㄷ", "② ㄴ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "고용차별 확인, 제한적 훈련기회, 직종 편중 경향, 찾아가는 상담의 필요성 모두 장애인 진로상담에서 고려해야 할 내용이다."}, {"no": "22-23", "year": 2023, "qno": 23, "text": "다문화 진로상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 다문화에 대한 사회인식을 고려한다.", "② 다문화에 대한 상담자의 지식과 인식이 상담에 영향을 미칠 수 있다.", "③ 내담자의 문화에 대한 일반적인 생각을 이해하는 것이 도움이 된다.", "④ 내담자가 상담자의 문화를 따르도록 만든다.", "⑤ 내담자의 문화적 특성을 고려하여 기존의 상담이론과 기법을 섣불리 적용하지 않도록 유의한다."], "answer": 3, "expl": "다문화 진로상담에서 내담자에게 상담자의 문화를 강요하는 것은 다문화 상담의 원칙에 어긋나므로 옳지 않다."}, {"no": "22-24", "year": 2023, "qno": 24, "text": "진학상담에 관한 설명 중 옳은 것을 모두 고른 것은?\nㄱ. 내담자가 상급학교에 입학하여 학문적 성취와 직업적 기능을 고양할 수 있도록 돕는 활동이다.\nㄴ. 진로진학상담교사는 단위학교의 진로진학 업무와 함께 학생 및 학부모 대상 진로진학 상담 및 교육을 담당한다.\nㄷ. 진학은 고등학교 입학에서 대학 진학까지를 의미한다.\nㄹ. 최근 학교 교육과정이 다변화하고 고교 및 대학 입학의 의사결정 시기가 빨라지면서 진학상담이 더욱 강조되는 추세이다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "진학상담의 목적(ㄱ), 진로진학상담교사의 역할(ㄴ), 다변화된 교육과정 속 진학상담의 강조(ㄹ)는 옳지만, 진학은 고교 입학에 국한되지 않고 다양한 상급학교 진학을 포괄하므로 ㄷ은 옳지 않다."}, {"no": "22-25", "year": 2023, "qno": 25, "text": "진로상담 과정에서 나타나는 저항에 관한 설명으로 옳은 것은?", "options": ["① 상담자도 상담 장면에서 다양한 형태의 저항행동을 보일 수 있다.", "② 진로상담 중에 내담자의 저항이 나타나면 즉시 다른 심리상담 전문가에게 의뢰한다.", "③ 내담자의 저항에 일일이 반응하면 진로상담 진행이 느려지기 때문에 저항을 다루지 않는다.", "④ 내담자가 자신의 선택과 책임을 미루는 것은 타고난 우유부단함 때문이므로 저항을 고려할 필요가 없다.", "⑤ 진로상담은 진로에 한정시켜 상담을 진행하기 때문에 내담자의 저항이 나타나지 않는다."], "answer": 0, "expl": "저항은 내담자뿐 아니라 상담자에게서도 다양한 형태로 나타날 수 있는 상담과정의 자연스러운 현상이다."}, {"no": "21-1", "year": 2022, "qno": 1, "text": "청소년 진로상담의 목표로 옳지 않은 것은?", "options": ["① 일과 직업세계의 이해 증진", "② 정보탐색 및 활용능력의 증진", "③ 일과 직업에 대한 올바른 가치관 및 태도 형성", "④ 직업전환 탐색", "⑤ 합리적인 의사결정능력의 증진"], "answer": 3, "expl": "직업전환 탐색은 재직자·경력전환자를 위한 진로상담의 목표에 가까우며, 청소년 진로상담의 일반적 목표로는 옳지 않다."}, {"no": "21-2", "year": 2022, "qno": 2, "text": "진로상담이론과 주요 개념의 연결이 옳은 것을 모두 고른 것은?\nㄱ. 수퍼(D. Super)의 생애진로발달이론: 자기개념\nㄴ. 사비카스(M. Savickas)의 구성주의 이론: 진로적응도\nㄷ. 베츠(N. Betz)와 해켓(G. Hackett)의 사회인지이론: 자기효능감\nㄹ. 하렌(V. Harren)의 진로의사결정이론: 진로전환", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "수퍼-자기개념, 사비카스-진로적응도, 베츠와 해켓-자기효능감의 연결은 옳으나, 하렌의 진로의사결정이론은 의사결정 유형(합리적·직관적·의존적)을 다루며 '진로전환'과의 연결은 옳지 않다."}, {"no": "21-3", "year": 2022, "qno": 3, "text": "홀랜드(J. Holland) 성격이론의 핵심개념에 관한 설명으로 옳지 않은 것은?", "options": ["① 일관성: 성격유형과 환경모형 간의 관련 정도를 의미한다.", "② 변별성: 유형간의 상대적 중요도의 관계를 의미한다.", "③ 정체성: 환경적 정체성은 환경이나 조직이 분명하고 통합된 목표, 일, 보상이 일관되게 주어질 때 생긴다.", "④ 계측성: 육각형 내에서 유형들 간의 거리는 그들의 이론적 관계에 반비례한다.", "⑤ 일치성: 육각형모형에서 흥미유형 또는 직업 환경 간의 거리는 그들의 이론적 관계와 비례한다."], "answer": 4, "expl": "육각형 모형에서 유형(환경) 간 거리와 이론적 유사성의 관계를 다루는 것은 계측성(calculus)의 정의이며, 일치성은 개인과 환경 유형 간의 부합 정도를 뜻하므로 이 설명은 옳지 않다."}, {"no": "21-4", "year": 2022, "qno": 4, "text": "로(A. Roe)의 욕구이론에 관한 설명으로 옳지 않은 것은?", "options": ["① 매슬로우(A. Maslow) 이론의 영향을 받았다.", "② 서비스직, 비즈니스직, 단체직, 기술직 등을 포함하여 흥미에 기초한 6가지 직업군을 제안하였다.", "③ 성격과 직업분류를 통합하였다.", "④ 아동기의 경험 중 부모-자녀 관계는 직업선택에 중요한 영향을 미치는 요인으로 간주하였다.", "⑤ 부모와 자녀 간의 상호작용은 정서집중형, 회피형, 수용형으로 구분하였다."], "answer": 1, "expl": "로의 욕구이론은 흥미에 기초하여 8가지 직업군(서비스직, 비즈니스직, 단체직, 기술직, 옥외활동직, 과학직, 예능직, 일반문화직)을 제안하였으므로 6가지라는 설명은 옳지 않다."}, {"no": "21-5", "year": 2022, "qno": 5, "text": "다음 반두라(A. Bandura)의 사회학습이론에서 설명하는 개념은?\n○ 어떤 정해진 수행을 해내기 위해 필요한 행동을 조직화하고 실행해 낼 수 있는 자신의 능력에 대한 개인의 판단으로 정의된다.\n○ 개인의 이전 수행 성취도, 타인 관찰을 통한 대리 경험, 언어적 설득, 생리적 반응에 기인한다.", "options": ["① 자기조절", "② 자기효능감", "③ 자기개념", "④ 자기발달", "⑤ 자기진로적응"], "answer": 1, "expl": "특정 수행을 조직화하고 실행할 수 있다는 자신의 능력에 대한 판단은 자기효능감의 정의이다."}, {"no": "21-6", "year": 2022, "qno": 6, "text": "윌리암슨(E. Williamson)의 진로상담 과정에서 예측단계에 관한 설명으로 옳은 것은?", "options": ["① 태도, 흥미, 가족배경, 지식, 학교 성적 등에 대한 세부적인 자료들을 수집한다.", "② 내담자의 독특성 또는 개별성을 탐지하기 위하여 사례연구나 검사결과에 의해서 자료를 수집하고 요약한다.", "③ 내담자의 특성과 문제를 분류하고, 교육적ㆍ직업적 능력과 특성을 비교하여 문제의 원인을 찾아낸다.", "④ 조정가능성 및 문제의 가능한 결과를 판단하고, 이를 통해 내담자가 고려해야 할 대안적 조치들과 조정사항들을 찾는다.", "⑤ 새로운 문제가 발생되었을 때 내담자가 바람직한 행동계획을 수행할 수 있도록 돕는다."], "answer": 3, "expl": "조정가능성과 문제의 가능한 결과를 판단하여 대안적 조치를 찾는 것은 예측(prognosis)단계의 과업이다."}, {"no": "21-7", "year": 2022, "qno": 7, "text": "수퍼(D. Super)의 생애진로발달이론에서 보유(holding), 갱신(updating), 혁신(innovating) 발달과업을 수행하는 단계는?", "options": ["① 성장기(growth stage)", "② 탐색기(exploration stage)", "③ 확립기(establishment stage)", "④ 유지기(maintenance stage)", "⑤ 쇠퇴기(disengagement stage)"], "answer": 3, "expl": "이미 습득한 것을 유지·갱신·혁신하는 발달과업은 유지기의 특징이다."}, {"no": "21-8", "year": 2022, "qno": 8, "text": "갓프레드슨(L. Gottfredson)의 제한ㆍ타협이론에서 다음이 설명하고 있는 진로포부 발달 단계는?\n○ 자신에 대한 특성을 토대로 선택 가능한 다양한 직업들 가운데 수용 가능한 직업을 고른다.\n○ 현재 자신이 지각하고 있는 자기개념과 잘 어울리는 직업을 탐색한다.", "options": ["① 규모와 힘 지향 단계", "② 성역할 지향 단계", "③ 사회적 가치 지향 단계", "④ 내적이며 고유한 자기 경향 단계", "⑤ 자기조절 단계"], "answer": 3, "expl": "자기개념에 부합하는 직업을 탐색하며 수용 가능한 직업을 선택하는 단계는 내적이며 고유한 자기 지향 단계(4단계)이다."}, {"no": "21-9", "year": 2022, "qno": 9, "text": "미러바일(R. Mirabile)의 퇴직자를 위한 카운슬링모델에서 다음이 설명하는 단계는?\n○ 퇴직자가 퇴직의 충격에서 벗어나 본격적인 구직활동에 집중한다.\n○ 퇴직자의 강점과 약점, 경력 유형, 동기부여 요인에 초점을 두며 검사를 진행한다.", "options": ["① 1단계 - 평안(comfort)", "② 1단계 - 방향(direction)", "③ 2단계 - 성찰(reflection)", "④ 2단계 - 명확화(clarification)", "⑤ 3단계 - 관점 전환(perspective shift)"], "answer": 0, "expl": "충격에서 벗어나 구직활동에 집중하도록 안정을 찾고 강점·약점 등을 검사하는 것은 1단계 평안(comfort)에 해당한다."}, {"no": "21-10", "year": 2022, "qno": 10, "text": "직업적응이론에서 다위스(R. Dawis)와 롭퀴스트(L. Lofquist)가 제안한 미네소타 중요도 질문의 가치요인에 해당하지 않는 것은?", "options": ["① 성취", "② 욕구", "③ 지위", "④ 안정", "⑤ 이타성"], "answer": 1, "expl": "미네소타 중요도 질문지(MIQ)의 6가지 가치요인은 성취, 편안함, 지위, 이타심, 안전, 자율성이며 '욕구'는 이에 해당하지 않는다."}, {"no": "21-11", "year": 2022, "qno": 11, "text": "사비카스(M. Savickas)는 진로적응도가 발휘되는 장면에 필요한 자원과 전략을 네 가지 차원으로 구분하였다. 적응 차원과 개입 질문의 연결이 옳은 것을 모두 고른 것은?\nㄱ. 관심(concern): 누가 내 미래의 주인인가?\nㄴ. 통제(control): 미래가 있는가?\nㄷ. 호기심(curiosity): 미래에 대해 원하는 것이 무엇인가?\nㄹ. 자신감(confidence): 할 수 있을까?", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "관심은 '미래가 있는가?', 통제는 '누가 내 미래의 주인인가?'에 해당하여 ㄱ, ㄴ은 서로 뒤바뀌었으며, 호기심과 자신감의 질문 연결(ㄷ, ㄹ)만 옳다."}, {"no": "21-12", "year": 2022, "qno": 12, "text": "미첼 등(T. Mitchell et al.)이 제시한 우연이론의 과제접근 기술에 해당하지 않는 것은?", "options": ["① 객관성", "② 호기심", "③ 유연성", "④ 낙관성", "⑤ 위험감수성"], "answer": 0, "expl": "계획된 우연이론의 5가지 기술은 호기심, 인내심, 융통성(유연성), 낙관성, 위험감수이며 '객관성'은 이에 해당하지 않는다."}, {"no": "21-13", "year": 2022, "qno": 13, "text": "사회인지 진로이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 여성이나 소수자의 진로발달 및 선택을 강조하는 진로장벽 개념을 강조하였다.\nㄴ. 자기효능감, 결과기대, 개인적 목표 등의 인지요인을 강조하였다.\nㄷ. 진로행동모형에는 진로의사결정모형, 흥미발달모형, 선택모형, 수행모형이 있다.\nㄹ. 어떤 것을 성취했을 때 얻을 수 있는 것에 대한 신념이 실제 실행할 행동을 결정한다.\nㅁ. 사회는 사회적 역할을 통해 개인의 삶의 과정을 구성한다.", "options": ["① ㄱ, ㄴ, ㄹ", "② ㄱ, ㄷ, ㄹ", "③ ㄴ, ㄷ, ㅁ", "④ ㄱ, ㄴ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 3, "expl": "진로장벽 강조(ㄱ), 인지요인 강조(ㄴ), 진로행동모형(ㄷ), 결과기대의 정의(ㄹ)는 사회인지진로이론의 특징이나, ㅁ은 사회학적 관점에 가까운 설명으로 사회인지진로이론과 거리가 있다."}, {"no": "21-14", "year": 2022, "qno": 14, "text": "다음은 피터슨(G. Peterson), 샘슨(J. Sampson), 리어든(R. Reardon)의 인지적 정보처리 접근 모형이다. ( )에 들어갈 내용으로 옳은 것은?\n초기개입 → ( ㄱ ) → ( ㄴ ) → ( ㄷ ) → 개인학습계획 개발 → 개인학습계획 실행 → 요약반복과 일반화", "options": ["① ㄱ: 예비평가, ㄴ: 문제규정과 원인분석, ㄷ: 목표설정", "② ㄱ: 예비평가, ㄴ: 목표설정, ㄷ: 문제규정과 원인분석", "③ ㄱ: 목표설정, ㄴ: 예비평가, ㄷ: 문제규정과 원인분석", "④ ㄱ: 목표설정, ㄴ: 문제규정과 원인분석, ㄷ: 예비평가", "⑤ ㄱ: 문제규정과 원인분석, ㄴ: 목표설정, ㄷ: 예비평가"], "answer": 0, "expl": "CIP(인지적 정보처리) 접근은 초기개입-예비평가-문제규정과 원인분석-목표설정-개인학습계획 개발-실행-요약반복과 일반화의 순서를 따른다."}, {"no": "21-15", "year": 2022, "qno": 15, "text": "윌리암슨(E. Williamson)의 특성요인 진로상담과정에서 상담자의 주도적인 역할이 요구되는 단계를 모두 고른 것은?\nㄱ. 분석 ㄴ. 종합 ㄷ. 진단\nㄹ. 예측 ㅁ. 상담 ㅂ. 추수지도", "options": ["① ㄱ, ㄴ, ㄷ, ㄹ", "② ㄱ, ㄴ, ㄷ, ㅁ", "③ ㄴ, ㄷ, ㄹ, ㅁ", "④ ㄴ, ㄹ, ㅁ, ㅂ", "⑤ ㄷ, ㄹ, ㅁ, ㅂ"], "answer": 2, "expl": "특성요인 상담에서 진단, 예측, 상담, 추수지도 단계는 상담자의 전문적 판단과 주도가 강조되며, 분석과 종합은 자료수집·요약 위주의 단계이다."}, {"no": "21-16", "year": 2022, "qno": 16, "text": "샘슨 등(J. Sampson et al.)이 진로욕구의 성격에 따라 분류한 우유부단형 내담자에게 설정할 수 있는 상담과제로 옳지 않은 것은?", "options": ["① 동기를 개발하는 일", "② 자존감을 회복하는 일", "③ 결정된 진로를 준비하는 일", "④ 가족 갈등을 해소하는 일", "⑤ 자아정체감을 형성시키는 일"], "answer": 2, "expl": "우유부단형 내담자는 아직 진로를 결정하지 못한 상태이므로, '결정된 진로를 준비하는 일'은 우유부단형에게 적합한 상담과제가 아니다."}, {"no": "21-17", "year": 2022, "qno": 17, "text": "상담자가 다음 질문을 적용하는 진로상담기법은?\n○ 가족들이 중요하게 생각하고 있는 것은 무엇인가요?\n○ 부모님의 직업이나 일하시는 모습에 대해 어떤 생각을 해보았나요?", "options": ["① 삶의 장", "② 성공경험", "③ 진로가계도", "④ 진로자서전", "⑤ 커리어-오-그램"], "answer": 2, "expl": "가족의 가치관과 부모의 직업 등을 탐색하는 질문은 진로가계도 기법에서 사용된다."}, {"no": "21-18", "year": 2022, "qno": 18, "text": "진로심리검사에 관한 설명으로 옳지 않은 것은?", "options": ["① 적성분류검사(Differential Aptitude Test: DAT)는 일반적성검사와 특수적성검사가 있다.", "② 진로발달검사(Career Development Inventory: CDI)는 학교적응, 전공선택, 직업선택을 측정한다.", "③ 진로의사결정수준검사(Assessment of Career Decision Making: ACDM)는 합리적, 직관적, 의존적 유형을 측정한다.", "④ 진로성숙도검사(Career Maturity Inventory: CMI)는 진로계획 태도와 능력을 측정한다.", "⑤ 스트롱 흥미검사(Strong Interest Inventory: SII)는 좋아함-무관심-싫어함 정도를 파악하여 직업군에 대한 흥미 형태를 결정한다."], "answer": 1, "expl": "진로발달검사(CDI)는 진로계획, 진로탐색, 의사결정, 직업세계에 대한 정보 등 진로발달 수준을 측정하는 검사로, '학교적응·전공선택·직업선택'을 직접 측정한다는 설명은 옳지 않다."}, {"no": "21-19", "year": 2022, "qno": 19, "text": "다음이 설명하는 검사도구 신뢰도의 추정방법은?\n연구자가 동질적인 두 개의 검사를 제작하여 실시한 후, 두 검사점수 간의 상관계수를 구하는 방법이다.", "options": ["① 동형검사신뢰도", "② 반분신뢰도", "③ 문항내적합치도", "④ 재검사신뢰도", "⑤ 구성신뢰도"], "answer": 0, "expl": "동질적인 두 개의 검사를 제작해 그 점수 간 상관을 구하는 방법은 동형검사신뢰도이다."}, {"no": "21-20", "year": 2022, "qno": 20, "text": "진로정보의 평가 기준으로 옳은 것을 모두 고른 것은?\nㄱ. 정보의 시기 ㄴ. 제공된 장소 ㄷ. 정보의 출처\nㄹ. 정보의 목적 ㅁ. 정보의 수집방법", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ, ㄹ", "③ ㄷ, ㄹ, ㅁ", "④ ㄱ, ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 4, "expl": "정보의 시기, 출처, 목적, 수집방법과 함께 제공된 장소도 진로정보 평가 기준에 포함되어 ㄱ~ㅁ 모두 해당한다."}, {"no": "21-21", "year": 2022, "qno": 21, "text": "청소년이 학교 내외에서 교과와 비교과 활동에 따른 성취과정을 중심으로 한 포트폴리오 유형은?", "options": ["① 연구 포트폴리오", "② 교수 포트폴리오", "③ 진로 포트폴리오", "④ 취업 포트폴리오", "⑤ 학습 포트폴리오"], "answer": 4, "expl": "교과·비교과 활동에 따른 성취과정을 담는 포트폴리오는 학습 포트폴리오에 해당한다."}, {"no": "21-22", "year": 2022, "qno": 22, "text": "다음 사례에서 상담자가 설정한 개입은?\n내담자: 저는 직업을 갖고 싶은데, 대학을 졸업하지 않은 사람은 아무리 노력해도 취업이 안 된다고 들었습니다.\n상담자: 당신은 대학을 졸업하지 않으면 취업이 안 될까봐 걱정하시는군요. 대학을 졸업하지 않은 사람들이 취업한 통계를 봅시다.", "options": ["① 주지화", "② 자기개방", "③ 유도된 상상", "④ 논리적 분석", "⑤ 역설적 기법"], "answer": 3, "expl": "내담자의 비합리적 신념을 실제 통계자료를 통해 검토하고 논박하는 방식은 논리적 분석 개입에 해당한다."}, {"no": "21-23", "year": 2022, "qno": 23, "text": "청소년 집단진로상담의 특징으로 옳은 것을 모두 고른 것은?\nㄱ. 자기이해의 기회가 되며 자신의 직업적 적합성을 객관적으로 이해할 수 있다.\nㄴ. 학생들이 공통적으로 필요로 하는 직업정보를 효율적으로 제공할 수 있는 기회가 된다.\nㄷ. 직업계획의 중요성과 직업세계에 대한 전반적인 오리엔테이션의 기회가 된다.\nㄹ. 집단상담 중 개인상담이 필요한 학생을 찾아내는 기회가 된다.", "options": ["① ㄱ, ㄷ", "② ㄱ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "자기이해, 공통 직업정보 제공, 직업세계 오리엔테이션, 개인상담 필요자 발굴은 모두 집단진로상담의 장점으로 ㄱ~ㄹ 모두 해당한다."}, {"no": "21-24", "year": 2022, "qno": 24, "text": "사이버 진로상담의 장점에 해당하는 것을 모두 고른 것은?\nㄱ. 시ㆍ공간 제약의 초월\nㄴ. 문제 외재화(externalization)의 용이성\nㄷ. 영구적인 기록 가능\nㄹ. 수퍼비전과 자문의 용이성", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "시공간 제약 초월, 문제 외재화 용이, 기록 보존, 수퍼비전·자문 용이성은 모두 사이버 상담의 장점으로 널리 제시된다."}, {"no": "21-25", "year": 2022, "qno": 25, "text": "여성 진로상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 성역할 고정관념 내면화 가능성을 알아본다.", "② 직장에서 부딪히는 성불평등적 요소에 대하여 자신의 의견을 표현할 수 있도록 돕는다.", "③ '수퍼우먼증후군'을 앓고 있는 여성에 대해 인지적 재구조화를 시도하도록 한다.", "④ 직업탐색 기술을 증진시키고자 할 때는 성불평등적인 요소들을 미리 파악하여 대응할 수 있도록 한다.", "⑤ 경력단절의 가능성을 고려하여 단기적인 진로설계를 격려한다."], "answer": 4, "expl": "경력단절 가능성을 고려할 때는 오히려 장기적 관점의 진로설계가 필요하므로, 단기적 진로설계를 격려한다는 설명은 옳지 않다."}, {"no": "20-1", "year": 2021, "qno": 1, "text": "수퍼(D. Super)의 발달모형에 바탕을 둔 진로상담 과정을 순서대로 옳게 나열한 것은?\nㄱ. 접수면접 ㄴ. 진로발달사정 ㄷ. 상담목표설정\nㄹ. 자료통합과 내러티브 해석 ㅁ. 상담절차와 과정", "options": ["① ㄱ - ㄴ - ㄷ - ㄹ - ㅁ", "② ㄱ - ㄴ - ㄷ - ㅁ - ㄹ", "③ ㄱ - ㄴ - ㄹ - ㄷ - ㅁ", "④ ㄱ - ㄴ - ㅁ - ㄷ - ㄹ", "⑤ ㄱ - ㄷ - ㄴ - ㄹ - ㅁ"], "answer": 2, "expl": "수퍼의 진로상담은 접수면접 후 진로발달사정을 하고, 이를 종합·해석(자료통합과 내러티브 해석)한 뒤 상담목표를 설정하고 상담절차를 진행하는 순서를 따른다."}, {"no": "20-2", "year": 2021, "qno": 2, "text": "진로상담과정에서 발생할 수 있는 저항에 해당하지 않는 것은?", "options": ["① 자신이 바라거나 바라지 않던 통찰에 참여하기", "② 상담자의 상담방법을 이유 없이 비난하기", "③ 책임지기를 두려워하여 진로의사결정을 회피하기", "④ 반복적으로 상담시간에 연락 없이 오지 않기", "⑤ 상담시간에 계속 침묵하기"], "answer": 0, "expl": "통찰에 참여하는 것은 상담과정에 협력하는 태도이며, 저항의 예로 보기 어렵다."}, {"no": "20-3", "year": 2021, "qno": 3, "text": "다문화 진로상담에 관한 내용으로 옳은 것은?", "options": ["① 다문화에 대한 사회인식은 고려사항이 아니다.", "② 내담자가 한국문화를 따르도록 한다.", "③ 내담자의 문화에 대한 일반적인 생각을 알 필요는 없다.", "④ 다문화에 대한 상담자의 지식과 인식은 중요하다.", "⑤ 구성주의 진로상담이론은 다문화 내담자를 이해하는데 도움이 되지 않는다."], "answer": 3, "expl": "다문화 진로상담에서는 상담자가 문화적 다양성에 대한 지식과 민감성을 갖추는 것이 중요하다."}, {"no": "20-4", "year": 2021, "qno": 4, "text": "가이스버스(N. Gysbers)와 무어(E. Moore)가 목표설정을 위하여 사용하는 진로상담 기법은?", "options": ["① 생애진로무지개(Life Career Rainbow)", "② 사다리 기법(Laddering Techniques)", "③ 생애진로사정(Life Career Assessment)", "④ 진로 가계도(Career Genogram)", "⑤ 면담 리드(Interview Leads)"], "answer": 2, "expl": "가이스버스와 무어가 목표설정을 위해 사용한 대표 기법은 생애진로사정(Life Career Assessment)이다."}, {"no": "20-5", "year": 2021, "qno": 5, "text": "고용노동부 워크넷(www.work.go.kr)에서 제공하는 청소년 대상 직업심리검사를 모두 고른 것은?\nㄱ. 청소년 직업흥미검사 ㄴ. 대학전공(학과) 흥미검사 ㄷ. 고등학생 적성검사\nㄹ. 청소년의사결정유형검사 ㅁ. 초등학생 진로인식검사", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄹ, ㅁ", "③ ㄷ, ㄹ, ㅁ", "④ ㄱ, ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㅁ"], "answer": 0, "expl": "워크넷은 청소년 직업흥미검사, 대학전공(학과) 흥미검사, 고등학생 적성검사를 제공하며, 청소년의사결정유형검사와 초등학생 진로인식검사는 워크넷의 공식 제공 검사가 아니다."}, {"no": "20-6", "year": 2021, "qno": 6, "text": "진로성숙도검사(CMI)에 관한 설명으로 옳은 것은?", "options": ["① 크라이츠(J. Crites)의 진로의사결정모형에 근거하여 개발되었다.", "② 진로계획태도와 진로행동을 측정하기 위하여 개발되었다.", "③ 진로행동은 자기평가, 직업정보, 목표선정, 계획, 문제해결을 측정한다.", "④ 진로계획태도는 자아존중감, 책임감, 타협성, 의존성을 측정한다.", "⑤ 한국교육개발원에서 개발한 한국형 진로성숙도 검사는 태도, 능력, 행동 세 가지 측면을 측정한다."], "answer": 4, "expl": "한국교육개발원의 한국형 진로성숙도검사는 태도, 능력, 행동의 세 가지 측면을 측정하도록 개발되었다."}, {"no": "20-7", "year": 2021, "qno": 7, "text": "베츠(N. Betz)와 해켓(G. Hackett)의 이론에서 5가지 진로상담전략으로 옳은 것은?", "options": ["① 자기정체감 점검 및 강화", "② 과정평가의 탐색과 현실성 강화", "③ 환경적 영향의 검토", "④ 진로준비정서의 촉진", "⑤ 진로의사결정 유형 점검"], "answer": 2, "expl": "베츠와 해켓의 사회인지진로이론 기반 상담전략에는 자기효능감에 영향을 미치는 환경적 영향을 검토하는 것이 포함된다."}, {"no": "20-8", "year": 2021, "qno": 8, "text": "구성주의 진로상담 과정과 기법에 관한 설명으로 옳은 것은?", "options": ["① '구성 - 해체 - 재구성 - 협력구성'의 내러티브 방식을 기본으로 한다.", "② 개인의 생활이나 정체성을 변화시키기 위해서는 환경을 변화시켜야 한다.", "③ 진로상담과정에서 진로양식면접을 최소화하고, 표준화된 검사실시와 결과의 해석을 주로 사용한다.", "④ 내담자의 내러티브 이야기 자체는 다른 사람과의 비교를 통하여 얻어진 평균적인 경험이라고 본다.", "⑤ '문제확인 - 주관적 정체성 탐색 - 문제 재정의 - 관점확대 - 정체성 실현을 위한 행동정의 - 추수지도' 단계로 이루어진다."], "answer": 0, "expl": "구성주의 진로상담(사비카스)은 '구성-해체-재구성-협력구성'의 내러티브 방식을 기본 틀로 진행한다."}, {"no": "20-9", "year": 2021, "qno": 9, "text": "다음 중 청소년 진로집단상담에서 고려해야 할 것을 모두 고른 것은?\nㄱ. 사전 요구 조사를 통하여 집단상담 프로그램의 목표를 설정하기\nㄴ. 진로집단상담에 필요한 다양한 자료와 활동을 조사하여 프로그램 만들기\nㄷ. 집단상담 실시에 필요한 공간과 준비물 등 환경적 요소들을 고려하기\nㄹ. 변화 정도를 알아볼 수 있는 방법과 절차 만들기", "options": ["① ㄱ, ㄹ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "요구조사와 목표설정, 자료·프로그램 구성, 환경 고려, 평가방법 마련 모두 청소년 진로집단상담 기획 시 고려해야 할 요소이다."}, {"no": "20-10", "year": 2021, "qno": 10, "text": "청소년 진로상담에서 사용하는 심리검사와 사용목적과의 연결이 옳은 것은?", "options": ["① 수퍼(D. Super)의 CDI - 진로결정유형 측정", "② 홀랜드(J. Holland)의 SDS - 직업적 성격특성 측정", "③ 크럼볼츠(J. Krumboltz)의 CDS - 진로 미결정 선행조건 측정", "④ 다위스(R. Dawis)와 롭퀴스트(L. Lofquist)의 MIQ - 진로문제해결과 진로의사결정에서의 역기능적 사고 측정", "⑤ 피터슨(G. Peterson), 샘슨(J. Sampson) 등의 CTI - 20가지 작업 요구와 가치에 대한 개인의 중요도 측정"], "answer": 1, "expl": "홀랜드의 SDS(자가진단검사)는 개인의 직업적 성격유형(흥미)을 측정하는 검사이다."}, {"no": "20-11", "year": 2021, "qno": 11, "text": "진로상담에서 심리검사를 활용할 때 옳은 것은?", "options": ["① 시간이 오래 걸리더라도 검사는 많이 할수록 좋다.", "② 검사를 선택할 때 검사문항보다 검사지명을 보고 선택한다.", "③ 신뢰도와 타당도가 갖추어진 검사를 선택한다.", "④ 절대적인 정보를 제공하는 검사를 활용한다.", "⑤ 검사결과를 활용할 때에는 강점만 활용하고 약점은 제외한다."], "answer": 2, "expl": "검사 선택 시 가장 중요한 기준은 신뢰도와 타당도가 검증된 검사를 사용하는 것이다."}, {"no": "20-12", "year": 2021, "qno": 12, "text": "다음 사례에 제시된 내담자에 대한 상담자의 개입으로 옳지 않은 것은?\n다미는 다른 친구들이 장래에 하고 싶은 것을 정하여 관련된 방과후 활동을 하는 것을 보면 부러웠다. 자기는 아직 무엇을 해야 할지, 무엇을 원하는지도 모르는 것 같아서 답답하다.", "options": ["① 직업세계에 대한 탐색", "② 자기이해를 위한 탐색", "③ 선택된 진로과정 점검", "④ 진로관련 심리검사 실시", "⑤ 진로관련 의사결정 연습"], "answer": 2, "expl": "다미는 아직 진로를 결정하지 못한 미결정 상태이므로, 이미 선택된 진로과정을 점검하는 개입은 현재 상황에 맞지 않는다."}, {"no": "20-13", "year": 2021, "qno": 13, "text": "다음 사례에 나타난 진로상담 단계는?\n상담자: 우리가 처음 약속한 대로 지금까지 상담을 하면서 다미에게 도움이 되었던 것이 무엇이 있을까?\n내담자: 저에게 많은 일들이 있었어요. 먼저 이렇게 자세히 누구와 내가 하고 싶은 일에 대하여 이야기해본 적이 없었어요...", "options": ["① 상담초기면접", "② 상담관계형성", "③ 상담목표 설정", "④ 상담구조화", "⑤ 상담종결하기"], "answer": 4, "expl": "상담의 성과를 함께 되짚어보고 도움이 되었던 부분을 확인하는 것은 상담종결 단계에서 이루어지는 과업이다."}, {"no": "20-14", "year": 2021, "qno": 14, "text": "수퍼(D. Super)의 생애진로발달이론에서 제안한 진로발달단계 순서로 옳은 것은?\nㄱ. 탐색기 ㄴ. 성장기 ㄷ. 유지기 ㄹ. 확립기 ㅁ. 쇠퇴기", "options": ["① ㄱ - ㄴ - ㄹ - ㄷ - ㅁ", "② ㄱ - ㄹ - ㄷ - ㄴ - ㅁ", "③ ㄴ - ㄱ - ㄹ - ㄷ - ㅁ", "④ ㄴ - ㄷ - ㄱ - ㄹ - ㅁ", "⑤ ㄴ - ㄹ - ㄱ - ㄷ - ㅁ"], "answer": 2, "expl": "수퍼의 진로발달단계는 성장기-탐색기-확립기-유지기-쇠퇴기 순서로 진행된다."}, {"no": "20-15", "year": 2021, "qno": 15, "text": "다음 대화 중 청소년 진로상담의 목표에 관한 진술로 옳지 않은 것은?\nA: \"청소년 진로상담은 자신에 대해 정확하게 이해하는 것이 중요하다고 생각해.\"\nB: \"자신의 특성뿐만 아니라 직업세계에 대해서도 충분히 이해할 수 있으면 좋지.\"\nC: \"아직 청소년이니까 진로정보탐색이나 활용은 필요하지 않아.\"\nD: \"청소년기에도 진로정보탐색은 합리적인 의사결정 능력을 기르는데 필요해.\"\nE: \"올바른 직업관과 태도를 습득하는 것도 중요하지.\"", "options": ["① A", "② B", "③ C", "④ D", "⑤ E"], "answer": 2, "expl": "청소년기에도 진로정보탐색과 활용은 합리적 의사결정능력 함양에 필요한 진로상담 목표이므로, 필요없다는 C의 진술이 옳지 않다."}, {"no": "20-16", "year": 2021, "qno": 16, "text": "청소년을 대상으로 하는 진로상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 진로상담전문가 양성에 중점을 둔다.", "② 상담윤리를 지키며 진행한다.", "③ 내담자의 문제를 내담자의 입장에서 이해한다.", "④ 내담자마다 성격, 적성, 흥미 등이 다름을 고려한다.", "⑤ 내담자의 잠재력을 발견하고 발현될 수 있도록 돕는다."], "answer": 0, "expl": "청소년 진로상담의 목적은 청소년 내담자를 조력하는 것이지, 진로상담전문가를 양성하는 것이 아니다."}, {"no": "20-17", "year": 2021, "qno": 17, "text": "진로상담 이론에 관한 설명으로 옳지 않은 것은?", "options": ["① 다위스(R. Dawis)와 롭퀴스트(L. Lofquist)의 직업적응이론에서 성격은 성격양식과 성격구조로 설명된다.", "② 파슨스(F. Parsons)의 특성ㆍ요인이론은 개인과 직업 특성의 합리적인 연결을 강조한다.", "③ 홀랜드(J. Holland) 이론은 개인이 자신의 특성과 유사한 직업환경을 선호하는 경향이 있다고 보았다.", "④ 사비카스(M. Savickas)의 구성주의 진로이론에서 생애주제란 진로와 관련된 각 개인의 능력, 욕구, 흥미를 의미한다.", "⑤ 로우(A. Roe)의 이론에서 비즈니스직은 다른 사람이 어떤 행동을 하도록 설득하는데 초점을 둔 직업군이다."], "answer": 3, "expl": "사비카스의 생애주제는 개인이 자신의 삶과 진로 경험에 부여하는 의미와 스토리를 뜻하며, 단순히 능력·욕구·흥미를 지칭하는 것이 아니므로 옳지 않다."}, {"no": "20-18", "year": 2021, "qno": 18, "text": "크럼볼츠(J. Krumboltz)의 사회학습이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 학습경험은 도구적 학습과 연합적 학습으로 이루어진다.\nㄴ. 계획한 일이 운명처럼 다가오는 것을 계획된 우연(planned happenstance)이라 한다.\nㄷ. 관찰을 통해 어떤 직업에 대해 호감을 갖는 경험은 도구적 학습에 포함된다.\nㄹ. 호기심, 인내심, 융통성, 낙관성, 위험감수는 우연한 사건을 진로에 유리하게 활용하는 기술이다.\nㅁ. 선천적 능력, 환경 상황과 사건들, 학습경험, 과제접근기술 등은 진로선택에 영향을 미친다.", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄹ, ㅁ", "③ ㄴ, ㄷ, ㄹ", "④ ㄴ, ㄹ, ㅁ", "⑤ ㄷ, ㄹ, ㅁ"], "answer": 1, "expl": "관찰을 통해 호감을 갖는 것은 도구적 학습이 아닌 연합적 학습에 해당하므로 ㄷ은 옳지 않고, 학습경험 구분(ㄱ), 우연 활용 기술(ㄹ), 진로선택 영향요인(ㅁ)이 옳다."}, {"no": "20-19", "year": 2021, "qno": 19, "text": "다음이 설명하는 갓프레드슨(L. Gottfredson)의 진로포부 발달단계는?\n○ 남여 성역할 차이에 대해 인식하면서 고정관념을 형성하게 된다.\n○ 자기개념과 불일치하는 성별 관련 직업을 배제하기 시작하고, 수용 가능한 성유형 경계선을 형성한다.", "options": ["① 크기와 힘 지향 단계", "② 외적 자아 확립 단계", "③ 사회적 가치 지향 단계", "④ 성역할 지향 단계", "⑤ 내적 자아 확립 단계"], "answer": 3, "expl": "성역할 고정관념 형성과 성유형에 맞지 않는 직업의 배제는 갓프레드슨 이론의 성역할 지향 단계 특징이다."}, {"no": "20-20", "year": 2021, "qno": 20, "text": "다음 중 하렌(V. Harren)의 진로의사결정유형이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 진로의사결정 단계는 '인식 - 계획 - 확신 - 이행'이다.\nㄴ. 진로의사결정유형은 개인이 진로결정을 내릴 때 선호하는 접근방식이다.\nㄷ. 진로의사결정유형은 '합리적 유형, 직관적 유형, 의존적 유형, 중립적 유형'이다.\nㄹ. 합리적 유형은 의사결정의 기초로 상상과 정서적 자각을 사용한다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "하렌의 진로의사결정유형은 합리적·직관적·의존적 3가지이며(중립적 유형은 없어 ㄷ은 옳지 않음), 상상과 정서적 자각을 기초로 하는 것은 직관적 유형(합리적 유형이 아님)이라 ㄹ도 옳지 않아 ㄱㄴ이 옳다."}, {"no": "20-21", "year": 2021, "qno": 21, "text": "슐로스버그(N. Schlossberg) 등이 제시한 진로전환상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 전환의 개념을 결혼이나 출산과 같은 명백한 삶의 변화로 제한하였다.", "② 진로전환에는 양가적인 특성이 있다.", "③ 개인의 진로전환에 영향을 주는 네 가지 요소(4S)는 자아(Self), 지원(Support), 상황(Situation), 전략(Strategies)이다.", "④ 진로전환의 증진요인으로는 경제적 안정, 정서적 안정, 건강, 전환 기술, 지지적 직업환경, 전환에 대한 지지 등이 있다.", "⑤ 진로전환검사(CTI)는 준비도, 자기효능감(confidence), 지각된 지지, 내외적 통제, 자기중심-관계중심(independence-interdependence)으로 구성된다."], "answer": 0, "expl": "슐로스버그의 전환 개념은 결혼·출산 같은 명백한 사건뿐 아니라 예상하지 못한 사건, 만성적 어려움 등 폭넓은 삶의 변화를 포괄하므로 제한적으로 정의했다는 설명은 옳지 않다."}, {"no": "20-22", "year": 2021, "qno": 22, "text": "다음 중 다위스(R. Dawis)와 롭퀴스트(L. Lofquist)의 직업적응이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 일과 관련된 가치관은 스트롱(strong) 흥미검사로 평가할 수 있다.\nㄴ. 직업적응과 관련된 주요 지표는 만족과 충족이다.\nㄷ. 만족은 직업에서 요구하는 과제와 이를 수행할 수 있는 개인의 능력을 말한다.\nㄹ. 직업적응은 유연성, 적극성, 반응성, 인내와 같은 적응양식이 영향을 미친다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄴ, ㄹ", "⑤ ㄷ, ㄹ"], "answer": 3, "expl": "직업적응이론에서 가치관은 미네소타중요도질문지(MIQ)로 평가하므로 ㄱ은 옳지 않고, 만족은 개인의 욕구충족 정도를 뜻하며 능력-과제 부합은 충족(satisfactoriness)을 의미하므로 ㄷ도 옳지 않아 ㄴㄹ이 옳다."}, {"no": "20-23", "year": 2021, "qno": 23, "text": "다음이 설명하는 사회인지진로이론(SCCT)의 개념으로 옳은 것은?\n○ 어떤 과업을 수행했을 때 자신 또는 타인에게 일어날 일에 대한 믿음을 의미한다.\n○ 내가 이 일을 하면 어떤 상황이 벌어질까에 대한 예측으로, 이 예측에는 물리적 보상, 사회적 평가, 자신에 대한 평가 등 다양한 측면이 포함된다.", "options": ["① 선택모형", "② 결과기대", "③ 자기효능감", "④ 흥미발달모형", "⑤ 개인변인과 환경변인"], "answer": 1, "expl": "특정 행동의 결과로 일어날 일에 대한 믿음과 예측은 사회인지진로이론의 결과기대(outcome expectations) 개념이다."}, {"no": "20-24", "year": 2021, "qno": 24, "text": "다음 이론을 주장한 학자는?\n○ 개인은 분화와 통합을 통해 직업정체감을 형성해 나감\n○ 직업자아정체감은 의사결정을 되풀이하는 과정에서 성숙해짐\n○ 진로의사결정 과정을 예측 4단계(탐색 - 구체화 - 선택 - 명료화)와 실행 3단계(적응 - 개혁 - 통합)로 구분함", "options": ["① 갓프레드슨(L. Gottfredson)", "② 블라우(P. Blau)", "③ 타이드만(D. Tiedeman)과 오하라(R. O'Hara)", "④ 카크런(L. Cochran)", "⑤ 아들러(A. Adler)"], "answer": 2, "expl": "분화와 통합을 통한 직업정체감 형성, 예측·실행 단계 구분은 타이드만과 오하라의 진로의사결정이론의 핵심 내용이다."}, {"no": "20-25", "year": 2021, "qno": 25, "text": "'학자 - 진로상담이론 - 개념'의 연결이 옳지 않은 것은?", "options": ["① 로우(A. Roe) - 욕구이론 - 심리적 욕구구조", "② 윌리암슨(E. Williamson) - 특성․요인이론 - 제한과 타협", "③ 렌트(R. Lent) - 사회인지진로이론 - 자기효능감", "④ 긴즈버그(E. Ginzberg) - 진로발달이론 - 환상기", "⑤ 겔라트(H. Gelatt) - 진로의사결정이론 - 의사결정 순환과정"], "answer": 1, "expl": "제한과 타협 개념은 윌리암슨이 아니라 갓프레드슨의 이론에 해당하므로 연결이 옳지 않다."}];

function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

let currentYear = 'all';

let answeredMap = {};

function selectOption(qIdx, optIdx){
  if(answeredMap[qIdx] !== undefined) return;
  answeredMap[qIdx] = optIdx;
  renderQuestions();
}

function setYear(y){
  currentYear = y;
  renderPills();
  renderQuestions();
}

function renderPills(){
  const years = [...new Set(QUESTIONS.map(q => q.year))].sort((a,b) => b-a);
  const pillsEl = document.getElementById('yearPills');
  let html = `<button class="pill ${currentYear==='all'?'active':''}" onclick="setYear('all')">전체</button>`;
  years.forEach(y => {
    html += `<button class="pill ${currentYear===y?'active':''}" onclick="setYear(${y})">${y}</button>`;
  });
  pillsEl.innerHTML = html;
}

function renderQuestions(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  const list = currentYear === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.year === currentYear);
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const picked = answeredMap[qIdx];
    const isAnswered = picked !== undefined;
    const isVoid = q.answer < 0;
    const isCorrect = isAnswered && !isVoid && picked === q.answer;

    const card = document.createElement('div');
    card.className = 'card';
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt-btn';
      if(isAnswered){
        if(isVoid && i === picked) cls += ' neutral-picked';
        if(!isVoid && i === q.answer) cls += ' correct-reveal';
        if(!isVoid && i === picked && picked !== q.answer) cls += ' wrong-picked';
      }
      const disabled = isAnswered ? 'disabled' : '';
      optsHtml += `<button class="${cls}" ${disabled} onclick="selectOption(${qIdx},${i})">${opt}</button>`;
    });
    const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
    let markHtml = '';
    if(isAnswered){
      if(isVoid){
        markHtml = `<div class="feedback-mark">📌 전항 정답 처리된 문항입니다</div>`;
      } else if(isCorrect){
        markHtml = `<div class="feedback-mark">✅ 정답입니다!</div>`;
      } else {
        markHtml = `<div class="feedback-mark wrong">❌ 오답입니다. 정답은 ${q.answer+1}번입니다.</div>`;
      }
    }
    card.innerHTML = `
      <div class="qnum">문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      <div class="feedback${isAnswered ? ' open' : ''}">
        ${markHtml}
        ${expl}
      </div>
    `;
    area.appendChild(card);
  });
}

function render(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
  renderPills();
  renderQuestions();
}

render();
</script>
</body>
