<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADsP 기출문제</title>
<style>
  :root{
    --bg:#f7f5f0;
    --ink:#232019;
    --sub:#6b6558;
    --line:#dcd6c8;
    --accent:#9a3a2e;
    --accent-soft:#f0dcd4;
    --navy:#1f3352;
    --navy-soft:#dde3ea;
    --card:#fffdf9;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Pretendard","Noto Sans KR",-apple-system,sans-serif;
    line-height:1.62;
  }
  .wrap{max-width:720px; margin:0 auto; padding:44px 22px 120px;}

  h1{font-size:24px; margin:0 0 4px; letter-spacing:-0.02em; font-weight:800; color:var(--navy);}
  .meta{color:var(--sub); font-size:13px; margin-bottom:24px;}

  /* 회차 탭 */
  .round-nav{
    display:flex; gap:1px; background:var(--line); border:1px solid var(--line);
    margin-bottom:26px; border-radius:2px; overflow:hidden;
  }
  .round-nav button{
    flex:1; border:none; padding:11px 6px; background:var(--card);
    color:var(--sub); font-size:13px; font-weight:700; cursor:pointer;
    font-family:inherit; transition:background .12s ease, color .12s ease;
  }
  .round-nav button:hover{background:var(--accent-soft); color:var(--accent);}
  .round-nav button.active{background:var(--navy); color:#fff;}

  .subject-nav-row{
    display:flex; gap:1px; background:var(--line); border:1px solid var(--line);
    margin-bottom:20px; border-radius:2px; overflow:hidden;
  }
  .subject-nav-row button{
    flex:1; border:none; padding:9px 6px; background:var(--card);
    color:var(--sub); font-size:12.5px; font-weight:700; cursor:pointer;
    font-family:inherit; transition:background .12s ease, color .12s ease;
  }
  .subject-nav-row button:hover{background:var(--accent-soft); color:var(--accent);}
  .subject-nav-row button.active{background:var(--accent); color:#fff;}

  /* 진행률 */
  .progress-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .progress-text{font-size:12.5px; color:var(--sub); font-weight:700;}
  .progress-bar{
    flex:1; height:5px; background:var(--line); border-radius:3px; margin:0 12px; overflow:hidden;
  }
  .progress-fill{height:100%; background:var(--navy); transition:width .2s ease;}
  .wrong-toggle{
    font-size:12px; color:var(--accent); background:none; border:1px solid var(--accent);
    border-radius:20px; padding:5px 12px; cursor:pointer; font-family:inherit; font-weight:700;
    white-space:nowrap;
  }
  .wrong-toggle:hover{background:var(--accent-soft);}
  .wrong-toggle.on{background:var(--accent); color:#fff;}

  /* 카드 */
  .qcard{
    background:var(--card); border:1px solid var(--line); border-radius:4px;
    padding:26px 24px; margin-bottom:18px;
  }
  .qnum{
    font-size:12px; color:var(--navy); font-weight:800; letter-spacing:.06em;
    margin-bottom:8px;
  }
  .qtext{font-size:15.5px; font-weight:700; margin-bottom:16px; white-space:pre-line;}
  .qpassage{
    background:var(--bg); border:1px solid var(--line); border-radius:3px;
    padding:12px 14px; font-size:13.5px; color:var(--ink); margin-bottom:16px;
    white-space:pre-line;
  }
  .choices{display:flex; flex-direction:column; gap:8px; margin-bottom:16px;}
  .choice-btn{
    background:var(--bg); border:1px solid var(--line); border-radius:4px;
    padding:11px 14px; text-align:left; cursor:pointer; font-family:inherit;
    font-size:13.5px; color:var(--ink); display:flex; gap:9px; align-items:flex-start;
    transition:all .12s ease;
  }
  .choice-btn:hover:not(:disabled){border-color:var(--navy); background:var(--navy-soft);}
  .choice-btn:disabled{cursor:default;}
  .choice-n{
    font-size:11px; font-weight:800; color:var(--sub); background:var(--line);
    width:20px; height:20px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; flex-shrink:0; margin-top:1px;
  }
  .choice-btn.correct{border-color:var(--navy); background:var(--navy-soft);}
  .choice-btn.correct .choice-n{background:var(--navy); color:#fff;}
  .choice-btn.wrong{border-color:var(--accent); background:var(--accent-soft);}
  .choice-btn.wrong .choice-n{background:var(--accent); color:#fff;}

  .explain{
    display:none; border-radius:4px; padding:13px 15px; font-size:13px;
    line-height:1.6; margin-bottom:6px;
  }
  .explain.show{display:block;}
  .explain.ok{background:var(--navy-soft); color:var(--navy); border:1px solid var(--navy);}
  .explain.ng{background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent);}

  .qfooter{display:flex; justify-content:space-between; align-items:center; margin-top:16px;}
  .status-tag{font-size:12px; color:var(--sub);}
  .nav-btns{display:flex; gap:8px;}
  .nav-btns button{
    border:1px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:4px; padding:9px 18px; font-size:13px; font-weight:700;
    cursor:pointer; font-family:inherit; transition:all .12s ease;
  }
  .nav-btns button:hover:not(:disabled){border-color:var(--navy); color:var(--navy);}
  .nav-btns button:disabled{opacity:.35; cursor:default;}
  .nav-btns button.next{background:var(--navy); color:#fff; border-color:var(--navy);}
  .nav-btns button.next:hover{background:#16263f;}

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--sub); font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">

  <h1>ADsP 기출문제</h1>

  <div class="round-nav" id="roundNav"></div>
  <div class="subject-nav-row" id="subjectNav"></div>

  <div class="progress-row">
    <span class="progress-text" id="progressText">1 / 10</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <button class="wrong-toggle" id="wrongToggle">오답만 보기</button>
  </div>

  <div id="quizArea"></div>

  <div class="qfooter" style="margin-top:4px;">
    <span class="status-tag" id="scoreTag"></span>
  </div>

</div>

const ROUNDS = [44,45,46,47];
let currentRound = 47;
let currentIndex = 0;
let answered = {};   // { round: { idx: chosenIndex } }
let wrongOnly = false;
let currentSubject = 'all'; // 'all' | 1 | 2 | 3

function initAnswered(){
  ROUNDS.forEach(r => { if(!answered[r]) answered[r] = {}; });
}
initAnswered();

function renderRoundNav(){
  const nav = document.getElementById('roundNav');
  nav.innerHTML = '';
  ROUNDS.forEach(r => {
    const btn = document.createElement('button');
    btn.textContent = r + '회';
    if(r === currentRound) btn.classList.add('active');
    btn.onclick = () => {
      currentRound = r;
      currentIndex = 0;
      wrongOnly = false;
      currentSubject = 'all';
      document.getElementById('wrongToggle').classList.remove('on');
      renderAll();
    };
    nav.appendChild(btn);
  });
}

function renderSubjectNav(){
  const nav = document.getElementById('subjectNav');
  nav.innerHTML = '';
  const opts = [
    {key:'all', label:'전체'},
    {key:1, label:'1과목'},
    {key:2, label:'2과목'},
    {key:3, label:'3과목'}
  ];
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.textContent = o.label;
    if(currentSubject === o.key) btn.classList.add('active');
    btn.onclick = () => {
      currentSubject = o.key;
      currentIndex = 0;
      renderSubjectNav();
      renderQuiz();
    };
    nav.appendChild(btn);
  });
}

function subjectOf(qIdx){
  if(qIdx < 10) return 1;
  if(qIdx < 20) return 2;
  return 3;
}

function getActiveList(){
  const all = EXAM_DATA[currentRound] || [];
  let idxs = all.map((q,i)=>i);
  if(currentSubject !== 'all'){
    idxs = idxs.filter(i => subjectOf(i) === currentSubject);
  }
  if(wrongOnly){
    idxs = idxs.filter(i => {
      const a = answered[currentRound][i];
      return a !== undefined && a !== all[i].answer;
    });
  }
  return idxs;
}

function renderQuiz(){
  const area = document.getElementById('quizArea');
  const list = EXAM_DATA[currentRound] || [];

  if(list.length === 0){
    area.innerHTML = '<div class="empty-state">이 회차는 아직 문제 입력 중이야.</div>';
    document.getElementById('progressText').textContent = '0 / 0';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('scoreTag').textContent = '';
    return;
  }

  const activeIdxs = getActiveList();
  if(activeIdxs.length === 0){
    area.innerHTML = '<div class="empty-state">오답이 없어! 🎉</div>';
    document.getElementById('progressText').textContent = '0 / 0';
    document.getElementById('progressFill').style.width = '100%';
    return;
  }

  if(currentIndex >= activeIdxs.length) currentIndex = activeIdxs.length - 1;
  if(currentIndex < 0) currentIndex = 0;

  const realIdx = activeIdxs[currentIndex];
  const q = list[realIdx];
  const chosen = answered[currentRound][realIdx];

  document.getElementById('progressText').textContent = (currentIndex+1) + ' / ' + activeIdxs.length;
  document.getElementById('progressFill').style.width = ((currentIndex+1)/activeIdxs.length*100) + '%';

  let correctCount = 0, answeredCount = 0;
  list.forEach((qq,i) => {
    if(answered[currentRound][i] !== undefined){
      answeredCount++;
      if(answered[currentRound][i] === qq.answer) correctCount++;
    }
  });
  document.getElementById('scoreTag').textContent = answeredCount > 0
    ? `현재까지 ${answeredCount}문항 중 ${correctCount}개 정답`
    : '';

  let html = `<div class="qcard">`;
  html += `<div class="qnum">${currentRound}회 Q${q.qno || (realIdx+1)}</div>`;
  html += `<div class="qtext">${q.q}</div>`;
  if(q.passage) html += `<div class="qpassage">${q.passage}</div>`;
  html += `<div class="choices">`;
  q.choices.forEach((c,i) => {
    let cls = 'choice-btn';
    if(chosen !== undefined){
      if(i === q.answer) cls += ' correct';
      else if(i === chosen) cls += ' wrong';
    }
    html += `<button class="${cls}" ${chosen!==undefined?'disabled':''} onclick="selectChoice(${realIdx},${i})">
      <span class="choice-n">${i+1}</span><span>${c}</span>
    </button>`;
  });
  html += `</div>`;

  if(chosen !== undefined){
    const isCorrect = chosen === q.answer;
    html += `<div class="explain show ${isCorrect?'ok':'ng'}">
      ${isCorrect ? '정답이야. ' : '오답이야. 정답은 ' + (q.answer+1) + '번. '}${q.explain}
    </div>`;
  }

  html += `<div class="qfooter">
    <span class="status-tag">${chosen!==undefined ? (chosen===q.answer?'✓ 맞음':'✗ 틀림') : ''}</span>
    <div class="nav-btns">
      <button ${currentIndex===0?'disabled':''} onclick="prevQuestion()">이전</button>
      <button class="next" ${currentIndex===activeIdxs.length-1?'disabled':''} onclick="nextQuestion()">다음</button>
    </div>
  </div>`;
  html += `</div>`;

  area.innerHTML = html;
}

function subjectLabel(qIdx){
  const s = subjectOf(qIdx);
  return s ? s + '과목' : '';
}

function selectChoice(realIdx, choiceIdx){
  answered[currentRound][realIdx] = choiceIdx;
  renderQuiz();
}

function nextQuestion(){
  currentIndex++;
  renderQuiz();
}
function prevQuestion(){
  currentIndex--;
  renderQuiz();
}

document.getElementById('wrongToggle').onclick = () => {
  wrongOnly = !wrongOnly;
  currentIndex = 0;
  document.getElementById('wrongToggle').classList.toggle('on', wrongOnly);
  renderQuiz();
};

function renderAll(){
  renderRoundNav();
  renderSubjectNav();
  renderQuiz();
}

renderAll();
</script>
</body>
</html>
