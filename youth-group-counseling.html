<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집단상담 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --wrong-bg:#f7e9e7;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .toolbar{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .btn{
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:8px 14px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .btn.active{color:var(--accent-dark);font-weight:600;}
  .progress-bar{
    height:8px;
    border-radius:6px;
    background:var(--shadow-dark);
    overflow:hidden;
    margin-bottom:8px;
    box-shadow:inset 2px 2px 4px var(--shadow-dark);
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{font-size:12px;color:var(--sub);margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{
    padding:3px 0;
    line-height:1.6;
  }
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .opt{
    text-align:left;
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
    transition:background .15s ease;
    white-space:pre-wrap;
  }
  .opt:hover{background:#eef1ee;}
  .opt.correct{background:var(--right-bg);color:var(--accent-dark);font-weight:600;box-shadow:none;}
  .opt.wrong{background:var(--wrong-bg);color:var(--wrong);font-weight:600;box-shadow:none;}
  .opt:disabled{cursor:default;}
  .opt:disabled:hover{background:var(--bg-base);}
  .opt.correct:disabled:hover{background:var(--right-bg);}
  .opt.wrong:disabled:hover{background:var(--wrong-bg);}
  .feedback{
    margin-top:12px;
    font-size:13px;
    font-weight:600;
  }
  .feedback.correct-mark{color:var(--accent-dark);}
  .feedback.wrong-mark{color:var(--wrong);}
  .explain{
    margin-top:8px;
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
  .empty{
    text-align:center;
    color:var(--sub);
    padding:60px 0;
    font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">‹ 목록으로</a>
  <h1>집단상담</h1>
  <div class="meta-line" id="metaLine"></div>
  <div class="toolbar">
    <button class="btn active" id="btn-all" onclick="setMode('all')">전체보기</button>
    <button class="btn" id="btn-wrong" onclick="setMode('wrong')">오답만 보기</button>
    <button class="btn" onclick="resetAll()">초기화</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div id="quizArea"></div>
</div>
<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "학교상담에서 청소년 집단상담 계획서에 포함될 내용이 아닌 것은?", "options": ["① 계획하는 집단구성에 대한 합당한 근거", "② 집단의 명시적 및 묵시적 규범", "③ 집단이 달성하고자 하는 목표", "④ 학교에 제시할 집단상담의 이점에 관한 내용", "⑤ 집단원의 특성, 모임 시간, 전체 길이"], "answer": 1, "expl": "집단계획서에는 구성 근거, 목표, 규범, 집단원 특성·시간·기간 등이 포함되지만, '학교에 제시할 이점'은 계획서의 필수 구성요소라기보다 별도의 설득·홍보 자료에 가깝다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "학교 장면의 집단상담에서 집단상담자의 전문적 자질을 모두 고른 것은?\nㄱ. 아동 및 청소년 대상의 집단상담 발달단계에 대한 적절한 이해\nㄴ. 아동 및 청소년을 진심으로 걱정하고 관심을 가져주는 마음\nㄷ. 다른 문화적 배경을 가진 아동 및 청소년과의 효과적인 작업에 필요한 지식\nㄹ. 아동 및 청소년 대상의 집단상담에 관한 문헌 검토", "options": ["① ㄱ, ㄷ", "② ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "발달단계 이해(ㄱ), 진정한 관심(ㄴ), 다문화 역량(ㄷ), 최신 문헌 검토(ㄹ) 모두 학교 장면 집단상담자에게 필요한 전문적 자질에 해당한다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "청소년 집단상담에서 집단응집력에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단원, 집단상담자, 집단 전체와의 관계를 포함한다.", "② 집단의 과정이 진행되는 동안 매우 유동적이지만 자연스럽게 발달한다.", "③ 집단원들이 집단에 대해 느끼는 매력으로 집단에 남아 있도록 하는 힘이다.", "④ 다른 치료적 요인이 최상의 기능을 하도록 하기 위한 필수적인 선행 조건이다.", "⑤ 응집력이 높을수록 출석, 참여, 상호지지의 비율이 높다."], "answer": 1, "expl": "집단응집력은 시간이 지나며 점차 발전하는 역동적 특성을 가지지만 이를 '매우 유동적'이라고 규정하기보다는 점진적으로 축적·발전되는 특성으로 이해하는 것이 더 정확해 이 설명은 다소 부정확하다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "벡(A. Beck)의 인지치료 집단상담에서 집단상담자의 역할로 옳지 않은 것은?", "options": ["① 상호협력과 적극적인 참여를 강조하는 치료적 관계가 필수적이다.", "② 집단원들이 가설을 만들고 그것을 검증하게 하는 협력적 경험주의 방식을 취한다.", "③ 집단원들이 자동적 사고와 핵심 신념을 지지하거나 반박할 수 있는 증거를 찾아보도록 한다.", "④ 안내된 발견(guided discovery)을 통해 집단원이 생각하고 느끼며 행동하는 방식의 관련성을 알게 한다.", "⑤ 집단원이 극단적인 신념을 내재화했듯이 삶을 바라보는 합리적 신념을 내재화하도록 한다."], "answer": 4, "expl": "인지치료는 집단원이 스스로 극단적 신념 대신 '합리적' 신념을 형성하도록 돕는 것이 목표이며, '극단적 신념을 내재화했듯이'라는 표현 자체가 개입 방향과 맞지 않는다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "게슈탈트 집단상담에서 접촉-경계 장애에 관한 설명으로 옳지 않은 것은?", "options": ["① 반전: 타인에게 표출하기 어려워 거의 감정을 표현하지 않는 집단원에게 쉽게 관찰된다.", "② 투사: 집단상담자나 다른 집단원이 압박을 하고 있다고 주장하는 집단원에게 관찰된다.", "③ 편향: 유머의 남발, 진술이 아닌 질문을 많이 사용하는 집단원에게 쉽게 관찰된다.", "④ 융합: 집단원에 대한 갈등을 표출하고, 부정적 감정을 있는 그대로 표현하는 집단원에게 특징적으로 나타난다.", "⑤ 내사: 집단초기에 집단상담자의 개입이나 역할에 관한 의문을 갖지 않거나 질문을 거의 하지 않는 집단원에게 관찰된다."], "answer": 3, "expl": "융합은 자신과 타인의 경계가 불분명해져 갈등이나 부정적 감정을 표현하지 못하고 억누르는 상태를 의미하며, '갈등을 표출하고 부정적 감정을 있는 그대로 표현'하는 것은 오히려 융합과 반대되는 양상이다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "교류분석 집단상담에서 집단상담자의 역할로 옳지 않은 것은?", "options": ["① 집단원과 집단상담자는 계약적 합의 하에 동등한 지위를 갖는다.", "② 집단원간의 상호작용을 중심으로 자신의 각본과 게임을 탐색하게 한다.", "③ 스트로크에 의한 삶의 각본과 초기 결정을 발견하도록 조력한다.", "④ 집단원이 연출한 게임으로 인해 부정적 감정이 만성화되는 과정을 발견하도록 돕는다.", "⑤ 집단원들이 인생태도와 라켓을 탐색하고 효과적인 관계방식을 실험하도록 한다."], "answer": 1, "expl": "교류분석 집단상담자는 각본·게임 탐색, 초기결정 발견, 인생태도·라켓 탐색 등을 조력하지만, 이는 상담자가 계약을 통해 안내하는 역할이지 무조건 '동등한 지위'라는 표현이 관계의 전문성 측면을 놓칠 수 있어 다른 선택지에 비해 상대적으로 부정확하다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "해결중심 집단상담에서 집단상담자의 '알지 못함' 자세에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 집단원으로 하여금 자신의 삶에 대한 전문가의 위치에 서게 한다.\nㄴ. 진단, 평가, 개입과 관련된 용어를 사용하는 경향이 있다.\nㄷ. 공동 촉진자의 역할을 수행하는 집단원들의 도움을 받을 수 있다.\nㄹ. 자신의 삶에서 얻은 지식, 개념, 경험적 역량을 내려 놓는다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "알지 못함 자세는 상담자가 전문가로서의 지식을 내려놓고(ㄹ) 집단원을 자기 삶의 전문가로 세우며(ㄱ), 집단원 간 공동촉진 역할도 활용할 수 있다(ㄷ)는 특징을 가지며, 진단·평가 용어 사용(ㄴ)은 알지 못함 자세와 반대된다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "얄롬(I. Yalom)의 집단상담에서 '지금-여기' 개입에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 집단원과 집단상담자에 대한 감정이 드러나는 것을 용이하게 해준다.\nㄴ. 집단원들의 축소된 사회를 발전시키고 그것이 드러나도록 한다.\nㄷ. 집단원의 일상생활이나 과거의 사건을 중요하게 다룬다.\nㄹ. 집단에서 무슨 일이 일어나고 있는가를 관찰하고 다룬다.", "options": ["① ㄱ, ㄹ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "지금-여기 개입은 감정 표현 촉진(ㄱ), 집단 내 축소사회 발전(ㄴ), 집단 내 과정 관찰(ㄹ)에 초점을 두며, 일상생활이나 과거사건(ㄷ)을 중요하게 다루는 것은 지금-여기 개입과는 결이 다르다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "코리(G. Corey)의 집단상담 초기단계에서 집단상담자의 효과적인 개입으로 옳지 않은 것은?\n집단원 A: '나는 내가 집단원들에게 엉터리 같은 말을 해서 집단원들이 나를 이상한 사람으로 볼까봐 하고 싶은 말을 몇 번이고 속으로만 생각해요.'", "options": ["① 당신에게 어떤 집단원이 그런 생각을 할 것 같은지 마음 속으로 탐색해 보시겠어요?", "② 혹시 당신이 이 집단에서 누구를 가장 의식하고 있는지 알아차려 보시겠어요?", "③ 혹시 이 집단에서 A와 같은 생각을 가지고 있는 분이 있나요?", "④ 어떤 집단원이 그렇게 생각하고 있을지, 그 집단원에 대한 느낌을 그 분에게 직접 표현해 보실까요?", "⑤ 네! 그런 생각이 일어날 때 어떤 느낌일지 궁금하네요. 그 느낌에 한번 머물러 보시겠어요?"], "answer": 3, "expl": "직접 그 집단원에게 느낌을 표현하도록 요청하는 것은 아직 신뢰가 형성되지 않은 초기단계에는 부담이 크고 위협적일 수 있어, 이 개입은 초기단계에 적절하지 않다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "실존주의 집단상담에서 실존적 불안에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 실존적으로 주어진 것들과 직면할 때 피할 수 없는 산물이다.\nㄴ. 치료되어야 할 문제는 아니다.\nㄷ. '익숙한 것'을 '알 수 없는 것'으로 바꾸어야 한다는 인식에서 생긴다.\nㄹ. 궁극적 목적은 불안의 원천으로부터 삶을 더 안전한 것으로 만드는 것이다.", "options": ["① ㄱ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "실존적 불안은 삶의 조건(자유·죽음·고독 등)에 직면할 때 피할 수 없이 발생하며(ㄱ) 병리적 문제가 아니고(ㄴ) 익숙한 것을 낯선 것으로 재구성하는 과정에서 생기지만(ㄷ), 그 목적은 불안을 없애 '더 안전하게' 만드는 것이 아니라 불안을 직면하고 삶을 주체적으로 사는 데 있어 ㄹ은 옳지 않다."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "청소년 집단상담자가 '차단하기' 기술을 사용해야 할 상황이 아닌 것은?", "options": ["① 집단원의 질문이 계속 이어질 때", "② 한 사람이 다른 모든 사람을 대변할 때", "③ 다른 집단원에 대한 부정적인 반응을 할 때", "④ 집단 밖의 상황, 사건에 관해서만 이야기할 때", "⑤ 집단원 간에 논쟁이 발생했을 때"], "answer": 2, "expl": "단순한 질문이 계속 이어지는 것 자체는 자연스러운 탐색 과정일 수 있어 반드시 차단이 필요한 상황은 아니며, 나머지(대변, 부정적 반응, 주제이탈, 논쟁)는 집단 진행을 위해 차단 개입이 필요한 전형적 상황이다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "청소년 집단상담에서 집단상담자의 윤리에 위반되는 경우를 모두 고른 것은?\nㄱ. 상담자에게 익숙하지 않거나 확신이 없는 기법을 사용하는 경우\nㄴ. 상담자가 청소년의 삶의 방향을 이끄는 부모와 같은 어른이 되고 싶은 욕구를 가질 경우\nㄷ. 집단원들과의 가치관 충돌 시 상담자 자신의 가치를 노출하지 않는 경우\nㄹ. 상담자 자신의 욕구나 개인적 이익을 우선하는 경우", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄹ"], "answer": 4, "expl": "익숙하지 않은 기법 사용(ㄱ), 부모 역할 욕구(ㄴ), 상담자 개인 이익 우선(ㄹ)은 윤리적으로 문제가 될 수 있으나, 가치관 충돌 시 자신의 가치를 강요하지 않고 노출을 자제하는 것(ㄷ)은 오히려 윤리적으로 바람직한 태도에 해당한다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "얄롬(I. Yalom)이 제시한 치료적 요인으로 옳은 것을 모두 고른 것은?\nㄱ. 모방행동 ㄴ. 사회화 기술의 발달 ㄷ. 희망을 심어주기 ㄹ. 주지화 ㅁ. 합의적 타당화 ㅂ. 자기노출", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄷ, ㅂ", "③ ㄴ, ㄷ, ㅂ", "④ ㄴ, ㄹ, ㅁ, ㅂ", "⑤ ㄱ, ㄴ, ㄷ, ㅁ, ㅂ"], "answer": 0, "expl": "얄롬의 치료적 요인에는 희망 심어주기(ㄷ), 합의적 타당화(ㅁ), 자기노출(ㅂ) 등이 포함되며, 모방행동(ㄱ)과 사회화 기술 발달(ㄴ)도 얄롬의 치료적 요인 목록에 포함되므로 정답은 이 조합을 포함한다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "집단상담에서 집단원의 변화와 성장을 촉진하는 치료적 요인이 아닌 것은?", "options": ["① 과거 가족과의 관계가 집단원이나 집단상담자에게 교정적으로 재연된다.", "② 내적 감정의 개방적 표현을 통해 감정을 정화한다.", "③ 자신의 삶에 대한 궁극적 책임을 인식한다.", "④ 다른 집단원이나 집단상담자를 모델링한다.", "⑤ 항상 지지해주고 의존할 수 있는 타인이 있다는 실존적 믿음을 획득한다."], "answer": 4, "expl": "주지화는 감정을 회피하고 이성적으로만 다루는 방어적 태도에 가까워 치료적 요인이라기보다 오히려 극복해야 할 저항에 해당한다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "개인상담과 비교할 때 집단상담의 장점에 관한 설명으로 옳지 않은 것은?", "options": ["① 여러 사람이 상호작용하므로 개인의 문제가 깊이 있게 분석되기 더 쉽다.", "② 현실적이고 실제생활에 더 근접한 사회장면을 제공한다.", "③ 자신과 타인에 대한 이해와 수용의 폭이 넓어지는데 더 용이하다.", "④ 나 혼자만의 문제가 아니라는 지지와 보편성을 획득하기가 더 쉽다.", "⑤ 소속감이나 지원체계 및 동료의식을 발전시키기가 더 쉽다."], "answer": 0, "expl": "집단상담은 다양한 사람들과의 상호작용, 현실적 사회장면 제공, 보편성·소속감 획득에 강점이 있지만, 개인 문제를 '깊이 있게' 심층 분석하는 데는 개인상담이 더 유리해 이 설명은 집단상담의 장점으로 보기 어렵다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "집단상담의 유형 중 성장집단에 관한 설명으로 옳은 것은?", "options": ["① 스트레스대처기술 훈련집단이 이에 속한다.", "② 부적응의 원인을 이해하고 해결하고자 한다.", "③ 감수성 훈련을 위한 참만남 집단이 이에 속한다.", "④ 유사한 문제를 겪었거나 극복한 사람들로 구성되며 집단원들이 차례로 집단을 이끈다.", "⑤ 집단상담자는 집단을 이끌고 교육하는 역할을 한다."], "answer": 2, "expl": "감수성 훈련을 위한 참만남 집단은 자기이해와 대인관계 성장을 목표로 하는 대표적인 성장집단 유형이다."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "행동주의 집단상담에서 집단원의 목표에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단상담자와 집단원이 동의하여 설정한다.", "② 측정가능하고 객관적 관찰이 가능해야 한다.", "③ 초기에 설정된 목표는 끝까지 유지되어야 한다.", "④ 개개인의 문제에 대해 목표를 세우고 개별적인 개입이 이루어진다.", "⑤ 부적응 행동을 건설적이고 생산적인 행동으로 대체하는 것이다."], "answer": 2, "expl": "행동주의 집단상담의 목표는 집단원의 변화와 진전 상황에 따라 지속적으로 재평가·수정될 수 있어야 하며, '끝까지 유지되어야 한다'는 경직된 설명은 옳지 않다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "심리극 집단상담에서 주로 활용되는 기법이 아닌 것은?", "options": ["① 말이 아닌 구체적 행동으로 보여주는 실연", "② 표현되지 못한 감정이나 생각을 표현하도록 도와주는 이중자아", "③ 자신의 행동을 객관적으로 볼 수 있도록 도와주는 거울기법", "④ 대립적인 두 자아 간의 대화를 촉진하기 위한 빈의자 기법", "⑤ 자신이 원하는 감정은 자신이 만들어낸 것임을 자각하도록 하는 단추누르기"], "answer": 4, "expl": "단추누르기는 실존주의 상담(프랭클)의 기법으로, 원하는 감정을 스스로 만들어낼 수 있음을 자각시키는 기법이며 심리극의 대표 기법(실연, 이중자아, 거울기법, 빈의자 기법)과는 계열이 다르다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "개인심리학에 근거한 집단상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단원의 행동은 유아기에 형성된 가족과의 사회적 상호작용 패턴을 드러낸다.", "② 집단원은 누구나 불완전하고 열등감을 느끼는 존재라고 본다.", "③ 집단원이 가진 열등감은 능력을 성취하기 위한 원동력으로서 우월성 추구로 발현된다고 본다.", "④ 집단구성에 있어서 집단원 선별은 효과적인 상담진행을 위해 중요하다고 본다.", "⑤ 집단원들이 바람직한 생활양식으로 재정향하도록 조력한다."], "answer": 3, "expl": "개인심리학은 협력적이고 평등한 분위기를 중시해 집단원을 엄격히 선별하기보다 다양한 배경의 사람들이 함께 참여하며 사회적 관심을 발전시키는 것을 지향해 '집단원 선별이 중요하다'는 설명은 이 접근의 정신과 잘 맞지 않는다."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "비자발적 청소년에 대한 집단상담에서 집단상담자의 개입으로 옳지 않은 것은?", "options": ["① 집단상담자에게 사적이거나 짓궂은 질문을 할 경우 이에 대한 탐색질문을 한다.", "② 집단상담에 참여하지 않을 권리를 인정해준다.", "③ 청소년의 흥미를 불러일으킬 수 있는 매체를 적극 활용한다.", "④ 부정적인 감정표현을 건설적이고 생산적인 방향으로 이끌도록 돕는다.", "⑤ 비참여에 따른 불이익이 있어도 굳이 알려줄 필요는 없다."], "answer": 4, "expl": "비자발적 참여라도 불참에 따른 불이익 등 필요한 정보는 명확히 고지하는 것이 상담윤리(사전동의)에 부합하며, '알려줄 필요 없다'는 설명은 옳지 않다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "집단상담을 시작하기 전 필요한 작업에 관한 설명으로 옳지 않은 것은?", "options": ["① 사전 개별면담은 선입견을 갖지 않도록 하기 위해 진행하지 않는 것이 바람직하다.", "② 전체 집단회기에 대한 전반적인 계획을 수립하고 시작한다.", "③ 집단의 목표와 활동, 일정 등을 포함한 집단계획서를 미리 작성한다.", "④ 집단원이 어릴수록 집단 크기를 적게 구성하도록 계획한다.", "⑤ 이질적인 집단원의 포함 여부는 집단의 목표에 따라 달라질 수 있다."], "answer": 0, "expl": "사전 개별면담은 오히려 집단원의 특성 파악과 적합성 확인에 도움이 되므로 일반적으로 권장되는 절차이며, '진행하지 않는 것이 바람직하다'는 설명은 옳지 않다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "집단상담 중기(전환 및 작업) 단계에서 주로 일어나는 행동이 아닌 것은?", "options": ["① 집단에 대한 소속감을 느낀다.", "② 집단에서 배운 것을 도전하고 실천한다.", "③ 자기탐색과 변화에 대한 불안을 경험하고 방어적이 된다.", "④ 집단상담의 규칙과 한계를 정한다.", "⑤ 집단상담자의 권위와 능력에 도전한다."], "answer": 3, "expl": "규칙과 한계를 정하는 것은 중기가 아니라 초기(오리엔테이션·구조화) 단계에서 주로 이루어지는 작업이다."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "정신분석 집단상담에 관한 설명으로 옳은 것은?", "options": ["① 치료의 핵심은 전이의 분석과 해결이다.", "② 자유연상 기법은 다른 집단원에 의해 중단, 제지되기 쉬우므로 사용하지 않는다.", "③ 집단상담자는 수동적으로 물러서서 집단원의 이야기를 경청하는 역할을 주로 한다.", "④ 전이를 촉진하기 위해 가능한 한 동질적인 특성을 가진 사람으로 집단을 구성한다.", "⑤ 다른 집단원의 적응 행동을 성찰없이 따라하는 것도 중요한 변화과정이다."], "answer": 0, "expl": "정신분석 집단상담에서는 집단원 간, 집단원-상담자 간 다양한 전이가 발생하며 이를 분석하고 해결하는 것이 치료의 핵심 과정이다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "다음에 해당하는 집단의 유형은?\n○ 친구가 없는 초등학생 대상 ○ 대인관계 기술향상을 목표로 설계된 집단상담 ○ 매주 화요일, 총 10회기 진행", "options": ["① 구조화된 동질적 구성의 집중적 집단", "② 비구조화된 비동질적 구성의 집중적 집단", "③ 구조화된 비동질적 구성의 분산적 집단", "④ 비구조화된 동질적 구성의 분산적 집단", "⑤ 구조화된 동질적 구성의 분산적 집단"], "answer": 0, "expl": "매주 정기적으로(분산적) 진행되고, 비슷한 어려움(친구 없음)을 가진 아동으로 구성되며(동질적), 목표와 활동이 정해진 구조화된 형태이므로 '구조화된 동질적 구성의 분산적 집단'에 해당한다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "집단상담 초기단계에서 상담자의 역할을 모두 고른 것은?\nㄱ. 상담 구조화하기\nㄴ. 역기능적 행동패턴 탐색하기\nㄷ. 생산적인 대안행동 개발하기\nㄹ. 저항에 직면하게 하기\nㅁ. 감정표현과 자기개방 격려하기", "options": ["① ㄱ, ㄴ", "② ㄱ, ㅁ", "③ ㄴ, ㄹ", "④ ㄱ, ㄷ, ㅁ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "집단상담 초기단계에서는 상담 구조화(ㄱ)와 감정표현·자기개방 격려(ㅁ)가 핵심 과제이며, 역기능적 패턴 탐색·저항 직면·대안행동 개발(ㄴ·ㄷ·ㄹ)은 중기(작업)단계에서 주로 다루어진다."}, {"no": "23-26", "year": 2024, "qno": 1, "text": "다음의 집단원이 말하는 얄롬(I. Yalom)의 치료적 요인을 순서대로 나열한 것은?", "options": ["① 보편성, 대인관계 출력", "② 희망의 고취, 대인관계 입력", "③ 대인관계 입력, 보편성", "④ 희망의 고취, 대인관계 출력", "⑤ 보편성, 대인관계 입력"], "answer": 1, "expl": "다른 집단원의 문제해결 모습에서 용기를 얻는 것은 희망의 고취이며, 자신이 타인에게 어떻게 비치는지 알게 되는 것은 대인관계 입력에 해당한다."}, {"no": "23-27", "year": 2024, "qno": 2, "text": "코리(G. Corey)의 '작업집단'의 주요 특성으로 옳지 않은 것은?", "options": ["① 집단원들이 서로 신뢰하고 기꺼이 위험을 감수한다.", "② 가까운 집단원끼리 하위집단을 만들기 때문에 전체 집단의 응집력이 높다.", "③ 피드백이 자유롭게 오가며 거부감 없이 수용된다.", "④ 지금-여기에서 의미 있는 상호작용이 이루어진다.", "⑤ 무분별한 공격이 아닌 생산적인 피드백이 이루어진다."], "answer": 1, "expl": "폐쇄적인 하위집단 형성은 오히려 전체 집단의 응집력을 저해하는 요인이며, 작업집단의 특성으로 보기 어렵다."}, {"no": "23-28", "year": 2024, "qno": 3, "text": "집단상담 종결단계에서 집단상담자 역할로 옳은 것은?", "options": ["① 집단상담 전체과정을 평가하고 지속적 변화를 격려한다.", "② 집단원들이 자신의 방어적 패턴을 인식할 수 있도록 돕는다.", "③ 집단원들이 구체적인 개인목표를 설정하도록 돕는다.", "④ 집단상담의 일반적인 지침과 진행방법에 대해 안내한다.", "⑤ 집단원들이 친숙해질 수 있도록 분위기를 조성한다."], "answer": 0, "expl": "전체 과정 평가와 변화의 지속적 격려는 종결단계의 핵심 과업이며, 나머지는 초기·중기단계 과업이다."}, {"no": "23-29", "year": 2024, "qno": 4, "text": "집단상담 초기단계의 집단원 특징으로 옳지 않은 것은?", "options": ["① 집단참여와 관련하여 두려움과 주저하는 태도를 보인다.", "② 새로운 사람들과의 만남으로 인해 어색함을 느낀다.", "③ 집단에 대한 막연한 기대감을 가지기도 한다.", "④ 집단상담자에 대한 적대감이나 저항의 표면화가 일어난다.", "⑤ 집단이 자기개방을 하기에 안전한 장소인지 탐색한다."], "answer": 3, "expl": "집단상담자에 대한 적대감·저항의 표면화는 초기단계보다 전환단계(중기 초입)에서 주로 나타나는 특징이다."}, {"no": "23-30", "year": 2024, "qno": 5, "text": "합리적정서행동치료(REBT) 집단상담의 단계를 순서대로 옳게 나열한 것은?\nㄱ. 논박을 통해 합리적 사고를 할 수 있도록 돕는다.\nㄴ. 집단원이 문제를 이야기 하도록 한다.\nㄷ. 행동과제를 내주고 다음 회기에 그 결과를 토의한다.\nㄹ. a-b-c모델을 기반으로 집단원의 비합리적 신념을 확인한다.", "options": ["① ㄱ→ㄹ→ㄷ→ㄴ", "② ㄴ→ㄱ→ㄹ→ㄷ", "③ ㄴ→ㄹ→ㄱ→ㄷ", "④ ㄹ→ㄱ→ㄴ→ㄷ", "⑤ ㄹ→ㄴ→ㄷ→ㄱ"], "answer": 2, "expl": "REBT 집단상담은 문제 이야기(ㄴ)→ABC모델로 비합리적 신념 확인(ㄹ)→논박(ㄱ)→행동과제 부여 및 토의(ㄷ) 순으로 진행된다."}, {"no": "23-31", "year": 2024, "qno": 6, "text": "다음의 질문들을 주요 기법으로 사용하는 이론에서 집단상담자의 개입에 관한 설명으로 옳은 것은?", "options": ["① 작고 구체적이며 실천 가능한 상담목표를 설정한다.", "② 과거경험이 현재 성격에 미치는 영향에 초점을 둔다.", "③ 문제의 원인을 파악하는 것이 해결의 지름길이라고 본다.", "④ 집단원의 전이 감정에 대한 전문적인 해석을 내린다.", "⑤ 집단원이 책임을 회피하는 방식을 점검하도록 한다."], "answer": 0, "expl": "예외질문, 기적질문 유형의 질문은 해결중심상담의 기법이며, 이 접근은 작고 구체적이며 실천 가능한 목표 설정을 강조한다."}, {"no": "23-32", "year": 2024, "qno": 7, "text": "심리극 집단상담의 특성으로 옳지 않은 것은?", "options": ["① 집단구성원을 하나로 묶는 양방향적 공감인 텔레파시가 중시된다.", "② 억압된 감정을 표출하고 정화하여 통찰을 일으키도록 한다.", "③ 준비-시연-나누기의 순서로 진행된다.", "④ 현실에서 일어날 수 없는 일까지 상상하게 하는 잉여현실을 도구로 활용한다.", "⑤ 과거 사건을 마치 지금 일어나는 것처럼 재연하게 한다."], "answer": 0, "expl": "텔레(tele)는 심리극의 개념이지만 '텔레파시'라는 초자연적 개념과는 다르며, 텔레는 구성원 간 상호 감정교류·공감을 뜻하는 심리극 고유 개념이다."}, {"no": "23-33", "year": 2024, "qno": 8, "text": "다음의 상담기법들을 사용하는 이론의 집단상담자 역할에 관한 설명으로 옳지 않은 것은?", "options": ["① 그릇된 생활양식을 변화시키도록 격려한다.", "② 자기 행동의 목적과 결과에 대해 이해하도록 돕는다.", "③ 집단원들의 지금-여기에서의 행동에 초점을 둔다.", "④ 집단원의 사회적 관심을 향상시키고자 한다.", "⑤ 꿈을 토대로 무의식적 소망과 성적 억압을 해석한다."], "answer": 4, "expl": "격려, 역설적 의도, 버튼누르기, 마치~처럼 행동하기는 아들러 개인심리학의 기법이며, 무의식적 성적 억압 해석은 정신분석의 특징이라 개인심리학과는 맞지 않는다."}, {"no": "23-34", "year": 2024, "qno": 9, "text": "다음의 설명에 해당하는 게슈탈트 집단상담의 심리적 현상은?", "options": ["① 내사", "② 투사", "③ 융합", "④ 반전", "⑤ 편향"], "answer": 2, "expl": "밀접한 두 사람이 독립적으로 행동하지 못하고 서로 의존하며 진정한 접촉을 어렵게 하는 것은 융합의 특징이다."}, {"no": "23-35", "year": 2024, "qno": 10, "text": "교류분석 집단상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 인간은 스스로 노력하면 변화할 수 있다는 희망을 제시한다.", "② 집단에서 이루어야 할 목표를 구체적으로 진술한 계약을 맺는다.", "③ 인간관계에 대한 이해를 통해 의사소통 문제를 해결하는데 도움이 된다.", "④ 교육적ㆍ예방적ㆍ치료적 상담이 가능하다.", "⑤ 정서적 접근을 지향하므로 지적 능력이 낮은 집단원에게도 효과적이다."], "answer": 4, "expl": "교류분석은 자아상태, 각본, 게임 등 인지적 개념을 활용하는 접근이므로 지적 능력이 낮은 집단원에게 특히 효과적이라는 설명은 옳지 않다."}, {"no": "23-36", "year": 2024, "qno": 11, "text": "인간중심 집단상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 인간은 본능적으로 자기를 보전하고 유지하며 실현하는 경향성을 가지고 있다고\n보았다.\nㄴ. 진실성은 다른 집단원의 내적 참조틀을 통해 그 집단원의 세계를 보는 능력을 말\n한다.\nㄷ. 로저스(C. Rogers)는 집단상담자를 '촉진자'라고 불렀다.\nㄹ. 집단상담자는 집단원의 과거경험들에 대한 자료 수집에 중점을 둔다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "인간의 자기실현 경향성(ㄱ), 로저스가 집단상담자를 촉진자라 부른 점(ㄷ)은 옳지만, 다른 집단원의 내적 참조틀로 이해하는 것은 진실성이 아니라 공감적 이해이며(ㄴ), 과거경험 자료수집 강조(ㄹ)는 인간중심의 지금-여기 강조와 맞지 않아 ㄱ·ㄷ만 옳다."}, {"no": "23-37", "year": 2024, "qno": 12, "text": "다음에 해당하는 정신분석 집단상담 기법은?", "options": ["① 자유연상", "② 훈습", "③ 해석", "④ 저항 분석", "⑤ 차례로 돌아가기"], "answer": 1, "expl": "통찰한 내용을 바탕으로 저항과 문제를 점진적으로 수정해나가는 지속적 과정은 훈습에 해당한다."}, {"no": "23-38", "year": 2024, "qno": 13, "text": "다음 집단상담자의 상담기술에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단원들 사이에 공감대를 형성한다.", "② 공통의 관심사에 주의를 기울이게 한다.", "③ 집단원들 간의 보편성을 경험하게 한다.", "④ 집단원의 말과 행동의 모순 및 비일관성을 알게 한다.", "⑤ 집단원들의 참여를 촉진한다."], "answer": 3, "expl": "여러 집단원의 유사한 경험을 연결짓는 이 개입은 연결하기(linking) 기술로, 말과 행동의 모순을 지적하는 직면과는 성격이 다르다."}, {"no": "23-39", "year": 2024, "qno": 14, "text": "집단상담자에게 전이 반응을 보이는 집단원에 대한 집단상담자의 대처로 옳지 않은 것은?", "options": ["① 집단원이 그 반응으로 어떤 잠재적 이익을 얻는지 탐색한다.", "② 집단원에 대한 집단상담자 자신의 반응을 검토해본다.", "③ 집단원이 드러내는 감정이 집단 전체의 의견인지 확인해 본다.", "④ 긍정적인 전이 감정은 집단의 흐름을 저해하지 않으므로 다루지 않는다.", "⑤ 집단원의 전이 감정을 연상시키는 사람을 집단에서 찾아보도록 한다."], "answer": 3, "expl": "긍정적 전이라도 집단원의 성장과 통찰을 위한 중요한 자료이므로 다루지 않고 넘어가서는 안 된다."}, {"no": "23-40", "year": 2024, "qno": 15, "text": "집단상담자의 역할에 관한 설명으로 옳지 않은 것은?", "options": ["① 촉진자: 집단원의 참여를 권장하고, 집단원이 자기이해와 자기탐구의 깊은 단계로 나아갈 수 있도록 돕는다.", "② 모범자: 집단원이 새로운 행동변화를 시도할 수 있도록 분위기를 만들어 주고 집단 과정에서 본보기가 된다.", "③ 설계자: 집단원의 성숙한 행동은 강화하고, 미성숙한 행동을 억제하는 사회적 자극이 된다.", "④ 참여적 관찰자: 집단의 수용적이고 자율적 분위기 조성을 위해 집단원의 일원으로 참여하고 집단 전체의 상황을 주의 깊게 관찰한다.", "⑤ 보호자: 집단원들에게 권리와 책임에 대해 알려주고, 비밀보장의 중요성을 강조한다."], "answer": 2, "expl": "성숙한 행동을 강화하고 미성숙한 행동을 억제하는 사회적 자극이 되는 역할은 설계자보다는 '강화자(reinforcer)'로서의 역할 설명에 가까워 명칭과 정의 연결이 옳지 않다."}, {"no": "23-41", "year": 2024, "qno": 16, "text": "코리(G. Corey)의 집단상담자 전문적 자질로 옳지 않은 것은?", "options": ["① 충실한 자기돌봄", "② 집단계획 및 지도능력", "③ 상담이론에 관한 해박한 지식", "④ 인간에 관한 폭넓은 식견", "⑤ 집단원으로서의 집단 경험"], "answer": 0, "expl": "충실한 자기돌봄은 상담자의 개인적 특성(인성적 자질)에 가까우며, 코리가 제시한 전문적 자질(지식, 지도능력, 이론적 소양, 집단경험 등)과는 구분된다."}, {"no": "23-42", "year": 2024, "qno": 17, "text": "다음 대화에서 집단상담자가 적용한 기술은?", "options": ["① 행동제한", "② 반영", "③ 직면", "④ 자기노출", "⑤ 차단하기"], "answer": 1, "expl": "집단원의 말에 담긴 감정(걱정, 두려움)을 상담자의 언어로 되비추어주는 것은 반영 기술의 전형적 예이다."}, {"no": "23-43", "year": 2024, "qno": 18, "text": "집단상담 계획서에 포함되는 내용으로 옳은 것을 모두 고른 것은?\nㄱ. 집단원의 자격 ㄴ. 회기의 빈도와 시간\nㄷ. 집단성과의 평가 계획 ㄹ. 집단의 명시적, 암묵적 규범", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "집단원의 자격, 회기 빈도·시간, 성과 평가계획, 집단규범 모두 집단상담 계획서에 포함되어야 할 요소이다."}, {"no": "23-44", "year": 2024, "qno": 19, "text": "학교에서 운영되는 청소년 집단상담에서 집단상담자의 행동으로 옳지 않은 것은?", "options": ["① 미성년자의 집단상담 참여와 관련된 법률을 숙지한다.", "② 집단상담이 운영되는 학교의 상황과 방침을 고려한다.", "③ 집단원의 발달단계와 발달과업을 고려하여 집단상담을 계획한다.", "④ 학교관계자, 교사, 보호자 및 법정대리인에게 집단상담의 이점을 설명한다.", "⑤ 집단상담에서 말한 것은 어떤 내용이라도 부모와 학교관계자에게 비밀을 보장할 것을 약속한다."], "answer": 4, "expl": "학대나 위험 상황 등은 비밀보장의 예외에 해당하므로 '어떤 내용이라도' 비밀을 보장하겠다고 약속하는 것은 비윤리적이며 옳지 않다."}, {"no": "23-45", "year": 2024, "qno": 20, "text": "청소년상담사 윤리강령의 '다양성 존중'에 해당하는 집단상담자의 태도로 옳은 것은?", "options": ["① 집단상담을 시작할 때 집단원의 권리와 책임을 알려준다.", "② 집단원과 연애 관계 및 기타 사적인 관계를 맺지 않는다.", "③ 내담자의 보호자 또는 법정대리인에게 상담에 대한 사전 동의를 받는다.", "④ 훈련받지 않은 상담기법을 오남용하지 않는다.", "⑤ 자신의 개인적 가치, 태도, 신념을 자각하고, 집단원에게 자신의 가치를 강요하지 않는다."], "answer": 4, "expl": "자신의 개인적 가치를 자각하고 집단원에게 강요하지 않는 것은 다양성 존중의 핵심 원칙에 해당한다."}, {"no": "23-46", "year": 2024, "qno": 21, "text": "비자발적인 청소년 집단상담에서 집단상담자의 역할로 옳은 것을 모두 고른 것은?\nㄱ. 비자발적인 집단원이라도 사전 동의서를 받는다.\nㄴ. 집단원 스스로 집단활동 참여 여부를 선택할 권리가 있음을 말해준다.\nㄷ. 집단을 중도 탈퇴할 경우 발생할 결과에 대해 안내하고 선택할 수 있도록 한다.\nㄹ. 집단 참여에 대해 느끼는 부정적인 감정을 솔직하게 표현할 기회를 준다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄹ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "사전 동의서 받기(ㄱ), 참여 선택권 안내(ㄴ), 중도탈퇴 시 결과 안내(ㄷ), 부정적 감정 표현 기회 제공(ㄹ) 모두 비자발적 집단원을 위한 적절한 개입에 해당한다."}, {"no": "23-47", "year": 2024, "qno": 22, "text": "청소년 집단상담의 이점으로 옳은 것을 모두 고른 것은?\nㄱ. 부정적 감정을 다루는 방법을 연습할 수 있도록 해준다.\nㄴ. 다른 또래도 나와 비슷한 감정을 갖고 있음을 알게 된다.\nㄷ. 집단상담자와의 관계를 통해 의존성을 높여 나간다.\nㄹ. 또래와의 대화를 통해 자신과 타인에 대한 관심과 이해의 폭이 확대된다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "부정적 감정 다루기(ㄱ), 보편성 경험(ㄴ), 자타 이해 확대(ㄹ)는 청소년 집단상담의 이점이지만, 집단상담자에 대한 의존성 증가(ㄷ)는 바람직한 목표가 아니다."}, {"no": "23-48", "year": 2024, "qno": 23, "text": "청소년 집단상담의 일반적인 목표로 옳은 것을 모두 고른 것은?\nㄱ. 타인의 감정을 고려하여 자신의 솔직한 느낌을 표현할 수 있도록 한다.\nㄴ. 자신의 흥미와 관심, 능력, 진로 및 적성에 대한 이해를 증진시킨다.\nㄷ. 집단 상호작용을 통해 대인관계 기술을 향상시킨다.\nㄹ. 성장과정에서 일어나는 신체적ㆍ인지적ㆍ정서적 변화에 대처하는 능력을 키운다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "솔직한 감정표현(ㄱ), 진로·적성 이해(ㄴ), 대인관계 기술 향상(ㄷ), 발달적 변화 대처능력(ㄹ) 모두 청소년 집단상담의 일반적 목표에 해당한다."}, {"no": "23-49", "year": 2024, "qno": 24, "text": "청소년 집단상담 운영 시 집단상담자의 전략에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단이 진행될수록 권위자로서의 주도권을 높여 나간다.", "② 집단이 비생산적으로 흐를 때에는 집단의 방향을 재구조화한다.", "③ 흥미를 끌기 위해 다양한 매체와 도구를 사용할 수 있다.", "④ 집단원의 가치와 생각을 존중해 준다.", "⑤ 청소년에 대한 호감과 이해하는 태도를 보여준다."], "answer": 0, "expl": "집단이 진행됨에 따라 오히려 집단원의 자율성과 주도성을 키워주는 방향으로 나아가야 하며, 상담자의 권위적 주도권을 계속 높이는 것은 바람직하지 않다."}, {"no": "23-50", "year": 2024, "qno": 25, "text": "감수성 훈련집단에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단원이 가진 기존관념의 해빙이 중요하다.", "② 심각한 기능상의 문제와 증상 치료를 목표로 한다.", "③ 지금-여기에서의 상호교류를 강조한다.", "④ 자신과 타인의 반응에 대한 알아차림과 통찰이 촉진된다.", "⑤ 상대방의 이야기가 나에게 어떤 느낌을 주었는지 피드백으로 되돌려 주는 것이 권장된다."], "answer": 1, "expl": "감수성 훈련집단은 병리적 증상 치료가 아니라 정상 범위의 사람들이 자기이해와 대인관계 민감성을 기르는 성장지향적 집단이다."}];
const STORAGE_KEY = "ycs2_group_v1";
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let mode = "all";

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function setMode(m){
  mode = m;
  document.getElementById('btn-all').classList.toggle('active', m==='all');
  document.getElementById('btn-wrong').classList.toggle('active', m==='wrong');
  render();
}

function resetAll(){
  if(confirm('푼 기록을 모두 초기화할까?')){
    state = {};
    saveState();
    render();
  }
}

function answer(qIdx, optIdx){
  const q = QUESTIONS[qIdx];
  if(state[q.no] !== undefined) return;
  state[q.no] = optIdx;
  saveState();
  render();
}

function updateMeta(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
}

function updateProgress(){
  const total = QUESTIONS.length;
  const done = QUESTIONS.filter(q => state[q.no] !== undefined).length;
  const correct = QUESTIONS.filter(q => state[q.no] === q.answer).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `${done}/${total} 문제 풀이 · 정답 ${correct}개` + (done>0 ? ` (정답률 ${Math.round(correct/done*100)}%)` : '');
}

function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

function render(){
  updateMeta();
  updateProgress();
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  let list = QUESTIONS;
  if(mode === 'wrong'){
    list = QUESTIONS.filter(q => state[q.no] !== undefined && state[q.no] !== q.answer);
  }
  if(list.length === 0){
    area.innerHTML = '<div class="empty">' + (mode==='wrong' ? '틀린 문제가 없어! 🌿' : '문제가 없어.') + '</div>';
    return;
  }
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const card = document.createElement('div');
    card.className = 'card';
    const answered = state[q.no] !== undefined;
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt';
      if(answered){
        if(i === q.answer) cls += ' correct';
        else if(i === state[q.no]) cls += ' wrong';
      }
      optsHtml += `<button class="${cls}" ${answered?'disabled':''} onclick="answer(${qIdx}, ${i})">${opt}</button>`;
    });
    let feedback = '';
    if(answered){
      const mark = state[q.no] === q.answer
        ? '<div class="feedback correct-mark">✅ 정답</div>'
        : `<div class="feedback wrong-mark">❌ 오답 (정답: ${q.answer+1}번)</div>`;
      const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
      feedback = mark + expl;
    }
    card.innerHTML = `
      <div class="qnum">${q.year} · 문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      ${feedback}
    `;
    area.appendChild(card);
  });
}

render();
</script>
</body>
</html>
