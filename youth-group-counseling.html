<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집단상담 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .cert-badge{
    display:inline-block;
    font-size:11px;
    color:var(--sub);
    margin:-4px 0 16px;
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .year-pills{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  .pill{
    background:var(--bg-base);
    border:none;
    border-radius:20px;
    padding:7px 16px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .pill.active{
    background:var(--accent);
    color:#fff;
    font-weight:600;
    box-shadow:none;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{padding:3px 0;line-height:1.6;}
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .opt-btn{
    display:block;
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    border-radius:10px;
    padding:9px 12px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    white-space:pre-wrap;
    font-family:inherit;
    cursor:pointer;
  }
  .opt-btn:hover:not(:disabled){background:rgba(0,0,0,0.045);}
  .opt-btn:disabled{cursor:default;}
  .opt-btn.correct-reveal{background:var(--right-bg);color:var(--accent-dark);font-weight:600;}
  .opt-btn.wrong-picked{background:#fbeceb;color:var(--wrong);font-weight:600;}
  .opt-btn.neutral-picked{background:#eef0ef;color:var(--text);font-weight:600;}
  .feedback{margin-top:12px;display:none;}
  .feedback.open{display:block;}
  .feedback-mark{font-size:13px;font-weight:600;color:var(--accent-dark);margin-bottom:8px;}
  .feedback-mark.wrong{color:var(--wrong);}
  .explain{
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">‹ 목록으로</a>
  <h1>집단상담</h1>
  <div class="cert-badge">청소년상담사 2급</div>
  <div class="meta-line" id="metaLine"></div>
  <div class="year-pills" id="yearPills"></div>
  <div id="quizArea"></div>
</div>
<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "학교상담에서 청소년 집단상담 계획서에 포함될 내용이 아닌 것은?", "options": ["① 계획하는 집단구성에 대한 합당한 근거", "② 집단의 명시적 및 묵시적 규범", "③ 집단이 달성하고자 하는 목표", "④ 학교에 제시할 집단상담의 이점에 관한 내용", "⑤ 집단원의 특성, 모임 시간, 전체 길이"], "answer": 1, "expl": "집단계획서에는 구성 근거, 목표, 규범, 집단원 특성·시간·기간 등이 포함되지만, '학교에 제시할 이점'은 계획서의 필수 구성요소라기보다 별도의 설득·홍보 자료에 가깝다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "학교 장면의 집단상담에서 집단상담자의 전문적 자질을 모두 고른 것은?\nㄱ. 아동 및 청소년 대상의 집단상담 발달단계에 대한 적절한 이해\nㄴ. 아동 및 청소년을 진심으로 걱정하고 관심을 가져주는 마음\nㄷ. 다른 문화적 배경을 가진 아동 및 청소년과의 효과적인 작업에 필요한 지식\nㄹ. 아동 및 청소년 대상의 집단상담에 관한 문헌 검토", "options": ["① ㄱ, ㄷ", "② ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "발달단계 이해(ㄱ), 진정한 관심(ㄴ), 다문화 역량(ㄷ), 최신 문헌 검토(ㄹ) 모두 학교 장면 집단상담자에게 필요한 전문적 자질에 해당한다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "청소년 집단상담에서 집단응집력에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단원, 집단상담자, 집단 전체와의 관계를 포함한다.", "② 집단의 과정이 진행되는 동안 매우 유동적이지만 자연스럽게 발달한다.", "③ 집단원들이 집단에 대해 느끼는 매력으로 집단에 남아 있도록 하는 힘이다.", "④ 다른 치료적 요인이 최상의 기능을 하도록 하기 위한 필수적인 선행 조건이다.", "⑤ 응집력이 높을수록 출석, 참여, 상호지지의 비율이 높다."], "answer": 1, "expl": "집단응집력은 시간이 지나며 점차 발전하는 역동적 특성을 가지지만 이를 '매우 유동적'이라고 규정하기보다는 점진적으로 축적·발전되는 특성으로 이해하는 것이 더 정확해 이 설명은 다소 부정확하다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "벡(A. Beck)의 인지치료 집단상담에서 집단상담자의 역할로 옳지 않은 것은?", "options": ["① 상호협력과 적극적인 참여를 강조하는 치료적 관계가 필수적이다.", "② 집단원들이 가설을 만들고 그것을 검증하게 하는 협력적 경험주의 방식을 취한다.", "③ 집단원들이 자동적 사고와 핵심 신념을 지지하거나 반박할 수 있는 증거를 찾아보도록 한다.", "④ 안내된 발견(guided discovery)을 통해 집단원이 생각하고 느끼며 행동하는 방식의 관련성을 알게 한다.", "⑤ 집단원이 극단적인 신념을 내재화했듯이 삶을 바라보는 합리적 신념을 내재화하도록 한다."], "answer": 4, "expl": "인지치료는 집단원이 스스로 극단적 신념 대신 '합리적' 신념을 형성하도록 돕는 것이 목표이며, '극단적 신념을 내재화했듯이'라는 표현 자체가 개입 방향과 맞지 않는다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "게슈탈트 집단상담에서 접촉-경계 장애에 관한 설명으로 옳지 않은 것은?", "options": ["① 반전: 타인에게 표출하기 어려워 거의 감정을 표현하지 않는 집단원에게 쉽게 관찰된다.", "② 투사: 집단상담자나 다른 집단원이 압박을 하고 있다고 주장하는 집단원에게 관찰된다.", "③ 편향: 유머의 남발, 진술이 아닌 질문을 많이 사용하는 집단원에게 쉽게 관찰된다.", "④ 융합: 집단원에 대한 갈등을 표출하고, 부정적 감정을 있는 그대로 표현하는 집단원에게 특징적으로 나타난다.", "⑤ 내사: 집단초기에 집단상담자의 개입이나 역할에 관한 의문을 갖지 않거나 질문을 거의 하지 않는 집단원에게 관찰된다."], "answer": 3, "expl": "융합은 자신과 타인의 경계가 불분명해져 갈등이나 부정적 감정을 표현하지 못하고 억누르는 상태를 의미하며, '갈등을 표출하고 부정적 감정을 있는 그대로 표현'하는 것은 오히려 융합과 반대되는 양상이다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "교류분석 집단상담에서 집단상담자의 역할로 옳지 않은 것은?", "options": ["① 집단원과 집단상담자는 계약적 합의 하에 동등한 지위를 갖는다.", "② 집단원간의 상호작용을 중심으로 자신의 각본과 게임을 탐색하게 한다.", "③ 스트로크에 의한 삶의 각본과 초기 결정을 발견하도록 조력한다.", "④ 집단원이 연출한 게임으로 인해 부정적 감정이 만성화되는 과정을 발견하도록 돕는다.", "⑤ 집단원들이 인생태도와 라켓을 탐색하고 효과적인 관계방식을 실험하도록 한다."], "answer": 1, "expl": "교류분석 집단상담자는 각본·게임 탐색, 초기결정 발견, 인생태도·라켓 탐색 등을 조력하지만, 이는 상담자가 계약을 통해 안내하는 역할이지 무조건 '동등한 지위'라는 표현이 관계의 전문성 측면을 놓칠 수 있어 다른 선택지에 비해 상대적으로 부정확하다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "해결중심 집단상담에서 집단상담자의 '알지 못함' 자세에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 집단원으로 하여금 자신의 삶에 대한 전문가의 위치에 서게 한다.\nㄴ. 진단, 평가, 개입과 관련된 용어를 사용하는 경향이 있다.\nㄷ. 공동 촉진자의 역할을 수행하는 집단원들의 도움을 받을 수 있다.\nㄹ. 자신의 삶에서 얻은 지식, 개념, 경험적 역량을 내려 놓는다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "알지 못함 자세는 상담자가 전문가로서의 지식을 내려놓고(ㄹ) 집단원을 자기 삶의 전문가로 세우며(ㄱ), 집단원 간 공동촉진 역할도 활용할 수 있다(ㄷ)는 특징을 가지며, 진단·평가 용어 사용(ㄴ)은 알지 못함 자세와 반대된다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "얄롬(I. Yalom)의 집단상담에서 '지금-여기' 개입에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 집단원과 집단상담자에 대한 감정이 드러나는 것을 용이하게 해준다.\nㄴ. 집단원들의 축소된 사회를 발전시키고 그것이 드러나도록 한다.\nㄷ. 집단원의 일상생활이나 과거의 사건을 중요하게 다룬다.\nㄹ. 집단에서 무슨 일이 일어나고 있는가를 관찰하고 다룬다.", "options": ["① ㄱ, ㄹ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "지금-여기 개입은 감정 표현 촉진(ㄱ), 집단 내 축소사회 발전(ㄴ), 집단 내 과정 관찰(ㄹ)에 초점을 두며, 일상생활이나 과거사건(ㄷ)을 중요하게 다루는 것은 지금-여기 개입과는 결이 다르다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "코리(G. Corey)의 집단상담 초기단계에서 집단상담자의 효과적인 개입으로 옳지 않은 것은?\n집단원 A: '나는 내가 집단원들에게 엉터리 같은 말을 해서 집단원들이 나를 이상한 사람으로 볼까봐 하고 싶은 말을 몇 번이고 속으로만 생각해요.'", "options": ["① 당신에게 어떤 집단원이 그런 생각을 할 것 같은지 마음 속으로 탐색해 보시겠어요?", "② 혹시 당신이 이 집단에서 누구를 가장 의식하고 있는지 알아차려 보시겠어요?", "③ 혹시 이 집단에서 A와 같은 생각을 가지고 있는 분이 있나요?", "④ 어떤 집단원이 그렇게 생각하고 있을지, 그 집단원에 대한 느낌을 그 분에게 직접 표현해 보실까요?", "⑤ 네! 그런 생각이 일어날 때 어떤 느낌일지 궁금하네요. 그 느낌에 한번 머물러 보시겠어요?"], "answer": 3, "expl": "직접 그 집단원에게 느낌을 표현하도록 요청하는 것은 아직 신뢰가 형성되지 않은 초기단계에는 부담이 크고 위협적일 수 있어, 이 개입은 초기단계에 적절하지 않다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "실존주의 집단상담에서 실존적 불안에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 실존적으로 주어진 것들과 직면할 때 피할 수 없는 산물이다.\nㄴ. 치료되어야 할 문제는 아니다.\nㄷ. '익숙한 것'을 '알 수 없는 것'으로 바꾸어야 한다는 인식에서 생긴다.\nㄹ. 궁극적 목적은 불안의 원천으로부터 삶을 더 안전한 것으로 만드는 것이다.", "options": ["① ㄱ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "실존적 불안은 삶의 조건(자유·죽음·고독 등)에 직면할 때 피할 수 없이 발생하며(ㄱ) 병리적 문제가 아니고(ㄴ) 익숙한 것을 낯선 것으로 재구성하는 과정에서 생기지만(ㄷ), 그 목적은 불안을 없애 '더 안전하게' 만드는 것이 아니라 불안을 직면하고 삶을 주체적으로 사는 데 있어 ㄹ은 옳지 않다."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "청소년 집단상담자가 '차단하기' 기술을 사용해야 할 상황이 아닌 것은?", "options": ["① 집단원의 질문이 계속 이어질 때", "② 한 사람이 다른 모든 사람을 대변할 때", "③ 다른 집단원에 대한 부정적인 반응을 할 때", "④ 집단 밖의 상황, 사건에 관해서만 이야기할 때", "⑤ 집단원 간에 논쟁이 발생했을 때"], "answer": 2, "expl": "단순한 질문이 계속 이어지는 것 자체는 자연스러운 탐색 과정일 수 있어 반드시 차단이 필요한 상황은 아니며, 나머지(대변, 부정적 반응, 주제이탈, 논쟁)는 집단 진행을 위해 차단 개입이 필요한 전형적 상황이다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "청소년 집단상담에서 집단상담자의 윤리에 위반되는 경우를 모두 고른 것은?\nㄱ. 상담자에게 익숙하지 않거나 확신이 없는 기법을 사용하는 경우\nㄴ. 상담자가 청소년의 삶의 방향을 이끄는 부모와 같은 어른이 되고 싶은 욕구를 가질 경우\nㄷ. 집단원들과의 가치관 충돌 시 상담자 자신의 가치를 노출하지 않는 경우\nㄹ. 상담자 자신의 욕구나 개인적 이익을 우선하는 경우", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄹ"], "answer": 4, "expl": "익숙하지 않은 기법 사용(ㄱ), 부모 역할 욕구(ㄴ), 상담자 개인 이익 우선(ㄹ)은 윤리적으로 문제가 될 수 있으나, 가치관 충돌 시 자신의 가치를 강요하지 않고 노출을 자제하는 것(ㄷ)은 오히려 윤리적으로 바람직한 태도에 해당한다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "얄롬(I. Yalom)이 제시한 치료적 요인으로 옳은 것을 모두 고른 것은?\nㄱ. 모방행동 ㄴ. 사회화 기술의 발달 ㄷ. 희망을 심어주기 ㄹ. 주지화 ㅁ. 합의적 타당화 ㅂ. 자기노출", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄷ, ㅂ", "③ ㄴ, ㄷ, ㅂ", "④ ㄴ, ㄹ, ㅁ, ㅂ", "⑤ ㄱ, ㄴ, ㄷ, ㅁ, ㅂ"], "answer": 0, "expl": "얄롬의 치료적 요인에는 희망 심어주기(ㄷ), 합의적 타당화(ㅁ), 자기노출(ㅂ) 등이 포함되며, 모방행동(ㄱ)과 사회화 기술 발달(ㄴ)도 얄롬의 치료적 요인 목록에 포함되므로 정답은 이 조합을 포함한다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "집단상담에서 집단원의 변화와 성장을 촉진하는 치료적 요인이 아닌 것은?", "options": ["① 과거 가족과의 관계가 집단원이나 집단상담자에게 교정적으로 재연된다.", "② 내적 감정의 개방적 표현을 통해 감정을 정화한다.", "③ 자신의 삶에 대한 궁극적 책임을 인식한다.", "④ 다른 집단원이나 집단상담자를 모델링한다.", "⑤ 항상 지지해주고 의존할 수 있는 타인이 있다는 실존적 믿음을 획득한다."], "answer": 4, "expl": "주지화는 감정을 회피하고 이성적으로만 다루는 방어적 태도에 가까워 치료적 요인이라기보다 오히려 극복해야 할 저항에 해당한다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "개인상담과 비교할 때 집단상담의 장점에 관한 설명으로 옳지 않은 것은?", "options": ["① 여러 사람이 상호작용하므로 개인의 문제가 깊이 있게 분석되기 더 쉽다.", "② 현실적이고 실제생활에 더 근접한 사회장면을 제공한다.", "③ 자신과 타인에 대한 이해와 수용의 폭이 넓어지는데 더 용이하다.", "④ 나 혼자만의 문제가 아니라는 지지와 보편성을 획득하기가 더 쉽다.", "⑤ 소속감이나 지원체계 및 동료의식을 발전시키기가 더 쉽다."], "answer": 0, "expl": "집단상담은 다양한 사람들과의 상호작용, 현실적 사회장면 제공, 보편성·소속감 획득에 강점이 있지만, 개인 문제를 '깊이 있게' 심층 분석하는 데는 개인상담이 더 유리해 이 설명은 집단상담의 장점으로 보기 어렵다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "집단상담의 유형 중 성장집단에 관한 설명으로 옳은 것은?", "options": ["① 스트레스대처기술 훈련집단이 이에 속한다.", "② 부적응의 원인을 이해하고 해결하고자 한다.", "③ 감수성 훈련을 위한 참만남 집단이 이에 속한다.", "④ 유사한 문제를 겪었거나 극복한 사람들로 구성되며 집단원들이 차례로 집단을 이끈다.", "⑤ 집단상담자는 집단을 이끌고 교육하는 역할을 한다."], "answer": 2, "expl": "감수성 훈련을 위한 참만남 집단은 자기이해와 대인관계 성장을 목표로 하는 대표적인 성장집단 유형이다."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "행동주의 집단상담에서 집단원의 목표에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단상담자와 집단원이 동의하여 설정한다.", "② 측정가능하고 객관적 관찰이 가능해야 한다.", "③ 초기에 설정된 목표는 끝까지 유지되어야 한다.", "④ 개개인의 문제에 대해 목표를 세우고 개별적인 개입이 이루어진다.", "⑤ 부적응 행동을 건설적이고 생산적인 행동으로 대체하는 것이다."], "answer": 2, "expl": "행동주의 집단상담의 목표는 집단원의 변화와 진전 상황에 따라 지속적으로 재평가·수정될 수 있어야 하며, '끝까지 유지되어야 한다'는 경직된 설명은 옳지 않다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "심리극 집단상담에서 주로 활용되는 기법이 아닌 것은?", "options": ["① 말이 아닌 구체적 행동으로 보여주는 실연", "② 표현되지 못한 감정이나 생각을 표현하도록 도와주는 이중자아", "③ 자신의 행동을 객관적으로 볼 수 있도록 도와주는 거울기법", "④ 대립적인 두 자아 간의 대화를 촉진하기 위한 빈의자 기법", "⑤ 자신이 원하는 감정은 자신이 만들어낸 것임을 자각하도록 하는 단추누르기"], "answer": 4, "expl": "단추누르기는 실존주의 상담(프랭클)의 기법으로, 원하는 감정을 스스로 만들어낼 수 있음을 자각시키는 기법이며 심리극의 대표 기법(실연, 이중자아, 거울기법, 빈의자 기법)과는 계열이 다르다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "개인심리학에 근거한 집단상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단원의 행동은 유아기에 형성된 가족과의 사회적 상호작용 패턴을 드러낸다.", "② 집단원은 누구나 불완전하고 열등감을 느끼는 존재라고 본다.", "③ 집단원이 가진 열등감은 능력을 성취하기 위한 원동력으로서 우월성 추구로 발현된다고 본다.", "④ 집단구성에 있어서 집단원 선별은 효과적인 상담진행을 위해 중요하다고 본다.", "⑤ 집단원들이 바람직한 생활양식으로 재정향하도록 조력한다."], "answer": 3, "expl": "개인심리학은 협력적이고 평등한 분위기를 중시해 집단원을 엄격히 선별하기보다 다양한 배경의 사람들이 함께 참여하며 사회적 관심을 발전시키는 것을 지향해 '집단원 선별이 중요하다'는 설명은 이 접근의 정신과 잘 맞지 않는다."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "비자발적 청소년에 대한 집단상담에서 집단상담자의 개입으로 옳지 않은 것은?", "options": ["① 집단상담자에게 사적이거나 짓궂은 질문을 할 경우 이에 대한 탐색질문을 한다.", "② 집단상담에 참여하지 않을 권리를 인정해준다.", "③ 청소년의 흥미를 불러일으킬 수 있는 매체를 적극 활용한다.", "④ 부정적인 감정표현을 건설적이고 생산적인 방향으로 이끌도록 돕는다.", "⑤ 비참여에 따른 불이익이 있어도 굳이 알려줄 필요는 없다."], "answer": 4, "expl": "비자발적 참여라도 불참에 따른 불이익 등 필요한 정보는 명확히 고지하는 것이 상담윤리(사전동의)에 부합하며, '알려줄 필요 없다'는 설명은 옳지 않다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "집단상담을 시작하기 전 필요한 작업에 관한 설명으로 옳지 않은 것은?", "options": ["① 사전 개별면담은 선입견을 갖지 않도록 하기 위해 진행하지 않는 것이 바람직하다.", "② 전체 집단회기에 대한 전반적인 계획을 수립하고 시작한다.", "③ 집단의 목표와 활동, 일정 등을 포함한 집단계획서를 미리 작성한다.", "④ 집단원이 어릴수록 집단 크기를 적게 구성하도록 계획한다.", "⑤ 이질적인 집단원의 포함 여부는 집단의 목표에 따라 달라질 수 있다."], "answer": 0, "expl": "사전 개별면담은 오히려 집단원의 특성 파악과 적합성 확인에 도움이 되므로 일반적으로 권장되는 절차이며, '진행하지 않는 것이 바람직하다'는 설명은 옳지 않다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "집단상담 중기(전환 및 작업) 단계에서 주로 일어나는 행동이 아닌 것은?", "options": ["① 집단에 대한 소속감을 느낀다.", "② 집단에서 배운 것을 도전하고 실천한다.", "③ 자기탐색과 변화에 대한 불안을 경험하고 방어적이 된다.", "④ 집단상담의 규칙과 한계를 정한다.", "⑤ 집단상담자의 권위와 능력에 도전한다."], "answer": 3, "expl": "규칙과 한계를 정하는 것은 중기가 아니라 초기(오리엔테이션·구조화) 단계에서 주로 이루어지는 작업이다."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "정신분석 집단상담에 관한 설명으로 옳은 것은?", "options": ["① 치료의 핵심은 전이의 분석과 해결이다.", "② 자유연상 기법은 다른 집단원에 의해 중단, 제지되기 쉬우므로 사용하지 않는다.", "③ 집단상담자는 수동적으로 물러서서 집단원의 이야기를 경청하는 역할을 주로 한다.", "④ 전이를 촉진하기 위해 가능한 한 동질적인 특성을 가진 사람으로 집단을 구성한다.", "⑤ 다른 집단원의 적응 행동을 성찰없이 따라하는 것도 중요한 변화과정이다."], "answer": 0, "expl": "정신분석 집단상담에서는 집단원 간, 집단원-상담자 간 다양한 전이가 발생하며 이를 분석하고 해결하는 것이 치료의 핵심 과정이다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "다음에 해당하는 집단의 유형은?\n○ 친구가 없는 초등학생 대상 ○ 대인관계 기술향상을 목표로 설계된 집단상담 ○ 매주 화요일, 총 10회기 진행", "options": ["① 구조화된 동질적 구성의 집중적 집단", "② 비구조화된 비동질적 구성의 집중적 집단", "③ 구조화된 비동질적 구성의 분산적 집단", "④ 비구조화된 동질적 구성의 분산적 집단", "⑤ 구조화된 동질적 구성의 분산적 집단"], "answer": 0, "expl": "매주 정기적으로(분산적) 진행되고, 비슷한 어려움(친구 없음)을 가진 아동으로 구성되며(동질적), 목표와 활동이 정해진 구조화된 형태이므로 '구조화된 동질적 구성의 분산적 집단'에 해당한다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "집단상담 초기단계에서 상담자의 역할을 모두 고른 것은?\nㄱ. 상담 구조화하기\nㄴ. 역기능적 행동패턴 탐색하기\nㄷ. 생산적인 대안행동 개발하기\nㄹ. 저항에 직면하게 하기\nㅁ. 감정표현과 자기개방 격려하기", "options": ["① ㄱ, ㄴ", "② ㄱ, ㅁ", "③ ㄴ, ㄹ", "④ ㄱ, ㄷ, ㅁ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "집단상담 초기단계에서는 상담 구조화(ㄱ)와 감정표현·자기개방 격려(ㅁ)가 핵심 과제이며, 역기능적 패턴 탐색·저항 직면·대안행동 개발(ㄴ·ㄷ·ㄹ)은 중기(작업)단계에서 주로 다루어진다."}, {"no": "23-26", "year": 2024, "qno": 1, "text": "다음의 집단원이 말하는 얄롬(I. Yalom)의 치료적 요인을 순서대로 나열한 것은?", "options": ["① 보편성, 대인관계 출력", "② 희망의 고취, 대인관계 입력", "③ 대인관계 입력, 보편성", "④ 희망의 고취, 대인관계 출력", "⑤ 보편성, 대인관계 입력"], "answer": 1, "expl": "다른 집단원의 문제해결 모습에서 용기를 얻는 것은 희망의 고취이며, 자신이 타인에게 어떻게 비치는지 알게 되는 것은 대인관계 입력에 해당한다."}, {"no": "23-27", "year": 2024, "qno": 2, "text": "코리(G. Corey)의 '작업집단'의 주요 특성으로 옳지 않은 것은?", "options": ["① 집단원들이 서로 신뢰하고 기꺼이 위험을 감수한다.", "② 가까운 집단원끼리 하위집단을 만들기 때문에 전체 집단의 응집력이 높다.", "③ 피드백이 자유롭게 오가며 거부감 없이 수용된다.", "④ 지금-여기에서 의미 있는 상호작용이 이루어진다.", "⑤ 무분별한 공격이 아닌 생산적인 피드백이 이루어진다."], "answer": 1, "expl": "폐쇄적인 하위집단 형성은 오히려 전체 집단의 응집력을 저해하는 요인이며, 작업집단의 특성으로 보기 어렵다."}, {"no": "23-28", "year": 2024, "qno": 3, "text": "집단상담 종결단계에서 집단상담자 역할로 옳은 것은?", "options": ["① 집단상담 전체과정을 평가하고 지속적 변화를 격려한다.", "② 집단원들이 자신의 방어적 패턴을 인식할 수 있도록 돕는다.", "③ 집단원들이 구체적인 개인목표를 설정하도록 돕는다.", "④ 집단상담의 일반적인 지침과 진행방법에 대해 안내한다.", "⑤ 집단원들이 친숙해질 수 있도록 분위기를 조성한다."], "answer": 0, "expl": "전체 과정 평가와 변화의 지속적 격려는 종결단계의 핵심 과업이며, 나머지는 초기·중기단계 과업이다."}, {"no": "23-29", "year": 2024, "qno": 4, "text": "집단상담 초기단계의 집단원 특징으로 옳지 않은 것은?", "options": ["① 집단참여와 관련하여 두려움과 주저하는 태도를 보인다.", "② 새로운 사람들과의 만남으로 인해 어색함을 느낀다.", "③ 집단에 대한 막연한 기대감을 가지기도 한다.", "④ 집단상담자에 대한 적대감이나 저항의 표면화가 일어난다.", "⑤ 집단이 자기개방을 하기에 안전한 장소인지 탐색한다."], "answer": 3, "expl": "집단상담자에 대한 적대감·저항의 표면화는 초기단계보다 전환단계(중기 초입)에서 주로 나타나는 특징이다."}, {"no": "23-30", "year": 2024, "qno": 5, "text": "합리적정서행동치료(REBT) 집단상담의 단계를 순서대로 옳게 나열한 것은?\nㄱ. 논박을 통해 합리적 사고를 할 수 있도록 돕는다.\nㄴ. 집단원이 문제를 이야기 하도록 한다.\nㄷ. 행동과제를 내주고 다음 회기에 그 결과를 토의한다.\nㄹ. a-b-c모델을 기반으로 집단원의 비합리적 신념을 확인한다.", "options": ["① ㄱ→ㄹ→ㄷ→ㄴ", "② ㄴ→ㄱ→ㄹ→ㄷ", "③ ㄴ→ㄹ→ㄱ→ㄷ", "④ ㄹ→ㄱ→ㄴ→ㄷ", "⑤ ㄹ→ㄴ→ㄷ→ㄱ"], "answer": 2, "expl": "REBT 집단상담은 문제 이야기(ㄴ)→ABC모델로 비합리적 신념 확인(ㄹ)→논박(ㄱ)→행동과제 부여 및 토의(ㄷ) 순으로 진행된다."}, {"no": "23-31", "year": 2024, "qno": 6, "text": "다음의 질문들을 주요 기법으로 사용하는 이론에서 집단상담자의 개입에 관한 설명으로 옳은 것은?", "options": ["① 작고 구체적이며 실천 가능한 상담목표를 설정한다.", "② 과거경험이 현재 성격에 미치는 영향에 초점을 둔다.", "③ 문제의 원인을 파악하는 것이 해결의 지름길이라고 본다.", "④ 집단원의 전이 감정에 대한 전문적인 해석을 내린다.", "⑤ 집단원이 책임을 회피하는 방식을 점검하도록 한다."], "answer": 0, "expl": "예외질문, 기적질문 유형의 질문은 해결중심상담의 기법이며, 이 접근은 작고 구체적이며 실천 가능한 목표 설정을 강조한다."}, {"no": "23-32", "year": 2024, "qno": 7, "text": "심리극 집단상담의 특성으로 옳지 않은 것은?", "options": ["① 집단구성원을 하나로 묶는 양방향적 공감인 텔레파시가 중시된다.", "② 억압된 감정을 표출하고 정화하여 통찰을 일으키도록 한다.", "③ 준비-시연-나누기의 순서로 진행된다.", "④ 현실에서 일어날 수 없는 일까지 상상하게 하는 잉여현실을 도구로 활용한다.", "⑤ 과거 사건을 마치 지금 일어나는 것처럼 재연하게 한다."], "answer": 0, "expl": "텔레(tele)는 심리극의 개념이지만 '텔레파시'라는 초자연적 개념과는 다르며, 텔레는 구성원 간 상호 감정교류·공감을 뜻하는 심리극 고유 개념이다."}, {"no": "23-33", "year": 2024, "qno": 8, "text": "다음의 상담기법들을 사용하는 이론의 집단상담자 역할에 관한 설명으로 옳지 않은 것은?", "options": ["① 그릇된 생활양식을 변화시키도록 격려한다.", "② 자기 행동의 목적과 결과에 대해 이해하도록 돕는다.", "③ 집단원들의 지금-여기에서의 행동에 초점을 둔다.", "④ 집단원의 사회적 관심을 향상시키고자 한다.", "⑤ 꿈을 토대로 무의식적 소망과 성적 억압을 해석한다."], "answer": 4, "expl": "격려, 역설적 의도, 버튼누르기, 마치~처럼 행동하기는 아들러 개인심리학의 기법이며, 무의식적 성적 억압 해석은 정신분석의 특징이라 개인심리학과는 맞지 않는다."}, {"no": "23-34", "year": 2024, "qno": 9, "text": "다음의 설명에 해당하는 게슈탈트 집단상담의 심리적 현상은?", "options": ["① 내사", "② 투사", "③ 융합", "④ 반전", "⑤ 편향"], "answer": 2, "expl": "밀접한 두 사람이 독립적으로 행동하지 못하고 서로 의존하며 진정한 접촉을 어렵게 하는 것은 융합의 특징이다."}, {"no": "23-35", "year": 2024, "qno": 10, "text": "교류분석 집단상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 인간은 스스로 노력하면 변화할 수 있다는 희망을 제시한다.", "② 집단에서 이루어야 할 목표를 구체적으로 진술한 계약을 맺는다.", "③ 인간관계에 대한 이해를 통해 의사소통 문제를 해결하는데 도움이 된다.", "④ 교육적ㆍ예방적ㆍ치료적 상담이 가능하다.", "⑤ 정서적 접근을 지향하므로 지적 능력이 낮은 집단원에게도 효과적이다."], "answer": 4, "expl": "교류분석은 자아상태, 각본, 게임 등 인지적 개념을 활용하는 접근이므로 지적 능력이 낮은 집단원에게 특히 효과적이라는 설명은 옳지 않다."}, {"no": "23-36", "year": 2024, "qno": 11, "text": "인간중심 집단상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 인간은 본능적으로 자기를 보전하고 유지하며 실현하는 경향성을 가지고 있다고\n보았다.\nㄴ. 진실성은 다른 집단원의 내적 참조틀을 통해 그 집단원의 세계를 보는 능력을 말\n한다.\nㄷ. 로저스(C. Rogers)는 집단상담자를 '촉진자'라고 불렀다.\nㄹ. 집단상담자는 집단원의 과거경험들에 대한 자료 수집에 중점을 둔다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "인간의 자기실현 경향성(ㄱ), 로저스가 집단상담자를 촉진자라 부른 점(ㄷ)은 옳지만, 다른 집단원의 내적 참조틀로 이해하는 것은 진실성이 아니라 공감적 이해이며(ㄴ), 과거경험 자료수집 강조(ㄹ)는 인간중심의 지금-여기 강조와 맞지 않아 ㄱ·ㄷ만 옳다."}, {"no": "23-37", "year": 2024, "qno": 12, "text": "다음에 해당하는 정신분석 집단상담 기법은?", "options": ["① 자유연상", "② 훈습", "③ 해석", "④ 저항 분석", "⑤ 차례로 돌아가기"], "answer": 1, "expl": "통찰한 내용을 바탕으로 저항과 문제를 점진적으로 수정해나가는 지속적 과정은 훈습에 해당한다."}, {"no": "23-38", "year": 2024, "qno": 13, "text": "다음 집단상담자의 상담기술에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단원들 사이에 공감대를 형성한다.", "② 공통의 관심사에 주의를 기울이게 한다.", "③ 집단원들 간의 보편성을 경험하게 한다.", "④ 집단원의 말과 행동의 모순 및 비일관성을 알게 한다.", "⑤ 집단원들의 참여를 촉진한다."], "answer": 3, "expl": "여러 집단원의 유사한 경험을 연결짓는 이 개입은 연결하기(linking) 기술로, 말과 행동의 모순을 지적하는 직면과는 성격이 다르다."}, {"no": "23-39", "year": 2024, "qno": 14, "text": "집단상담자에게 전이 반응을 보이는 집단원에 대한 집단상담자의 대처로 옳지 않은 것은?", "options": ["① 집단원이 그 반응으로 어떤 잠재적 이익을 얻는지 탐색한다.", "② 집단원에 대한 집단상담자 자신의 반응을 검토해본다.", "③ 집단원이 드러내는 감정이 집단 전체의 의견인지 확인해 본다.", "④ 긍정적인 전이 감정은 집단의 흐름을 저해하지 않으므로 다루지 않는다.", "⑤ 집단원의 전이 감정을 연상시키는 사람을 집단에서 찾아보도록 한다."], "answer": 3, "expl": "긍정적 전이라도 집단원의 성장과 통찰을 위한 중요한 자료이므로 다루지 않고 넘어가서는 안 된다."}, {"no": "23-40", "year": 2024, "qno": 15, "text": "집단상담자의 역할에 관한 설명으로 옳지 않은 것은?", "options": ["① 촉진자: 집단원의 참여를 권장하고, 집단원이 자기이해와 자기탐구의 깊은 단계로 나아갈 수 있도록 돕는다.", "② 모범자: 집단원이 새로운 행동변화를 시도할 수 있도록 분위기를 만들어 주고 집단 과정에서 본보기가 된다.", "③ 설계자: 집단원의 성숙한 행동은 강화하고, 미성숙한 행동을 억제하는 사회적 자극이 된다.", "④ 참여적 관찰자: 집단의 수용적이고 자율적 분위기 조성을 위해 집단원의 일원으로 참여하고 집단 전체의 상황을 주의 깊게 관찰한다.", "⑤ 보호자: 집단원들에게 권리와 책임에 대해 알려주고, 비밀보장의 중요성을 강조한다."], "answer": 2, "expl": "성숙한 행동을 강화하고 미성숙한 행동을 억제하는 사회적 자극이 되는 역할은 설계자보다는 '강화자(reinforcer)'로서의 역할 설명에 가까워 명칭과 정의 연결이 옳지 않다."}, {"no": "23-41", "year": 2024, "qno": 16, "text": "코리(G. Corey)의 집단상담자 전문적 자질로 옳지 않은 것은?", "options": ["① 충실한 자기돌봄", "② 집단계획 및 지도능력", "③ 상담이론에 관한 해박한 지식", "④ 인간에 관한 폭넓은 식견", "⑤ 집단원으로서의 집단 경험"], "answer": 0, "expl": "충실한 자기돌봄은 상담자의 개인적 특성(인성적 자질)에 가까우며, 코리가 제시한 전문적 자질(지식, 지도능력, 이론적 소양, 집단경험 등)과는 구분된다."}, {"no": "23-42", "year": 2024, "qno": 17, "text": "다음 대화에서 집단상담자가 적용한 기술은?", "options": ["① 행동제한", "② 반영", "③ 직면", "④ 자기노출", "⑤ 차단하기"], "answer": 1, "expl": "집단원의 말에 담긴 감정(걱정, 두려움)을 상담자의 언어로 되비추어주는 것은 반영 기술의 전형적 예이다."}, {"no": "23-43", "year": 2024, "qno": 18, "text": "집단상담 계획서에 포함되는 내용으로 옳은 것을 모두 고른 것은?\nㄱ. 집단원의 자격 ㄴ. 회기의 빈도와 시간\nㄷ. 집단성과의 평가 계획 ㄹ. 집단의 명시적, 암묵적 규범", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "집단원의 자격, 회기 빈도·시간, 성과 평가계획, 집단규범 모두 집단상담 계획서에 포함되어야 할 요소이다."}, {"no": "23-44", "year": 2024, "qno": 19, "text": "학교에서 운영되는 청소년 집단상담에서 집단상담자의 행동으로 옳지 않은 것은?", "options": ["① 미성년자의 집단상담 참여와 관련된 법률을 숙지한다.", "② 집단상담이 운영되는 학교의 상황과 방침을 고려한다.", "③ 집단원의 발달단계와 발달과업을 고려하여 집단상담을 계획한다.", "④ 학교관계자, 교사, 보호자 및 법정대리인에게 집단상담의 이점을 설명한다.", "⑤ 집단상담에서 말한 것은 어떤 내용이라도 부모와 학교관계자에게 비밀을 보장할 것을 약속한다."], "answer": 4, "expl": "학대나 위험 상황 등은 비밀보장의 예외에 해당하므로 '어떤 내용이라도' 비밀을 보장하겠다고 약속하는 것은 비윤리적이며 옳지 않다."}, {"no": "23-45", "year": 2024, "qno": 20, "text": "청소년상담사 윤리강령의 '다양성 존중'에 해당하는 집단상담자의 태도로 옳은 것은?", "options": ["① 집단상담을 시작할 때 집단원의 권리와 책임을 알려준다.", "② 집단원과 연애 관계 및 기타 사적인 관계를 맺지 않는다.", "③ 내담자의 보호자 또는 법정대리인에게 상담에 대한 사전 동의를 받는다.", "④ 훈련받지 않은 상담기법을 오남용하지 않는다.", "⑤ 자신의 개인적 가치, 태도, 신념을 자각하고, 집단원에게 자신의 가치를 강요하지 않는다."], "answer": 4, "expl": "자신의 개인적 가치를 자각하고 집단원에게 강요하지 않는 것은 다양성 존중의 핵심 원칙에 해당한다."}, {"no": "23-46", "year": 2024, "qno": 21, "text": "비자발적인 청소년 집단상담에서 집단상담자의 역할로 옳은 것을 모두 고른 것은?\nㄱ. 비자발적인 집단원이라도 사전 동의서를 받는다.\nㄴ. 집단원 스스로 집단활동 참여 여부를 선택할 권리가 있음을 말해준다.\nㄷ. 집단을 중도 탈퇴할 경우 발생할 결과에 대해 안내하고 선택할 수 있도록 한다.\nㄹ. 집단 참여에 대해 느끼는 부정적인 감정을 솔직하게 표현할 기회를 준다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄹ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "사전 동의서 받기(ㄱ), 참여 선택권 안내(ㄴ), 중도탈퇴 시 결과 안내(ㄷ), 부정적 감정 표현 기회 제공(ㄹ) 모두 비자발적 집단원을 위한 적절한 개입에 해당한다."}, {"no": "23-47", "year": 2024, "qno": 22, "text": "청소년 집단상담의 이점으로 옳은 것을 모두 고른 것은?\nㄱ. 부정적 감정을 다루는 방법을 연습할 수 있도록 해준다.\nㄴ. 다른 또래도 나와 비슷한 감정을 갖고 있음을 알게 된다.\nㄷ. 집단상담자와의 관계를 통해 의존성을 높여 나간다.\nㄹ. 또래와의 대화를 통해 자신과 타인에 대한 관심과 이해의 폭이 확대된다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "부정적 감정 다루기(ㄱ), 보편성 경험(ㄴ), 자타 이해 확대(ㄹ)는 청소년 집단상담의 이점이지만, 집단상담자에 대한 의존성 증가(ㄷ)는 바람직한 목표가 아니다."}, {"no": "23-48", "year": 2024, "qno": 23, "text": "청소년 집단상담의 일반적인 목표로 옳은 것을 모두 고른 것은?\nㄱ. 타인의 감정을 고려하여 자신의 솔직한 느낌을 표현할 수 있도록 한다.\nㄴ. 자신의 흥미와 관심, 능력, 진로 및 적성에 대한 이해를 증진시킨다.\nㄷ. 집단 상호작용을 통해 대인관계 기술을 향상시킨다.\nㄹ. 성장과정에서 일어나는 신체적ㆍ인지적ㆍ정서적 변화에 대처하는 능력을 키운다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "솔직한 감정표현(ㄱ), 진로·적성 이해(ㄴ), 대인관계 기술 향상(ㄷ), 발달적 변화 대처능력(ㄹ) 모두 청소년 집단상담의 일반적 목표에 해당한다."}, {"no": "23-49", "year": 2024, "qno": 24, "text": "청소년 집단상담 운영 시 집단상담자의 전략에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단이 진행될수록 권위자로서의 주도권을 높여 나간다.", "② 집단이 비생산적으로 흐를 때에는 집단의 방향을 재구조화한다.", "③ 흥미를 끌기 위해 다양한 매체와 도구를 사용할 수 있다.", "④ 집단원의 가치와 생각을 존중해 준다.", "⑤ 청소년에 대한 호감과 이해하는 태도를 보여준다."], "answer": 0, "expl": "집단이 진행됨에 따라 오히려 집단원의 자율성과 주도성을 키워주는 방향으로 나아가야 하며, 상담자의 권위적 주도권을 계속 높이는 것은 바람직하지 않다."}, {"no": "23-50", "year": 2024, "qno": 25, "text": "감수성 훈련집단에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단원이 가진 기존관념의 해빙이 중요하다.", "② 심각한 기능상의 문제와 증상 치료를 목표로 한다.", "③ 지금-여기에서의 상호교류를 강조한다.", "④ 자신과 타인의 반응에 대한 알아차림과 통찰이 촉진된다.", "⑤ 상대방의 이야기가 나에게 어떤 느낌을 주었는지 피드백으로 되돌려 주는 것이 권장된다."], "answer": 1, "expl": "감수성 훈련집단은 병리적 증상 치료가 아니라 정상 범위의 사람들이 자기이해와 대인관계 민감성을 기르는 성장지향적 집단이다."}, {"no": "22-26", "year": 2023, "qno": 1, "text": "집단상담의 목표 설정에 관한 설명으로 옳지 않은 것은?", "options": ["① 집단의 방향을 분명히 하는데 도움을 준다.", "② 집단의 목표는 과정 속에서 수정될 수 없다.", "③ 집단 전체의 목표와 개인의 목표를 모두 설정하는 것이 필요하다.", "④ 집단 초기부터 집단원에게 명료하게 진술하고 이해시킬 필요가 있다.", "⑤ 집단상담의 효과와 평가를 위해 필수적이다."], "answer": 1, "expl": "집단목표는 고정된 것이 아니라 집단과정 속에서 필요에 따라 수정·보완될 수 있으므로 이 설명은 옳지 않다."}, {"no": "22-27", "year": 2023, "qno": 2, "text": "다음의 요건을 모두 충족하는 집단 유형은?\n○ 집단원에게 비슷한 책임과 권위가 주어진다.\n○ 특정 문제를 이미 겪었거나 극복한 집단원으로 구성된다.\n○ 치료적 요인의 핵심은 증언이다.", "options": ["① 치료집단", "② 교육집단", "③ 성장집단", "④ 과업집단", "⑤ 자조집단"], "answer": 4, "expl": "비슷한 어려움을 겪었거나 극복한 사람들이 동등한 위치에서 서로의 경험(증언)을 나누는 집단은 자조집단이다."}, {"no": "22-28", "year": 2023, "qno": 3, "text": "다음과 관련 있는 집단상담의 치료적 요인은?\n○ 쌓여있던 고통과 누적된 감정 표현으로 신체적, 정신적 해방감을 경험한다.\n○ 집단원 간의 신뢰감과 상호유대감을 높인다.\n○ 감정적 패턴 아래 놓인 인지와 연관된 통찰을 다루는 것이 중요하다.", "options": ["① 정화", "② 보편성", "③ 피드백", "④ 자기이해", "⑤ 인지적 요인"], "answer": 0, "expl": "억눌린 감정을 표현하여 해방감을 경험하는 것은 정화(카타르시스)의 대표적 특징이다."}, {"no": "22-29", "year": 2023, "qno": 4, "text": "얄롬(I. Yalom)이 제시한 집단상담의 치료적 요인에 해당되지 않는 것은?", "options": ["① 희망 심어 주기", "② 응집력", "③ 정보제공하기", "④ 집단원을 위한 목적의 적절성", "⑤ 실존적 요인"], "answer": 3, "expl": "얄롬이 제시한 치료적 요인 목록에는 희망 고취, 응집력, 정보전달, 실존적 요인 등이 포함되지만 '집단원을 위한 목적의 적절성'이라는 항목은 없다."}, {"no": "22-30", "year": 2023, "qno": 5, "text": "집단상담 초기단계에서 집단상담자의 역할로 옳은 것을 모두 고른 것은?\nㄱ. 집단의 기본적인 규칙을 정한다.\nㄴ. 집단의 결과에 대해 집단상담자는 책임이 없다는 것을 명확히 한다.\nㄷ. 집단원의 구체적인 개인 목표를 설정할 수 있도록 돕는다.\nㄹ. 집단원의 이야기에 적극적인 경청과 반응을 한다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "기본규칙 설정(ㄱ), 개인목표 설정 조력(ㄷ), 적극적 경청과 반응(ㄹ)은 초기단계 상담자의 역할이지만, 집단상담자도 집단 결과에 일정 부분 책임이 있으므로 ㄴ은 옳지 않다."}, {"no": "22-31", "year": 2023, "qno": 6, "text": "신뢰가 높은 집단의 특징으로 옳지 않은 것은?", "options": ["① 집단원은 집단 활동에 적극적으로 참여한다.", "② 자신의 개인적인 측면을 다른 집단원과 나눈다.", "③ 집단에서 다른 집단원을 지지하거나 그들에게 도전한다.", "④ 집단원 일부가 하위집단을 형성하여 친해진다.", "⑤ 집단의 안과 밖에서 위험을 감수한다."], "answer": 3, "expl": "폐쇄적인 하위집단 형성은 전체 집단의 신뢰와 응집력을 오히려 저해할 수 있어 신뢰가 높은 집단의 특징으로 보기 어렵다."}, {"no": "22-32", "year": 2023, "qno": 7, "text": "실존주의 집단상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 자신이 자기 삶의 주인이어야 한다는 자유를 인식하고 수용한다.", "② 치료적 관계를 통해 성장의 장애물을 자각하고 자아이상과 자아실현 욕구를 추구한다.", "③ 관계, 의미 찾기, 불안, 고통, 죽음과 같은 주제를 다룬다.", "④ 치료 기법보다 집단원의 현재 경험을 이해하는 것을 강조한다.", "⑤ 핵심 목적은 실존적 근심을 나눔으로써 자신을 발견하는 것이다."], "answer": 1, "expl": "자아이상과 자아실현 욕구 추구는 정신분석·인본주의적 개념에 가까우며, 실존주의는 자유·책임·죽음·의미 등 실존적 조건에 대한 직면을 핵심으로 한다."}, {"no": "22-33", "year": 2023, "qno": 8, "text": "다음 설명에 해당하는 집단상담의 이론은?\n○ 집단상담자는 지시적이며 조언자이자 문제해결자로서 기능하는 경향이 있다.\n○ 부적응적 행동을 제거하고 보다 건설적인 행동으로 변화시킨다.\n○ 각 집단원이 경험하는 구체적인 문제행동에 대해 기능적 분석을 실시한다.", "options": ["① 실존주의", "② 행동주의", "③ 인간중심", "④ 게슈탈트", "⑤ 정신분석"], "answer": 1, "expl": "지시적 조언자 역할, 부적응행동 제거와 건설적 행동으로의 대체, 기능적 분석은 행동주의 집단상담의 특징이다."}, {"no": "22-34", "year": 2023, "qno": 9, "text": "정신분석 집단상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 과거의 경험이 현재의 성격에 미치는 영향에 초점을 둔다.\nㄴ. 당면한 문제를 다루기보다 성격을 재구조화 하는 것이 목적이다.\nㄷ. 전이를 다루기 위해 다양한 특성을 지닌 사람들로 구성되는 것이 좋다.\nㄹ. 상담자는 꿈, 환상, 저항 등을 해석하고 돕는다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "과거경험의 영향(ㄱ), 성격 재구조화 목적(ㄴ), 전이 촉진을 위한 이질적 구성(ㄷ), 꿈·환상·저항의 해석(ㄹ) 모두 정신분석 집단상담의 특징이다."}, {"no": "22-35", "year": 2023, "qno": 10, "text": "아들러(A. Adler)의 집단상담 기법으로 옳지 않은 것은?", "options": ["① 스프에 침 뱉기", "② 행동 조성하기", "③ 마치 ∼ 인 것처럼 행동하기", "④ 단추 누르기", "⑤ 수렁 피하기"], "answer": 1, "expl": "행동 조성하기(shaping)는 행동주의 기법이며, 나머지는 아들러 개인심리학의 대표적인 기법들이다."}, {"no": "22-36", "year": 2023, "qno": 11, "text": "현실치료 집단상담에서 집단상담자의 역할로 옳지 않은 것은?", "options": ["① 집단원을 무비판적이고 수용적인 태도로 상담한다.", "② 집단원의 생각하기와 행동하기를 변화시키려고 노력한다.", "③ 집단원의 변명을 수용하지 않으며, 선택한 행동에 대해 책임을 지도록 한다.", "④ 질문하기, 직면하기, 역설적 기법, 유머 사용하기 등을 상담기법으로 사용할 수 있다.", "⑤ 집단원의 기본적 욕구인 힘, 자유, 즐거움, 자아실현, 생존욕구를 지각하도록 돕는다."], "answer": 4, "expl": "현실치료의 기본욕구는 생존, 사랑과 소속, 힘, 자유, 즐거움이며 '자아실현'은 이 다섯 가지 기본욕구에 포함되지 않는다."}, {"no": "22-37", "year": 2023, "qno": 12, "text": "교류분석 집단상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 구조분석은 세 가지 자아상태를 검토하도록 돕는 과정이다.", "② 교차적 의사교류는 두 가지 내용이 동시에 전달되는 경우로 바깥으로 직접 나타나는 자아와 실제로 기능하는 심리적 자아가 다른 것을 말한다.", "③ 게임이란 숨겨져 있지만 이득을 얻도록 계획된 이면적 교류의 연속이다.", "④ 긍정적인 삶의 자세 한 가지와 부정적인 삶의 자세 세 가지가 있다.", "⑤ 개인이 시간을 구조화하는 여섯 가지 방법은 철회, 의례적 행동, 활동, 여흥, 게임, 친밀성이 있다."], "answer": 1, "expl": "겉으로 드러난 자아와 실제 기능하는 심리적 자아가 다른 것은 교차적 교류가 아니라 이면교류(암시적 교류)의 정의이므로 이 설명은 옳지 않다."}, {"no": "22-38", "year": 2023, "qno": 13, "text": "합리적 정서 행동치료에 근거한 집단상담 기법으로 옳지 않은 것은?", "options": ["① 소크라테스식 질문법", "② 논박하기", "③ 수치공격 연습", "④ 상상하기", "⑤ 마술가게"], "answer": 4, "expl": "마술가게는 사이코드라마의 대표적 기법이며, 나머지는 REBT 집단상담에서 사용하는 대표적 기법들이다."}, {"no": "22-39", "year": 2023, "qno": 14, "text": "게슈탈트 이론을 적용한 집단상담자의 개입으로 옳은 것을 모두 고른 것은?\nㄱ. 당신의 내면에 있는 '우월한 나'와 '열등한 나'가 서로 대화해 보도록 하세요.\nㄴ. 과거에 당신에게 상처를 주었던 친구를 빈 의자에 앉히고 이야기 해보세요.\nㄷ. 친구에게 속상한 감정을 점수로 매긴다면 5점 중 몇 점인지 이야기 해보세요.\nㄹ. 지금 당신의 신체 가운데 다리에서 어떤 감각이 느껴지는지 이야기 해보세요.", "options": ["① ㄱ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "내면의 양극성 대화(ㄱ), 빈 의자 기법(ㄴ), 신체감각 자각(ㄹ)은 게슈탈트 상담의 대표적 개입이지만, 감정을 점수로 매기게 하는 것(ㄷ)은 게슈탈트보다는 인지행동적 개입에 가깝다."}, {"no": "22-40", "year": 2023, "qno": 15, "text": "코리(G. Corey)가 제시한 집단상담자의 인간적 자질에 해당되지 않는 것은?", "options": ["① 용기", "② 활력", "③ 자기 돌봄", "④ 적극적 경청", "⑤ 창의성"], "answer": 3, "expl": "적극적 경청은 상담자의 기술적 자질에 해당하며, 코리가 제시한 인간적 자질에는 용기, 활력, 자기돌봄, 창의성 등이 포함된다."}, {"no": "22-41", "year": 2023, "qno": 16, "text": "소극적으로 참여하는 집단원(영희)을 위한 집단상담자 반응으로 옳은 것을 모두 고른 것은?\nㄱ. 이 집단에 있다는 것이 영희에게 어떻게 느껴지나요?\nㄴ. 철수의 이야기를 들으며 영희는 어떤 느낌이 들었나요?\nㄷ. 이 집단에 참여하기 힘든 이유가 무엇인지 이야기해 줄 수 있나요?\nㄹ. 집단에서 가만히 있는 것은 좋지 않아요. 집단에서는 본인 이야기를 해야 해요.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "집단 경험에 대한 느낌(ㄱ), 타인 반응에 대한 느낌(ㄴ), 참여 어려움 탐색(ㄷ)은 소극적 참여자를 초대하는 부드러운 방식이지만, ㄹ처럼 단정적으로 지시하는 것은 오히려 위축을 심화시킬 수 있어 적절하지 않다."}, {"no": "22-42", "year": 2023, "qno": 17, "text": "청소년 집단상담의 이점에 관한 설명으로 옳지 않은 것은?", "options": ["① 청소년들은 집단이라는 환경 속에서 의존성을 높여나간다.", "② 다른 친구들도 나와 비슷한 감정과 생각을 갖고 있음을 알게 된다.", "③ 자기중심적인 사고나 태도의 변화를 가져올 수 있다.", "④ 자신의 고민을 드러내 해결해가면서 전보다 더 큰 자신감을 얻는다.", "⑤ 또래와의 상호작용을 통해 부정적인 감정을 다루는 방법을 연습할 수 있다."], "answer": 0, "expl": "집단상담의 목적은 청소년의 자율성과 자기이해를 키우는 것이며, 의존성을 높이는 것은 집단상담의 이점으로 볼 수 없다."}, {"no": "22-43", "year": 2023, "qno": 18, "text": "다음 사례에서 집단상담자가 사용한 기법은?\n집단원: 저는 지금 기분이 좋지 않아요. 지금 이 집단에서도 불편합니다. 어제도 친구들과 다툼이 있었는데, 왜 그랬는지 잘 모르겠고, 자꾸만 친구들과 싸우게 되는 것 같아요.\n상담자: 그렇군요. 근데 지금 이 집단에서 불편하다고 하셨는데, 우리 집단에서 어떤 부분이나 누구에게서 그런 느낌이 들었는지 이야기 해 주시겠어요?", "options": ["① 명료화하기", "② 반영하기", "③ 해석하기", "④ 초점 맞추기", "⑤ 행동 제한하기"], "answer": 3, "expl": "막연했던 불편감을 지금-여기의 구체적인 대상과 상황으로 좁혀가도록 이끄는 것은 초점 맞추기 기법에 해당한다."}, {"no": "22-44", "year": 2023, "qno": 19, "text": "청소년 집단상담에 관한 설명으로 옳지 않은 것을 모두 고른 것은?\nㄱ. 자발적, 비자발적인 집단원 모두에게 사전 동의를 받아야 한다.\nㄴ. 집단 참여서약에 집단을 떠날 수 없음을 명시한다.\nㄷ. 집단상담 진행 중 개인상담이 필요한 경우 집단상담 종결 이후 권유한다.\nㄹ. 집단상담실 앞에 집단 명칭, 시간 및 참여자 명단을 제시하여 안내한다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "집단을 떠날 수 없다고 명시(ㄴ)하는 것은 참여권 침해이며, 개인상담을 종결 이후로만 미루는 것(ㄷ), 참여자 명단을 공개적으로 게시하는 것(ㄹ)은 비밀보장 원칙에 어긋나 모두 옳지 않다."}, {"no": "22-45", "year": 2023, "qno": 20, "text": "두 명의 상담자가 공동으로 진행하는 집단상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 경험이 적은 상담자는 경험이 많은 공동리더를 통해 집단리더십을 익힐 수 있다.\nㄴ. 역할분담으로 집단과정을 촉진시키고, 소진이 일어날 가능성을 줄일 수 있다.\nㄷ. 리더가 집단에서 강한 감정을 경험했다면 차후 공동리더와 탐색해볼 수 있다.\nㄹ. 공동리더 간 협의와 상호피드백은 필수적이지 않다.", "options": ["① ㄱ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "경험 습득(ㄱ), 소진 예방(ㄴ), 강한 감정의 사후 탐색(ㄷ)은 공동리더십의 장점이지만, 공동리더 간 협의와 상호피드백은 원활한 공동진행을 위해 필수적이므로 ㄹ은 옳지 않다."}, {"no": "22-46", "year": 2023, "qno": 21, "text": "집단상담 평가에 관한 설명으로 옳은 것은?", "options": ["① 평가의 목적은 집단원의 바람직한 변화를 조력하기 위해서이다.", "② 평가계획은 종결시점에서 고려한다.", "③ 평가 시점에 따라 상대평가와 절대평가로 구분할 수 있다.", "④ 결과평가는 집단과정 중에 이루어진다.", "⑤ 평가에서 심리검사 사용은 필수적이다."], "answer": 0, "expl": "집단상담 평가의 궁극적인 목적은 집단원의 바람직한 변화를 확인하고 조력하는 데 있다."}, {"no": "22-47", "year": 2023, "qno": 22, "text": "학교 집단상담 계획에 관한 설명으로 옳지 않은 것은?", "options": ["① 학생, 교사, 학부모 대상 요구조사를 실시한다.", "② 집단 주제와 집단 크기, 회기 수 등을 선정한다.", "③ 학교장을 만나 운영계획에 대해 논의한 후 승인을 받는다.", "④ 집단에서 얻을 수 있는 이점을 학교 담당자, 교사, 부모에게 명확히 설명한다.", "⑤ 치료집단인 경우 학생의 동의만 받으면 된다."], "answer": 4, "expl": "치료집단처럼 민감한 집단은 학생 본인의 동의뿐 아니라 보호자의 동의도 함께 받아야 하므로 이 설명은 옳지 않다."}, {"no": "22-48", "year": 2023, "qno": 23, "text": "청소년 집단원의 특징에 관한 설명으로 옳지 않은 것은?", "options": ["① 학교나 부모에 의해 참여하게 되는 경우 집단에 대한 관심이 없을 수도 있다.", "② 교사나 부모와 같은 기성세대에게는 반항적인 태도를 가지고 도전할 수 있다.", "③ 일반적으로 또래의 기준에 동조하거나 승인받는 것에 관심이 없다.", "④ 신체적ㆍ생리적 변화로 외모에 관심을 갖게 된다.", "⑤ 자아중심적이고, 자기의식적인 특성을 보인다."], "answer": 2, "expl": "청소년기는 또래 기준에 동조하고 승인을 받는 데 매우 민감한 시기이므로 '관심이 없다'는 설명은 옳지 않다."}, {"no": "22-49", "year": 2023, "qno": 24, "text": "다음에 해당하는 집단의 유형은?\n중학교 3학년 여학생을 대상으로 대인관계 증진을 위해 집단상담자와 참여자가 매회기 합의하여 주제를 선정하고, 매주 1회 10주 동안 진행한다.", "options": ["① 비구조화된 동질적 구성의 분산적 집단", "② 구조화된 동질적 구성의 분산적 집단", "③ 비구조화된 이질적 구성의 분산적 집단", "④ 구조화된 이질적 구성의 집중적 집단", "⑤ 비구조화된 동질적 구성의 집중적 집단"], "answer": 0, "expl": "매회기 주제를 유동적으로 정하는 점은 비구조화, 동일 학년 여학생으로 구성된 점은 동질적, 매주 1회씩 나눠 진행되는 점은 분산적 집단에 해당한다."}, {"no": "22-50", "year": 2023, "qno": 25, "text": "청소년 집단상담과 성인 집단상담의 특성을 설명한 것으로 옳은 것을 모두 고른 것은?\nㄱ. 비밀보장 원칙의 한계는 두 집단 모두 동일하다.\nㄴ. 성인 집단은 자발적으로 신청한 참여자만 집단원으로 참여할 수 있다.\nㄷ. 두 집단 모두 참여 중 언제든 본인의 의사에 따라 집단참여를 거부할 수 있다.\nㄹ. 두 집단 모두 사전면담을 통해 집단원을 선별할 수 있다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "참여 도중 언제든 참여를 거부할 수 있는 권리(ㄷ)와 사전면담을 통한 집단원 선별(ㄹ)은 청소년·성인 집단 모두에 해당하지만, 청소년은 비자발적으로 참여하는 경우가 많아 ㄴ은 옳지 않다."}, {"no": "21-26", "year": 2022, "qno": 1, "text": "얄롬(I. Yalom)의 치료적 요인 중 실존적 요인을 모두 고른 것은?\nㄱ. 인생이 때로 부당하고 공정하지 않다는 것을 인식한다.\nㄴ. 궁극적으로 인생의 고통이나 죽음은 피할 길이 없음을 인식한다.\nㄷ. 친구와 가깝게 지내더라도 여전히 홀로 인생에 맞닥뜨려야 한다.\nㄹ. 이전에 받아들이지 않았던 자신의 부분을 발견하고 수용한다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "삶의 부당함, 고통과 죽음의 불가피성, 실존적 고독에 대한 인식(ㄱ,ㄴ,ㄷ)은 실존적 요인에 해당하며, 자신의 미수용 부분을 발견·수용하는 것(ㄹ)은 자기이해 요인에 해당한다."}, {"no": "21-27", "year": 2022, "qno": 2, "text": "집단상담의 잠재적 위험을 모두 고른 것은?\nㄱ. 상담자는 집단 안에서 힘과 지위를 오용할 수 있다.\nㄴ. 사적인 삶의 노출로 사생활을 침해할 소지가 있다.\nㄷ. 공개된 내용의 일부가 집단 내에서 유지되지 않을 수 있다.\nㄹ. 직면은 유익하고 강력한 도구이지만, 파괴적인 방법으로 사용될 수 있다.", "options": ["① ㄱ, ㄹ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "상담자의 힘 오용, 사생활 침해, 비밀보장 미유지, 직면의 오남용은 모두 집단상담에서 제기되는 잠재적 위험에 해당한다."}, {"no": "21-28", "year": 2022, "qno": 3, "text": "코리(G. Corey)의 집단상담 작업단계에서 다음 ( )에 들어갈 상담자 개입으로 옳은 것은?\n철수: 사람들이 나를 멍청하다고 생각하지 않도록 나 자신을 분명하게 표현하고 싶어요. 여기 있는 사람들이 나를 비난할까봐 두려워요.\n상담자: ( )", "options": ["① 만약 비판받을 것 같은 두려움이 없어진다면, 당신은 이 집단에서 어떻게 달라질까요?", "② 이와 비슷하게 비난받을까봐 두려워하는 느낌을 가진 집단원이 있나요?", "③ 언제 그런 두려움을 느꼈고, 이 집단에서 누구를 가장 의식하고 있나요?", "④ 철수처럼 여기에서 두려움이나 다른 감정을 느낀 집단원이 있나요?", "⑤ 당신이 생각하거나 느꼈지만 표현하지 못한 것은 또 어떤 것이 있나요?"], "answer": 0, "expl": "두려움이 사라진다면 집단에서 어떻게 달라질지 묻는 질문은 문제 이면의 원하는 변화를 탐색하도록 돕는 작업단계의 개입에 해당한다."}, {"no": "21-29", "year": 2022, "qno": 4, "text": "집단상담을 축소된 사회라고 보는 얄롬(I. Yalom)의 관점으로 옳은 것을 모두 고른 것은?\nㄱ. 집단원들은 하나의 축소된 사회를 만들고, 이 사회는 집단원들의 특정한 방어적 행동을 이끌어 낸다.\nㄴ. 집단원들은 상호작용에 의해 각자의 대인관계에서 대처양식을 드러낸다.\nㄷ. 집단상담 상황은 집단원 자신의 일상적인 생활을 대표하기 보다는 비전형적이고 인위적이다.\nㄹ. 집단의 발달이 방해받지 않는다면, 각 집단원의 사회환경이 반영되는 축소된 사회로 발전한다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "집단이 축소사회를 형성해 방어행동을 유발하고(ㄱ), 대처양식을 드러내며(ㄴ), 방해받지 않으면 사회환경이 반영된 축소사회로 발전한다(ㄹ)는 것이 얄롬의 관점이며, 집단상황을 '비전형적·인위적'이라 보는 ㄷ은 이 관점과 반대된다."}, {"no": "21-30", "year": 2022, "qno": 5, "text": "얄롬(I. Yalom)의 치료적 요인 중 '대인관계 - 입력'으로 옳지 않은 것은?", "options": ["① 내가 다른 사람에게 어떤 모습으로 보이는지 알게 된다.", "② 타인을 짜증나게 하는 나의 습관이나 태도를 알게 된다.", "③ 다른 사람도 나만큼 혼란스러운 가족관계가 있음을 알게 된다.", "④ 내 생각을 말하지 않음으로써 때때로 사람들을 혼란에 빠뜨린다는 점을 알게 된다.", "⑤ 내가 다른 사람에게 어떤 인상을 주는지 알게 된다."], "answer": 2, "expl": "다른 사람도 자신만큼 혼란스러운 가족관계가 있음을 아는 것은 보편성(universality) 요인에 해당하며, 대인관계 학습-입력(타인에게 비치는 자신의 모습 인식)과는 다르다."}, {"no": "21-31", "year": 2022, "qno": 6, "text": "비생산적인 집단 분위기로 발전하는 것을 방지하기 위해 상담자가 개입해야 할 상황으로 옳은 것을 모두 고른 것은?\nㄱ. 한 사람이 다른 사람의 대변인 역할을 하는 경우\nㄴ. 집단 밖의 사람, 상황, 사건에 관해서만 이야기되는 경우\nㄷ. 발언하기 전과 후에 꼭 상담자나 다른 사람의 승인을 구하는 경우\nㄹ. 집단과 다른 집단원에게 부정적인 감정을 표현하는 경우", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "대변인 역할, 집단 밖 이야기만 지속, 매번 승인을 구하는 행동(ㄱ,ㄴ,ㄷ)은 비생산적 패턴이나, 부정적 감정을 있는 그대로 표현하는 것(ㄹ)은 오히려 생산적인 작업의 신호이므로 개입 대상이 아니다."}, {"no": "21-32", "year": 2022, "qno": 7, "text": "다음의 집단원이 말하는 치료적 요인은?\n집단원: 몇 회기 전부터 상담자에 대한 불만이 있었는데, 이번 회기에서야 지금까지 상담자에게 억눌러왔던 감정을 표현했어요. 이것은 내가 처음으로 권위자에게 갖는 감정을 솔직하고 용기있게 전달한 행동이에요.", "options": ["① 대인관계 학습 - 산출", "② 정화", "③ 대리학습", "④ 자기이해", "⑤ 지도"], "answer": 0, "expl": "억눌러온 감정을 집단 안에서 실제로 표현해보는 새로운 대인관계 행동의 실행(산출)은 대인관계 학습-산출 요인에 해당한다."}, {"no": "21-33", "year": 2022, "qno": 8, "text": "집단상담자의 개방에 관한 설명으로 옳지 않은 것은?", "options": ["① 상담자도 한 인간이라는 것을 느낄 수 있도록 충분히 자신을 드러낸다.", "② 상담자가 집단원에 의해 어떻게 영향을 받고 있는지를 적절하게 표현한다.", "③ 개방을 하나의 기법으로 사용하기보다는 적절하다고 판단될 때 자발적으로 해야 한다.", "④ 진솔성 차원에서 상담자 개인적 삶의 모든 측면을 공개한다.", "⑤ 정직하고 적절하게 개방함으로써 집단원에게 집단규범 형성의 모델이 된다."], "answer": 3, "expl": "상담자의 자기개방은 집단원의 유익을 위해 적절하고 선택적으로 이루어져야 하며, 개인적 삶의 모든 측면을 공개하는 것은 바람직하지 않다."}, {"no": "21-34", "year": 2022, "qno": 9, "text": "집단상담 초기단계에서 상담자의 역할로 옳지 않은 것은?", "options": ["① 갈등상황을 충분히 다루는 일에 대한 가치를 집단원들이 경험하게 한다.", "② 개방적이고 존중하는 태도로 집단원의 이야기를 듣고 집단원의 경험을 가치있게 여긴다.", "③ 집단원들의 두려움과 기대를 표현하도록 돕는다.", "④ 의존성을 부추기지 않으면서 집단원이 혼란스럽지 않도록 적당히 구조화한다.", "⑤ 집단과정을 신뢰하고 집단원들이 의미있는 변화를 만들어 내는 능력이 있음을 믿는다."], "answer": 0, "expl": "갈등을 충분히 다루는 경험은 저항과 갈등이 본격화되는 전환(과도기)단계의 과업이며, 초기단계의 역할로는 옳지 않다."}, {"no": "21-35", "year": 2022, "qno": 10, "text": "집단상담자의 '직면하기' 내용을 옳게 나열한 것은?\nㄱ. 아버지가 좋은 분이라고 하면서 아버지가 자신에게 꾸중하는 것을 이야기 할 때는 다소 흥분되어 보이네.\nㄴ. 지난번에는 시험에 자신있다고 했는데, 오늘은 자신없다고 하면서 막연해 하는군.", "options": ["① ㄱ: 전후 발언의 차이, ㄴ: 언행 불일치", "② ㄱ: 전후 발언의 차이, ㄴ: 발언의 내용과 감정의 차이", "③ ㄱ: 언행 불일치, ㄴ: 발언의 내용과 감정의 차이", "④ ㄱ: 발언의 내용과 감정의 차이, ㄴ: 언행 불일치", "⑤ ㄱ: 발언의 내용과 감정의 차이, ㄴ: 전후 발언의 차이"], "answer": 4, "expl": "ㄱ은 좋은 분이라는 말과 흥분된 감정 사이의 불일치를, ㄴ은 이전 발언(자신있음)과 현재 발언(자신없음) 사이의 차이를 지적한 것이므로 ⑤가 옳다."}, {"no": "21-36", "year": 2022, "qno": 11, "text": "실존주의 집단상담에서 인간 실존의 궁극적인 조건으로 옳지 않은 것은?", "options": ["① 자유", "② 무의미함", "③ 죽음", "④ 불안", "⑤ 실존적 소외"], "answer": 3, "expl": "실존주의에서 다루는 궁극적 관심사(실존의 조건)는 자유, 죽음, 실존적 소외, 무의미함이며, '불안'은 이러한 조건에 직면하며 발생하는 정서적 결과에 해당한다."}, {"no": "21-37", "year": 2022, "qno": 12, "text": "아들러(A. Adler) 집단상담에서 '재정향과 재교육' 단계의 상담자 과업으로 옳지 않은 것은?", "options": ["① 집단원의 자신, 타인, 삶에 대한 잘못된 신념에 도전하기", "② 대안적인 신념, 행동, 태도를 고려하여 삶의 과제에 효과적으로 대처하도록 조력하기", "③ 잘못된 삶의 패턴을 재정향하고 협력적인 상호작용을 이끄는 원리를 교육하기", "④ 자기 - 제한적인 가정에 도전하기 위해 '마치 ～ 인 것처럼'과 같은 행동지향적인 기법을 활용하기", "⑤ 지금 - 여기의 행동양식에 대한 동기를 탐색하고 다른 관점에서 자신을 보도록 잠정적인 가설을 제시하기"], "answer": 4, "expl": "지금-여기의 행동 동기를 탐색하고 잠정적 가설을 제시하는 것은 평가(사정)단계의 과업이며, 재정향과 재교육 단계의 과업이 아니다."}, {"no": "21-38", "year": 2022, "qno": 13, "text": "다음의 역할연기에서 사용된 교류분석 상담기법은?\n집단에서 손님(집단원 A)이 주인(집단원 B)에게 물건값을 주었는데, 주인은 받은 적이 없다고 우겨서 다투는 상황이 연출되고 있다. 억울함을 느낀 손님이 주인에게 점점 더 강한 분노를 표출하게 되었다. 그 후 상담자는 손님이 체험한 분노 감정을 논의하고 그 감정의 기원을 분석하였다.", "options": ["① 기능분석", "② 라켓분석", "③ 게임분석", "④ 구조분석", "⑤ 인생태도 분석"], "answer": 1, "expl": "역할극을 통해 체험한 감정을 다루고 그 기원(진짜 감정 vs 대체감정)을 분석하는 것은 라켓분석에 해당한다."}, {"no": "21-39", "year": 2022, "qno": 14, "text": "게슈탈트 집단상담에서 다음이 설명하는 것은?\n권위자의 행동이나 가치관을 무비판적으로 수용함으로써 자기 것으로 동화시키지 못한 채 내면에서 갈등을 일으키는 현상", "options": ["① 투사", "② 내사", "③ 융합", "④ 반전", "⑤ 편향"], "answer": 1, "expl": "타인(권위자)의 가치관을 비판 없이 그대로 받아들여 동화시키지 못하는 접촉경계 장애는 내사(introjection)에 해당한다."}, {"no": "21-40", "year": 2022, "qno": 15, "text": "합리적 정서행동치료 집단상담자의 기술로 옳지 않은 것은?", "options": ["① \"～ 해야만 한다.\" 대신에 \"～ 하면 더 낫다.\"는 진술방식을 학습하게 한다.", "② 최악의 상황을 상상하게 하여 상황과 맞지 않는 부적절한 감정이 적절한 감정으로 변화될 수 있도록 한다.", "③ 창피하거나 부끄럽게 느껴지는 행동을 하게 함으로써 비난에 과도하게 영향을 받지 않도록 한다.", "④ 역할연기를 통해 집단원 자신이 할 수 있는 행동을 인식하게 한다.", "⑤ 문제가 없었던 때의 자동적 사고를 탐색하고 그것을 더 잘 활용하도록 한다."], "answer": 4, "expl": "문제가 없었던 예외 상황의 자동적 사고를 탐색·활용하는 것은 해결중심상담의 접근이며, REBT의 대표적 기술이 아니다."}, {"no": "21-41", "year": 2022, "qno": 16, "text": "다음 질문을 사용하는 집단상담자에 관한 설명으로 옳은 것은?\n○ 무엇이 달라지면 당신이 7점 대신에 8점에 있다는 것을 알 수 있을까요?\n○ 오늘 집단상담이 끝날 즈음, 무엇이 달라지면 이 상담에 온 보람이 있다고 하실까요?", "options": ["① 기적질문, 간접적인 칭찬을 활용한다.", "② 집단원의 투사를 해석한다.", "③ 집단원의 현재 삶을 방해하는 과거 경험을 회상하도록 한다.", "④ 집단원의 잘못된 신념을 명료화한다.", "⑤ 상담자가 내담자보다 한 발짝 앞에서 상담을 이끈다."], "answer": 0, "expl": "척도점수를 활용해 작은 변화를 구체화하는 질문은 해결중심상담의 척도질문 활용 방식으로, 기적질문 및 간접칭찬과 함께 대표적으로 사용된다."}, {"no": "21-42", "year": 2022, "qno": 17, "text": "집단원 지수의 행동과 상담자의 개입 기술을 옳게 짝지은 것은?\n민주: 학원에 가지않은 걸 아빠가 아시고 엄청 화내셨어요. 아빠를 실망시켜 드려서…\n지수: 걱정하지 마. 화 내셔도 너를 사랑하니까 금방 잊고 잘 해주실 거야.\n상담자: 지수가 민주에게 관심을 갖고 있구나. 그런데 아빠를 실망시킨 민주의 감정을 좀 더 들어보면 어떨까?", "options": ["① 충고를 일삼는 집단원 - 해석", "② 충고를 일삼는 집단원 - 직면", "③ 일시적으로 구원하는 집단원 - 공감", "④ 일시적으로 구원하는 집단원 - 차단하기", "⑤ 긍정적인 집단원 - 자기노출"], "answer": 3, "expl": "지수는 민주의 힘든 감정이 충분히 다뤄지기 전에 성급히 위로하며 상황을 봉합하려는 일시적 구원자 역할을 하고 있으며, 상담자는 이를 차단하고 민주의 감정 탐색으로 초점을 돌리고 있다."}, {"no": "21-43", "year": 2022, "qno": 18, "text": "다음 집단상담자 반응에 관한 설명으로 옳지 않은 것은?\n철수: 시험이 다가오면 너무 걱정되어 공부가 안돼요. 어디서부터 시작해야 할지 모르겠고…\n상담자: 여러분도 철수와 비슷한 경험이 있으면 이야기를 나누어 볼까요?", "options": ["① 집단의 상호작용을 촉진한다.", "② 집단의 응집력을 증가시킨다.", "③ 집단원들이 자연스럽게 보편성을 경험하게 한다.", "④ 집단원들이 서로의 유사성에 대해 알게 한다.", "⑤ 집단원의 마음을 정확하게 이해하고 수용하고 있음을 전달한다."], "answer": 4, "expl": "이 반응은 철수 개인의 감정을 정확히 반영하기보다 다른 집단원에게 화제를 개방하는 연결하기(linking) 기법으로, 개인의 마음을 정확히 이해·수용했음을 전달하는 공감 반응과는 다르다."}, {"no": "21-44", "year": 2022, "qno": 19, "text": "침묵하는 집단원에 대한 상담자의 개입방법으로 옳지 않은 것은?", "options": ["① 생산적 침묵인지, 비생산적 침묵인지 검토한다.", "② 침묵이 집단원의 문화적 다양성에서 온 것은 아닌지 생각해 본다.", "③ 침묵하는 집단원의 표정, 몸짓에 대해 언급함으로써 집단에 참여시킨다.", "④ 생산적인 침묵이 생겨난 동안 어떤 집단원이 말하기 시작한 경우 조금 더 기다려 달라고 요청할 수 있다.", "⑤ 회기 초기에는 긴 침묵이 생기고 집단원들이 열중하지 않아도 기다린다."], "answer": 4, "expl": "회기 초기의 긴 침묵과 낮은 몰입은 집단의 생산성을 저해할 수 있어 상담자의 적절한 개입이 필요하며, 무조건 기다리는 것은 옳지 않다."}, {"no": "21-45", "year": 2022, "qno": 20, "text": "집단상담 평가에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 평가의 주요 목적은 목표 관리이다.\nㄴ. 비표준화된 심리검사는 사용할 수 없다.\nㄷ. 집단을 계획하는 단계에서부터 평가 계획을 세운다.\nㄹ. 평가 방법에는 면접, 심리검사, 행동관찰이 있다.", "options": ["① ㄱ, ㄷ", "② ㄴ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "목표관리, 계획단계부터의 평가설계, 면접·심리검사·행동관찰 등 다양한 평가방법(ㄱ,ㄷ,ㄹ)은 옳으나, 비표준화 심리검사도 필요에 따라 사용될 수 있어 ㄴ은 옳지 않다."}, {"no": "21-46", "year": 2022, "qno": 21, "text": "집단원 선별 과정에 관한 설명으로 옳지 않은 것은?", "options": ["① 공동지도자는 두 사람이 함께 개개인을 면담하는 것이 바람직하다.", "② 예비 집단원이 상담자에게 질문할 기회를 준다.", "③ 반사회성, 급성 정신병 등 위기에 처한 예비 집단원은 상담집단에서 제외한다.", "④ 상담자가 개인적으로 싫어하거나 전이 문제가 생길 것 같은 예비 집단원은 배제한다.", "⑤ 상담자가 집단원을 선별하기도 하지만 집단원도 집단 참여 여부를 결정할 수 있다."], "answer": 3, "expl": "상담자 개인의 호불호나 전이 가능성만으로 예비 집단원을 배제하는 것은 선별 기준으로 적절하지 않으며, 이런 사적 감정은 상담자 자신의 수퍼비전을 통해 다뤄야 한다."}, {"no": "21-47", "year": 2022, "qno": 22, "text": "( )에 들어갈 내용으로 옳은 것은?\n현실치료 집단상담자가 실수하는 것을 두려워하는 집단원 B에게 의도적으로 실수를 해보도록 지시하였다. 만약 B가 의도적으로 실수를 한다면 B는 실수를 할 것인지 말 것인지 ( ㄱ )할 수 있다는 것이고, 실수를 하지 않는다면 이는 실수를 ( ㄴ )할 수 있다는 것이다.", "options": ["① ㄱ: 통제, ㄴ: 해석", "② ㄱ: 해석, ㄴ: 직면", "③ ㄱ: 선택, ㄴ: 직면", "④ ㄱ: 선택, ㄴ: 통제", "⑤ ㄱ: 직면, ㄴ: 해석"], "answer": 3, "expl": "현실치료는 선택이론에 기반하므로 의도적 실수 지시는 실수 여부를 '선택'할 수 있음과, 실수를 하지 않는다면 실수를 '통제'할 수 있음을 체험하게 하는 역설적 기법이다."}, {"no": "21-48", "year": 2022, "qno": 23, "text": "다문화 청소년 집단상담에서 상담자의 윤리적 행동으로 옳은 것을 모두 고른 것은?\nㄱ. 상담자 자신의 성장과 치유를 위해 집단을 활용한다.\nㄴ. 집단원의 문화적 가치를 이해하기 위해 정보를 수집한다.\nㄷ. 민족성, 인종 등에 대한 상담자의 편견을 알아차린다.\nㄹ. 상담자와 집단원간의 문화 차이를 비교하고 토론한다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "집단원의 문화적 가치 정보 수집(ㄴ)과 상담자 자신의 편견 자각(ㄷ)은 윤리적 행동에 해당하며, 집단을 상담자 자신의 성장과 치유 목적으로 활용하는 것(ㄱ)은 윤리에 어긋난다."}, {"no": "21-49", "year": 2022, "qno": 24, "text": "집단상담 사전동의서에 포함될 내용으로 옳지 않은 것은?", "options": ["① 상담자의 자격과 이론적 지향", "② 집단 참여에 따르는 위험과 이점", "③ 비밀보장의 한계", "④ 집단 참가 결과로 집단원이 기대할 수 있는 것", "⑤ 집단의 암묵적 규범"], "answer": 4, "expl": "사전동의서에는 명시적이고 공개된 정보(자격, 위험과 이점, 비밀보장의 한계, 기대효과 등)가 포함되어야 하며, '암묵적 규범'이라는 표현 자체가 사전동의의 취지와 맞지 않는다."}, {"no": "21-50", "year": 2022, "qno": 25, "text": "다음에서 설명하는 심리극의 상담기법은?\n집단원에게 미래에 예상되는 가장 끔직한 실패 장면을 현재의 순간으로 가져와 시연하도록 한다.", "options": ["① 마술가게", "② 미래투사", "③ 가상질문", "④ 행동조성", "⑤ 자유연상"], "answer": 1, "expl": "미래에 예상되는 장면을 현재 시점으로 가져와 시연해보는 심리극 기법은 미래투사기법이다."}, {"no": "20-1", "year": 2021, "qno": 1, "text": "교류분석 집단상담의 생활자세에 관한 설명으로 옳지 않은 것은?", "options": ["① 생애 초기에 결정된다.", "② 생활자세는 교류분석으로 변화 가능하다.", "③ 자신에 대해 느끼고, 타인과 관계 맺는 방식을 결정한다.", "④ 자기 긍정 - 타인 긍정 자세는 패배자는 없고, 승리자만 있다.", "⑤ 자기 긍정 - 타인 부정 자세는 타인과 비교해서 자신이 무기력하다고 느끼는 우울한 사람의 자세이다."], "answer": 4, "expl": "타인과 비교해 자신이 무기력하다고 느끼는 우울한 자세는 자기부정-타인긍정 자세이며, 자기긍정-타인부정은 오히려 타인을 무시하고 자신을 우월하게 여기는 자세이므로 옳지 않다."}, {"no": "20-2", "year": 2021, "qno": 2, "text": "로저스(C. Rogers)의 인간중심 집단상담에서 변화의 필요충분조건으로 옳은 것을 모두 고른 것은?\nㄱ. 집단상담자와 집단원들 사이에 심리적 접촉이 이루어진다.\nㄴ. 집단상담자는 집단원들과의 관계에서 일치성을 보이고 통합되어 있다.\nㄷ. 집단상담자는 집단원들에게 조건적 긍정적 관심을 보인다.\nㄹ. 집단원은 의사소통과정에서 집단상담자의 공감적 이해를 지각하고 경험한다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "로저스는 무조건적 긍정적 관심을 필요충분조건으로 제시하였으므로 '조건적' 긍정적 관심이라는 ㄷ은 옳지 않고, 심리적 접촉·일치성·공감적 이해 지각(ㄱㄴㄹ)이 옳다."}, {"no": "20-3", "year": 2021, "qno": 3, "text": "학교에서 운영할 수 있는 성장집단에 적합하지 않은 청소년 집단원을 모두 고른 것은?\nㄱ. 가치관 혼란으로 고민하는 청소년\nㄴ. 반복적인 자살시도로 극도의 위기상황에 처한 청소년\nㄷ. PTSD로 심각한 플래쉬백(flashback)증상을 보이는 청소년\nㄹ. 급성 정신증이 있는 청소년", "options": ["① ㄱ", "② ㄱ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "자살 위기, 심각한 플래쉬백, 급성 정신증이 있는 청소년은 성장집단보다 개별적인 위기개입과 전문적 치료가 우선되어야 하므로 부적합하다."}, {"no": "20-4", "year": 2021, "qno": 4, "text": "다음의 개념이나 기법이 강조되는 집단상담 접근은?\n○ 지금 - 여기 ○ 접촉 ○ 알아차림 ○ 과장하기", "options": ["① 게슈탈트 집단상담", "② 교류분석 집단상담", "③ 개인심리 집단상담", "④ 인간중심 집단상담", "⑤ 정신분석 집단상담"], "answer": 0, "expl": "지금-여기, 접촉, 알아차림, 과장하기는 게슈탈트 집단상담의 핵심 개념과 기법이다."}, {"no": "20-5", "year": 2021, "qno": 5, "text": "심리극에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 모레노(J. Moreno)가 창안한 것이다.\nㄴ. 정화(catharsis) 그 자체가 목적이다.\nㄷ. 책상, 현관, 옷장 등의 사물은 보조자아가 될 수 없다.\nㄹ. 거울기법은 자신의 모습을 객관적으로 볼 수 있게 한다.\nㅁ. 무대에서 조명이나 음향기구는 필수적이다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄹ", "③ ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄷ, ㄹ, ㅁ"], "answer": 1, "expl": "심리극은 모레노가 창안하였고(ㄱ) 거울기법을 통해 자신을 객관적으로 볼 수 있게 하며(ㄹ), 정화는 목적이 아니라 과정에서 나타나는 효과이고, 사물도 보조자아로 활용될 수 있으며 조명·음향은 필수가 아니므로 ㄴㄷㅁ은 옳지 않다."}, {"no": "20-6", "year": 2021, "qno": 6, "text": "다음 대화에서 집단원이 보이는 얄롬(I. Yalom)의 치료적 요인은?\n집단상담자: 오늘 집단상담을 통해 알게 된 것이 무엇일까요?\n고수: 다른 사람도 나만큼 불행하거나 혼란스러운 성장배경을 갖고 있다는 것을 알았어요.", "options": ["① 희망", "② 수용", "③ 보편성", "④ 정화", "⑤ 이타심"], "answer": 2, "expl": "자신만 겪는 문제가 아니라 다른 사람도 비슷한 어려움을 겪는다는 것을 아는 것은 보편성(universality)의 치료적 요인에 해당한다."}, {"no": "20-7", "year": 2021, "qno": 7, "text": "다음 사례에서 청소년 집단상담자가 적용한 기법은?\n원빈: (걱정스러운 표정으로) 아빠와 엄마는 돈 때문에 자주 싸워요... 그런데 사실 저는 부모님 일에는 별로 관심이 없어요.\n집단상담자: 원빈이는 부모님 일에 관심이 없다고 말하면서도 부모님 싸움에 신경을 쓰고 있는 것 같구나.", "options": ["① 재진술", "② 차단", "③ 요약", "④ 직면", "⑤ 정보제공"], "answer": 3, "expl": "내담자의 말(관심 없다)과 실제 표정·행동(걱정, 신경씀) 사이의 불일치를 지적하는 것은 직면 기법이다."}, {"no": "20-8", "year": 2021, "qno": 8, "text": "현실치료 집단상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 스스로의 선택에 대해 책임진다.", "② 전이를 인정하지 않는다.", "③ 과거 경험과 기억선택에 초점을 둔다.", "④ 더 나은 선택을 하는 방법을 배운다.", "⑤ 적극적이고, 지시적이며, 교육적이다."], "answer": 2, "expl": "현실치료는 과거가 아닌 현재 행동과 선택에 초점을 두므로, 과거 경험과 기억선택에 초점을 둔다는 설명은 옳지 않다."}, {"no": "20-9", "year": 2021, "qno": 9, "text": "구조화 집단상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 특정 주제와 목표를 달성하기 위해 일련의 구체적인 활동으로 구성된다.\nㄴ. 집단상담자가 사전에 마련한 계획과 절차에 따라 진행하는 집단의 형태이다.\nㄷ. 비구조화 집단상담보다 집단상담자의 전문성이 더 요구된다.\nㄹ. 참만남 집단상담이 해당된다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "참만남 집단은 대표적인 비구조화 집단이며, 구조화 집단은 비구조화 집단보다 오히려 전문성 요구가 상대적으로 덜한 편이라 ㄷㄹ은 옳지 않고 ㄱㄴ이 옳다."}, {"no": "20-10", "year": 2021, "qno": 10, "text": "치료집단에 관한 설명으로 옳지 않은 것은?", "options": ["① 심각한 정도의 정서ㆍ행동문제 또는 정신장애 치료를 목적으로 한다.", "② 치료집단을 이끄는 사람을 집단치료자라고 한다.", "③ 집단역동을 이용하기 때문에 정신병리적 진단ㆍ평가를 활용하지 않는다.", "④ 공황장애 치료를 원하는 사람이 참가할 수 있다.", "⑤ 치료기간이 최대 수년에 이르기까지 장기적으로 진행된다."], "answer": 2, "expl": "치료집단은 정신병리적 진단과 평가를 바탕으로 운영되므로, 이를 활용하지 않는다는 설명은 옳지 않다."}, {"no": "20-11", "year": 2021, "qno": 11, "text": "집단상담자의 자질을 인간적 자질과 전문적 자질로 구분할 때, 인간적 자질을 모두 고른 것은?\nㄱ. 집단상담 계획 및 조직 능력 ㄴ. 상담・심리치료 이론에 관한 지식\nㄷ. 개인상담의 상담자 경험 ㄹ. 유머 감각\nㅁ. 자기수용", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄹ, ㅁ", "⑤ ㄷ, ㄹ, ㅁ"], "answer": 3, "expl": "유머감각과 자기수용은 인간적 자질에 해당하며, 계획·조직 능력·이론적 지식·개인상담 경험은 전문적 자질에 해당한다."}, {"no": "20-12", "year": 2021, "qno": 12, "text": "다음 사례에서 청소년 집단상담자가 적용한 기법은?\n집단상담자: (나영이를 보면서) 고수가 자기를 무시하는 아빠에 관한 이야기를 했을 때, 나영이는 눈물을 흘리면서 고수를 위로해주고 빨리 고통을 덜어주려고 애쓰는 것처럼 보여요. 어쩌면 나영이가 어릴 때 겪었던 아빠와의 힘들었던 기억이 되살아날 것에 대한 두려움의 표현이 아닌가 하는 생각이 듭니다.", "options": ["① 재진술", "② 요약", "③ 직면", "④ 정보제공", "⑤ 해석"], "answer": 4, "expl": "드러나지 않은 무의식적 의미와 원인을 상담자가 설명하는 것은 해석 기법에 해당한다."}, {"no": "20-13", "year": 2021, "qno": 13, "text": "문제 상황에 대처하는 집단상담자의 행동으로 옳지 않은 것은?", "options": ["① 집단원의 불평이 습관적이거나 만성적이라면 불평할 때마다 충고를 한다.", "② 적대적인 집단원에게는 그 행동이 다른 집단원에게 미치는 영향에 대해 이야기하고, 원하는 것을 탐색하여 직접 표현하게 한다.", "③ 지속적으로 침묵하는 집단원에게는 다른 집단원이 자신의 침묵을 오해할 가능성도 있다는 것을 알려준다.", "④ 질문공세를 하는 집단원에게는 질문하기 전 마음속의 생각과 느낌에 대해 이야기하도록 요청한다.", "⑤ 사실적 이야기를 늘어놓는 집단원에게는 그 경험에서 야기된 감정을 공감적 이해를 통해 현재형으로 표현하도록 한다."], "answer": 0, "expl": "습관적으로 불평하는 집단원에게 매번 충고하는 것은 오히려 의존성을 강화하므로, 불평 이면의 감정과 욕구를 탐색하도록 돕는 것이 바람직하다."}, {"no": "20-14", "year": 2021, "qno": 14, "text": "공동상담자가 청소년 집단상담을 진행할 때의 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 집단계획, 목표, 세부목표, 규범에 대해 협의․결정한다.\nㄴ. 집단원들은 공동상담자의 상호작용을 보면서 역할모델을 배울 수 있다.\nㄷ. 남성 - 여성 공동상담자의 경우에만 부모에 대한 전이를 다룰 수 있다.\nㄹ. 공동상담자는 집단 회기 후에 만남을 하지 않는다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "전이는 공동상담자의 성별 조합과 무관하게 다룰 수 있고 회기 후 만남(디브리핑)이 필요하므로 ㄷㄹ은 옳지 않으며, 사전협의(ㄱ)와 역할모델링(ㄴ)이 옳다."}, {"no": "20-15", "year": 2021, "qno": 15, "text": "다음의 집단 유형은?\n○ 대 상: 고3 남학생 10명\n○ 내 용: 대학진학을 앞둔 학생들에게 진로탐색을 위해 체계화된 프로그램 실시\n○ 기 간: 2021년 8월 13일 ∼ 8월 14일(2일 동안 총 12시간)", "options": ["① 구조화된 동질적 구성의 집중적 집단", "② 구조화된 이질적 구성의 집중적 집단", "③ 비구조화된 동질적 구성의 집중적 집단", "④ 비구조화된 이질적 구성의 분산적 집단", "⑤ 구조화된 동질적 구성의 분산적 집단"], "answer": 0, "expl": "체계화된 프로그램(구조화), 동일 학년·성별(동질적 구성), 짧은 기간에 집중적으로 진행(집중적 집단)되므로 구조화된 동질적 구성의 집중적 집단이다."}, {"no": "20-16", "year": 2021, "qno": 16, "text": "청소년 집단상담의 사전 동의에 관한 설명으로 옳지 않은 것은?", "options": ["① 자발적인 집단원에게도 사전동의를 받아야 한다.", "② 집단상담자의 경력, 이론적 지향, 도움제공이 가능한 문제를 알린다.", "③ 집단참여에 따른 잠재적 이익과 위험에 대해서 알린다.", "④ 폐쇄집단에서는 집단을 떠날 권리가 없음을 알린다.", "⑤ 심리검사, 진단 및 상담 기록에 대해 알 권리가 있음을 알린다."], "answer": 3, "expl": "집단원은 폐쇄집단이라도 언제든 집단을 떠날 권리가 있으므로, 떠날 권리가 없다고 알리는 것은 옳지 않다."}, {"no": "20-17", "year": 2021, "qno": 17, "text": "아들러(A. Adler) 집단상담의 단계를 순서대로 나열한 것은?\nㄱ. 협력, 평등주의, 상호존중에 기초한 좋은 치료적 관계를 설정한다.\nㄴ. 자신이 희망하는 목표에 부합하는 새로운 선택과 행동을 한다.\nㄷ. 삶의 과제를 탐색하고 가족구도와 초기기억 분석을 한다.\nㄹ. 생활양식을 통찰하고 현재 기능하는 자신의 모습을 이해한다.", "options": ["① ㄱ - ㄷ - ㄹ - ㄴ", "② ㄱ - ㄹ - ㄷ - ㄴ", "③ ㄴ - ㄷ - ㄹ - ㄱ", "④ ㄷ - ㄱ - ㄹ - ㄴ", "⑤ ㄷ - ㄹ - ㄱ - ㄴ"], "answer": 0, "expl": "아들러 집단상담은 관계형성(ㄱ)-탐색·분석(ㄷ)-통찰(ㄹ)-재정향(ㄴ) 순서로 진행된다."}, {"no": "20-18", "year": 2021, "qno": 18, "text": "정신분석 집단상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 슬랩손(S. Slavson)은 집단상담자의 기능을 지도적 기능, 자극적 기능, 확충적 기능, 해석적 기능으로 구분한다.", "② 볼프(A. Wolf)는 집단상담자가 자신을 향한 집단원들의 전이행동을 처리할 수 있어야 한다고 본다.", "③ 집단에서 과거를 재경험하여 무의식적 갈등을 해소할 수 있는 기회를 제공한다.", "④ 궁극적인 목표는 내담자의 신경증적 갈등을 경감시켜 인격적 성숙을 도모하는 것이다.", "⑤ 어린 시절의 습관적인 행동이 집단에서 반복적으로 드러나는 것은 반동형성의 한 형태이다."], "answer": 4, "expl": "어린 시절의 습관적 행동패턴이 집단 상황에서 반복적으로 드러나는 것은 반동형성이 아니라 전이(transference)에 해당하므로 옳지 않다."}, {"no": "20-19", "year": 2021, "qno": 19, "text": "다음 사례에서 집단원 동호가 하고 있는 문제행동은?\n정희: (울먹이면서) 어릴 때부터 제일 친한 동네친구가 이번에 외국으로 이민을 가게 되었어요.\n동호: 아...나도 그런 적이 있는데 너무 걱정하지 마세요. 모든 것이 다 잘 될 거예요.", "options": ["① 산만한 집단원", "② 구원하는 집단원", "③ 부정적인 집단원", "④ 소극적인 집단원", "⑤ 적대적인 집단원"], "answer": 1, "expl": "상대의 고통스러운 감정을 충분히 다루기 전에 서둘러 안심시키고 위로하려는 태도는 구원하는 집단원의 전형적 문제행동이다."}, {"no": "20-20", "year": 2021, "qno": 20, "text": "청소년 집단상담 평가를 위한 구성요소를 모두 고른 것은?\nㄱ. 평가주체 ㄴ. 평가대상 ㄷ. 평가목표 ㄹ. 평가과정", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "평가주체, 평가대상, 평가목표, 평가과정은 모두 집단상담 평가를 구성하는 요소이다."}, {"no": "20-21", "year": 2021, "qno": 21, "text": "청소년을 위한 집단 운영에 관한 설명으로 옳지 않은 것은?", "options": ["① 청소년의 흥미유발을 위해 다양한 매체와 도구를 활용할 수 있다.", "② 청소년기의 특성인 자율성을 충족시키기 위해 집단상담자와 집단원이 공동상담자가 된다.", "③ 집단목표 설정은 청소년기 발달특성을 고려한다.", "④ 치료집단을 운영할 때는 법적 보호자의 참가 동의서를 받는다.", "⑤ 강제에 의한 비자발적인 참여를 하게 되면 집단에 대한 저항감이 클 수 있다."], "answer": 1, "expl": "집단원은 상담자의 역할을 대신하는 공동상담자가 될 수 없으며, 자율성 충족은 다른 방식으로 이루어져야 하므로 옳지 않다."}, {"no": " function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

let currentYear = 'all';

let answeredMap = {};

function selectOption(qIdx, optIdx){
  if(answeredMap[qIdx] !== undefined) return;
  answeredMap[qIdx] = optIdx;
  renderQuestions();
}

function setYear(y){
  currentYear = y;
  renderPills();
  renderQuestions();
}

function renderPills(){
  const years = [...new Set(QUESTIONS.map(q => q.year))].sort((a,b) => b-a);
  const pillsEl = document.getElementById('yearPills');
  let html = `<button class="pill ${currentYear==='all'?'active':''}" onclick="setYear('all')">전체</button>`;
  years.forEach(y => {
    html += `<button class="pill ${currentYear===y?'active':''}" onclick="setYear(${y})">${y}</button>`;
  });
  pillsEl.innerHTML = html;
}

function renderQuestions(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  const list = currentYear === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.year === currentYear);
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const picked = answeredMap[qIdx];
    const isAnswered = picked !== undefined;
    const isVoid = q.answer < 0;
    const isCorrect = isAnswered && !isVoid && picked === q.answer;

    const card = document.createElement('div');
    card.className = 'card';
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt-btn';
      if(isAnswered){
        if(isVoid && i === picked) cls += ' neutral-picked';
        if(!isVoid && i === q.answer) cls += ' correct-reveal';
        if(!isVoid && i === picked && picked !== q.answer) cls += ' wrong-picked';
      }
      const disabled = isAnswered ? 'disabled' : '';
      optsHtml += `<button class="${cls}" ${disabled} onclick="selectOption(${qIdx},${i})">${opt}</button>`;
    });
    const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
    let markHtml = '';
    if(isAnswered){
      if(isVoid){
        markHtml = `<div class="feedback-mark">📌 전항 정답 처리된 문항입니다</div>`;
      } else if(isCorrect){
        markHtml = `<div class="feedback-mark">✅ 정답입니다!</div>`;
      } else {
        markHtml = `<div class="feedback-mark wrong">❌ 오답입니다. 정답은 ${q.answer+1}번입니다.</div>`;
      }
    }
    card.innerHTML = `
      <div class="qnum">문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      <div class="feedback${isAnswered ? ' open' : ''}">
        ${markHtml}
        ${expl}
      </div>
    `;
    area.appendChild(card);
  });
}

function render(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
  renderPills();
  renderQuestions();
}

render();
</script>
