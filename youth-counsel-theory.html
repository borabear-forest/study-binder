<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청소년상담의 이론과 실제 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --wrong-bg:#f7e9e7;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .toolbar{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .btn{
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:8px 14px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .btn.active{color:var(--accent-dark);font-weight:600;}
  .progress-bar{
    height:8px;
    border-radius:6px;
    background:var(--shadow-dark);
    overflow:hidden;
    margin-bottom:8px;
    box-shadow:inset 2px 2px 4px var(--shadow-dark);
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{font-size:12px;color:var(--sub);margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{
    padding:3px 0;
    line-height:1.6;
  }
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .opt{
    text-align:left;
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
    transition:background .15s ease;
    white-space:pre-wrap;
  }
  .opt:hover{background:#eef1ee;}
  .opt.correct{background:var(--right-bg);color:var(--accent-dark);font-weight:600;box-shadow:none;}
  .opt.wrong{background:var(--wrong-bg);color:var(--wrong);font-weight:600;box-shadow:none;}
  .opt:disabled{cursor:default;}
  .opt:disabled:hover{background:var(--bg-base);}
  .opt.correct:disabled:hover{background:var(--right-bg);}
  .opt.wrong:disabled:hover{background:var(--wrong-bg);}
  .feedback{
    margin-top:12px;
    font-size:13px;
    font-weight:600;
  }
  .feedback.correct-mark{color:var(--accent-dark);}
  .feedback.wrong-mark{color:var(--wrong);}
  .explain{
    margin-top:8px;
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
  .empty{
    text-align:center;
    color:var(--sub);
    padding:60px 0;
    font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">‹ 목록으로</a>
  <h1>청소년상담의 이론과 실제</h1>
  <div class="meta-line" id="metaLine"></div>
  <div class="toolbar">
    <button class="btn active" id="btn-all" onclick="setMode('all')">전체보기</button>
    <button class="btn" id="btn-wrong" onclick="setMode('wrong')">오답만 보기</button>
    <button class="btn" onclick="resetAll()">초기화</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div id="quizArea"></div>
</div>
<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "예방적인 측면에서의 청소년상담 목표에 해당하지 않는 것은?", "options": ["① 생활지도", "② 정책참여", "③ 정신건강 증진", "④ 주호소 문제 해결", "⑤ 상담프로그램 개발"], "answer": 3, "expl": "예방적 청소년상담의 목표는 생활지도, 정신건강 증진, 상담프로그램 개발, 정책참여 등을 포함하지만, '주호소 문제 해결'은 이미 발생한 문제에 대한 개입(치료적 목표)에 해당해 예방적 목표와는 결이 다르다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "상담 초기단계에 이루어지는 상담구조화에 관한 내용으로 옳지 않은 것은?", "options": ["① 상담자와 내담자의 역할을 명료화한다.", "② 상담 진행과정에 대해 합의하는 과정이다.", "③ 상담자는 비밀보장의 의미와 한계에 대한 정보를 안내한다.", "④ 상담시간에 오지 못할 경우 연락하는 방법에 대해 상의한다.", "⑤ 내담자가 상담으로부터 얻을 수 있는 이익과 성과에 대한 보장을 한다."], "answer": 4, "expl": "상담구조화는 역할, 진행방식, 비밀보장 한계, 연락방법 등 상담의 틀을 안내하는 과정이며, 이익·성과를 '보장'하는 것은 구조화의 범위를 벗어난다. 상담 효과는 약속할 수 있는 것이 아니다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "상담 중기단계에 나타난 내담자의 저항에서 청소년상담자가 고려해야 할 내용이 아닌 것은?", "options": ["① 내면의 갈등을 억압하기 위한 것인지 살펴본다.", "② 상담에 대한 수동적 거부 행동은 아닌지 점검한다.", "③ 변화를 시도하는 과정에서 걱정이나 답답함이 있는지 탐색한다.", "④ 자연스러운 현상으로 보고 지금-여기에서 다루기보다 종결단계로 미룬다.", "⑤ 내담자의 작은 변화도 민감하게 지각하고, 상담에 대한 태도와 생각과 감정을 다룬다."], "answer": 3, "expl": "저항은 지금-여기에서 즉시 다루어야 할 상담 자료이며, 종결단계로 미루는 것은 상담 진행을 방해할 수 있어 적절한 개입이 아니다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "현실치료의 WDEP 모델에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 희망(Want): 내담자가 원하는 것이 무엇인지 인식하도록 한다.\nㄴ. 행위(Doing): 과거의 행동에 초점을 맞추도록 한다.\nㄷ. 평가(Evaluation): 자신이 원하는 것을 충족하는데 현재 행동이 효과적인지를 평가하도록 한다.\nㄹ. 계획(Planning): 소망과 욕구를 충족시키는 새로운 행동의 계획을 돕는다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄱ, ㄷ, ㄹ"], "answer": 4, "expl": "WDEP에서 D(Doing)는 과거가 아니라 현재의 전행동(현재 하고 있는 행동)에 초점을 맞춘다. 따라서 ㄴ은 틀렸고, ㄱ·ㄷ·ㄹ이 옳은 설명이다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "실존주의 상담이론의 주요개념이 아닌 것은?", "options": ["① 고독", "② 자유", "③ 보상", "④ 무의미", "⑤ 죽음"], "answer": 2, "expl": "실존주의 상담의 주요개념은 자유와 책임, 죽음, 고독, 무의미, 실존적 불안 등이며 '보상'은 아들러 개인심리학 등에서 다루는 개념으로 실존주의의 핵심 개념이 아니다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "인지치료의 상담기법과 적용의 연결로 옳은 것을 모두 고른 것은?\nㄱ. 특별한 의미 이해하기: 우울한 내담자가 사용하는 '우울한', '죽고 싶은' 등의 모호한 단어의 의미를 질문한다.\nㄴ. 절대성에 도전하기: '친구들은 나보다 똑똑해요'와 같은 표현에 대해 질문하고 도전한다.\nㄷ. 장점과 단점 목록 만들기: 앞으로 다가올 사건에 대해 시연하도록 한다.\nㄹ. 재귀인하기: 일어날 가능성이 적은 경우, '가정(what-if) 기법'으로 두려움을 다룬다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄹ"], "answer": 0, "expl": "장점과 단점 목록 만들기는 '시연'이 아니라 특정 신념이나 행동의 장단점을 비교·평가하는 기법이다. 앞으로의 사건을 시연하는 것은 다른 인지행동기법(예: 역할연습)에 해당해 ㄷ은 틀렸다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "지역사회를 기반으로 한 청소년상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 위기 청소년을 돕기 위한 청소년동반자 프로그램이 있다.", "② 청소년폭력 예방을 위한 또래상담 프로그램이 있다.", "③ 청소년상담 1388을 통해 모바일상담이 가능하다.", "④ 시ㆍ도 청소년상담복지센터는 2025년 기준 25개의 시ㆍ도에 설치ㆍ운영하고 있다.", "⑤ 청소년상담복지센터는「청소년복지 지원법」에 따라 설치ㆍ운영하고 있다."], "answer": 3, "expl": "시·도 청소년상담복지센터는 전국 17개 시·도에 설치·운영되고 있어 '25개'라는 수치는 사실과 다르다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "행동주의 상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 내담자의 부적응 행동수정을 목표로 한다.", "② 강화와 소거 등의 원리를 사용하여 내담자의 행동을 수정한다.", "③ 부적 강화는 어떤 행동의 빈도를 감소시키기 위한 것이다.", "④ 부적응 행동이 습득되고 유지되는 과정을 학습이론에 근거하여 설명한다.", "⑤ 내담자의 문제행동에 대한 분석이 이루어지면 내담자와 함께 구체적인 상담목표를 설정한다."], "answer": 2, "expl": "부적 강화는 불쾌 자극을 제거함으로써 행동의 빈도를 '증가'시키는 것이며, 행동 빈도를 감소시키는 것은 처벌(벌)의 정의에 해당한다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "다음 사례에서 상담자가 종결단계에 질문하고 있는 내용에 해당하는 것은?\n○ 내담자: 처음에는 친구들과 불편해서 상담에 왔던 것 같아요.\n○ 상담자: 처음 상담에 온 어려움이 얼마나 개선되었는지 1점에서 10점까지 점수를 준다면, 몇 점을 줄 수 있나요?", "options": ["① 상담성과 다루기", "② 이별 감정 다루기", "③ 정보 제공하기", "④ 행동 계획하기", "⑤ 추수상담하기"], "answer": 0, "expl": "1~10점 척도로 상담 초기 대비 개선 정도를 평가하도록 묻는 것은 상담의 성과(변화 정도)를 확인하는 개입으로, 종결단계의 '상담성과 다루기'에 해당한다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "청소년 내담자의 특성으로 옳지 않은 것은?", "options": ["① 호르몬의 변화로 급격한 신체적 성숙이 이루어진다.", "② 자신의 신체나 외모에 대해 사회문화적 기준을 고려한다.", "③ 자아중심성이 두드러진다.", "④ 친구관계에서 또래 동조성이 낮아진다.", "⑤ 인지적 발달에 따라 형식적 조작능력이 형성된다."], "answer": 3, "expl": "청소년기는 또래관계의 영향력이 커지면서 또래 동조성이 오히려 '높아지는' 시기이므로 '낮아진다'는 설명은 옳지 않다."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "합리정서행동상담에서 ABCDE 모형을 순서대로 옳게 나열한 것은?", "options": ["① 사건 - 신념체계 - 논박 - 결과 - 효과", "② 신념체계 - 사건 - 결과 - 논박 - 효과", "③ 신념체계 - 사건 - 논박 - 효과 - 결과", "④ 사건 - 신념체계 - 결과 - 논박 - 효과", "⑤ 사건 - 신념체계 - 논박 - 효과 - 결과"], "answer": 3, "expl": "ABCDE는 사건(A)-신념체계(B)-결과(C)-논박(D)-효과(E) 순서로 진행된다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "아들러(A. Adler)가 제시한 생활양식에 관한 내용으로 옳은 것은?", "options": ["① 생활양식은 개인의 허구적 결정론을 이해하는 것을 말한다.", "② 획득형은 사회적 관심이 높아 타인과 협동할 수 있는 유형이다.", "③ 생활양식은 대부분 9 ∼ 10세 정도에 형성된다.", "④ 지배형은 자신의 욕구를 다른 사람에게 의존하여 충족하는 유형이다.", "⑤ 회피형은 삶의 문제에 대해 자신감이 없어 매사에 소극적인 유형이다."], "answer": 4, "expl": "회피형은 열등감과 실패에 대한 두려움 때문에 문제 해결 시도 자체를 피하고 매사에 소극적인 태도를 보이는 생활양식 유형이다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "인터넷 및 스마트폰 과의존 청소년의 개인심리적 특성이 아닌 것은?", "options": ["① 높은 우울감", "② 높은 자기통제력", "③ 높은 인정에 대한 욕구", "④ 낮은 자존감", "⑤ 높은 자극추구 성향"], "answer": 1, "expl": "인터넷·스마트폰 과의존 청소년은 대체로 자기통제력이 '낮은' 경향을 보이므로 '높은 자기통제력'은 특성으로 옳지 않다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "다음에서 설명하고 있는 정신분석 상담의 기법은?\n○ 이 기법의 과정은 흔히 양파껍질에 비유된다.\n○ 내담자가 상담과정에서 느낀 통찰을 일상생활에 실제로 적용해서 내담자에게 변화가 일어나도록 하는 과정이다.\n○ 상담자는 변화를 위한 내담자의 노력에 대하여 적절한 강화를 해주어야 한다.", "options": ["① 전이", "② 저항", "③ 훈습", "④ 해석", "⑤ 자유연상"], "answer": 2, "expl": "통찰을 일상에 적용하며 반복적으로 강화해 나가는 과정, 양파껍질에 비유되는 점진적 변화 과정은 훈습(working-through)의 특징이다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "로저스(C. Rogers)의 '충분히 기능하는 사람'에 관한 특징이 아닌 것은?", "options": ["① 자신에 대한 신뢰", "② 경험에 대한 개방성", "③ 창의성", "④ 사회적 가치나 규범에 따른 결정", "⑤ 실존적 삶에 대한 가치부여"], "answer": 3, "expl": "충분히 기능하는 사람은 자신의 경험과 유기체적 가치화 과정을 신뢰하며 살아가는 사람으로, 외부의 사회적 가치나 규범에 얽매여 결정하는 것은 오히려 충분히 기능하지 못하는 특징에 가깝다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "상담이론과 기법의 연결로 옳은 것은?", "options": ["① 게슈탈트 상담 - 빈 의자 기법, 과장하기", "② 현실치료 - 직면, 뜨거운 의자", "③ 교류분석 - 과장하기, 체계적 둔감법", "④ 행동치료 - 스프에 침 뱉기, 마치 ∼인 것처럼 행동하기", "⑤ 개인심리학 - 타임아웃, 홍수법"], "answer": 0, "expl": "빈 의자 기법과 과장하기는 게슈탈트 상담의 대표 기법이다. 나머지 보기들은 이론-기법 연결이 잘못되어 있다(예: 뜨거운 의자는 현실치료가 아닌 심리극·집단상담 기법에 가깝다)."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "다음에서 설명하고 있는 실존주의 상담 기법은?\n○ 예기불안의 악순환에서 벗어나기 위해 사용된다.\n○ 내담자에게 문제가 되는 행동 또는 증상을 무시하도록 한다.\n○ 내담자의 자발성과 활동성을 회복시켜 주려는 의도로 사용된다.", "options": ["① 역설적 의도", "② 탈숙고", "③ 단추누르기", "④ 머물러 있기", "⑤ 각본분석"], "answer": 1, "expl": "역설적 의도는 프랭클의 실존주의 상담기법으로, 증상 자체를 과장하거나 의도적으로 원하도록 함으로써 예기불안의 악순환을 끊고 자발성을 회복시키는 기법이다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "해결중심단기 상담에서 '메시지' 전달의 기능이 아닌 것은?", "options": ["① 교육적 기능", "② 하향 화살표의 기능", "③ 정상화 기능", "④ 과제의 기능", "⑤ 새로운 의미의 기능"], "answer": 1, "expl": "해결중심단기상담에서 메시지의 기능은 교육적 기능, 정상화 기능, 과제의 기능, 새로운 의미 부여 기능 등이며 '하향 화살표 기법'은 인지치료의 기법이지 메시지 전달 기능이 아니다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "다음 사례에서 사용된 상담자의 상담기술은?\n○ 내담자: 저는 엄마가 말끝마다 공부, 공부해라 해서 너무 싫어요.\n○ 상담자: 엄마가 너무 공부만 중요하다고 하시는 것 같아서 속상하구나.", "options": ["① 자기개방", "② 직면", "③ 반영", "④ 정보제공", "⑤ 긍정화"], "answer": 2, "expl": "내담자의 말에 담긴 정서를 상담자의 언어로 되돌려주는 것은 반영(reflection)의 대표적 예이다."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "청소년상담사 윤리강령에 명시된 '다양성 존중'에 해당하는 것은?", "options": ["① 청소년상담사는 자신의 개인적 가치, 태도, 신념, 행위를 자각하고 내담자에게 자신의 가치를 강요하지 않는다.", "② 청소년상담사는 내담자에게 상담의 목표와 한계, 상담료 지불 방법 등을 명확히 알려야 한다.", "③ 청소년상담사는 내담자의 복지를 증진하고 존엄성을 존중하는 것에 최우선 가치를 둔다.", "④ 청소년상담사는 자기의 능력 및 기법의 한계를 인식하고, 전문적 기준에 위배되는 활동을 하지 않도록 한다.", "⑤ 청소년상담사는 비밀보장의 의미와 한계에 대하여 청소년 내담자의 발달단계에 적합한 용어로 알기 쉽게 설명해 주어야 한다."], "answer": 0, "expl": "다양성 존중은 상담자가 자신의 개인적 가치관을 자각하고 내담자에게 강요하지 않는 것을 의미하며, 이는 윤리강령상 다양성 존중 조항의 핵심 내용이다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "다음 사례에서 청소년 내담자가 사용한 방어기제는?\n아빠가 시험기간인데 게임만 너무 많이 한다고 혼내셨어요. 게임하고 공부하려고 했는데, 너무 속상했어요. 마침 거실에서 놀고 있는 동생이 보여서 머리를 한 대 때렸어요.", "options": ["① 전치(displacement)", "② 퇴행(regression)", "③ 내사(introjection)", "④ 반동형성(reaction formation)", "⑤ 합리화(rationalization)"], "answer": 0, "expl": "화가 난 대상(아빠)에게 직접 표현하지 못하고 만만한 대상(동생)에게 감정을 옮겨 표출한 것은 전치(displacement)의 전형적인 예이다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "다음은 교류분석 상담의 주요개념에 관한 내용이다. ( )에 들어갈 용어로 옳은 것은?\n( ㄱ )는 한 사람이 메시지를 보낼 때 상대방에게서 기대했던 자아상태나 기능에서 반응이 오는 것을 말한다. ( ㄴ )는 메시지를 보낸 사람이 기대했던 자아상태나 기능에서 반응이 오지 않고 다른 자아상태나 기능에서 반응할 때를 말한다. ( ㄷ )는 두 가지 종류의 메시지가 동시에 전달된다.", "options": ["① ㄱ: 이면교류, ㄴ: 교차교류, ㄷ: 상보교류", "② ㄱ: 이면교류, ㄴ: 교차교류, ㄷ: 잠재적 교류", "③ ㄱ: 상보교류, ㄴ: 교차교류, ㄷ: 이면교류", "④ ㄱ: 상보교류, ㄴ: 이면교류, ㄷ: 교차교류", "⑤ ㄱ: 상보교류, ㄴ: 잠재적 교류, ㄷ: 교차교류"], "answer": 2, "expl": "기대한 반응이 그대로 돌아오는 것은 상보교류, 기대와 다른 자아상태에서 반응이 오는 것은 교차교류, 두 가지 메시지가 동시에 전달되는 것은 이면교류이다."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "청소년 매체상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 전화상담은 즉시성과 접근성의 이점이 있다.\nㄴ. 전화상담은 대면상담에 비해 상담지속성이 보장된다.\nㄷ. 사이버상담은 대면상담에 비해 비언어적 단서 전달의 제약을 받는다.\nㄹ. 사이버상담은 상담자가 상담프로그램 시스템 사용방법에 대한 정보제공능력을 갖추어야 한다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "전화상담은 접근성과 즉시성은 있으나 익명성과 단발성으로 인해 대면상담보다 상담의 지속성이 보장되기 어려워 ㄴ은 옳지 않다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "다음 사례에서 상담자가 사용한 상담기술에 관한 설명으로 옳은 것은?\n○ 내담자: 아빠가 어떤 때에는 정말 잘해 주시다가, 어떤 때에는 무섭게 대하세요. 아빠 비위를 도저히 맞출 수가 없어요.\n○ 상담자: 아빠 마음이 자주 바뀌어서 진짜 마음이 어떤 것인지 모르겠다는 것이구나.", "options": ["① 특정한 주제에 관한 객관적 자료 또는 사실적 정보에 대해 설명해 주는 기술이다.", "② 내담자의 진술 중 핵심내용을 상담자의 언어로 바꾸어 되풀이해 주는 기술이다.", "③ 내담자의 언어적 진술과 비언어적 행동의 상충되는 부분을 상담자의 말로 되돌려 주는 기술이다.", "④ 비유나 동화 형태로 제시하여 내담자의 자기인식을 돕고 문제를 재구성하는 기술이다.", "⑤ 내담자가 상담과정 중에 표현하는 어떤 경험이나 생각, 감정과 관련되는 상담자의 경험을 내담자에게 드러내는 기술이다."], "answer": 1, "expl": "언어적 진술(비위를 맞출 수 없다)과 그 이면의 감정적 혼란을 상담자의 말로 되돌려주며 상충되는 부분을 짚어주는 것은 명료화/반영을 포함한 직면적 반영기술에 해당한다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "지역사회 청소년통합지원체계(청소년안전망)의 필수연계기관으로 옳은 것을 모두 고른 것은?\nㄱ. 지방고용노동청 ㄴ. 경찰서 ㄷ. 학교밖청소년지원센터 ㄹ. 청소년복지시설", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄹ", "③ ㄴ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "청소년안전망(청소년통합지원체계)의 필수연계기관은 경찰서, 학교밖청소년지원센터, 청소년복지시설 등이며 지방고용노동청은 필수연계기관에 해당하지 않는다."}, {"no": "23-1", "year": 2024, "qno": 1, "text": "청소년상담자의 역할로 옳지 않은 것은?", "options": ["① 갈등해결을 위한 중재자", "② 문제해결을 위한 훈련가", "③ 상담 관련 전문지식의 자문가", "④ 내담자의 결정을 대신하는 구원자", "⑤ 인간발달과 정신건강의 촉진자"], "answer": 3, "expl": "청소년상담자는 내담자가 스스로 결정하도록 돕는 조력자이지, 내담자의 결정을 대신 내려주는 구원자 역할을 해서는 안 된다."}, {"no": "23-2", "year": 2024, "qno": 2, "text": "화상상담의 단점으로 옳은 것을 모두 고른 것은?\nㄱ. 비언어적 단서를 포착하고 활용하는 데 제약이 따른다.\nㄴ. 내담자의 갑작스러운 돌발 상황에 신속하게 대처하기 어렵다.\nㄷ. 상담자와 내담자의 사생활 침해, 개인정보 유출에 취약하다.\nㄹ. 상담실 이외의 공간에서 상담이 이루어지므로 내담자가 방어적 태도를 취하기 쉽다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "화상상담은 비언어적 단서 포착 제약, 돌발상황 대처의 어려움, 정보유출 취약성, 상담실 밖 공간으로 인한 방어적 태도 등 여러 단점을 모두 가진다."}, {"no": "23-3", "year": 2024, "qno": 3, "text": "게슈탈트 상담에 관한 설명으로 옳은 것은?", "options": ["① 상담목표는 내담자의 증상을 제거하는 데 있다.", "② 내파층은 부모나 환경의 기대에 따라 행동하며 살아가는 단계이다.", "③ 뜨거운 의자(hot seat)는 새로운 방식을 실험해 보도록 하는 기법이다.", "④ 반전은 감각을 둔화시켜 자신 및 환경과의 접촉을 약화시키는 접촉경계장애이다.", "⑤ 알아차림 접촉 주기는 욕구출현-알아차림-에너지 동원-행동-접촉-물러남 과정으로 반복된다."], "answer": 4, "expl": "게슈탈트 상담의 알아차림-접촉 주기는 욕구출현→알아차림→에너지 동원→행동→접촉→물러남의 순환 과정으로 설명된다."}, {"no": "23-4", "year": 2024, "qno": 4, "text": "자해 청소년에 대한 상담개입 방법으로 옳지 않은 것은?", "options": ["① 마음챙김", "② 바디워크(bodywork)", "③ 대인관계 기술", "④ 정서조절 기술", "⑤ 변증법적 행동치료"], "answer": 1, "expl": "자해 청소년 개입에는 마음챙김, 대인관계기술, 정서조절기술, 변증법적행동치료(DBT)가 대표적으로 활용되며, 신체 접촉 중심의 바디워크는 자해개입의 표준 기법으로 보기 어렵다."}, {"no": "23-5", "year": 2024, "qno": 5, "text": "다음 사례에서 상담자가 공통적으로 적용한 상담이론은?", "options": ["① 개인심리학", "② 교류분석", "③ 현실치료", "④ 정신분석", "⑤ 실존주의 상담"], "answer": 0, "expl": "가장 어린 시절의 기억(초기기억) 회상과 마치 ~인 것처럼 행동하기 기법은 모두 아들러의 개인심리학 기법이다."}, {"no": "23-6", "year": 2024, "qno": 6, "text": "다음 사례의 상담자가 사용한 상담기법의 적용 시점으로 옳은 것은?", "options": ["① 상담의 주제나 초점을 이동하고자 할 때", "② 내담자의 문제해결을 위한 정보가 필요할 때", "③ 내담자 문제의 원인을 설명하고자 할 때", "④ 내담자의 사고나 감정, 행동 등을 탐색하고자 할 때", "⑤ 내담자의 감정을 변별하고 표현할 수 있도록 돕고자 할 때"], "answer": 1, "expl": "꿈드림센터와 같은 기관정보를 알려주는 것은 내담자의 문제해결에 필요한 정보를 제공하는 개입에 해당한다."}, {"no": "23-7", "year": 2024, "qno": 7, "text": "다음 사례에 대한 행동적 개입으로 옳지 않은 것은?", "options": ["① 재결단작업", "② 행동계약", "③ 모델링", "④ 이완훈련", "⑤ 체계적 둔감법"], "answer": 0, "expl": "재결단작업은 교류분석(TA)의 기법으로 행동적 개입에 해당하지 않으며, 행동계약·모델링·이완훈련·체계적 둔감법은 대표적인 행동적 개입이다."}, {"no": "23-8", "year": 2024, "qno": 8, "text": "사례개념화에 관한 설명으로 옳지 않은 것은?", "options": ["① 사례개념화는 내담자에 대한 잠정적인 가설이다.", "② 내담자에 대한 정보가 추가될 때마다 수정, 보완할 수 있다.", "③ 상담자의 전문적 소견이므로 이론적, 추상적 용어를 사용한다.", "④ 사례개념화는 구체적인 상담개입의 방향을 제시해주는 역할을 한다.", "⑤ 사례개념화의 목적은 내담자의 문제를 해결하기 위한 효과적인 계획을 세우는 데 있다."], "answer": 2, "expl": "사례개념화는 이해관계자(내담자, 수퍼바이저 등)와 소통 가능해야 하므로 지나치게 이론적·추상적인 용어만 사용하는 것은 바람직하지 않다."}, {"no": "23-9", "year": 2024, "qno": 9, "text": "다음에서 설명하는 상담이론은?", "options": ["① 해결중심상담", "② 자아초월상담", "③ 수용전념치료", "④ 실존주의 상담", "⑤ 변증법적 행동치료"], "answer": 2, "expl": "심리적 유연성 증대, 경험회피와 인지적 융합을 문제의 원인으로 보는 것은 수용전념치료(ACT)의 핵심 개념이다."}, {"no": "23-10", "year": 2024, "qno": 10, "text": "상담기법에 관한 설명으로 옳지 않은 것은?", "options": ["① 경청은 내담자의 말과 행동에 집중해서 보고 듣는 것으로 내담자가 생각이나 감정을 자유롭게 표현하게 한다.", "② 감정반영은 내담자가 표현한 감정을 상담자가 다른 말로 부연해주는 것으로 내담자로 하여금 이해받고 있다는 인식을 갖게 한다.", "③ 명료화는 모호한 표현을 명확하게 하기 위한 질문 형태의 기술로 내담자가 미처 생각하지 못했던 측면을 다시 생각해 보게 한다.", "④ 해석은 지금-여기에서 일어나는 상담자와 내담자 사이의 역동을 피드백하는 것으로 내담자는 자신에 대한 통찰을 얻게 된다.", "⑤ 재진술은 내담자가 진술한 내용을 상담자의 말로 바꾸어 기술하는 것으로 내담자로 하여금 자신이 한 말에 주의를 기울이게 한다."], "answer": 3, "expl": "해석은 내담자가 미처 의식하지 못한 사고·감정·행동의 의미나 인과관계를 상담자가 설명해주는 기법이며, 지금-여기 역동에 대한 피드백은 오히려 직면이나 즉시성에 가깝다."}, {"no": "23-11", "year": 2024, "qno": 11, "text": "분석심리학에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 정신적 기능은 사고, 감정, 감각, 직관으로 구성된다.\nㄴ. 콤플렉스는 의식과 무의식의 구성요소로 특히 집단무의식의 내용으로 구성된다.\nㄷ. 해석단계에서는 증상의 의미, 아니마와 아니무스, 그림자 등을 알아차리도록 한다.\nㄹ. 상담은 관계형성-분석과 사정-해석-재정향 단계 순으로 진행된다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "융의 정신기능(사고·감정·감각·직관)과 해석단계에서 아니마·아니무스·그림자를 다루는 점은 옳지만, 콤플렉스는 집단무의식보다는 개인무의식의 내용으로 구성된다고 보는 것이 더 정확해 ㄴ이 부정확하다."}, {"no": "23-12", "year": 2024, "qno": 12, "text": "현대 정신분석 이론가와 주요개념의 연결이 옳지 않은 것은?", "options": ["① 코헛(H. Kohut) - 자기대상(self-object)", "② 클라인(M. Klein) - 탈융합(defusion)", "③ 페어베언(W. Fairbairn) - 분열 자리(schizoid position)", "④ 위니컷(D. Winnicott) - 과도적 대상(transitional object)", "⑤ 말러(M. Mahler) - 분리개별화(separation-individuation)"], "answer": 1, "expl": "탈융합(defusion)은 수용전념치료(ACT)의 개념이며, 클라인의 대표 개념은 편집-분열 자리·투사적 동일시 등이다."}, {"no": "23-13", "year": 2024, "qno": 13, "text": "스마트폰 과의존에 관한 설명으로 옳지 않은 것은?", "options": ["① 스마트폰 과의존 유형에는 SNS, 게임, 음란물, 도박, 검색 등이 있다.", "② 금단은 스마트폰을 사용하지 못하면 초조하고 불안함을 느끼는 현상이다.", "③ 스마트폰 과의존 자가진단 척도(S-척도) 결과가 35점 이상이면 위험 사용자군에 해당된다.", "④ 고위험 사용자군은 스마트폰 사용에 대한 통제력을 상실한 상태로 전문적인 도움이 필요하다.", "⑤ 스마트폰 과의존은 과도한 스마트폰 이용으로 인해 스마트폰에 대한 현저성이 증가하고 이용조절력이 감소해 문제적 결과를 경험하는 상태이다."], "answer": 2, "expl": "S-척도에서 35점 이상은 고위험군 기준에 해당하며, '위험 사용자군'이라는 명칭 및 점수 구간이 실제 척도 기준과 일치하지 않는다."}, {"no": "23-14", "year": 2024, "qno": 14, "text": "다음 상황에 해당하는 키치너(K. Kitchener)의 윤리적 의사결정 원칙으로 옳은 것은?\nㄱ. 상담자 A는 애완동물의 죽음으로 상실감을 겪고 있는 내담자를 상담하면서 자신의\n전문성이 부족하다고 판단하여 다른 상담자에게 의뢰하였다.\nㄴ. 상담자 B는 집에서 먼 청소년상담복지센터보다 가까운 학교 Wee클래스에서 상담\n을 받고 싶어하는 내담자의 의견을 수용하였다.", "options": ["① ㄱ: 선의(beneficence), ㄴ: 충실성(fidelity)", "② ㄱ: 무해성(nonmaleficence), ㄴ: 충실성(fidelity)", "③ ㄱ: 무해성(nonmaleficence), ㄴ: 공정성(justice)", "④ ㄱ: 충실성(fidelity), ㄴ: 자율성(autonomy)", "⑤ ㄱ: 선의(beneficence), ㄴ: 자율성(autonomy)"], "answer": 4, "expl": "자신의 역량 부족을 인정하고 의뢰하는 것은 내담자에게 해를 끼치지 않으려는 무해성 원칙이며, 내담자의 선택을 존중해 가까운 기관을 이용하게 하는 것은 자율성 존중에 해당한다."}, {"no": "23-15", "year": 2024, "qno": 15, "text": "현실치료에 관한 설명으로 옳지 않은 것은?", "options": ["① 내담자는 자신의 정서와 행동에 대한 책임이 있다.", "② 우볼딩(R. Wubbolding)은 지지적인 상담환경을 강조하여 구체적인 권장사항을 제시하였다.", "③ 내담자의 욕구를 탐색하고 원하는 것을 얻기 위해 무엇을 해왔는지 파악한다.", "④ 내담자의 현재 행동에 초점을 두고 행동의 효과성에 따라 새로운 전행동(total behavior)을 선택하도록 한다.", "⑤ 내담자의 선택을 중요시하여 계획을 실천하지 못할 경우 변명을 허용한다."], "answer": 4, "expl": "현실치료는 책임을 강조하는 이론으로, 계획 실천 실패 시 변명을 허용하지 않고 재계획을 세우도록 돕는 것이 원칙이다."}, {"no": "23-16", "year": 2024, "qno": 16, "text": "청소년상담사 윤리강령에 명시된 '내담자의 권리와 보호'에 관한 내용으로 옳은 것은?", "options": ["① 청소년 내담자에게 무력, 정신적 압력을 사용하지 않는다.", "② 청소년상담사는 심리검사를 실시하고 해석할 수 있는 능력을 배양해야 한다.", "③ 청소년 문제 해결을 위해 윤리적 기준에 따라 과학적인 방법으로 연구를 수행한다.", "④ 내담자에게 전문적인 서비스를 제공하기 위해 상담내용을 기록하고 보관한다.", "⑤ 청소년상담사는 사적 대화에서 내담자의 신원확인이 가능한 정보를 공개하지 않는다."], "answer": 0, "expl": "내담자에게 무력이나 정신적 압력을 사용하지 않는 것은 내담자의 권리와 보호를 직접적으로 다루는 조항에 해당한다."}, {"no": "23-17", "year": 2024, "qno": 17, "text": "해결중심상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 변화에 낙관적이다. ㄴ. 내담자의 언어체계에 관심이 있다.\nㄷ. 예외적인 상황을 탐색한다. ㄹ. 모더니즘의 보편적 진리를 강조한다.\nㅁ. 심리평가에 의한 진단을 중시한다.", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄷ, ㄹ, ㅁ", "④ ㄱ, ㄴ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 0, "expl": "해결중심상담은 변화에 대한 낙관적 태도, 내담자 언어체계 존중, 예외상황 탐색을 특징으로 하는 포스트모더니즘 접근이며 보편적 진리나 진단 중심의 모더니즘적 관점과는 거리가 멀다."}, {"no": "23-18", "year": 2024, "qno": 18, "text": "교류분석에 관한 설명으로 옳지 않은 것은?", "options": ["① 내담자의 자아상태 분석을 통해 성격구조와 기능을 파악한다.", "② 카프만(S. Karpman)은 게임분석을 위해 드라마 삼각형을 고안하였다.", "③ 굴딩(M. Goulding)은 각본분석에 의한 금지령 목록을 제시하고 있다.", "④ 라켓감정은 스트레스 상황에서 적절성 여부와 상관없이 반복적으로 사용된다.", "⑤ 교차교류는 상대방의 하나 이상의 자아상태를 향해서 상보적 교류와 잠재적 교류가 동시에 작용하는 교류이다."], "answer": 4, "expl": "상보적 교류와 잠재적 교류가 동시에 작용하는 것은 이면교류의 정의이며, 교차교류는 기대와 다른 자아상태에서 반응이 오는 교류를 의미한다."}, {"no": "23-19", "year": 2024, "qno": 19, "text": "청소년상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 청소년의 잠재가능성을 실현할 수 있도록 돕는다.", "② 청소년 고용, 보호 기관 관련자도 상담 대상에 포함된다.", "③ 다양한 매체를 활용한 상담보다는 대면상담에 주력한다.", "④ 일상에서 당면한 문제 해결과 예방을 위해 교육을 실시한다.", "⑤ 위기개입 및 자립을 지원하여 건전한 발달과 성장을 돕는다."], "answer": 2, "expl": "청소년상담은 대면상담뿐 아니라 전화, 사이버, 모바일 등 다양한 매체를 함께 적극 활용하는 특징이 있어 대면상담에만 주력한다는 설명은 옳지 않다."}, {"no": "23-20", "year": 2024, "qno": 20, "text": "다음에서 설명하는 인지적 오류로 옳은 것은?", "options": ["① 개인화", "② 선택적 추론", "③ 흑백논리적 사고", "④ 부정적 예측", "⑤ 과잉일반화"], "answer": 1, "expl": "전체 맥락은 무시하고 특정 부정적 정보에만 주의를 기울여 결론을 내리는 오류는 선택적 추론(selective abstraction)에 해당한다."}, {"no": "23-21", "year": 2024, "qno": 21, "text": "합리정서행동상담(REBT)에 관한 설명으로 옳은 것은?", "options": ["① 인간의 본성에 대해 결정론적인 입장을 강조한다.", "② 심리적 문제는 미해결과제가 해소되지 못할 때 발생한다.", "③ 상담목표는 내담자의 억압된 정서를 자각하게 하는 것이다.", "④ 내담자가 자기실현 경험을 바탕으로 이상적 자기에 부합하도록 돕는다.", "⑤ 인지, 정서, 행동이 상호작용하는 과정에서 인지적 요인이 핵심이 된다."], "answer": 4, "expl": "REBT는 인지·정서·행동이 상호작용한다고 보되, 비합리적 신념(인지)이 정서·행동 문제의 핵심 원인이라고 강조한다."}, {"no": "23-22", "year": 2024, "qno": 22, "text": "상담단계와 과업의 연결이 옳은 것을 모두 고른 것은?\nㄱ. 초기 - 상담의 구조화 ㄴ. 초기 - 상담목표 설정\nㄷ. 중기 - 통찰과 변화 시도 ㄹ. 중기 - 추수 회기\nㅁ. 종결 - 문제탐색과 정보수집", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄴ, ㄷ", "③ ㄴ, ㄷ, ㄹ", "④ ㄱ, ㄷ, ㄹ, ㅁ", "⑤ ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 1, "expl": "초기단계의 과업은 구조화와 목표설정이고 중기단계의 과업은 통찰과 변화 시도이며, 추수회기는 중기가 아닌 종결 이후 단계, 문제탐색·정보수집은 종결이 아닌 초기단계 과업이라 ㄹ·ㅁ은 잘못 연결되었다."}, {"no": "23-23", "year": 2024, "qno": 23, "text": "지역사회 청소년통합지원체계(CYS-Net, 청소년안전망)에 관한 설명으로 옳지 않은 것은?", "options": ["① 청소년 보호법령에 명시되어 있다.", "② 지역사회기반으로 통합서비스를 제공하기 위한 시스템이다.", "③ 청소년에 대한 상담, 긴급구조, 보호, 의료지원 등을 지원한다.", "④ 필수연계기관에 시․도 교육청과 초․중등학교 등이 포함된다.", "⑤ 필수연계기관은 위기청소년에 대한 지원 의뢰가 있을 경우 최우선적으로 지원하도록 상호 협력하여야 한다."], "answer": 0, "expl": "청소년안전망(청소년통합지원체계)의 법적 근거는 청소년복지 지원법이며, 청소년보호법령에 명시되어 있다는 설명은 옳지 않다."}, {"no": "23-24", "year": 2024, "qno": 24, "text": "청소년상담에서 사전동의(informed consent)의 내용으로 옳지 않은 것은?", "options": ["① 상담자의 경력", "② 상담을 거부할 권리", "③ 상담 약속과 취소 방법", "④ 상담 성과에 대한 보장", "⑤ 상담 참여의 잠재적 위험"], "answer": 3, "expl": "상담 성과는 미리 보장할 수 있는 것이 아니므로 사전동의에 포함될 내용으로 적절하지 않다."}, {"no": "23-25", "year": 2024, "qno": 25, "text": "청소년상담의 통합적 접근에 관한 설명으로 옳지 않은 것은?", "options": ["① 특정 이론의 한계를 극복하고자 포괄적으로 접근하는 시도이다.", "② 다양한 이론과 기법을 통합하여 치료효과를 증가시키는 데 목적이 있다.", "③ 내담자에게 동일한 치료관계와 방법을 적용하기 위해 고안해낸 접근법이다.", "④ 라자루스(A. Lazarus)의 다중양식치료는 기술적 통합 접근에 해당한다.", "⑤ 동화적 통합 접근은 특정한 주요 이론을 선택하고 다양한 치료적 접근을 결합․적용하는 것이다."], "answer": 2, "expl": "통합적 접근은 내담자 개개인의 특성에 맞게 이론과 기법을 유연하게 결합하는 것이 목적이며, '동일한 치료관계와 방법을 적용'한다는 설명은 통합적 접근의 취지와 반대된다."}];
const STORAGE_KEY = "ycs2_theory_v1";
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let mode = "all";

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function setMode(m){
  mode = m;
  document.getElementById('btn-all').classList.toggle('active', m==='all');
  document.getElementById('btn-wrong').classList.toggle('active', m==='wrong');
  render();
}

function resetAll(){
  if(confirm('푼 기록을 모두 초기화할까?')){
    state = {};
    saveState();
    render();
  }
}

function answer(qIdx, optIdx){
  const q = QUESTIONS[qIdx];
  if(state[q.no] !== undefined) return;
  state[q.no] = optIdx;
  saveState();
  render();
}

function updateMeta(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
}

function updateProgress(){
  const total = QUESTIONS.length;
  const done = QUESTIONS.filter(q => state[q.no] !== undefined).length;
  const correct = QUESTIONS.filter(q => state[q.no] === q.answer).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `${done}/${total} 문제 풀이 · 정답 ${correct}개` + (done>0 ? ` (정답률 ${Math.round(correct/done*100)}%)` : '');
}

function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

function render(){
  updateMeta();
  updateProgress();
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  let list = QUESTIONS;
  if(mode === 'wrong'){
    list = QUESTIONS.filter(q => state[q.no] !== undefined && state[q.no] !== q.answer);
  }
  if(list.length === 0){
    area.innerHTML = '<div class="empty">' + (mode==='wrong' ? '틀린 문제가 없어! 🌿' : '문제가 없어.') + '</div>';
    return;
  }
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const card = document.createElement('div');
    card.className = 'card';
    const answered = state[q.no] !== undefined;
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt';
      if(answered){
        if(i === q.answer) cls += ' correct';
        else if(i === state[q.no]) cls += ' wrong';
      }
      optsHtml += `<button class="${cls}" ${answered?'disabled':''} onclick="answer(${qIdx}, ${i})">${opt}</button>`;
    });
    let feedback = '';
    if(answered){
      const mark = state[q.no] === q.answer
        ? '<div class="feedback correct-mark">✅ 정답</div>'
        : `<div class="feedback wrong-mark">❌ 오답 (정답: ${q.answer+1}번)</div>`;
      const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
      feedback = mark + expl;
    }
    card.innerHTML = `
      <div class="qnum">${q.year} · 문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      ${feedback}
    `;
    area.appendChild(card);
  });
}

render();
</script>
