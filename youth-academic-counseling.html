<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학업상담 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --wrong-bg:#f7e9e7;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .toolbar{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .btn{
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:8px 14px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .btn.active{color:var(--accent-dark);font-weight:600;}
  .progress-bar{
    height:8px;
    border-radius:6px;
    background:var(--shadow-dark);
    overflow:hidden;
    margin-bottom:8px;
    box-shadow:inset 2px 2px 4px var(--shadow-dark);
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{font-size:12px;color:var(--sub);margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{
    padding:3px 0;
    line-height:1.6;
  }
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .opt{
    text-align:left;
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
    transition:background .15s ease;
    white-space:pre-wrap;
  }
  .opt:hover{background:#eef1ee;}
  .opt.correct{background:var(--right-bg);color:var(--accent-dark);font-weight:600;box-shadow:none;}
  .opt.wrong{background:var(--wrong-bg);color:var(--wrong);font-weight:600;box-shadow:none;}
  .opt:disabled{cursor:default;}
  .opt:disabled:hover{background:var(--bg-base);}
  .opt.correct:disabled:hover{background:var(--right-bg);}
  .opt.wrong:disabled:hover{background:var(--wrong-bg);}
  .feedback{
    margin-top:12px;
    font-size:13px;
    font-weight:600;
  }
  .feedback.correct-mark{color:var(--accent-dark);}
  .feedback.wrong-mark{color:var(--wrong);}
  .explain{
    margin-top:8px;
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
  .empty{
    text-align:center;
    color:var(--sub);
    padding:60px 0;
    font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">‹ 목록으로</a>
  <h1>학업상담</h1>
  <div class="meta-line" id="metaLine"></div>
  <div class="toolbar">
    <button class="btn active" id="btn-all" onclick="setMode('all')">전체보기</button>
    <button class="btn" id="btn-wrong" onclick="setMode('wrong')">오답만 보기</button>
    <button class="btn" onclick="resetAll()">초기화</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div id="quizArea"></div>
</div>
<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "학업문제에 관한 설명으로 옳지 않은 것은?", "options": ["① 시험불안: 시험에 대한 불안감과 압박감을 갖는 경우", "② 공부습관 미형성: 공부하는 것 자체에 대한 반감과 반발심을 갖는 경우", "③ 능력 부족: 지능이나 기억력 등의 저하가 성적에 영향을 미치는 경우", "④ 집중력 부족: 주의산만, 잡념 등이 성적에 영향을 미치는 경우", "⑤ 공부 방법 문제: 비효율적인 방법으로 공부함으로써 성적에 영향을 미치는 경우"], "answer": 1, "expl": "공부습관 미형성은 아직 효과적인 공부습관이 자리 잡지 못한 상태를 의미하며, 공부 자체에 대한 반감·반발심은 오히려 학업에 대한 정서적 저항(학업반감)에 가까운 별개의 문제로 구분된다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "로젠샤인과 스티븐스(B. Rosenshine & R. Stevens)가 제시한 피드백 유형 중 다음에 해당하는 것은?\n○ '이 부분은 정확하게 썼는데, 이 부분은 받침을 바꿔야 한단다.'\n○ 과제를 얼마나 정확하게 했는지, 그리고 제대로 하기 위해서 어떻게 수정해야 하는지에 대한 피드백", "options": ["① 귀인 피드백", "② 강화 피드백", "③ 동기 피드백", "④ 수행 피드백", "⑤ 전략 피드백"], "answer": 3, "expl": "정확히 한 부분과 수정할 부분을 짚어주며 과제 수행의 정확성과 개선 방법을 알려주는 것은 수행 피드백에 해당한다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "다음에서 설명하는 학업과 관련된 문제는?\n○ 공부에 대한 과도한 스트레스를 받으면서 계속 쉬지 못하고 공부만 할 경우 발생할 수 있다.\n○ 정서적 고갈, 학업에 대한 냉소적 태도, 학업에 대한 무능감 등의 증상이 나타난다.\n○ 학생이 가진 자원이 만성화된 스트레스로 인해 손실되기만 하고, 새로운 자원으로 보충되지 않을 때 나타날 수 있다.", "options": ["① 학업스트레스", "② 학업반감", "③ 학업소진", "④ 학업과다", "⑤ 학업지연"], "answer": 2, "expl": "과도한 학업 스트레스가 지속되어 정서적 고갈, 냉소적 태도, 무능감이 나타나고 자원이 회복되지 않는 상태는 학업소진(academic burnout)의 전형적 특징이다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "학습부진에 관한 설명으로 옳지 않은 것은?", "options": ["① 학업성취수준이 잠재적인 능력에 미치지 못하고 현격하게 뒤떨어지는 상태를 가리킨다.", "② 정상적인 지적 능력을 가지고 있으나, 심리환경적 요인에 의해 학업이 떨어지는 것을 의미한다.", "③ 뇌 기능상에 문제가 있어 정상적인 학업성취를 이루지 못하는 것이다.", "④ 일시적인 기간에 나타나기도 하고, 장기간에 걸쳐 나타나기도 한다.", "⑤ 해당 학년 교과 교육과정에 제시된 최소 수준의 목표에 도달하지 못한 경우를 교과학습부진이라고 한다."], "answer": 2, "expl": "학습부진은 정상적인 지적 능력을 가진 학생이 심리·환경적 요인으로 성취가 저하된 경우를 가리키며, 뇌 기능 문제로 인한 학업 어려움은 학습장애(학습부진과 구분되는 별도 범주)에 해당한다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "학습과 관련된 요인 중 정의적 영역에 해당하는 것을 모두 고른 것은?\nㄱ. 지능 ㄴ. 학업기초능력 ㄷ. 학습에 대한 흥미 ㄹ. 시험불안 ㅁ. 부모의 기대에 대한 지각 ㅂ. 대인관계", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㅁ, ㅂ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄹ, ㅁ, ㅂ"], "answer": 1, "expl": "시험불안(ㄹ), 부모 기대에 대한 지각(ㅁ), 대인관계(ㅂ)는 정의적·사회정서적 요인이며, 지능(ㄱ)과 학업기초능력(ㄴ), 흥미(ㄷ)는 각각 인지적 요인 또는 흥미(정의적이지만 다른 범주로 구분됨)에 해당해 정답 조합은 ㄹ·ㅁ·ㅂ이다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "읽기 및 청취 전략에 관한 설명으로 옳은 것은?", "options": ["① 배경지식 활성화 전략은 관련된 새로운 지식을 감각기억에 저장하는 것이다.", "② 슈메이커 등(J. Schumaker et al.)의 읽기 전략 5단계 중 단원의 개요 등을 살펴보는 것은 2단계에 해당한다.", "③ 읽기 및 청취 전 전략에는 핵심내용 파악과 요약이 있다.", "④ 조직화 전략은 학습 내용들 간 논리적 관계를 염두에 두고 내용을 정리하는 것이다.", "⑤ 오수벨(D. Ausubel)이 설명한 내적 조직자는 새로 배우려는 내용이 기존에 알고 있던 내용과 어떻게 관련되는지 파악하는 것이다."], "answer": 3, "expl": "오수벨의 내적 조직자는 새로운 학습내용을 기존 인지구조(선행지식)와 연결지어 이해를 돕는 개념으로, 조직화 전략의 본질과 일치한다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "클리포드(M. Clifford)의 건설적 실패이론(Theory of constructive failure)과 관련된 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 실패를 피하라고 하기보다는 오히려 실패 경험을 건설적으로 다루는 전략들을 가르쳐야 한다고 본다.\nㄴ. 실패내성(failure tolerance)은 실패 결과에 대해 비교적 건설적인 태도로 반응하는 경향성이다.\nㄷ. 자유, 힘, 능력을 위협받는 상황에 처하게 되면, 오히려 적극적으로 상황에 대처함으로써 긍정적인 경험을 할 수 있다.\nㄹ. 실패에 대한 내성이 높은 사람은 낮은 사람에 비해 실패에 대해 보다 비관적 태도를 보인다.\nㅁ. 실패를 하지 않으려고 하는 것이 어떤 행동의 동기가 될 수 있다고 본다.", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄴ, ㄷ, ㄹ", "④ ㄴ, ㄹ, ㅁ", "⑤ ㄷ, ㄹ, ㅁ"], "answer": 0, "expl": "건설적 실패이론은 실패를 회피하기보다 건설적으로 다루는 전략을 가르쳐야 하며(ㄱ), 실패내성이 높을수록 오히려 건설적 태도를 보이고(ㄴ), 위협적 상황에서도 적극적 대처가 긍정적 경험으로 이어질 수 있다(ㄷ)고 보는 이론이다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "초인지 전략에 관한 설명으로 옳지 않은 것은?", "options": ["① 계획하기는 목표설정, 개관, 과제분석 등을 통해 전략 사용을 계획하고 사전지식을 활용하는 것이다.", "② 점검하기에는 스스로 만든 질문을 통해 평가하기, 문제 푸는 속도를 점검하는 것 등과 같은 방법이 있다.", "③ 잘 이해가 안 되고 있다면, 다시 돌아가서 공부를 하는 것은 자원관리 전략에 해당한다.", "④ 초인지 전략은 주 전략인 인지전략을 보조한다는 측면에서 보조 전략으로 불리기도 한다.", "⑤ 조절하기는 과제를 수행할 때 자신의 행동을 점검하면서 더 적절한 것으로 바꿔 나가는 것이다."], "answer": 1, "expl": "이해가 안 될 때 다시 돌아가 학습하는 것은 자원관리 전략이 아니라 초인지 전략의 '조절하기(regulating)'에 해당하는 대표적 행동이다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "DSM-5-TR에서 제시한 특정학습장애(Specific Learning Disabilities)에 관한 설명으로 옳은 것은?", "options": ["① 특정학습장애 아동은 정상수준의 지능을 가지고 있다.", "② 정신지체로 인해 학업성취도가 떨어지는 아동은 특정학습장애에 해당한다.", "③ 지적발달장애로 인해 학력이 지체된 아동은 특정학습장애로 분류된다.", "④ 특정학습장애는 장애 상태에 따라 심각도를 명시하지 않는다.", "⑤ 특정학습장애 아동은 중재를 받았음에도 불구하고 읽기, 말하기, 수학 중 적어도 한 가지 영역에서 어려움을 보인다."], "answer": 1, "expl": "특정학습장애는 정상 범위의 지능을 가지고 있음에도 읽기·쓰기·수학 등 특정 학업영역에서 어려움을 보이는 경우를 가리키며, 지적장애로 인한 학업지체는 특정학습장애에서 제외된다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "앳킨슨과 시프린(R. Atkinson & R. Shiffrin)의 이중저장기억 모델에 관한 설명으로 옳은 것은?", "options": ["① 학습자가 주의를 기울이지 않은 정보는 기억에 남지 않지만, 사라지지는 않는다.", "② 작업기억의 저장 용량은 한계가 있기 때문에 많은 정보를 묶어서 기억하거나 처리하는 방법이 제안된다.", "③ 정보가 감각등록기에서 작업기억으로 들어가기 위해서는 시연 등의 인지전략을 사용해야 한다.", "④ 작업기억에서는 받아들인 정보를 조직하는 작업을 하게 되며, 저장되는 기간도 길다.", "⑤ 장기기억에 저장하기 위해서는 정보의 심층적인 특징보다는 피상적인 특징들을 다양하게 이해하고 있어야 한다."], "answer": 0, "expl": "감각등록기에 들어온 정보가 작업기억으로 넘어가기 위해서는 주의를 기울이고 시연 등 인지전략을 사용하는 과정이 필요하다."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "DSM-5-TR에서 제시한 주의력결핍 과잉행동장애(ADHD)의 증상으로 옳지 않은 것은?", "options": ["① 과잉행동-충동성: 차례를 기다리지 못하거나 종종 다른 사람의 활동을 방해하고 간섭한다.", "② 부주의: 지시를 완수하지 못하고, 학업, 잡일, 작업장에서의 임무 완성에 어려움을 겪는다.", "③ 과잉행동-충동성: 손발을 가만히 두지 못하거나 부적절한 상황에서 지나치게 뛰어다니거나 기어오른다.", "④ 부주의: 학습과제, 연필, 책 등 과제와 활동에 필요한 물건들을 자주 잃어버리거나 일상적인 활동을 잊어버린다.", "⑤ 부주의: 다른 사람이 말을 할 때 경청하지 않고, 질문이 끝나기 전에 성급하게 대답한다."], "answer": 2, "expl": "질문이 끝나기 전에 성급하게 대답하는 것은 부주의가 아니라 충동성(과잉행동-충동성) 증상에 해당한다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "학업관련 검사에 관한 설명으로 옳지 않은 것은?", "options": ["① 학업동기검사 AMT는 학업적 자기효능감 척도와 학업적 실패내성 척도로 구성된다.", "② 캘드웰과 브래들리(B. Caldwell & R. Bradley, 1978)가 개발한 HOME은 가정환경진단검사이다.", "③ 웩슬러 지능검사 K-WISC-V는 언어이해, 시공간, 유동추론, 작업기억, 처리속도의 다섯 가지 지표점수를 제공한다.", "④ 청소년용 학습기술평가에는 그림어휘검사(FVT), 시지각 발달검사(DTVP), 촉각 수행검사(TPT) 등 특수한 능력을 측정하는 검사가 대표적이다.", "⑤ 기초학습기능 수행평가체제 BASA는 학생이 실제 학습하는 자료 자체를 평가도구로 사용함으로써 기초학습기능에 대한 수행 정도를 평가한다."], "answer": 3, "expl": "청소년용 학습기술평가는 노트필기·시간관리 등 일반적 학습기술을 다루는 검사이며, 그림어휘검사·시지각발달검사·촉각수행검사는 특수 인지기능 검사로 학습기술평가와는 성격이 다르다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "영재아의 학습부진 원인에 해당하는 것을 모두 고른 것은?\nㄱ. 적절한 교육의 부재 ㄴ. 정서적 민감성 ㄷ. 대인관계 기술의 결핍 ㄹ. 학습전략의 부족", "options": ["① ㄱ, ㄷ", "② ㄴ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "영재아는 충분히 도전적이지 않은 교육환경(ㄱ), 높은 정서적 민감성(ㄴ), 또래와의 대인관계 어려움(ㄷ), 비효율적 학습전략(ㄹ) 등 다양한 이유로 학습부진을 겪을 수 있다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "다음에서 설명하는 이론을 제시한 학자는?\n○ 시험상황에서 과제수행욕구와 불안욕구가 일어나며, 과제수행욕구는 시험 상황에서의 과제수행을 촉진하지만 불안욕구는 과제수행을 방해한다고 보았다.\n○ 연구결과에 따르면, 시험불안이 높은 학생은 낮은 학생에 비해 지능검사에서 낮은 결과를 받았으며 시험상황이 위협적으로 지각되는 경우 그 차이는 더 크게 나타났다.", "options": ["① 맨들러와 사라슨(G. Mandler & S. Sarason)", "② 스필버거(C. Spielberger)", "③ 리버트와 모리스(R. Liebert & L. Morris)", "④ 기어리(D. Geary)", "⑤ 커크(S. Kirk)"], "answer": 0, "expl": "과제수행욕구와 불안욕구의 상호작용으로 시험상황에서의 수행을 설명한 학자는 맨들러와 사라슨이다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "데시와 라이언(E. Deci & R. Ryan)의 자기결정성 이론에서 제시한 동기가 아닌 것은?", "options": ["① 외적 조절(external regulation)", "② 확인된 조절(identified regulation)", "③ 부적 조절(negative regulation)", "④ 부과된 조절(introjected regulation)", "⑤ 통합된 조절(integrated regulation)"], "answer": 1, "expl": "자기결정성 이론의 조절 유형에는 외적 조절, 부과된(내사된) 조절, 확인된 조절, 통합된 조절이 있으며 '부적 조절'이라는 용어는 이 이론의 개념에 해당하지 않는다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "댄서로우(D. Dansereau)가 제시한 학습전략의 보조전략에 해당하는 것을 모두 고른 것은?\nㄱ. 주의집중 전략 ㄴ. 파지전략 ㄷ. 회상전략 ㄹ. 자기점검과 진단전략", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "댄서로우의 보조전략(지원전략)에는 목표설정, 주의집중, 자기점검·진단 등이 포함되며, 파지전략과 회상전략은 정보처리를 직접 다루는 1차 전략(주 전략)에 해당한다."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "시간계획과 시간관리에 관한 설명으로 옳지 않은 것은?", "options": ["① 시간계획과 시간관리는 능동적 학습에서 중요하다.", "② 계획대로 하지 못하고 시간을 허비하는 이유 중에 지연(procrastination)이 있다.", "③ 시간을 효율적으로 사용하기 위한 시간배분과 시간조절은 학업성취와 연결된다.", "④ 좋아하는 일을 먼저하고 싫어하는 일을 하게 하는 프리맥의 원리는 지연(procrastination)을 예방한다.", "⑤ 시간계획과 시간관리의 목적은 학습이 효과적으로 이루어지도록 하기 위한 것이다."], "answer": 0, "expl": "프리맥의 원리는 선호도가 높은 행동을 낮은 행동 뒤에 배치해 낮은 행동의 수행을 강화하는 원리로, '좋아하는 일을 먼저 하고 싫어하는 일을 나중에'는 오히려 지연행동을 강화할 위험이 있어 원리의 적용 방향이 반대로 설명되어 있다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "다음에서 설명하는 학습된 무기력(learned helplessness)을 제시한 학자로 옳은 것은?\n○ 거듭된 실패경험으로 인한 반응은 혐오자극에 어떠한 영향을 미칠 수 없다는 것을 학습한 결과에서 기인한다.\n○ 반복적 실패경험으로 상황에 대한 통제성이 상실된 상태로, 결과를 통제하려는 동기를 감소시킨다.", "options": ["① 반두라(A. Bandura)", "② 셀리그만(M. Seligman)", "③ 테일러(R. Taylor)", "④ 켈러(F. Keller)", "⑤ 칙센트미하이(M. Cskiszentmihalyi)"], "answer": 1, "expl": "반복된 실패 경험으로 통제 불가능감을 학습하게 된다는 학습된 무기력 개념을 제시한 학자는 셀리그만이다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "로크와 라뎀(E. Locke & G. Latham)의 목표설정이론(goal setting theory)에 관한 설명으로 옳지 않은 것은?", "options": ["① 목표의 세 가지 조건은 근접성(proximity), 구체성(specificity), 유용성(usefulness)이다.", "② 학습목표 설정에 대한 학습자의 헌신(commitment)에 영향을 주는 요인은 개인적 요인과 사회적 요인이 있다.", "③ 목표설정이 행동변화로 연결되기 위해서는 목표의 형태가 적절해야 한다.", "④ 막연하고 모호한 형태가 아니라 명확한 형태의 목표가 동기향상에 기여한다.", "⑤ 자기효능감은 목표헌신에 영향을 주는 요인이다."], "answer": 4, "expl": "목표설정이론에서 제시하는 목표의 조건은 구체성, 도전성(난이도), 수용성 등이며 '근접성·구체성·유용성'이라는 조합은 이 이론의 표준적인 목표 조건 설명과 일치하지 않는다."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "캔달과 브라스웰(P. Kendall & L. Braswell)이 제시한 주의집중력 향상을 위한 자기교시훈련 단계로 옳지 않은 것은?", "options": ["① 문제 정의 단계: 문제는 무엇인가?", "② 문제에 대한 접근 단계: 모든 가능한 답을 살펴보자.", "③ 답의 선택 단계: 답을 하나 고르자.", "④ 답의 검토 단계: 답을 검토하자.", "⑤ 답의 사후관리 단계: 옳은 답인지 평가하자."], "answer": 1, "expl": "캔달과 브라스웰의 자기교시훈련 단계는 문제정의-접근(계획)-답 선택(집중)-답 검토(자기평가)-자기강화(사후관리) 순이며, '모든 가능한 답을 살펴보자'는 진술은 접근 단계보다는 이후 단계의 표현에 가까워 배열이 어긋난다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "맥키치(W. McKeachie)의 학습전략 분류 중 다음에 해당하는 인지적 전략으로 옳은 것은?\n○ 새로운 정보를 받아들일 때 기존의 지식에 적용하여 새로운 지식과 정보를 확장해 가는 것이다.\n○ 정보만으로는 정확하게 회상할 수 없을 때 또는 어떤 것인지 추론할 때 도움이 된다.", "options": ["① 시연전략", "② 읽기전략", "③ 정교화전략", "④ 조정화전략", "⑤ 범주화전략"], "answer": 2, "expl": "기존 지식과 연결해 새로운 정보를 확장하고 추론에 활용하는 전략은 정교화전략(elaboration)에 해당한다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "발표불안과 관련된 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 발표불안의 증상으로는 생리학적ㆍ인지적ㆍ정서적ㆍ행동적 반응이 있다.\nㄴ. 이완훈련을 포함한 체계적 둔감법은 발표불안의 개입방법으로 효과적이다.\nㄷ. 발표에 대한 비합리적이고 왜곡된 사고를 합리적인 사고로 수정함으로써 발표불안에 개입할 수 있다.\nㄹ. 발표불안의 원인은 기질적 원인, 부모의 양육태도, 조건화된 학습의 결과, 사회적 기술 부족 등으로 다양하다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "발표불안은 생리·인지·정서·행동 반응으로 나타나며(ㄱ), 체계적 둔감법(ㄴ)과 인지재구성(ㄷ)이 효과적인 개입이고, 원인 역시 기질·양육·조건화·사회기술 부족 등 다양하다(ㄹ)."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "토마스와 로빈슨(E. Thomas & H. Robinson)의 PQ4R에 해당하지 않은 것은?", "options": ["① 질문하기(Question)", "② 숙고하기(Reflection)", "③ 암송하기(Recite)", "④ 복습하기(Review)", "⑤ 기록하기(Record)"], "answer": 4, "expl": "PQ4R은 미리보기(Preview)-질문하기(Question)-읽기(Read)-숙고하기(Reflect)-암송하기(Recite)-복습하기(Review)로 구성되며 '기록하기(Record)'는 PQ4R 단계에 포함되지 않는다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "주의집중력 향상 전략 중 '내재적 언어를 통한 자기통제력 향상'에 관한 설명으로 옳지 않은 것은?", "options": ["① 자기통제력 향상을 위해서는 과제 완수 단계마다의 사고를 나누어서 각 단계별로 필요한 언어를 내재화하는 과정이 필요하다.", "② 길포드(J. Guilford)는 내재적 언어를 통한 자기통제력 향상 방법으로 공부환경 관리방법을 제시하였다.", "③ 자기통제력 향상을 위한 내재적 언어를 가르칠 경우 과제의 성격에 맞추어 효율적으로 집중력을 향상시킬 수 있다.", "④ 내재적 언어를 통한 자기통제력 향상은 특히 주의력결핍 과잉행동장애(ADHD) 학생의 자기통제력 향상을 위한 방법으로 제안된다.", "⑤ 계획대로 효율적인 방법으로 학습한 자신을 칭찬하는 과정을 통해 성취감과 자신감을 갖도록 할 수 있다."], "answer": 1, "expl": "공부환경 관리방법을 제시한 학자는 길포드가 아니며, 내재적 언어를 통한 자기통제 훈련은 마이켄바움(Meichenbaum) 등이 제안한 자기교시훈련과 관련이 깊어 이 연결은 옳지 않다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "다음에서 설명하는 이론을 제시한 학자로 옳은 것은?\n○ 귀인(attribution)에 대해 다차원적인 모델을 제안하면서 귀인을 학업성취 영역과 연결하는데 많은 기여를 하였다.\n○ 귀인을 3차원, 즉 통제소재, 안정성, 통제가능성으로 나누어 분류하였다.", "options": ["① 에임스(C. Ames)", "② 레닝거(K. Renninger)", "③ 드웩(C. Dweck)", "④ 화이팅(C. Whiting)", "⑤ 와이너(B. Weiner)"], "answer": 4, "expl": "귀인을 통제소재, 안정성, 통제가능성의 3차원으로 분류하고 이를 학업성취와 연결한 대표 학자는 와이너이다."}, {"no": "23-76", "year": 2024, "qno": 1, "text": "학습장애에 관한 설명으로 옳지 않은 것은?", "options": ["① 학습장애가 성인기에도 지속될 수 있다.", "② DSM-5에서는 특정학습장애라고 명명한다.", "③ 지능이 현저하게 낮지 않으나 학습하고 학업기술을 사용하는데 어려움을 보인다.", "④ 특정 학습 영역에서의 학업성취에 어려움을 보이는 직접적인 원인이 시각장애나 청각장애에 기인한다.", "⑤ 어려움을 보이는 특정 학습 영역을 위한 중재를 받았음에도 읽기 등 적어도 하나 이상의 영역에서 기대수준보다 낮은 성취를 보인다."], "answer": 3, "expl": "특정학습장애 진단은 시각·청각 등 감각장애로 인한 학업 어려움을 배제하는 것이 기준이며, 감각장애가 직접적 원인일 경우 학습장애로 진단하지 않는다."}, {"no": "23-77", "year": 2024, "qno": 2, "text": "커크와 찰팬트(S. Kirk & J. Chalfant) 등의 학습장애 분류에 관한 설명으로 옳지 않은 것은?", "options": ["① 읽기장애는 학업적 학습장애로 분류한다.", "② 기억장애는 학업적 학습장애로 분류한다.", "③ 수학장애는 학업적 학습장애로 분류한다.", "④ 주의집중 장애, 사고장애는 발달적 학습장애로 분류한다.", "⑤ 학습장애를 발달적 학습장애와 학업적 학습장애로 분류한다."], "answer": 1, "expl": "기억장애는 주의집중장애·사고장애·지각장애 등과 함께 발달적 학습장애로 분류되며, 학업적 학습장애(읽기·쓰기·수학)와는 구분된다."}, {"no": "23-78", "year": 2024, "qno": 3, "text": "칙센트미하이( . Cskiszentmihalyi)의 몰입(Flow)에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 어떤 수행에 몰두하여 시간, 피로 뿐만 아니라 수행 그 자체 외에 아무것도 느끼지\n못하는 최적 경험의 상태\nㄴ. 학습자가 자신의 기술(능력) 수준은 낮지만 도전 수준이 높은 과제를 수행할 때 몰\n입을 경험함\nㄷ. 행동의 근원이 내재적으로 동기화되어 나타나므로 자기목적적 경험이라고도 함\nㄹ. 몰입 경험은 학습자의 학습에 대한 흥미유발과 적극적 참여를 유발함\nㅁ. 학습자가 자의식의 상실로 인해 학습활동 행위 그 자체의 객체가 됨", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㅁ", "⑤ ㄷ, ㄹ, ㅁ"], "answer": 2, "expl": "몰입은 수행에의 완전한 몰두(ㄱ), 자기목적적 경험(ㄷ), 흥미와 참여 유발(ㄹ)의 특징을 가지지만, 몰입은 능력과 도전 수준이 '균형'을 이룰 때 나타나므로 능력은 낮고 도전만 높다는 설명(ㄴ)은 옳지 않다."}, {"no": "23-79", "year": 2024, "qno": 4, "text": "장기기억 속의 지식의 형태와 예를 바르게 제시한 것을 모두 고른 것은?\nㄱ. 선언적 지식: 6+4=10을 아는 것\nㄴ. 일화적 기억: 수학문제 풀이방식에 대해 친구에게 질문했던 장면에 대한 기억\nㄷ. 절차적 지식: 새로 구입한 전자기기의 작동 방법을 아는 것\nㄹ. 조건적 지식: 초식동물과 육식동물의 차이점을 아는 것", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "선언적 지식(ㄱ)과 일화적 기억(ㄴ)의 예시는 적절하지만, 전자기기 작동 방법처럼 '방법'을 아는 것은 절차적 지식의 예로 타당하나(ㄷ), 초식·육식동물의 차이는 사실관계를 아는 선언적 지식(의미기억)에 해당해 '조건적 지식'의 예로는 적절하지 않다."}, {"no": "23-80", "year": 2024, "qno": 5, "text": "라이언과 데시(R. Ryan & E. Deci)의 동기이론에서 자기결정성을 내면화하는 정도가 낮은\n수준에서 높은 수준으로 배열한 것은?\nㄱ. 주입된 조정 ㄴ. 외재적 조정\nㄷ. 통합된 조정 ㄹ. 동일시 조정\nㅁ. 내재적 조정", "options": ["① ㄱ → ㄴ → ㄷ → ㄹ → ㅁ", "② ㄴ → ㄱ → ㄹ → ㄷ → ㅁ", "③ ㄴ → ㄷ → ㄹ → ㄱ → ㅁ", "④ ㅁ → ㄹ → ㄷ → ㄴ → ㄱ", "⑤ ㅁ → ㄱ → ㄹ → ㄷ → ㄴ"], "answer": 1, "expl": "자기결정성이 낮은 순에서 높은 순으로는 외적 조정→주입된 조정→동일시 조정→통합된 조정→내재적 조정 순으로 배열된다."}, {"no": "23-81", "year": 2024, "qno": 6, "text": "DSM-5에서 정의하는 학습장애의 종류에 해당되지 않는 것은?", "options": ["① 읽기장애", "② 듣기장애", "③ 산술장애", "④ 쓰기장애", "⑤ 달리 분류되지 않는 장애"], "answer": 1, "expl": "DSM-5의 특정학습장애 하위유형에는 읽기·쓰기·산술장애가 있으며 '듣기장애'는 이에 해당하지 않는다."}, {"no": "23-82", "year": 2024, "qno": 7, "text": "DSM-5의 주의력결핍 과잉행동장애(ADHD)와 관련된 진단기준 가운데 '부주의'에 해당하지 않는 것은?", "options": ["① 흔히 일을 하거나 놀이를 할 때, 지속적으로 주의를 집중할 수 없다.", "② 흔히 다른 사람이 직접 말을 할 때, 경청하지 않는 것으로 보인다.", "③ 흔히 조용히 여가활동에 참여하거나 놀지 못한다.", "④ 흔히 과업과 활동을 체계화하지 못한다.", "⑤ 흔히 외부의 자극으로 쉽게 산만해진다."], "answer": 2, "expl": "조용히 여가활동에 참여하지 못하는 것은 부주의가 아니라 과잉행동-충동성 증상에 해당한다."}, {"no": "23-83", "year": 2024, "qno": 8, "text": "K-WISC-Ⅴ에 포함된 하위 요인에 포함되지 않는 것은?", "options": ["① 지각추론", "② 시공간", "③ 언어이해", "④ 유동추론", "⑤ 처리속도"], "answer": 0, "expl": "K-WISC-V는 언어이해, 시공간, 유동추론, 작업기억, 처리속도의 5개 지표로 구성되며, '지각추론'은 이전 버전(K-WISC-IV)의 지표명으로 5판에는 포함되지 않는다."}, {"no": "23-84", "year": 2024, "qno": 9, "text": "수렴적 사고와 확산적 사고의 개념을 제시한 이론은?", "options": ["① Spearman과 Thurstone의 지능이론", "② Guilford의 지능이론", "③ Horn, Cattell과 Hebb의 지능이론", "④ Cattell-Horn-Carroll의 지능이론", "⑤ Binet의 지능이론"], "answer": 1, "expl": "수렴적 사고와 확산적 사고 개념은 길포드의 지능구조모델(SOI)에서 제시되었다."}, {"no": "23-85", "year": 2024, "qno": 10, "text": "추정되는 지적 잠재력과 실제 학업성취 간의 차이를 통해 학습장애 여부를 진단하는 것은?", "options": ["① 능력-성취 불일치 접근법", "② 중재반응 접근법", "③ 인지처리과정 결함 접근법", "④ IQ-학업성취 불일치 모델 접근법", "⑤ 개인 내적 처리과정 결함 접근법"], "answer": 0, "expl": "지적 잠재력(지능)과 실제 학업성취 간의 차이를 근거로 학습장애를 진단하는 방식은 능력-성취 불일치 접근법이다."}, {"no": "23-86", "year": 2024, "qno": 11, "text": "다음에 해당하는 학습장애 지도방법은?\n○ 독해지도를 위해 팰린스카와 브라운(A. Palinscar & A. Brown)이 개발함\n○ 학생 간이나 학생과 상담자 간의 구조화된 대화를 통해 학생의 초인지적 이해를 도움\n○ 상담자는 학생이 요약하기, 질문생성하기, 명료화하기, 예측하기의 전략을 사용하도\n록 가르치고, 점차적으로 학생이 네 가지 전략을 실연함", "options": ["① 또래 교수", "② 내재적 교수", "③ 명시적 교수", "④ 스캐폴딩 교수", "⑤ 상보적 교수"], "answer": 4, "expl": "팰린스카와 브라운이 개발한, 요약하기·질문생성하기·명료화하기·예측하기 전략을 구조화된 대화로 가르치는 독해지도법은 상보적 교수이다."}, {"no": "23-87", "year": 2024, "qno": 12, "text": "맥키치(W. McKeachie)의 학습전략 분류 중 자원관리 전략에 해당하는 것을 모두 고른\n것은?\nㄱ. 암송하기 ㄴ. 기억조성법\nㄷ. 시간표 작성 ㄹ. 조용한 공부 장소의 선택\nㅁ. 노력에 대한 귀인", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ, ㄹ", "③ ㄷ, ㄹ, ㅁ", "④ ㄱ, ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 2, "expl": "시간표 작성(ㄷ), 조용한 공부 장소 선택(ㄹ), 노력에 대한 귀인(ㅁ)은 자원관리 전략이며, 암송하기·기억조성법(ㄱ·ㄴ)은 인지전략(리허설전략)에 해당해 제외된다."}, {"no": "23-88", "year": 2024, "qno": 13, "text": "다음에 해당하는 창의적 사고 발상 기법은?\n○ 에드워드 드 보노(Edward de Bono)가 제안함\n○ CoRT 프로그램에서 한 단원으로 소개됨\n○ 생각하는 사람이 어떤 판단에 도달하기 전에 그 상황을 다시 자세히 검토하는 것을\n도와주는 인지확장도구", "options": ["① 시네틱스(Synetics)", "② 스캠퍼(SCAMPER)", "③ 체크리스트(Checklist)", "④ PMI(Plus-Minus-Interest)", "⑤ 마인드맵핑(Mind Mapping)"], "answer": 3, "expl": "판단에 도달하기 전 상황을 다시 검토하도록 돕는 드보노의 CoRT 프로그램 기법은 PMI(장점-단점-흥미로운 점)이다."}, {"no": "23-89", "year": 2024, "qno": 14, "text": "인지학습전략 중 다음에 해당하는 초인지 전략은?\n○ 모르는 부분이 있으면 다시 앞장으로 돌아가서 복습을 진행한다.\n○ 학습자가 수행하고 진행한 활동이 과연 효과적이었는지를 계속 점검하면서, 수정해야\n할 사항이나 보완이 필요한 경우 그에 대한 대안을 제시하며 학습활동을 진행한다.", "options": ["① 계획하기", "② 점검하기", "③ 조절하기", "④ 조직화하기", "⑤ 정교화하기"], "answer": 4, "expl": "학습활동이 효과적인지 계속 점검하며 필요시 대안을 제시해 수정·보완해나가는 것은 초인지 전략 중 조절하기(regulating)의 정의에 부합한다."}, {"no": "23-90", "year": 2024, "qno": 15, "text": "마이켄바움과 굿맨(D. Meichenbaum & K. Goodman)의 자기교시훈련의 단계 중 외현적\n모델링 단계에 해당하는 것을 모두 고른 것은?\nㄱ. 내담자는 상담자의 행동을 관찰한다.\nㄴ. 내담자는 상담자의 안내에 따라 자기통제언어를 크게 소리내어 말하며 수행한다.\nㄷ. 상담자가 자기통제언어를 소리내어 말하며 특정 과제를 수행하는 행동을 시범해\n보인다.\nㄹ. 상담자는 내담자가 자기통제언어를 크게 소리내어 말하며 수행하도록 작은 목소리로\n속삭이듯 안내한다.\nㅁ. 상담자가 크게 소리내어 자기통제언어를 말하며 시범을 보인 후 내담자가 상담자의\n행동과 자기통제언어를 크게 소리내어 말하며 수행하도록 안내한다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄷ, ㄹ", "⑤ ㄹ, ㅁ"], "answer": 1, "expl": "외현적 모델링 단계는 상담자가 자기통제언어를 소리내어 말하며 시범을 보이고(ㄷ) 내담자가 이를 관찰하는(ㄱ) 단계이다."}, {"no": "23-91", "year": 2024, "qno": 16, "text": "반두라(A. Bandura)의 이론에 근거하여 학습전략 수행시 Ⓐ 단계에 해당하는 것으로\n옳은 것은?\n모델링된\n사건들\n→\n주의\n과정 →\n파지\n과정 →\n행동산출\n과정 → Ⓐ →\n패턴의\n맞춤", "options": ["① 작은 단계로 과제를 분석하여 시범을 보이는 상담자의 행동을 관찰한다.", "② 상담자는 내담자에게 상징적 부호화와 인지적 시연이 일어나도록 개입한다.", "③ 내담자는 자신의 행동과 기억 속에 있는 모델의 행동 간에 불일치가 발생하면 수정한다.", "④ 다른 친구가 성공적으로 읽기 수행을 하고나서 칭찬받는 장면을 본 후, 자신도 그와 같이 하면 칭찬을 받을 것이라고 기대하고 동기화된다.", "⑤ 다른 친구의 읽기 수행 장면을 주의 깊게 관찰하며 마음속으로 연습한다."], "answer": 3, "expl": "행동산출 이후 동기화 단계에서는 타인의 성공과 강화 장면을 관찰하고 자신도 유사한 결과를 기대하며 동기부여되는 대리강화 과정이 나타난다."}, {"no": "23-92", "year": 2024, "qno": 17, "text": "내담자가 작성한 시간관리 매트릭스의 내용에 대해 상담자가 적절하게 개입한 사례는?\n긴급함 긴급하지 않음\n중요함 Ⓐ Ⓒ\n중요하지 않음 Ⓑ Ⓓ", "options": ["① Ⓐ: 단기간에 모든 정신에너지를 모아 최선을 다해 과제를 수행하도록 조언함", "② Ⓑ: 시간을 두고 차분하게 준비해야 하나, 과도한 열정을 쏟을 필요가 없다는 것을 깨닫도록 조언함", "③ Ⓒ: 단기간에 최소한의 시간만 할애하고 너무 많은 정신에너지를 투입하지 않도록 조언함", "④ Ⓓ: 오랜 시간동안 규칙적이고 지속적으로 시간을 투자하면서 최선을 다해 수행하도록 조언함", "⑤ Ⓒ: 오랜 기간동안 시간을 투자하는 행위가 시간낭비라고 조언함"], "answer": 0, "expl": "긴급하고 중요한(Ⓐ) 영역은 단기간에 집중적으로 에너지를 모아 최선을 다해 수행해야 하는 영역이므로 이 개입이 적절하다."}, {"no": "23-93", "year": 2024, "qno": 18, "text": "중재반응모형(RTI) 적용 시 순서가 바르게 나열된 것은?\nㄱ. 일반교육 상황에서 전체 학생지도\nㄴ. 집중적인 개별화 중재\nㄷ. 학습장애 위기학생에 대한 소집단 집중교육", "options": ["① ㄱ → ㄴ → ㄷ", "② ㄱ → ㄷ → ㄴ", "③ ㄴ → ㄱ → ㄷ", "④ ㄴ → ㄷ → ㄱ", "⑤ ㄷ → ㄱ → ㄴ"], "answer": 1, "expl": "RTI는 일반교육에서 전체학생 지도(ㄱ)→ 위기학생 소집단 집중교육(ㄷ)→ 집중적 개별화 중재(ㄴ) 순의 3단계 모형으로 적용된다."}, {"no": "23-94", "year": 2024, "qno": 19, "text": "학습문제 진단을 위하여 관찰자가 관찰 대상이나 장면을 미리 정해놓고 그 장면에서\n일어나는 행동과 상황, 언어 등을 모두 일어난 순서대로 기록하는 방법은?", "options": ["① 표본기록법", "② 일화기록법", "③ 사건표집법", "④ 시각표집법", "⑤ 인물표집법"], "answer": 0, "expl": "정해진 장면에서 발생하는 모든 행동을 순서대로 상세히 기록하는 방법은 표본기록법이다."}, {"no": "23-95", "year": 2024, "qno": 20, "text": "반두라(A. Bandura)가 설명한 도덕적 품행과 관련하여 사람들로부터 비난받을 만한\n행동을 보다 바람직한 목적을 위한 수단으로 인식하는 것은?", "options": ["① 도덕적 정당화(moral justification)", "② 책임감의 확산(diffusion of responsibility)", "③ 책임감의 치환(displacement of responsibility)", "④ 비난의 귀인(attribution of blame)", "⑤ 유리한 비교(advantageous comparison)"], "answer": 0, "expl": "비난받을 행동을 더 바람직한 목적을 위한 수단으로 재해석하는 것은 도덕적 정당화의 정의에 해당한다."}, {"no": "23-96", "year": 2024, "qno": 21, "text": "발레란드와 비소네트(Vallerand & Bissonnette)가 구분한 학습동기 단계에서 자율성이\n가장 높은 것은?", "options": ["① 내적 강압 단계(extrinsic-introjected regulation)", "② 의미 부여 단계(extrinsic-intergrated regulation)", "③ 지식 탐구 단계(intrinsic-to know)", "④ 지적 성취 단계(intrinsic-to accomplish to things)", "⑤ 지적 자극 추구 단계(intrinsic-to experience stimulation)"], "answer": 4, "expl": "내재적 동기 중에서도 감각적 자극과 즐거움을 경험하기 위한 지적 자극 추구 단계가 가장 순수한 내재적 동기로 자율성이 가장 높은 수준에 해당한다."}, {"no": "23-97", "year": 2024, "qno": 22, "text": "주의집중력 문제와 관련하여 인지적 측면에서 정보처리 능력에 해당하는 것은?", "options": ["① 자신감", "② 학습경험", "③ 생활습관", "④ 정서적 안정감", "⑤ 주변환경에 대한 신뢰감"], "answer": 1, "expl": "학습경험은 정보를 처리하고 조직화하는 인지적 자원으로 축적되어 주의집중과 관련된 정보처리능력에 영향을 미친다."}, {"no": "23-98", "year": 2024, "qno": 23, "text": "영재아가 학습부진을 경험하게 될 때 영향을 줄 수 있는 요인에 해당하지 않는 것은?", "options": ["① 둔감성", "② 완벽주의", "③ 비현실적 기대", "④ 대인관계 기술의 결핍", "⑤ 창의적 욕구와 능력의 표현 억압"], "answer": 2, "expl": "영재아의 학습부진 요인으로는 완벽주의, 비현실적 기대, 대인관계 기술 결핍, 창의적 욕구 억압 등이 꼽히며, 오히려 자신과 주변에 대한 예민한 민감성이 특징이라 '둔감성'은 이에 해당하지 않는다."}, {"no": "23-99", "year": 2024, "qno": 24, "text": "시험불안의 원인이 시험상황을 위협적인 상황으로 해석함과 동시에 자신의 능력을 평가\n절하하는 것이라고 보는 이론적 모델은?", "options": ["① 행동주의적 모델", "② 욕구이론적 모델", "③ 정신역동적 모델", "④ 인지적 모델", "⑤ 상호교류적 과정 모델"], "answer": 2, "expl": "시험상황을 위협으로 해석하고 자신의 능력을 과소평가하는 인지적 해석 과정에 초점을 두는 것은 인지적 모델의 설명이다."}, {"no": "23-100", "year": 2024, "qno": 25, "text": "학업문제 부진아의 일반적인 진단 기준에 해당하지 않는 것은?", "options": ["① 자아와 미래에 대한 성찰이 결핍되어 있음", "② 가정과 학교에서 자신에게 부과된 개인적 책임을 지속적으로 미룸", "③ 자신보다는 타인에 대해 좀 더 많은 책임감을 가짐", "④ 학업 수행에 관해 과대평가하는 경향성이 있음", "⑤ 당황스러움이나 수치심에 대해 두드러진 자기의식 또는 민감성을 보임"], "answer": 4, "expl": "학업부진아는 대체로 자신의 책임을 회피하고 타인 탓으로 돌리는 경향을 보이므로, '타인에 대해 더 많은 책임감을 가진다'는 설명은 진단기준과 반대된다."}];
const STORAGE_KEY = "ycs2_academic_v1";
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let mode = "all";

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function setMode(m){
  mode = m;
  document.getElementById('btn-all').classList.toggle('active', m==='all');
  document.getElementById('btn-wrong').classList.toggle('active', m==='wrong');
  render();
}

function resetAll(){
  if(confirm('푼 기록을 모두 초기화할까?')){
    state = {};
    saveState();
    render();
  }
}

function answer(qIdx, optIdx){
  const q = QUESTIONS[qIdx];
  if(state[q.no] !== undefined) return;
  state[q.no] = optIdx;
  saveState();
  render();
}

function updateMeta(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
}

function updateProgress(){
  const total = QUESTIONS.length;
  const done = QUESTIONS.filter(q => state[q.no] !== undefined).length;
  const correct = QUESTIONS.filter(q => state[q.no] === q.answer).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `${done}/${total} 문제 풀이 · 정답 ${correct}개` + (done>0 ? ` (정답률 ${Math.round(correct/done*100)}%)` : '');
}

function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

function render(){
  updateMeta();
  updateProgress();
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  let list = QUESTIONS;
  if(mode === 'wrong'){
    list = QUESTIONS.filter(q => state[q.no] !== undefined && state[q.no] !== q.answer);
  }
  if(list.length === 0){
    area.innerHTML = '<div class="empty">' + (mode==='wrong' ? '틀린 문제가 없어! 🌿' : '문제가 없어.') + '</div>';
    return;
  }
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const card = document.createElement('div');
    card.className = 'card';
    const answered = state[q.no] !== undefined;
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt';
      if(answered){
        if(i === q.answer) cls += ' correct';
        else if(i === state[q.no]) cls += ' wrong';
      }
      optsHtml += `<button class="${cls}" ${answered?'disabled':''} onclick="answer(${qIdx}, ${i})">${opt}</button>`;
    });
    let feedback = '';
    if(answered){
      const mark = state[q.no] === q.answer
        ? '<div class="feedback correct-mark">✅ 정답</div>'
        : `<div class="feedback wrong-mark">❌ 오답 (정답: ${q.answer+1}번)</div>`;
      const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
      feedback = mark + expl;
    }
    card.innerHTML = `
      <div class="qnum">${q.year} · 문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      ${feedback}
    `;
    area.appendChild(card);
  });
}

render();
</script>
