<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담연구방법론의 기초 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --wrong-bg:#f7e9e7;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .toolbar{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .btn{
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:8px 14px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .btn.active{color:var(--accent-dark);font-weight:600;}
  .progress-bar{
    height:8px;
    border-radius:6px;
    background:var(--shadow-dark);
    overflow:hidden;
    margin-bottom:8px;
    box-shadow:inset 2px 2px 4px var(--shadow-dark);
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{font-size:12px;color:var(--sub);margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{
    padding:3px 0;
    line-height:1.6;
  }
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .opt{
    text-align:left;
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
    transition:background .15s ease;
    white-space:pre-wrap;
  }
  .opt:hover{background:#eef1ee;}
  .opt.correct{background:var(--right-bg);color:var(--accent-dark);font-weight:600;box-shadow:none;}
  .opt.wrong{background:var(--wrong-bg);color:var(--wrong);font-weight:600;box-shadow:none;}
  .opt:disabled{cursor:default;}
  .opt:disabled:hover{background:var(--bg-base);}
  .opt.correct:disabled:hover{background:var(--right-bg);}
  .opt.wrong:disabled:hover{background:var(--wrong-bg);}
  .feedback{
    margin-top:12px;
    font-size:13px;
    font-weight:600;
  }
  .feedback.correct-mark{color:var(--accent-dark);}
  .feedback.wrong-mark{color:var(--wrong);}
  .explain{
    margin-top:8px;
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
  .empty{
    text-align:center;
    color:var(--sub);
    padding:60px 0;
    font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">‹ 목록으로</a>
  <h1>상담연구방법론의 기초</h1>
  <div class="meta-line" id="metaLine"></div>
  <div class="toolbar">
    <button class="btn active" id="btn-all" onclick="setMode('all')">전체보기</button>
    <button class="btn" id="btn-wrong" onclick="setMode('wrong')">오답만 보기</button>
    <button class="btn" onclick="resetAll()">초기화</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div id="quizArea"></div>
</div>
<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "상담연구방법 중 질적 연구의 특징에 해당하지 않는 것은?", "options": ["① 자연스러운 상황에서 인간의 행동특성을 탐구한다.", "② 참여자 관점에서 개인이 지각한 세계를 포착하려고 한다.", "③ 자료의 계량화를 통한 실증 기반의 접근방식을 선호한다.", "④ 상담대상과 관련된 모든 자료는 가치 있다고 간주한다.", "⑤ 상담과정과 연구과정을 통합하여 접근하려는 경향이 있다."], "answer": 2, "expl": "질적 연구는 계량화된 실증 접근보다 자연스러운 맥락에서의 의미와 경험을 중시하며, 자료의 계량화·실증 기반 접근은 오히려 양적 연구의 특징이다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "보편적인 법칙이나 일반적인 이론으로부터 도출된 가설을 경험적으로 검증하여 이론을 증명하고 현상을 설명ㆍ예측하는 연구방법은?", "options": ["① 귀납법", "② 연역법", "③ 관찰법", "④ 실험법", "⑤ 면접법"], "answer": 1, "expl": "이론에서 가설을 도출해 경험적으로 검증하는 방식은 연역법이며, 귀납법은 개별 관찰에서 일반화된 결론을 이끄는 방식이다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "양적연구 논문 작성 시 '연구방법' 부분에 포함해야 할 내용을 모두 고른 것은?\nㄱ. 표본으로 추출될 표집집단에 관한 정보제시\nㄴ. 자료처리 과정 및 자료처리 활용도구 제시\nㄷ. 척도의 유형 또는 예시문항 제시\nㄹ. 연구의 의의 및 중요성 제시", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "'연구방법' 절에는 표집 정보(ㄱ), 자료처리 절차·도구(ㄴ), 척도 유형·문항(ㄷ)이 들어가지만, 연구의 의의·중요성(ㄹ)은 서론에 해당한다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "통계적 가설검정 시 유의수준(값)을 0.05에서 0.01로 설정하였을 때의 설명으로 옳은 것은?", "options": ["① 1종 오류의 위험이 감소한다.", "② 2종 오류의 위험이 감소한다.", "③ 1종 오류와 2종 오류 위험 모두 증가한다.", "④ 2종 오류와 1종 오류 위험 모두 감소한다.", "⑤ 1종 오류와 2종 오류 위험 모두 변화가 없다."], "answer": 0, "expl": "유의수준을 낮추면(0.05→0.01) 영가설을 잘못 기각할 확률인 1종 오류 위험은 감소하지만, 대신 2종 오류 위험은 증가하는 경향이 있다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "양적연구에서 조작적 정의에 관한 설명으로 옳지 않은 것은?", "options": ["① 추상적 개념을 실증적으로 검증하기 위한 과정이다.", "② 특정 개념을 구성하는 하위요소 간 내적 일치정도를 구인하는 과정이다.", "③ 동일한 개념이라도 연구자의 이론적 배경에 따라 다르게 정의될 수 있다.", "④ 개념의 어떤 속성을 조작할 것인가에 대하여 결정해야 한다.", "⑤ 측정 가능한 형태로의 계량화가 가능하다."], "answer": 1, "expl": "조작적 정의는 추상적 개념을 측정 가능하게 구체화하는 과정이며, 하위요소 간 내적 일치도를 구하는 것은 신뢰도(내적일관성) 검증에 해당해 조작적 정의의 정의와는 다르다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "척도에 관한 설명으로 옳지 않은 것은?", "options": ["① 비율척도에는 절대 영점이 존재한다.", "② 등간척도로 측정된 점수를 토대로 표준편차 계산과 같은 통계분석이 가능하다.", "③ 서열척도는 순위에 대한 정보를 포함하고 있다.", "④ 하나의 특성은 하나의 척도로만 측정되어야 한다.", "⑤ 명목척도는 상호배타적 특성을 갖는다."], "answer": 3, "expl": "척도는 연구 목적에 따라 하나의 특성을 여러 척도로 다르게 측정할 수도 있으므로 '하나의 척도로만 측정되어야 한다'는 설명은 옳지 않다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "다음에 나타난 표본추출기법에 관한 설명으로 옳은 것은?\n연구자 A는 OO시 거주 청소년들의 행복감을 조사하기 위하여 주민등록상 OO시에 거주하는 모든 청소년들을 표집틀로 가정하고 전원 일련번호를 부여한 후, 추출예정 표본 크기를 고려하여 표본추출간격을 정하였다. 첫 번째 구간에서 특정 순번 K를 무작위로 선택한 다음, 나머지 표본은 모든 구간에서 K번째 청소년을 추출하였다.", "options": ["① 표집틀을 내적으로 동질적이고 외적으로 이질적인 두 개 이상의 범주로 구분한다.", "② 표집틀의 전체 요소에 고유번호를 붙인 후 난수표를 사용하여 무작위로 표본을 추출한다.", "③ 표집틀의 요소들이 어떤 주기적 경향성을 띠지 않아야 한다.", "④ 표집틀을 내적 및 외적으로 모두 동질적인 두 개 이상의 범주로 구분한다.", "⑤ 표집틀을 확보하고 있지 못하고 있을 때에도 활용 가능하다."], "answer": 2, "expl": "일련번호를 매긴 뒤 일정 간격(K)으로 표본을 추출하는 방식은 계통표집이며, 표집틀 요소가 주기적 경향성을 띠면 편향된 표본이 추출될 위험이 있다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "단순회귀 모형과 결정계수 R²에 관한 설명으로 옳은 것은?", "options": ["① R²값은 Y에 의해 설명되는 X분산의 비율을 의미한다.", "② 잔차의 평균값은 1이다.", "③ 최소제곱법을 통해 회귀계수 값을 구한다.", "④ R²값은 0에서 양의 무한대 값을 갖는다.", "⑤ 절편은 X가 1일 때 Y의 값이다."], "answer": 2, "expl": "R²은 독립변수(X)에 의해 설명되는 종속변수(Y) 분산의 비율을 의미하며 0~1 사이의 값을 갖는다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "다음의 연구방법과 자료분석 방법의 연결로 옳은 것을 모두 고른 것은?\nㄱ. 담화분석 - 언어구조와 언어 사용 맥락간의 관계성 이해\nㄴ. 내용분석 - 텍스트에 대한 비계량적 분석과 주관적 해석\nㄷ. 내러티브 연구 - 개인이 경험한 시공간 맥락과의 상호작용 이해\nㄹ. 문화기술지 - 관찰 등을 통해 수집된 자료에 대한 종합적 분석", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "내용분석은 텍스트를 범주화하여 '계량적'으로 분석하는 기법에 가까우므로 '비계량적 분석과 주관적 해석'이라는 설명(ㄴ)은 내용분석과 맞지 않는다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "실험연구의 내적타당도에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 내적타당도를 높이기 위해 무선 할당한다.\nㄴ. 성숙효과는 내적타당도와 무관하다.\nㄷ. 일반적으로 유사실험설계는 진실험설계에 비해 내적타당도 확보가 어렵다.\nㄹ. 실험연구 중 동일 특성에 대한 측정도구의 변동은 내적타당도 저해요인이다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "무선할당은 내적타당도를 높이고, 성숙효과·측정도구 변동은 내적타당도를 저해하는 대표적 요인이며, 유사실험설계는 무선할당이 없어 진실험설계보다 내적타당도 확보가 어렵다."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "측정도구의 타당도에 관한 설명으로 옳지 않은 것은?", "options": ["① 측정과정에서 발생하는 체계적 오차와 관련이 있다.", "② 내용타당도는 준거관련타당도의 한 유형이다.", "③ 측정하고자 하는 개념에 대한 명료한 정의가 필요하다.", "④ 구성개념타당도에는 수렴타당도와 판별타당도가 있다.", "⑤ 요인분석을 통해 타당도를 평가할 수 있다."], "answer": 1, "expl": "내용타당도는 준거관련타당도가 아니라 별도의 타당도 유형으로 분류되며, 준거관련타당도에는 공인타당도·예측타당도가 포함된다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "크론바하 알파(Cronbach's alpha)값에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 문항수와 각 문항 측정치들 간의 상관계수들의 평균값만으로 구할 수 있다.\nㄴ. -1에서 1사이의 값을 갖는다.\nㄷ. 문항수의 증가는 크론바하 알파값을 증가시키는 경향이 있다.\nㄹ. 동일 개념 측정 문항들 간의 내적일관성을 평가하는 통계적 방법이다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "크론바하 알파는 문항수와 문항 간 평균 상관계수로 계산 가능하고 통상 0~1 사이 값으로 해석되며, 문항수가 늘수록 값이 커지는 경향이 있다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "다음 연구에 관한 설명으로 옳은 것은?\n연구자 A는 청소년 대상 우울감 예방교육 프로그램의 효과를 알아보기 위하여, 전국 청소년 모집단에서 무작위로 선발된 청소년 200명을 두 집단으로 다시 무작위 배치한 후 우울감 수준을 1차 측정하여 집단비교를 수행하였다. 이 후 여성가족부가 제작한 우울감 예방교육 프로그램을 한 집단에서만 수행 한 다음, 두 집단을 대상으로 동일 측정도구를 활용하여 우울감 수준을 2차 측정하고 집단 비교를 수행하였다. 처치 이외의 모든 조건은 두 집단에서 동일하였다.", "options": ["① 단일집단 사전사후측정설계에 해당한다.", "② 사후측정통제집단설계에 해당한다.", "③ 우울감 예방교육은 종속변수이다.", "④ 두 집단 무작위배치를 통해 내적타당도를 향상시켰다.", "⑤ 솔로몬 4집단 설계에 해당한다."], "answer": 3, "expl": "무작위 선발 후 두 집단에 무작위 배치하고 사전-사후 측정을 모두 실시했으므로 전형적인 사전사후측정통제집단설계이며, 무선배치를 통해 내적타당도가 향상된다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "다음은 청소년의 우울감 수준에 영향을 미치는 요인들에 대한 가상의 다중회귀분석 결과를 요약한 것이다. 이에 관한 설명으로 옳지 않은 것은? (회귀모형 제곱합 300, 잔차 제곱합 5000, 잔차 자유도 500, 잔차 평균제곱 10; 학업성적 B=10, 표준오차=2, 베타=.300, t=5, p=.000; 교우관계 B=20, 표준오차=4, 베타=.172, t=5, p=.000; 부모와의 관계 B=10, 표준오차=20, 베타=.297, t=.5, p=.12)", "options": ["① '모든 독립변수의 회귀계수는 0이다.'가 귀무가설이다.", "② 회귀 자유도(A)값은 독립변수의 개수이다.", "③ 회귀 평균제곱(B)값은 100이다.", "④ F값(C)은 10이다.", "⑤ 유의수준 .05에서 모든 독립변수들이 종속변수에 유의미한 영향을 미치고 있다."], "answer": 4, "expl": "부모와의 관계 변수는 p=.12로 유의수준 .05에서 유의하지 않으므로, '모든 독립변수가 유의하다'는 설명은 틀렸다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "통계적 가설검정에 관한 설명으로 옳은 것은?", "options": ["① 1종 오류의 허용범위는 유의수준이다.", "② 2종 오류의 크기는 통계적 검정력과는 무관하다.", "③ 1종 오류 확률은 영가설이 거짓인데도 영가설을 채택하는 확률이다.", "④ 2종 오류는 영가설이 참임에도 불구하고 이를 기각하는 오류이다.", "⑤ 영가설이 거짓일 때 이를 기각함으로써 틀린 결정을 내릴 가능성의 정도는 통계적 검정력이다."], "answer": 0, "expl": "통계적 검정력은 영가설이 거짓일 때 이를 옳게 기각할 확률이며, 2종 오류(1-검정력)와 밀접하게 연관된다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "유사실험설계(quasi-experimental design)에 관한 설명으로 옳은 것은?", "options": ["① 실험집단과 통제집단의 실험전 상태가 동일하다.", "② 진실험설계와 유사한 수준의 외생변수통제 효과를 갖는다.", "③ 단일집단시계열실험설계는 유사실험설계에 해당한다.", "④ 피험자를 무선배치한다.", "⑤ 진실험설계에 비해 내적타당도 확보가 용이하다."], "answer": 2, "expl": "유사실험설계는 무선배치가 이루어지지 않는 대신 기존 집단을 활용하는 설계이며, 단일집단시계열설계가 대표적인 유사실험설계 유형이다."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "상담연구에서 단일사례연구설계(single-case research design)에 관한 설명으로 옳은 것은?", "options": ["① ABAB설계(reversal design)는 단일사례연구설계에 해당한다.", "② 임상적 유의미성 보다는 통계적 검증을 중시한다.", "③ 연구 진행과정에서 연구설계나 연구절차의 유연한 수정이 어렵다.", "④ 연구결과의 일반화 수준이 높다.", "⑤ 통제집단의 변화를 통해 처치효과를 추정한다."], "answer": 0, "expl": "ABAB(반전)설계는 기초선-개입-기초선-개입을 반복하는 대표적인 단일사례연구설계 유형이다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "모의상담연구에 관한 설명으로 옳은 것은?", "options": ["① 상담과정 단순화가 어려우며 결과적으로 연구결과의 해석이 난해해진다.", "② 실험과정에서 윤리적 문제가 필연적으로 발생한다.", "③ 독립변수의 수준에 대한 조작이 불가능하다.", "④ 변수의 조작적 정의를 구체화 할 수 없다는 것이 단점이다.", "⑤ 대리 내담자의 활용을 통해 재정적 부담을 완화할 수 있다."], "answer": 4, "expl": "모의상담연구는 실제 내담자 대신 대리 내담자(역할연기자)를 활용해 재정적·윤리적 부담을 줄일 수 있는 장점이 있다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "변수 X와 Y간 공분산과 피어슨(Pearson) 적률상관계수에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. Y의 분산이 0이면 X와 Y간 공분산은 항상 0이다.\nㄴ. X와 Y 간의 피어슨 적률상관계수가 0.4이면, X는 Y의 분산 중 16%를 설명할 수 있다.\nㄷ. 각 변수에 양의 상수를 곱할 경우, 피어슨 적률상관계수는 커지게 된다.\nㄹ. 피어슨 적률상관계수의 범위는 음의 무한대에서 양의 무한대이다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "상관계수 0.4의 제곱인 결정계수는 .16으로, X가 Y분산의 16%를 설명한다고 해석할 수 있다."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "상관관계 분석에서 상관계수에 관한 설명으로 옳지 않은 것은?", "options": ["① 하나의 변수가 다른 변수와의 관계에서 어느 정도 관련성이 있는지 알아보기 위해 사용된다.", "② 상관계수를 제곱한 값은 총 변량 중 두 변수의 연합된 변량의 비율 정도를 의미한다.", "③ 상관계수 값의 범위는 -1≤r≤1이다.", "④ 변수 간 상관은 그 값이 -1에 가까울수록 낮아지고, 1에 가까울수록 높아지는 경향이 있다.", "⑤ 주로 등간 및 비율척도로 구성된 변수 간의 상관분석을 위해 사용된다."], "answer": 3, "expl": "상관계수는 -1에 가까울수록 관련성이 강한 부적 상관을 의미하므로 '낮아진다'는 표현이 아니라 오히려 관계의 강도가 커진다고 봐야 한다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "현상학적 접근방식에 관한 설명으로 옳지 않은 것은?", "options": ["① 훗설(E. Husserl)의 철학적 전통에 기반하고 있다.", "② 대상 자체를 있는 그대로 이해하는 방식이다.", "③ 대상에 대한 일체의 선입견을 배제하기 위해 노력한다.", "④ 괄호치기를 통해 획득된 간주관적 신념은 사물의 본질을 이해하는데 도움이 된다.", "⑤ 현상학적 환원을 통해 사물에 대한 선험적 판단을 중지할 수 있다."], "answer": 3, "expl": "현상학적 환원(괄호치기)은 선입견을 배제하기 위한 절차이며, 그 결과로 얻어진 신념이 자동으로 사물의 본질 이해에 도움이 된다고 단정하는 것은 현상학의 취지와 어긋난다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "근거이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 상징적 상호작용론에 근거를 두고 있다.\nㄴ. 선택코딩은 생성된 범주들을 하위범주와 연결시키는 과정이다.\nㄷ. 개방코딩은 현상의 개념을 밝히고 그 속성을 범주화하는 과정이다.\nㄹ. 지속적인 비교방법에 근거한 체계적 분석과정을 통해 이론을 구성한다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "근거이론은 상징적 상호작용론에 기반하며 개방코딩(개념화·범주화), 선택코딩(핵심범주 중심 통합), 지속적 비교방법을 통해 이론을 구성한다."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "합의적 질적연구(CQR)에서 연구 참여자의 단어를 명확ㆍ간결하게 정리ㆍ편집하고 비언어적 단서를 발화내용 중심으로 추출하는 분석단계는?", "options": ["① 영역코딩", "② 중심개념코딩", "③ 주변범주코딩", "④ 교차분석", "⑤ 감사"], "answer": 1, "expl": "참여자의 표현을 명료하고 간결하게 정리하며 비언어적 단서를 발화 내용 중심으로 반영하는 단계는 영역코딩이다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "인간 대상 실험연구윤리를 다룬 벨몬트 보고서(The Belmont Report)에서 연구자가 고려해야 할 '정의의 원칙'에 관한 설명으로 옳은 것은?", "options": ["① 연구 참여자의 의견, 생각과 선택을 듣고 이를 존중한다.", "② 연구 참여자에게 참여 동의를 구할 때 연구 내용에 대해 확실히 이해하고 있는지 확인한다.", "③ 연구 참여자가 얻을 수 있는 이익과 감내해야 할 위험이 공정한지 여부를 확인한다.", "④ 연구 참여자의 위험은 최소화하고 이익은 최대화하는 방향으로 연구계획을 수립한다.", "⑤ 연구 수행 시 연구 참여자에 대한 위험을 충분히 관리할 수 있는지를 확인한다."], "answer": 2, "expl": "정의의 원칙은 연구의 이익과 위험 부담이 참여자 간에 공정하게 분배되는지를 다루며, 특정 집단에만 위험이 편중되지 않도록 하는 것과 관련된다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "다음에 해당하는 상담 연구윤리의 기본원칙은?\n연구 참여자는 연구에 참여할지 않을지에 관해 스스로 결정할 수 있으며, 연구자는 연구 내용 및 목적 등과 관련된 정보를 연구 참여 동의서 상에 고지해야 한다.", "options": ["① 자율성의 원칙", "② 강압금지의 원칙", "③ 선행의 원칙", "④ 무해성의 원칙", "⑤ 은닉금지의 원칙"], "answer": 0, "expl": "연구 참여 여부를 스스로 결정하고, 필요한 정보를 사전에 고지받는 것은 자율성의 원칙(충분한 정보에 의한 자발적 동의)에 해당한다."}, {"no": "23-26", "year": 2024, "qno": 1, "text": "다음 사례에서 연구가설이 표현하고 있는 효과는?", "options": ["① B의 직접효과", "② B의 매개효과", "③ A의 간접효과", "④ M의 조절효과", "⑤ B의 이월효과"], "answer": 2, "expl": "A가 M을 통해 B에 영향을 미친다는 가설은 M이 A와 B 사이를 매개하는 매개효과를 나타낸다."}, {"no": "23-27", "year": 2024, "qno": 2, "text": "가설 설정 및 검정에 관한 설명으로 옳지 않은 것은?", "options": ["① 가설 설정은 주로 연역적 접근법을 사용한다.", "② 유의수준보다 유의확률(p값)이 작으면 영가설을 기각한다.", "③ 가설 검정을 위한 자료분석 방법은 논문의 연구방법에 기술한다.", "④ 영가설을 기각했을 때 이 결정이 오류일 확률을 1종 오류라고 한다.", "⑤ 자료분석 결과가 연구자의 예측과 다르게 나타나면 연구가설을 수정해서 논문에 보고한다."], "answer": 4, "expl": "연구가설은 자료수집 이전에 이론적 근거로 설정되는 것이며, 결과가 예측과 다르다고 사후에 가설을 수정해 보고하는 것은 연구윤리에 어긋난다."}, {"no": "23-28", "year": 2024, "qno": 3, "text": "연구 수행에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 연구의 독특성, 의의 및 실행 가능성을 고려하여 연구 주제와 연구문제를 결정한다.\nㄴ. 관련 이론과 선행 연구들이 부재한 상황에서도 인과관계를 검증할 수 있는 실험\n연구를 우선적으로 고려한다.\nㄷ. 양적 연구 수행 시 연구의 내적타당도뿐 아니라 연구 결과의 일반화 가능성도\n중요한 고려 사항이다.\nㄹ. 자기보고식 검사를 사용하면 모든 참여자들이 성실하고 정확하게 문항에 반응한다.", "options": ["① ㄷ", "② ㄱ, ㄷ", "③ ㄴ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄹ"], "answer": 1, "expl": "연구주제 결정 시 독특성·의의·실행가능성을 고려하고(ㄱ), 내적타당도뿐 아니라 일반화 가능성도 고려해야 하지만(ㄷ), 이론과 선행연구 없이 실험을 우선하거나(ㄴ) 자기보고식 검사 응답의 성실성을 가정하는 것(ㄹ)은 옳지 않다."}, {"no": "23-29", "year": 2024, "qno": 4, "text": "상담 연구에 관한 일반적인 설명으로 옳지 않은 것은?", "options": ["① 눈덩이표집은 확률표집의 일종이다.", "② 군집분석은 사람뿐 아니라 진술문이나 검사문항을 범주화하는 목적으로 활용된다.", "③ 자기보고식 검사는 심층면접에 비해 상대적으로 실시하기 용이하다.", "④ 이론은 인간 행동을 개념화할 뿐 아니라, 가설 도출 및 검증의 기반이 된다.", "⑤ 연구자마다 다른 이론을 토대로 동일한 변인을 다르게 조작적으로 정의할 수 있다."], "answer": 0, "expl": "눈덩이표집은 비확률표집(임의표집)의 대표적인 예이며, 확률표집이라는 설명은 옳지 않다."}, {"no": "23-30", "year": 2024, "qno": 5, "text": "양적 연구 패러다임에 관한 설명으로 옳은 것은?", "options": ["① 일반적으로 구성주의 관점을 따른다.", "② 주로 영역코딩, 축코딩, 개방코딩 등 귀납적인 자료분석을 실시한다.", "③ 표본의 대표성, 관찰의 객관성, 실증주의적 관점을 중시한다.", "④ 근거이론, 현상학적 연구, 합의적 질적 연구가 해당된다.", "⑤ 참여관찰을 통해 연구대상이 상황에 부여하는 의미를 이해하고자 한다."], "answer": 2, "expl": "양적 연구는 표본의 대표성과 관찰의 객관성을 강조하는 실증주의적 패러다임에 기반하며, 나머지는 질적 연구의 특징이다."}, {"no": "23-31", "year": 2024, "qno": 6, "text": "양적 연구의 타당도에 관한 설명으로 옳지 않은 것은?", "options": ["① 무선표집(random sampling)을 실시하면 일반적으로 외적타당도가 증가한다.", "② 연구참여자들을 실험집단과 통제집단에 무선할당(random assignment)하면 일반적으로 내적타당도가 감소한다.", "③ 일반적으로 실험연구는 가외변인을 통제하기 때문에 내적타당도가 높다.", "④ 연구 수행 중에 참여자들이 이탈하고 측정도구가 바뀔 경우 연구의 타당도가 위협받는다.", "⑤ 변인 간 상관관계를 토대로 인과관계를 단정할 수 없다."], "answer": 1, "expl": "무선할당은 집단 간 동질성을 확보해 내적타당도를 '증가'시키는 절차이며, '감소시킨다'는 설명은 옳지 않다."}, {"no": "23-32", "year": 2024, "qno": 7, "text": "통계적 검정력(statistical power)에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 2종오류의 크기는 통계적 검정력과는 관련이 없다.\nㄴ. 통계 검정의 가정이 위배되면 일반적으로 통계적 검정력은 감소한다.\nㄷ. 통계적 검정력이 1에 가까울수록 1종오류는 0에 가까워진다.\nㄹ. 1종오류의 수준을 보수적으로 설정하면(예: .001), 실제 효과가 있을 때 효과가\n있다고 결론내리기 어려워진다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "통계 검정의 가정 위배는 검정력을 감소시키고(ㄴ), 유의수준을 보수적으로(작게) 설정하면 실제 효과를 검출하기 어려워져(ㄹ) 검정력이 낮아지므로 ㄴ·ㄹ이 옳으며, 2종오류와 검정력은 서로 밀접히 관련되어 ㄱ은 옳지 않다."}, {"no": "23-33", "year": 2024, "qno": 8, "text": "척도의 타당도를 평가할 수 있는 방법을 모두 고른 것은?\nㄱ. 요인분석\nㄴ. 문항의 내용 및 척도 구성에 대한 전문가의 판단\nㄷ. 타당성이 확보된 기존 척도와의 상관\nㄹ. 다특성-다방법(multitrait-multimethod) 접근", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "요인분석, 전문가 판단, 기존 척도와의 상관, 다특성-다방법 접근 모두 척도의 타당도(구성·내용·공인 타당도 등)를 평가하는 대표적 방법이다."}, {"no": "23-34", "year": 2024, "qno": 9, "text": "측정도구 선정 및 사용에 관한 설명으로 옳은 것은?", "options": ["① 반복된 측정으로 인한 연습효과가 예상될 경우, 연구자는 동형검사(parallel forms) 사용을 고려하는 것이 좋다.", "② 측정도구의 신뢰도가 높으면 타당도 또한 당연히 높다고 가정한다.", "③ 측정도구 선정 시 검사의 경제성, 피검자의 피로도는 고려할 사항이 아니다.", "④ 측정도구가 특정 연령대를 대상으로 타당화되었다면 다른 연령대에도 타당도가 확보된 것으로 가정한다.", "⑤ 일반적으로 한 개의 측정도구로도 특정 구성개념을 완벽히 구인할 수 있기 때문에, 구성개념을 측정하기 위해 두 개 이상의 측정도구를 사용할 필요가 없다."], "answer": 0, "expl": "연습효과가 우려될 때 동일한 검사를 반복 사용하는 대신 동형검사를 활용하면 연습효과를 줄이면서 반복측정이 가능하다."}, {"no": "23-35", "year": 2024, "qno": 10, "text": "척도의 신뢰도(reliability)에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 척도의 문항이 1개일 경우 반분신뢰도 계수는 1이다.\nㄴ. 같은 척도를 연령대가 다른 참여자들에게 실시해도 신뢰도 계수는 변하지 않는다.\nㄷ. Cronbach의 alpha는 검사-재검사 신뢰도를 나타낸다.\nㄹ. 문항들의 내용이 서로 유사하면 척도의 내적 일관성은 커진다.", "options": ["① ㄱ", "② ㄹ", "③ ㄱ, ㄹ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "문항 내용이 서로 유사할수록 내적일관성(신뢰도)이 커지는 것은 맞지만(ㄹ), 문항이 1개일 때 반분신뢰도를 구할 수 없고(ㄱ), 연령대에 따라 신뢰도가 달라질 수 있으며(ㄴ), Cronbach alpha는 내적일관성 신뢰도이지 검사-재검사 신뢰도가 아니어서(ㄷ) ㄹ만 옳다."}, {"no": "23-36", "year": 2024, "qno": 11, "text": "다음 각각의 사례에 적절한 분석 방법을 옳게 짝지은 것은?\nㄱ. 연구자는 '자기수용척도' 하위척도(자기수용-1, 자기수용-2, 자기수용-3) 점수의\n프로파일을 토대로 연구 참여자들을 적극적 자기수용자, 소극적 자기수용자, 비수\n용자로 구분했다.\nㄴ. 연구자의 관심은 A와 B의 관계를 C가 조절하는지를 확인하는데 있다. 이를 위해\n연구자는 1단계에 공변인을 투입하고, 2단계에 A와 C를 투입하고, 마지막 3단계에\nA와 C의 상호작용 항을 투입해서 B를 설명하는 모형을 설정한 후 상호작용 항이\n통계적으로 유의한지 확인했다.", "options": ["① ㄱ: 경로분석, ㄴ: 위계적 회귀분석", "② ㄱ: 요인분석, ㄴ: 경로분석", "③ ㄱ: 군집분석, ㄴ: 메타분석", "④ ㄱ: 군집분석, ㄴ: 위계적 회귀분석", "⑤ ㄱ: 메타분석, ㄴ: 반복측정 분산분석"], "answer": 3, "expl": "프로파일 유형에 따라 대상을 분류하는 것은 군집분석이며, 단계적으로 변수를 투입해 상호작용항의 유의성을 검증하는 것은 위계적 회귀분석이다."}, {"no": "23-37", "year": 2024, "qno": 12, "text": "논문 작성 시 '논의 및 결론'에 포함될 내용에 관한 설명으로 옳은 것은?", "options": ["① 연구 가설을 지지하지 않는 연구결과는 보고하거나 해석하지 않는다.", "② 연구 결과가 상담 실무 및 관련 이론에 갖는 시사점을 기술한다.", "③ 연구에서 활용한 척도 및 자료 수집 절차를 상세히 기술한다.", "④ 연구의 배경이 되는 이론과 선행연구들을 소개하고 가설을 진술한다.", "⑤ 연구 참여자들의 인구통계학적 정보를 표로 제시한다."], "answer": 1, "expl": "논의 및 결론에서는 연구결과가 실무와 이론에 주는 시사점을 논하며, 가설을 지지하지 않는 결과도 반드시 해석·보고해야 한다."}, {"no": "23-38", "year": 2024, "qno": 13, "text": "논문 작성 시 '연구방법'에 포함될 내용으로 옳은 것은?", "options": ["① 연구의 필요성과 목적", "② 가설 검정을 위한 자료 분석 결과", "③ 연구 결과 요약 및 선행 연구와의 비교", "④ 가설 설정의 근거가 되는 이론과 선행연구 결과", "⑤ 참여자 모집 절차 및 선정 기준"], "answer": 4, "expl": "참여자 모집 절차와 선정 기준은 연구방법(연구대상) 절에 기술되는 대표적인 내용이다."}, {"no": "23-39", "year": 2024, "qno": 14, "text": "진실험설계가 충족해야 할 조건으로 옳지 않은 것은?", "options": ["① 외생(extraneous)변수의 통제", "② 무작위 집단 배정", "③ 현장실험", "④ 종속변수값 간의 비교", "⑤ 독립변수의 조작"], "answer": 2, "expl": "진실험설계의 핵심 조건은 무작위 배정, 독립변수 조작, 외생변수 통제, 결과 비교이며, 실험실이 아닌 '현장실험'이어야 한다는 것은 진실험설계의 필수조건이 아니다."}, {"no": "23-40", "year": 2024, "qno": 15, "text": "자료의 총체로부터 귀납적으로 이론을 개발하는 방법으로서, 연구자는 수집한 자료에 기초하여 가설을 설정하고 검증하며, 분석적 귀납법이라고 부르는 과정을 통해 이론을 개발하는 연구방법은?", "options": ["① 현상학적 연구", "② 사례연구", "③ 문화기술지 연구", "④ 합의적 질적 연구", "⑤ 근거이론 연구"], "answer": 4, "expl": "자료로부터 귀납적으로 개념과 이론을 도출하며 분석적 귀납법을 사용하는 연구방법은 근거이론 연구이다."}, {"no": "23-41", "year": 2024, "qno": 16, "text": "단순선형회귀분석에서 총변동(SST) 중 SSE가 차지하는 비중이 주어졌을 때 결정계수 R²의 값은?", "options": ["① 1/5", "② 1/25", "③ 4/5", "④ 5", "⑤ 25"], "answer": 2, "expl": "결정계수는 R² = 1 - (SSE/SST)로 계산되며, SSE 비중이 1/5일 때 R²은 4/5가 된다."}, {"no": "23-42", "year": 2024, "qno": 17, "text": "집단간 설계에 해당하는 것을 모두 고른 것은?\nㄱ. 사후검사 통제집단 설계 ㄴ. 솔로몬 4집단 설계\nㄷ. 교차설계 ㄹ. 라틴정방형(Latin square) 설계", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄴ, ㄹ", "⑤ ㄷ, ㄹ"], "answer": 0, "expl": "사후검사 통제집단 설계와 솔로몬 4집단 설계는 서로 다른 집단을 비교하는 집단간 설계이며, 교차설계·라틴정방형은 동일 대상이 여러 조건을 거치는 집단내 설계에 가깝다."}, {"no": "23-43", "year": 2024, "qno": 18, "text": "질적 연구의 특징에 관한 설명으로 옳지 않은 것은?", "options": ["① 자연스러운 상황에서 수행되고 밀접한 상호작용이 자료의 원천이다.", "② 면접, 관찰, 문서 등 다양한 형태의 자료들을 수집한다.", "③ 참여자의 관점ㆍ의미 또는 참여자의 다양한 주관적 견해에 초점을 맞춘다.", "④ 이론과 가설은 수집된 자료로부터 연역적 방법으로 진화하여 발견된다.", "⑤ 연구설계에 있어서 초기계획이 엄격하게 규정되지 않고, 연구과정이 유연하다."], "answer": 3, "expl": "질적 연구에서 이론과 가설은 자료로부터 '귀납적'으로 발전되는 것이며, '연역적 방법'이라는 설명은 질적 연구의 특성과 반대된다."}, {"no": "23-44", "year": 2024, "qno": 19, "text": "인간참여자를 대상으로 한 연구에서 연구 참여에 대한 동의를 받을 때 고지해야 하는 사항으로 옳지 않은 것은?", "options": ["① 연구의 목적, 예상되는 기간 및 절차", "② 연구참여에 따른 잠재적 위험", "③ 연구기간 중 연구참여를 철회할 권리", "④ 예상되는 실험결과나 연구결과", "⑤ 비밀보장의 한계"], "answer": 3, "expl": "연구가 진행되기 전에는 실제 실험결과를 알 수 없으므로 '예상되는 실험결과'를 사전에 고지하는 것은 동의서에 포함될 내용이 아니다."}, {"no": "23-45", "year": 2024, "qno": 20, "text": "연구부정행위에 관한 설명으로 옳지 않은 것은?", "options": ["① 존재하지 않은 데이터를 허위로 만들어 내는 것은 위조에 해당한다.", "② 존재하지 않은 연구결과를 허위로 만들어 내는 것은 변조에 해당한다.", "③ 타인의 아이디어를 정당한 승인 또는 인용 없이 활용하는 것을 표절이라 한다.", "④ 연구에 기여하지 않은 사람에게 논문저자 자격을 부여하는 것은 부당한 저자표시이다.", "⑤ 이전에 출판된 자신의 연구결과를 해당 사실을 밝히지 않고 사용하는 것도 연구부정행위에 해당한다."], "answer": 1, "expl": "존재하지 않는 연구결과를 허위로 만드는 것은 변조가 아니라 위조(fabrication)에 해당하며, 변조는 실제 자료나 결과를 왜곡하는 것을 의미한다."}, {"no": "23-46", "year": 2024, "qno": 21, "text": "혼합연구방법에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 미숙련 연구자에게 적합한 연구방법이다.\nㄴ. 질적 연구방법과 양적 연구방법을 결합한 연구방법이다.\nㄷ. 현상에 대한 이해를 넓히고 깊이 있는 연구가 가능하다.", "options": ["① ㄱ", "② ㄱ, ㄴ", "③ ㄱ, ㄷ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 3, "expl": "혼합연구는 질적·양적 방법을 결합해(ㄴ) 현상에 대한 이해의 폭과 깊이를 더하지만(ㄷ), 두 방법론에 대한 이해가 모두 필요해 미숙련 연구자보다는 숙련된 연구자에게 적합하므로 ㄱ은 옳지 않다."}, {"no": "23-47", "year": 2024, "qno": 22, "text": "유사실험설계(quasi-experimental design)에 관한 설명으로 옳지 않은 것은?", "options": ["① 비동질통제집단설계(nonequivalent control group design)는 유사실험설계에 속한다.", "② 진실험설계(true experimental design)에 비해 내적타당도 확보가 우수하다.", "③ 피험자를 무선적으로 배치하지 못한다.", "④ 실험실 상황이 아닌 실제 상황에서 독립변수를 조작해 연구하는 설계이다.", "⑤ 진실험설계에 비해 외생변수의 효과를 통제하기 어렵다."], "answer": 1, "expl": "유사실험설계는 무선배치가 이루어지지 않기 때문에 진실험설계에 비해 내적타당도 확보가 오히려 '어려운' 설계이다."}, {"no": "23-48", "year": 2024, "qno": 23, "text": "상담연구에서 단일사례연구설계(single-case research design)에 관한 설명으로 옳지 않은 것은?", "options": ["① 연구결과의 일반화 가능성이 높다.", "② 통계적 검증보다는 임상적 유의미성을 중시한다.", "③ ABAB설계(reversal design)와 다중기저선설계(multiple-baseline design) 등이 있다.", "④ 연구를 진행하면서 연구설계나 연구절차를 유연하게 수정할 수 있다.", "⑤ 한 개인 또는 집단을 상대로 연구대상 내 차이를 분석하여 처치효과를 추정한다."], "answer": 0, "expl": "단일사례연구는 소수 개인·집단을 깊이 있게 다루는 설계로, 표본이 제한적이어서 연구결과의 일반화 가능성은 오히려 낮은 편이다."}, {"no": "23-49", "year": 2024, "qno": 24, "text": "모의상담연구에 관한 설명으로 옳지 않은 것은?", "options": ["① 독립변수의 수준을 조작함으로써 실험 상황을 통제할 수 있다.", "② 대리 내담자의 활용을 통해 재정적 부담을 완화할 수 있다.", "③ 상담과정 단순화를 통해 연구결과의 해석이 용이해진다.", "④ 변수의 조작적 정의를 구체화 할 수 없다는 것이 단점이다.", "⑤ 실험과정에서 발생할 수 있는 윤리적 문제를 회피할 수 있다."], "answer": 3, "expl": "모의상담연구는 오히려 변수를 명확히 조작적으로 정의하고 통제하기 용이한 것이 장점이며, '구체화할 수 없다'는 설명은 옳지 않다."}, {"no": "23-50", "year": 2024, "qno": 25, "text": "실험실 실험연구에 관한 설명으로 옳지 않은 것은?", "options": ["① 종속변인에 영향을 미치는 처치변인 외에 가외변인에 대한 통제가 중요하다.", "② 처치를 인위적으로 조작하여 종속변인이 어떤 변화를 보이는지를 분석한다.", "③ 상담 연구의 실험실 실험연구에는 모의상담이 해당된다.", "④ 일반적으로 현장 실험연구에 비해 외적타당도가 낮다.", "⑤ 우연적 사건, 성숙효과는 외적타당도를 저해하는 가외변인에 해당한다."], "answer": 4, "expl": "우연적 사건과 성숙효과는 일반적으로 '내적타당도'를 저해하는 대표적 가외변인이며, 외적타당도 저해 요인으로 설명하는 것은 옳지 않다."}];
const STORAGE_KEY = "ycs2_research_v1";
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let mode = "all";

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function setMode(m){
  mode = m;
  document.getElementById('btn-all').classList.toggle('active', m==='all');
  document.getElementById('btn-wrong').classList.toggle('active', m==='wrong');
  render();
}

function resetAll(){
  if(confirm('푼 기록을 모두 초기화할까?')){
    state = {};
    saveState();
    render();
  }
}

function answer(qIdx, optIdx){
  const q = QUESTIONS[qIdx];
  if(state[q.no] !== undefined) return;
  state[q.no] = optIdx;
  saveState();
  render();
}

function updateMeta(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
}

function updateProgress(){
  const total = QUESTIONS.length;
  const done = QUESTIONS.filter(q => state[q.no] !== undefined).length;
  const correct = QUESTIONS.filter(q => state[q.no] === q.answer).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `${done}/${total} 문제 풀이 · 정답 ${correct}개` + (done>0 ? ` (정답률 ${Math.round(correct/done*100)}%)` : '');
}

function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

function render(){
  updateMeta();
  updateProgress();
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  let list = QUESTIONS;
  if(mode === 'wrong'){
    list = QUESTIONS.filter(q => state[q.no] !== undefined && state[q.no] !== q.answer);
  }
  if(list.length === 0){
    area.innerHTML = '<div class="empty">' + (mode==='wrong' ? '틀린 문제가 없어! 🌿' : '문제가 없어.') + '</div>';
    return;
  }
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const card = document.createElement('div');
    card.className = 'card';
    const answered = state[q.no] !== undefined;
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt';
      if(answered){
        if(i === q.answer) cls += ' correct';
        else if(i === state[q.no]) cls += ' wrong';
      }
      optsHtml += `<button class="${cls}" ${answered?'disabled':''} onclick="answer(${qIdx}, ${i})">${opt}</button>`;
    });
    let feedback = '';
    if(answered){
      const mark = state[q.no] === q.answer
        ? '<div class="feedback correct-mark">✅ 정답</div>'
        : `<div class="feedback wrong-mark">❌ 오답 (정답: ${q.answer+1}번)</div>`;
      const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
      feedback = mark + expl;
    }
    card.innerHTML = `
      <div class="qnum">${q.year} · 문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      ${feedback}
    `;
    area.appendChild(card);
  });
}

render();
</script>
</body>
</html>
