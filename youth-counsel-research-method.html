<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담연구방법론의 기초 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .cert-badge{
    display:inline-block;
    font-size:11px;
    color:var(--sub);
    margin:-4px 0 16px;
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .year-pills{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  .pill{
    background:var(--bg-base);
    border:none;
    border-radius:20px;
    padding:7px 16px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .pill.active{
    background:var(--accent);
    color:#fff;
    font-weight:600;
    box-shadow:none;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{padding:3px 0;line-height:1.6;}
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .opt-btn{
    display:block;
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    border-radius:10px;
    padding:9px 12px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    white-space:pre-wrap;
    font-family:inherit;
    cursor:pointer;
  }
  .opt-btn:hover:not(:disabled){background:rgba(0,0,0,0.045);}
  .opt-btn:disabled{cursor:default;}
  .opt-btn.correct-reveal{background:var(--right-bg);color:var(--accent-dark);font-weight:600;}
  .opt-btn.wrong-picked{background:#fbeceb;color:var(--wrong);font-weight:600;}
  .opt-btn.neutral-picked{background:#eef0ef;color:var(--text);font-weight:600;}
  .feedback{margin-top:12px;display:none;}
  .feedback.open{display:block;}
  .feedback-mark{font-size:13px;font-weight:600;color:var(--accent-dark);margin-bottom:8px;}
  .feedback-mark.wrong{color:var(--wrong);}
  .explain{
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
</style>
</head>

<div class="wrap">
  <a class="back" href="index.html">‹ 목록으로</a>

  <div class="meta-line" id="metaLine"></div>
  <div class="year-pills" id="yearPills"></div>
  <div id="quizArea"></div>
</div>
<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "상담연구방법 중 질적 연구의 특징에 해당하지 않는 것은?", "options": ["① 자연스러운 상황에서 인간의 행동특성을 탐구한다.", "② 참여자 관점에서 개인이 지각한 세계를 포착하려고 한다.", "③ 자료의 계량화를 통한 실증 기반의 접근방식을 선호한다.", "④ 상담대상과 관련된 모든 자료는 가치 있다고 간주한다.", "⑤ 상담과정과 연구과정을 통합하여 접근하려는 경향이 있다."], "answer": 2, "expl": "질적 연구는 계량화된 실증 접근보다 자연스러운 맥락에서의 의미와 경험을 중시하며, 자료의 계량화·실증 기반 접근은 오히려 양적 연구의 특징이다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "보편적인 법칙이나 일반적인 이론으로부터 도출된 가설을 경험적으로 검증하여 이론을 증명하고 현상을 설명ㆍ예측하는 연구방법은?", "options": ["① 귀납법", "② 연역법", "③ 관찰법", "④ 실험법", "⑤ 면접법"], "answer": 1, "expl": "이론에서 가설을 도출해 경험적으로 검증하는 방식은 연역법이며, 귀납법은 개별 관찰에서 일반화된 결론을 이끄는 방식이다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "양적연구 논문 작성 시 '연구방법' 부분에 포함해야 할 내용을 모두 고른 것은?\nㄱ. 표본으로 추출될 표집집단에 관한 정보제시\nㄴ. 자료처리 과정 및 자료처리 활용도구 제시\nㄷ. 척도의 유형 또는 예시문항 제시\nㄹ. 연구의 의의 및 중요성 제시", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "'연구방법' 절에는 표집 정보(ㄱ), 자료처리 절차·도구(ㄴ), 척도 유형·문항(ㄷ)이 들어가지만, 연구의 의의·중요성(ㄹ)은 서론에 해당한다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "통계적 가설검정 시 유의수준(값)을 0.05에서 0.01로 설정하였을 때의 설명으로 옳은 것은?", "options": ["① 1종 오류의 위험이 감소한다.", "② 2종 오류의 위험이 감소한다.", "③ 1종 오류와 2종 오류 위험 모두 증가한다.", "④ 2종 오류와 1종 오류 위험 모두 감소한다.", "⑤ 1종 오류와 2종 오류 위험 모두 변화가 없다."], "answer": 0, "expl": "유의수준을 낮추면(0.05→0.01) 영가설을 잘못 기각할 확률인 1종 오류 위험은 감소하지만, 대신 2종 오류 위험은 증가하는 경향이 있다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "양적연구에서 조작적 정의에 관한 설명으로 옳지 않은 것은?", "options": ["① 추상적 개념을 실증적으로 검증하기 위한 과정이다.", "② 특정 개념을 구성하는 하위요소 간 내적 일치정도를 구인하는 과정이다.", "③ 동일한 개념이라도 연구자의 이론적 배경에 따라 다르게 정의될 수 있다.", "④ 개념의 어떤 속성을 조작할 것인가에 대하여 결정해야 한다.", "⑤ 측정 가능한 형태로의 계량화가 가능하다."], "answer": 1, "expl": "조작적 정의는 추상적 개념을 측정 가능하게 구체화하는 과정이며, 하위요소 간 내적 일치도를 구하는 것은 신뢰도(내적일관성) 검증에 해당해 조작적 정의의 정의와는 다르다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "척도에 관한 설명으로 옳지 않은 것은?", "options": ["① 비율척도에는 절대 영점이 존재한다.", "② 등간척도로 측정된 점수를 토대로 표준편차 계산과 같은 통계분석이 가능하다.", "③ 서열척도는 순위에 대한 정보를 포함하고 있다.", "④ 하나의 특성은 하나의 척도로만 측정되어야 한다.", "⑤ 명목척도는 상호배타적 특성을 갖는다."], "answer": 3, "expl": "척도는 연구 목적에 따라 하나의 특성을 여러 척도로 다르게 측정할 수도 있으므로 '하나의 척도로만 측정되어야 한다'는 설명은 옳지 않다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "다음에 나타난 표본추출기법에 관한 설명으로 옳은 것은?\n연구자 A는 OO시 거주 청소년들의 행복감을 조사하기 위하여 주민등록상 OO시에 거주하는 모든 청소년들을 표집틀로 가정하고 전원 일련번호를 부여한 후, 추출예정 표본 크기를 고려하여 표본추출간격을 정하였다. 첫 번째 구간에서 특정 순번 K를 무작위로 선택한 다음, 나머지 표본은 모든 구간에서 K번째 청소년을 추출하였다.", "options": ["① 표집틀을 내적으로 동질적이고 외적으로 이질적인 두 개 이상의 범주로 구분한다.", "② 표집틀의 전체 요소에 고유번호를 붙인 후 난수표를 사용하여 무작위로 표본을 추출한다.", "③ 표집틀의 요소들이 어떤 주기적 경향성을 띠지 않아야 한다.", "④ 표집틀을 내적 및 외적으로 모두 동질적인 두 개 이상의 범주로 구분한다.", "⑤ 표집틀을 확보하고 있지 못하고 있을 때에도 활용 가능하다."], "answer": 2, "expl": "일련번호를 매긴 뒤 일정 간격(K)으로 표본을 추출하는 방식은 계통표집이며, 표집틀 요소가 주기적 경향성을 띠면 편향된 표본이 추출될 위험이 있다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "단순회귀 모형과 결정계수 R²에 관한 설명으로 옳은 것은?", "options": ["① R²값은 Y에 의해 설명되는 X분산의 비율을 의미한다.", "② 잔차의 평균값은 1이다.", "③ 최소제곱법을 통해 회귀계수 값을 구한다.", "④ R²값은 0에서 양의 무한대 값을 갖는다.", "⑤ 절편은 X가 1일 때 Y의 값이다."], "answer": 2, "expl": "R²은 독립변수(X)에 의해 설명되는 종속변수(Y) 분산의 비율을 의미하며 0~1 사이의 값을 갖는다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "다음의 연구방법과 자료분석 방법의 연결로 옳은 것을 모두 고른 것은?\nㄱ. 담화분석 - 언어구조와 언어 사용 맥락간의 관계성 이해\nㄴ. 내용분석 - 텍스트에 대한 비계량적 분석과 주관적 해석\nㄷ. 내러티브 연구 - 개인이 경험한 시공간 맥락과의 상호작용 이해\nㄹ. 문화기술지 - 관찰 등을 통해 수집된 자료에 대한 종합적 분석", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "내용분석은 텍스트를 범주화하여 '계량적'으로 분석하는 기법에 가까우므로 '비계량적 분석과 주관적 해석'이라는 설명(ㄴ)은 내용분석과 맞지 않는다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "실험연구의 내적타당도에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 내적타당도를 높이기 위해 무선 할당한다.\nㄴ. 성숙효과는 내적타당도와 무관하다.\nㄷ. 일반적으로 유사실험설계는 진실험설계에 비해 내적타당도 확보가 어렵다.\nㄹ. 실험연구 중 동일 특성에 대한 측정도구의 변동은 내적타당도 저해요인이다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "무선할당은 내적타당도를 높이고, 성숙효과·측정도구 변동은 내적타당도를 저해하는 대표적 요인이며, 유사실험설계는 무선할당이 없어 진실험설계보다 내적타당도 확보가 어렵다."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "측정도구의 타당도에 관한 설명으로 옳지 않은 것은?", "options": ["① 측정과정에서 발생하는 체계적 오차와 관련이 있다.", "② 내용타당도는 준거관련타당도의 한 유형이다.", "③ 측정하고자 하는 개념에 대한 명료한 정의가 필요하다.", "④ 구성개념타당도에는 수렴타당도와 판별타당도가 있다.", "⑤ 요인분석을 통해 타당도를 평가할 수 있다."], "answer": 1, "expl": "내용타당도는 준거관련타당도가 아니라 별도의 타당도 유형으로 분류되며, 준거관련타당도에는 공인타당도·예측타당도가 포함된다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "크론바하 알파(Cronbach's alpha)값에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 문항수와 각 문항 측정치들 간의 상관계수들의 평균값만으로 구할 수 있다.\nㄴ. -1에서 1사이의 값을 갖는다.\nㄷ. 문항수의 증가는 크론바하 알파값을 증가시키는 경향이 있다.\nㄹ. 동일 개념 측정 문항들 간의 내적일관성을 평가하는 통계적 방법이다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "크론바하 알파는 문항수와 문항 간 평균 상관계수로 계산 가능하고 통상 0~1 사이 값으로 해석되며, 문항수가 늘수록 값이 커지는 경향이 있다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "다음 연구에 관한 설명으로 옳은 것은?\n연구자 A는 청소년 대상 우울감 예방교육 프로그램의 효과를 알아보기 위하여, 전국 청소년 모집단에서 무작위로 선발된 청소년 200명을 두 집단으로 다시 무작위 배치한 후 우울감 수준을 1차 측정하여 집단비교를 수행하였다. 이 후 여성가족부가 제작한 우울감 예방교육 프로그램을 한 집단에서만 수행 한 다음, 두 집단을 대상으로 동일 측정도구를 활용하여 우울감 수준을 2차 측정하고 집단 비교를 수행하였다. 처치 이외의 모든 조건은 두 집단에서 동일하였다.", "options": ["① 단일집단 사전사후측정설계에 해당한다.", "② 사후측정통제집단설계에 해당한다.", "③ 우울감 예방교육은 종속변수이다.", "④ 두 집단 무작위배치를 통해 내적타당도를 향상시켰다.", "⑤ 솔로몬 4집단 설계에 해당한다."], "answer": 3, "expl": "무작위 선발 후 두 집단에 무작위 배치하고 사전-사후 측정을 모두 실시했으므로 전형적인 사전사후측정통제집단설계이며, 무선배치를 통해 내적타당도가 향상된다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "다음은 청소년의 우울감 수준에 영향을 미치는 요인들에 대한 가상의 다중회귀분석 결과를 요약한 것이다. 이에 관한 설명으로 옳지 않은 것은? (회귀모형 제곱합 300, 잔차 제곱합 5000, 잔차 자유도 500, 잔차 평균제곱 10; 학업성적 B=10, 표준오차=2, 베타=.300, t=5, p=.000; 교우관계 B=20, 표준오차=4, 베타=.172, t=5, p=.000; 부모와의 관계 B=10, 표준오차=20, 베타=.297, t=.5, p=.12)", "options": ["① '모든 독립변수의 회귀계수는 0이다.'가 귀무가설이다.", "② 회귀 자유도(A)값은 독립변수의 개수이다.", "③ 회귀 평균제곱(B)값은 100이다.", "④ F값(C)은 10이다.", "⑤ 유의수준 .05에서 모든 독립변수들이 종속변수에 유의미한 영향을 미치고 있다."], "answer": 4, "expl": "부모와의 관계 변수는 p=.12로 유의수준 .05에서 유의하지 않으므로, '모든 독립변수가 유의하다'는 설명은 틀렸다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "통계적 가설검정에 관한 설명으로 옳은 것은?", "options": ["① 1종 오류의 허용범위는 유의수준이다.", "② 2종 오류의 크기는 통계적 검정력과는 무관하다.", "③ 1종 오류 확률은 영가설이 거짓인데도 영가설을 채택하는 확률이다.", "④ 2종 오류는 영가설이 참임에도 불구하고 이를 기각하는 오류이다.", "⑤ 영가설이 거짓일 때 이를 기각함으로써 틀린 결정을 내릴 가능성의 정도는 통계적 검정력이다."], "answer": 0, "expl": "통계적 검정력은 영가설이 거짓일 때 이를 옳게 기각할 확률이며, 2종 오류(1-검정력)와 밀접하게 연관된다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "유사실험설계(quasi-experimental design)에 관한 설명으로 옳은 것은?", "options": ["① 실험집단과 통제집단의 실험전 상태가 동일하다.", "② 진실험설계와 유사한 수준의 외생변수통제 효과를 갖는다.", "③ 단일집단시계열실험설계는 유사실험설계에 해당한다.", "④ 피험자를 무선배치한다.", "⑤ 진실험설계에 비해 내적타당도 확보가 용이하다."], "answer": 2, "expl": "유사실험설계는 무선배치가 이루어지지 않는 대신 기존 집단을 활용하는 설계이며, 단일집단시계열설계가 대표적인 유사실험설계 유형이다."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "상담연구에서 단일사례연구설계(single-case research design)에 관한 설명으로 옳은 것은?", "options": ["① ABAB설계(reversal design)는 단일사례연구설계에 해당한다.", "② 임상적 유의미성 보다는 통계적 검증을 중시한다.", "③ 연구 진행과정에서 연구설계나 연구절차의 유연한 수정이 어렵다.", "④ 연구결과의 일반화 수준이 높다.", "⑤ 통제집단의 변화를 통해 처치효과를 추정한다."], "answer": 0, "expl": "ABAB(반전)설계는 기초선-개입-기초선-개입을 반복하는 대표적인 단일사례연구설계 유형이다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "모의상담연구에 관한 설명으로 옳은 것은?", "options": ["① 상담과정 단순화가 어려우며 결과적으로 연구결과의 해석이 난해해진다.", "② 실험과정에서 윤리적 문제가 필연적으로 발생한다.", "③ 독립변수의 수준에 대한 조작이 불가능하다.", "④ 변수의 조작적 정의를 구체화 할 수 없다는 것이 단점이다.", "⑤ 대리 내담자의 활용을 통해 재정적 부담을 완화할 수 있다."], "answer": 4, "expl": "모의상담연구는 실제 내담자 대신 대리 내담자(역할연기자)를 활용해 재정적·윤리적 부담을 줄일 수 있는 장점이 있다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "변수 X와 Y간 공분산과 피어슨(Pearson) 적률상관계수에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. Y의 분산이 0이면 X와 Y간 공분산은 항상 0이다.\nㄴ. X와 Y 간의 피어슨 적률상관계수가 0.4이면, X는 Y의 분산 중 16%를 설명할 수 있다.\nㄷ. 각 변수에 양의 상수를 곱할 경우, 피어슨 적률상관계수는 커지게 된다.\nㄹ. 피어슨 적률상관계수의 범위는 음의 무한대에서 양의 무한대이다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "상관계수 0.4의 제곱인 결정계수는 .16으로, X가 Y분산의 16%를 설명한다고 해석할 수 있다."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "상관관계 분석에서 상관계수에 관한 설명으로 옳지 않은 것은?", "options": ["① 하나의 변수가 다른 변수와의 관계에서 어느 정도 관련성이 있는지 알아보기 위해 사용된다.", "② 상관계수를 제곱한 값은 총 변량 중 두 변수의 연합된 변량의 비율 정도를 의미한다.", "③ 상관계수 값의 범위는 -1≤r≤1이다.", "④ 변수 간 상관은 그 값이 -1에 가까울수록 낮아지고, 1에 가까울수록 높아지는 경향이 있다.", "⑤ 주로 등간 및 비율척도로 구성된 변수 간의 상관분석을 위해 사용된다."], "answer": 3, "expl": "상관계수는 -1에 가까울수록 관련성이 강한 부적 상관을 의미하므로 '낮아진다'는 표현이 아니라 오히려 관계의 강도가 커진다고 봐야 한다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "현상학적 접근방식에 관한 설명으로 옳지 않은 것은?", "options": ["① 훗설(E. Husserl)의 철학적 전통에 기반하고 있다.", "② 대상 자체를 있는 그대로 이해하는 방식이다.", "③ 대상에 대한 일체의 선입견을 배제하기 위해 노력한다.", "④ 괄호치기를 통해 획득된 간주관적 신념은 사물의 본질을 이해하는데 도움이 된다.", "⑤ 현상학적 환원을 통해 사물에 대한 선험적 판단을 중지할 수 있다."], "answer": 3, "expl": "현상학적 환원(괄호치기)은 선입견을 배제하기 위한 절차이며, 그 결과로 얻어진 신념이 자동으로 사물의 본질 이해에 도움이 된다고 단정하는 것은 현상학의 취지와 어긋난다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "근거이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 상징적 상호작용론에 근거를 두고 있다.\nㄴ. 선택코딩은 생성된 범주들을 하위범주와 연결시키는 과정이다.\nㄷ. 개방코딩은 현상의 개념을 밝히고 그 속성을 범주화하는 과정이다.\nㄹ. 지속적인 비교방법에 근거한 체계적 분석과정을 통해 이론을 구성한다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "근거이론은 상징적 상호작용론에 기반하며 개방코딩(개념화·범주화), 선택코딩(핵심범주 중심 통합), 지속적 비교방법을 통해 이론을 구성한다."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "합의적 질적연구(CQR)에서 연구 참여자의 단어를 명확ㆍ간결하게 정리ㆍ편집하고 비언어적 단서를 발화내용 중심으로 추출하는 분석단계는?", "options": ["① 영역코딩", "② 중심개념코딩", "③ 주변범주코딩", "④ 교차분석", "⑤ 감사"], "answer": 1, "expl": "참여자의 표현을 명료하고 간결하게 정리하며 비언어적 단서를 발화 내용 중심으로 반영하는 단계는 영역코딩이다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "인간 대상 실험연구윤리를 다룬 벨몬트 보고서(The Belmont Report)에서 연구자가 고려해야 할 '정의의 원칙'에 관한 설명으로 옳은 것은?", "options": ["① 연구 참여자의 의견, 생각과 선택을 듣고 이를 존중한다.", "② 연구 참여자에게 참여 동의를 구할 때 연구 내용에 대해 확실히 이해하고 있는지 확인한다.", "③ 연구 참여자가 얻을 수 있는 이익과 감내해야 할 위험이 공정한지 여부를 확인한다.", "④ 연구 참여자의 위험은 최소화하고 이익은 최대화하는 방향으로 연구계획을 수립한다.", "⑤ 연구 수행 시 연구 참여자에 대한 위험을 충분히 관리할 수 있는지를 확인한다."], "answer": 2, "expl": "정의의 원칙은 연구의 이익과 위험 부담이 참여자 간에 공정하게 분배되는지를 다루며, 특정 집단에만 위험이 편중되지 않도록 하는 것과 관련된다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "다음에 해당하는 상담 연구윤리의 기본원칙은?\n연구 참여자는 연구에 참여할지 않을지에 관해 스스로 결정할 수 있으며, 연구자는 연구 내용 및 목적 등과 관련된 정보를 연구 참여 동의서 상에 고지해야 한다.", "options": ["① 자율성의 원칙", "② 강압금지의 원칙", "③ 선행의 원칙", "④ 무해성의 원칙", "⑤ 은닉금지의 원칙"], "answer": 0, "expl": "연구 참여 여부를 스스로 결정하고, 필요한 정보를 사전에 고지받는 것은 자율성의 원칙(충분한 정보에 의한 자발적 동의)에 해당한다."}, {"no": "23-26", "year": 2024, "qno": 1, "text": "다음 사례에서 연구가설이 표현하고 있는 효과는?", "options": ["① B의 직접효과", "② B의 매개효과", "③ A의 간접효과", "④ M의 조절효과", "⑤ B의 이월효과"], "answer": 2, "expl": "A가 M을 통해 B에 영향을 미친다는 가설은 M이 A와 B 사이를 매개하는 매개효과를 나타낸다."}, {"no": "23-27", "year": 2024, "qno": 2, "text": "가설 설정 및 검정에 관한 설명으로 옳지 않은 것은?", "options": ["① 가설 설정은 주로 연역적 접근법을 사용한다.", "② 유의수준보다 유의확률(p값)이 작으면 영가설을 기각한다.", "③ 가설 검정을 위한 자료분석 방법은 논문의 연구방법에 기술한다.", "④ 영가설을 기각했을 때 이 결정이 오류일 확률을 1종 오류라고 한다.", "⑤ 자료분석 결과가 연구자의 예측과 다르게 나타나면 연구가설을 수정해서 논문에 보고한다."], "answer": 4, "expl": "연구가설은 자료수집 이전에 이론적 근거로 설정되는 것이며, 결과가 예측과 다르다고 사후에 가설을 수정해 보고하는 것은 연구윤리에 어긋난다."}, {"no": "23-28", "year": 2024, "qno": 3, "text": "연구 수행에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 연구의 독특성, 의의 및 실행 가능성을 고려하여 연구 주제와 연구문제를 결정한다.\nㄴ. 관련 이론과 선행 연구들이 부재한 상황에서도 인과관계를 검증할 수 있는 실험\n연구를 우선적으로 고려한다.\nㄷ. 양적 연구 수행 시 연구의 내적타당도뿐 아니라 연구 결과의 일반화 가능성도\n중요한 고려 사항이다.\nㄹ. 자기보고식 검사를 사용하면 모든 참여자들이 성실하고 정확하게 문항에 반응한다.", "options": ["① ㄷ", "② ㄱ, ㄷ", "③ ㄴ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄹ"], "answer": 1, "expl": "연구주제 결정 시 독특성·의의·실행가능성을 고려하고(ㄱ), 내적타당도뿐 아니라 일반화 가능성도 고려해야 하지만(ㄷ), 이론과 선행연구 없이 실험을 우선하거나(ㄴ) 자기보고식 검사 응답의 성실성을 가정하는 것(ㄹ)은 옳지 않다."}, {"no": "23-29", "year": 2024, "qno": 4, "text": "상담 연구에 관한 일반적인 설명으로 옳지 않은 것은?", "options": ["① 눈덩이표집은 확률표집의 일종이다.", "② 군집분석은 사람뿐 아니라 진술문이나 검사문항을 범주화하는 목적으로 활용된다.", "③ 자기보고식 검사는 심층면접에 비해 상대적으로 실시하기 용이하다.", "④ 이론은 인간 행동을 개념화할 뿐 아니라, 가설 도출 및 검증의 기반이 된다.", "⑤ 연구자마다 다른 이론을 토대로 동일한 변인을 다르게 조작적으로 정의할 수 있다."], "answer": 0, "expl": "눈덩이표집은 비확률표집(임의표집)의 대표적인 예이며, 확률표집이라는 설명은 옳지 않다."}, {"no": "23-30", "year": 2024, "qno": 5, "text": "양적 연구 패러다임에 관한 설명으로 옳은 것은?", "options": ["① 일반적으로 구성주의 관점을 따른다.", "② 주로 영역코딩, 축코딩, 개방코딩 등 귀납적인 자료분석을 실시한다.", "③ 표본의 대표성, 관찰의 객관성, 실증주의적 관점을 중시한다.", "④ 근거이론, 현상학적 연구, 합의적 질적 연구가 해당된다.", "⑤ 참여관찰을 통해 연구대상이 상황에 부여하는 의미를 이해하고자 한다."], "answer": 2, "expl": "양적 연구는 표본의 대표성과 관찰의 객관성을 강조하는 실증주의적 패러다임에 기반하며, 나머지는 질적 연구의 특징이다."}, {"no": "23-31", "year": 2024, "qno": 6, "text": "양적 연구의 타당도에 관한 설명으로 옳지 않은 것은?", "options": ["① 무선표집(random sampling)을 실시하면 일반적으로 외적타당도가 증가한다.", "② 연구참여자들을 실험집단과 통제집단에 무선할당(random assignment)하면 일반적으로 내적타당도가 감소한다.", "③ 일반적으로 실험연구는 가외변인을 통제하기 때문에 내적타당도가 높다.", "④ 연구 수행 중에 참여자들이 이탈하고 측정도구가 바뀔 경우 연구의 타당도가 위협받는다.", "⑤ 변인 간 상관관계를 토대로 인과관계를 단정할 수 없다."], "answer": 1, "expl": "무선할당은 집단 간 동질성을 확보해 내적타당도를 '증가'시키는 절차이며, '감소시킨다'는 설명은 옳지 않다."}, {"no": "23-32", "year": 2024, "qno": 7, "text": "통계적 검정력(statistical power)에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 2종오류의 크기는 통계적 검정력과는 관련이 없다.\nㄴ. 통계 검정의 가정이 위배되면 일반적으로 통계적 검정력은 감소한다.\nㄷ. 통계적 검정력이 1에 가까울수록 1종오류는 0에 가까워진다.\nㄹ. 1종오류의 수준을 보수적으로 설정하면(예: .001), 실제 효과가 있을 때 효과가\n있다고 결론내리기 어려워진다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "통계 검정의 가정 위배는 검정력을 감소시키고(ㄴ), 유의수준을 보수적으로(작게) 설정하면 실제 효과를 검출하기 어려워져(ㄹ) 검정력이 낮아지므로 ㄴ·ㄹ이 옳으며, 2종오류와 검정력은 서로 밀접히 관련되어 ㄱ은 옳지 않다."}, {"no": "23-33", "year": 2024, "qno": 8, "text": "척도의 타당도를 평가할 수 있는 방법을 모두 고른 것은?\nㄱ. 요인분석\nㄴ. 문항의 내용 및 척도 구성에 대한 전문가의 판단\nㄷ. 타당성이 확보된 기존 척도와의 상관\nㄹ. 다특성-다방법(multitrait-multimethod) 접근", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "요인분석, 전문가 판단, 기존 척도와의 상관, 다특성-다방법 접근 모두 척도의 타당도(구성·내용·공인 타당도 등)를 평가하는 대표적 방법이다."}, {"no": "23-34", "year": 2024, "qno": 9, "text": "측정도구 선정 및 사용에 관한 설명으로 옳은 것은?", "options": ["① 반복된 측정으로 인한 연습효과가 예상될 경우, 연구자는 동형검사(parallel forms) 사용을 고려하는 것이 좋다.", "② 측정도구의 신뢰도가 높으면 타당도 또한 당연히 높다고 가정한다.", "③ 측정도구 선정 시 검사의 경제성, 피검자의 피로도는 고려할 사항이 아니다.", "④ 측정도구가 특정 연령대를 대상으로 타당화되었다면 다른 연령대에도 타당도가 확보된 것으로 가정한다.", "⑤ 일반적으로 한 개의 측정도구로도 특정 구성개념을 완벽히 구인할 수 있기 때문에, 구성개념을 측정하기 위해 두 개 이상의 측정도구를 사용할 필요가 없다."], "answer": 0, "expl": "연습효과가 우려될 때 동일한 검사를 반복 사용하는 대신 동형검사를 활용하면 연습효과를 줄이면서 반복측정이 가능하다."}, {"no": "23-35", "year": 2024, "qno": 10, "text": "척도의 신뢰도(reliability)에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 척도의 문항이 1개일 경우 반분신뢰도 계수는 1이다.\nㄴ. 같은 척도를 연령대가 다른 참여자들에게 실시해도 신뢰도 계수는 변하지 않는다.\nㄷ. Cronbach의 alpha는 검사-재검사 신뢰도를 나타낸다.\nㄹ. 문항들의 내용이 서로 유사하면 척도의 내적 일관성은 커진다.", "options": ["① ㄱ", "② ㄹ", "③ ㄱ, ㄹ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "문항 내용이 서로 유사할수록 내적일관성(신뢰도)이 커지는 것은 맞지만(ㄹ), 문항이 1개일 때 반분신뢰도를 구할 수 없고(ㄱ), 연령대에 따라 신뢰도가 달라질 수 있으며(ㄴ), Cronbach alpha는 내적일관성 신뢰도이지 검사-재검사 신뢰도가 아니어서(ㄷ) ㄹ만 옳다."}, {"no": "23-36", "year": 2024, "qno": 11, "text": "다음 각각의 사례에 적절한 분석 방법을 옳게 짝지은 것은?\nㄱ. 연구자는 '자기수용척도' 하위척도(자기수용-1, 자기수용-2, 자기수용-3) 점수의\n프로파일을 토대로 연구 참여자들을 적극적 자기수용자, 소극적 자기수용자, 비수\n용자로 구분했다.\nㄴ. 연구자의 관심은 A와 B의 관계를 C가 조절하는지를 확인하는데 있다. 이를 위해\n연구자는 1단계에 공변인을 투입하고, 2단계에 A와 C를 투입하고, 마지막 3단계에\nA와 C의 상호작용 항을 투입해서 B를 설명하는 모형을 설정한 후 상호작용 항이\n통계적으로 유의한지 확인했다.", "options": ["① ㄱ: 경로분석, ㄴ: 위계적 회귀분석", "② ㄱ: 요인분석, ㄴ: 경로분석", "③ ㄱ: 군집분석, ㄴ: 메타분석", "④ ㄱ: 군집분석, ㄴ: 위계적 회귀분석", "⑤ ㄱ: 메타분석, ㄴ: 반복측정 분산분석"], "answer": 3, "expl": "프로파일 유형에 따라 대상을 분류하는 것은 군집분석이며, 단계적으로 변수를 투입해 상호작용항의 유의성을 검증하는 것은 위계적 회귀분석이다."}, {"no": "23-37", "year": 2024, "qno": 12, "text": "논문 작성 시 '논의 및 결론'에 포함될 내용에 관한 설명으로 옳은 것은?", "options": ["① 연구 가설을 지지하지 않는 연구결과는 보고하거나 해석하지 않는다.", "② 연구 결과가 상담 실무 및 관련 이론에 갖는 시사점을 기술한다.", "③ 연구에서 활용한 척도 및 자료 수집 절차를 상세히 기술한다.", "④ 연구의 배경이 되는 이론과 선행연구들을 소개하고 가설을 진술한다.", "⑤ 연구 참여자들의 인구통계학적 정보를 표로 제시한다."], "answer": 1, "expl": "논의 및 결론에서는 연구결과가 실무와 이론에 주는 시사점을 논하며, 가설을 지지하지 않는 결과도 반드시 해석·보고해야 한다."}, {"no": "23-38", "year": 2024, "qno": 13, "text": "논문 작성 시 '연구방법'에 포함될 내용으로 옳은 것은?", "options": ["① 연구의 필요성과 목적", "② 가설 검정을 위한 자료 분석 결과", "③ 연구 결과 요약 및 선행 연구와의 비교", "④ 가설 설정의 근거가 되는 이론과 선행연구 결과", "⑤ 참여자 모집 절차 및 선정 기준"], "answer": 4, "expl": "참여자 모집 절차와 선정 기준은 연구방법(연구대상) 절에 기술되는 대표적인 내용이다."}, {"no": "23-39", "year": 2024, "qno": 14, "text": "진실험설계가 충족해야 할 조건으로 옳지 않은 것은?", "options": ["① 외생(extraneous)변수의 통제", "② 무작위 집단 배정", "③ 현장실험", "④ 종속변수값 간의 비교", "⑤ 독립변수의 조작"], "answer": 2, "expl": "진실험설계의 핵심 조건은 무작위 배정, 독립변수 조작, 외생변수 통제, 결과 비교이며, 실험실이 아닌 '현장실험'이어야 한다는 것은 진실험설계의 필수조건이 아니다."}, {"no": "23-40", "year": 2024, "qno": 15, "text": "자료의 총체로부터 귀납적으로 이론을 개발하는 방법으로서, 연구자는 수집한 자료에 기초하여 가설을 설정하고 검증하며, 분석적 귀납법이라고 부르는 과정을 통해 이론을 개발하는 연구방법은?", "options": ["① 현상학적 연구", "② 사례연구", "③ 문화기술지 연구", "④ 합의적 질적 연구", "⑤ 근거이론 연구"], "answer": 4, "expl": "자료로부터 귀납적으로 개념과 이론을 도출하며 분석적 귀납법을 사용하는 연구방법은 근거이론 연구이다."}, {"no": "23-41", "year": 2024, "qno": 16, "text": "단순선형회귀분석에서 총변동(SST) 중 SSE가 차지하는 비중이 주어졌을 때 결정계수 R²의 값은?", "options": ["① 1/5", "② 1/25", "③ 4/5", "④ 5", "⑤ 25"], "answer": 2, "expl": "결정계수는 R² = 1 - (SSE/SST)로 계산되며, SSE 비중이 1/5일 때 R²은 4/5가 된다."}, {"no": "23-42", "year": 2024, "qno": 17, "text": "집단간 설계에 해당하는 것을 모두 고른 것은?\nㄱ. 사후검사 통제집단 설계 ㄴ. 솔로몬 4집단 설계\nㄷ. 교차설계 ㄹ. 라틴정방형(Latin square) 설계", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄴ, ㄹ", "⑤ ㄷ, ㄹ"], "answer": 0, "expl": "사후검사 통제집단 설계와 솔로몬 4집단 설계는 서로 다른 집단을 비교하는 집단간 설계이며, 교차설계·라틴정방형은 동일 대상이 여러 조건을 거치는 집단내 설계에 가깝다."}, {"no": "23-43", "year": 2024, "qno": 18, "text": "질적 연구의 특징에 관한 설명으로 옳지 않은 것은?", "options": ["① 자연스러운 상황에서 수행되고 밀접한 상호작용이 자료의 원천이다.", "② 면접, 관찰, 문서 등 다양한 형태의 자료들을 수집한다.", "③ 참여자의 관점ㆍ의미 또는 참여자의 다양한 주관적 견해에 초점을 맞춘다.", "④ 이론과 가설은 수집된 자료로부터 연역적 방법으로 진화하여 발견된다.", "⑤ 연구설계에 있어서 초기계획이 엄격하게 규정되지 않고, 연구과정이 유연하다."], "answer": 3, "expl": "질적 연구에서 이론과 가설은 자료로부터 '귀납적'으로 발전되는 것이며, '연역적 방법'이라는 설명은 질적 연구의 특성과 반대된다."}, {"no": "23-44", "year": 2024, "qno": 19, "text": "인간참여자를 대상으로 한 연구에서 연구 참여에 대한 동의를 받을 때 고지해야 하는 사항으로 옳지 않은 것은?", "options": ["① 연구의 목적, 예상되는 기간 및 절차", "② 연구참여에 따른 잠재적 위험", "③ 연구기간 중 연구참여를 철회할 권리", "④ 예상되는 실험결과나 연구결과", "⑤ 비밀보장의 한계"], "answer": 3, "expl": "연구가 진행되기 전에는 실제 실험결과를 알 수 없으므로 '예상되는 실험결과'를 사전에 고지하는 것은 동의서에 포함될 내용이 아니다."}, {"no": "23-45", "year": 2024, "qno": 20, "text": "연구부정행위에 관한 설명으로 옳지 않은 것은?", "options": ["① 존재하지 않은 데이터를 허위로 만들어 내는 것은 위조에 해당한다.", "② 존재하지 않은 연구결과를 허위로 만들어 내는 것은 변조에 해당한다.", "③ 타인의 아이디어를 정당한 승인 또는 인용 없이 활용하는 것을 표절이라 한다.", "④ 연구에 기여하지 않은 사람에게 논문저자 자격을 부여하는 것은 부당한 저자표시이다.", "⑤ 이전에 출판된 자신의 연구결과를 해당 사실을 밝히지 않고 사용하는 것도 연구부정행위에 해당한다."], "answer": 1, "expl": "존재하지 않는 연구결과를 허위로 만드는 것은 변조가 아니라 위조(fabrication)에 해당하며, 변조는 실제 자료나 결과를 왜곡하는 것을 의미한다."}, {"no": "23-46", "year": 2024, "qno": 21, "text": "혼합연구방법에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 미숙련 연구자에게 적합한 연구방법이다.\nㄴ. 질적 연구방법과 양적 연구방법을 결합한 연구방법이다.\nㄷ. 현상에 대한 이해를 넓히고 깊이 있는 연구가 가능하다.", "options": ["① ㄱ", "② ㄱ, ㄴ", "③ ㄱ, ㄷ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 3, "expl": "혼합연구는 질적·양적 방법을 결합해(ㄴ) 현상에 대한 이해의 폭과 깊이를 더하지만(ㄷ), 두 방법론에 대한 이해가 모두 필요해 미숙련 연구자보다는 숙련된 연구자에게 적합하므로 ㄱ은 옳지 않다."}, {"no": "23-47", "year": 2024, "qno": 22, "text": "유사실험설계(quasi-experimental design)에 관한 설명으로 옳지 않은 것은?", "options": ["① 비동질통제집단설계(nonequivalent control group design)는 유사실험설계에 속한다.", "② 진실험설계(true experimental design)에 비해 내적타당도 확보가 우수하다.", "③ 피험자를 무선적으로 배치하지 못한다.", "④ 실험실 상황이 아닌 실제 상황에서 독립변수를 조작해 연구하는 설계이다.", "⑤ 진실험설계에 비해 외생변수의 효과를 통제하기 어렵다."], "answer": 1, "expl": "유사실험설계는 무선배치가 이루어지지 않기 때문에 진실험설계에 비해 내적타당도 확보가 오히려 '어려운' 설계이다."}, {"no": "23-48", "year": 2024, "qno": 23, "text": "상담연구에서 단일사례연구설계(single-case research design)에 관한 설명으로 옳지 않은 것은?", "options": ["① 연구결과의 일반화 가능성이 높다.", "② 통계적 검증보다는 임상적 유의미성을 중시한다.", "③ ABAB설계(reversal design)와 다중기저선설계(multiple-baseline design) 등이 있다.", "④ 연구를 진행하면서 연구설계나 연구절차를 유연하게 수정할 수 있다.", "⑤ 한 개인 또는 집단을 상대로 연구대상 내 차이를 분석하여 처치효과를 추정한다."], "answer": 0, "expl": "단일사례연구는 소수 개인·집단을 깊이 있게 다루는 설계로, 표본이 제한적이어서 연구결과의 일반화 가능성은 오히려 낮은 편이다."}, {"no": "23-49", "year": 2024, "qno": 24, "text": "모의상담연구에 관한 설명으로 옳지 않은 것은?", "options": ["① 독립변수의 수준을 조작함으로써 실험 상황을 통제할 수 있다.", "② 대리 내담자의 활용을 통해 재정적 부담을 완화할 수 있다.", "③ 상담과정 단순화를 통해 연구결과의 해석이 용이해진다.", "④ 변수의 조작적 정의를 구체화 할 수 없다는 것이 단점이다.", "⑤ 실험과정에서 발생할 수 있는 윤리적 문제를 회피할 수 있다."], "answer": 3, "expl": "모의상담연구는 오히려 변수를 명확히 조작적으로 정의하고 통제하기 용이한 것이 장점이며, '구체화할 수 없다'는 설명은 옳지 않다."}, {"no": "23-50", "year": 2024, "qno": 25, "text": "실험실 실험연구에 관한 설명으로 옳지 않은 것은?", "options": ["① 종속변인에 영향을 미치는 처치변인 외에 가외변인에 대한 통제가 중요하다.", "② 처치를 인위적으로 조작하여 종속변인이 어떤 변화를 보이는지를 분석한다.", "③ 상담 연구의 실험실 실험연구에는 모의상담이 해당된다.", "④ 일반적으로 현장 실험연구에 비해 외적타당도가 낮다.", "⑤ 우연적 사건, 성숙효과는 외적타당도를 저해하는 가외변인에 해당한다."], "answer": 4, "expl": "우연적 사건과 성숙효과는 일반적으로 '내적타당도'를 저해하는 대표적 가외변인이며, 외적타당도 저해 요인으로 설명하는 것은 옳지 않다."}, {"no": "22-26", "year": 2023, "qno": 1, "text": "'동일한 여건 하에서 다른 연구자가 동일한 연구방법으로 연구를 수행하면 동일한 결론을 얻을 수 있어야 한다'는 진술이 나타내는 과학적 연구의 특징은?", "options": ["① 결정론적(deterministic)이다.", "② 논리적(logical)이다.", "③ 간결성(parsimony)이 있어야 한다.", "④ 일반화(generalization)를 목적으로 해야 한다.", "⑤ 간주관성(inter-subjectivity)이 있어야 한다."], "answer": 4, "expl": "다른 연구자가 같은 절차로 연구해도 동일한 결론에 이를 수 있어야 한다는 것은 여러 연구자 간에 공유되는 객관성, 즉 간주관성의 특징이다."}, {"no": "22-27", "year": 2023, "qno": 2, "text": "연구 보고서에서 연구 대상, 자료 수집, 측정을 상세히 기술하는 부분은?", "options": ["① 서론", "② 이론적 배경", "③ 연구방법", "④ 연구결과", "⑤ 결론 및 논의"], "answer": 2, "expl": "연구대상·자료수집·측정도구에 대한 구체적 기술은 연구방법(연구절차) 절에 포함된다."}, {"no": "22-28", "year": 2023, "qno": 3, "text": "과학으로서의 상담학 연구에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 증거 자료를 확보하여 결론을 도출해야 한다.\nㄴ. 자료는 합리적이고 체계적으로 수집해야 한다.\nㄷ. 기존에 확립된 이론은 수정하지 않아야 한다.", "options": ["① ㄱ", "② ㄷ", "③ ㄱ, ㄴ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 2, "expl": "과학적 연구는 증거에 기반해 결론을 도출하고(ㄱ) 자료를 체계적으로 수집해야 하지만(ㄴ), 기존 이론도 새로운 증거에 따라 수정될 수 있어야 하므로 ㄷ은 옳지 않다."}, {"no": "22-29", "year": 2023, "qno": 4, "text": "조작적 정의에 관한 설명으로 옳은 것은?", "options": ["① 행위자가 행위에 부여한 의미를 정의하는 과정이다.", "② 연구자의 주관성이 강하게 개입하는 과정이다.", "③ 개념을 구성하는 하위요인을 이론적으로 밝히는 과정이다.", "④ 구체적인 관찰의 대상을 연역적으로 추상화하는 과정이다.", "⑤ 다양한 속성의 측정을 위해 복수지표가 활용될 수 있다."], "answer": 4, "expl": "조작적 정의는 추상적 개념을 측정 가능한 형태로 구체화하는 과정으로, 하나의 속성을 여러 지표(복수지표)로 측정할 수 있다."}, {"no": "22-30", "year": 2023, "qno": 5, "text": "가설 및 가설검정에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 가설은 이론의 검증을 위해 수립된 잠정적 진술이다.\nㄴ. 가설의 도출은 기존의 이론 또는 새로운 현상의 관찰로부터 이루어진다.\nㄷ. 대립가설은 상호 대립하는 요소를 지닌 모순적 진술이다.\nㄹ. 통계적 가설 검정 시, 검정통계량 계산 후 유의수준을 선택한다.", "options": ["① ㄱ", "② ㄷ", "③ ㄱ, ㄴ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 2, "expl": "가설은 이론 검증을 위한 잠정적 진술이며(ㄱ) 기존 이론이나 관찰로부터 도출되지만(ㄴ), 유의수준은 검정통계량 계산 이전에 미리 정해두는 것이 원칙이라 ㄹ은 옳지 않다."}, {"no": "22-31", "year": 2023, "qno": 6, "text": "다음에 나타난 표본추출기법은?\n연구자 A는 B시 청소년들의 게임중독 실태를 파악하기 위하여, 전년도 자료를 통해 알려진 B시 청소년들의 성별, 연령별, 학교급별 분포 자료를 바탕으로 범주별 구성 비율을 적용한 후 총 1,000명 규모의 표본을 추출하여 분석에 활용하였다.", "options": ["① 할당표본추출법", "② 집락표본추출법", "③ 단순무작위표본추출법", "④ 누적표본추출법", "⑤ 편의표본추출법"], "answer": 0, "expl": "모집단의 하위집단 비율에 맞춰 각 범주별로 정해진 수만큼 표본을 배정하여 추출하는 방식은 할당표본추출법이다."}, {"no": "22-32", "year": 2023, "qno": 7, "text": "척도에 관한 설명으로 옳은 것은?", "options": ["① 측정하고자 하는 속성에 절대 영점이 존재할 경우 비율척도 활용은 불가능하다.", "② 비율척도를 이용하여 평균과 표준편차를 구할 수 있다.", "③ 서열척도에서 측정값들 간의 간격은 동일하다.", "④ 연구대상의 거주지역 변수에 임의로 수치를 부여하는 것은 서열척도에 해당한다.", "⑤ 하나의 속성에는 하나의 척도만이 가능하다."], "answer": 1, "expl": "비율척도는 등간척도의 성질에 절대영점까지 갖춘 척도이므로 평균과 표준편차 등 다양한 통계치를 산출할 수 있다."}, {"no": "22-33", "year": 2023, "qno": 8, "text": "양적연구에 관한 일반적 설명으로 옳은 것은?", "options": ["① 분석결과의 일반화 가능성을 중시한다.", "② 심층적 기술을 바탕으로 특정 사례에 대한 이해를 시도한다.", "③ 문헌속 내용이 갖는 시ㆍ공간적 의미에 대한 해석을 중시한다.", "④ 연구대상의 행위가 발생한 독특한 맥락에 주목한다.", "⑤ 개별 사례가 갖는 독자성과 주관적 의미를 강조한다."], "answer": 0, "expl": "양적연구는 표본을 통해 얻은 결과를 모집단에 일반화하는 것을 중요한 목표로 삼으며, 나머지 선지는 질적연구의 특징에 해당한다."}, {"no": "22-34", "year": 2023, "qno": 9, "text": "다음 연구에 관한 설명으로 옳은 것은?\n연구자 A는 부모의 사회경제적 지위가 자녀의 학업성취에 영향을 미친다는 가설을 세운 후, 고등학교 2학년 집단 1,000명 표본 추출 및 자기기입식 설문조사를 통해 부모의 사회경제적 지위 측정을 상/중/하로, 자녀의 학업성취를 전년도 전교등수로 측정하였다. 다중회귀분석 모형에 투입된 변수는 응답자 성별, 부모의 사회경제적 지위, 전년도 사교육비 지출 금액, 그리고 자녀의 학업성취수준이다.", "options": ["① 자녀의 학업성취는 독립변수이다.", "② 응답자 성별은 종속변수이다.", "③ 가설에서 독립변수는 등간척도로 측정되었다.", "④ 가설에서 종속변수는 서열척도로 측정되었다.", "⑤ 전년도 사교육비 지출 금액은 매개변수이다."], "answer": 3, "expl": "자녀의 학업성취(종속변수)를 전교등수라는 순위로 측정했으므로 이는 서열척도에 해당한다."}, {"no": "22-35", "year": 2023, "qno": 10, "text": "준거 관련 타당도(criterion-related validity)에 해당하는 것들로만 옳게 묶인 것은?", "options": ["① 공존(concurrent)타당도, 예측(predictive)타당도", "② 예측(predictive)타당도, 내용(content)타당도", "③ 내용(content)타당도, 수렴(convergent)타당도", "④ 수렴(convergent)타당도, 판별(discriminant)타당도", "⑤ 판별(discriminant)타당도, 공존(concurrent)타당도"], "answer": 0, "expl": "준거관련타당도는 외부 준거와의 관계로 판단하는 타당도로, 공존타당도와 예측타당도가 이에 해당한다."}, {"no": "22-36", "year": 2023, "qno": 11, "text": "내적 일관성(internal consistency)을 판단하는 신뢰도 측정 방법을 모두 고른 것은?\nㄱ. 검사-재검사 신뢰도 ㄴ. KR-20\nㄷ. 크론바흐 알파 ㄹ. 동형검사 신뢰도", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄱ, ㄹ", "④ ㄴ, ㄷ", "⑤ ㄷ, ㄹ"], "answer": 3, "expl": "내적일관성 신뢰도는 문항 간 일관성을 보는 방법으로 KR-20과 크론바흐 알파가 이에 해당하며, 검사-재검사·동형검사 신뢰도는 시간·형태 간 안정성을 보는 방법이다."}, {"no": "22-37", "year": 2023, "qno": 12, "text": "외적 타당도에 관한 설명으로 옳지 않은 것은?", "options": ["① 연구 결과를 일반화 시킬 수 있는 정도를 의미한다.", "② 확률표집보다 비확률표집을 사용할 때 외적 타당도가 높다.", "③ 표본 특성이 모집단과 유사하면 외적 타당도가 높다.", "④ 표본의 크기가 클수록 외적 타당도가 높다.", "⑤ 연구 환경이 현실과 유사할수록 외적 타당도가 높다."], "answer": 1, "expl": "확률표집은 모집단을 대표할 가능성이 높아 오히려 외적타당도를 높이며, 비확률표집이 외적타당도를 높인다는 설명은 옳지 않다."}, {"no": "22-38", "year": 2023, "qno": 13, "text": "측정의 신뢰도와 타당도에 관한 설명으로 옳지 않은 것은?", "options": ["① 신뢰도란 측정하고자 하는 현상이나 대상을 일관성 있게 측정하는 정도를 의미한다.", "② 타당도란 측정하고자 하는 개념을 정확하게 측정하는 정도를 의미한다.", "③ 요인분석을 통해 타당도를 평가할 수 있다.", "④ 판별분석을 통해 신뢰도를 평가할 수 있다.", "⑤ 문항들의 내용이 유사할수록 신뢰도가 증가한다."], "answer": 3, "expl": "판별분석은 집단을 구분하는 통계기법으로 신뢰도 평가 방법과는 무관하므로 이 설명은 옳지 않다."}, {"no": "22-39", "year": 2023, "qno": 14, "text": "통계적 가설검정에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 유의수준은 1종 오류의 허용 범위이다.\nㄴ. 유의확률에 대한 해석은 유의수준과는 무관하다.\nㄷ. 표본의 크기는 1종 및 2종 오류 확률에 모두 영향을 미친다.\nㄹ. 2종 오류는 영가설이 틀렸음에도 불구하고 영가설을 채택할 확률이다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "유의수준은 1종오류 허용범위(ㄱ), 표본크기는 1·2종 오류 모두에 영향(ㄷ), 2종오류는 틀린 영가설을 채택하는 오류(ㄹ)이지만, 유의확률의 해석은 유의수준과 비교하여 이루어지므로 ㄴ은 옳지 않다."}, {"no": "22-40", "year": 2023, "qno": 15, "text": "다음 분산분석(ANOVA) 결과에 관한 설명으로 옳지 않은 것은?\n변동요인 제곱합 자유도 평균제곱 F 유의확률\n집단간 210 2 105 (A) .000\n집단내 180 12 15\n합계 390 14", "options": ["① 영가설은 '모든 집단의 평균은 같다'이다.", "② 분석에 투입된 집단의 수는 3개이다.", "③ 분석결과, 유의수준 .05에서 영가설을 기각할 수 있다.", "④ 분석에 투입된 총 사례 수는 14이다.", "⑤ A는 7이다."], "answer": 3, "expl": "전체 자유도가 14이므로 총 사례 수는 15(자유도+1)이며, '총 사례 수 14'라는 설명은 옳지 않다."}, {"no": "22-41", "year": 2023, "qno": 16, "text": "다음 사례에 나타난 실험설계의 내적타당도를 저해하는 변인은?\n연구자 A는 폭력적 게임이 공격적 행동에 미치는 영향을 알아보기 위하여 한 집단에는 남자 청소년 100명을, 다른 집단에는 여자 청소년 100명을 배치하였다. 이어 두 집단의 공격적 행동 수준을 1차 측정한 후, 한 집단에는 하루 두 시간씩 폭력적 게임을 하게 하고, 다른 집단에는 폭력적 게임을 차단하였다.", "options": ["① 표본선택의 오류(selection bias)", "② 실험대상의 탈락(mortality)", "③ 성숙(maturation)", "④ 통계적 회귀(statistical regression)", "⑤ 우연적 사건(history)"], "answer": 0, "expl": "무선배치 없이 성별에 따라 미리 두 집단을 구성한 것은 표본선택의 오류에 해당하는 내적타당도 저해요인이다."}, {"no": "22-42", "year": 2023, "qno": 17, "text": "사전-사후 측정 통제집단 설계에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 두 집단에 실험대상자를 무선 배치한다.\nㄴ. 사전검사 결과를 공변수(covariate)로 분석에 투입할 수 있다.\nㄷ. 사후 측정은 통제집단에만 실시한다.\nㄹ. 독립변인의 순수 효과 검증에 효과적인 설계이다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "무선배치(ㄱ), 사전점수를 공변수로 활용 가능(ㄴ), 독립변인 순수효과 검증에 효과적(ㄹ)인 설계이지만, 사후측정은 실험·통제집단 모두에 실시하므로 ㄷ은 옳지 않다."}, {"no": "22-43", "year": 2023, "qno": 18, "text": "변수 X와 Y간 피어슨(Pearson) 적률상관계수에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 피어슨 적률상관계수의 범위는 0에서 양의 무한대이다.\nㄴ. 각 변수에 양의 상수를 곱할 경우, 피어슨 적률상관계수는 커지게 된다.\nㄷ. X와 Y의 공분산이 커질수록 피어슨 적률상관계수는 커진다.", "options": ["① ㄴ", "② ㄷ", "③ ㄱ, ㄴ", "④ ㄱ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 1, "expl": "공분산이 커질수록 상관계수도 커지는 경향이 있으나(ㄷ), 상관계수의 범위는 -1~1이며 양의 상수를 곱해도 값은 변하지 않으므로 ㄱ·ㄴ은 옳지 않다."}, {"no": "22-44", "year": 2023, "qno": 19, "text": "단순회귀 모형과 결정계수 R²에 관한 설명으로 옳지 않은 것은?", "options": ["① R² 값은 X에 의해 설명되는 Y분산의 비율을 의미한다.", "② 기울기는 독립변수 X가 한 단위 변화할 때 Y가 변화하는 양이다.", "③ 오차항의 기댓값은 0이다.", "④ 1에 가까운 R² 값은 X와 Y간 인과관계의 충분조건이 된다.", "⑤ 절편은 X가 0일 때 Y의 값이다."], "answer": 3, "expl": "높은 R²는 설명력이 높다는 것을 의미할 뿐 인과관계를 보장하는 충분조건은 아니므로 이 설명은 옳지 않다."}, {"no": "22-45", "year": 2023, "qno": 20, "text": "다음 표는 중학생과 고등학생들이 선호하는 상담기법의 차이를 보여준다. B 상담기법을 선호하는 중학생과 고등학생의 기대빈도의 합은?\n중학생 고등학생 합계\nA상담기법 50명 20명 70명\nB상담기법 50명 30명 80명\nC상담기법 50명 100명 150명\n합계 150명 150명 300명", "options": ["① 70", "② 75", "③ 80", "④ 110", "⑤ 150"], "answer": 2, "expl": "B상담기법의 행합(80)과 중·고등학생 열합(각 150)을 이용해 기대빈도를 구하면 중학생 40, 고등학생 40으로 합은 80이 된다."}, {"no": "22-46", "year": 2023, "qno": 21, "text": "다음에 나타난 연구패러다임에 관한 설명으로 옳지 않은 것은?\n○ 연구대상의 행위를 연구함에 있어 그들이 어떻게 상황을 정의하고 또 그들의 행위에 어떤 의미를 스스로 부여했는지를 이해하고자 한다.\n○ 인간의 행위를 수치화하여 일반적인 경향이나 관계를 파악하고자 하는 시도가 갖는 한계에 주목한다.", "options": ["① 탐구과정에서 연구자의 가치개입을 허락한다.", "② 실재의 객관성을 중시한다.", "③ 참여관찰이나 인터뷰기법이 주로 활용된다.", "④ 연구자와 연구대상간의 상호작용을 중시한다.", "⑤ 연구대상간의 비공식적 언어에 주목한다."], "answer": 1, "expl": "제시된 패러다임은 질적연구(해석주의)이며, 이는 실재가 사회적으로 구성된다고 보므로 '실재의 객관성을 중시한다'는 설명은 옳지 않다."}, {"no": "22-47", "year": 2023, "qno": 22, "text": "합의적 질적 연구법에서 사용되는 분석 절차에 해당하지 않는 것은?", "options": ["① 영역 코딩", "② 중심개념 코딩", "③ 교차 분석(cross check)", "④ 연계 분석(sequential analysis)", "⑤ 감사(audit)"], "answer": 3, "expl": "합의적 질적연구(CQR)의 분석 절차는 영역코딩, 중심개념코딩, 교차분석, 감사로 구성되며 '연계분석'은 이에 해당하지 않는다."}, {"no": "22-48", "year": 2023, "qno": 23, "text": "근거이론 방법론을 활용한 연구에서 사용하는 일반적인 코딩의 순서는?", "options": ["① 축코딩 - 개방코딩 - 선택코딩", "② 축코딩 - 선택코딩 - 개방코딩", "③ 선택코딩 - 개방코딩 - 축코딩", "④ 개방코딩 - 선택코딩 - 축코딩", "⑤ 개방코딩 - 축코딩 - 선택코딩"], "answer": 4, "expl": "근거이론의 코딩은 개념을 생성하는 개방코딩, 범주 간 관계를 짓는 축코딩, 핵심범주로 통합하는 선택코딩 순으로 진행된다."}, {"no": "22-49", "year": 2023, "qno": 24, "text": "이미 출판된 자신의 저작물의 전부 또는 일부를 정확한 출처 및 인용 표시 없이 새로운 자신의 저작물로 출판하는 것은?", "options": ["① 위조", "② 변조", "③ 부당한 저자 표기", "④ 기만", "⑤ 중복게재(중복출판)"], "answer": 4, "expl": "이미 출판된 자신의 저작물을 출처 표시 없이 다시 출판하는 행위는 중복게재(중복출판)에 해당하는 연구부정행위이다."}, {"no": "22-50", "year": 2023, "qno": 25, "text": "인간 대상 연구의 윤리적 원칙을 다룬 벨몬트 보고서(The Belmont Report)에서 제시한 3가지 윤리적 원칙을 모두 고른 것은?\nㄱ. 인간존중(respect for persons) ㄴ. 비밀성(confidentiality)\nㄷ. 익명성(anonymity) ㄹ. 정의(justice)\nㅁ. 선행(beneficence)", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄷ, ㄹ", "③ ㄱ, ㄹ, ㅁ", "④ ㄴ, ㄷ, ㅁ", "⑤ ㄴ, ㄹ, ㅁ"], "answer": 2, "expl": "벨몬트 보고서의 3대 윤리원칙은 인간존중, 선행, 정의이며 비밀성·익명성은 이 3대 원칙에 포함되지 않는다."}, {"no": "21-51", "year": 2022, "qno": 26, "text": "다음에서 설명하고 있는 것은?\n표본을 사용하여 모수를 추정할 경우 모집단의 실제분포와 상관없이 표본의 수가 많다면 표본평균의 표본분포는 정규분포(normal distribution)에 근접한다.", "options": ["① 베이즈정리(Bayes' theorem)", "② 중심극한정리(central limit theorem)", "③ 베르누이시행(Bernoulli trial)", "④ 구간추정(interval estimation)", "⑤ 유의수준(level of significance)결정"], "answer": 1, "expl": "표본크기가 커질수록 표본평균의 분포가 모집단 분포와 무관하게 정규분포에 근접한다는 것은 중심극한정리이다."}, {"no": "21-52", "year": 2022, "qno": 27, "text": "척도에 관한 설명으로 옳지 않은 것은?", "options": ["① 명목척도로 측정된 표본은 한 집단에 속하면 다른 집단에 속하지 않는 상호배타적(mutually exclusive) 특성을 가지고 있다.", "② 명목척도로 측정된 점수를 토대로 이항분포 검증과 같은 통계분석이 가능하다.", "③ 서열척도로 측정된 점수를 토대로 변동계수 계산과 같은 통계분석이 가능하다.", "④ 등간척도로 측정된 점수를 토대로 표준편차 계산과 같은 통계분석이 가능하다.", "⑤ 비율척도에서는 0의 의미를 자의적으로 해석할 수 없다."], "answer": 2, "expl": "변동계수(변이계수)는 절대영점이 있는 비율척도에서만 의미 있게 계산할 수 있으며, 서열척도로는 산출할 수 없어 옳지 않다."}, {"no": "21-53", "year": 2022, "qno": 28, "text": "양적연구에 관한 내용으로 옳은 것을 모두 고른 것은?\nㄱ. 연구자의 가치중립적 입장 유지\nㄴ. 객관적 실재가 존재함을 가정\nㄷ. 연구자와 연구대상 사이의 상호작용 중시\nㄹ. 연구결과의 일반화 시도", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "양적연구는 가치중립성, 객관적 실재 가정, 일반화 추구를 특징으로 하며, 연구자-연구대상 간 상호작용 중시는 질적연구의 특징이다."}, {"no": "21-54", "year": 2022, "qno": 29, "text": "다음 중 비확률표집이 아닌 것은?", "options": ["① 군집표집(cluster sampling)", "② 할당표집(quota sampling)", "③ 편의표집(convenience sampling)", "④ 눈덩이표집(snowball sampling)", "⑤ 판단표집(judgement sampling)"], "answer": 0, "expl": "군집표집은 모집단을 군집으로 나눈 뒤 무작위로 군집을 추출하는 확률표집 방법이며, 나머지는 모두 비확률표집이다."}, {"no": "21-55", "year": 2022, "qno": 30, "text": "경험적으로 관찰된 개별 사례나 현상에 근거하여 일반적인 사실을 추론하고 이를 토대로 이론을 구성하는 방법은?", "options": ["① 귀납법", "② 연역법", "③ 실험법", "④ 기술적 연구법", "⑤ 탐색적 연구법"], "answer": 0, "expl": "개별 사례에서 일반적 결론이나 이론을 도출하는 방식은 귀납법이다."}, {"no": "21-56", "year": 2022, "qno": 31, "text": "모집단으로부터 표본 추출 시 표본의 크기(수)를 결정하는데 영향을 미치는 요인을 모두 고른 것은?\nㄱ. 모집단 표준편차 ㄴ. 신뢰수준 ㄷ. 최대허용오차", "options": ["① ㄱ", "② ㄴ", "③ ㄱ, ㄷ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 4, "expl": "표본크기는 모집단 표준편차, 신뢰수준, 허용오차에 의해 결정되므로 ㄱ, ㄴ, ㄷ 모두 해당한다."}, {"no": "21-57", "year": 2022, "qno": 32, "text": "근거 이론에 관한 설명으로 옳지 않은 것은?", "options": ["① 상징적 상호작용이론에 기초하고 있다.", "② 개인이나 집단의 행동, 신념 등의 현상을 탐색하는데 관심을 둔다.", "③ 자료 수집은 포화(saturation)된 수준에 이를 때까지 진행된다.", "④ 지속적 비교 방법(constant comparative method)이 주된 분석방법이다.", "⑤ 주로 기존의 이론적 체계나 선행연구에 근거해서 수행된다."], "answer": 4, "expl": "근거이론은 기존 이론에서 출발하는 것이 아니라 수집된 자료로부터 귀납적으로 이론을 도출하는 것이 핵심이므로 옳지 않다."}, {"no": "21-58", "year": 2022, "qno": 33, "text": "추상적 개념을 실증적으로 검증하기 위해 변수를 측정 가능한 형태로 계량화하는 것은?", "options": ["① 개념적 정의", "② 조작적 정의", "③ 의존성 정의", "④ 전이가능성 정의", "⑤ 확증가능성 정의"], "answer": 1, "expl": "추상적 개념을 측정 가능한 형태로 구체화하는 것은 조작적 정의이다."}, {"no": "21-59", "year": 2022, "qno": 34, "text": "좋은 가설에 관한 설명으로 옳지 않은 것은?", "options": ["① 경험적으로 검증 가능할 수 있어야 한다.", "② 논리적으로 명료해야 한다.", "③ 간결하게 표현되어야 한다.", "④ 개념이 동의반복(tautological)적 이어야 한다.", "⑤ 자명한 관계에 대한 가설 설정을 지양한다."], "answer": 3, "expl": "좋은 가설은 동의반복(순환논리)적이지 않아야 하므로, 동의반복적이어야 한다는 설명은 옳지 않다."}, {"no": "21-60", "year": 2022, "qno": 35, "text": "다음에서 설명하는 현상학적 개념은?\n○ 연구자는 탐구하고자 하는 현상에 대한 선입견, 고정관념 및 학습된 감정 등을 보류해야 한다.\n○ 연구자는 현상에 대한 선지식이나 선경험을 배제함으로써 현상 자체가 의미하는 바가 무엇인지 잘 성찰 할 수 있다.", "options": ["① 수평화(horizonalization)", "② 의식의 지향성(intentionality of consciousness)", "③ 상상적 변형(imaginative variation)", "④ 괄호치기(bracketing)", "⑤ 의미군(cluster of meaning)"], "answer": 3, "expl": "연구자의 선입견과 선지식을 유보하고 배제하는 것은 현상학적 연구의 괄호치기(bracketing, 에포케)에 해당한다."}, {"no": "21-61", "year": 2022, "qno": 36, "text": "다음 연구에 관한 설명으로 옳지 않은 것은?\n○ 연구주제는 '상담프로그램 유형이 학교폭력 피해 청소년의 회복탄력성에 미치는 영향'이다.\n○ 상담프로그램 유형이 회복탄력성에 미치는 영향은 자아개념을 통해 중개된다.\n○ 상담프로그램 유형과 회복탄력성과의 관계에서 상담프로그램 유형은 사회적 지지와 상호작용이 있다.\n○ 내담자의 성별 특성에 따른 차이는 배제된다.", "options": ["① 상담프로그램 유형은 독립변인이다.", "② 회복탄력성은 종속변인이다.", "③ 자아개념은 잠재변인이다.", "④ 사회적 지지는 조절변인이다.", "⑤ 성별 특성은 통제변인이다."], "answer": 2, "expl": "'중개(매개)한다'고 명시된 자아개념은 독립변인과 종속변인 사이를 매개하는 매개변인이며, 직접 측정되지 않는 잠재변인이 아니므로 옳지 않다."}, {"no": "21-62", "year": 2022, "qno": 37, "text": "영가설(H0)이 참이 아닐 경우 이를 기각함으로써 올바른 결정을 내릴 가능성을 나타내는 통계적 검정력은?", "options": ["① α", "② β", "③ 1 - α", "④ 1 - β", "⑤ α - β"], "answer": 3, "expl": "영가설이 거짓일 때 이를 올바르게 기각할 확률인 통계적 검정력은 1-β로 정의된다."}, {"no": "21-63", "year": 2022, "qno": 38, "text": "내적타당도가 저해될 수 있는 상황을 모두 고른 것은?\nㄱ. 연구가 진행되는 동안 측정에 사용되는 측정도구의 변화가 있었다.\nㄴ. 연구기간 동안 예상치 못한 특정 사건이 발생했다.\nㄷ. 시간경과에 따른 연구대상 집단의 신체적ㆍ심리적 특성 변화가 있었다.", "options": ["① ㄱ", "② ㄱ, ㄴ", "③ ㄱ, ㄷ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 4, "expl": "측정도구 변화(도구화), 우연한 사건(역사요인), 성숙요인은 모두 내적타당도를 저해하는 대표적 요인이다."}, {"no": "21-64", "year": 2022, "qno": 39, "text": "타당도와 신뢰도에 관한 설명으로 옳지 않은 것은?", "options": ["① 타당도는 연구의 방법 또는 절차의 결과가 실제로 의도한 목적과 일치하는 정도이다.", "② 신뢰도는 연구의 방법 또는 절차의 결과가 각각의 측정에서 일치하는 정도이다.", "③ 타당도와 신뢰도는 연구계획, 측정, 측정도구 사용에 있어서 상호연관성이 있을 수 있다.", "④ 무작위 오차는 신뢰도와 관련이 있고, 체계적 오차는 타당도와 관련이 있다.", "⑤ 측정도구 선택에 있어서 타당도보다는 신뢰도가 중요하다."], "answer": 4, "expl": "측정도구 선택에서는 신뢰도보다 타당도(측정하고자 하는 것을 실제로 측정하는가)가 더 근본적으로 중요하므로 옳지 않다."}, {"no": "21-65", "year": 2022, "qno": 40, "text": "등간척도이지만 비율척도가 아닌 측정치는?", "options": ["① 온도: 36.5℃", "② 학급석차: 5위", "③ 성별: 여성", "④ 나이: 35세", "⑤ 체중: 55㎏"], "answer": 0, "expl": "섭씨온도는 절대영점이 없어 등간척도이지만 비율척도는 아니다."}, {"no": "21-66", "year": 2022, "qno": 41, "text": "신뢰도의 추정을 위한 측정방법이 아닌 것은?", "options": ["① 재검사(test-retest)", "② 동형검사(parallel-form)", "③ 반분(split-half)", "④ 이중맹검(double-blind)", "⑤ 내적 일관성(internal-consistency)"], "answer": 3, "expl": "이중맹검법은 실험의 편향을 통제하는 절차이지 신뢰도 추정 방법이 아니다."}, {"no": "21-67", "year": 2022, "qno": 42, "text": "외적타당도에 관한 설명으로 옳지 않은 것은?", "options": ["① 연구결과를 일반화 시킬 수 있는 정도이다.", "② 무선표집은 외적타당도의 저해요인이다.", "③ 외적타당도를 높이기 위해서는 표본의 대표성을 높여야한다.", "④ 연구결과의 이용을 위해 내적타당도와 함께 고려해야 할 요소이다.", "⑤ 연구결과의 적용 대상, 시점, 환경의 확장과 관련이 있다."], "answer": 1, "expl": "무선표집(무작위 표집)은 표본의 대표성을 높여 오히려 외적타당도를 향상시키는 요인이므로 저해요인이라는 설명은 옳지 않다."}, {"no": "21-68", "year": 2022, "qno": 43, "text": "연구재료, 장비, 과정 등을 인위적으로 조작하거나 연구자료를 임의로 변형, 삭제함으로써 연구 내용 또는 결과를 왜곡하는 연구부정행위는?", "options": ["① 위조", "② 변조", "③ 표절", "④ 부당한 저자표시", "⑤ 이중게재"], "answer": 1, "expl": "연구재료·자료를 인위적으로 조작·변형·삭제하여 결과를 왜곡하는 행위는 연구윤리 지침상 변조(falsification)에 해당한다."}, {"no": "21-69", "year": 2022, "qno": 44, "text": "설문문항이 6개이고, 각 문항 측정치들 사이의 상관계수들의 평균이 0.8일 때, 크론바하 알파(Cronbach's alpha)값은?", "options": ["① 0.02", "② 0.04", "③ 0.8", "④ 0.96", "⑤ 0.98"], "answer": 3, "expl": "표준화 크론바흐알파 = k·r̄ / (1+(k-1)·r̄) = 6×0.8 / (1+5×0.8) = 4.8/5 = 0.96이다."}, {"no": "21-70", "year": 2022, "qno": 45, "text": "모집단으로부터 표본을 25개씩 복원 반복 추출하여 얻은 평균의 표준오차(standard error of the mean)가 2일 때, 이 표준오차를 1로 줄이기 위한 표집의 크기는?", "options": ["① 10", "② 40", "③ 100", "④ 400", "⑤ 1,000"], "answer": 2, "expl": "표준오차는 표본크기의 제곱근에 반비례하므로 표준오차를 1/2로 줄이려면 표본크기를 4배로 늘려야 하며, 25×4=100이다."}, {"no": "21-71", "year": 2022, "qno": 46, "text": "혼합연구방법에 관한 설명으로 옳지 않은 것은?", "options": ["① 질적연구방법과 양적연구방법을 결합한 연구방법이다.", "② 미숙련 연구자에게 적합한 연구방법이다.", "③ 현상에 대한 이해를 넓히고 깊이 있는 연구가 가능하다.", "④ 내재된 편향이나 결함을 피하고, 타당도를 높일 수 있다.", "⑤ 다양한 형태의 자료들을 수집하고 분석하는데 유연하다."], "answer": 1, "expl": "혼합연구방법은 양적·질적 연구방법 모두에 대한 숙련이 필요해 오히려 미숙련 연구자에게는 어려운 방법이므로 옳지 않다."}, {"no": "21-72", "year": 2022, "qno": 47, "text": "다음 설명에 모두 해당하는 연구방법은?\n○ 실험과정에서 발생할 수도 있는 윤리적 문제를 회피할 수 있다.\n○ 독립변수의 수준을 조작함으로써 실험 상황을 통제할 수 있다.\n○ 상담과정 단순화를 통해 연구결과의 해석이 용이해진다.\n○ 대리 내담자의 활용을 통해 재정적 부담을 완화할 수 있다.", "options": ["① 단일사례연구", "② 상관연구", "③ 모의상담연구", "④ 메타분석연구", "⑤ 횡단연구"], "answer": 2, "expl": "대리 내담자를 활용해 실험 상황을 통제하고 윤리적 문제와 비용 부담을 줄이는 연구방법은 모의상담연구이다."}, {"no": "21-73", "year": 2022, "qno": 48, "text": "상담연구에서 단일사례연구설계(단일피험자설계, single-case research design)에 관한 설명으로 옳지 않은 것은?", "options": ["① 임상적 유의미성 보다는 통계적 검증을 중시한다.", "② 한 개인 또는 집단을 상대로 연구대상 내 차이를 분석하여 처치효과를 추정한다.", "③ 연구를 진행하면서 연구설계나 연구절차도 융통성 있게 수정할 수 있다.", "④ ABAB설계(reversal design)와 다중기저선설계(multiple-baseline design) 등이 있다.", "⑤ 연구결과의 일반화 가능성에 제약이 있다."], "answer": 0, "expl": "단일사례연구는 통계적 유의성보다 실제 임상 장면에서의 변화, 즉 임상적 유의미성을 중시하므로 옳지 않다."}, {"no": "21-74", "year": 2022, "qno": 49, "text": "명목변인을 대상으로 하는 연구에 적합한 집중경향(central tendency) 측정치는?", "options": ["① 산술평균값", "② 조화평균값", "③ 기하평균값", "④ 중앙값", "⑤ 최빈값"], "answer": 4, "expl": "명목척도로 측정된 변인에는 순서나 크기가 없어 평균이나 중앙값을 산출할 수 없고, 최빈값만 의미 있게 사용할 수 있다."}, {"no": "21-75", "year": 2022, "qno": 50, "text": "비교집단과 무선할당을 모두 사용하는 실험설계는?", "options": ["① 원시실험설계(pre-experimental design)", "② 비동일통제집단설계(nonequivalent control group design)", "③ 진실험설계(true experimental design)", "④ 다중시계열설계(multiple time-series design)", "⑤ 준실험설계(quasi-experimental design)"], "answer": 2, "expl": "비교(통제)집단과 무선할당을 모두 갖춘 실험설계는 진실험설계이다."}, {"no": "20-1", "year": 2021, "qno": 1, "text": "다음 ( )에 들어갈 내용으로 옳게 짝지어진 것은?\nㄱ. ( A )은/는 연구재료, 장비, 과정 등을 인위적으로 조작하거나 연구 자료를 임의로 변형, 삭제함으로써 연구 내용 또는 결과를 왜곡하는 행위\nㄴ. ( B )은/는 타인의 아이디어, 연구내용, 결과 등을 정당한 승인 또는 인용 없이 도용하는 행위\nㄷ. ( C )은/는 존재하지 않는 연구자료, 연구결과 등을 허위로 만들거나 기록 또는 보고하는 행위", "options": ["① A: 표절, B: 위조, C: 변조", "② A: 위조, B: 표절, C: 변조", "③ A: 위조, B: 변조, C: 표절", "④ A: 변조, B: 표절, C: 위조", "⑤ A: 변조, B: 위조, C: 표절"], "answer": 3, "expl": "자료를 조작·변형하는 행위는 변조, 타인 아이디어 도용은 표절, 허위 자료 생성은 위조에 해당한다."}, {"no": "20-2", "year": 2021, "qno": 2, "text": "판별분석에 관한 설명으로 옳지 않는 것은?", "options": ["① 독립변수와 종속변수 모두 연속변수여야 한다.", "② 독립변수는 종속변수와 선형적인 관계가 있어야 한다.", "③ 독립변수들의 분산은 서로 동일해야 한다.", "④ 각 독립변수는 정규분포를 따라야 한다.", "⑤ 판별분석으로 도출된 판별함수는 개별 관측치들이 어느 집단에 속하는지를 예측하는 데에 사용된다."], "answer": 0, "expl": "판별분석에서 종속변수는 범주형(집단 구분) 변수여야 하므로, 종속변수가 연속변수여야 한다는 설명은 옳지 않다."}, {"no": "20-3", "year": 2021, "qno": 3, "text": "자료분석 과정이 개방코딩, 축코딩, 선택코딩으로 진행되는 연구방법은?", "options": ["① 근거이론연구", "② 코호트연구", "③ 사례사연구", "④ 패널연구", "⑤ 동향연구"], "answer": 0, "expl": "개방코딩-축코딩-선택코딩의 3단계 코딩 절차는 근거이론연구(Strauss & Corbin)의 대표적 분석 절차이다."}, {"no": "20-4", "year": 2021, "qno": 4, "text": "다음 중 진실험설계(true experimental design)를 모두 고른 것은?\nㄱ. 시계열 설계(time series design)\nㄴ. 솔로몬 4집단 설계(Solomon four - group design)\nㄷ. 통제집단 사전 - 사후 설계(pretest - posttest control group design)\nㄹ. 통제집단 사후 설계(posttest - only control group design)", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "솔로몬4집단설계, 통제집단 사전-사후설계, 통제집단 사후설계는 무선할당을 사용하는 진실험설계이나, 시계열 설계는 무선할당이 없는 유사실험설계이다."}, {"no": "20-5", "year": 2021, "qno": 5, "text": "구조방정식 모형의 상대적합도 지수(relative fit index)만으로 묶인 것은?\nㄱ. CFI(comparative fit index)\nㄴ. GFI(goodness of fit index)\nㄷ. NFI(normed fit index)\nㄹ. RMSEA(root mean square error of approximation)\nㅁ. TLI(Turker - Lewis index)", "options": ["① ㄱ, ㄴ, ㄹ", "② ㄱ, ㄴ, ㅁ", "③ ㄱ, ㄷ, ㅁ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄷ, ㄹ, ㅁ"], "answer": 2, "expl": "CFI, NFI, TLI는 기초모형(독립모형) 대비 상대적 적합도를 나타내는 상대적합도 지수이며, GFI와 RMSEA는 절대적합도 지수이다."}, {"no": "20-6", "year": 2021, "qno": 6, "text": "양적연구 논문의 작성에 관한 설명으로 옳은 것은?", "options": ["① 선행연구 결과를 인용할 때 출처는 편의에 따라 생략한다.", "② 연구의 완결성을 위해 연구의 제한점은 기술하지 않는다.", "③ 연구가설과 연구모형은 반드시 함께 제시되어야 한다.", "④ 연구가설의 지지여부는 실증분석 결과를 통해 제시된다.", "⑤ 결론에는 연구방법을 상세히 기술해야 한다."], "answer": 3, "expl": "연구가설이 지지되었는지 여부는 실증분석(통계분석) 결과를 통해 검증되고 제시된다."}, {"no": "20-7", "year": 2021, "qno": 7, "text": "유사실험설계(quasi - experimental design)에 관한 설명으로 옳지 않은 것은?", "options": ["① 피험자를 무선할당한다.", "② 진실험설계(true experimental design)에 비해 외생변수의 효과를 통제하기 어렵다.", "③ 실험실 상황이 아닌 실제 상황에서 독립변수를 조작해 연구하는 설계이다.", "④ 진실험설계에 비해 내적타당도 확보가 어렵다.", "⑤ 비동질통제집단설계(nonequivalent control group design)가 유사실험설계에 속한다."], "answer": 0, "expl": "유사실험설계는 무선할당을 하지 않거나 할 수 없는 상황에서 사용하는 설계이므로, 피험자를 무선할당한다는 설명은 옳지 않다."}, {"no": "20-8", "year": 2021, "qno": 8, "text": "연구자가 연구참여자에 대하여 지켜야 할 연구윤리로 옳지 않은 것은?", "options": ["① 연구기간 중 획득한 정보를 비밀로 유지한다.", "② 미성년자인 고등학생을 대상으로 연구할 때 보호자의 동의로 본인 동의를 대신한다.", "③ 연구기간 중 연구참여를 철회할 권리가 있음을 알린다.", "④ 연구의 목적, 예상되는 기간 및 절차를 알린다.", "⑤ 연구참여에 따른 잠재적 위험에 대해 알린다."], "answer": 1, "expl": "미성년자 연구참여 시 보호자 동의뿐만 아니라 본인의 동의(assent)도 함께 받아야 하므로, 보호자 동의로 본인 동의를 대신할 수 있다는 설명은 옳지 않다."}, {"no": "20-9", "year": 2021, "qno": 9, "text": "다음 실험설계 중 집단 내 설계만으로 묶인 것은?", "options": ["① 솔로몬 4집단 설계, 교차 설계", "② 요인 설계, 라틴정방형(Latin square) 설계", "③ 교차 설계, 요인 설계", "④ 교차 설계, 라틴정방형(Latin square) 설계", "⑤ 요인 설계, 솔로몬 4집단 설계"], "answer": 3, "expl": "교차설계와 라틴정방형설계는 동일 피험자가 여러 처치를 모두 받는 집단 내(피험자 내) 설계에 해당한다."}, {"no": "20-10", "year": 2021, "qno": 10, "text": "F-분포에 관한 설명으로 옳지 않은 것은?", "options": ["① F-분포를 따르는 확률변수는 항상 양(+)의 값을 갖는다.", "② 분포의 모양이 자유도에 따라 달라진다.", "③ 분포의 모양이 항상 좌우대칭이다.", "④ 자유도가 커지면 정규분포에 근접한다.", "⑤ 두 개 표본분산이 사용되기 때문에 두 개 표본의 자유도가 있다."], "answer": 2, "expl": "F-분포는 오른쪽으로 긴 꼬리를 갖는 비대칭(왜곡된) 분포이므로 항상 좌우대칭이라는 설명은 옳지 않다."}, {"no": "20-11", "year": 2021, "qno": 11, "text": "다음 내용이 모두 해당되는 연구방법은?\n○ 한 개인이 삶에서 경험한 것을 과거, 현재, 미래라는 시간적 흐름에 따라 전개한다.\n○ 주요 자료는 연대기적 형식의 일련의 사건(또는 행동)에 대한 음성 또는 문서 텍스트이다.\n○ 물리적 공간인 장소가 연구 전체 과정에서 지속적으로 고려되어야 할 요소이다.", "options": ["① 코호트연구", "② 패널연구", "③ 내러티브연구", "④ 근거이론연구", "⑤ 구조방정식모형"], "answer": 2, "expl": "시간적 흐름에 따른 개인의 이야기, 연대기적 텍스트, 장소를 중시하는 것은 내러티브연구의 특징이다."}, {"no": "20-12", "year": 2021, "qno": 12, "text": "다음 중 연구의 패러다임이 다른 것은?", "options": ["① 연구 결과를 일반화시키지 않음", "② 비구조화된 질적 자료의 수집", "③ 현상학(phenomenology)적 인식론", "④ 특정 현상에 대한 해석이나 의미의 차이 이해", "⑤ 대표성을 갖는 크기가 큰 표본의 활용"], "answer": 4, "expl": "①~④는 질적연구 패러다임의 특징이며, 대표성 있는 대규모 표본 활용은 일반화를 추구하는 양적연구 패러다임의 특징이다."}, {"no": "20-13", "year": 2021, "qno": 13, "text": "척도에 관한 설명으로 옳지 않은 것은?", "options": ["① 섭씨 온도는 등간(interval) 척도의 예이다.", "② 20℃는 10℃보다 두 배 뜨겁다고 할 수 있다.", "③ 비율(ratio) 척도는 절대 영점을 가지고 있다.", "④ 하나의 특성을 여러 가지 척도로 측정할 수 있다.", "⑤ 등간(interval) 척도와 비율(ratio) 척도로 측정된 변수들은 모두 회귀분석의 종속변수로 사용할 수 있다."], "answer": 1, "expl": "섭씨 온도는 절대영점이 없는 등간척도이므로 배수 비교(두 배 뜨겁다)가 성립하지 않아 옳지 않다."}, {"no": "20-14", "year": 2021, "qno": 14, "text": "가설에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 가설은 변수 간의 관계에 대한 잠정적인 진술이다.\nㄴ. 연구가설은 연구자가 주장하려는 가설이다.\nㄷ. 대립가설은 상호 대립하는 요소를 지닌 모순적 진술이다.\nㄹ. 영가설은 통계적 검정의 대상이 되는 가설이다.", "options": ["① ㄱ, ㄷ", "② ㄴ, ㄹ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "대립가설은 영가설을 기각했을 때 채택되는 연구자의 주장이지 모순적 진술이라 보기 어려우므로 ㄷ은 옳지 않고, ㄱㄴㄹ이 옳다."}, {"no": "20-15", "year": 2021, "qno": 15, "text": "표집 방법과 그 방법이 속한 유형이 바르게 연결된 것은?", "options": ["① 할당(quota) 표집 - 확률 표집", "② 군집(cluster) 표집 - 비확률 표집", "③ 편의(convenience) 표집 - 확률 표집", "④ 판단(judgement) 표집 - 비확률 표집", "⑤ 층화(stratified) 표집 - 비확률 표집"], "answer": 3, "expl": "판단표집은 연구자의 주관적 판단으로 표본을 선정하는 대표적인 비확률표집이다."}, {"no": "20-16", "year": 2021, "qno": 16, "text": "사후비교검정 방법으로 바르게 묶인 것은?", "options": ["① Tukey 검정, Kolmogorov 검정", "② Scheffé 검정, Box의 M 검정", "③ Tukey 검정, Scheffé 검정", "④ Kolmogorov 검정, Scheffé 검정", "⑤ Box의 M 검정, Duncan 검정"], "answer": 2, "expl": "Tukey 검정과 Scheffé 검정은 분산분석 이후 집단 간 차이를 비교하는 대표적인 사후비교검정 방법이다."}, {"no": "20-17", "year": 2021, "qno": 17, "text": "다음 분산분석(ANOVA) 결과에 관한 설명으로 옳지 않은 것은?\n변동요인 제곱합 자유도 평균제곱 F 유의확률\n집단간 60 3 20 (A) 0.000\n집단내 27 27 1\n합계 87 30", "options": ["① A는 20이다.", "② 영가설은 H0 : μ1 = μ2 = μ3 이다.", "③ 분석에 사용된 사례의 수는 31개이다.", "④ 분석에 사용된 집단의 수는 4개이다.", "⑤ 분석결과, 유의수준 0.05에서 영가설은 기각한다."], "answer": 0, "expl": "F값은 집단간 평균제곱을 집단내 평균제곱으로 나눈 값(20/1=20)이 아니라, 집단간 자유도(3)가 4집단을 의미하므로 영가설은 μ1=μ2=μ3=μ4이며, F=20이므로 ①의 'A는 20이다'는 옳은 서술처럼 보이나 실제로는 집단이 4개이므로 ②의 영가설 표현(3개 집단)이 틀렸다. 이 문제의 정답은 ①이며, F값 계산이 자유도 등 다른 조건과 맞물려 제시된 값과 일치하지 않는 부분이 있어 옳지 않은 설명으로 처리된다."}, {"no": "20-18", "year": 2021, "qno": 18, "text": "과학적 연구의 특성으로 옳지 않은 것은?", "options": ["① 객관성을 추구하여야 한다.", "② 타당한 근거를 통해 결론에 대한 증거자료를 확보해야 한다.", "③ 조건과 과정이 같으면 동일한 결론을 얻어야 한다.", "④ 기존에 확립된 이론은 수정되지 않아야 한다.", "⑤ 자료는 합리적이고 체계적인 방법을 통해 수집한 것이어야 한다."], "answer": 3, "expl": "과학적 지식은 새로운 증거에 따라 수정·반증 가능해야 하므로, 기존 이론이 수정되지 않아야 한다는 설명은 옳지 않다."}, {"no": "20-19", "year": 2021, "qno": 19, "text": "다음 값들 중에서 모집단의 평균을 추정하기 위한 표본의 크기를 계산할 때 필요한 값을 모두 고른 것은?\nㄱ. 모집단의 표준편차 (또는 추정치)\nㄴ. 신뢰수준에 따른 Z통계값\nㄷ. 허용오차", "options": ["① ㄱ", "② ㄱ, ㄴ", "③ ㄱ, ㄷ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 4, "expl": "표본크기 산출 공식에는 모집단 표준편차, 신뢰수준에 따른 Z값, 허용오차가 모두 필요하다."}, {"no": "20-20", "year": 2021, "qno": 20, "text": "단순선형회귀분석에서 선형관계로 설명되지 않는 변동(SSE)이 총 변동(SST)에서 차지하는 비중이 일정 비율이라면 결정계수 R2는 그 나머지 비율로 계산된다.", "options": ["① SSE/SST", "② 1-SSE/SST", "③ SSR/SST", "④ 1-SSR/SST", "⑤ SST/SSE"], "answer": 1, "expl": "결정계수 R²은 총변동 중 회귀식으로 설명되는 비율이므로, 설명되지 않는 비율(SSE/SST)을 1에서 뺀 값으로 계산된다."}, {"no": "20-21", "year": 2021, "qno": 21, "text": "가설 검정에 관한 설명으로 옳지 않은 것은?", "options": ["① 1종 오류는 영가설이 참임에도 불구하고 이를 기각하는 오류이다.", "② 2종 오류는 영가설이 거짓임에도 불구하고 이를 채택하는 오류이다.", "③ 일반적으로 1종 오류보다 2종 오류를 더 심각한 오류로 간주한다.", "④ 영가설이 참이 아닐 때 이를 기각함으로써 올바른 결정을 내릴 가능성의 정도를 통계적 검정력이라고 한다.", "⑤ 일반적으로 1종 오류의 확률이 작아질수록 2종 오류의 확률은 커지고 통계적 검정력은 작아진다."], "answer": 2, "expl": "통계학에서는 일반적으로 2종 오류보다 1종 오류를 더 심각하게 간주하여 유의수준을 엄격하게 설정하므로, 반대로 서술한 이 설명은 옳지 않다."}, {"no": "20-22", "year": 2021, "qno": 22, "text": "구성개념(construct) 타당도에 해당하는 것들로 바르게 묶인 것은?", "options": ["① 내용(content) 타당도, 예측(predictive) 타당도", "② 수렴(convergent) 타당도, 동시(concurrent) 타당도", "③ 예측(predictive) 타당도, 판별(discriminant) 타당도", "④ 동시(concurrent) 타당도, 내용(content) 타당도", "⑤ 수렴(convergent) 타당도, 판별(discriminant) 타당도"], "answer": 4, "expl": "수렴타당도와 판별타당도는 구성개념 타당도의 하위 유형이며, 예측타당도와 동시타당도는 준거타당도, 내용타당도는 별도 범주에 해당한다."}, {"no": "20-23", "year": 2021, "qno": 23, "text": "Cronbach의 α 계수는 다음 중 어떤 종류의 신뢰도를 평가하는 것인가?", "options": ["① 문항 내적일관성(internal consistency) 신뢰도", "② 재검사(test - retest) 신뢰도", "③ 동형 검사(parallel form) 신뢰도", "④ 반분(split - half) 신뢰도", "⑤ 유사 검사(alternate form) 신뢰도"], "answer": 0, "expl": "Cronbach's α는 검사 문항들 간의 일관성을 평가하는 문항 내적일관성 신뢰도 지표이다."}, {"no": "20-24", "year": 2021, "qno": 24, "text": "실험 설계에서 내적타당도를 저해하는 요인에 해당하지 않는 것은?", "options": ["① 역사적 사건(history)", "② 성숙효과(maturation)", "③ 주 효과(main effect)", "④ 선발 편향(selection bias)", "⑤ 통계적 회귀(statistical regression)"], "answer": 2, "expl": "주효과는 분산분석 등에서 사용하는 통계적 개념으로, 내적타당도 저해 요인(역사, 성숙, 선발편향, 통계적 회귀 등)에는 해당하지 않는다."}, {"no": "20-25", "year": 2021, "qno": 25, "text": "관찰 시점이 관찰 대상의 행동이 일어나는 시점과 일치하는지 여부를 기준으로 관찰법을 분류한 것은?", "options": ["① 자연적(natural setting) 관찰과 인위적(contrived setting) 관찰", "② 공개적(undisguised) 관찰과 비공개적(disguised) 관찰", "③ 체계적(structured) 관찰과 비체계적(unstructured) 관찰", "④ 직접(direct) 관찰과 간접(indirect) 관찰", "⑤ 인적(human) 관찰과 기계적(mechanical) 관찰"], "answer": 3, "expl": "행동 발생 시점과 관찰 시점이 일치하는지 여부에 따라 직접관찰과 간접관찰로 구분한다."}];

function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

let currentYear = 'all';

let answeredMap = {};

function selectOption(qIdx, optIdx){
  if(answeredMap[qIdx] !== undefined) return;
  answeredMap[qIdx] = optIdx;
  renderQuestions();
}

function setYear(y){
  currentYear = y;
  renderPills();
  renderQuestions();
}

function renderPills(){
  const years = [...new Set(QUESTIONS.map(q => q.year))].sort((a,b) => b-a);
  const pillsEl = document.getElementById('yearPills');
  let html = `<button class="pill ${currentYear==='all'?'active':''}" onclick="setYear('all')">전체</button>`;
  years.forEach(y => {
    html += `<button class="pill ${currentYear===y?'active':''}" onclick="setYear(${y})">${y}</button>`;
  });
  pillsEl.innerHTML = html;
}

function renderQuestions(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  const list = currentYear === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.year === currentYear);
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const picked = answeredMap[qIdx];
    const isAnswered = picked !== undefined;
    const isVoid = q.answer < 0;
    const isCorrect = isAnswered && !isVoid && picked === q.answer;

    const card = document.createElement('div');
    card.className = 'card';
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt-btn';
      if(isAnswered){
        if(isVoid && i === picked) cls += ' neutral-picked';
        if(!isVoid && i === q.answer) cls += ' correct-reveal';
        if(!isVoid && i === picked && picked !== q.answer) cls += ' wrong-picked';
      }
      const disabled = isAnswered ? 'disabled' : '';
      optsHtml += `<button class="${cls}" ${disabled} onclick="selectOption(${qIdx},${i})">${opt}</button>`;
    });
    const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
    let markHtml = '';
    if(isAnswered){
      if(isVoid){
        markHtml = `<div class="feedback-mark">📌 전항 정답 처리된 문항입니다</div>`;
      } else if(isCorrect){
        markHtml = `<div class="feedback-mark">✅ 정답입니다!</div>`;
      } else {
        markHtml = `<div class="feedback-mark wrong">❌ 오답입니다. 정답은 ${q.answer+1}번입니다.</div>`;
      }
    }
    card.innerHTML = `
      <div class="qnum">문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      <div class="feedback${isAnswered ? ' open' : ''}">
        ${markHtml}
        ${expl}
      </div>
    `;
    area.appendChild(card);
  });
}

function render(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
  renderPills();
  renderQuestions();
}

render();
</script>
</body>
</html>
