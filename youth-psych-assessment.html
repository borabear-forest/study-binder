<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>심리측정 평가의 활용 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .cert-badge{
    display:inline-block;
    font-size:11px;
    color:var(--sub);
    margin:-4px 0 16px;
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .year-pills{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  .pill{
    background:var(--bg-base);
    border:none;
    border-radius:20px;
    padding:7px 16px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .pill.active{
    background:var(--accent);
    color:#fff;
    font-weight:600;
    box-shadow:none;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{padding:3px 0;line-height:1.6;}
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .opt-btn{
    display:block;
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    border-radius:10px;
    padding:9px 12px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    white-space:pre-wrap;
    font-family:inherit;
    cursor:pointer;
  }
  .opt-btn:hover:not(:disabled){background:rgba(0,0,0,0.045);}
  .opt-btn:disabled{cursor:default;}
  .opt-btn.correct-reveal{background:var(--right-bg);color:var(--accent-dark);font-weight:600;}
  .opt-btn.wrong-picked{background:#fbeceb;color:var(--wrong);font-weight:600;}
  .opt-btn.neutral-picked{background:#eef0ef;color:var(--text);font-weight:600;}
  .feedback{margin-top:12px;display:none;}
  .feedback.open{display:block;}
  .feedback-mark{font-size:13px;font-weight:600;color:var(--accent-dark);margin-bottom:8px;}
  .feedback-mark.wrong{color:var(--wrong);}
  .explain{
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">‹ 목록으로</a>
  <h1>심리측정 평가의 활용</h1>
  <div class="cert-badge">청소년상담사 2급</div>
  <div class="meta-line" id="metaLine"></div>
  <div class="year-pills" id="yearPills"></div>
  <div id="quizArea"></div>
</div>
<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "다음 ( )에 들어갈 학자를 바르게 나열한 것은?\n○ ( ㄱ )은 지능의 구조를 계층적으로 파악한 3계층 모델(three-stratum theory)을 발달시켰다.\n○ ( ㄴ )은(는) 지능의 구성요소를 각각의 독특한 정신능력으로 정의하고, 일곱 가지 기초정신능력을 제안하였다.", "options": ["① ㄱ: 캐롤(J. Carroll), ㄴ: 서스톤(L. Thurstone)", "② ㄱ: 갈톤(F. Galton), ㄴ: 가드너(H. Gardner)", "③ ㄱ: 카텔(R. Cattell), ㄴ: 서스톤(L. Thurstone)", "④ ㄱ: 캐롤(J. Carroll), ㄴ: 가드너(H. Gardner)", "⑤ ㄱ: 갈톤(F. Galton), ㄴ: 카텔(R. Cattell)"], "answer": 0, "expl": "캐롤은 지능을 일반요인-군집요인-특수요인의 3계층으로 설명하는 3계층 이론을 제안했고, 서스톤은 일곱 가지 기초정신능력(PMA)을 제안했다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "심리검사에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 심리적 특성의 개인차를 파악할 수 있다.\nㄴ. 인간의 내적인 속성을 수량화할 수 있다.\nㄷ. 검사자는 표준화된 절차를 지키는 것이 원칙이다.\nㄹ. 검사자의 기대가 수검자의 반응에 영향을 미칠 수 있다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "심리검사는 개인차 파악(ㄱ), 내적 속성의 수량화(ㄴ), 표준화된 절차 준수(ㄷ)를 원칙으로 하며, 검사자 기대에 따른 반응 왜곡(ㄹ, 로젠탈 효과 등)도 실제로 발생할 수 있다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "심리검사 개발에 관한 설명으로 옳은 것은?", "options": ["① BGT는 지적장애 진단을 위해 개발되었다.", "② BNT는 치매지수를 산출하고자 개발되었다.", "③ 웩슬러(Wechsler) 지능검사는 최초로 정신연령 개념을 도입하였다.", "④ PAI는 검사문항의 개념적 구조를 통계적으로 평가하여 개발되었다.", "⑤ 로샤(Rorschach) 검사는 정신역동을 평가하기 위해 개발되었다."], "answer": 3, "expl": "로샤 검사는 잉크반점 자극에 대한 반응을 통해 무의식적 정신역동을 평가하기 위해 개발된 대표적 투사검사다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "심리검사 실시에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 우울 평가를 위해 BDI를 실시한다.\nㄴ. 성격특성 평가를 위해 NEO-PI-R을 실시한다.\nㄷ. 학습장애 평가를 위해 SCT를 실시한다.\nㄹ. 지능평가를 위해 MBTI를 실시한다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "BDI(우울)와 NEO-PI-R(성격)은 각 목적에 맞는 검사이지만, SCT(문장완성검사)는 학습장애가 아닌 성격·정서 투사검사이고 MBTI는 지능검사가 아닌 성격유형검사이므로 ㄷ·ㄹ은 틀렸다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "심리평가를 위한 면담에 관한 설명으로 옳지 않은 것은?", "options": ["① 심리평가의 사유를 확인하는 과정이 포함된다.", "② 검사자료의 통합에 유용한 정보를 수집하게 해준다.", "③ 피면담자와 면담자의 관계형성이 정보 수집에 영향을 미친다.", "④ 정신상태 검사는 정신상태 관찰을 조직화하고자 고안된 면담 과정이다.", "⑤ 이야기식(narrative) 기록은 면담내용을 코딩하는 방법 중 하나이다."], "answer": 4, "expl": "이야기식 기록은 면담 내용을 있는 그대로 서술하는 방식으로, 이를 '코딩'하는 방법이라기보다 기록 방식 자체에 해당해 다른 선택지들과 결이 다르다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "구조화된 면담과 비교하여 비구조화된 면담의 특징으로 옳지 않은 것은?", "options": ["① 면담자간 일치도가 낮다.", "② 면담자의 주관이 개입될 여지가 크다.", "③ 일관적이고 체계적인 정보를 수집하기 용이하다.", "④ 면담자마다 질문하는 순서나 내용이 달라질 수 있다.", "⑤ 유용한 자료를 얻기 위해 면담자의 숙련된 전문성이 필요하다."], "answer": 2, "expl": "비구조화된 면담은 면담자마다 질문이 달라지고 주관이 개입되기 쉬워 오히려 '일관적이고 체계적인 정보 수집'이 어렵다는 것이 특징이다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "다음에 해당하는 측정방식은?\n상담자가 사회불안을 겪고 있는 청소년들을 대상으로 집단상담을 진행하였다. 이후 이들은 자신이 불안과 관련된 행동을 얼마나 자주 하는지 5점 척도로 응답하였다.", "options": ["① 산출법", "② 평정기록", "③ 사건기록", "④ 생각목록", "⑤ 구조화된 면담"], "answer": 1, "expl": "스스로 자신의 행동 빈도를 평정척도로 보고하게 하는 방식은 평정기록(rating)에 해당한다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "심리측정의 오차에 관한 설명으로 옳지 않은 것은?", "options": ["① 검사제작 과정에서 검사도구로 인한 오차를 최소화하여야 한다.", "② 심리측정은 직접적 측정이므로 오차를 발생시킨다.", "③ 검사의 실시과정을 표준화함으로써 오차를 감소시킬 수 있다.", "④ 수검자에 기인하는 오차는 그 원인을 통제하기 어렵다.", "⑤ 관찰자나 평정자의 편견으로 오차가 발생할 수 있다."], "answer": 1, "expl": "심리측정은 구성개념을 간접적으로 추정하는 '간접적' 측정이며, 오차가 발생하는 이유도 이 간접성 때문이다. '직접적 측정'이라는 설명 자체가 옳지 않다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "심리평가와 관련된 비밀 보장 윤리의 예외 사항을 모두 고른 것은?\nㄱ. 법적 강제에 의해 심리평가가 실시됨\nㄴ. 수검자가 타인을 해칠 위험이 확인됨\nㄷ. 아동 수검자가 학대받고 있다고 의심됨\nㄹ. 심리평가로 얻은 정보의 제공이 법적으로 요청됨", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "법적 강제(ㄱ), 타해 위험(ㄴ), 아동학대 의심(ㄷ), 법적 요청(ㄹ) 모두 비밀보장의 예외 상황에 해당한다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "심리검사A와 심리검사B의 표준편차가 동일하고 검사-재검사 신뢰도는 A가 0.7, B가 0.9일 때, 옳지 않은 것은?", "options": ["① 측정의 표준오차 값은 B에서 더 작다.", "② 검사점수에 오차가 개입될 가능성은 A에서 더 높다.", "③ 무선오차에 의해서 발생한 최대 오차점수는 B에서 더 작다.", "④ 검사를 받은 사람들의 검사점수의 분산 중 무선오차에 의한 분산은 A에서 더 크다.", "⑤ 검사를 반복하여 받을 때 68%의 확률로 진점수가 놓이는 구간의 범위는 A에서 더 넓다."], "answer": 2, "expl": "신뢰도가 낮을수록(A=0.7) 측정의 표준오차가 커지고 진점수 구간이 넓어지므로, A에서 오차 개입 가능성과 무선오차 분산이 더 크다는 설명들은 옳지만 '최대 오차점수가 B에서 더 작다'는 것도 신뢰도가 높은 B의 특성과 일치해 전체적으로 옳은 설명이며, 함정은 68% 신뢰구간이 A에서 더 넓다는 부분(정답 ①은 오히려 옳은 진술 확인 필요)."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "다음 ( )에 공통으로 들어갈 말은?\n한 개인의 검사 점수를 해석하기 위해, 이를 ( )집단이라 불리는 모집단을 대표하는 집단의 검사 점수들과 비교하는 상대평가적 채점 방법을 ( )참조 방식이라 한다.", "options": ["① 규준", "② 준거", "③ 근거", "④ 정규", "⑤ 표준"], "answer": 0, "expl": "모집단을 대표하는 규준집단의 점수와 비교하는 상대평가 방식을 규준참조 방식이라 한다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "다음은 타당도에 관한 설명이다. ( )에 들어갈 내용으로 옳은 것은?\n심리검사A의 타당도를 알아보기 위하여, A가 측정하려는 개념에 익숙한 전문가들을 대상으로 정보와 의견을 수집하여 ( ㄱ ) 타당도를, 측정하려는 개념을 측정하던 기존 심리검사와 A의 상관을 구하여 ( ㄴ ) 타당도를 산출하였다.", "options": ["① ㄱ: 공인, ㄴ: 내용", "② ㄱ: 안면, ㄴ: 공인", "③ ㄱ: 안면, ㄴ: 수렴", "④ ㄱ: 내용, ㄴ: 수렴", "⑤ ㄱ: 내용, ㄴ: 안면"], "answer": 3, "expl": "개념에 익숙한 전문가의 의견을 통해 산출하는 것은 내용타당도, 기존 검사와의 상관으로 산출하는 것은 공인타당도에 해당한다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "Z 점수가 +2일 때 이에 해당하는 T 점수는?", "options": ["① 30", "② 50", "③ 70", "④ 100", "⑤ 130"], "answer": 2, "expl": "T점수는 평균 50, 표준편차 10인 표준점수로 변환되므로, Z=+2일 때 T = 50 + 10×2 = 70이다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "K-WAIS-IV의 소검사에 관한 설명으로 옳지 않은 것은?", "options": ["① 순서화는 작업기억 지표의 보충 소검사이다.", "② 기호쓰기는 처리속도 지표의 핵심 소검사이다.", "③ 이해는 언어이해 지표의 보충 소검사이다.", "④ 퍼즐은 작업기억 지표의 핵심 소검사이다.", "⑤ 무게비교는 지각추론 지표의 보충 소검사이다."], "answer": 3, "expl": "퍼즐(직소퍼즐)은 작업기억이 아니라 지각추론 지표의 보충 소검사에 해당한다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "K-WISC-V에 관한 설명으로 옳지 않은 것은?", "options": ["① 16개의 소검사로 구성되어 있다.", "② 5개의 기본지표와 5개의 추가지표를 산출한다.", "③ 시공간 기본지표 산출에 행렬추리 점수가 반영된다.", "④ 단어추리 소검사는 5판에서 삭제되었다.", "⑤ K-WISC-IV에 없던 새로운 소검사가 3개 추가되었다."], "answer": 2, "expl": "K-WISC-V는 총 16개 소검사, 5개 기본지표와 5개 추가지표를 산출하며, 시공간 지표는 토막짜기와 퍼즐로 구성되고 행렬추리는 유동추론 지표에 반영되므로 ③이 옳지 않다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "지능지수(IQ)에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 스탠포드-비네(Stanford-Binet) 검사는 비율IQ를 사용한다.\nㄴ. 웩슬러(Wechsler) 지능검사는 편차IQ를 사용한다.\nㄷ. 치료적 혹은 교육적 개입방안에 대한 정보를 제공해준다.\nㄹ. 지능검사 제작 후 시간이 지남에 따라 산출되는 IQ가 장기적이며 점진적으로 상승하는 현상을 플린(Flynn)효과라 한다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "스탠포드-비네는 초기에는 비율IQ, 이후에는 편차IQ로 전환되었으나 역사적으로 비율IQ 사용이 맞고, 웩슬러는 편차IQ를 사용하며 플린효과·개입정보 제공 설명도 모두 타당하다."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "MMPI-2의 척도들 중 증상이나 진단과 독립적으로, 수검자가 스스로 인식하고 직접적으로 호소하는 문제나 어려움들을 측정하고자 개발된 것은?", "options": ["① 보충 척도", "② 내용 척도", "③ 타당도 척도", "④ 재구성 임상척도", "⑤ 성격병리 5요인 척도"], "answer": 1, "expl": "수검자가 스스로 인식하고 직접 호소하는 문제(주관적 호소내용)를 진단명과 독립적으로 측정하기 위해 개발된 것은 내용척도이다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "MMPI-2의 코드 유형 해석에 관한 설명으로 옳은 것은?", "options": ["① 1-3: 죄책감에 사로잡혀 있고, 일반적으로 두려움이 많다.", "② 2-7: 미성숙하고, 자기중심적이며, 대인관계가 피상적이다.", "③ 3-8: 행동화와 이에 대한 죄책감 및 후회를 주기적으로 반복한다.", "④ 4-6: 충동통제가 어렵고, 비난에 예민하며, 만성적으로 적대적이다.", "⑤ 8-9: 무책임하고 충동적이며 알코올 중독이나 법적 문제가 일반적이다."], "answer": 3, "expl": "8-9 코드는 사고장애와 과잉활동성이 결합된 형태로 무책임하고 충동적이며 알코올·법적 문제와 관련이 깊은 유형으로 해석된다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "세로토닌 방출이 결정적 역할을 한다고 클로닝거(C. Cloninger)가 제안한 기질차원을 측정하는 TCI의 척도는?", "options": ["① 연대감(C)", "② 인내력(P)", "③ 자극추구(NS)", "④ 위험회피(HA)", "⑤ 사회적 민감성(RD)"], "answer": 3, "expl": "위험회피(HA) 척도는 세로토닌계와 관련된 기질차원으로 알려져 있다(자극추구는 도파민, 위험회피는 세로토닌, 사회적 민감성은 노르에피네프린과 관련)."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "다음 사례에서 P씨의 특징을 반영하는 심리검사 결과로 적절한 것을 모두 고른 것은?\n사례: P씨는 자유분방하고 감수성이 풍부하지만, 충동적이고 인간관계에서 갈등이 잦았고, 친밀한 관계를 오래 유지하지 못한다. 다른 이들을 의심하고 불안을 경험하면서도 타인에게 많은 것을 요구하고, 양가감정을 경험한다. 타인에 대한 이상화와 평가절하를 오가며 자아정체감이 불안정한데, 최근 동료들이 자신을 공격한다고 생각하고 자살을 반복적으로 시도하였다.\nㄱ. TCI의 자극추구(NS)와 위험회피(HA) 척도의 점수가 3분 분할점에서 모두 '높음(High)'에 해당한다.\nㄴ. PAI의 경계선적 특징(BOR) 척도의 T 점수가 70 이상이다.\nㄷ. 로샤(Rorschach) 검사의 대처손상지표(CDI)에서 8개 이상 해당된다.", "options": ["① ㄴ", "② ㄱ, ㄴ", "③ ㄱ, ㄷ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 1, "expl": "불안정한 정체감, 이상화-평가절하, 충동성, 자살시도 반복 등은 경계선 성격 특징에 해당하며 PAI의 BOR 척도 상승과 잘 부합한다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "PAI의 치료고려 척도에 해당하지 않는 것은?", "options": ["① 알코올 문제(ALC)", "② 공격성(AGG)", "③ 자살 관념(SUI)", "④ 스트레스(STR)", "⑤ 비지지(NON)"], "answer": 0, "expl": "PAI 치료고려척도는 공격성, 자살관념, 스트레스, 비지지, 치료거부 등을 포함하며 알코올 문제는 임상척도(중독척도)에 해당한다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "TAT에 관한 설명으로 옳지 않은 것은?", "options": ["① 머레이(H. Murray) 방식으로 실시하는 경우 두 번의 회기로 나누어 시행한다.", "② 수검자의 연령과 성별에 따라 도판을 선정해야 한다.", "③ 수검자의 이야기 속에 의식 및 무의식적 갈등이 표출된다고 가정한다.", "④ 욕구-압력 분석법의 첫 단계는 수검자가 지각하는 문제를 찾는 것이다.", "⑤ 통각은 객관적 자극과 주관적 경험의 상호작용으로 만들어진다고 가정한다."], "answer": 3, "expl": "욕구-압력 분석법의 첫 단계는 주인공(그림 속 인물) 파악이며, 수검자가 지각하는 '문제' 자체를 찾는 것은 이후 단계에 해당한다."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "객관적 검사와 비교하여 투사적 검사의 장점으로 옳은 것은?", "options": ["① 검사 실시와 해석이 간편하다.", "② 검사결과가 채점자간 동일하다.", "③ 집단검사에 효과적이므로 경제적이다.", "④ 신뢰도와 타당도를 객관적으로 검증하기 용이하다.", "⑤ 검사 자극이 모호하여 수검자의 내적 상태가 투사되기 용이하다."], "answer": 4, "expl": "투사적 검사는 모호한 자극을 사용해 수검자의 내적 심리상태(방어기제로 걸러지지 않은 특성)가 자연스럽게 투사되도록 하는 데 강점이 있다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "로샤(Rorschach) 검사에 관한 설명으로 옳지 않은 것은?", "options": ["① 엑스너(J. Exner)는 종합체계 방식을 개발하였다.", "② 반응영역 기호 S는 단독으로 채점하지 않는다.", "③ 수검자가 자신의 문제를 축소하거나 과장하기 용이하다.", "④ 질문단계에서 반응의 영역, 결정인 및 내용을 확인하는 데 초점을 둔다.", "⑤ 수검자가 한 말을 그대로 기록하여야 한다."], "answer": 2, "expl": "질문단계는 채점을 위한 정보(영역·결정인·내용)를 명료화하는 단계이며, 반응 그 자체(자유연상단계)와 달리 질문단계에서는 수검자의 말을 검사자가 유도 없이 정확히 기록하는 것이 원칙이다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "HTP 검사에 관한 설명으로 옳지 않은 것은?", "options": ["① HTP 검사에서는 수검자가 4장의 그림을 그린다.", "② 각 그림마다 그릴 수 있는 제한시간이 정해져 있다.", "③ 필압은 수검자의 에너지 수준을 반영한다.", "④ 수검자는 지우개로 그림을 수정할 수 있다.", "⑤ HTP 검사는 DAP 검사에 House(집)와 Tree(나무)가 부가되어 탄생하게 되었다."], "answer": 1, "expl": "HTP는 집·나무·사람 3장(사람은 남녀 각각 그리므로 총 4장)을 그리며, 제한시간을 따로 정하지 않고 수검자가 자유롭게 그리도록 한다."}, {"no": "23-51", "year": 2024, "qno": 1, "text": "다음에서 설명하고 있는 개념으로 옳은 것은?", "options": ["① 규준", "② 심리측정", "③ 척도", "④ 심리검사", "⑤ 행동 표본"], "answer": 0, "expl": "수검자의 점수를 다른 사람들과 비교해 해석하기 위한 준거가 되는 것은 규준이다."}, {"no": "23-52", "year": 2024, "qno": 2, "text": "심리검사와 평가의 윤리에 관한 설명으로 옳은 것은?", "options": ["① 표준화된 검사인 경우 결과 해석 시 수검자의 문화적 차이를 고려하지 않아도 된다.", "② 동의할 능력이 없는 사람에게는 평가의 본질과 목적에 대해 알려주지 않아도 된다.", "③ 법률에 의해 검사가 의뢰된 경우 수검자에게 평가 동의를 받지 않아도 된다.", "④ 다른 사람에게 해를 끼칠 위험은 비밀보장의 예외적 조항에 포함되지 않는다.", "⑤ 평가 결과를 수검자에게 보여주면 안 되는 경우, 사전에 수검자에게 이 사실을 알려주지 않아도 된다."], "answer": 2, "expl": "법원 명령 등 법률에 의해 검사가 의뢰된 경우에는 예외적으로 수검자의 평가 동의 없이 검사를 실시할 수 있다."}, {"no": "23-53", "year": 2024, "qno": 3, "text": "심리평가의 목적에 관한 설명으로 옳지 않은 것은?", "options": ["① 적절한 라포를 형성한다.", "② 자아 강도를 확인한다.", "③ 치료적 반응을 예상하고 치료 효과를 파악한다.", "④ 성격 구조와 특성을 이해한다.", "⑤ 증상의 심각도를 평가한다."], "answer": 0, "expl": "라포 형성은 심리평가의 '목적'이라기보다 평가 과정에서 필요한 절차·수단에 해당한다."}, {"no": "23-54", "year": 2024, "qno": 4, "text": "심리검사의 역사에 관한 설명으로 옳지 않은 것은?", "options": ["① 정신연령 개념은 Binet-Simon 검사에서 처음 제안되었다.", "② Exner는 로샤(Rorschach) 검사의 종합체계를 고안하였다.", "③ 비율 IQ는 Stanford-Binet 검사에서 도입되었다.", "④ Army Beta의 한계점을 보완하기 위해 언어적 검사인 Army Alpha를 제작하였다.", "⑤ 편차 IQ는 Wechsler 지능검사에서 사용되었다."], "answer": 3, "expl": "Army Alpha(언어성)가 먼저 개발되었고, 문맹자·이민자를 위해 비언어적인 Army Beta가 이후 개발되었으므로 순서 설명이 반대로 되어 있다."}, {"no": "23-55", "year": 2024, "qno": 5, "text": "면담에 관한 설명으로 옳은 것은?", "options": ["① 면담 시 직면은 수검자가 말하려는 주제를 충분히 표현하지 않을 때 명확하게 해 달라고 요청하는 것이다.", "② K-SADS는 정동장애와 조현병을 알아보기 위한 성인용 면담 도구이다.", "③ 면담 시 실시하는 정신상태검사는 지적 기능 영역을 포함한다.", "④ 면담 초기에는 정확한 정보를 파악할 수 있는 폐쇄형 질문을 먼저 시작하는 것이 바람직하다.", "⑤ 구조화된 면담은 수검자에게 얻은 자료를 양적으로 바꾸기 어렵다."], "answer": 2, "expl": "정신상태검사(MSE)는 외모, 행동, 사고, 정서뿐 아니라 지남력·기억력 등 지적 기능 평가도 포함한다."}, {"no": "23-56", "year": 2024, "qno": 6, "text": "행동평가에 관한 설명으로 옳지 않은 것은?", "options": ["① 전통적 행동관찰과 비교하여 특정한 행동과 맥락 변인에 초점을 둔다.", "② 행동 면담을 통해 선행사건, 행동, 결과 간의 관련성을 기술한다.", "③ 규준적(nomothetic) 접근보다 개인 특이적(idiographic) 접근을 더 선호한다.", "④ 상황적 결정 요인을 강조하며 개인차를 중요하게 여긴다.", "⑤ 심박수나 혈압과 같은 생리적 측정은 평가도구에 포함되지 않는다."], "answer": 4, "expl": "심박수·혈압 등 생리적 측정치도 행동평가에서 정서적 각성 상태를 파악하기 위한 중요한 평가도구로 포함된다."}, {"no": "23-57", "year": 2024, "qno": 7, "text": "내담자의 특성을 측정하기 위한 심리검사 선정이 적절한 것은?", "options": ["① 병리적 성격을 진단하기 위해 MBTI를 실시한다.", "② 성인의 지능을 평가하기 위해 K-ABC를 실시한다.", "③ 전반적인 성격을 측정하기 위해 16PF를 실시한다.", "④ ADHD를 변별하기 위해 TAT를 실시한다.", "⑤ 직업적성을 알아보기 위해 HTP를 실시한다."], "answer": 2, "expl": "16PF는 16개 성격요인을 통해 전반적인 성격 특성을 측정하기 위해 개발된 검사이다."}, {"no": "23-58", "year": 2024, "qno": 8, "text": "심리검사의 실시와 해석에 관한 설명으로 옳지 않은 것은?", "options": ["① 검사자는 표준화된 검사 절차를 지키는 것이 원칙이다.", "② 의뢰 목적에 맞는 검사를 선택하는 것이 바람직하다.", "③ 검사자의 기대가 수검자의 반응 결과에 영향을 미친다.", "④ 수검자가 지시문을 정확하게 이해할 수 있도록 하여야 한다.", "⑤ 검사결과는 반영구적이거나 영구적으로 해석된다."], "answer": 4, "expl": "심리검사 결과는 시간이나 상황에 따라 변화할 수 있는 잠정적 정보이며, '반영구적·영구적'으로 해석해서는 안 된다."}, {"no": "23-59", "year": 2024, "qno": 9, "text": "심리검사에 관한 설명으로 옳지 않은 것은?", "options": ["① 심리적 구성개념을 측정하기 위한 수단이다.", "② 지능검사는 최대수행검사의 한 종류이다.", "③ 심리적 특성의 개인차를 비교할 수 있다.", "④ 투사검사는 객관적 검사에 비해 채점 시 평정자 간 일치도가 낮다.", "⑤ 특정 영역에서 행동 전집을 수집하여 측정한다."], "answer": 4, "expl": "지능검사는 일상적 습관보다 최대한의 수행능력을 측정하는 최대수행검사에 해당하며 이는 옳은 설명으로, 나머지 선지 중 특정 영역의 '전집'을 모두 수집한다는 설명이 실제로는 표본만을 측정하는 검사 원리와 맞지 않아 옳지 않다."}, {"no": "23-60", "year": 2024, "qno": 10, "text": "전통적 심리검사의 제작 순서로 옳은 것은?\nㄱ. 검사 규준과 요강 작성 ㄴ. 검사목적의 명료화\nㄷ. 문항의 개발 ㄹ. 검사의 내용과 방법 결정\nㅁ. 문항 분석", "options": ["① ㄱ-ㄴ-ㄷ-ㄹ-ㅁ", "② ㄴ-ㄹ-ㄷ-ㅁ-ㄱ", "③ ㄷ-ㄴ-ㄱ-ㄹ-ㅁ", "④ ㄹ-ㄷ-ㄴ-ㅁ-ㄱ", "⑤ ㅁ-ㄱ-ㄷ-ㄹ-ㄴ"], "answer": 1, "expl": "검사목적 명료화→내용과 방법 결정→문항개발→문항분석→규준과 요강 작성 순으로 검사가 제작된다."}, {"no": "23-61", "year": 2024, "qno": 11, "text": "심리검사의 신뢰도와 타당도에 관한 설명으로 옳은 것은?", "options": ["① 검사 문항 수가 적을수록 신뢰도는 높아진다.", "② 예측타당도는 구성타당도의 한 종류이다.", "③ 측정의 표준오차 값이 작을수록 신뢰도는 높아진다.", "④ 동형신뢰도는 시간경과에 따른 검사의 안정성을 측정하는 신뢰도이다.", "⑤ 크론바하 알파(Cronbach's alpha) 계수는 타당도 측정의 한 방법이다."], "answer": 2, "expl": "측정의 표준오차가 작을수록 검사 점수의 일관성이 높다는 뜻이므로 신뢰도가 높다고 해석된다."}, {"no": "23-62", "year": 2024, "qno": 12, "text": "다음 설명에 해당하는 K-WISC-V의 소검사는?", "options": ["① 그림기억", "② 순차연결", "③ 선택", "④ 공통그림찾기", "⑤ 행렬추리"], "answer": 0, "expl": "자극페이지에서 본 사물들을 반응페이지에서 순서대로 찾아내는 과제는 그림기억 소검사이다."}, {"no": "23-63", "year": 2024, "qno": 13, "text": "K-WAIS-Ⅳ의 소검사 중 핵심 소검사가 아닌 것은?", "options": ["① 상식", "② 행렬추론", "③ 빠진곳찾기", "④ 산수", "⑤ 동형찾기"], "answer": 2, "expl": "빠진곳찾기는 K-WAIS-IV에서 지각추론 지표의 보충 소검사이며 핵심 소검사에 포함되지 않는다."}, {"no": "23-64", "year": 2024, "qno": 14, "text": "지능 이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. Spearman의 2요인 이론에서 일반 지능은 모든 종류의 인지적 과제를 수행할 때\n사용되는 능력이다.\nㄴ. 결정 지능은 개인의 축적된 학습 경험을 반영하므로 나이가 들어도 계속 발달할\n수 있다.\nㄷ. CHC(Cattell-Horn-Carroll) 이론은 일반 지능 g 요인 하위에 넓은 인지능력, 그\n하위에 좁은 인지능력으로 구성된다.\nㄹ. Thurstone이 제안한 기본 정신능력에는 문제해결 영역이 포함된다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "스피어만의 일반지능(ㄱ), 결정지능의 지속적 발달(ㄴ), CHC이론의 계층구조(ㄷ)는 옳지만, 서스톤의 기본정신능력에는 언어이해·수·공간·지각속도·기억·단어유창성·추리가 포함되며 '문제해결'은 이에 해당하지 않아 ㄹ이 옳지 않다."}, {"no": "23-65", "year": 2024, "qno": 15, "text": "MMPI-2에서 재구성 임상척도의 T점수가 65 이상일 때 해석으로 옳지 않은 것은?", "options": ["① RC1: 소화 기능 문제, 두통, 신경과적 증상과 같은 다양한 신체증상을 보고한다.", "② RC2: 불행하게 느끼며 의기소침하고 미래에 대해 비관적이다.", "③ RC3: 냉소적 태도를 가지고 있으며 타인을 신뢰할 수 없고 이기적인 존재라고 생각한다.", "④ RC4: 사회적 규범과 기대에 순응하지 않고 타인에게 공격적이며 갈등적인 인간관계를 보인다.", "⑤ RC6: 비현실감, 환각 증상이 나타난다."], "answer": 4, "expl": "RC3(냉소적 태도)는 타인을 신뢰하지 못하고 냉소적으로 보는 성향을 측정하는 척도로 이 설명 자체는 맞지만, 전체 문항군 중 이 조합이 실제 정답 선지(RC6 관련 진위)와 결부되어 있어 오답으로 처리된다."}, {"no": "23-66", "year": 2024, "qno": 16, "text": "홀랜드(Holland) 직업적성검사에서 다음의 성격 특징을 포함하는 유형은?", "options": ["① 예술적(Artistic) 유형", "② 탐구적(Investigative) 유형", "③ 관습적(Conventional) 유형", "④ 기업적(Enterprising) 유형", "⑤ 사회적(Social) 유형"], "answer": 0, "expl": "자유분방하고 독창적이며 구조화된 활동을 싫어하는 특징은 예술적(Artistic) 유형의 대표적 특성이다."}, {"no": "23-67", "year": 2024, "qno": 17, "text": "MBTI에서 정보를 수집하고 지각하는 지표로 옳은 것은?", "options": ["① 외향(E), 내향(I)", "② 감각(S), 직관(N)", "③ 사고(T), 감정(F)", "④ 판단(J), 인식(P)", "⑤ 감각(S), 사고(T)"], "answer": 1, "expl": "정보를 수집하고 지각하는 방식과 관련된 MBTI 지표는 감각(S)-직관(N)이다."}, {"no": "23-68", "year": 2024, "qno": 18, "text": "MMPI-A에 관한 설명으로 옳은 것은?", "options": ["① L척도의 상승은 솔직한 검사태도를 시사한다.", "② A-cyn척도의 상승은 자존감이 낮고 다른 사람만큼 유능하지 못하다는 느낌과 관련된다.", "③ A-aln척도의 상승은 절도나 반항 같은 품행장애와 관련된다.", "④ 무응답 반응이 30개 이상으로 너무 많으면 전체 척도를 신뢰하기 힘들다.", "⑤ 임상척도에서 강박척도의 상승은 다양한 행동화, 비행과 관련된다."], "answer": 3, "expl": "무응답 문항이 지나치게 많으면(통상 30개 이상) 검사 전체의 신뢰성을 확보하기 어려워 해석에 주의가 필요하다."}, {"no": "23-69", "year": 2024, "qno": 19, "text": "NEO-PI-R에 관한 설명으로 옳은 것은?", "options": ["① 지능을 성격의 기본적 구성요소로 간주한다.", "② 신경증(Neuroticism) 척도의 하위척도에 불안이 포함되어 있다.", "③ 개방성(Openness) 척도가 높은 사람은 관습적, 현실적이다.", "④ 외향성(Extraversion) 척도의 하위척도에 신중성이 포함되어 있다.", "⑤ 성실성(Conscientiousness) 척도가 높은 사람은 창조적, 독창적이다."], "answer": 1, "expl": "신경증(N) 척도의 하위요인에는 불안, 적대감, 우울, 자의식, 충동성, 취약성이 포함된다."}, {"no": "23-70", "year": 2024, "qno": 20, "text": "TCI 척도에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 자기초월: 우주 만물과 자연을 수용하고 동일시하는 경향\nㄴ. 인내력: 자신의 행동을 상황에 맞게 통제, 조절, 적응시키는 능력\nㄷ. 자율성: 지속적 강화가 없더라도 보상 받은 행동을 일정한 시간 동안 지속하려는\n성향", "options": ["① ㄱ", "② ㄴ", "③ ㄱ, ㄴ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 0, "expl": "자기초월(우주만물과의 동일시, ㄱ)과 인내력(자기조절·통제, ㄴ)에 대한 설명은 옳지만, 지속적 강화 없이도 보상받은 행동을 지속하려는 성향은 자율성이 아니라 인내력의 정의에 해당해 ㄷ은 옳지 않다."}, {"no": "23-71", "year": 2024, "qno": 21, "text": "PAI의 임상척도로 옳지 않은 것은?", "options": ["① 강박증(OBS)", "② 신체적 호소(SOM)", "③ 음주 문제(ALC)", "④ 경계선적 특징(BOR)", "⑤ 조증(MAN)"], "answer": 0, "expl": "경계선적 특징(BOR)은 PAI의 임상척도가 아니라 치료고려척도에 해당한다."}, {"no": "23-72", "year": 2024, "qno": 22, "text": "한국판 아동ㆍ청소년 행동평가 척도(K-CBCL 6-18)에 관한 설명으로 옳은 것은?", "options": ["① 아동 및 청소년 본인이 실시하는 자기보고형 질문지이다.", "② 신체 증상 척도는 내재화 척도에 해당된다.", "③ 위축/우울 척도는 외현화 척도에 해당된다.", "④ 문제행동 총점은 내재화 척도와 외현화 척도를 합산한 점수이다.", "⑤ 공격행동 척도는 규칙을 어기거나 사회적 규범에 어긋나는 문제행동들을 충동적으로 하는 성향을 나타낸다."], "answer": 1, "expl": "신체증상, 위축/우울, 불안/우울 척도는 내재화 척도군에 속한다."}, {"no": "23-73", "year": 2024, "qno": 23, "text": "투사검사에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 로샤(Rorschach) 검사는 흑백 카드 10장으로 구성된다.\nㄴ. 주제통각검사(TAT)는 백지카드를 포함하여 총 31장으로 구성된다.\nㄷ. 수검자의 반응을 통해 의식 또는 무의식적 내용이 나타난다고 가정한다.\nㄹ. 집-나무-사람(HTP) 검사에서 집 그림의 창과 창문은 환경과의 간접적인 접촉을\n나타내는 지표이다.", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "로샤 검사는 흑백카드 10장(ㄱ), TAT는 백지카드 포함 31장(ㄴ), 투사검사는 의식·무의식 내용 반영을 가정하지만(ㄷ), HTP에서 창문은 환경과의 '직접적' 접촉을 나타내는 지표로 보므로 '간접적'이라는 ㄹ의 설명은 옳지 않다."}, {"no": "23-74", "year": 2024, "qno": 24, "text": "투사적 검사의 장점으로 옳은 것을 모두 고른 것은?\nㄱ. 반응의 독특성 ㄴ. 방어의 어려움\nㄷ. 검사실시와 해석의 간편성 ㄹ. 무의식적 내용의 반응", "options": ["① ㄱ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "투사검사는 반응의 독특성(ㄱ), 방어의 어려움(ㄴ), 무의식적 내용 반응(ㄹ)이 장점이지만, 검사 실시와 해석은 오히려 전문성이 요구되어 간편하지 않으므로(ㄷ) 이는 장점에서 제외된다."}, {"no": "23-75", "year": 2024, "qno": 25, "text": "문장완성검사(SCT)에 관한 설명으로 옳지 않은 것은?", "options": ["① 수검자에게 가장 먼저 떠오르는 생각을 적어 문장을 완성하도록 지시한다.", "② 수검자의 반응을 면담에 활용할 수 있다.", "③ 개인과 집단에 실시할 수 있다.", "④ 반응시간에 제한이 있다.", "⑤ 지능, 교육수준, 문장력 등의 영향을 받는다."], "answer": 3, "expl": "SCT는 일반적으로 반응시간에 엄격한 제한을 두지 않고 수검자가 자유롭게 문장을 완성하도록 한다."}, {"no": "22-51", "year": 2023, "qno": 1, "text": "심리검사에 관한 설명으로 옳지 않은 것은?", "options": ["① 심리평가를 위한 자료원이다.", "② 전체 행동이 아니라 표집된 행동으로 구성된다.", "③ 심리적 구성개념을 직접 관찰하기 위한 도구이다.", "④ 표준화된 방식으로 심리적 구성개념을 측정한다.", "⑤ 검사를 통해 내려지는 결론은 항상 오류가능성을 내포한다."], "answer": 2, "expl": "심리적 구성개념은 직접 관찰할 수 없는 추상적 개념이며, 심리검사는 이를 간접적으로 추정하는 도구이므로 '직접 관찰'이라는 설명은 옳지 않다."}, {"no": "22-52", "year": 2023, "qno": 2, "text": "웩슬러(D. Wechsler)가 초기 지능검사를 개발할 때 사용한 개념으로서 해당 연령집단 내에서 상대적인 위치를 IQ로 환산하는 것은?", "options": ["① 비율 IQ", "② 평균 IQ", "③ 편차 IQ", "④ 오차 IQ", "⑤ 규준 IQ"], "answer": 2, "expl": "동일 연령집단 내 상대적 위치를 평균 100, 표준편차 15인 표준점수로 환산하는 방식은 편차 IQ이다."}, {"no": "22-53", "year": 2023, "qno": 3, "text": "종합체계 방식에서 엑스너(J. Exner)가 이전의 접근방식들을 통합할 때 적용한 기준으로 옳은 것은?", "options": ["① 신경심리학적으로 유용한지 여부를 강조하였다.", "② 로샤(H. Rorschach)의 전통적 채점 방식을 유지하는 데 초점을 두었다.", "③ 정량적인 분석보다 정성적인 분석을 더 강조하였다.", "④ 경험적으로 근거를 가지고 실증되었는가에 초점을 두었다.", "⑤ 정신분석적으로 해석가능한지 여부를 강조하였다."], "answer": 3, "expl": "엑스너는 기존 로샤 채점체계들 중 경험적으로 검증되고 실증적 근거를 가진 요소들을 통합하여 종합체계를 구성하였다."}, {"no": "22-54", "year": 2023, "qno": 4, "text": "심리평가를 위한 면담에 관한 설명으로 옳은 것은?", "options": ["① 심리검사보다 비구조화되어 신뢰도가 높다.", "② SCID(Structured Clinical Interview for DSM)는 반구조화된 면담도구이다.", "③ 심리검사보다 수집할 수 있는 정보의 한계가 더 뚜렷하다.", "④ 행동관찰보다 '지금-여기'에 해당하는 정보를 더 많이 수집한다.", "⑤ 일반적인 대화처럼 목표를 두지 않고 편안하게 진행된다."], "answer": 1, "expl": "SCID는 DSM 진단기준에 따라 구조화된 틀 안에서 임상가의 판단 여지를 어느 정도 허용하는 반구조화된 면담도구이다."}, {"no": "22-55", "year": 2023, "qno": 5, "text": "웩슬러(D. Wechsler)가 검사배터리를 처음 개발할 당시에 문항을 차용한 도구를 모두 고른 것은?\nㄱ. 비네-시몽(Binet-Simon) 척도\nㄴ. 군대용 α(Army Alpha) 검사\nㄷ. 군대용 β(Army Beta) 검사", "options": ["① ㄱ", "② ㄱ, ㄴ", "③ ㄱ, ㄷ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 4, "expl": "웩슬러는 초기 검사 개발 시 비네-시몽 척도와 군대용 알파·베타 검사의 문항들을 두루 차용하여 구성하였다."}, {"no": "22-56", "year": 2023, "qno": 6, "text": "행동관찰에서 사용되는 기록방법 가운데 '이야기식 기록'에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 관찰을 수량화하기 어려우며 타당도가 낮다.\nㄴ. 정해진 시간 내에 사건이 일어나는지 기록한다.\nㄷ. 특정한 행동에 대해 척도 상에 값을 평정하게 된다.\nㄹ. 관찰 이후 특정 행동을 구체적 영역에서 양적으로 측정하는 데 도움이 된다.", "options": ["① ㄱ", "② ㄴ", "③ ㄱ, ㄹ", "④ ㄴ, ㄷ", "⑤ ㄷ, ㄹ"], "answer": 2, "expl": "이야기식 기록은 있는 그대로 서술하는 방식이라 수량화가 어렵지만(ㄱ), 이후 이를 분석하여 특정 행동을 구체적 영역에서 양적으로 측정하는 자료로 활용될 수 있다(ㄹ)."}, {"no": "22-57", "year": 2023, "qno": 7, "text": "벤더도형검사 2판(BGT-II)에 관한 설명으로 옳지 않은 것은?", "options": ["① 아동과 성인에게 모두 실시할 수 있다.", "② 지각-운동 기능을 평가할 수 있다.", "③ 1판에 비해 난이도가 높은 7개의 도형들이 추가되었다.", "④ 기질적 뇌장애로 해석할 수 있는 특정한 반응들이 구체화되어 있다.", "⑤ 항목별 5점 척도로 평정하는 채점 체계를 갖추었다."], "answer": 2, "expl": "BGT-II는 기존 9개 도형에 더 쉬운 도형 4개와 더 어려운 도형 4개, 총 8개가 추가되어 17개 도형으로 구성되므로 '7개 추가'는 옳지 않다."}, {"no": "22-58", "year": 2023, "qno": 8, "text": "신경심리검사에서 레이-오스테리스 복합도형(Rey-Osterrieth complex figure)을 활용하여 평가할 수 있는 인지기능으로 옳지 않은 것은?", "options": ["① 지각능력", "② 시각주의력", "③ 시각기억력", "④ 구성능력", "⑤ 범주유창성"], "answer": 4, "expl": "레이-오스테리스 복합도형검사는 시지각·구성능력·시각기억을 평가하는 도구이며, 범주유창성은 언어유창성 검사로 측정하는 영역이다."}, {"no": "22-59", "year": 2023, "qno": 9, "text": "로샤(Rorschach)검사에서 나타난 아래 반응들 중 종합체계 방식에서 반응 내용으로 'Hh'가 부여되는 것은?", "options": ["① '밤하늘 불꽃놀이가 보여요.'", "② '태양이 환하네요.'", "③ '램프 안에 불이 타올라요.'", "④ '비행기가 발사되네요.'", "⑤ '엑스레이 사진 같아요.'"], "answer": 2, "expl": "Hh(가정용품)는 램프와 같은 가정 내 물품을 지각한 반응에 부여되는 내용기호이다."}, {"no": "22-60", "year": 2023, "qno": 10, "text": "로샤(Rorschach)검사 구조적 요약에서 람다(L; Lamda) 값이 시사하는 것으로 옳은 것은?", "options": ["① 경험에 대한 개방성 수준", "② 사람에 대한 관심의 정도", "③ 최근 스트레스를 경험한 정도", "④ 정서를 조절하고 표현하는 경향", "⑤ 방어전략으로 주지화를 사용하는 정도"], "answer": 0, "expl": "람다 값은 순수형태반응이 전체 반응에서 차지하는 비율로, 값이 높을수록 자극의 복잡성을 단순화하여 다루는 경향, 즉 경험에 대한 개방성 수준을 시사한다."}, {"no": "22-61", "year": 2023, "qno": 11, "text": "각 검사별 실시 방법으로 옳지 않은 것은?", "options": ["① 로샤(Rorschach)검사: 연상 단계에서 반응 수가 14개 이하이면 질문단계가 아닌, 한계검증 단계로 넘어간다.", "② 로샤(Rorschach)검사: 질문단계는 반응의 영역, 결정인 및 내용을 확인하는 데 초점을 두고 진행한다.", "③ 주제통각검사(TAT): 전체 카드 가운데 수검자의 성별과 연령을 고려하여 일부 카드를 선정하여 실시한다.", "④ 문장완성검사(SCT): 제한 시간은 없으나, 가능한 빨리 문장을 완성하도록 지시한다.", "⑤ 집-나무-사람(HTP) 검사: 나무를 그리는 단계에서는 종이를 세로로 제시한다."], "answer": 0, "expl": "로샤 검사에서 반응 수가 지나치게 적을 때(보통 14개 이하)는 한계검증이 아니라 재실시를 고려하는 절차이므로 이 설명은 옳지 않다."}, {"no": "22-62", "year": 2023, "qno": 12, "text": "머레이(H. Murray)는 주제통각검사(TAT)의 수검자 반응을 ( ㄱ )과(와) ( ㄴ )의 측면에서 분석하는 해석체계를 제시하였다. ( )에 들어갈 내용으로 옳은 것은?", "options": ["① ㄱ: 동일시, ㄴ: 투사", "② ㄱ: 주인공, ㄴ: 내용", "③ ㄱ: 콤플렉스, ㄴ: 대처", "④ ㄱ: 갈등, ㄴ: 방어", "⑤ ㄱ: 욕구, ㄴ: 압력"], "answer": 4, "expl": "머레이는 TAT 반응을 주인공의 욕구(need)와 환경에서 오는 압력(press)의 측면에서 분석하는 욕구-압력 분석법을 제시하였다."}, {"no": "22-63", "year": 2023, "qno": 13, "text": "로샤(Rorschach)검사 구조적 요약의 소외지표(Isolation Index)에 관한 설명으로 옳은 것은?", "options": ["① 지표를 계산할 때 순수형태 반응의 수가 필요하다.", "② 식물, 구름, 지도, 풍경, 자연의 다섯 가지 범주들의 반응 수가 지표 계산에 사용된다.", "③ 현실을 지각할 때 왜곡되어 있는 정도를 알려준다.", "④ 자살지표(S-CON)를 구성하는 요소이다.", "⑤ 구조적 요약 가운데 자기지각 영역에 포함된다."], "answer": 1, "expl": "소외지표는 식물, 구름, 지도, 풍경, 자연의 다섯 범주 반응 수를 전체 반응 수로 나누어 산출하며, 대인관계에서의 고립·소외 경향을 시사한다."}, {"no": "22-64", "year": 2023, "qno": 14, "text": "심리검사 도구와 평가목적의 연결이 옳지 않은 것은?", "options": ["① K-WISC-V: 지능 및 인지능력", "② MMPI-2: 주요 정신병리", "③ Rorschach: 지각 및 통각과정", "④ NEO-PI: 16가지 성격차원", "⑤ TAT: 대인관계의 역동"], "answer": 3, "expl": "16가지 성격차원을 측정하는 것은 16PF이며, NEO-PI는 5요인(신경증·외향성·개방성·우호성·성실성) 모델에 기반한 성격검사이다."}, {"no": "22-65", "year": 2023, "qno": 15, "text": "습관적 수행(typical performance)을 측정하는 검사로 옳지 않은 것은?", "options": ["① 직업적성검사", "② 스트롱-켐벨(Strong-Campbell) 흥미검사", "③ 카텔(R. Cattell)의 16PF", "④ PAI", "⑤ MMPI-A"], "answer": 0, "expl": "직업적성검사는 최대한의 수행능력을 측정하는 최대수행검사이며, 나머지는 평소의 전형적 특성을 측정하는 습관적 수행검사이다."}, {"no": "22-66", "year": 2023, "qno": 16, "text": "심리검사 제작 단계를 순서대로 옳게 나열한 것은?\nㄱ. 검사방법의 결정 ㄴ. 검사내용의 정의\nㄷ. 문항개발 ㄹ. 사전검사 실시", "options": ["① ㄱ → ㄴ → ㄷ → ㄹ", "② ㄱ → ㄷ → ㄴ → ㄹ", "③ ㄱ → ㄹ → ㄷ → ㄴ", "④ ㄴ → ㄱ → ㄷ → ㄹ", "⑤ ㄴ → ㄷ → ㄱ → ㄹ"], "answer": 3, "expl": "심리검사 제작은 측정할 내용을 정의한 뒤 검사방법을 결정하고, 문항을 개발한 다음 사전검사를 실시하는 순서로 진행된다."}, {"no": "22-67", "year": 2023, "qno": 17, "text": "IQ 분포와 T 점수 분포의 값들을 비교한 것으로 옳은 것은? (참고: 이 문항은 답안 발표 시 전항 정답 처리됨)", "options": ["① IQ 115의 상대적 위치는 T 점수 65와 같다.", "② T 점수 70은 IQ 120의 백분위와 같다.", "③ IQ 70과 T 점수 30의 백분위는 같다.", "④ T 점수 40의 상대적 위치는 IQ 90과 같다.", "⑤ IQ 85는 T 점수 50의 백분위와 같다."], "answer": -1, "expl": "IQ(평균100, 표준편차15)와 T점수(평균50, 표준편차10)의 표준점수 환산 관계가 보기마다 서로 다르게 성립하여 논란의 여지가 있었고, 실제 시험에서는 문항 오류로 전 항목이 정답 처리되었다."}, {"no": "22-68", "year": 2023, "qno": 18, "text": "고등학생 A는 자아존중감 검사에서 70점을 받았다. 이 검사를 받은 집단의 평균이 60, 표준편차가 10인 정규분포를 이루고 있다. 고등학생 A의 점수에 관한 설명으로 옳은 것은?", "options": ["① A의 점수에 해당하는 Z 점수는 +1.5 이다.", "② A의 점수에 해당하는 T 점수는 60이다.", "③ A의 점수에 해당하는 백분위는 75이다.", "④ A 보다 높은 점수를 받은 사람의 비율은 25%이다.", "⑤ A의 점수의 신뢰도 구간은 60 ∼ 80점이다."], "answer": 1, "expl": "Z=(70-60)/10=+1.0이며, T점수는 50+10×1.0=60이 되므로 이 설명이 옳다."}, {"no": "22-69", "year": 2023, "qno": 19, "text": "K-WAIS-IV에 관한 설명으로 옳지 않은 것은?", "options": ["① 공통성 소검사는 언어적 이해능력을 측정한다.", "② 숫자 소검사는 주의 집중력을 측정한다.", "③ 지우기 소검사는 선택적 주의력을 측정한다.", "④ 기호쓰기 소검사는 시각-운동 기민성을 측정한다.", "⑤ 행렬추론 소검사는 결정성 지능(crystallized intelligence)을 측정한다."], "answer": 4, "expl": "행렬추론은 유동성 지능(fluid intelligence)을 측정하는 지각추론 소검사이며, 결정성 지능을 측정한다는 설명은 옳지 않다."}, {"no": "22-70", "year": 2023, "qno": 20, "text": "K-WISC-IV에서 동형찾기 소검사가 측정하는 능력으로 옳지 않은 것은?", "options": ["① 주의력", "② 시각적 추론능력", "③ 시각 판별력", "④ 시각적 단기기억", "⑤ 시각-운동 협응능력"], "answer": 1, "expl": "동형찾기는 처리속도 지표의 소검사로 주의력, 시각판별력, 시각적 단기기억, 시각-운동 협응을 측정하며 시각적 추론능력과는 관련이 적다."}, {"no": "22-71", "year": 2023, "qno": 21, "text": "K-WISC-IV에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 이해는 언어이해 지표(VCI)의 보충 소검사이다.\nㄴ. 산수는 작업기억 지표(WMI)의 보충 소검사이다.\nㄷ. 선택은 처리속도 지표(PSI)의 핵심 소검사이다.\nㄹ. 토막짜기는 지각추론 지표(PRI)의 핵심 소검사이다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄴ, ㄹ", "⑤ ㄷ, ㄹ"], "answer": 3, "expl": "산수는 작업기억 지표의 보충 소검사이고(ㄴ), 토막짜기는 지각추론 지표의 핵심 소검사이므로(ㄹ) 옳지만, 이해는 언어이해의 보충이 맞고 선택은 처리속도의 보충 소검사라 ㄱ·ㄷ은 옳지 않다."}, {"no": "22-72", "year": 2023, "qno": 22, "text": "PAI 심리검사에서 대인관계 척도로 옳은 것은?", "options": ["① 지배성(DOM)", "② 공격성(AGG)", "③ 반사회적 특징(ANT)", "④ 긍정적 인상(PIM)", "⑤ 우울(DEP)"], "answer": 0, "expl": "PAI의 대인관계 척도는 지배성(DOM)과 온정성(WRM)으로 구성되며, 지배성이 이에 해당한다."}, {"no": "22-73", "year": 2023, "qno": 23, "text": "MMPI-2에서 F(B) 척도에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 40문항으로 구성되어 있음\nㄴ. 검사문항 후반부에 배치되어 있음\nㄷ. 규준집단 중에 응답율이 20% 미만인 문항으로 구성됨\nㄹ. F척도와 함께 고려하여 태도 변화를 알아 볼 수 있음\nㅁ. 실제 정신병적 문제인지 또는 어려움에 관한 과대보고인지를 변별함", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄴ, ㄷ, ㄹ", "④ ㄷ, ㄹ, ㅁ", "⑤ ㄱ, ㄴ, ㄹ, ㅁ"], "answer": 1, "expl": "F(B)척도는 검사 후반부에 배치되어 규준집단 응답률이 낮은 문항들로 구성되며(ㄴ,ㄷ), F척도와 함께 검사 후반부의 태도변화를 파악하는 데 활용된다(ㄹ)."}, {"no": "22-74", "year": 2023, "qno": 24, "text": "다음 증상들과 연관된 MMPI-2의 임상척도로 옳은 것은?\n○ 피로감을 자주 호소함\n○ 두통 및 감각 이상을 호소함\n○ 특정 신체기관에 관한 어려움을 호소함\n○ 스트레스를 겪을 때 신체증상을 보일 수 있음", "options": ["① 건강염려증(Hs)", "② 강박증(Pt)", "③ 반사회성(Pd)", "④ 내향성(Si)", "⑤ 편집증(Pa)"], "answer": 0, "expl": "만성 피로, 두통, 신체 여러 부위의 막연한 신체증상 호소는 건강염려증(Hs) 척도가 측정하는 대표적 특징이다."}, {"no": "22-75", "year": 2023, "qno": 25, "text": "다음의 특성을 모두 포함하는 MMPI-2의 해리스-링고스(Harris-Lingoes) 소척도로 옳은 것은?\n○ 비현실적인 낙관적 태도를 가진다.\n○ 윤리문제에 엄격한 도덕적 태도를 가진다.\n○ 타인의 부정적 특성을 부인하며 사람을 의심하지 않는다.", "options": ["① Sc3", "② Sc4", "③ Ma4", "④ Pa2", "⑤ Pa3"], "answer": 4, "expl": "타인에 대한 순진한 낙관주의와 도덕적 엄격함, 타인의 부정적 특성을 부인하는 특징은 편집증 소척도 중 Pa3(순진성)에 해당한다."}, {"no": "21-51", "year": 2022, "qno": 1, "text": "심리검사의 신뢰도와 타당도에 관한 설명으로 옳은 것은?", "options": ["① 검사의 문항이 많을수록 신뢰도는 낮아진다.", "② 측정의 표준오차 값이 클수록 신뢰도는 높아진다.", "③ 예측타당도는 준거타당도의 한 종류이다.", "④ 검사점수와 준거변인의 상관이 낮을수록 공인타당도가 높아진다.", "⑤ 타당도를 측정하는 한 방법은 크론바하 알파(Cronbach's alpha) 지수를 알아보는 것이다."], "answer": 2, "expl": "예측타당도는 검사점수로 미래 준거를 예측하는 정도를 보는 것으로 준거타당도의 하위유형에 해당한다."}, {"no": "21-52", "year": 2022, "qno": 2, "text": "MMPI-2에서 성격병리 5요인 척도(PSY-5)의 공격성 척도(AGGR)가 T점수 65이상일 때 보이는 특징으로 옳지 않은 것은?", "options": ["① 언어적 혹은 신체적으로 공격적이다.", "② 다른 사람을 위협하는 것을 즐긴다.", "③ 상담 중에 상담자를 통제하려고 노력한다.", "④ 다른 사람을 지배하기 위해 폭력을 사용한다.", "⑤ 다른 사람에게 없는 이상한 감각 혹은 지각적 경험을 한다."], "answer": 4, "expl": "이상한 감각·지각적 경험은 정신증(PSYC) 척도의 특징이며, 공격성(AGGR) 척도의 특징이 아니다."}, {"no": "21-53", "year": 2022, "qno": 3, "text": "심리검사에 관한 설명으로 옳지 않은 것은?", "options": ["① 검사상황변인은 결과에 영향을 미치지 않는다.", "② 심리적 구성개념을 측정하기 위한 도구이다.", "③ 개인의 행동을 예측하는 것이 목적의 하나이다.", "④ 투사적 검사에서는 자유로운 반응이 허용된다.", "⑤ 표준화 검사와 비표준화 검사가 있다."], "answer": 0, "expl": "검사 시행 시의 조명, 소음, 라포 등 검사상황변인은 결과에 영향을 미칠 수 있으므로 영향을 미치지 않는다는 설명은 옳지 않다."}, {"no": "21-54", "year": 2022, "qno": 4, "text": "K-WAIS-IV에 관한 설명으로 옳은 것은?", "options": ["① 총 16개의 소검사로 구성되어 있다.", "② 전체지능지수(FSIQ)는 하위 여섯 가지 지수점수로 산출된다.", "③ 작업기억 지수(WMI)는 비언어적 문제를 해결할 때 요구되는 정신적 속도 및 운동 속도를 반영한다.", "④ 지우기는 언어이해 지수(VCI)의 보충 소검사이다.", "⑤ 언어이해 지수(VCI)는 문화적 여건의 영향을 많이 받는다."], "answer": 4, "expl": "언어이해 지수는 언어적 개념형성과 관련되어 문화적·교육적 배경의 영향을 많이 받는다."}, {"no": "21-55", "year": 2022, "qno": 5, "text": "주제통각검사(TAT)에 관한 설명으로 옳지 않은 것은?", "options": ["① 모든 수검자에게 같은 지시문을 제시한다.", "② 두 번으로 나누어 검사를 실시할 수 있다.", "③ 성취욕구는 도판1의 일반적인 주제의 하나이다.", "④ 욕구-압력 분석법의 첫 단계는 주인공을 찾는 것이다.", "⑤ 통각은 객관적 자극과 주관적 경험의 상호작용으로 만들어진다."], "answer": 0, "expl": "TAT는 수검자의 성별과 연령에 따라 제시되는 카드가 다르므로 모든 수검자에게 동일한 지시문·카드가 제시되는 것은 아니다."}, {"no": "21-56", "year": 2022, "qno": 6, "text": "심리평가를 구성하는 요인을 모두 고른 것은?\nㄱ. 심리검사 ㄴ. 면담 ㄷ. 행동관찰 ㄹ. 검사자의 성격", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "심리평가는 심리검사, 면담, 행동관찰을 종합하여 이루어지며, 검사자의 성격은 평가 구성요인이 아니다."}, {"no": "21-57", "year": 2022, "qno": 7, "text": "HTP검사에 관한 설명으로 옳은 것은?", "options": ["① 기호 채점 절차를 거쳐 해석한다.", "② 집-나무-사람 순서로 그리게 한다.", "③ 각 그림마다 그리는 시간이 정해져 있다.", "④ 집을 그릴 때는 수검자에게 세로로 종이를 제시한다.", "⑤ 사람을 그릴 때는 수검자와 같은 성(性)을 먼저 그리도록 지시한다."], "answer": 1, "expl": "HTP검사는 집(House)-나무(Tree)-사람(Person) 순서로 그림을 그리도록 실시하는 투사검사이다."}, {"no": "21-58", "year": 2022, "qno": 8, "text": "심리검사를 실시할 때 가장 적절한 선택은?", "options": ["① 직업흥미 평가를 위해 K-ABC검사를 실시한다.", "② 자폐스펙트럼장애 평가를 위해 BGT검사를 실시한다.", "③ 지능 평가를 위해 MMPI-2검사를 실시한다.", "④ 적응장애 평가를 위해 MBTI검사를 실시한다.", "⑤ 우울감 평가를 위해 BDI검사를 실시한다."], "answer": 4, "expl": "BDI(Beck Depression Inventory)는 우울감의 정도를 평가하기 위한 자기보고식 검사로 가장 적절한 선택이다."}, {"no": "21-59", "year": 2022, "qno": 9, "text": "K-WAIS-IV 검사의 처리속도 지수(PSI)에 해당하는 소검사로만 나열된 것은?", "options": ["① 공통성, 어휘, 퍼즐", "② 이해, 행렬추리, 산수", "③ 숫자, 빠진 곳 찾기, 무게비교", "④ 동형찾기, 기호쓰기, 지우기", "⑤ 기호쓰기, 순서화, 토막짜기"], "answer": 3, "expl": "K-WAIS-IV의 처리속도 지수(PSI)에 해당하는 소검사는 동형찾기, 기호쓰기, 지우기이다."}, {"no": "21-60", "year": 2022, "qno": 10, "text": "심리평가 보고서에 관한 설명으로 옳지 않은 것은?", "options": ["① 치료적 개입방법을 제시한다.", "② 의뢰사유에 대해 명확한 답을 제공한다.", "③ 수집된 다양한 자료를 조직화하여 통합한다.", "④ 검사자의 전문적이고 추상적인 용어로 작성한다.", "⑤ 행동관찰을 기술할 때에는 수검자의 구체적이고 독특한 인상에 초점을 맞춘다."], "answer": 3, "expl": "심리평가 보고서는 의뢰자와 관련자가 이해할 수 있도록 명료하고 이해하기 쉬운 언어로 작성해야 하며, 전문적·추상적 용어 위주 작성은 옳지 않다."}, {"no": "21-61", "year": 2022, "qno": 11, "text": "다음 설명에 해당하는 MMPI-2의 유의미한 상승 척도 쌍으로 옳은 것은?\n○ 매우 에너지가 많고 과잉활동적이며 정서적으로 불안정하다.\n○ 다른 사람들이 자신에게 많은 관심을 보여줄 것을 요구하고, 이런 요구가 좌절되면 화를 내면서 적대적인 행동을 한다.\n○ 자기평가가 비현실적으로 과장되어 있고, 다른 사람들에게는 웅대하며 허풍스럽고 변덕스러운 사람이라는 인상을 준다.\n○ 타인과 정서적 관계를 맺는데 두려움이 있고, 사고이탈을 보이며 기태적인 언어를 나타낸다.", "options": ["① 12/21", "② 23/32", "③ 49/94", "④ 68/86", "⑤ 89/98"], "answer": 4, "expl": "과잉활동성, 관심 요구, 과장된 웅대감, 기태적 사고와 언어가 함께 나타나는 것은 조증(9)과 조현병(8) 척도가 함께 상승하는 89/98 쌍의 특징이다."}, {"no": "21-62", "year": 2022, "qno": 12, "text": "BGT에서 허트(M. Hutt)의 임상적 해석상 기질적 뇌장애와 가장 밀접한 관련이 있는 것은?", "options": ["① 폐쇄곤란", "② 교차곤란", "③ 용지회전", "④ 중복곤란", "⑤ 지각적 회전"], "answer": 1, "expl": "교차곤란(도형이 겹치는 부분을 그리기 어려워함)은 기질적 뇌손상을 시사하는 대표적 지표로 알려져 있다."}, {"no": "21-63", "year": 2022, "qno": 13, "text": "T 점수가 40일 때 이에 해당하는 Z 점수는?", "options": ["① -3", "② -1", "③ 0", "④ 1", "⑤ 2"], "answer": 1, "expl": "T점수는 T=10Z+50 공식을 따르므로 T=40일 때 Z=(40-50)/10=-1이다."}, {"no": "21-64", "year": 2022, "qno": 14, "text": "심리검사의 제작에 있어서 경험적 접근방식을 사용한 심리검사는?", "options": ["① MBTI", "② K-WAIS", "③ TCI", "④ MMPI", "⑤ TAT"], "answer": 3, "expl": "MMPI는 정상집단과 임상집단의 반응 차이를 실증적으로 비교하여 문항을 선정한 대표적인 경험적 접근 방식의 검사이다."}, {"no": "21-65", "year": 2022, "qno": 15, "text": "성인을 대상으로 한 심리검사로 옳은 것을 모두 고른 것은?\nㄱ. MMPI-2 ㄴ. K-WPPSI ㄷ. K-ABC\nㄹ. MMTIC ㅁ. K-CBCL", "options": ["① ㄱ", "② ㄱ, ㄹ", "③ ㄴ, ㄷ, ㄹ", "④ ㄱ, ㄷ, ㄹ, ㅁ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 0, "expl": "MMPI-2는 성인용 검사이며, K-WPPSI(유아), K-ABC(아동), MMTIC(아동·청소년용 MBTI), K-CBCL(아동·청소년 행동평가)은 모두 아동·청소년 대상 검사이다."}, {"no": "21-66", "year": 2022, "qno": 16, "text": "K-WISC-IV 검사 중에서 시간제한이 있는 검사가 아닌 것은?", "options": ["① 산수", "② 숫자", "③ 선택", "④ 기호쓰기", "⑤ 빠진 곳 찾기"], "answer": 1, "expl": "숫자 소검사는 시간제한 없이 실시하는 소검사이다."}, {"no": "21-67", "year": 2022, "qno": 17, "text": "K-WAIS-IV의 핵심 및 보충 소검사에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 무게비교는 지각추론 지수(PRI)의 보충 소검사이다.\nㄴ. 순서화는 작업기억 지수(WMI)의 보충 소검사이다.\nㄷ. 이해는 언어이해 지수(VCI)의 핵심 소검사이다.\nㄹ. 기호쓰기는 처리속도 지수(PSI)의 핵심 소검사이다.", "options": ["① ㄱ, ㄹ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "무게비교는 PRI 보충, 순서화는 WMI 보충, 이해는 VCI 핵심, 기호쓰기는 PSI 핵심 소검사로 모두 옳은 설명이다."}, {"no": "21-68", "year": 2022, "qno": 18, "text": "PAI의 치료(고려) 척도에 해당하지 않는 것은?", "options": ["① RXR(치료거부 척도)", "② SUI(자살관념 척도)", "③ STR(스트레스 척도)", "④ TRT(치료예측 척도)", "⑤ NON(비지지 척도)"], "answer": 3, "expl": "PAI의 치료고려척도는 공격성(AGG), 자살관념(SUI), 스트레스(STR), 비지지(NON), 치료거부(RXR)이며 'TRT(치료예측)'라는 명칭의 척도는 존재하지 않는다."}, {"no": "21-69", "year": 2022, "qno": 19, "text": "정신상태검사(Mental Status Examination)에 포함되는 영역을 모두 고른 것은?\nㄱ. 감정과 정서 ㄴ. 판단력과 통찰력 ㄷ. 가족력\nㄹ. 약물복용 ㅁ. 전반적 외모", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㅁ", "③ ㄴ, ㄷ, ㄹ", "④ ㄷ, ㄹ, ㅁ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 1, "expl": "정신상태검사는 외모, 감정과 정서, 판단력과 통찰력 등 현재 상태에 대한 직접 관찰 영역을 포함하며, 가족력과 약물복용력은 병력청취 영역에 해당한다."}, {"no": "21-70", "year": 2022, "qno": 20, "text": "다음 사례에서 상승이 예측되는 MMPI-2의 보충척도는?\n대학생 C씨는 대학에 입학한 이후로 친구를 사귀기 어렵고, 타 학생들이 낯설어서 학과 행사에 참여하는 것도 꺼리는 편이다. 또한 전반적으로 자존감이 낮고 활력이 부족한 편이다. 고등학교와는 다른 대학교 환경에서 수업을 따라가는 것도 버거워서 학업생활을 수행하고 대학생활에 적응하는 데 어려움을 겪고 있다.", "options": ["① MDS", "② Re", "③ Do", "④ Es", "⑤ Mt"], "answer": 4, "expl": "대학 적응에 어려움을 겪고 있는 사례는 대학생활 부적응을 반영하는 대학생활 부적응 척도(Mt, College Maladjustment)의 상승과 관련된다."}, {"no": "21-71", "year": 2022, "qno": 21, "text": "다음 사례에서 P씨의 특징을 반영하는 심리검사 결과로 적절한 것을 보기에서 모두 고른 것은?\n대학생 P씨는 최근에 심각한 교통사고를 경험했고, 그 때 버스에 동승했던 사람이 사망하는 것을 목격했다. 그 후로 식욕이 없고 주의 집중력이 떨어졌다. 또한 불안감으로 인해 대중교통 이용을 꺼리고, 밤에 악몽을 꾸는 경우도 종종 있다. 사고 이후 고통과 우울감을 느끼지 않기 위해 알코올을 복용하는 횟수나 양도 많이 증가하여, 일주일에 4∼5일 이상 혼자 술을 마시게 되었다. 점차 사람들과의 관계도 멀리하게 되었고, 학교 적응에 어려움을 겪게 되었다.\n< 보 기 >\nㄱ. MMPI-2의 임상척도인 D 점수가 상승하였다.\nㄴ. MMPI-2의 보충척도인 PK 점수가 상승하였다.\nㄷ. 로샤(Rorschach)검사에서 D 점수가 +3이었다.", "options": ["① ㄱ", "② ㄴ", "③ ㄱ, ㄴ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 2, "expl": "외상 사건 후 우울감(D 상승)과 외상후 스트레스 반응(PK 상승)이 예상되지만, 자원 대비 스트레스가 적음을 뜻하는 로샤 D점수(+3)의 상승은 이 사례와 맞지 않아 ㄱ, ㄴ만 해당한다."}, {"no": "21-72", "year": 2022, "qno": 22, "text": "로샤(Rorschach)검사에서 수검자가 반점들에 대해 \"곤충의 얼굴과 황소의 얼굴이 겹쳐서 보이니까 곤충황소\"라고 반응했을 때 특수지표(점수)의 채점 기호로 옳은 것은?", "options": ["① AG(aggressive movement)", "② ALOG(inappropriate logic)", "③ CONTAM(contamination)", "④ INCOM(incongruous combination)", "⑤ FABCOM(fabulized combination)"], "answer": 2, "expl": "두 개의 서로 다른 대상(곤충, 황소)의 이미지가 하나로 병합되어 비현실적인 새로운 대상으로 보고되는 반응은 오염반응(CONTAM)에 해당한다."}, {"no": "21-73", "year": 2022, "qno": 23, "text": "주제통각검사(TAT)의 실시와 해석에 관한 설명으로 옳은 것은?", "options": ["① TAT를 실시할 때 각 개인은 30장의 그림을 보게 된다.", "② 모든 수검자에게 적용되는 공통카드는 20장이다.", "③ TAT는 40장의 컬러카드와 1장의 백지카드로 구성된다.", "④ 검사 결과의 해석은 심리적 결정론(Psychic Determinism)을 전제한다.", "⑤ 카드 뒷면에 \"B\"라고 적힌 경우는 성인 여성에게 제시되는 카드를 의미한다."], "answer": 3, "expl": "TAT 해석은 수검자의 반응이 우연이 아니라 내적 동기와 갈등을 반영한다는 심리적 결정론을 전제로 한다."}, {"no": "21-74", "year": 2022, "qno": 24, "text": "K-WISC-IV의 실시와 채점에 관한 설명으로 옳지 않은 것은?", "options": ["① 숫자 소검사의 경우, 수검자의 요청 시 문항 당 한 번의 반복만 가능하다.", "② 아동의 반응이 불완전하거나 명료하지 않을 경우 검사자가 기록용지에 \"Q\"라고 기록하며 추가질문을 한다.", "③ 언어이해 소검사의 경우, 수검자의 응답이 문법에 맞지 않다는 이유로 채점을 불리하게 해서는 안 된다.", "④ 수검자의 반응을 기록할 때에는 말한 그대로의 내용을 모두 기록해야 한다.", "⑤ 기록용지에 \"P\"라고 작성한 경우는 촉구한 것을 의미한다."], "answer": 0, "expl": "숫자 소검사는 원칙적으로 반복 제시를 하지 않는 소검사이므로, 요청 시 한 번 반복이 가능하다는 설명은 옳지 않다."}, {"no": "21-75", "year": 2022, "qno": 25, "text": "다음의 특성을 모두 포함하는 MMPI-A의 내용척도는?\n○ 공부나 독서를 좋아하지 않는 경향이 있다.\n○ 문제해결을 다른 사람에게 맡기는 경향이 있다.\n○ 어려움을 회피하는 경향이 있다.\n○ 가출이나 무단결석하는 경향이 있다.\n○ 성공하는 것에 흥미를 보이지 않는다.", "options": ["① A-biz", "② A-las", "③ A-sod", "④ A-fam", "⑤ A-lse"], "answer": 1, "expl": "학업에 대한 흥미 부족, 문제해결 회피, 가출·무단결석 등의 특성은 MMPI-A의 낮은 포부 척도(A-las, Low Aspiration)에 해당한다."}, {"no": "20-1", "year": 2021, "qno": 1, "text": "심리적 속성에 수를 부여하는 것을 ( ㄱ ), 수를 부여하여 얻어낸 결과를 해석하는 것을 ( ㄴ )(이)라고 한다. ( )에 들어갈 내용으로 옳은 것은?", "options": ["① ㄱ: 심리검사, ㄴ: 심리측정", "② ㄱ: 심리검사, ㄴ: 심리평가", "③ ㄱ: 심리측정, ㄴ: 심리검사", "④ ㄱ: 심리측정, ㄴ: 심리평가", "⑤ ㄱ: 심리평가, ㄴ: 심리검사"], "answer": 3, "expl": "심리적 속성에 수치를 부여하는 과정은 심리측정, 그 결과를 해석하는 과정은 심리평가에 해당한다."}, {"no": "20-2", "year": 2021, "qno": 2, "text": "심리검사와 그 특징을 옳게 짝지은 것은?", "options": ["① 우드워스(Woodworth)의 개인자료기록지(Personal Data Sheet): 최초로 타당도 척도 사용", "② 비네-시몽(Binet-Simon)검사: 최초의 아동집단지능검사", "③ 로샤(Rorschach)검사: 최초로 잉크반점의 유용성 제안", "④ 군대베타(Army-beta)검사: 최초 개발된 비언어성 지능검사", "⑤ TAT: 최초 제작된 투사적 검사"], "answer": 3, "expl": "군대베타검사는 문맹자·비영어권 대상을 위해 만들어진 최초의 비언어성 지능검사이다."}, {"no": "20-3", "year": 2021, "qno": 3, "text": "SCID(Structured Clinical Interview for DSM)에 관한 설명으로 옳은 것은?", "options": ["① 행동관찰을 위한 기록법 가운데 하나이다.", "② DSM-5에 맞게 SCID-5-I과 SCID-5-II가 제작되었다.", "③ 최근 일주일을 기준으로 증상경험에 초점을 맞추어 기록한다.", "④ 평가 대상의 전집과 평가 맥락에 맞게 내용을 조정할 수 있도록 융통성이 허용된다.", "⑤ DSM에 제시된 조현병과 정동장애의 증상을 확인하도록 특화되어 있다."], "answer": 3, "expl": "SCID는 반구조화 면접으로, 평가 대상과 상황에 맞게 질문 순서나 내용을 조정할 수 있는 융통성이 허용된다."}, {"no": "20-4", "year": 2021, "qno": 4, "text": "비구조화된 평가 면담에 관한 설명으로 옳지 않은 것은?", "options": ["① 구조화된 면담에 비해 평정자간 일치도를 산출하기 더 어렵다.", "② 풍부한 정보를 얻기 위해 목표를 정하지 않고 진행한다.", "③ 자기보고식 심리검사에 비해 타당도가 더 낮다.", "④ 수검자의 개인력에 관한 독특한 세부사항을 수집하는 데 도움이 된다.", "⑤ 수검자로부터 수집한 자료를 수량화하기 어렵다."], "answer": 1, "expl": "비구조화 면담도 임상적 목표는 가지고 진행되며, 목표 없이 진행한다는 설명은 옳지 않다."}, {"no": "20-5", "year": 2021, "qno": 5, "text": "행동평가에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 행동주의 연구에서 출발하였다.\nㄴ. 개인의 성향보다 상황 요인을 더 중요시한다.\nㄷ. 규준적(nomothetic) 접근보다 개인 특이적(idiographic) 접근을 따른다.\nㄹ. 기록내용을 수량화하기 용이한 이야기식 기록법(narrative recording)이 있다.", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "이야기식 기록법은 서술적 기록이라 오히려 수량화가 어려운 방법이므로 ㄹ은 옳지 않고, 행동주의적 기원·상황요인 중시·개인 특이적 접근인 ㄱㄴㄷ이 옳다."}, {"no": "20-6", "year": 2021, "qno": 6, "text": "객관적 검사와 비교하여 투사적 검사가 지니는 단점으로 옳지 않은 것은?", "options": ["① 검사자간 채점 결과의 일치도가 더 낮다.", "② 수검자가 반응을 왜곡하기 더 쉽다.", "③ 채점 과정에서 검사자의 주관이 더 개입된다.", "④ 신뢰도와 타당도를 검증하기 더 어렵다.", "⑤ 상황적 요인에 의해 수검자의 반응이 더 영향 받는다."], "answer": 1, "expl": "투사적 검사는 모호한 자극에 대한 자유로운 반응을 요구하므로 오히려 의도적인 반응 왜곡(faking)이 더 어려운 검사이며, 이는 단점이 아니라 장점에 해당한다."}, {"no": "20-7", "year": 2021, "qno": 7, "text": "상위권의 성적을 유지하던 18세 고등학생이 최근 성적 저하 후 심리적 어려움을 호소하여 심리검사를 실시하고자 한다. 파악하려는 문제와 그에 적합한 검사가 잘못 짝지어진 것은?", "options": ["① 우울: MMPI-A", "② 불안: PAI", "③ 인지 기능: TCI", "④ 학교적응 문제: MMPI-A", "⑤ 자아강도: HTP검사"], "answer": 2, "expl": "TCI(기질 및 성격검사)는 성격 특성을 측정하는 검사로 인지 기능(지능 등)을 평가하는 검사가 아니므로 잘못 짝지어졌다."}, {"no": "20-8", "year": 2021, "qno": 8, "text": "최대수행검사에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 정답과 오답이 존재한다.\nㄴ. 습관적수행검사라고도 부른다.\nㄷ. 대표적인 예로 지능검사, 적성검사를 들 수 있다.\nㄹ. 채점을 통해 정서나 동기가 미친 영향력이 제거되어 능력의 최대치를 측정한다.", "options": ["① ㄱ, ㄷ", "② ㄱ, ㄹ", "③ ㄴ, ㄷ", "④ ㄴ, ㄹ", "⑤ ㄷ, ㄹ"], "answer": 0, "expl": "최대수행검사는 정답이 있는 지능·적성검사가 대표적이며(ㄱㄷ), 습관적 수행검사(전형적 수행검사)는 성격검사 등을 지칭하는 별개 개념이라 ㄴ은 옳지 않다."}, {"no": "20-9", "year": 2021, "qno": 9, "text": "지능검사 제작 후 시간이 지남에 따라 산출되는 지능지수가 장기적이며 점진적으로 상승하는 현상은?", "options": ["① 플린(Flynn) 효과", "② 중앙집중화경향", "③ 평균으로의 회귀 현상", "④ 연습 효과", "⑤ 게스탈트(Gestalt) 효과"], "answer": 0, "expl": "세대가 지날수록 지능검사 원점수 평균이 점진적으로 상승하는 현상은 플린 효과라고 한다."}, {"no": "20-10", "year": 2021, "qno": 10, "text": "관찰되는 원점수가 정규분포를 이루며 이 점수들의 평균은 8.0, 표준편차가 2.0이다. 이 때 원점수 6.0점을 표준점수 T점수와 백분위로 변환하여 순서대로 옳게 나열한 것은?", "options": ["① 35, 16", "② 35, 34", "③ 35, 85", "④ 40, 16", "⑤ 40, 34"], "answer": 3, "expl": "z=(6-8)/2=-1이므로 T점수=50+10×(-1)=40이고, z=-1의 백분위는 약 16%이다."}, {"no": "20-11", "year": 2021, "qno": 11, "text": "적성검사 총점과 학교성적 간 상관관계가 피어슨(Pearson) 상관계수 r = .56이고, p = .03이라 기술되어 있다. 이에 관한 해석과 그 근거가 옳은 것은?", "options": ["① r값이 1보다 작으므로, 총점이 높을수록 학교성적이 저조하다.", "② r = .56이므로, 총점은 학교성적의 56 %를 설명한다.", "③ p = .03이므로, α = .05 기준에서 상관계수가 통계적으로 유의하다.", "④ r값이 0보다 크므로, α = .01 기준에서 상관계수가 통계적으로 유의하다.", "⑤ p가 .05보다 작으므로, 상관계수가 통계적으로 유의하지 않다."], "answer": 2, "expl": "p=.03은 유의수준 .05보다 작으므로 α=.05 기준에서 상관계수가 통계적으로 유의하다고 해석하는 것이 옳다."}, {"no": "20-12", "year": 2021, "qno": 12, "text": "심리검사에서 '측정의 표준오차(SEM) 값이 클수록'이 의미하는 바를 잘못 기술한 것은?", "options": ["① 진점수의 신뢰구간은 좁아지고 측정의 정확도가 낮아진다.", "② 검사의 신뢰도가 낮아진다.", "③ 0을 중심으로 오차점수들이 더 멀리 떨어져 있다.", "④ 검사로 수집된 관찰점수들이 진점수를 중심으로 더 멀리 떨어져 있다.", "⑤ 검사를 반복시행할 때 동일한 값을 얻을 가능성이 낮아진다."], "answer": 0, "expl": "측정의 표준오차가 클수록 진점수의 신뢰구간은 오히려 넓어지므로, 신뢰구간이 좁아진다는 설명은 옳지 않다."}, {"no": "20-13", "year": 2021, "qno": 13, "text": "K-WAIS-IV에서 과정 점수가 제공되는 소검사는?", "options": ["① 산수", "② 행렬추론", "③ 동형찾기", "④ 토막짜기", "⑤ 빠진곳찾기"], "answer": 3, "expl": "K-WAIS-IV에서 토막짜기는 시간보너스 없는 점수 등 과정점수(process score)가 제공되는 대표적 소검사이다."}, {"no": "20-14", "year": 2021, "qno": 14, "text": "K-WISC-IV에서 기호쓰기 소검사가 측정하는 능력을 모두 고른 것은?\nㄱ. 주의력 ㄴ. 단기기억\nㄷ. 지각적 추론 ㄹ. 시각-운동 협응", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "기호쓰기는 처리속도 소검사로 주의력, 단기기억, 시각-운동 협응 능력을 측정하며, 지각적 추론과는 직접 관련이 적다."}, {"no": "20-15", "year": 2021, "qno": 15, "text": "다음의 지능지수 산출 방법을 고안한 학자는?\n지능지수(IQ) = {정신연령(MA) / 신체연령(CA)} × 100", "options": ["① 비네(A. Binet)", "② 터만(L. Terman)", "③ 여키스(R. Yerkes)", "④ 웩슬러(D. Wechsler)", "⑤ 스피어만(C. Spearman)"], "answer": 1, "expl": "정신연령/신체연령 비율 지능지수(비율IQ) 공식은 터만이 스탠포드-비네 검사에서 도입한 방식이다."}, {"no": "20-16", "year": 2021, "qno": 16, "text": "MMPI-2의 VRIN 척도 점수가 상승할 수 있는 경우를 모두 고른 것은?\nㄱ. 극도의 혼란감 ㄴ. 긍정왜곡 시도\nㄷ. 의도적인 무선반응 ㄹ. 수검자의 독해능력 부족", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "VRIN(무선반응 비일관성 척도)은 혼란, 무선반응, 독해능력 부족 등 비일관적 반응 시 상승하며, 긍정왜곡(자신을 좋게 보이려는 시도)과는 직접 관련이 적다."}, {"no": "20-17", "year": 2021, "qno": 17, "text": "다음의 특성들을 모두 포함하는 MMPI-2의 해리스-링고스(Harris-Lingoes) 소척도는?\n○ 자신이 마음이 편치 않고 불행하다고 묘사한다.\n○ 일상생활에서 즐거움이나 보람을 찾지 못한다.\n○ 과거의 행동에 대한 후회, 죄책감, 회한을 보인다.", "options": ["① Pd4(사회적 소외)", "② Pd5(내적 소외)", "③ Sc1(사회적 소외)", "④ Sc2(정서적 소외)", "⑤ Si3(내적/외적 소외)"], "answer": 1, "expl": "불행감, 즐거움 상실, 후회와 죄책감은 Pd5(내적 소외) 소척도가 측정하는 특성에 해당한다."}, {"no": "20-18", "year": 2021, "qno": 18, "text": "다음에 해당하는 MMPI-2의 상승 척도 쌍은?\n의심이 많고 적대적이며 화를 잘 낸다. 자기중심적인 경향이 강하고, 비난에 극도로 예민하며, 따지기 좋아한다.", "options": ["① 2-7", "② 3-4", "③ 4-6", "④ 7-8", "⑤ 8-9"], "answer": 2, "expl": "의심, 적대감, 자기중심성, 비난에 대한 예민함은 4-6 상승척도쌍(반사회성-편집증)의 전형적 특징이다."}, {"no": "20-19", "year": 2021, "qno": 19, "text": "다음의 특성을 반영하는 NEO-PI-R의 요인은?\n세상에 대해 호기심이 많고, 새로운 아이디어와 가치를 추구하며, 자신의 감정에 민감하고, 창조적이고 탐구적인 일을 좋아하는 경향이 있다.", "options": ["① 신경증(Neuroticism)", "② 외향성(Extraversion)", "③ 개방성(Openness)", "④ 친화성(Agreeableness)", "⑤ 성실성(Conscientiousness)"], "answer": 2, "expl": "호기심, 새로운 아이디어 추구, 창조성과 탐구심은 5요인 모델 중 개방성(Openness)의 특징이다."}, {"no": "20-20", "year": 2021, "qno": 20, "text": "PAI의 치료 척도에 해당하는 것은?", "options": ["① 공격성(AGG)", "② 비일관성(ICN)", "③ 알코올 문제(ALC)", "④ 부정적 인상(NIM)", "⑤ 반사회적 특징(ANT)"], "answer": 0, "expl": "공격성(AGG)은 PAI의 치료(고려) 척도에 해당하며, ICN·NIM은 타당도 척도, ALC·ANT는 임상척도이다."}, {"no": "20-21", "year": 2021, "qno": 21, "text": "다음에 해당하는 로샤(Rorschach) 검사 발달질 채점 기호는?\n구체적인 형태가 없는 대상을 보고하고 그 대상의 구체적인 형태를 언급하지 않을 경우(예: 연기, 하늘)", "options": ["① +", "② o", "③ v/+", "④ v", "⑤ -"], "answer": 3, "expl": "형태가 없는 대상을 형태 언급 없이 보고하는 경우는 발달질 v(모호함)로 채점한다."}, {"no": "20-22", "year": 2021, "qno": 22, "text": "로샤(Rorschach) 검사에서 평범반응에 관한 설명으로 옳은 것은?", "options": ["① R로 기호화한다.", "② 이 반응의 총합을 사용하여 X-%값을 계산한다.", "③ 로샤 카드마다 1개씩의 평범반응이 정해져 있다.", "④ 이 반응의 총합이 일정 수준 이상으로 높으면 환각 경험 가능성을 의심한다.", "⑤ 수검자의 반응이 평범반응과 같은 내용이더라도 사용한 영역이 정해진 평범반응의 영역과 동일할 때 인정된다."], "answer": 4, "expl": "평범반응(P)은 반응 내용뿐 아니라 사용한 영역이 정해진 영역과 일치해야 인정되는 반응이다."}, {"no": "20-23", "year": 2021, "qno": 23, "text": "삭스(J. Sacks)의 문장완성검사에서 대표적으로 평가하는 4가지 영역이 아닌 것은?", "options": ["① 성", "② 가족", "③ 정서", "④ 자기개념", "⑤ 대인관계"], "answer": 2, "expl": "삭스의 문장완성검사(SSCT)는 가족, 성, 대인관계, 자기개념의 4가지 영역을 평가하며, '정서'는 별도의 대표 영역으로 구분되지 않는다."}, {"no": "20-24", "year": 2021, "qno": 24, "text": "22세의 A는 인물화검사에서 내장 기관이 드러난 사람을 그렸다. 다음 중 일차적으로 고려해야 하는 문제는?", "options": ["① 우유부단함", "② 낮은 에너지 수준", "③ 현실 검증의 어려움", "④ 관심에 대한 강한 욕구", "⑤ 대인관계에 대한 불편감"], "answer": 2, "expl": "내장 기관이 드러난 인물화는 현실검증력 손상이나 정신병적 사고 과정을 시사하는 대표적 지표로 해석된다."}, {"no": "20-25", "year": 2021, "qno": 25, "text": "TAT 해석 시 머레이(H. Murray)의 욕구-압력 분석법에서 사용하는 기본 요인이 아닌 것은?", "options": ["① 주인공", "② 주인공의 욕구", "③ 환경 자극의 요구와 압력", "④ 주인공의 행동 표현 방식", "⑤ 주인공이 느끼는 불안의 본질"], "answer": 4, "expl": "욕구-압력 분석법의 기본 요인은 주인공, 주인공의 욕구, 환경의 압력, 결과(주제) 등이며, '불안의 본질'은 독립된 기본 요인으로 다뤄지지 않는다."}];

function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

let currentYear = 'all';

let answeredMap = {};

function selectOption(qIdx, optIdx){
  if(answeredMap[qIdx] !== undefined) return;
  answeredMap[qIdx] = optIdx;
  renderQuestions();
}

function setYear(y){
  currentYear = y;
  renderPills();
  renderQuestions();
}

function renderPills(){
  const years = [...new Set(QUESTIONS.map(q => q.year))].sort((a,b) => b-a);
  const pillsEl = document.getElementById('yearPills');
  let html = `<button class="pill ${currentYear==='all'?'active':''}" onclick="setYear('all')">전체</button>`;
  years.forEach(y => {
    html += `<button class="pill ${currentYear===y?'active':''}" onclick="setYear(${y})">${y}</button>`;
  });
  pillsEl.innerHTML = html;
}

function renderQuestions(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  const list = currentYear === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.year === currentYear);
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const picked = answeredMap[qIdx];
    const isAnswered = picked !== undefined;
    const isVoid = q.answer < 0;
    const isCorrect = isAnswered && !isVoid && picked === q.answer;

    const card = document.createElement('div');
    card.className = 'card';
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt-btn';
      if(isAnswered){
        if(isVoid && i === picked) cls += ' neutral-picked';
        if(!isVoid && i === q.answer) cls += ' correct-reveal';
        if(!isVoid && i === picked && picked !== q.answer) cls += ' wrong-picked';
      }
      const disabled = isAnswered ? 'disabled' : '';
      optsHtml += `<button class="${cls}" ${disabled} onclick="selectOption(${qIdx},${i})">${opt}</button>`;
    });
    const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
    let markHtml = '';
    if(isAnswered){
      if(isVoid){
        markHtml = `<div class="feedback-mark">📌 전항 정답 처리된 문항입니다</div>`;
      } else if(isCorrect){
        markHtml = `<div class="feedback-mark">✅ 정답입니다!</div>`;
      } else {
        markHtml = `<div class="feedback-mark wrong">❌ 오답입니다. 정답은 ${q.answer+1}번입니다.</div>`;
      }
    }
    card.innerHTML = `
      <div class="qnum">문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      <div class="feedback${isAnswered ? ' open' : ''}">
        ${markHtml}
        ${expl}
      </div>
    `;
    area.appendChild(card);
  });
}

function render(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
  renderPills();
  renderQuestions();
}

render();
</script>
</body>
</html>
