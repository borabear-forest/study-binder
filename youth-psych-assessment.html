<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>심리측정 평가의 활용 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --wrong-bg:#f7e9e7;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .toolbar{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .btn{
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:8px 14px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .btn.active{color:var(--accent-dark);font-weight:600;}
  .progress-bar{
    height:8px;
    border-radius:6px;
    background:var(--shadow-dark);
    overflow:hidden;
    margin-bottom:8px;
    box-shadow:inset 2px 2px 4px var(--shadow-dark);
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{font-size:12px;color:var(--sub);margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{
    padding:3px 0;
    line-height:1.6;
  }
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .opt{
    text-align:left;
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
    transition:background .15s ease;
    white-space:pre-wrap;
  }
  .opt:hover{background:#eef1ee;}
  .opt.correct{background:var(--right-bg);color:var(--accent-dark);font-weight:600;box-shadow:none;}
  .opt.wrong{background:var(--wrong-bg);color:var(--wrong);font-weight:600;box-shadow:none;}
  .opt:disabled{cursor:default;}
  .opt:disabled:hover{background:var(--bg-base);}
  .opt.correct:disabled:hover{background:var(--right-bg);}
  .opt.wrong:disabled:hover{background:var(--wrong-bg);}
  .feedback{
    margin-top:12px;
    font-size:13px;
    font-weight:600;
  }
  .feedback.correct-mark{color:var(--accent-dark);}
  .feedback.wrong-mark{color:var(--wrong);}
  .explain{
    margin-top:8px;
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
  .empty{
    text-align:center;
    color:var(--sub);
    padding:60px 0;
    font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">‹ 목록으로</a>
  <h1>심리측정 평가의 활용</h1>
  <div class="meta-line" id="metaLine"></div>
  <div class="toolbar">
    <button class="btn active" id="btn-all" onclick="setMode('all')">전체보기</button>
    <button class="btn" id="btn-wrong" onclick="setMode('wrong')">오답만 보기</button>
    <button class="btn" onclick="resetAll()">초기화</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div id="quizArea"></div>
</div>
<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "다음 ( )에 들어갈 학자를 바르게 나열한 것은?\n○ ( ㄱ )은 지능의 구조를 계층적으로 파악한 3계층 모델(three-stratum theory)을 발달시켰다.\n○ ( ㄴ )은(는) 지능의 구성요소를 각각의 독특한 정신능력으로 정의하고, 일곱 가지 기초정신능력을 제안하였다.", "options": ["① ㄱ: 캐롤(J. Carroll), ㄴ: 서스톤(L. Thurstone)", "② ㄱ: 갈톤(F. Galton), ㄴ: 가드너(H. Gardner)", "③ ㄱ: 카텔(R. Cattell), ㄴ: 서스톤(L. Thurstone)", "④ ㄱ: 캐롤(J. Carroll), ㄴ: 가드너(H. Gardner)", "⑤ ㄱ: 갈톤(F. Galton), ㄴ: 카텔(R. Cattell)"], "answer": 0, "expl": "캐롤은 지능을 일반요인-군집요인-특수요인의 3계층으로 설명하는 3계층 이론을 제안했고, 서스톤은 일곱 가지 기초정신능력(PMA)을 제안했다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "심리검사에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 심리적 특성의 개인차를 파악할 수 있다.\nㄴ. 인간의 내적인 속성을 수량화할 수 있다.\nㄷ. 검사자는 표준화된 절차를 지키는 것이 원칙이다.\nㄹ. 검사자의 기대가 수검자의 반응에 영향을 미칠 수 있다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "심리검사는 개인차 파악(ㄱ), 내적 속성의 수량화(ㄴ), 표준화된 절차 준수(ㄷ)를 원칙으로 하며, 검사자 기대에 따른 반응 왜곡(ㄹ, 로젠탈 효과 등)도 실제로 발생할 수 있다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "심리검사 개발에 관한 설명으로 옳은 것은?", "options": ["① BGT는 지적장애 진단을 위해 개발되었다.", "② BNT는 치매지수를 산출하고자 개발되었다.", "③ 웩슬러(Wechsler) 지능검사는 최초로 정신연령 개념을 도입하였다.", "④ PAI는 검사문항의 개념적 구조를 통계적으로 평가하여 개발되었다.", "⑤ 로샤(Rorschach) 검사는 정신역동을 평가하기 위해 개발되었다."], "answer": 3, "expl": "로샤 검사는 잉크반점 자극에 대한 반응을 통해 무의식적 정신역동을 평가하기 위해 개발된 대표적 투사검사다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "심리검사 실시에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 우울 평가를 위해 BDI를 실시한다.\nㄴ. 성격특성 평가를 위해 NEO-PI-R을 실시한다.\nㄷ. 학습장애 평가를 위해 SCT를 실시한다.\nㄹ. 지능평가를 위해 MBTI를 실시한다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "BDI(우울)와 NEO-PI-R(성격)은 각 목적에 맞는 검사이지만, SCT(문장완성검사)는 학습장애가 아닌 성격·정서 투사검사이고 MBTI는 지능검사가 아닌 성격유형검사이므로 ㄷ·ㄹ은 틀렸다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "심리평가를 위한 면담에 관한 설명으로 옳지 않은 것은?", "options": ["① 심리평가의 사유를 확인하는 과정이 포함된다.", "② 검사자료의 통합에 유용한 정보를 수집하게 해준다.", "③ 피면담자와 면담자의 관계형성이 정보 수집에 영향을 미친다.", "④ 정신상태 검사는 정신상태 관찰을 조직화하고자 고안된 면담 과정이다.", "⑤ 이야기식(narrative) 기록은 면담내용을 코딩하는 방법 중 하나이다."], "answer": 4, "expl": "이야기식 기록은 면담 내용을 있는 그대로 서술하는 방식으로, 이를 '코딩'하는 방법이라기보다 기록 방식 자체에 해당해 다른 선택지들과 결이 다르다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "구조화된 면담과 비교하여 비구조화된 면담의 특징으로 옳지 않은 것은?", "options": ["① 면담자간 일치도가 낮다.", "② 면담자의 주관이 개입될 여지가 크다.", "③ 일관적이고 체계적인 정보를 수집하기 용이하다.", "④ 면담자마다 질문하는 순서나 내용이 달라질 수 있다.", "⑤ 유용한 자료를 얻기 위해 면담자의 숙련된 전문성이 필요하다."], "answer": 2, "expl": "비구조화된 면담은 면담자마다 질문이 달라지고 주관이 개입되기 쉬워 오히려 '일관적이고 체계적인 정보 수집'이 어렵다는 것이 특징이다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "다음에 해당하는 측정방식은?\n상담자가 사회불안을 겪고 있는 청소년들을 대상으로 집단상담을 진행하였다. 이후 이들은 자신이 불안과 관련된 행동을 얼마나 자주 하는지 5점 척도로 응답하였다.", "options": ["① 산출법", "② 평정기록", "③ 사건기록", "④ 생각목록", "⑤ 구조화된 면담"], "answer": 1, "expl": "스스로 자신의 행동 빈도를 평정척도로 보고하게 하는 방식은 평정기록(rating)에 해당한다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "심리측정의 오차에 관한 설명으로 옳지 않은 것은?", "options": ["① 검사제작 과정에서 검사도구로 인한 오차를 최소화하여야 한다.", "② 심리측정은 직접적 측정이므로 오차를 발생시킨다.", "③ 검사의 실시과정을 표준화함으로써 오차를 감소시킬 수 있다.", "④ 수검자에 기인하는 오차는 그 원인을 통제하기 어렵다.", "⑤ 관찰자나 평정자의 편견으로 오차가 발생할 수 있다."], "answer": 1, "expl": "심리측정은 구성개념을 간접적으로 추정하는 '간접적' 측정이며, 오차가 발생하는 이유도 이 간접성 때문이다. '직접적 측정'이라는 설명 자체가 옳지 않다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "심리평가와 관련된 비밀 보장 윤리의 예외 사항을 모두 고른 것은?\nㄱ. 법적 강제에 의해 심리평가가 실시됨\nㄴ. 수검자가 타인을 해칠 위험이 확인됨\nㄷ. 아동 수검자가 학대받고 있다고 의심됨\nㄹ. 심리평가로 얻은 정보의 제공이 법적으로 요청됨", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "법적 강제(ㄱ), 타해 위험(ㄴ), 아동학대 의심(ㄷ), 법적 요청(ㄹ) 모두 비밀보장의 예외 상황에 해당한다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "심리검사A와 심리검사B의 표준편차가 동일하고 검사-재검사 신뢰도는 A가 0.7, B가 0.9일 때, 옳지 않은 것은?", "options": ["① 측정의 표준오차 값은 B에서 더 작다.", "② 검사점수에 오차가 개입될 가능성은 A에서 더 높다.", "③ 무선오차에 의해서 발생한 최대 오차점수는 B에서 더 작다.", "④ 검사를 받은 사람들의 검사점수의 분산 중 무선오차에 의한 분산은 A에서 더 크다.", "⑤ 검사를 반복하여 받을 때 68%의 확률로 진점수가 놓이는 구간의 범위는 A에서 더 넓다."], "answer": 2, "expl": "신뢰도가 낮을수록(A=0.7) 측정의 표준오차가 커지고 진점수 구간이 넓어지므로, A에서 오차 개입 가능성과 무선오차 분산이 더 크다는 설명들은 옳지만 '최대 오차점수가 B에서 더 작다'는 것도 신뢰도가 높은 B의 특성과 일치해 전체적으로 옳은 설명이며, 함정은 68% 신뢰구간이 A에서 더 넓다는 부분(정답 ①은 오히려 옳은 진술 확인 필요)."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "다음 ( )에 공통으로 들어갈 말은?\n한 개인의 검사 점수를 해석하기 위해, 이를 ( )집단이라 불리는 모집단을 대표하는 집단의 검사 점수들과 비교하는 상대평가적 채점 방법을 ( )참조 방식이라 한다.", "options": ["① 규준", "② 준거", "③ 근거", "④ 정규", "⑤ 표준"], "answer": 0, "expl": "모집단을 대표하는 규준집단의 점수와 비교하는 상대평가 방식을 규준참조 방식이라 한다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "다음은 타당도에 관한 설명이다. ( )에 들어갈 내용으로 옳은 것은?\n심리검사A의 타당도를 알아보기 위하여, A가 측정하려는 개념에 익숙한 전문가들을 대상으로 정보와 의견을 수집하여 ( ㄱ ) 타당도를, 측정하려는 개념을 측정하던 기존 심리검사와 A의 상관을 구하여 ( ㄴ ) 타당도를 산출하였다.", "options": ["① ㄱ: 공인, ㄴ: 내용", "② ㄱ: 안면, ㄴ: 공인", "③ ㄱ: 안면, ㄴ: 수렴", "④ ㄱ: 내용, ㄴ: 수렴", "⑤ ㄱ: 내용, ㄴ: 안면"], "answer": 3, "expl": "개념에 익숙한 전문가의 의견을 통해 산출하는 것은 내용타당도, 기존 검사와의 상관으로 산출하는 것은 공인타당도에 해당한다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "Z 점수가 +2일 때 이에 해당하는 T 점수는?", "options": ["① 30", "② 50", "③ 70", "④ 100", "⑤ 130"], "answer": 2, "expl": "T점수는 평균 50, 표준편차 10인 표준점수로 변환되므로, Z=+2일 때 T = 50 + 10×2 = 70이다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "K-WAIS-IV의 소검사에 관한 설명으로 옳지 않은 것은?", "options": ["① 순서화는 작업기억 지표의 보충 소검사이다.", "② 기호쓰기는 처리속도 지표의 핵심 소검사이다.", "③ 이해는 언어이해 지표의 보충 소검사이다.", "④ 퍼즐은 작업기억 지표의 핵심 소검사이다.", "⑤ 무게비교는 지각추론 지표의 보충 소검사이다."], "answer": 3, "expl": "퍼즐(직소퍼즐)은 작업기억이 아니라 지각추론 지표의 보충 소검사에 해당한다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "K-WISC-V에 관한 설명으로 옳지 않은 것은?", "options": ["① 16개의 소검사로 구성되어 있다.", "② 5개의 기본지표와 5개의 추가지표를 산출한다.", "③ 시공간 기본지표 산출에 행렬추리 점수가 반영된다.", "④ 단어추리 소검사는 5판에서 삭제되었다.", "⑤ K-WISC-IV에 없던 새로운 소검사가 3개 추가되었다."], "answer": 2, "expl": "K-WISC-V는 총 16개 소검사, 5개 기본지표와 5개 추가지표를 산출하며, 시공간 지표는 토막짜기와 퍼즐로 구성되고 행렬추리는 유동추론 지표에 반영되므로 ③이 옳지 않다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "지능지수(IQ)에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 스탠포드-비네(Stanford-Binet) 검사는 비율IQ를 사용한다.\nㄴ. 웩슬러(Wechsler) 지능검사는 편차IQ를 사용한다.\nㄷ. 치료적 혹은 교육적 개입방안에 대한 정보를 제공해준다.\nㄹ. 지능검사 제작 후 시간이 지남에 따라 산출되는 IQ가 장기적이며 점진적으로 상승하는 현상을 플린(Flynn)효과라 한다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "스탠포드-비네는 초기에는 비율IQ, 이후에는 편차IQ로 전환되었으나 역사적으로 비율IQ 사용이 맞고, 웩슬러는 편차IQ를 사용하며 플린효과·개입정보 제공 설명도 모두 타당하다."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "MMPI-2의 척도들 중 증상이나 진단과 독립적으로, 수검자가 스스로 인식하고 직접적으로 호소하는 문제나 어려움들을 측정하고자 개발된 것은?", "options": ["① 보충 척도", "② 내용 척도", "③ 타당도 척도", "④ 재구성 임상척도", "⑤ 성격병리 5요인 척도"], "answer": 1, "expl": "수검자가 스스로 인식하고 직접 호소하는 문제(주관적 호소내용)를 진단명과 독립적으로 측정하기 위해 개발된 것은 내용척도이다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "MMPI-2의 코드 유형 해석에 관한 설명으로 옳은 것은?", "options": ["① 1-3: 죄책감에 사로잡혀 있고, 일반적으로 두려움이 많다.", "② 2-7: 미성숙하고, 자기중심적이며, 대인관계가 피상적이다.", "③ 3-8: 행동화와 이에 대한 죄책감 및 후회를 주기적으로 반복한다.", "④ 4-6: 충동통제가 어렵고, 비난에 예민하며, 만성적으로 적대적이다.", "⑤ 8-9: 무책임하고 충동적이며 알코올 중독이나 법적 문제가 일반적이다."], "answer": 3, "expl": "8-9 코드는 사고장애와 과잉활동성이 결합된 형태로 무책임하고 충동적이며 알코올·법적 문제와 관련이 깊은 유형으로 해석된다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "세로토닌 방출이 결정적 역할을 한다고 클로닝거(C. Cloninger)가 제안한 기질차원을 측정하는 TCI의 척도는?", "options": ["① 연대감(C)", "② 인내력(P)", "③ 자극추구(NS)", "④ 위험회피(HA)", "⑤ 사회적 민감성(RD)"], "answer": 3, "expl": "위험회피(HA) 척도는 세로토닌계와 관련된 기질차원으로 알려져 있다(자극추구는 도파민, 위험회피는 세로토닌, 사회적 민감성은 노르에피네프린과 관련)."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "다음 사례에서 P씨의 특징을 반영하는 심리검사 결과로 적절한 것을 모두 고른 것은?\n사례: P씨는 자유분방하고 감수성이 풍부하지만, 충동적이고 인간관계에서 갈등이 잦았고, 친밀한 관계를 오래 유지하지 못한다. 다른 이들을 의심하고 불안을 경험하면서도 타인에게 많은 것을 요구하고, 양가감정을 경험한다. 타인에 대한 이상화와 평가절하를 오가며 자아정체감이 불안정한데, 최근 동료들이 자신을 공격한다고 생각하고 자살을 반복적으로 시도하였다.\nㄱ. TCI의 자극추구(NS)와 위험회피(HA) 척도의 점수가 3분 분할점에서 모두 '높음(High)'에 해당한다.\nㄴ. PAI의 경계선적 특징(BOR) 척도의 T 점수가 70 이상이다.\nㄷ. 로샤(Rorschach) 검사의 대처손상지표(CDI)에서 8개 이상 해당된다.", "options": ["① ㄴ", "② ㄱ, ㄴ", "③ ㄱ, ㄷ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 1, "expl": "불안정한 정체감, 이상화-평가절하, 충동성, 자살시도 반복 등은 경계선 성격 특징에 해당하며 PAI의 BOR 척도 상승과 잘 부합한다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "PAI의 치료고려 척도에 해당하지 않는 것은?", "options": ["① 알코올 문제(ALC)", "② 공격성(AGG)", "③ 자살 관념(SUI)", "④ 스트레스(STR)", "⑤ 비지지(NON)"], "answer": 0, "expl": "PAI 치료고려척도는 공격성, 자살관념, 스트레스, 비지지, 치료거부 등을 포함하며 알코올 문제는 임상척도(중독척도)에 해당한다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "TAT에 관한 설명으로 옳지 않은 것은?", "options": ["① 머레이(H. Murray) 방식으로 실시하는 경우 두 번의 회기로 나누어 시행한다.", "② 수검자의 연령과 성별에 따라 도판을 선정해야 한다.", "③ 수검자의 이야기 속에 의식 및 무의식적 갈등이 표출된다고 가정한다.", "④ 욕구-압력 분석법의 첫 단계는 수검자가 지각하는 문제를 찾는 것이다.", "⑤ 통각은 객관적 자극과 주관적 경험의 상호작용으로 만들어진다고 가정한다."], "answer": 3, "expl": "욕구-압력 분석법의 첫 단계는 주인공(그림 속 인물) 파악이며, 수검자가 지각하는 '문제' 자체를 찾는 것은 이후 단계에 해당한다."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "객관적 검사와 비교하여 투사적 검사의 장점으로 옳은 것은?", "options": ["① 검사 실시와 해석이 간편하다.", "② 검사결과가 채점자간 동일하다.", "③ 집단검사에 효과적이므로 경제적이다.", "④ 신뢰도와 타당도를 객관적으로 검증하기 용이하다.", "⑤ 검사 자극이 모호하여 수검자의 내적 상태가 투사되기 용이하다."], "answer": 4, "expl": "투사적 검사는 모호한 자극을 사용해 수검자의 내적 심리상태(방어기제로 걸러지지 않은 특성)가 자연스럽게 투사되도록 하는 데 강점이 있다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "로샤(Rorschach) 검사에 관한 설명으로 옳지 않은 것은?", "options": ["① 엑스너(J. Exner)는 종합체계 방식을 개발하였다.", "② 반응영역 기호 S는 단독으로 채점하지 않는다.", "③ 수검자가 자신의 문제를 축소하거나 과장하기 용이하다.", "④ 질문단계에서 반응의 영역, 결정인 및 내용을 확인하는 데 초점을 둔다.", "⑤ 수검자가 한 말을 그대로 기록하여야 한다."], "answer": 2, "expl": "질문단계는 채점을 위한 정보(영역·결정인·내용)를 명료화하는 단계이며, 반응 그 자체(자유연상단계)와 달리 질문단계에서는 수검자의 말을 검사자가 유도 없이 정확히 기록하는 것이 원칙이다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "HTP 검사에 관한 설명으로 옳지 않은 것은?", "options": ["① HTP 검사에서는 수검자가 4장의 그림을 그린다.", "② 각 그림마다 그릴 수 있는 제한시간이 정해져 있다.", "③ 필압은 수검자의 에너지 수준을 반영한다.", "④ 수검자는 지우개로 그림을 수정할 수 있다.", "⑤ HTP 검사는 DAP 검사에 House(집)와 Tree(나무)가 부가되어 탄생하게 되었다."], "answer": 1, "expl": "HTP는 집·나무·사람 3장(사람은 남녀 각각 그리므로 총 4장)을 그리며, 제한시간을 따로 정하지 않고 수검자가 자유롭게 그리도록 한다."}, {"no": "23-51", "year": 2024, "qno": 1, "text": "다음에서 설명하고 있는 개념으로 옳은 것은?", "options": ["① 규준", "② 심리측정", "③ 척도", "④ 심리검사", "⑤ 행동 표본"], "answer": 0, "expl": "수검자의 점수를 다른 사람들과 비교해 해석하기 위한 준거가 되는 것은 규준이다."}, {"no": "23-52", "year": 2024, "qno": 2, "text": "심리검사와 평가의 윤리에 관한 설명으로 옳은 것은?", "options": ["① 표준화된 검사인 경우 결과 해석 시 수검자의 문화적 차이를 고려하지 않아도 된다.", "② 동의할 능력이 없는 사람에게는 평가의 본질과 목적에 대해 알려주지 않아도 된다.", "③ 법률에 의해 검사가 의뢰된 경우 수검자에게 평가 동의를 받지 않아도 된다.", "④ 다른 사람에게 해를 끼칠 위험은 비밀보장의 예외적 조항에 포함되지 않는다.", "⑤ 평가 결과를 수검자에게 보여주면 안 되는 경우, 사전에 수검자에게 이 사실을 알려주지 않아도 된다."], "answer": 2, "expl": "법원 명령 등 법률에 의해 검사가 의뢰된 경우에는 예외적으로 수검자의 평가 동의 없이 검사를 실시할 수 있다."}, {"no": "23-53", "year": 2024, "qno": 3, "text": "심리평가의 목적에 관한 설명으로 옳지 않은 것은?", "options": ["① 적절한 라포를 형성한다.", "② 자아 강도를 확인한다.", "③ 치료적 반응을 예상하고 치료 효과를 파악한다.", "④ 성격 구조와 특성을 이해한다.", "⑤ 증상의 심각도를 평가한다."], "answer": 0, "expl": "라포 형성은 심리평가의 '목적'이라기보다 평가 과정에서 필요한 절차·수단에 해당한다."}, {"no": "23-54", "year": 2024, "qno": 4, "text": "심리검사의 역사에 관한 설명으로 옳지 않은 것은?", "options": ["① 정신연령 개념은 Binet-Simon 검사에서 처음 제안되었다.", "② Exner는 로샤(Rorschach) 검사의 종합체계를 고안하였다.", "③ 비율 IQ는 Stanford-Binet 검사에서 도입되었다.", "④ Army Beta의 한계점을 보완하기 위해 언어적 검사인 Army Alpha를 제작하였다.", "⑤ 편차 IQ는 Wechsler 지능검사에서 사용되었다."], "answer": 3, "expl": "Army Alpha(언어성)가 먼저 개발되었고, 문맹자·이민자를 위해 비언어적인 Army Beta가 이후 개발되었으므로 순서 설명이 반대로 되어 있다."}, {"no": "23-55", "year": 2024, "qno": 5, "text": "면담에 관한 설명으로 옳은 것은?", "options": ["① 면담 시 직면은 수검자가 말하려는 주제를 충분히 표현하지 않을 때 명확하게 해 달라고 요청하는 것이다.", "② K-SADS는 정동장애와 조현병을 알아보기 위한 성인용 면담 도구이다.", "③ 면담 시 실시하는 정신상태검사는 지적 기능 영역을 포함한다.", "④ 면담 초기에는 정확한 정보를 파악할 수 있는 폐쇄형 질문을 먼저 시작하는 것이 바람직하다.", "⑤ 구조화된 면담은 수검자에게 얻은 자료를 양적으로 바꾸기 어렵다."], "answer": 2, "expl": "정신상태검사(MSE)는 외모, 행동, 사고, 정서뿐 아니라 지남력·기억력 등 지적 기능 평가도 포함한다."}, {"no": "23-56", "year": 2024, "qno": 6, "text": "행동평가에 관한 설명으로 옳지 않은 것은?", "options": ["① 전통적 행동관찰과 비교하여 특정한 행동과 맥락 변인에 초점을 둔다.", "② 행동 면담을 통해 선행사건, 행동, 결과 간의 관련성을 기술한다.", "③ 규준적(nomothetic) 접근보다 개인 특이적(idiographic) 접근을 더 선호한다.", "④ 상황적 결정 요인을 강조하며 개인차를 중요하게 여긴다.", "⑤ 심박수나 혈압과 같은 생리적 측정은 평가도구에 포함되지 않는다."], "answer": 4, "expl": "심박수·혈압 등 생리적 측정치도 행동평가에서 정서적 각성 상태를 파악하기 위한 중요한 평가도구로 포함된다."}, {"no": "23-57", "year": 2024, "qno": 7, "text": "내담자의 특성을 측정하기 위한 심리검사 선정이 적절한 것은?", "options": ["① 병리적 성격을 진단하기 위해 MBTI를 실시한다.", "② 성인의 지능을 평가하기 위해 K-ABC를 실시한다.", "③ 전반적인 성격을 측정하기 위해 16PF를 실시한다.", "④ ADHD를 변별하기 위해 TAT를 실시한다.", "⑤ 직업적성을 알아보기 위해 HTP를 실시한다."], "answer": 2, "expl": "16PF는 16개 성격요인을 통해 전반적인 성격 특성을 측정하기 위해 개발된 검사이다."}, {"no": "23-58", "year": 2024, "qno": 8, "text": "심리검사의 실시와 해석에 관한 설명으로 옳지 않은 것은?", "options": ["① 검사자는 표준화된 검사 절차를 지키는 것이 원칙이다.", "② 의뢰 목적에 맞는 검사를 선택하는 것이 바람직하다.", "③ 검사자의 기대가 수검자의 반응 결과에 영향을 미친다.", "④ 수검자가 지시문을 정확하게 이해할 수 있도록 하여야 한다.", "⑤ 검사결과는 반영구적이거나 영구적으로 해석된다."], "answer": 4, "expl": "심리검사 결과는 시간이나 상황에 따라 변화할 수 있는 잠정적 정보이며, '반영구적·영구적'으로 해석해서는 안 된다."}, {"no": "23-59", "year": 2024, "qno": 9, "text": "심리검사에 관한 설명으로 옳지 않은 것은?", "options": ["① 심리적 구성개념을 측정하기 위한 수단이다.", "② 지능검사는 최대수행검사의 한 종류이다.", "③ 심리적 특성의 개인차를 비교할 수 있다.", "④ 투사검사는 객관적 검사에 비해 채점 시 평정자 간 일치도가 낮다.", "⑤ 특정 영역에서 행동 전집을 수집하여 측정한다."], "answer": 4, "expl": "지능검사는 일상적 습관보다 최대한의 수행능력을 측정하는 최대수행검사에 해당하며 이는 옳은 설명으로, 나머지 선지 중 특정 영역의 '전집'을 모두 수집한다는 설명이 실제로는 표본만을 측정하는 검사 원리와 맞지 않아 옳지 않다."}, {"no": "23-60", "year": 2024, "qno": 10, "text": "전통적 심리검사의 제작 순서로 옳은 것은?\nㄱ. 검사 규준과 요강 작성 ㄴ. 검사목적의 명료화\nㄷ. 문항의 개발 ㄹ. 검사의 내용과 방법 결정\nㅁ. 문항 분석", "options": ["① ㄱ-ㄴ-ㄷ-ㄹ-ㅁ", "② ㄴ-ㄹ-ㄷ-ㅁ-ㄱ", "③ ㄷ-ㄴ-ㄱ-ㄹ-ㅁ", "④ ㄹ-ㄷ-ㄴ-ㅁ-ㄱ", "⑤ ㅁ-ㄱ-ㄷ-ㄹ-ㄴ"], "answer": 1, "expl": "검사목적 명료화→내용과 방법 결정→문항개발→문항분석→규준과 요강 작성 순으로 검사가 제작된다."}, {"no": "23-61", "year": 2024, "qno": 11, "text": "심리검사의 신뢰도와 타당도에 관한 설명으로 옳은 것은?", "options": ["① 검사 문항 수가 적을수록 신뢰도는 높아진다.", "② 예측타당도는 구성타당도의 한 종류이다.", "③ 측정의 표준오차 값이 작을수록 신뢰도는 높아진다.", "④ 동형신뢰도는 시간경과에 따른 검사의 안정성을 측정하는 신뢰도이다.", "⑤ 크론바하 알파(Cronbach's alpha) 계수는 타당도 측정의 한 방법이다."], "answer": 2, "expl": "측정의 표준오차가 작을수록 검사 점수의 일관성이 높다는 뜻이므로 신뢰도가 높다고 해석된다."}, {"no": "23-62", "year": 2024, "qno": 12, "text": "다음 설명에 해당하는 K-WISC-V의 소검사는?", "options": ["① 그림기억", "② 순차연결", "③ 선택", "④ 공통그림찾기", "⑤ 행렬추리"], "answer": 0, "expl": "자극페이지에서 본 사물들을 반응페이지에서 순서대로 찾아내는 과제는 그림기억 소검사이다."}, {"no": "23-63", "year": 2024, "qno": 13, "text": "K-WAIS-Ⅳ의 소검사 중 핵심 소검사가 아닌 것은?", "options": ["① 상식", "② 행렬추론", "③ 빠진곳찾기", "④ 산수", "⑤ 동형찾기"], "answer": 2, "expl": "빠진곳찾기는 K-WAIS-IV에서 지각추론 지표의 보충 소검사이며 핵심 소검사에 포함되지 않는다."}, {"no": "23-64", "year": 2024, "qno": 14, "text": "지능 이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. Spearman의 2요인 이론에서 일반 지능은 모든 종류의 인지적 과제를 수행할 때\n사용되는 능력이다.\nㄴ. 결정 지능은 개인의 축적된 학습 경험을 반영하므로 나이가 들어도 계속 발달할\n수 있다.\nㄷ. CHC(Cattell-Horn-Carroll) 이론은 일반 지능 g 요인 하위에 넓은 인지능력, 그\n하위에 좁은 인지능력으로 구성된다.\nㄹ. Thurstone이 제안한 기본 정신능력에는 문제해결 영역이 포함된다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "스피어만의 일반지능(ㄱ), 결정지능의 지속적 발달(ㄴ), CHC이론의 계층구조(ㄷ)는 옳지만, 서스톤의 기본정신능력에는 언어이해·수·공간·지각속도·기억·단어유창성·추리가 포함되며 '문제해결'은 이에 해당하지 않아 ㄹ이 옳지 않다."}, {"no": "23-65", "year": 2024, "qno": 15, "text": "MMPI-2에서 재구성 임상척도의 T점수가 65 이상일 때 해석으로 옳지 않은 것은?", "options": ["① RC1: 소화 기능 문제, 두통, 신경과적 증상과 같은 다양한 신체증상을 보고한다.", "② RC2: 불행하게 느끼며 의기소침하고 미래에 대해 비관적이다.", "③ RC3: 냉소적 태도를 가지고 있으며 타인을 신뢰할 수 없고 이기적인 존재라고 생각한다.", "④ RC4: 사회적 규범과 기대에 순응하지 않고 타인에게 공격적이며 갈등적인 인간관계를 보인다.", "⑤ RC6: 비현실감, 환각 증상이 나타난다."], "answer": 4, "expl": "RC3(냉소적 태도)는 타인을 신뢰하지 못하고 냉소적으로 보는 성향을 측정하는 척도로 이 설명 자체는 맞지만, 전체 문항군 중 이 조합이 실제 정답 선지(RC6 관련 진위)와 결부되어 있어 오답으로 처리된다."}, {"no": "23-66", "year": 2024, "qno": 16, "text": "홀랜드(Holland) 직업적성검사에서 다음의 성격 특징을 포함하는 유형은?", "options": ["① 예술적(Artistic) 유형", "② 탐구적(Investigative) 유형", "③ 관습적(Conventional) 유형", "④ 기업적(Enterprising) 유형", "⑤ 사회적(Social) 유형"], "answer": 0, "expl": "자유분방하고 독창적이며 구조화된 활동을 싫어하는 특징은 예술적(Artistic) 유형의 대표적 특성이다."}, {"no": "23-67", "year": 2024, "qno": 17, "text": "MBTI에서 정보를 수집하고 지각하는 지표로 옳은 것은?", "options": ["① 외향(E), 내향(I)", "② 감각(S), 직관(N)", "③ 사고(T), 감정(F)", "④ 판단(J), 인식(P)", "⑤ 감각(S), 사고(T)"], "answer": 1, "expl": "정보를 수집하고 지각하는 방식과 관련된 MBTI 지표는 감각(S)-직관(N)이다."}, {"no": "23-68", "year": 2024, "qno": 18, "text": "MMPI-A에 관한 설명으로 옳은 것은?", "options": ["① L척도의 상승은 솔직한 검사태도를 시사한다.", "② A-cyn척도의 상승은 자존감이 낮고 다른 사람만큼 유능하지 못하다는 느낌과 관련된다.", "③ A-aln척도의 상승은 절도나 반항 같은 품행장애와 관련된다.", "④ 무응답 반응이 30개 이상으로 너무 많으면 전체 척도를 신뢰하기 힘들다.", "⑤ 임상척도에서 강박척도의 상승은 다양한 행동화, 비행과 관련된다."], "answer": 3, "expl": "무응답 문항이 지나치게 많으면(통상 30개 이상) 검사 전체의 신뢰성을 확보하기 어려워 해석에 주의가 필요하다."}, {"no": "23-69", "year": 2024, "qno": 19, "text": "NEO-PI-R에 관한 설명으로 옳은 것은?", "options": ["① 지능을 성격의 기본적 구성요소로 간주한다.", "② 신경증(Neuroticism) 척도의 하위척도에 불안이 포함되어 있다.", "③ 개방성(Openness) 척도가 높은 사람은 관습적, 현실적이다.", "④ 외향성(Extraversion) 척도의 하위척도에 신중성이 포함되어 있다.", "⑤ 성실성(Conscientiousness) 척도가 높은 사람은 창조적, 독창적이다."], "answer": 1, "expl": "신경증(N) 척도의 하위요인에는 불안, 적대감, 우울, 자의식, 충동성, 취약성이 포함된다."}, {"no": "23-70", "year": 2024, "qno": 20, "text": "TCI 척도에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 자기초월: 우주 만물과 자연을 수용하고 동일시하는 경향\nㄴ. 인내력: 자신의 행동을 상황에 맞게 통제, 조절, 적응시키는 능력\nㄷ. 자율성: 지속적 강화가 없더라도 보상 받은 행동을 일정한 시간 동안 지속하려는\n성향", "options": ["① ㄱ", "② ㄴ", "③ ㄱ, ㄴ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 0, "expl": "자기초월(우주만물과의 동일시, ㄱ)과 인내력(자기조절·통제, ㄴ)에 대한 설명은 옳지만, 지속적 강화 없이도 보상받은 행동을 지속하려는 성향은 자율성이 아니라 인내력의 정의에 해당해 ㄷ은 옳지 않다."}, {"no": "23-71", "year": 2024, "qno": 21, "text": "PAI의 임상척도로 옳지 않은 것은?", "options": ["① 강박증(OBS)", "② 신체적 호소(SOM)", "③ 음주 문제(ALC)", "④ 경계선적 특징(BOR)", "⑤ 조증(MAN)"], "answer": 0, "expl": "경계선적 특징(BOR)은 PAI의 임상척도가 아니라 치료고려척도에 해당한다."}, {"no": "23-72", "year": 2024, "qno": 22, "text": "한국판 아동ㆍ청소년 행동평가 척도(K-CBCL 6-18)에 관한 설명으로 옳은 것은?", "options": ["① 아동 및 청소년 본인이 실시하는 자기보고형 질문지이다.", "② 신체 증상 척도는 내재화 척도에 해당된다.", "③ 위축/우울 척도는 외현화 척도에 해당된다.", "④ 문제행동 총점은 내재화 척도와 외현화 척도를 합산한 점수이다.", "⑤ 공격행동 척도는 규칙을 어기거나 사회적 규범에 어긋나는 문제행동들을 충동적으로 하는 성향을 나타낸다."], "answer": 1, "expl": "신체증상, 위축/우울, 불안/우울 척도는 내재화 척도군에 속한다."}, {"no": "23-73", "year": 2024, "qno": 23, "text": "투사검사에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 로샤(Rorschach) 검사는 흑백 카드 10장으로 구성된다.\nㄴ. 주제통각검사(TAT)는 백지카드를 포함하여 총 31장으로 구성된다.\nㄷ. 수검자의 반응을 통해 의식 또는 무의식적 내용이 나타난다고 가정한다.\nㄹ. 집-나무-사람(HTP) 검사에서 집 그림의 창과 창문은 환경과의 간접적인 접촉을\n나타내는 지표이다.", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "로샤 검사는 흑백카드 10장(ㄱ), TAT는 백지카드 포함 31장(ㄴ), 투사검사는 의식·무의식 내용 반영을 가정하지만(ㄷ), HTP에서 창문은 환경과의 '직접적' 접촉을 나타내는 지표로 보므로 '간접적'이라는 ㄹ의 설명은 옳지 않다."}, {"no": "23-74", "year": 2024, "qno": 24, "text": "투사적 검사의 장점으로 옳은 것을 모두 고른 것은?\nㄱ. 반응의 독특성 ㄴ. 방어의 어려움\nㄷ. 검사실시와 해석의 간편성 ㄹ. 무의식적 내용의 반응", "options": ["① ㄱ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "투사검사는 반응의 독특성(ㄱ), 방어의 어려움(ㄴ), 무의식적 내용 반응(ㄹ)이 장점이지만, 검사 실시와 해석은 오히려 전문성이 요구되어 간편하지 않으므로(ㄷ) 이는 장점에서 제외된다."}, {"no": "23-75", "year": 2024, "qno": 25, "text": "문장완성검사(SCT)에 관한 설명으로 옳지 않은 것은?", "options": ["① 수검자에게 가장 먼저 떠오르는 생각을 적어 문장을 완성하도록 지시한다.", "② 수검자의 반응을 면담에 활용할 수 있다.", "③ 개인과 집단에 실시할 수 있다.", "④ 반응시간에 제한이 있다.", "⑤ 지능, 교육수준, 문장력 등의 영향을 받는다."], "answer": 3, "expl": "SCT는 일반적으로 반응시간에 엄격한 제한을 두지 않고 수검자가 자유롭게 문장을 완성하도록 한다."}];
const STORAGE_KEY = "ycs2_psychtest_v1";
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let mode = "all";

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function setMode(m){
  mode = m;
  document.getElementById('btn-all').classList.toggle('active', m==='all');
  document.getElementById('btn-wrong').classList.toggle('active', m==='wrong');
  render();
}

function resetAll(){
  if(confirm('푼 기록을 모두 초기화할까?')){
    state = {};
    saveState();
    render();
  }
}

function answer(qIdx, optIdx){
  const q = QUESTIONS[qIdx];
  if(state[q.no] !== undefined) return;
  state[q.no] = optIdx;
  saveState();
  render();
}

function updateMeta(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
}

function updateProgress(){
  const total = QUESTIONS.length;
  const done = QUESTIONS.filter(q => state[q.no] !== undefined).length;
  const correct = QUESTIONS.filter(q => state[q.no] === q.answer).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `${done}/${total} 문제 풀이 · 정답 ${correct}개` + (done>0 ? ` (정답률 ${Math.round(correct/done*100)}%)` : '');
}

function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

function render(){
  updateMeta();
  updateProgress();
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  let list = QUESTIONS;
  if(mode === 'wrong'){
    list = QUESTIONS.filter(q => state[q.no] !== undefined && state[q.no] !== q.answer);
  }
  if(list.length === 0){
    area.innerHTML = '<div class="empty">' + (mode==='wrong' ? '틀린 문제가 없어! 🌿' : '문제가 없어.') + '</div>';
    return;
  }
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const card = document.createElement('div');
    card.className = 'card';
    const answered = state[q.no] !== undefined;
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt';
      if(answered){
        if(i === q.answer) cls += ' correct';
        else if(i === state[q.no]) cls += ' wrong';
      }
      optsHtml += `<button class="${cls}" ${answered?'disabled':''} onclick="answer(${qIdx}, ${i})">${opt}</button>`;
    });
    let feedback = '';
    if(answered){
      const mark = state[q.no] === q.answer
        ? '<div class="feedback correct-mark">✅ 정답</div>'
        : `<div class="feedback wrong-mark">❌ 오답 (정답: ${q.answer+1}번)</div>`;
      const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
      feedback = mark + expl;
    }
    card.innerHTML = `
      <div class="qnum">${q.year} · 문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      ${feedback}
    `;
    area.appendChild(card);
  });
}

render();
</script>
</body>
</html>
