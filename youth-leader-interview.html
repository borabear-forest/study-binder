<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청소년지도사 2급 면접 예상질문지</title>
<style>
  :root{
    --bg:#faf8f5; --ink:#2b2620; --sub:#6b6258; --line:#e4ddd3;
    --accent:#8a6d4f; --accent2:#5f7a63; --card:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6;
  }
  header{
    padding:28px 20px 18px; text-align:center; border-bottom:1px solid var(--line);
    background:var(--card);
  }
  header h1{margin:0; font-size:20px; letter-spacing:-0.02em;}

  .tabs{
    display:flex; overflow-x:auto; gap:6px; padding:14px 16px; max-width:760px; margin:0 auto;
    -webkit-overflow-scrolling:touch;
  }
  .tab{
    flex:0 0 auto; padding:8px 14px; border-radius:20px; background:var(--card);
    border:1px solid var(--line); font-size:12.5px; color:var(--sub); white-space:nowrap; cursor:pointer;
  }
  .tab.active{background:var(--accent); color:#fff; border-color:var(--accent);}

  main{max-width:720px; margin:0 auto; padding:6px 16px 60px;}
  .section{display:none;}
  .section.active{display:block;}
  .section-title{font-size:15px; font-weight:700; margin:18px 0 12px; color:var(--accent);}

  .qcard{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:16px; margin-bottom:14px;
  }
  .qnum{font-size:12px; color:var(--accent2); font-weight:700; margin-bottom:4px;}
  .qtext{font-size:14.5px; font-weight:600; margin-bottom:10px;}
  textarea{
    width:100%; min-height:80px; border:1px solid var(--line); border-radius:8px;
    padding:10px; font-size:13.5px; font-family:inherit; resize:vertical; background:#fffdfb;
    color:var(--ink); margin-top:10px;
  }
  textarea:focus{outline:none; border-color:var(--accent2);}
  .btnrow{display:flex; gap:8px; margin-top:8px;}
  button.toggle{
    font-size:12.5px; padding:6px 12px; border-radius:8px; border:1px solid var(--accent);
    background:#fff; color:var(--accent); cursor:pointer;
  }
  button.toggle.shown{background:var(--accent); color:#fff;}
  .answer{
    display:none; margin-top:10px; padding:12px; background:#f3efe8;
    border-radius:6px; font-size:13px; color:#4a4136; white-space:pre-wrap;
  }
  .answer.show{display:block;}

  .navbtns{display:flex; justify-content:space-between; max-width:720px; margin:0 auto 40px; padding:0 16px;}
  .navbtns button{
    padding:10px 18px; border-radius:8px; border:1px solid var(--line); background:var(--card);
    color:var(--ink); font-size:13px; cursor:pointer;
  }
  .navbtns button:disabled{opacity:0.35;}

  .structure-box{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:18px; margin:18px 0 30px;
  }
  .structure-box h3{margin:0 0 10px; font-size:14.5px; color:var(--accent);}
  .structure-flow{font-size:13.5px; font-weight:600; margin-bottom:12px; color:var(--accent2);}
  .structure-example{
    font-size:13px; color:#4a4136; background:#f3efe8; padding:12px; border-radius:6px;
    white-space:pre-wrap;
  }
</style>
</head>
<body>

<header>
  <h1>청소년지도사 2급 면접 예상질문지</h1>
</header>

<div class="tabs" id="tabs"></div>

<main id="main"></main>

<div class="navbtns">
  <button id="prevBtn">← 이전 카테고리</button>
  <button id="nextBtn">다음 카테고리 →</button>
</div>

<script>
const sections = [
  {title:"Ⅰ. 지원동기·자질·직업윤리", items:[
    ["청소년지도사가 되려는 이유와 앞으로 어떤 분야에서 일하고 싶은지 말씀해 보세요.","저는 청소년이 자신의 강점과 가능성을 발견하고, 다양한 경험을 통해 성장하도록 돕고 싶어 청소년지도사를 준비했습니다. 상담이 청소년의 어려움을 이해하고 회복을 돕는 과정이라면, 청소년활동은 참여와 체험을 통해 역량과 사회성을 키우는 과정이라고 생각합니다. 저는 상담과 진로지원의 전문성을 청소년활동과 연결하여 청소년의 심리적 성장뿐 아니라 진로개발과 사회참여까지 지원하고 싶습니다. 특히 학교 밖 청소년이나 진로를 결정하지 못한 청소년을 위한 자기이해·직업체험·프로젝트 활동에 관심이 있습니다."],
    ["청소년지도사의 역할과 바람직한 청소년지도사의 모습은 무엇이라고 생각하나요?","청소년지도사는 프로그램을 단순히 진행하는 사람이 아니라 청소년의 성장을 지원하는 전문인력이라고 생각합니다. 청소년의 발달 특성과 욕구를 이해하고, 수련·문화·교류·참여활동을 기획하고 운영해야 합니다. 바람직한 지도사는 청소년을 통제하거나 정답을 제시하기보다 청소년이 스스로 선택하고 참여하도록 돕는 촉진자여야 합니다. 또한 안전과 윤리를 지키고 필요한 경우 상담·복지·의료기관과 협력할 수 있어야 합니다."],
    ["청소년지도사에게 가장 필요한 자질과 역량은 무엇인가요?","가장 중요한 자질은 청소년을 독립된 인격체로 존중하는 태도라고 생각합니다. 청소년의 의견을 경청하고 선택할 기회를 제공해야 신뢰관계와 자발적인 참여가 형성될 수 있습니다. 여기에 공감적 의사소통, 책임감, 프로그램 기획능력, 안전관리 능력, 위기상황 대처능력이 필요합니다. 또한 변화하는 청소년 환경을 이해하기 위해 지속적으로 공부하는 전문성도 중요합니다."],
    ["청소년지도자와 청소년지도사의 차이를 설명해 보세요.","청소년지도자는 청소년활동, 보호, 복지, 상담 등의 영역에서 청소년을 지도하고 지원하는 사람을 넓게 지칭하는 개념입니다. 청소년지도사는 국가자격을 취득하고 청소년활동 현장에서 전문적으로 활동하는 청소년지도자입니다. 따라서 청소년지도사는 청소년지도자라는 넓은 범주에 포함되는 구체적인 전문인력이라고 이해하고 있습니다."],
    ["청소년지도사와 청소년상담사의 차이와 협력방안을 설명해 보세요.","청소년지도사는 수련활동, 문화활동, 교류활동, 참여활동 등을 통해 청소년의 역량과 사회성을 키우는 역할을 합니다. 청소년상담사는 심리적 어려움이나 학교·가족·진로 문제를 상담과 심리적 개입을 통해 지원합니다. 역할은 다르지만 청소년의 건강한 성장을 지원한다는 목적은 같습니다. 활동 중 심리적 위기가 발견되면 상담기관에 연계하고, 상담과정에서 활동 경험이 필요한 청소년에게는 적절한 프로그램을 연결하는 방식으로 협력할 수 있습니다."],
    ["청소년을 지도할 때 가장 중요하게 지켜야 할 윤리는 무엇인가요?","청소년의 인권과 존엄성, 개인정보와 사생활을 존중하는 것이 가장 중요합니다. 지도자의 가치관을 강요하거나 청소년을 차별해서는 안 되며, 사적인 관계가 형성되지 않도록 전문적 경계를 지켜야 합니다. 상담이나 대화 내용을 함부로 공개해서도 안 됩니다. 다만 자해·자살·학대·성폭력처럼 청소년의 생명과 안전에 위험이 있는 경우에는 비밀보장의 한계를 설명하고 보호자와 책임자, 전문기관에 알려야 합니다."],
    ["자신의 강점과 부족한 점이 청소년지도사 업무에 어떤 영향을 줄 수 있나요?","저의 강점은 청소년의 행동만 판단하지 않고 그 행동의 원인과 감정, 욕구를 함께 이해하려는 태도입니다. 상담과 직업상담을 공부해 정서문제와 진로문제를 통합적으로 바라볼 수 있고, 맡은 일은 끝까지 책임지려는 편입니다. 다만 도움을 주고 싶은 마음이 앞서 설명이나 개입이 길어질 수 있습니다. 현장에서는 청소년의 이야기를 먼저 충분히 듣고, 지도자의 판단보다 청소년에게 실제로 필요한 만큼 개입하도록 조절하겠습니다."]
  ]},
  {title:"Ⅱ. 청소년 이해", items:[
    ["「청소년기본법」상 청소년의 연령과 청소년을 바라보는 관점을 설명해 보세요.","「청소년기본법」상 청소년은 9세 이상 24세 이하인 사람입니다. 다만 개별 법률이나 사업에 따라 대상 연령이 다르게 정해질 수 있으므로 현장에서는 근거법과 사업기준을 함께 확인해야 합니다. 청소년은 보호와 지도가 필요한 존재이면서 동시에 자신의 삶에 대해 의견을 말하고 선택할 수 있는 권리의 주체라고 생각합니다."],
    ["청소년기의 주요 발달특성을 설명해 보세요.","청소년기는 신체적 성장과 함께 정체성, 가치관, 진로를 탐색하는 시기입니다. 또래관계의 영향력이 커지고 독립성과 자율성을 추구하지만 감정조절과 위험판단 능력은 아직 발달과정에 있습니다. 따라서 청소년의 감정변화나 반항을 곧바로 문제로 규정하기보다 발달과정과 환경을 함께 이해해야 합니다. 지도자는 명확한 기준을 제공하면서도 청소년의 선택과 참여를 존중해야 합니다."],
    ["청소년육성이란 무엇인가요?","청소년육성은 청소년활동을 지원하고 복지를 증진하며 근로청소년을 보호하는 것을 포함하는 포괄적인 개념입니다. 또한 사회환경을 청소년에게 유익하게 개선하고 유해환경으로부터 보호하여 청소년의 균형 있는 성장을 돕는 것을 의미합니다. 따라서 청소년육성은 단순한 교육이나 선도가 아니라 활동·복지·보호·환경개선을 함께 포함합니다."],
    ["청소년활동이란 무엇이며 왜 필요한가요?","청소년활동은 청소년의 균형 있는 성장을 위해 필요한 수련활동, 교류활동, 문화활동 등 다양한 체험활동을 말합니다. 청소년은 직접 경험하고 다른 사람과 협력하는 과정에서 자신의 강점과 역할을 발견합니다. 청소년활동은 학교교육만으로 충분히 경험하기 어려운 자율성, 창의성, 사회성, 문제해결능력, 시민성을 기를 수 있다는 점에서 필요합니다."],
    ["수련활동·교류활동·문화활동의 차이를 설명해 보세요.","수련활동은 체험을 통해 심신을 단련하고 공동체역량과 자기개발능력을 기르는 활동입니다. 교류활동은 다른 지역이나 국가, 세대와 만나 상호이해와 협력을 넓히는 활동입니다. 문화활동은 예술, 스포츠, 동아리, 미디어 등 다양한 문화를 경험하고 표현하는 활동입니다. 실제 프로그램에서는 세 영역이 서로 결합되어 운영될 수도 있습니다."],
    ["청소년 참여가 중요한 이유는 무엇인가요?","청소년은 자신의 삶과 관련된 정책과 프로그램에 의견을 제시할 권리가 있습니다. 참여과정에서 청소년은 의사소통, 협업, 문제해결, 민주적 의사결정과 책임을 배울 수 있습니다. 지도자가 모든 내용을 정해 제공하는 것보다 청소년이 직접 주제를 선택하고 기획과 운영에 참여할 때 활동의 의미와 효과가 커집니다."],
    ["청소년을 지도할 때 자율성과 규칙을 어떻게 조화시키겠습니까?","청소년에게 가능한 범위 안에서 선택권과 참여권을 충분히 제공하겠습니다. 다만 안전과 다른 사람의 권리를 침해하는 행동에는 명확한 기준과 한계를 알려야 합니다. 규칙을 일방적으로 지시하기보다 그 이유를 설명하고 청소년과 함께 규칙을 정하면 수용성이 높아질 수 있습니다. 자율성은 규칙이 없는 상태가 아니라 책임 있는 선택을 경험하도록 돕는 것이라고 생각합니다."]
  ]},
  {title:"Ⅲ. 법·정책·제도", items:[
    ["청소년 관련 주요 법률과 각각의 역할을 설명해 보세요.","대표적으로 「청소년기본법」, 「청소년활동 진흥법」, 「청소년복지 지원법」, 「청소년보호법」이 있습니다. 「청소년기본법」은 청소년정책과 육성의 기본방향을 정하고, 「청소년활동 진흥법」은 청소년활동과 수련시설, 인증제, 신고제, 안전관리 등을 규정합니다. 「청소년복지 지원법」은 청소년의 복지증진과 위기청소년 지원체계를 다루며, 「청소년보호법」은 유해매체와 유해환경으로부터 청소년을 보호하는 데 중점을 둡니다. 이외에도 「학교 밖 청소년 지원에 관한 법률」과 「아동·청소년의 성보호에 관한 법률」 등이 있습니다."],
    ["「청소년기본법」과 「청소년활동 진흥법」의 차이는 무엇인가요?","「청소년기본법」은 청소년정책의 기본이념과 청소년육성의 방향, 국가와 지방자치단체의 책무 등을 정한 기본법입니다. 「청소년활동 진흥법」은 청소년활동, 수련시설, 지도자 배치, 인증제, 신고제, 안전관리 등 활동현장에서 필요한 구체적인 사항을 규정합니다. 기본법이 전체적인 방향과 원칙을 제시한다면 활동진흥법은 청소년활동의 실행기준을 제시한다고 설명할 수 있습니다."],
    ["청소년복지와 청소년보호의 차이를 설명해 보세요.","청소년복지는 청소년이 건강하게 성장하고 생활할 수 있도록 상담, 교육, 생활, 진로, 자립 등의 자원과 서비스를 제공하는 것입니다. 청소년보호는 유해매체, 유해업소, 폭력, 착취, 성범죄 등 위험요인을 예방하고 차단하는 데 중점을 둡니다. 복지가 필요한 지원을 제공하는 개념이라면 보호는 청소년에게 해를 미칠 수 있는 위험으로부터 안전을 확보하는 성격이 강합니다."],
    ["「학교 밖 청소년 지원에 관한 법률」의 목적과 주요 지원내용은 무엇인가요?","학교 밖 청소년이 소외되지 않고 건강하게 성장할 수 있도록 상담, 교육, 진로·직업체험, 취업, 자립, 건강 등을 지원하는 법률입니다. 지역의 학교밖청소년지원센터 꿈드림을 중심으로 검정고시, 학업복귀, 대안교육, 자격취득, 취업 등 청소년의 상황에 맞는 서비스를 제공합니다. 학교 밖 청소년을 단순한 학업중단자로 판단하지 않고 다양한 성장경로를 가진 청소년으로 존중하는 태도가 중요합니다."],
    ["제7차 청소년정책 기본계획의 기간과 주요 방향을 설명해 보세요.","제7차 청소년정책 기본계획은 2023년부터 2027년까지 적용되는 국가의 5개년 청소년정책 계획입니다. 디지털 환경 변화에 대응하고 청소년의 참여와 권리를 확대하며, 청소년활동·복지·보호 체계를 강화하는 내용을 담고 있습니다. 청소년을 정책의 수혜자에 머물게 하지 않고 정책을 함께 만드는 주체로 인정하는 방향이 중요하다고 생각합니다."],
    ["청소년 참여기구의 종류와 차이를 설명해 보세요.","대표적인 청소년 참여기구는 청소년특별회의, 청소년참여위원회, 청소년운영위원회입니다. 청소년특별회의는 청소년과 전문가가 범정부 차원의 청소년정책 과제를 발굴하여 제안하는 전국 단위 기구입니다. 청소년참여위원회는 중앙정부와 지방자치단체의 정책과정에 청소년의 의견을 반영하는 기구입니다. 청소년운영위원회는 청소년수련시설의 운영과 프로그램을 모니터링하고 개선사항을 제안하는 시설 단위의 참여기구입니다."],
    ["청소년수련활동인증제와 신고제의 차이를 설명해 보세요.","청소년수련활동인증제는 프로그램의 내용, 지도인력, 활동환경, 안전관리 등이 일정한 기준을 충족했는지 심사하여 국가가 인증하는 제도입니다. 청소년과 보호자가 안전하고 질 높은 활동을 선택하도록 돕는 목적이 있습니다. 신고제는 일정한 청소년수련활동의 실시계획과 안전 관련 정보를 사전에 신고하고 공개하는 제도입니다. 인증제가 프로그램의 질적 수준을 심사하는 제도라면 신고제는 사전 정보공개와 안전관리에 중점을 둡니다."],
    ["청소년자원봉사 Dovol과 포상제도를 설명해 보세요.","Dovol은 청소년이 봉사활동을 검색하고 신청하며 활동실적을 관리할 수 있는 청소년자원봉사 시스템입니다. 봉사시간을 채우는 데 그치지 않고 지역사회의 문제를 이해하고 참여하는 경험으로 운영하는 것이 중요합니다. 국제청소년성취포상제는 청소년이 봉사, 자기개발, 신체단련, 탐험 등의 영역에서 스스로 목표를 세우고 도전하는 자기성장 프로그램입니다. 청소년자기도전포상제는 비교적 어린 연령의 청소년이 발달수준에 맞게 목표를 설정하고 성취경험을 쌓도록 지원하는 제도입니다."]
  ]},
  {title:"Ⅳ. 기관·시설", items:[
    ["청소년수련시설의 종류와 기능을 설명해 보세요.","청소년수련시설에는 청소년수련관, 청소년수련원, 청소년문화의집, 청소년특화시설, 청소년야영장, 유스호스텔이 있습니다. 청소년수련관은 생활권 안에서 다양한 수련활동을 종합적으로 운영하고, 청소년수련원은 숙박기능을 갖추고 자연체험과 공동체활동 등을 제공합니다. 청소년문화의집은 지역 청소년이 일상적으로 이용할 수 있는 비교적 소규모의 문화활동 공간입니다. 특화시설은 특정 목적의 전문활동, 야영장은 야외활동, 유스호스텔은 청소년의 여행과 교류를 위한 숙박기능에 중점을 둡니다."],
    ["청소년수련관과 청소년문화의집의 차이는 무엇인가요?","청소년수련관은 다양한 수련활동을 종합적으로 운영할 수 있는 비교적 큰 생활권 시설입니다. 체육, 문화, 동아리, 참여, 진로 등 여러 영역의 프로그램을 운영할 수 있습니다. 청소년문화의집은 청소년이 지역에서 일상적으로 접근할 수 있도록 정보·문화·예술·동아리 활동공간을 제공하는 소규모 생활권 시설입니다. 규모와 기능 범위에는 차이가 있지만 모두 청소년의 접근성과 참여가 중요합니다."],
    ["청소년수련원과 유스호스텔의 차이는 무엇인가요?","청소년수련원은 숙박기능과 다양한 활동시설을 갖추고 자연체험, 공동체활동, 수련활동 등을 종합적으로 운영하는 시설입니다. 유스호스텔은 청소년의 여행과 국내외 교류를 지원하기 위해 숙박과 편의를 제공하는 시설입니다. 수련원이 교육적 프로그램 운영에 중점을 둔다면 유스호스텔은 여행과 교류를 위한 숙박지원의 성격이 더 강합니다."],
    ["한국청소년활동진흥원의 역할을 설명해 보세요.","한국청소년활동진흥원은 청소년활동을 활성화하고 활동의 질과 안전성을 높이기 위해 설립된 공공기관입니다. 청소년수련활동인증제와 신고제, 청소년자원봉사, 포상제, 청소년특별회의, 국제교류 등을 지원합니다. 또한 청소년지도자의 전문성 향상과 지역 청소년활동기관의 연계도 지원합니다."],
    ["청소년상담복지센터와 청소년안전망의 역할을 설명해 보세요.","청소년상담복지센터는 청소년과 보호자를 대상으로 상담, 심리검사, 위기개입, 예방교육 등을 제공합니다. 청소년안전망은 상담복지센터를 중심으로 교육, 의료, 복지, 경찰, 법률기관 등이 협력하여 위기청소년을 발견하고 통합적으로 지원하는 지역사회 연계체계입니다. 한 기관이 모든 문제를 해결하기 어렵기 때문에 필요한 서비스를 연결하고 지원이 중단되지 않도록 관리하는 것이 중요합니다."],
    ["학교밖청소년지원센터 꿈드림은 어떤 일을 하나요?","꿈드림은 학교 밖 청소년에게 상담, 학습과 검정고시 지원, 진로·직업체험, 취업, 자립, 건강지원 등을 제공하는 기관입니다. 학교 복귀만을 목표로 하지 않고 청소년의 상황과 목표에 따라 대안교육, 자격취득, 취업 등 다양한 경로를 지원합니다. 지도사는 학교 밖 청소년을 발견했을 때 본인의 욕구를 먼저 확인한 뒤 꿈드림에 연계할 수 있어야 합니다."],
    ["청소년상담 1388, 청소년동반자, 청소년쉼터의 역할을 설명해 보세요.","청소년상담 1388은 청소년과 보호자가 위기, 정서, 진로, 가족, 학교문제 등에 대해 상담받고 필요한 지역서비스에 연결될 수 있는 상담창구입니다. 청소년동반자는 기관 방문이 어려운 위기청소년의 생활현장으로 찾아가 상담하고 필요한 서비스를 연결합니다. 청소년쉼터는 가정 밖 청소년에게 긴급보호, 생활, 상담, 교육, 자립지원을 제공합니다. 쉼터는 보호기간과 기능에 따라 일시·단기·중장기쉼터로 구분됩니다."]
  ]},
  {title:"Ⅴ. 실무·프로그램 운영", items:[
    ["청소년프로그램의 개발과정을 설명해 보세요.","먼저 대상 청소년과 지역사회의 욕구를 조사하고 프로그램의 목표와 대상자를 설정합니다. 이후 활동내용, 일정, 장소, 예산, 지도인력, 홍보, 안전계획, 평가방법을 구체적으로 설계합니다. 프로그램을 실행하면서 참여상황과 위험요인을 점검하고 필요한 내용을 조정합니다. 종료 후에는 과정과 성과를 평가하여 다음 프로그램의 개선에 반영합니다."],
    ["프로그램 기획 시 가장 먼저 고려할 것은 무엇인가요?","가장 먼저 대상 청소년의 욕구와 특성을 파악해야 합니다. 지도자가 좋은 프로그램이라고 생각하더라도 청소년의 관심과 필요에 맞지 않으면 참여도와 효과가 낮아질 수 있습니다. 연령과 발달수준, 지역환경, 접근성, 참여동기, 안전, 장애나 문화적 배경 등도 함께 고려해야 합니다."],
    ["청소년의 요구와 참여를 프로그램에 어떻게 반영하겠습니까?","설문조사, 인터뷰, 간담회, 아이디어 회의, 청소년운영위원회 등을 통해 청소년의 의견을 수집하겠습니다. 프로그램 주제뿐 아니라 일정, 장소, 활동방법, 역할분담에도 청소년이 참여하도록 하겠습니다. 제안받은 내용을 실제 기획에 반영하고 반영하기 어려운 경우에는 그 이유를 설명하겠습니다. 의견만 수집하고 결과를 알리지 않는 형식적 참여가 되지 않도록 피드백 과정도 마련하겠습니다."],
    ["청소년프로그램은 어떻게 평가하겠습니까?","참여인원이나 만족도만 확인하지 않고 프로그램의 목표가 실제로 달성되었는지를 평가하겠습니다. 사전·사후 설문, 관찰, 인터뷰, 활동결과물, 청소년의 자기평가, 지도자 회의 등을 함께 활용할 수 있습니다. 평가는 잘못을 찾기 위한 것이 아니라 프로그램의 강점과 개선점을 확인하여 다음 운영에 반영하기 위한 과정이라고 생각합니다."],
    ["예상보다 참여자가 적거나 참여를 거부하는 청소년이 있다면 어떻게 하겠습니까?","적은 참여인원을 곧바로 실패로 판단하지 않고 소규모 활동의 장점을 살려 상호작용과 개별 참여를 높이겠습니다. 참여를 거부하는 청소년에게는 억지로 참여시키기보다 활동이 어렵거나 또래관계가 불편한지, 선택권이 없어서 거부하는지 이유를 확인하겠습니다. 관찰자, 기록자, 보조역할 등 다양한 참여방식을 제시할 수 있습니다. 이후 홍보, 시간, 장소, 주제, 접근성 측면에서 참여가 적었던 원인을 분석하겠습니다."],
    ["프로그램 예산이 부족하다면 어떻게 하겠습니까?","프로그램의 핵심목표를 기준으로 반드시 필요한 요소와 조정 가능한 요소를 구분하겠습니다. 지역기관, 학교, 도서관, 복지관, 공공시설과 협력하고 기존 장비와 인적자원을 활용하겠습니다. 다만 비용을 줄이기 위해 안전이나 활동의 질을 희생해서는 안 됩니다. 필요하다면 규모를 줄이더라도 목표와 효과가 분명한 프로그램으로 운영하겠습니다."],
    ["프로그램의 안전관리는 어떻게 해야 하나요?","활동 전에 장소와 장비, 이동경로, 날씨, 참여자의 건강상태 등 위험요인을 사전에 점검해야 합니다. 청소년에게 이해하기 쉬운 방식으로 안전수칙을 안내하고 비상연락망, 응급약품, 인솔인력, 대피방법을 준비해야 합니다. 활동 중에는 참여자의 상태를 지속적으로 관찰하고 사고가 발생하면 활동을 중단한 뒤 응급조치와 보고절차를 따라야 합니다. 종료 후에는 사고와 위험상황을 기록하고 재발방지 대책을 마련해야 합니다."],
    ["진로·직업 프로그램을 기획한다면 어떤 프로그램을 운영하고 싶나요?","먼저 흥미, 가치, 강점 탐색을 통해 청소년의 자기이해를 돕겠습니다. 이후 다양한 직업인을 만나거나 실제 직무를 체험하고, 팀 프로젝트를 통해 직업과 관련된 문제를 해결하도록 하겠습니다. 예를 들어 '우리 동네 청소년 일자리 연구소'를 운영하여 지역의 직업과 청소년 노동환경을 조사하고 직업인을 인터뷰한 뒤 정책을 제안하도록 할 수 있습니다. 이를 통해 진로탐색뿐 아니라 조사, 협업, 의사소통, 사회참여 경험까지 제공하고 싶습니다."]
  ]},
  {title:"Ⅵ. 상황면접·위기대응", items:[
    ["프로그램 중 청소년끼리 싸움이나 따돌림이 발생하면 어떻게 하겠습니까?","먼저 신체적 충돌을 중단시키고 당사자들을 분리하여 안전을 확보하겠습니다. 다친 사람이 있는지 확인하고 각각의 이야기를 따로 들으며 사실관계를 파악하겠습니다. 피해청소년에게 책임을 돌리거나 당사자의 준비 없이 즉시 사과와 화해를 강요하지 않겠습니다. 이후 기관의 절차에 따라 보호자와 책임자에게 알리고, 집단규칙과 관계문화를 점검하여 재발방지 교육과 상담을 진행하겠습니다."],
    ["수련활동 중 청소년이 다치거나 응급상황이 발생하면 어떻게 하겠습니까?","활동을 즉시 중단하고 추가 위험을 제거한 뒤 의식, 호흡, 출혈 등 부상 정도를 확인하겠습니다. 필요한 응급처치를 시행하고 상황에 따라 119에 신고하겠습니다. 기관 책임자와 보호자에게 신속하게 알리고 의료기관 이송이 필요한 경우 동행하겠습니다. 이후 사고경위와 조치내용을 기록하고 원인을 분석하여 동일한 사고가 반복되지 않도록 개선하겠습니다."],
    ["청소년이 안전수칙이나 지도자의 지시를 계속 거부한다면 어떻게 하겠습니까?","많은 사람 앞에서 힘겨루기를 하거나 모욕하지 않고 별도의 공간에서 행동의 이유를 듣겠습니다. 규칙이 자신과 다른 청소년의 안전을 위한 것임을 구체적으로 설명하고 가능한 대안을 제시하겠습니다. 다만 다른 사람의 안전을 위협하는 행동에는 명확하게 한계를 설정하고 필요하면 활동참여를 제한하거나 대체활동을 제공하겠습니다. 반복되는 경우에는 보호자와 책임자, 필요 시 전문기관과 협력하겠습니다."],
    ["청소년이 욕설을 하거나 공격적으로 행동하면 어떻게 하겠습니까?","감정적으로 맞대응하지 않고 주변 청소년과 지도자의 안전을 먼저 확보하겠습니다. 흥분이 가라앉은 후 욕설이나 폭력행동은 허용될 수 없다는 점을 분명히 설명하겠습니다. 동시에 그 행동을 일으킨 감정과 상황을 듣고 대안적인 표현방법을 함께 찾겠습니다. 반복되거나 위험성이 높다면 보호자와 상담기관 등과 협력하여 지원하겠습니다."],
    ["청소년이 자해나 자살생각을 이야기하면 어떻게 대응하겠습니까?","자해 사실을 가볍게 여기거나 절대 비밀로 지키겠다고 약속하지 않겠습니다. 자해 방법과 빈도, 현재 충동, 자살생각과 계획, 사용할 수 있는 수단이 있는지 확인하겠습니다. 즉각적인 위험이 있으면 청소년을 혼자 두지 않고 기관의 위기대응 절차에 따라 보호자와 책임자에게 알리겠습니다. 필요하면 119, 의료기관, 청소년상담복지센터 등 긴급서비스에 즉시 연계하겠습니다."],
    ["청소년이 학대나 성폭력 피해를 이야기하면 어떻게 하겠습니까?","청소년의 말을 의심하거나 반복해서 자세히 추궁하지 않고 안전하게 경청하겠습니다. 지도자가 직접 조사하거나 가해 의심자와 대질시키지 않겠습니다. 현재 안전한지 확인하고 기관 책임자와 공유한 뒤 관련 법과 절차에 따라 신고하겠습니다. 피해청소년이 상담, 의료, 법률, 보호서비스를 받을 수 있도록 전문기관에 연계하고 피해자에게 책임을 돌리지 않겠습니다."],
    ["가정 밖 청소년이나 학교 밖 청소년을 만나면 어떻게 지원하겠습니까?","먼저 현재 머물 곳이 있는지, 폭력이나 착취 위험이 있는지 등 안전을 확인하겠습니다. 가출이나 학교중단을 비난하거나 무조건 가정과 학교로 돌려보내려 하지 않고 원인과 본인의 의사를 듣겠습니다. 가정 밖 청소년은 1388, 청소년상담복지센터, 청소년쉼터 등에 연계하겠습니다. 학교 밖 청소년은 꿈드림에 연결하여 상담, 검정고시, 진로·직업체험, 취업, 자립지원 등 적합한 서비스를 받을 수 있도록 돕겠습니다."],
    ["보호자가 청소년의 상담내용을 모두 알려달라고 하면 어떻게 하겠습니까?","청소년의 사생활과 신뢰를 보호해야 하므로 대화나 상담내용 전체를 그대로 전달하지는 않겠습니다. 보호자에게 비밀보장의 원칙과 청소년과의 신뢰관계가 중요한 이유를 설명하겠습니다. 청소년의 안전과 지원에 필요한 범위에서 내용을 요약하여 협의하고, 가능하면 청소년에게도 어떤 내용을 공유할지 미리 설명하겠습니다. 다만 생명과 안전에 위험이 있는 경우에는 필요한 정보를 즉시 공유해야 합니다."],
    ["동료 지도자가 청소년을 부적절하게 대하거나 전문적 경계를 지키지 않는다면 어떻게 하겠습니까?","청소년의 안전과 권리를 우선으로 보고 즉시 중단시켜야 할 상황이라면 현장에서 개입하겠습니다. 개인적인 감정이나 추측이 아니라 확인한 사실과 상황을 객관적으로 기록하겠습니다. 이후 기관 책임자와 정해진 보고절차에 따라 처리하겠습니다. 동료관계를 이유로 묵인하지 않되 개인을 비난하기보다 청소년 보호와 재발방지에 초점을 두겠습니다."]
  ]},
  {title:"Ⅶ. 시사·개인 경험·맞춤질문", items:[
    ["최근 중요하다고 생각하는 청소년 문제와 대응방안을 말씀해 보세요.","저는 청소년의 정신건강 문제와 사회적 고립을 중요하게 보고 있습니다. 학업과 진로, 또래관계, 가족갈등뿐 아니라 온라인 비교와 디지털환경도 영향을 줄 수 있습니다. 문제가 심해진 뒤 치료하는 것뿐 아니라 청소년이 일상적인 활동공간에서 관계와 소속감을 경험하도록 예방적으로 지원해야 합니다. 평소와 다른 행동과 위기신호를 관찰하고 필요한 경우 상담복지센터와 정신건강 전문기관에 연계해야 합니다."],
    ["스마트폰 과의존·사이버폭력·디지털성범죄에 어떻게 대응해야 하나요?","스마트폰 사용시간만 통제하기보다 청소년이 스마트폰을 통해 충족하려는 욕구와 스트레스, 외로움, 또래관계 등을 파악해야 합니다. 청소년과 함께 사용규칙과 대체활동을 정하고 일상기능의 손상이 크면 전문기관에 연계하겠습니다. 사이버폭력과 디지털성범죄는 장난으로 축소하지 않고 차단, 신고, 증거보존, 피해지원 방법을 구체적으로 교육해야 합니다. 동의 없는 촬영·유포·합성은 범죄이며 피해자의 책임이 아니라는 점도 분명히 알려야 합니다."],
    ["생성형 AI를 청소년활동에 어떻게 활용하겠습니까?","생성형 AI는 아이디어 발상, 진로정보 탐색, 글쓰기, 콘텐츠 제작, 프로젝트 기획 등에 활용할 수 있습니다. 다만 생성된 결과가 항상 정확한 것은 아니므로 사실확인과 출처검증 능력을 함께 교육해야 합니다. 개인정보, 저작권, 편향, 허위정보 문제도 다루어야 합니다. AI가 청소년의 사고를 대신하는 도구가 아니라 생각과 표현을 확장하는 보조도구가 되도록 활용하겠습니다."],
    ["다문화청소년과 장애청소년의 참여권을 어떻게 보장하겠습니까?","다문화청소년을 하나의 동일한 집단으로 보거나 문화적 배경을 문제로 해석해서는 안 됩니다. 개인의 언어능력, 가족관계, 정체성, 차별경험을 개별적으로 이해하고 프로그램의 언어와 문화 접근성을 높여야 합니다. 장애청소년에게는 별도의 활동만 제공하기보다 일반 프로그램에 참여할 수 있도록 이동, 의사소통, 감각, 활동속도 등을 조정해야 합니다. 무엇보다 당사자의 의견을 직접 듣고 과도한 보호로 선택권을 제한하지 않겠습니다."],
    ["청소년상담사 자격이 있는데 왜 청소년지도사도 취득하려 하나요?","청소년상담이 심리적 어려움을 이해하고 회복을 돕는 과정이라면, 청소년지도는 활동과 참여를 통해 청소년의 강점과 역량을 키우는 과정이라고 생각합니다. 저는 상담이 필요한 청소년만을 만나는 것이 아니라 다양한 청소년과 예방적이고 성장지향적인 활동을 하고 싶습니다. 두 전문성을 연결하면 청소년의 내면적인 어려움뿐 아니라 관계, 진로, 사회참여까지 보다 입체적으로 지원할 수 있다고 생각합니다."],
    ["상담적 접근을 청소년활동 현장에 어떻게 활용하겠습니까?","청소년의 행동을 즉시 평가하거나 훈계하기보다 그 행동에 담긴 감정과 욕구를 이해하는 데 활용하겠습니다. 경청, 공감, 개방형 질문을 통해 참여동기와 어려움을 파악할 수 있습니다. 다만 모든 상황을 상담으로 만들거나 집단활동의 흐름을 지나치게 중단하지는 않겠습니다. 일상적인 정서적 지지는 제공하되 전문적인 개입이 필요한 경우에는 적절한 상담기관에 연계하겠습니다."],
    ["지도와 상담의 경계를 어떻게 설정하겠습니까?","지도는 활동참여, 규칙, 관계, 역량개발을 지원하는 역할이고 상담은 정서적 어려움과 심리문제를 전문적으로 다루는 역할입니다. 지도자로서 청소년의 말을 경청하고 기본적인 정서적 지지를 제공할 수 있습니다. 그러나 자해, 학대, 심각한 우울, 중독 등 지속적이고 전문적인 개입이 필요한 문제는 혼자 해결하지 않고 전문상담기관에 연계하겠습니다. 상담자격이 있더라도 기관의 직무범위, 윤리, 이중관계 가능성을 확인하겠습니다."],
    ["청소년의 행동을 지나치게 병리적으로 해석하지 않으려면 어떻게 해야 하나요?","청소년기의 감정변화나 반항, 충동적인 행동을 곧바로 장애나 문제로 규정하지 않겠습니다. 행동이 나타난 발달적 특성, 가족과 또래환경, 문화적 맥락, 최근의 스트레스와 청소년의 강점을 함께 살펴보겠습니다. 진단을 서두르기보다 현재 청소년에게 필요한 지원이 무엇인지 중심으로 접근하겠습니다. 전문적 평가가 필요한 경우에는 지도자가 임의로 판단하지 않고 적절한 기관에 연계하겠습니다."]
  ]}
];

let current = 0;

function render(){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = sections.map((s,i)=>`<div class="tab ${i===current?'active':''}" data-i="${i}">${s.title}</div>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{current=+t.dataset.i; render();}));

  const main = document.getElementById('main');
  main.innerHTML='';
  sections.forEach((s,i)=>{
    const sec = document.createElement('div');
    sec.className = 'section' + (i===current?' active':'');
    let html = `<div class="section-title">${s.title} (${s.items.length}문항)</div>`;
    s.items.forEach((it,qi)=>{
      const id = `${i}_${qi}`;
      html += `
        <div class="qcard">
          <div class="qnum">Q${qi+1}</div>
          <div class="qtext">${it[0]}</div>
          <div class="btnrow">
            <button class="toggle" data-id="${id}">모범답안 보기</button>
          </div>
          <div class="answer" id="ans_${id}">${it[1]}</div>
          <textarea id="ta_${id}" placeholder="여기에 직접 답변을 작성해보세요..." data-id="${id}"></textarea>
        </div>`;
    });

    if(i===sections.length-1){
      html += `
        <div class="structure-box">
          <h3>답변할 때 기억할 기본구조</h3>
          <div class="structure-flow">① 결론 → ② 이유 → ③ 구체적인 행동 → ④ 기관 및 전문가 연계</div>
          <div class="structure-example">예) 자해 청소년 대처 질문
「가장 먼저 청소년의 안전과 현재 위험도를 확인하겠습니다. 자해는 생명과 연결될 수 있기 때문입니다. 청소년을 혼자 두지 않고 자살생각과 계획, 수단 접근 여부를 확인한 뒤 기관의 위기대응 절차에 따라 보호자와 책임자에게 알리겠습니다. 즉각적인 위험이 있다면 119와 의료기관, 청소년상담복지센터 등에 신속히 연계하겠습니다.」</div>
        </div>`;
    }

    sec.innerHTML = html;
    main.appendChild(sec);
  });

  main.querySelectorAll('.toggle').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id = btn.dataset.id;
      const ans = document.getElementById('ans_'+id);
      ans.classList.toggle('show');
      btn.classList.toggle('shown');
      btn.textContent = ans.classList.contains('show') ? '모범답안 숨기기' : '모범답안 보기';
    });
  });

  main.querySelectorAll('textarea').forEach(ta=>{
    const saved = localStorage.getItem('exam_'+ta.dataset.id);
    if(saved) ta.value = saved;
    ta.addEventListener('input',()=>{
      localStorage.setItem('exam_'+ta.dataset.id, ta.value);
    });
  });

  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===sections.length-1;
  window.scrollTo(0,0);
}

document.getElementById('prevBtn').addEventListener('click',()=>{ if(current>0){current--; render();} });
document.getElementById('nextBtn').addEventListener('click',()=>{ if(current<sections.length-1){current++; render();} });

render();
</script>
</body>
</html>
