<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청소년지도사 2급 면접 예상질문지</title>
<style>
  :root{
    --bg:#faf8f5; --ink:#2b2620; --sub:#6b6258; --line:#e4ddd3;
    --accent:#8a6d4f; --accent2:#5f7a63; --card:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6;
  }
  header{
    padding:28px 20px 18px; text-align:center; border-bottom:1px solid var(--line);
    background:var(--card);
  }
  header h1{margin:0; font-size:20px; letter-spacing:-0.02em;}

  .tabs{
    display:flex; overflow-x:auto; gap:6px; padding:14px 16px; max-width:760px; margin:0 auto;
    -webkit-overflow-scrolling:touch;
  }
  .tab{
    flex:0 0 auto; padding:8px 14px; border-radius:20px; background:var(--card);
    border:1px solid var(--line); font-size:12.5px; color:var(--sub); white-space:nowrap; cursor:pointer;
  }
  .tab.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  .tab.concept-tab{color:#5c6b81; border-color:#c3cbd6;}
  .tab.concept-tab.active{background:#5c6b81; color:#fff; border-color:#5c6b81;}

  main{max-width:720px; margin:0 auto; padding:6px 16px 60px;}
  .section{display:none;}
  .section.active{display:block;}
  .section-title{font-size:15px; font-weight:700; margin:18px 0 12px; color:var(--accent);}

  .concept-wrap{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:18px;}
  .concept-group-title{font-size:13.5px; font-weight:800; color:#fff; background:#5c6b81; display:inline-block; padding:4px 12px; border-radius:20px; margin:14px 0 8px;}
  .concept-group-title:first-child{margin-top:0;}
  .concept-item{padding:8px 0; border-bottom:1px dashed var(--line); font-size:13px; line-height:1.6;}
  .concept-item:last-child{border-bottom:none;}
  .concept-term{font-weight:700; color:#46536b; margin-bottom:2px;}
  .concept-def{color:var(--ink);}
  .badge{display:inline-block; background:#5c6b81; color:#fff; font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:10px; margin-left:6px; vertical-align:middle;}

  .qcard{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:16px; margin-bottom:14px;
  }
  .qnum{font-size:12px; color:var(--accent2); font-weight:700; margin-bottom:4px;}
  .qtext{font-size:14.5px; font-weight:600; margin-bottom:10px;}
  textarea{
    width:100%; min-height:80px; border:1px solid var(--line); border-radius:8px;
    padding:10px; font-size:13.5px; font-family:inherit; resize:vertical; background:#fffdfb;
    color:var(--ink); margin-top:10px;
  }
  textarea:focus{outline:none; border-color:var(--accent2);}
  .btnrow{display:flex; gap:8px; margin-top:8px;}
  button.toggle{
    font-size:12.5px; padding:6px 12px; border-radius:8px; border:1px solid var(--accent);
    background:#fff; color:var(--accent); cursor:pointer;
  }
  button.toggle.shown{background:var(--accent); color:#fff;}
  .answer{
    display:none; margin-top:10px; padding:12px; background:#f3efe8;
    border-radius:6px; font-size:13px; color:#4a4136; white-space:pre-wrap;
  }
  .answer.show{display:block;}

  .navbtns{display:flex; justify-content:space-between; max-width:720px; margin:0 auto 40px; padding:0 16px;}
  .navbtns button{
    padding:10px 18px; border-radius:8px; border:1px solid var(--line); background:var(--card);
    color:var(--ink); font-size:13px; cursor:pointer;
  }
  .navbtns button:disabled{opacity:0.35;}

  .structure-box{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:18px; margin:18px 0 30px;
  }
  .structure-box h3{margin:0 0 10px; font-size:14.5px; color:var(--accent);}
  .structure-flow{font-size:13.5px; font-weight:600; margin-bottom:12px; color:var(--accent2);}
  .structure-example{
    font-size:13px; color:#4a4136; background:#f3efe8; padding:12px; border-radius:6px;
    white-space:pre-wrap;
  }
</style>
</head>
<body>

<header>
  <h1>청소년지도사 2급 면접 예상질문지</h1>
</header>

<div class="tabs" id="tabs"></div>

<main id="main"></main>

<div class="navbtns">
  <button id="prevBtn">← 이전 카테고리</button>
  <button id="nextBtn">다음 카테고리 →</button>
</div>

<script>
const sections = [
  {title:"개념정리", notes:`<div class="concept-wrap"><div class="concept-group-title">법률·정책·연령 기준</div><div class="concept-item"><div class="concept-term">제7차 청소년 기본정책</div><div class="concept-def">비전: 디지털 시대를 선도하는 글로벌 k-청소년<br>목표: 청소년 성장기회 제공 / 안전한 보호 환경 조성<br>특징: 사이버폭력, 마약, 도박 등 이슈되고 있는 청소년 유해환경에 적극적으로 대처하기 위한 정책개발<br>- 플랫폼 기반 청소년활동 활성화<br>- 데이터 활용 청소년 지원망 구축<br>- 청소년의 참여, 권리 보장 확대<br>- 청소년정책 총괄 조정 강화<br>- 청소년 유해환경 차단 및 보호 확대</div></div><div class="concept-item"><div class="concept-term">청소년 관련 6대 법률</div><div class="concept-def">청소년기본법: 청소년의 권리와 복지를 보장하고, 건전한 성장과 발달을 지원하기 위해 제정된 법률<br>청소년활동진흥법: 청소년의 다양한 활동을 지원하고 장려하기 위해 제정된 법률<br>청소년보호법: 청소년을 다양한 위험으로 보호하고 건강한 성장과 발달을 지원하기 위해 제정된 법률<br>청소년복지지원법, 아동 청소년 성보호에 관한 법률, 학교 밖 청소년지원에 관한 법률</div></div><div class="concept-item"><div class="concept-term">법령에 따른 연령</div><div class="concept-def">청소년 기본법 / 청소년활동진흥법 / 청소년복지지원법: 만9~24세<br>청소년 보호법 / 민법 / 소년법: 만 19세 미만<br>아동복지법: 만 18세 미만<br>형법: 14세 미만<br>UN(국제 청소년): 15~24세</div></div><div class="concept-item"><div class="concept-term">촉법/범죄/우범</div><div class="concept-def">촉법소년: 범죄행위 한 10~14세 미만 청소년 / 형사 처벌 받지X<br>범죄소년: 범죄행위 한 14~19세 미만 청소년<br>우범소년: 범죄행위 할 우려가 있는 10~19세 소년</div></div><div class="concept-item"><div class="concept-term">육성/복지/보호</div><div class="concept-def">청소년 육성: 청소년의 균형 있는 성장, 발달을 위해 청소년 활동, 복지, 보호를 증진하는 것<br>청소년 복지: 청소년의 기본적인 삶을 보장하기 위한 사회적, 경제적 지원을 뜻함<br>청소년 보호: 청소년에게 유해한 환경을 제한하여 청소년을 보호하는 것</div></div><div class="concept-item"><div class="concept-term">청소년 헌장</div><div class="concept-def">청소년 권리: 청소년은 생존에 필요한 기본적인 주거, 교육 등을 보장받아 균형있게 성장할 권리를 가짐<br>청소년 책임: 자신의 삶을 소중히 여기며 선택한 삶에 책임을 져야한다.</div></div><div class="concept-item"><div class="concept-term">아동권리협약의 4대 권리</div><div class="concept-def">생존권, 보호권, 발달권, 참여권 (생보발참)</div></div><div class="concept-item"><div class="concept-term">촉법소년 연령 만13세 하향 개정에 대한 의견</div><div class="concept-def">청소년기 범죄자로 낙인된다면 재범 확률도 높아질 수 있습니다. 촉법소년의 연령을 낮추는 것에 초점을 두는 것보다 범죄가 발생했을 때 재범이 발생하지 않도록 교육을 강화하는 것이 필요합니다.</div></div><div class="concept-item"><div class="concept-term">청소년 선거연령 만 18세로 하향된 것에 대한 본인의 생각</div><div class="concept-def">청소년 또한 사회의 중요한 구성원임을 인정하고 청소년이 사회문제에 대한 관심을 높이며, 사회적 책임감을 기를 수 있는 긍정적인 측면이 있습니다. 하지만 정치적 결정에 필요한 성숙함과 판단력이 충분하지 않을 수 있다는 점이 우려될 수 있습니다.</div></div><div class="concept-item"><div class="concept-term">소년법 폐지에 대한 찬,반 입장</div><div class="concept-def">찬: 소년법 폐지를 통해 범죄에 대한 책임을 강화하고, 범죄 예방 효과를 높일 수 있습니다. 반: 소년법은 재사회화의 기회를 제공하는 법정 장치라는 의견이 있는데, 폐지 시 청소년의 미래를 잃게 할 수 있다는 점이 우려될 수 있습니다.</div></div><div class="concept-item"><div class="concept-term">청소년들이 받는 인권침해 영역</div><div class="concept-def">디지털 플랫폼 사용이 증가하며 디지털 환경의 인권침해가 심각하다고 생각합니다. 특히 온라인 괴롭힘은 심리적 고통을 주며, 개인정보가 무단으로 공개되는 경우 프라이버시 침해도 우려되는 점입니다.</div></div><div class="concept-group-title">청소년활동·기관·시설·인증제도</div><div class="concept-item"><div class="concept-term">청소년 활동이란</div><div class="concept-def">청소년의 균형 있는 성장을 위해 필요한 활동으로 수련활동, 교류활동, 문화활동이 있다.<br>- 수련활동: 청소년이 활동에 자발적으로 참여해 필요한 역량을 기르는 교육적 체험활동<br>- 교류활동: 청소년이 지역, 남북, 국가 간 다양한 교류를 통해 공동체 의식을 기르는 체험활동<br>- 문화활동: 예술, 봉사 등을 통해 문화적 감성과 더불어 사는 능력을 함양하는 활동<br>핵심역량: 비판적 사고 / 창의적 사고 / 의사소통 / 사회정서 / 협업 / 진로개발 역량 (비창의사협진)<br>청소년이 길러야 할 능력, 급변하는 사회의 문제와 과제를 스스로 해결하며 성장을 돕는 역량</div></div><div class="concept-item"><div class="concept-term">청소년상담복지개발원</div><div class="concept-def">청소년상담복지센터와 학교 밖 청소년지원센터(꿈드림)를 총괄하는 기관<br>[청소년참여기구] =청소년자치기구<br>청소년특별회의: 국가 단위 청소년 참여기구, 청소년 정책이나 과업을 발굴<br>청소년참여위원회: 지자체 단위 청소년 참여기구, 청소년정책 의견을 촉진하기 위해 설립 (청소년기본법)<br>청소년운영위원회: 수련시설 단위 청소년 참여기구, 청소년PG 자문이나 평가 (청소년 활동진흥법)<br>[청소년 수련/이용시설] : 청소년활동진흥법<br>*수련활동 3요소: 수련거리(프로그램), 수련시설, 청소년지도사<br>청소년수련관: 다양한 수련거리 실시할 수 있는 설비 갖춘 종합수련시설 (시군구 1개 이상)<br>청소년수련원: 숙박기능 갖춘 생활관과 수련거리 실시할 수 있는 설비 갖춘 종합수련시설<br>청소년문화의집: 간단한 수련활동 실시할 수 있는 설비 갖춘 문화, 예술중심 지역 수련시설 (읍면동 1개)<br>청소년특화시설: 직업체험, 과학정보 등 특정 목적의 활동을 전문적으로 실시하는 시설<br>청소년야영장: 야영에 적합한 시설을 갖추고, 편의를 제공하는 수련시설<br>유스호텔: 청소년 숙박에 적합한 시설로 숙식편의제공, 여행 활동지원 기능하는 시설</div></div><div class="concept-item"><div class="concept-term">청소년 수련/이용시설 청지사 인원</div><div class="concept-def">청소년수련관: 청지사 4명 + 1급 한명 포함 + 추가 250명 마다 1명<br>청소년수련원: 청지사 2명 + 500명 추가당 1급 한명<br>청소년특화시설: 청지사 2명<br>유스호텔: 청지사 1명 + 추가 250명당 1~2급 1명</div></div><div class="concept-item"><div class="concept-term">국립청소년수련원 6곳</div><div class="concept-def">국립중앙청소년수련원(천안), 국립평창청소년수련원(평창), 국립청소년바이오생명센터(김제)</div></div><div class="concept-item"><div class="concept-term">한국청소년활동진흥원</div><div class="concept-def">청소년정책 담당 여가부 산하 준정부기관<br>청소년활동운영: 청소년수련활동인증제, 국제청소년성취포상제, 두볼<br>청소년지도자양성: 자격검정 및 자격연수, 보수교육<br>청소년지원사업: 청소년방과후아카데미</div></div><div class="concept-item"><div class="concept-term">청소년수련활동인증제</div><div class="concept-def">국가가 청소년 수련활동 인증하여 유지, 관리, 제공하는 국가 인증제도<br>특징: 서면 인증, PG인증, 사전인증<br>신청할 수 있는 대상: 청소년수련활동에 필요한 PG개발 및 실시하려는 자<br>신청해야 하는 대상: 청소년 참가인원 150명 이상 / 위험도 높은 활동<br>유형: 기본형: 2시간 이상 PG / 숙박형 / 이동형: 이동+숙박 / 학교단체숙박형</div></div><div class="concept-item"><div class="concept-term">청소년수련활동신고제</div><div class="concept-def">청소년활동에서 위험활동<br>만 19세 미만 청소년들을 대상으로 하는 위험한 수련활동을 미리 신고하도록 하는 제도(모집 14일 전)<br>신고대상: 숙박하는 활동, 위험도 높은 활동(클라이밍, 장거리 걷기, 수상활동 등)<br>문제점: 실효성의 문제 / 신고가 이루어져도 실제 활동 중 발생하는 위험요소를 사전에 예방하기 어려움</div></div><div class="concept-item"><div class="concept-term">국제청소년성취포상제</div><div class="concept-def">영국 에딘버러에 의해 설립된 자기 성장 프로그램 / 대상: 만14~24세<br>활동영역: 봉사, 자기개발, 신체단련, 탐험, 합숙활동 &gt; 포상: 동장(6m), 은장(1y), 금장(18m)</div></div><div class="concept-item"><div class="concept-term">청소년어울림마당</div><div class="concept-def">문화, 예술, 스포츠 등 청소년이 펼치는 장으로 지역사회자원이 결합 된 공간으로 연 10회 이상 실시</div></div><div class="concept-item"><div class="concept-term">청소년방과후아카데미</div><div class="concept-def">초4~중3 청소년 대상으로 청소년들의 건강한 방과 후 생활과 삶의 질 향상을 위한 국가 지원사업. 학교와 가정에서 할 수 없던 체험 위주 프로그램으로 운영됨<br>문제점: 제한적인 PG으로 다양한 관심사 가진 청소년들 지원 어려움 &gt; 적극적인 홍보 및 조사를 통해 다양한 관심사, 필요를 반영한 맞춤형 PG개발</div></div><div class="concept-item"><div class="concept-term">청소년복지지원시설</div><div class="concept-def">청소년쉼터: 가정 밖 청소년을 임시 보호하는 쉼터<br>임시쉼터: 1~7일 이내 / 음식 등 기본서비스 제공<br>단기쉼터: 3개월 이내 / 상담, 치료, 예방활동, 의식주, 의료지원<br>중장기쉼터: 3년 이내, 4년까지 연장 가능 / 학업, 자립 지원<br>청소년 회복지원시설: 위탁처분 받은 청소년을 보호자 대신하여 보호하는 곳<br>청소년 자립지원관: 쉼터, 회복지원에도 학교와 가정으로 복귀하지 못한 청소년 자립 능력, 여건 만듦<br>청소년 치료재활센터: 정서, 행동적으로 어려운 청소년에게 적합한 치료와 재활하는 거주형 시설</div></div><div class="concept-item"><div class="concept-term">청소년증</div><div class="concept-def">만 9-18세 이하 청소년에게 학생과 상관없이 본인임을 증명하는 공적인 신분증</div></div><div class="concept-item"><div class="concept-term">학교 밖 청소년 지원사업</div><div class="concept-def">해밀: 학업복귀 PG / 상담과 맞춤 학습으로 학습 역량 향상시켜 학업에 복귀<br>두드림: 취업준비 PG / 자립준비과정에서 자립기술 습득과 학습역량 향상하여 사회진입 도움</div></div><div class="concept-item"><div class="concept-term">프로그램 개발 절차와 단계별 특징</div><div class="concept-def">기획: 요구분석과 프로그램의 기본방향 설정<br>설계: 프로그램 내용 선정, 체계화<br>마케팅: 대상에게 참여를 유도, 홍보<br>실행: 프로그램을 실제 진행<br>평가: 프로그램이 목표, 목적에 맞게 잘 시행되었는지 평가, 피드백<br>[마케팅 전략] STP전략: 청소년집단 세분화, 표적집단 설정, 표적집단에 대한 차별화</div></div><div class="concept-item"><div class="concept-term">프로그램 요구분석 실행절차</div><div class="concept-def">상황분석 &gt; 목적설정 &gt; 정보출처 확인 &gt; 분석도구 선정 &gt; 분석계획 &gt; 분석실행 &gt; 결과 분석</div></div><div class="concept-item"><div class="concept-term">청소년 프로그램개발 패러다임</div><div class="concept-def">실증주의 패러다임: 객관적으로 존재하는 지식을 pg참여자에게 전달하는 기계론적 교육관에 초점<br>구성주의 패러다임: 지식을 인간의 감각적 경험으로 보며, 학습자의 행위와 자율적 참여를 강조<br>비판주의 패러다임: 지식을 사회적 구성물로 보며, 학습자가 임파워먼트를 회복하는 것을 강조</div></div><div class="concept-group-title">발달심리·상담이론</div><div class="concept-item"><div class="concept-term">청소년 문화 특징</div><div class="concept-def">행동 방식, 사고가 기성세대와 구분됨<br>청소년 문화의 성격은 개인주의, 자기표현주의적 / 속성: 또래끼리 공유되는 문화, 빠르게 변화함</div></div><div class="concept-item"><div class="concept-term">청소년 문화와 기성세대 차이점, 배울점</div><div class="concept-def">물질적 가치를 중시하는 기성세대와 다르게 정보화 세대인 청소년은 문화적 가치를 중요시하고 자기표현에 거침없다는 차이점이 있습니다.</div></div><div class="concept-item"><div class="concept-term">PBL</div><div class="concept-def">문제 기반 학습<br>문제를 활용하여 학습자 중심으로 학습을 진행하는 교수 학습 방법입니다. (ex. 자기주도적 학습)</div></div><div class="concept-item"><div class="concept-term">자유학기제란</div><div class="concept-def">중학교 한 학기 동안 학생들이 시험 부담에서 벗어나 토론, 실습 중심 참여형 수업을 통해 진로 탐색</div></div><div class="concept-item"><div class="concept-term">창의적 체험활동</div><div class="concept-def">자율활동, 동아리활동, 봉사활동, 진로활동 (자동봉진)<br>교과와 상호보완적인 관계 속에서 심신을 조화롭게 발달시키기 위한 교과 이외의 활동</div></div><div class="concept-item"><div class="concept-term">청소년상담 특징</div><div class="concept-def">청소년 상담 시 가족, 또래, 학교 등 청소년과 밀접한 관련이 있는 주위 환경에 대한 개입이 필요합니다.</div></div><div class="concept-item"><div class="concept-term">청소년기 사회인지적 특성: 개인적 우화, 상상적 청중, 자아중심성</div><div class="concept-def">개인적 우화: 자신이 가장 특별한 존재라 생각하는 것. 위험한 행동도 서슴없이, 타인은 나를 이해x<br>상상적 청중: 모든 사람이 자신에게 집중하고 있다고 생각하는 것<br>자아중심성: 자기중심적 편협한 이상주의적 경향을 보임</div></div><div class="concept-item"><div class="concept-term">청소년의 발달 특징</div><div class="concept-def">신체적: 2차 성장, 신체 성장이 급격히 일어남<br>심리적: 자아중심적 사고(개인적 우화, 상상적 청중) / 정서적: 불안, 스트레스 등 감정의 양가성</div></div><div class="concept-item"><div class="concept-term">피아제 인지발달이론</div><div class="concept-def">감각운동기 &gt; 전조작기 &gt; 구체적조작기 &gt; 형식적조작기<br>청소년기는 형식적조작기에 해당되며 이 시기는 추상적 사고와 추론이 가능해집니다. 또한 새로운 상황에 직면했을 때 과거 자신의 경험을 이용할 수 있습니다.</div></div><div class="concept-item"><div class="concept-term">에릭슨 청신분석발달 8단계</div><div class="concept-def">구강기 &gt; 항문기 &gt; 운동기 &gt; 잠재기 &gt; 사춘기 &gt; 청년기 &gt; 중년기 &gt; 성숙기<br>청소년기는 5단계의 사춘기(12-18세)에 해당되며 자아정체감 vs 역할혼돈 / 친구 관계 중요</div></div><div class="concept-item"><div class="concept-term">마샤</div><div class="concept-def">위기와 전념을 기준으로 정체성 지위 분류<br>정체감 혼란: 정체성 지위 중 가장 낮은 단계 / 삶의 방향, 목표X 충동적임<br>정체감 유실: 정체성 위기 경험X, 참여경험O / 부모 권위에 순종적이며 정체성 형성을 위한 노력X<br>정체감 유예: 정체성 위기 경험하며 확립을 위해 노력하는 단계 / 정체감 확립을 위한 노력은 하지만 결정 못하고 있는 상태<br>정체감 성취: 정체성 위기 경험 후 정체성 확립한 단계 / 삶의 방향 분명, 자존감 높음, ST 저항력 높음</div></div><div class="concept-item"><div class="concept-term">자아 정체감이란, 중요한 이유</div><div class="concept-def">자아 정체감: 자아 개념이 발달하여 구체적인 의식으로 자신의 독특성을 자각한 상태를 말합니다. 진정한 자기를 찾기 위한 노력의 과정에서 자아 정체감을 형성하게 됩니다.</div></div><div class="concept-item"><div class="concept-term">또래문화</div><div class="concept-def">또래 집단끼리 공유하는 생활양식을 뜻한다. 또래문화로 갈등 해결 및 이해하는 마음을 배운다.</div></div><div class="concept-item"><div class="concept-term">낙인이론</div><div class="concept-def">사회적 규범을 위반했을 때 받는 부정적 평가와 그로 인한 자아 정체성의 변화를 말합니다.</div></div><div class="concept-group-title">위기청소년·보호지원제도</div><div class="concept-item"><div class="concept-term">학교폭력 대책을 어떻게 할 것</div><div class="concept-def">학교폭력은 은폐하거나 축소하려 하면 안 되고 섣불리 화해를 종용해서도 안됩니다. 학교폭력 사안은 학교폭력 대책위원회에 회부해야 하기 때문에 담임교사에게 전달하고 성폭력이 의심되는 경우는 수사기관에 신고해야 합니다.</div></div><div class="concept-item"><div class="concept-term">디지털 리터러시</div><div class="concept-def">디지털 환경에서 정보 형태를 이해하고 활용할 수 있는 통합적 문해능력</div></div><div class="concept-item"><div class="concept-term">인터넷 중독 청소년에 대한 지도방안</div><div class="concept-def">디지털 문화가 활성화되는 시대에 맞춰 '디지털 리터러시' 교육도 활발히 이루어졌으면 합니다. 정규교육 과정 수업이 이루어지면 좋겠지만 못한 경우는 청소년 시설에서 정기적인 교육을 진행했으면 합니다.</div></div><div class="concept-item"><div class="concept-term">청소년 동반자 YC</div><div class="concept-def">위기청소년을 전문가가 직접 찾아가 지속적 관계를 맺으며 상담 및 프로그램 지속하는 것. 만 9~24세 청소년 대상이며, 청소년동반자는 청소년상담 분야에서 전문 자격을 얻어야 한다.</div></div><div class="concept-item"><div class="concept-term">청소년 안전망 Cys-net</div><div class="concept-def">청소년들의 위기문제나 심리정서적 도움이 필요한 경우 해결할 수 있는 맞춤형 서비스를 제공하는 것. 청소년상담복지센터 통해 원스톱으로 지원한다.</div></div><div class="concept-item"><div class="concept-term">청소년 스스로 지킴이 YP</div><div class="concept-def">청소년들이 자신과 또래를 보호하고 지원하기 위해 만들어진 PG. 청소년이 자신을 보호하는 방법과 기술을 배우며, 또래 간의 지지 체계를 구축하여 서로를 돕고 지지할 수 있는 문화를 형성합니다.</div></div><div class="concept-item"><div class="concept-term">wee 프로젝트</div><div class="concept-def">3단계 구성<br>위클래스: 학교 내에 부적응 학생을 조기 발견, 예방하는 역할<br>위센터: 시, 도, 지역 교육청에서 전문가의 관리 필요한 학생을 지원하는 통합지원 서비스망<br>위스쿨: 시도 교육청 차원에서 설치되어 고위기군 학생을 위한 장기위탁교육 서비스 제공</div></div><div class="concept-item"><div class="concept-term">i will center</div><div class="concept-def">인터넷중독예방상담센터 / 청소년을 위한 인터넷, 스마트폰 과의존 예방 상담 기관</div></div><div class="concept-item"><div class="concept-term">사이버볼링 / 개선방안</div><div class="concept-def">문자, SNS계정 메시지로 협박 및 따돌림을 하는 것. 스마트폰이 있다면 당할 수 있고 피해의 굴레에서 벗어나기 어렵기에 가장 먼저 해소해야 할 청소년 폭력 중 하나이다.</div></div><div class="concept-item"><div class="concept-term">위기청소년 + 시급한 대책</div><div class="concept-def">위기청소년: 보호자가 없거나, 실질적으로 보호자의 보호 받지 못하는 사회, 경제적 어려움 있는 청소년</div></div><div class="concept-item"><div class="concept-term">학교 밖 청소년 지도</div><div class="concept-def">사랑과 신뢰, 존중을 토대로 지도할 것입니다. 학교 밖 청소년의 약점과 문제 보다는 청소년이 가지고 있는 강점을 중점으로 지도할 것입니다.</div></div><div class="concept-item"><div class="concept-term">학업 중단 청소년</div><div class="concept-def">학교 정규 교육과정을 마치기 전에 이전에 자의 또는 타의로 학교를 그만둔 청소년</div></div><div class="concept-item"><div class="concept-term">학업 중단 숙려제도</div><div class="concept-def">학업을 중단하고자 하는 청소년에게 학교장 권한으로 2-3주 숙려기간을 주어, 그 사이 청소년pg과 상담 제공하여 학업중단을 예방하는 제도입니다.</div></div><div class="concept-item"><div class="concept-term">비자발적 청소년에 대한 청소년활동 지도방안</div><div class="concept-def">기관에 방문한 것 자체에 대한 인정과 고마움을 먼저 드러낼 것 같습니다. 이후 관심사나 취미를 파악하여 그에 맞는 활동을 제안하고 스스로 선택할 기회를 제공하는 등 자발적인 참여를 유도할 것입니다.</div></div><div class="concept-item"><div class="concept-term">가정 밖 청소년 지도</div><div class="concept-def">가정 밖 청소년은 대인관계의 어려움을 느끼고 비판, 무시당하는 것에 쉽게 분노하는 특징이 있습니다. 상담을 통해 가정 밖 청소년들의 심리, 건강 상태를 확인하고 쉼터 연계 및 교육을 통한 가정복귀, 자립환경 조성을 위한 노력이 필요합니다.</div></div><div class="concept-item"><div class="concept-term">성폭력피해청소년 대처방안</div><div class="concept-def">성폭력 피해 학생이나 가정에서 해결하지 않고 전문기관에 도움을 받도록 해야 합니다. 2차 피해와 잠재적 피해자를 방지하기 위해 피해사실을 전문시설에 알리는 것이 필요합니다. (e. 해바라기센터)</div></div><div class="concept-item"><div class="concept-term">학교폭력 원인</div><div class="concept-def">신체폭력, 언어폭력, 금품갈취, 따돌림, 성폭력<br>개인 심리적 요인: 자아 통제력 및 타인 존중 의식x / 가정적 원인: 가정내 교육 부재, 과잉보호</div></div><div class="concept-item"><div class="concept-term">학교폭력 문제의 대안</div><div class="concept-def">학교폭력이 일어나기 전 다양한 예방 pg을 적극적으로 실시하는 것이 필요합니다. 그럼에도 학교폭력이 발생한다면 피해자 중심도 필요하지만 가해자 대상 프로그램도 운영하는 것이 필요하다고 생각합니다.</div></div><div class="concept-item"><div class="concept-term">그루밍 성범죄</div><div class="concept-def">잠재적 가해자가 성적 착취를 목적으로 청소년과 친밀한 관계를 만드는 수법</div></div><div class="concept-item"><div class="concept-term">청소년 중독(도박, 약물, 인터넷)의 원인과 개선방안, 지도방안</div><div class="concept-def">청소년 시기 정서적 불안정과 스트레스 해소를 위해 중독 행위에 의존할 수 있습니다. 또는 또래 영향, 디지털 기기 보편화로 청소년들이 쉽게 중독에 노출될 수 있는 환경을 제공합니다. 중독은 예방 또는 사후관리가 중요하다고 생각합니다. 청소년들에게 중독의 위험성과 그 결과를 교육하거나 중독 행위에 의지하지 않고 스포츠, 예술은 건전한 활동으로 긍정적 경험을 제공할 것입니다.</div></div><div class="concept-item"><div class="concept-term">디지털 시대 청소년의 특성</div><div class="concept-def">청소년들은 SNS를 통해 새로운 방식으로 자아를 표현하는 점에서 긍정적이나 방대한 양의 정보에 노출되면서, 정보의 진위를 판단하는 능력이 우려된다는 특성이 있습니다.</div></div><div class="concept-item"><div class="concept-term">청소년 언어문화</div><div class="concept-def">장점: 언어는 청소년들만의 또래집단의 유대감을 강화시킨다. 단점: 은어, 신조어 사용이 일정 정도를 넘어가면 악영향을 미칠 수 있기 때문에 적절한 선의 교육 필요<br>개선방안: 청소년이 올바른 언어를 사용할 수 있도록 글쓰기, 토론, 발표 활동으로 표현력 향상</div></div><div class="concept-item"><div class="concept-term">다문화 청소년</div><div class="concept-def">다문화 청소년: 국제결혼으로 인해 이루어진 가정의 자녀<br>이주배경 청소년: 이주하여 학업, 사회의 적응을 어려워하는 다문화 청소년<br>중도입국 청소년: 결혼이민자 자녀가 해외에서 성장하다 청소년기 입국한 경우</div></div><div class="concept-item"><div class="concept-term">은둔형 청소년</div><div class="concept-def">다양한 요인으로 외부와 단절된 상태로 한정된 공간에서 생활하는 청소년</div></div><div class="concept-item"><div class="concept-term">영케어러</div><div class="concept-def">장애, 질병 등 문제를 가진 가족을 돌보는 청소년</div></div><div class="concept-group-title">청소년지도사 직업론</div><div class="concept-item"><div class="concept-term">청소년 지도사란, 자격검정 근거</div><div class="concept-def">청소년지도자: 청소년 시설, 단체, 관련 기관 등에서 청소년 육성 및 지도 업무에 종사하는 사람<br>청소년기본법 21조에 따라 자격검정에 합격 및 연수 과정을 마친 사람에게 부여되는 자격</div></div><div class="concept-item"><div class="concept-term">학교교사와 청소년지도사의 공통점과 차이점</div><div class="concept-def">교사: 일정 자격을 가지고 학생을 가르치는 사람, 선생님을 뜻함<br>공통점: 두 직업 모두 청소년의 건강한 발달과 성장 지원에 중점을 둔다. 차이점: 학교와 청소년 시설의 근무 환경 / 교사 자격증과 청소년 관련 전공, 자격증 등 자격 요건</div></div><div class="concept-item"><div class="concept-term">청소년지도사가 되고 싶은 동기와 앞으로 계획, 일하고 싶은 곳</div><div class="concept-def">저의 청소년 시기를 돌아보았을 때도 굉장히 혼란스럽고 특히 꿈과 진로에 대한 고민이 많았던 시기였습니다. 그런 청소년들이 자신의 꿈과 삶을 주체적으로 이끌어 나아갈 때 함께 고민하고 격려하며 건강한 가치관으로 자랄 수 있도록 지지할 수 있는 청소년 지도자가 되고 싶습니다.</div></div><div class="concept-item"><div class="concept-term">청소년지도사가 되기 위해 한 노력</div><div class="concept-def">다양한 청소년 대상을 만나기 위해 노력했습니다. 그중 취약계층 청소년 대상 멘토링을 했던 경험이 있습니다. 당시 방황하는 청소년들을 직접 보고 가르치며, 그들에게 가장 먼저 필요한 것은 '관심'이라고 느꼈습니다. 그리고 관심과 적극적인 지지는 성장으로 이어짐을 경험하며, 긍정적인 영향을 줄 수 있는 청소년 지도사에 대한 비전도 키울 수 있었습니다.</div></div><div class="concept-item"><div class="concept-term">청소년지도사가 가져야할 덕목</div><div class="concept-def">청소년 지도사는 긍정적인 시각을 가져야 한다고 생각합니다. 청소년의 건전한 성장을 위해 어떠한 이유에서도 차별하지 않고 획일적인 지도보다 다양하고 청소년 각자에게 알맞은 방법을 연구해야 합니다.</div></div><div class="concept-item"><div class="concept-term">청소년 지도사의 사명, 좌우명 / 청소년이 바라는 청소년지도자는?</div><div class="concept-def">청소년을 동등한 인격체로 먼저 존중하는 것. 청소년이라는 이유로 차별받고 이끌어 주기만 하는 존재가 아니라 청소년이 사회구성원으로 당당히 성장할 수 있도록 자체로 먼저 존중해줄 수 있어야 한다.</div></div><div class="concept-item"><div class="concept-term">청소년지도사로서의 자신만의 철학</div><div class="concept-def">청소년 지도사가 된다면 입은 무겁고 엉덩이는 가벼운 사람이 되고 싶습니다. 상담의 역할 수행할 때 귀는 열려있지만 입은 무겁고 프로그램 진행을 위해 가벼운 엉덩이로 현장을 누비며 청소년들에게 긍정적인 영향을 미치는 프로그램을 제공하고 싶습니다.</div></div><div class="concept-item"><div class="concept-term">청소년에 대한 사회 부정적 시각 극복방안</div><div class="concept-def">청소년 참여 기회를 확대하는 것입니다. 청소년이 지역사회 문제해결에 참여하고 활동할 기회를 제공하여, 사회적 기여를 통해 긍정적 이미지를 형성할 수 있습니다.</div></div><div class="concept-item"><div class="concept-term">청소년지도사에게 필요한 역량</div><div class="concept-def">활동 설계, 활동 실행, 행정 수행, 팀워크, 전문성 개발 5가지의 역량<br>가장 중요하게 생각하는 역량은 활동 설계 &gt; 청소년 특성을 반영, 현실 가능한 프로그램 설계</div></div><div class="concept-item"><div class="concept-term">청소년지도사로서의 나의 장점과 단점은</div><div class="concept-def">장점: 강한 책임감 / 저의 책임감 있는 모습은 청소년pg 진행 시 처음부터 끝까지 적극적이고 밝은 모습으로 임하게 하고 이런 점은 청소년에게 긍정적인 모델링이 될 수 있다고 생각합니다. 단점: 깊은 감정이입 / 힘든 청소년을 대할 때 감정에 깊이 빠지는 경우도 있습니다. 이러한 점은 청소년에게 진실성 있는 모습으로 보여질 수 있지만 저의 업무까지 전이되지 않도록 글쓰기, 명상을 통해 감정조절을 위한 노력을 하고 있습니다.</div></div><div class="concept-item"><div class="concept-term">의견충돌, 활동 방해, 규칙X 청소년의 경우 해결</div><div class="concept-def">가장 먼저 청소년도 성인과 같은 인격체임을 다시 세기고 대하고 싶습니다. 청소년 당사자에게 불편한 것이 무엇인지, 반항하는 이유는 무엇인지 경청하고 확인하여 조치할 것 같습니다. 다만 동일한 상황이 지속적으로 발생한다면, 활동 참여 의사 여부와 활동 원칙을 함께 검토하여 조치해야 할 것 같습니다.</div></div><div class="concept-item"><div class="concept-term">청소년지도사의 사회적 책임과 의무</div><div class="concept-def">청소년 지도사는 다음 세대 중심인 청소년을 건강한 인격체로 성장할 수 있도록 지도해야 합니다. 또한 사회적 목표를 습득하고 미래의 시민으로 맡은 역할을 할 수 있도록 돕는 사회적 책임이 있습니다.</div></div><div class="concept-item"><div class="concept-term">청소년 지도 방법/어떻게 지도할 것</div><div class="concept-def">자기주도적 원리: 청소년이 활동 주체가 되어 선택하고 결정할 수 있도록 하는 지도<br>자율참여 원리: 청소년이 스스로 결정하고 자유의지에 따라 청소년활동에 참가하는 것</div></div><div class="concept-item"><div class="concept-term">청소년지도에 활용할만한 개인적 특기</div><div class="concept-def">저는 스펀지 같은 사람입니다. 필요에 의해 빠르게 흡수하고 방출할 수 있습니다. 이러한 점은 빠르게 변화하는 청소년들의 문화를 이해하고 같은 눈높이에서 소통할 수 있는 특기라고 생각합니다.</div></div><div class="concept-item"><div class="concept-term">취약계층 청소년을 / 학교 밖 청소년 대상으로 프로그램을 개발</div><div class="concept-def">청소년들 욕구 반영한 pg개발하여 제공하는 것이 맞는 순서이지만, 제가 개인적으로 진행할 수 있다면 진로개발과 자립지원을 중심으로한 멘토링 프로그램을 진행하고 싶습니다. 전문적인 조언을 통해 청소년이 자신의 미래를 스스로 설계할 수 있도록 기획하고 싶습니다.</div></div><div class="concept-item"><div class="concept-term">청소년을 상대로 강연을 한다면?</div><div class="concept-def">청소년들이 겪는 혼란스러움이 자연스러운 현상임을 설명하고 싶습니다. 청소년기에 반항적이고 폭력적인 모습을 가지게 되는 현상을 이해시키고 그에 맞는 지도 방법을 고민하는 강연을 하고 싶습니다.</div></div></div>`, items:[]},
  {title:"Ⅰ. 지원동기·자질·직업윤리", items:[
    ["청소년지도사가 되려는 이유와 앞으로 어떤 분야에서 일하고 싶은지 말씀해 보세요.","저는 청소년이 자신의 강점과 가능성을 발견하고, 다양한 경험을 통해 성장하도록 돕고 싶어 청소년지도사를 준비했습니다. 상담이 청소년의 어려움을 이해하고 회복을 돕는 과정이라면, 청소년활동은 참여와 체험을 통해 역량과 사회성을 키우는 과정이라고 생각합니다. 저는 상담과 진로지원의 전문성을 청소년활동과 연결하여 청소년의 심리적 성장뿐 아니라 진로개발과 사회참여까지 지원하고 싶습니다. 특히 학교 밖 청소년이나 진로를 결정하지 못한 청소년을 위한 자기이해·직업체험·프로젝트 활동에 관심이 있습니다.",0],
    ["청소년지도사의 역할과 바람직한 청소년지도사의 모습은 무엇이라고 생각하나요?","청소년지도사는 프로그램을 단순히 진행하는 사람이 아니라 청소년의 성장을 지원하는 전문인력이라고 생각합니다. 청소년의 발달 특성과 욕구를 이해하고, 수련·문화·교류·참여활동을 기획하고 운영해야 합니다. 바람직한 지도사는 청소년을 통제하거나 정답을 제시하기보다 청소년이 스스로 선택하고 참여하도록 돕는 촉진자여야 합니다. 또한 안전과 윤리를 지키고 필요한 경우 상담·복지·의료기관과 협력할 수 있어야 합니다.",0],
    ["청소년지도사에게 가장 필요한 자질과 역량은 무엇인가요?","가장 중요한 자질은 청소년을 독립된 인격체로 존중하는 태도라고 생각합니다. 청소년의 의견을 경청하고 선택할 기회를 제공해야 신뢰관계와 자발적인 참여가 형성될 수 있습니다. 여기에 공감적 의사소통, 책임감, 프로그램 기획능력, 안전관리 능력, 위기상황 대처능력이 필요합니다. 또한 변화하는 청소년 환경을 이해하기 위해 지속적으로 공부하는 전문성도 중요합니다.",0],
    ["청소년지도자와 청소년지도사의 차이를 설명해 보세요.","청소년지도자는 청소년활동, 보호, 복지, 상담 등의 영역에서 청소년을 지도하고 지원하는 사람을 넓게 지칭하는 개념입니다. 청소년지도사는 국가자격을 취득하고 청소년활동 현장에서 전문적으로 활동하는 청소년지도자입니다. 따라서 청소년지도사는 청소년지도자라는 넓은 범주에 포함되는 구체적인 전문인력이라고 이해하고 있습니다.",0],
    ["청소년지도사와 청소년상담사의 차이와 협력방안을 설명해 보세요.","청소년지도사는 수련활동, 문화활동, 교류활동, 참여활동 등을 통해 청소년의 역량과 사회성을 키우는 역할을 합니다. 청소년상담사는 심리적 어려움이나 학교·가족·진로 문제를 상담과 심리적 개입을 통해 지원합니다. 역할은 다르지만 청소년의 건강한 성장을 지원한다는 목적은 같습니다. 활동 중 심리적 위기가 발견되면 상담기관에 연계하고, 상담과정에서 활동 경험이 필요한 청소년에게는 적절한 프로그램을 연결하는 방식으로 협력할 수 있습니다.",0],
    ["청소년을 지도할 때 가장 중요하게 지켜야 할 윤리는 무엇인가요?","청소년의 인권과 존엄성, 개인정보와 사생활을 존중하는 것이 가장 중요합니다. 지도자의 가치관을 강요하거나 청소년을 차별해서는 안 되며, 사적인 관계가 형성되지 않도록 전문적 경계를 지켜야 합니다. 상담이나 대화 내용을 함부로 공개해서도 안 됩니다. 다만 자해·자살·학대·성폭력처럼 청소년의 생명과 안전에 위험이 있는 경우에는 비밀보장의 한계를 설명하고 보호자와 책임자, 전문기관에 알려야 합니다.",0],
    ["자신의 강점과 부족한 점이 청소년지도사 업무에 어떤 영향을 줄 수 있나요?","저의 강점은 청소년의 행동만 판단하지 않고 그 행동의 원인과 감정, 욕구를 함께 이해하려는 태도입니다. 상담과 직업상담을 공부해 정서문제와 진로문제를 통합적으로 바라볼 수 있고, 맡은 일은 끝까지 책임지려는 편입니다. 다만 도움을 주고 싶은 마음이 앞서 설명이나 개입이 길어질 수 있습니다. 현장에서는 청소년의 이야기를 먼저 충분히 듣고, 지도자의 판단보다 청소년에게 실제로 필요한 만큼 개입하도록 조절하겠습니다.",0],
    ["청소년지도사가 사회에 필요한 이유?","가정·학교만으로는 채워지지 않는 '세 번째 어른'이 필요하기 때문입니다. 청소년의 위험을 예방하고 보호하는 안전망이 되기 때문이며, 청소년이 '나로 살 수 있는' 길을 안내해주는 존재이기 때문입니다. 한 사람의 인생을 바꿀 수 있는 어른이며, 그 한 사람이 세상을 더 나은 방향으로 바꿀 수 있기에 필요합니다.",1],
    ["친구가 \\\"너 청지사라며, 청지사가 뭐야?\\\" 라고 물었을때 어떻게 대답할 것인지?","청지사는 청소년지도사를 줄인 말로, 청소년이 건강하게 성장하도록 돕는 일을 하는 전문 직업입니다. 구체적으로는 청소년 활동 기획, 교육, 상담, 안전 지도 등을 하고, 청소년이 사회적·정서적·신체적으로 균형 있게 발달할 수 있도록 지원합니다. 쉽게 말하면 청소년의 성장 코치이자 안전과 권리를 지켜주는 지도자라고 생각하면 이해하기 쉬워요.",1],
    ["청소년지도사의 처우개선을 위해선 어떤 방법이 좋을지?","청소년지도사의 처우개선을 위해서는 먼저 급여와 근무환경 개선이 필요합니다. 전문직으로서 역할과 책임에 맞는 적정 보상을 제공하고, 근무시간과 휴게, 복지 혜택을 강화해야 합니다. 또한 승진과 경력 개발 기회를 확대하여 장기적 직업 안정성을 보장하고, 교육·연수 지원을 통해 전문성을 강화하며 사회적 인식을 높이는 것도 중요합니다. 마지막으로, 법적·제도적 권한과 지위 명확화를 통해 지도사가 청소년 지도 현장에서 안정적으로 활동할 수 있도록 해야 합니다.",1],
    ["사회복지사와 청소년지도사의 차이점?","사회복지사와 청소년지도사는 모두 복지와 지원 업무를 수행하지만 대상과 역할에서 차이가 있습니다. 사회복지사는 아동, 청소년, 성인, 노인 등 모든 계층을 대상으로 사회적·경제적 문제 해결과 복지 서비스 제공에 초점을 둡니다. 반면 청소년지도사는 청소년을 주 대상으로 하여 성장과 발달, 참여와 보호를 지원하는 전문직입니다. 또한 청소년지도사는 프로그램 기획, 활동 운영, 체험과 학습 지원 등 현장 중심 활동이 강하며, 지도·상담·교육 기능을 포괄적으로 수행합니다.",1],
    ["청지사와 교수가 협업하여 업무를 수행할 때 필요한 것은?","청소년지도사와 교수가 협업할 때는 먼저 각자의 전문성을 살린 명확한 역할 분담이 필요합니다. 지도사는 현장에서 청소년 특성을 이해하고 프로그램을 운영하며, 교수는 이론적 지식과 연구·평가를 제공합니다. 또한 정기적인 소통과 피드백 체계를 통해 의견을 조율하고, 공동 목표를 명확히 설정해야 합니다. 협업 과정에서 서로의 전문성을 존중하고 신뢰를 바탕으로 활동을 수행하며, 종료 후 성과와 개선점을 공유하여 다음 활동에 반영하는 것이 중요합니다.",1],
    ["타 기관에서 더 큰 연봉을 제시하며 스카웃 제의가 온다면?","타 기관에서 더 높은 연봉으로 스카웃 제의가 온다면, 먼저 현재 소속 기관에서 맡고 있는 책임과 청소년을 위한 사명감을 고려합니다. 동시에 객관적으로 제안 내용을 비교하고, 필요한 경우 상사나 인사 담당자와 상의하여 합리적인 결정을 내립니다. 중요한 것은 금전적 유혹에 흔들리기보다는 전문성과 사명, 청소년에 대한 영향을 중심으로 판단하고, 장기적인 성장과 조직 기여를 고려하는 것입니다.",1],
    ["청소년지도사로서 상사에게 부당한 대우를 받을때 어떻게 대치할 것인가?","근무 중 상사에게 부당한 대우를 받을 경우, 먼저 상황을 구체적으로 기록하고 감정을 조절합니다. 이후 내부 고충처리나 인사 담당자 등 공식 절차를 통해 문제를 보고하고, 가능하면 상사와 건설적 대화를 통해 해결을 시도합니다. 필요 시 외부 기관에 상담을 요청할 수도 있습니다.",1],
    ["청소년을 바라보는 본인의 시각을 이야기 해 보세요","저는 청소년을 성숙해가는 주체적 존재로 보며, 그들의 잠재력과 권리를 존중하는 시각을 가지고 있습니다. 또한 청소년이 의견을 표현하고 선택할 수 있도록 참여를 보장하면서, 안전과 책임을 함께 지도하는 균형적 접근을 중요하게 생각합니다.",1]
  ]},
  {title:"Ⅱ. 청소년 이해", items:[
    ["「청소년기본법」상 청소년의 연령과 청소년을 바라보는 관점을 설명해 보세요.","「청소년기본법」상 청소년은 9세 이상 24세 이하인 사람입니다. 다만 개별 법률이나 사업에 따라 대상 연령이 다르게 정해질 수 있으므로 현장에서는 근거법과 사업기준을 함께 확인해야 합니다. 청소년은 보호와 지도가 필요한 존재이면서 동시에 자신의 삶에 대해 의견을 말하고 선택할 수 있는 권리의 주체라고 생각합니다.",0],
    ["청소년기의 주요 발달특성을 설명해 보세요.","청소년기는 신체적 성장과 함께 정체성, 가치관, 진로를 탐색하는 시기입니다. 또래관계의 영향력이 커지고 독립성과 자율성을 추구하지만 감정조절과 위험판단 능력은 아직 발달과정에 있습니다. 따라서 청소년의 감정변화나 반항을 곧바로 문제로 규정하기보다 발달과정과 환경을 함께 이해해야 합니다. 지도자는 명확한 기준을 제공하면서도 청소년의 선택과 참여를 존중해야 합니다.",0],
    ["청소년육성이란 무엇인가요?","청소년육성은 청소년활동을 지원하고 복지를 증진하며 근로청소년을 보호하는 것을 포함하는 포괄적인 개념입니다. 또한 사회환경을 청소년에게 유익하게 개선하고 유해환경으로부터 보호하여 청소년의 균형 있는 성장을 돕는 것을 의미합니다. 따라서 청소년육성은 단순한 교육이나 선도가 아니라 활동·복지·보호·환경개선을 함께 포함합니다.",0],
    ["청소년활동이란 무엇이며 왜 필요한가요?","청소년활동은 청소년의 균형 있는 성장을 위해 필요한 수련활동, 교류활동, 문화활동 등 다양한 체험활동을 말합니다. 청소년은 직접 경험하고 다른 사람과 협력하는 과정에서 자신의 강점과 역할을 발견합니다. 청소년활동은 학교교육만으로 충분히 경험하기 어려운 자율성, 창의성, 사회성, 문제해결능력, 시민성을 기를 수 있다는 점에서 필요합니다.",0],
    ["수련활동·교류활동·문화활동의 차이를 설명해 보세요.","수련활동은 체험을 통해 심신을 단련하고 공동체역량과 자기개발능력을 기르는 활동입니다. 교류활동은 다른 지역이나 국가, 세대와 만나 상호이해와 협력을 넓히는 활동입니다. 문화활동은 예술, 스포츠, 동아리, 미디어 등 다양한 문화를 경험하고 표현하는 활동입니다. 실제 프로그램에서는 세 영역이 서로 결합되어 운영될 수도 있습니다.",0],
    ["청소년 참여가 중요한 이유는 무엇인가요?","청소년은 자신의 삶과 관련된 정책과 프로그램에 의견을 제시할 권리가 있습니다. 참여과정에서 청소년은 의사소통, 협업, 문제해결, 민주적 의사결정과 책임을 배울 수 있습니다. 지도자가 모든 내용을 정해 제공하는 것보다 청소년이 직접 주제를 선택하고 기획과 운영에 참여할 때 활동의 의미와 효과가 커집니다.",0],
    ["청소년을 지도할 때 자율성과 규칙을 어떻게 조화시키겠습니까?","청소년에게 가능한 범위 안에서 선택권과 참여권을 충분히 제공하겠습니다. 다만 안전과 다른 사람의 권리를 침해하는 행동에는 명확한 기준과 한계를 알려야 합니다. 규칙을 일방적으로 지시하기보다 그 이유를 설명하고 청소년과 함께 규칙을 정하면 수용성이 높아질 수 있습니다. 자율성은 규칙이 없는 상태가 아니라 책임 있는 선택을 경험하도록 돕는 것이라고 생각합니다.",0],
    ["요즘 일반적으로 젊은 세대를 뭐라고 부를까요?(알파세대/엠지세대)?","Z세대(Gen Z)는 1997~2010년대 초반 출생으로 현재 10대 후반~20대 중반이며, 디지털 환경에서 태어나 '디지털 네이티브'라고 불리고 짧고 빠른 콘텐츠, 자기 표현, 다양성 존중을 중시합니다. 알파세대(Generation Alpha)는 2010년대 초반~2020년대 중반 출생으로 초등학생~중학생이며, 태어날 때부터 스마트폰·AI·알고리즘 기반 콘텐츠에 익숙하고 메타버스, AI와 함께 성장하는 첫 세대입니다. 그 밖에 2020년대 이후 AI와 함께 성장하는 세대 전반을 지칭하는 'AI세대'라는 표현도 점점 많아지고 있습니다. 현재 청소년과 청년은 주로 Z세대 또는 알파세대, 전체적으로는 MZ세대로 표현하는 것이 일반적입니다.",1],
    ["피아제의 인지발달 이론에 대해 설명하시오","피아제의 인지발달이론은 아동과 청소년이 세상을 이해하는 방식을 단계별로 발달한다고 보는 이론입니다. 그는 인지를 발달시키는 과정에서 스키마, 동화, 조절, 평형화라는 개념을 제시했습니다. 발달 단계는 감각운동기, 전조작기, 구체적 조작기, 형식적 조작기로 나뉘며, 청소년은 형식적 조작기에 해당해 추상적 사고와 가설 설정, 논리적 추론이 가능합니다. 따라서 지도사는 청소년의 추상적 사고 능력과 문제 해결 능력을 고려해 활동을 설계해야 합니다.",1],
    ["청소년 문화의 다양성에 대해 이야기 해 보세요","청소년문화의 다양성은 청소년들이 나이, 성별, 관심사, 사회적 배경 등에 따라 다양한 형태의 문화 활동을 경험하고 표현하는 것을 말합니다. 지도사는 이러한 다양성을 존중하며, 청소년이 자기 이해와 사회적 역량을 키울 수 있는 포용적 활동 환경을 제공해야 합니다.",1],
    ["자유학기제에 대해 설명해 보세요","자유학기제란 중학교 1학년 또는 2학년(학교마다 다름) 학생이 시험 부담을 줄이고 다양한 경험과 진로 탐색에 집중할 수 있도록 운영하는 학기를 말합니다. 평가도 프로젝트와 토론 중심으로 진행되며, 예술·체육·과학·진로 체험 등 다양한 활동이 포함됩니다.",1],
    ["자기비행 청소년에 대해 이야기 해 보세요","자기비행 청소년(self-destructive youth)은 자신에게 직접적인 피해를 주는 행동을 하는 청소년을 말합니다. 대표적으로 자해, 자살 시도, 약물 남용 등이 있으며, 지도사는 심리·정서 지원과 긍정적 자기표현 방법 제공, 전문 상담기관 연계, 안전 확보를 통해 개입해야 합니다.",1],
    ["청소년 참여권을 보장하기 위해 지도사가 해야할 일?","청소년 참여권을 보장하기 위해 지도사는 청소년이 자유롭게 의견을 표현할 수 있는 환경을 조성하고, 프로그램 기획과 운영 과정에 청소년을 참여시켜야 합니다. 또한 충분한 정보를 제공하고 의견이 실제로 반영되도록 피드백함으로써 실질적인 참여를 보장해야 합니다.",1],
    ["청소년 지위비행에 대해 설명하세요","청소년 지위 비행이란 성인이 하면 문제가 되지 않지만, 청소년이라는 연령과 지위 때문에 비행으로 간주되는 행동을 말합니다. 대표적으로 무단결석, 가출, 흡연과 음주 등이 이에 해당합니다.",1],
    ["자기방어기제 중 동일시에 대한 예시?","동일시는 불안이나 위협을 느낄 때 자신이 존경하거나 힘이 있다고 느끼는 대상의 행동이나 가치를 자기 것으로 받아들이는 방어기제입니다. 예를 들어, 청소년이 자신을 이해해 주는 지도사의 말투나 태도를 따라 하며 안정감을 얻는 경우가 이에 해당합니다. 동일시는 불안을 줄이기 위해 의미 있는 대상의 특성이나 행동을 자기 것으로 받아들이는 자기방어기제로, 권위자나 존경 대상과 자신을 동일하게 느끼려는 과정입니다.",1]
  ]},
  {title:"Ⅲ. 법·정책·제도", items:[
    ["청소년 관련 주요 법률과 각각의 역할을 설명해 보세요.","대표적으로 「청소년기본법」, 「청소년활동 진흥법」, 「청소년복지 지원법」, 「청소년보호법」이 있습니다. 「청소년기본법」은 청소년정책과 육성의 기본방향을 정하고, 「청소년활동 진흥법」은 청소년활동과 수련시설, 인증제, 신고제, 안전관리 등을 규정합니다. 「청소년복지 지원법」은 청소년의 복지증진과 위기청소년 지원체계를 다루며, 「청소년보호법」은 유해매체와 유해환경으로부터 청소년을 보호하는 데 중점을 둡니다. 이외에도 「학교 밖 청소년 지원에 관한 법률」과 「아동·청소년의 성보호에 관한 법률」 등이 있습니다.",0],
    ["「청소년기본법」과 「청소년활동 진흥법」의 차이는 무엇인가요?","「청소년기본법」은 청소년정책의 기본이념과 청소년육성의 방향, 국가와 지방자치단체의 책무 등을 정한 기본법입니다. 「청소년활동 진흥법」은 청소년활동, 수련시설, 지도자 배치, 인증제, 신고제, 안전관리 등 활동현장에서 필요한 구체적인 사항을 규정합니다. 기본법이 전체적인 방향과 원칙을 제시한다면 활동진흥법은 청소년활동의 실행기준을 제시한다고 설명할 수 있습니다.",0],
    ["청소년복지와 청소년보호의 차이를 설명해 보세요.","청소년복지는 청소년이 건강하게 성장하고 생활할 수 있도록 상담, 교육, 생활, 진로, 자립 등의 자원과 서비스를 제공하는 것입니다. 청소년보호는 유해매체, 유해업소, 폭력, 착취, 성범죄 등 위험요인을 예방하고 차단하는 데 중점을 둡니다. 복지가 필요한 지원을 제공하는 개념이라면 보호는 청소년에게 해를 미칠 수 있는 위험으로부터 안전을 확보하는 성격이 강합니다.",0],
    ["「학교 밖 청소년 지원에 관한 법률」의 목적과 주요 지원내용은 무엇인가요?","학교 밖 청소년이 소외되지 않고 건강하게 성장할 수 있도록 상담, 교육, 진로·직업체험, 취업, 자립, 건강 등을 지원하는 법률입니다. 지역의 학교밖청소년지원센터 꿈드림을 중심으로 검정고시, 학업복귀, 대안교육, 자격취득, 취업 등 청소년의 상황에 맞는 서비스를 제공합니다. 학교 밖 청소년을 단순한 학업중단자로 판단하지 않고 다양한 성장경로를 가진 청소년으로 존중하는 태도가 중요합니다.",0],
    ["제7차 청소년정책 기본계획의 기간과 주요 방향을 설명해 보세요.","제7차 청소년정책 기본계획은 2023년부터 2027년까지 적용되는 국가의 5개년 청소년정책 계획입니다. 디지털 환경 변화에 대응하고 청소년의 참여와 권리를 확대하며, 청소년활동·복지·보호 체계를 강화하는 내용을 담고 있습니다. 청소년을 정책의 수혜자에 머물게 하지 않고 정책을 함께 만드는 주체로 인정하는 방향이 중요하다고 생각합니다.",0],
    ["청소년 참여기구의 종류와 차이를 설명해 보세요.","대표적인 청소년 참여기구는 청소년특별회의, 청소년참여위원회, 청소년운영위원회입니다. 청소년특별회의는 청소년과 전문가가 범정부 차원의 청소년정책 과제를 발굴하여 제안하는 전국 단위 기구입니다. 청소년참여위원회는 중앙정부와 지방자치단체의 정책과정에 청소년의 의견을 반영하는 기구입니다. 청소년운영위원회는 청소년수련시설의 운영과 프로그램을 모니터링하고 개선사항을 제안하는 시설 단위의 참여기구입니다.",0],
    ["청소년수련활동인증제와 신고제의 차이를 설명해 보세요.","청소년수련활동인증제는 프로그램의 내용, 지도인력, 활동환경, 안전관리 등이 일정한 기준을 충족했는지 심사하여 국가가 인증하는 제도입니다. 청소년과 보호자가 안전하고 질 높은 활동을 선택하도록 돕는 목적이 있습니다. 신고제는 일정한 청소년수련활동의 실시계획과 안전 관련 정보를 사전에 신고하고 공개하는 제도입니다. 인증제가 프로그램의 질적 수준을 심사하는 제도라면 신고제는 사전 정보공개와 안전관리에 중점을 둡니다.",0],
    ["청소년자원봉사 Dovol과 포상제도를 설명해 보세요.","Dovol은 청소년이 봉사활동을 검색하고 신청하며 활동실적을 관리할 수 있는 청소년자원봉사 시스템입니다. 봉사시간을 채우는 데 그치지 않고 지역사회의 문제를 이해하고 참여하는 경험으로 운영하는 것이 중요합니다. 국제청소년성취포상제는 청소년이 봉사, 자기개발, 신체단련, 탐험 등의 영역에서 스스로 목표를 세우고 도전하는 자기성장 프로그램입니다. 청소년자기도전포상제는 비교적 어린 연령의 청소년이 발달수준에 맞게 목표를 설정하고 성취경험을 쌓도록 지원하는 제도입니다.",0],
    ["청소년기관 취업 결격사유 (3가지 이상)?","아동·청소년 관련 성범죄 경력자(「아동·청소년의 성보호에 관한 법률」), 아동학대 범죄 경력자(「아동복지법」), 금고 이상의 형을 선고받고 집행 중이거나 집행이 끝난 지 5년이 지나지 않은 사람(강력범죄, 횡령·배임 등 사회적으로 문제가 되는 범죄 포함), 마약·대마·향정신성 의약품 관련 범죄 경력자, 청소년활동시설 종사자에 대한 법률 위반으로 자격이 정지되거나 제한된 사람(예: 청소년지도사 자격이 취소·정지된 경우, 청소년기관 종사자로서 법령을 위반해 해임·파면된 후 일정 기간), 아동·청소년 관련 기관에서 부적절 행위로 인해 해임·파면된 사람이 있습니다.",1],
    ["청소년 기본법상 정책위원회가 하는 일 이야기 해보세요","청소년정책위원회는 청소년기본법에 근거해 설치된 국가 청소년정책의 최고 심의·조정기구입니다. 이 위원회는 5년 단위 청소년정책 기본계획과 연도별 시행계획을 심의하고, 관계 중앙행정기관 간 청소년정책을 조정하는 역할을 합니다. 이를 통해 청소년정책의 일관성과 연계성을 확보하며, 국가 청소년정책의 컨트롤타워 역할을 수행합니다.",1],
    ["청소년 보호처분에 대해 설명하세요","청소년보호처분이란 비행 청소년에게 형벌이 아닌 보호와 교화를 목적으로 법원이 내리는 처분입니다. 가정법원 소년부에서 보호자 감호, 사회봉사, 수강명령, 보호관찰, 소년원 송치 등 단계별 처분을 결정합니다. 청소년지도사는 보호처분 이후 청소년이 다시 사회에 적응할 수 있도록 지도와 연계를 담당하는 역할을 합니다. 청소년보호처분은 「소년법」을 근거로 하며, 가정법원 소년부가 1호부터 10호까지의 보호처분을 결정합니다.",1],
    ["청소년수련활동인증제 통해 인증 받고 난 후 실시되어야하는 것 두 가지만 말해보라","청소년수련활동인증제를 통해 인증을 받은 후에는 첫째, 인증받은 내용대로 프로그램을 성실히 운영하고, 둘째, 운영 결과에 대해 사후보고와 평가를 실시해야 합니다. 다른 답변으로는 첫째, 프로그램 운영 결과를 정리한 '운영결과보고서'를 제출해야 하고, 둘째, 참여 청소년을 대상으로 실시한 '만족도조사 결과'를 제출해야 합니다.",1]
  ]},
  {title:"Ⅳ. 기관·시설", items:[
    ["청소년수련시설의 종류와 기능을 설명해 보세요.","청소년수련시설에는 청소년수련관, 청소년수련원, 청소년문화의집, 청소년특화시설, 청소년야영장, 유스호스텔이 있습니다. 청소년수련관은 생활권 안에서 다양한 수련활동을 종합적으로 운영하고, 청소년수련원은 숙박기능을 갖추고 자연체험과 공동체활동 등을 제공합니다. 청소년문화의집은 지역 청소년이 일상적으로 이용할 수 있는 비교적 소규모의 문화활동 공간입니다. 특화시설은 특정 목적의 전문활동, 야영장은 야외활동, 유스호스텔은 청소년의 여행과 교류를 위한 숙박기능에 중점을 둡니다.",0],
    ["청소년수련관과 청소년문화의집의 차이는 무엇인가요?","청소년수련관은 다양한 수련활동을 종합적으로 운영할 수 있는 비교적 큰 생활권 시설입니다. 체육, 문화, 동아리, 참여, 진로 등 여러 영역의 프로그램을 운영할 수 있습니다. 청소년문화의집은 청소년이 지역에서 일상적으로 접근할 수 있도록 정보·문화·예술·동아리 활동공간을 제공하는 소규모 생활권 시설입니다. 규모와 기능 범위에는 차이가 있지만 모두 청소년의 접근성과 참여가 중요합니다.",0],
    ["청소년수련원과 유스호스텔의 차이는 무엇인가요?","청소년수련원은 숙박기능과 다양한 활동시설을 갖추고 자연체험, 공동체활동, 수련활동 등을 종합적으로 운영하는 시설입니다. 유스호스텔은 청소년의 여행과 국내외 교류를 지원하기 위해 숙박과 편의를 제공하는 시설입니다. 수련원이 교육적 프로그램 운영에 중점을 둔다면 유스호스텔은 여행과 교류를 위한 숙박지원의 성격이 더 강합니다.",0],
    ["한국청소년활동진흥원의 역할을 설명해 보세요.","한국청소년활동진흥원은 청소년활동을 활성화하고 활동의 질과 안전성을 높이기 위해 설립된 공공기관입니다. 청소년수련활동인증제와 신고제, 청소년자원봉사, 포상제, 청소년특별회의, 국제교류 등을 지원합니다. 또한 청소년지도자의 전문성 향상과 지역 청소년활동기관의 연계도 지원합니다.",0],
    ["청소년상담복지센터와 청소년안전망의 역할을 설명해 보세요.","청소년상담복지센터는 청소년과 보호자를 대상으로 상담, 심리검사, 위기개입, 예방교육 등을 제공합니다. 청소년안전망은 상담복지센터를 중심으로 교육, 의료, 복지, 경찰, 법률기관 등이 협력하여 위기청소년을 발견하고 통합적으로 지원하는 지역사회 연계체계입니다. 한 기관이 모든 문제를 해결하기 어렵기 때문에 필요한 서비스를 연결하고 지원이 중단되지 않도록 관리하는 것이 중요합니다.",0],
    ["학교밖청소년지원센터 꿈드림은 어떤 일을 하나요?","꿈드림은 학교 밖 청소년에게 상담, 학습과 검정고시 지원, 진로·직업체험, 취업, 자립, 건강지원 등을 제공하는 기관입니다. 학교 복귀만을 목표로 하지 않고 청소년의 상황과 목표에 따라 대안교육, 자격취득, 취업 등 다양한 경로를 지원합니다. 지도사는 학교 밖 청소년을 발견했을 때 본인의 욕구를 먼저 확인한 뒤 꿈드림에 연계할 수 있어야 합니다.",0],
    ["청소년상담 1388, 청소년동반자, 청소년쉼터의 역할을 설명해 보세요.","청소년상담 1388은 청소년과 보호자가 위기, 정서, 진로, 가족, 학교문제 등에 대해 상담받고 필요한 지역서비스에 연결될 수 있는 상담창구입니다. 청소년동반자는 기관 방문이 어려운 위기청소년의 생활현장으로 찾아가 상담하고 필요한 서비스를 연결합니다. 청소년쉼터는 가정 밖 청소년에게 긴급보호, 생활, 상담, 교육, 자립지원을 제공합니다. 쉼터는 보호기간과 기능에 따라 일시·단기·중장기쉼터로 구분됩니다.",0],
    ["가정밖청소년이 이용하는 시설과 특징?","가정밖청소년은 청소년쉼터에서 보호를 받고, 자립지원관을 통해 자립을 준비하며, 회복지원시설을 통해 정서적·행동적 회복을 지원받습니다. 쉼터는 보호·생활 중심, 자립지원관은 자립 준비, 회복지원시설은 치유·회복 중심의 역할을 합니다.",1],
    ["방과후아카데미 팀장 채용시 지원자격에 대해 설명?","방과후 아카데미 팀장은 청소년지도사 2급 이상 자격을 기본으로 하며, 청소년 활동 지도와 프로그램 운영 경험이 필요합니다. 또한 팀장으로서 교육·안전·인사 관리 능력과 프로그램 기획, 예산 운영 능력을 갖춰야 하며, 관련 경력과 전문 자격증이 있으면 우대됩니다.",1],
    ["성문화센터(특화시설)에서는 어떤교육을 하는가?","성문화센터는 청소년과 성인을 대상으로 성교육, 성폭력 예방, 성인권 교육 등의 프로그램을 운영합니다. 구체적으로는 성에 대한 올바른 지식 제공, 성적 자기결정권 강화, 건강한 성관계와 의사소통 교육, 디지털 성범죄 예방 교육 등이 있으며, 워크숍, 상담, 체험형 프로그램을 통해 참여자가 자기 존중과 타인 존중을 실천할 수 있도록 돕습니다.",1],
    ["지역사회 청소년 연계프로그램은 어떤것이 있을까?","지역사회 청소년 연계프로그램이란 학교, 청소년기관, 복지기관이 함께 청소년을 지원하는 체계입니다. 예를 들어 학교에서 정서·학습이 어려운 학생을 청소년상담센터와 방과후아카데미로 연계해 상담과 학습지원을 동시에 제공합니다. 또 지역 소상공인과 연계해 진로체험을 운영하며, 청소년을 지역 안에서 성장하도록 돕는 것이 핵심입니다.",1],
    ["청소년육성 전담 공무원은 어떤일을 하는가?","청소년육성전담 공무원은 지역 청소년 정책과 사업을 기획·운영하고, 청소년 관련 시설과 프로그램을 지원·관리하는 역할을 수행합니다. 구체적으로는 청소년 활동 진흥 계획 수립, 지역 청소년센터·수련관 운영 지원, 청소년 보호 및 상담, 참여 프로그램 개발과 평가, 청소년 관련 법령 준수 점검 등이 포함됩니다. 또한 청소년 지도사, 학교, 지역 단체 등과 협력하여 청소년의 성장과 참여를 촉진하고, 정책 개선과 현장 문제 해결을 위한 현장 조사를 수행합니다.",1],
    ["청소년방과후 아카데미vs초등방과후교실vs지역아동센터의 차이?","청소년방과후아카데미는 청소년의 전인적 성장을 지원하는 종합 청소년사업이며, 학교 방과후교실은 학습 중심의 교육 보충 프로그램이고, 지역아동센터는 보호와 돌봄을 중심으로 한 아동복지시설입니다. 법적 근거는 각각 청소년기본법, 초·중등교육법, 아동복지법이며 주관 부처는 여성가족부, 교육부, 보건복지부입니다. 대상 연령은 방과후아카데미가 중학생 중심(초4~중3 가능), 방과후교실은 초·중·고 학생, 지역아동센터는 만 18세 미만 아동·청소년입니다. 핵심 목적은 각각 돌봄+성장+자립, 학습·특기적성, 보호·돌봄·생활지원이며, 전문 인력은 청소년지도사 필수, 교사·강사, 생활복지사 등으로 구분되고, 성격 요약은 종합형 청소년사업, 교육 보충 프로그램, 복지·돌봄 시설입니다.",1]
  ]},
  {title:"Ⅴ. 실무·프로그램 운영", items:[
    ["청소년프로그램의 개발과정을 설명해 보세요.","먼저 대상 청소년과 지역사회의 욕구를 조사하고 프로그램의 목표와 대상자를 설정합니다. 이후 활동내용, 일정, 장소, 예산, 지도인력, 홍보, 안전계획, 평가방법을 구체적으로 설계합니다. 프로그램을 실행하면서 참여상황과 위험요인을 점검하고 필요한 내용을 조정합니다. 종료 후에는 과정과 성과를 평가하여 다음 프로그램의 개선에 반영합니다.",0],
    ["프로그램 기획 시 가장 먼저 고려할 것은 무엇인가요?","가장 먼저 대상 청소년의 욕구와 특성을 파악해야 합니다. 지도자가 좋은 프로그램이라고 생각하더라도 청소년의 관심과 필요에 맞지 않으면 참여도와 효과가 낮아질 수 있습니다. 연령과 발달수준, 지역환경, 접근성, 참여동기, 안전, 장애나 문화적 배경 등도 함께 고려해야 합니다.",0],
    ["청소년의 요구와 참여를 프로그램에 어떻게 반영하겠습니까?","설문조사, 인터뷰, 간담회, 아이디어 회의, 청소년운영위원회 등을 통해 청소년의 의견을 수집하겠습니다. 프로그램 주제뿐 아니라 일정, 장소, 활동방법, 역할분담에도 청소년이 참여하도록 하겠습니다. 제안받은 내용을 실제 기획에 반영하고 반영하기 어려운 경우에는 그 이유를 설명하겠습니다. 의견만 수집하고 결과를 알리지 않는 형식적 참여가 되지 않도록 피드백 과정도 마련하겠습니다.",0],
    ["청소년프로그램은 어떻게 평가하겠습니까?","참여인원이나 만족도만 확인하지 않고 프로그램의 목표가 실제로 달성되었는지를 평가하겠습니다. 사전·사후 설문, 관찰, 인터뷰, 활동결과물, 청소년의 자기평가, 지도자 회의 등을 함께 활용할 수 있습니다. 평가는 잘못을 찾기 위한 것이 아니라 프로그램의 강점과 개선점을 확인하여 다음 운영에 반영하기 위한 과정이라고 생각합니다.",0],
    ["예상보다 참여자가 적거나 참여를 거부하는 청소년이 있다면 어떻게 하겠습니까?","적은 참여인원을 곧바로 실패로 판단하지 않고 소규모 활동의 장점을 살려 상호작용과 개별 참여를 높이겠습니다. 참여를 거부하는 청소년에게는 억지로 참여시키기보다 활동이 어렵거나 또래관계가 불편한지, 선택권이 없어서 거부하는지 이유를 확인하겠습니다. 관찰자, 기록자, 보조역할 등 다양한 참여방식을 제시할 수 있습니다. 이후 홍보, 시간, 장소, 주제, 접근성 측면에서 참여가 적었던 원인을 분석하겠습니다.",0],
    ["프로그램 예산이 부족하다면 어떻게 하겠습니까?","프로그램의 핵심목표를 기준으로 반드시 필요한 요소와 조정 가능한 요소를 구분하겠습니다. 지역기관, 학교, 도서관, 복지관, 공공시설과 협력하고 기존 장비와 인적자원을 활용하겠습니다. 다만 비용을 줄이기 위해 안전이나 활동의 질을 희생해서는 안 됩니다. 필요하다면 규모를 줄이더라도 목표와 효과가 분명한 프로그램으로 운영하겠습니다.",0],
    ["프로그램의 안전관리는 어떻게 해야 하나요?","활동 전에 장소와 장비, 이동경로, 날씨, 참여자의 건강상태 등 위험요인을 사전에 점검해야 합니다. 청소년에게 이해하기 쉬운 방식으로 안전수칙을 안내하고 비상연락망, 응급약품, 인솔인력, 대피방법을 준비해야 합니다. 활동 중에는 참여자의 상태를 지속적으로 관찰하고 사고가 발생하면 활동을 중단한 뒤 응급조치와 보고절차를 따라야 합니다. 종료 후에는 사고와 위험상황을 기록하고 재발방지 대책을 마련해야 합니다.",0],
    ["진로·직업 프로그램을 기획한다면 어떤 프로그램을 운영하고 싶나요?","먼저 흥미, 가치, 강점 탐색을 통해 청소년의 자기이해를 돕겠습니다. 이후 다양한 직업인을 만나거나 실제 직무를 체험하고, 팀 프로젝트를 통해 직업과 관련된 문제를 해결하도록 하겠습니다. 예를 들어 '우리 동네 청소년 일자리 연구소'를 운영하여 지역의 직업과 청소년 노동환경을 조사하고 직업인을 인터뷰한 뒤 정책을 제안하도록 할 수 있습니다. 이를 통해 진로탐색뿐 아니라 조사, 협업, 의사소통, 사회참여 경험까지 제공하고 싶습니다.",0],
    ["프로그램 기획시 ADDIE 가 뭔지 이야기 해보세요","A-Analysis(분석)는 대상(청소년)의 요구 분석, 문제 정의, 기관 및 지역 환경 분석, 학습·활동 목표의 방향 설정입니다. D-Design(설계)은 프로그램 구조 설계, 세부 목표 설정, 활동 흐름 설계, 평가 계획 설계이며 예산·일정·안전 계획을 포함합니다. D-Development(개발)는 설계한 내용을 실제 자료로 제작하는 것으로 활동안·교안 완성, 참가자·강사 자료 준비, 홍보물 개발, 체크리스트 제작입니다. I-Implementation(실행)은 프로그램 실제 운영, 참가자 지도, 현장 안전 관리, 운영 중 발생하는 문제 조정입니다. E-Evaluation(평가)은 사전·사후 평가, 참여자 만족도 조사·목표 달성도 분석, 프로그램 개선점 도출과 차기 프로그램 피드백 반영입니다.",1],
    ["청소년의 니즈와 지도사의 니즈가 다를 경우 어떻게 해야 할까?","청소년의 니즈를 최우선으로 두되, 지도사의 니즈는 '전문적 판단·안전·교육 목표'라는 틀 속에서 투명하게 설명하고 대안을 제시하며 조정하는 것이 가장 바람직합니다. 과정에서 청소년의 의견을 수렴할 구조를 만드는 것이 중요한데, 사전 설문, 활동 후 만족도, 정기 간담회(청소년자치조직 포함), 청소년 운영위원회 활용이 있습니다. 활동의 주체는 '청소년'이고 청소년 경험의 질이 활동의 목적입니다. 따라서 최우선은 청소년의 필요와 흥미를 반영하는 것이며, 지도사의 니즈보다 청소년의 니즈를 먼저 고려하는 것이 기본 원칙입니다. 이 과정이 있으면 지도사 니즈와 청소년 니즈의 차이가 '갈등'이 아니라 '합의의 과정'이 될 수 있습니다.",1],
    ["이전에 없던 청소년프로그램 개발을 하고싶다 어떻게 할것인가?","이전에 없던 프로그램을 개발하려면 먼저 청소년의 욕구와 관심사, 사회적 환경을 면밀히 조사합니다. 그 다음, 다른 기관 사례와 최신 트렌드를 분석하고, 창의적 아이디어를 팀과 브레인스토밍합니다. 프로그램 목표와 활동을 구체화한 뒤, 시범 운영과 피드백을 통해 개선하고 안전성과 참여도를 확인합니다. 이렇게 체계적으로 접근하면 청소년에게 새로운 경험과 성장을 제공할 수 있는 프로그램을 만들 수 있습니다.",1],
    ["프로그램 계획시 성별, 연령등을 어찌 고려할 것인지?","청소년 프로그램을 계획할 때는 연령과 발달 단계에 따라 인지·신체·사회적 수준을 고려해야 합니다. 예를 들어 초등 고학년과 중학생은 집중 시간과 활동 난이도가 달라 프로그램을 차별화합니다. 또한, 성별 특성을 반영해 참여 유형이나 관심사, 활동 선호도를 고려하고, 필요 시 혼합 활동과 성별 맞춤 활동을 적절히 조합합니다. 이렇게 하면 모든 참여자가 안전하고 즐겁게 학습하고 성장할 수 있습니다.",1],
    ["ADHD 학생과 같이 프로그램을 진행할때 어떻게 수업을 진행할건가요?","ADHD 학생과 프로그램을 진행할 때는 주의력과 충동성을 고려한 활동 설계가 필요합니다. 짧고 명확한 지시, 시각적 자료 활용, 활동 중 규칙과 순서 반복 안내를 통해 집중을 돕습니다. 또한 긍정적 피드백과 작은 성취 경험을 제공해 자기 효능감을 높이고, 필요 시 보조 지도자 배치나 개별 지원을 통해 다른 학생과의 균형도 유지하도록 합니다. 핵심은 참여와 성취감을 동시에 경험하게 하는 맞춤형 지도입니다.",1],
    ["대그룹 활동시 어떻게 지도할 것인가?","대그룹 활동을 지도할 때는 먼저 안전과 질서 유지를 최우선으로 하고, 역할 분담과 규칙 설정을 통해 활동을 체계적으로 운영합니다. 활동 시작 전 목적과 주의사항을 명확히 안내하고, 참여자들이 적극적으로 몰입할 수 있도록 참여형 활동과 팀워크 중심 구성을 설계합니다. 활동 중에는 관찰과 피드백을 통해 문제 상황을 즉시 조정하며, 활동 종료 후에는 성과와 배운 점을 공유하여 개인과 그룹의 성취감을 높입니다.",1],
    ["장기프로그램을 진행중인데 중도이탈하는 청소년이 자꾸만 늘어난다면 어떻게 대처할지?","장기프로그램에서 중도이탈 청소년이 늘어난다면, 먼저 이탈 원인을 분석합니다. 개인적 요인, 프로그램 난이도, 흥미도, 참여 환경 등 다양한 측면을 고려합니다. 이후 개별 상담과 관심 제공, 참여 동기 강화 활동, 프로그램 내용·방식 조정 등을 통해 재참여를 유도합니다. 또한 청소년 의견을 반영한 참여형 활동과 피드백 체계를 마련하여, 청소년이 스스로 프로그램에 몰입하고 지속할 수 있는 환경을 조성합니다.",1],
    ["운영위원회에서 결정된 사항이 수련관장이나 지도사 의견과 상충될때는 어떻할 것인가?","운영위원회에서 결정된 사항이 수련관장이나 지도사의 의견과 상충할 경우, 먼저 결정 사항의 취지와 근거를 정확히 이해합니다. 이후 현장 운영상 문제점이나 개선 필요를 정리하여 운영위원회에 공식적으로 의견을 제출하거나, 수련관장과 협의하여 실행 가능한 조정안을 마련합니다. 중요한 것은 조직 내 의사결정 존중과 소통, 청소년 활동의 안전과 효과성을 우선 고려하는 것이며, 상호 신뢰와 협력을 통해 합리적인 해결을 도모하는 것입니다.",1],
    ["안전교육은 어떻게 진행할 것인가?","안전교육은 사전 계획, 참여형 학습, 평가와 피드백 순으로 진행합니다. 먼저 교육 목적과 위험 요소를 분석하여 사고 예방과 대처 능력에 초점을 맞춘 교육 계획을 수립합니다. 이후 실습과 체험 중심의 참여형 학습을 통해 소방, 교통, 재난, 생활 안전 등 상황별 대응을 직접 경험하게 합니다. 교육 종료 후에는 질의응답과 상황 시뮬레이션 평가를 통해 이해도를 확인하고, 개선점을 반영하여 반복 학습과 일상 안전 습관 형성을 유도합니다.",1],
    ["오리엔티어링 지도방법에 대해 이야기하시오","오리엔티어링 지도방법은 먼저 사전 준비와 안전 안내를 하고, 지도와 나침반 사용법을 설명한 후 짧은 구간 시범을 보여줍니다. 이후 청소년이 개별 또는 팀 단위로 경로를 계획하고 이동하게 하며, 활동 종료 후에는 경로 선택과 전략, 협력 과정을 평가하고 피드백을 제공합니다.",1]
  ]},
  {title:"Ⅵ. 상황면접·위기대응", items:[
    ["프로그램 중 청소년끼리 싸움이나 따돌림이 발생하면 어떻게 하겠습니까?","먼저 신체적 충돌을 중단시키고 당사자들을 분리하여 안전을 확보하겠습니다. 다친 사람이 있는지 확인하고 각각의 이야기를 따로 들으며 사실관계를 파악하겠습니다. 피해청소년에게 책임을 돌리거나 당사자의 준비 없이 즉시 사과와 화해를 강요하지 않겠습니다. 이후 기관의 절차에 따라 보호자와 책임자에게 알리고, 집단규칙과 관계문화를 점검하여 재발방지 교육과 상담을 진행하겠습니다.",0],
    ["수련활동 중 청소년이 다치거나 응급상황이 발생하면 어떻게 하겠습니까?","활동을 즉시 중단하고 추가 위험을 제거한 뒤 의식, 호흡, 출혈 등 부상 정도를 확인하겠습니다. 필요한 응급처치를 시행하고 상황에 따라 119에 신고하겠습니다. 기관 책임자와 보호자에게 신속하게 알리고 의료기관 이송이 필요한 경우 동행하겠습니다. 이후 사고경위와 조치내용을 기록하고 원인을 분석하여 동일한 사고가 반복되지 않도록 개선하겠습니다.",0],
    ["청소년이 안전수칙이나 지도자의 지시를 계속 거부한다면 어떻게 하겠습니까?","많은 사람 앞에서 힘겨루기를 하거나 모욕하지 않고 별도의 공간에서 행동의 이유를 듣겠습니다. 규칙이 자신과 다른 청소년의 안전을 위한 것임을 구체적으로 설명하고 가능한 대안을 제시하겠습니다. 다만 다른 사람의 안전을 위협하는 행동에는 명확하게 한계를 설정하고 필요하면 활동참여를 제한하거나 대체활동을 제공하겠습니다. 반복되는 경우에는 보호자와 책임자, 필요 시 전문기관과 협력하겠습니다.",0],
    ["청소년이 욕설을 하거나 공격적으로 행동하면 어떻게 하겠습니까?","감정적으로 맞대응하지 않고 주변 청소년과 지도자의 안전을 먼저 확보하겠습니다. 흥분이 가라앉은 후 욕설이나 폭력행동은 허용될 수 없다는 점을 분명히 설명하겠습니다. 동시에 그 행동을 일으킨 감정과 상황을 듣고 대안적인 표현방법을 함께 찾겠습니다. 반복되거나 위험성이 높다면 보호자와 상담기관 등과 협력하여 지원하겠습니다.",0],
    ["청소년이 자해나 자살생각을 이야기하면 어떻게 대응하겠습니까?","자해 사실을 가볍게 여기거나 절대 비밀로 지키겠다고 약속하지 않겠습니다. 자해 방법과 빈도, 현재 충동, 자살생각과 계획, 사용할 수 있는 수단이 있는지 확인하겠습니다. 즉각적인 위험이 있으면 청소년을 혼자 두지 않고 기관의 위기대응 절차에 따라 보호자와 책임자에게 알리겠습니다. 필요하면 119, 의료기관, 청소년상담복지센터 등 긴급서비스에 즉시 연계하겠습니다.",0],
    ["청소년이 학대나 성폭력 피해를 이야기하면 어떻게 하겠습니까?","청소년의 말을 의심하거나 반복해서 자세히 추궁하지 않고 안전하게 경청하겠습니다. 지도자가 직접 조사하거나 가해 의심자와 대질시키지 않겠습니다. 현재 안전한지 확인하고 기관 책임자와 공유한 뒤 관련 법과 절차에 따라 신고하겠습니다. 피해청소년이 상담, 의료, 법률, 보호서비스를 받을 수 있도록 전문기관에 연계하고 피해자에게 책임을 돌리지 않겠습니다.",0],
    ["가정 밖 청소년이나 학교 밖 청소년을 만나면 어떻게 지원하겠습니까?","먼저 현재 머물 곳이 있는지, 폭력이나 착취 위험이 있는지 등 안전을 확인하겠습니다. 가출이나 학교중단을 비난하거나 무조건 가정과 학교로 돌려보내려 하지 않고 원인과 본인의 의사를 듣겠습니다. 가정 밖 청소년은 1388, 청소년상담복지센터, 청소년쉼터 등에 연계하겠습니다. 학교 밖 청소년은 꿈드림에 연결하여 상담, 검정고시, 진로·직업체험, 취업, 자립지원 등 적합한 서비스를 받을 수 있도록 돕겠습니다.",0],
    ["보호자가 청소년의 상담내용을 모두 알려달라고 하면 어떻게 하겠습니까?","청소년의 사생활과 신뢰를 보호해야 하므로 대화나 상담내용 전체를 그대로 전달하지는 않겠습니다. 보호자에게 비밀보장의 원칙과 청소년과의 신뢰관계가 중요한 이유를 설명하겠습니다. 청소년의 안전과 지원에 필요한 범위에서 내용을 요약하여 협의하고, 가능하면 청소년에게도 어떤 내용을 공유할지 미리 설명하겠습니다. 다만 생명과 안전에 위험이 있는 경우에는 필요한 정보를 즉시 공유해야 합니다.",0],
    ["동료 지도자가 청소년을 부적절하게 대하거나 전문적 경계를 지키지 않는다면 어떻게 하겠습니까?","청소년의 안전과 권리를 우선으로 보고 즉시 중단시켜야 할 상황이라면 현장에서 개입하겠습니다. 개인적인 감정이나 추측이 아니라 확인한 사실과 상황을 객관적으로 기록하겠습니다. 이후 기관 책임자와 정해진 보고절차에 따라 처리하겠습니다. 동료관계를 이유로 묵인하지 않되 개인을 비난하기보다 청소년 보호와 재발방지에 초점을 두겠습니다.",0],
    ["청소년과 청소년지도사의 가치관 충돌이 일어나면 어떻게 대처하겠는가?","청소년과 지도사의 가치관 충돌이 발생했을 경우, 지도사의 가치관을 강요하기보다 청소년의 생각을 먼저 존중하며 경청하겠습니다. 법과 인권, 안전의 범위 안에서 서로의 차이를 인정하고 대화를 통해 조율하겠습니다. 이를 통해 청소년이 스스로 판단하고 선택할 수 있도록 돕는 것이 지도사의 역할이라고 생각합니다.",1],
    ["담배피우는 청소년을 보면 어떻게 하실건가요?","담배를 피우는 청소년을 발견했을 경우, 즉각적인 훈계나 처벌보다는 안전을 먼저 확인하고 상황을 차분히 중단시키겠습니다. 흡연의 원인을 파악하며 청소년의 입장을 존중해 대화하고, 법적 기준과 건강 영향을 안내하겠습니다. 이후 금연 교육이나 상담, 학교·보건기관과 연계해 예방과 회복 중심으로 지도하겠습니다.",1],
    ["학교를 그만 두겠다는 청소년이 찾아오면 어떻게 할것인가?","학교를 그만두겠다는 청소년이 찾아온다면, 먼저 결정을 말리기보다 그 이유를 충분히 듣고 공감하겠습니다. 감정이 가라앉은 후 학업 중단의 영향과 대안교육, 검정고시 등 가능한 선택지를 함께 살펴보겠습니다. 이후 학교와 보호자, 전문기관과 연계해 청소년이 가장 안전한 선택을 할 수 있도록 돕겠습니다.",1],
    ["청소년 프로그램중 부정행위 문제가 발생했는데 어떻게 해결할 것인지 말해보세요.?","청소년 프로그램 중 부정행위가 발생했을 경우, 감정적으로 대응하지 않고 즉시 상황을 중단해 사실관계를 먼저 확인하겠습니다. 이후 공정한 기준에 따라 조치하되, 처벌보다는 규칙의 의미와 책임을 이해하도록 지도하겠습니다. 재발 방지를 위해 운영 방식을 점검하고 청소년과 함께 약속을 재정비하겠습니다.",1],
    ["산속에서 아이들과 떨어지게 됐는데 스마트기기도 없다면?","만약 산속에서 아이들과 떨어지고 스마트기기도 없는 상황이라면, 먼저 침착함을 유지하고 아이들을 안전한 위치에 모아 보호합니다. 주변 환경을 살피며 눈에 띄는 장소나 표지를 확인하고, 가시적인 신호(옷, 돌, 나뭇가지 등)로 구조대나 다른 팀에 위치를 알립니다. 또한 아이들에게 패닉을 방지하고 행동 지침을 안내하며, 필요 시 순간별 안전 조치를 취해 생명과 안전을 최우선으로 보호합니다.",1],
    ["자살을 부추기는 소셜네트워크나 그룹에 대한 대응?","자살을 부추기는 소셜네트워크나 온라인 그룹에 대해서는 조기 발견과 즉각 대응이 중요합니다. 청소년지도사는 청소년의 온라인 활동 변화를 민감하게 살피고, 위험 신호가 보이면 상담과 보호자, 학교, 전문기관과의 연계를 신속히 진행해야 합니다. 동시에 디지털 리터러시와 생명존중 교육을 통해 유해 콘텐츠를 비판적으로 인식하도록 돕고, 위기 상황에서는 전문 상담·정신건강 기관으로 연결하는 안전망 역할을 수행해야 합니다.",1],
    ["청소년기관에서의 부정비리를 알게 되었을 때 어떻게 할것인가?","근무기관에서 부정·비리를 발견하면, 먼저 사실과 증거를 정확하게 확인합니다. 이후 즉시 내부 보고 체계를 통해 상급자나 감사 담당 부서에 공식적으로 보고하며, 필요 시 증빙 자료를 확보합니다. 동시에 조직 내 규정과 절차를 준수하며 개인적 감정이나 추측에 의한 판단은 지양합니다. 또한 청소년과 기관 신뢰에 미치는 영향을 고려해, 신속하고 투명한 조치가 이루어질 수 있도록 협조하고, 후속 관리와 개선 방안을 제안합니다.",1],
    ["비행 청소년들을 도울 수 있는 시스템과 본인이 생각하는 방안은?","비행청소년을 돕기 위해서는 소년보호위원회, 상담복지센터, 쉼터 등 법·제도적 지원과 지역사회 연계를 활용해야 합니다. 또한 개별 맞춤형 상담과 멘토링, 진로·체험 프로그램 등 참여 중심 활동을 통해 청소년이 긍정적 경험을 쌓고 자기 효능감을 회복하도록 지원하는 것이 중요합니다.",1]
  ]},
  {title:"Ⅶ. 시사·개인 경험·맞춤질문", items:[
    ["최근 중요하다고 생각하는 청소년 문제와 대응방안을 말씀해 보세요.","저는 청소년의 정신건강 문제와 사회적 고립을 중요하게 보고 있습니다. 학업과 진로, 또래관계, 가족갈등뿐 아니라 온라인 비교와 디지털환경도 영향을 줄 수 있습니다. 문제가 심해진 뒤 치료하는 것뿐 아니라 청소년이 일상적인 활동공간에서 관계와 소속감을 경험하도록 예방적으로 지원해야 합니다. 평소와 다른 행동과 위기신호를 관찰하고 필요한 경우 상담복지센터와 정신건강 전문기관에 연계해야 합니다.",0],
    ["스마트폰 과의존·사이버폭력·디지털성범죄에 어떻게 대응해야 하나요?","스마트폰 사용시간만 통제하기보다 청소년이 스마트폰을 통해 충족하려는 욕구와 스트레스, 외로움, 또래관계 등을 파악해야 합니다. 청소년과 함께 사용규칙과 대체활동을 정하고 일상기능의 손상이 크면 전문기관에 연계하겠습니다. 사이버폭력과 디지털성범죄는 장난으로 축소하지 않고 차단, 신고, 증거보존, 피해지원 방법을 구체적으로 교육해야 합니다. 동의 없는 촬영·유포·합성은 범죄이며 피해자의 책임이 아니라는 점도 분명히 알려야 합니다.",0],
    ["생성형 AI를 청소년활동에 어떻게 활용하겠습니까?","생성형 AI는 아이디어 발상, 진로정보 탐색, 글쓰기, 콘텐츠 제작, 프로젝트 기획 등에 활용할 수 있습니다. 다만 생성된 결과가 항상 정확한 것은 아니므로 사실확인과 출처검증 능력을 함께 교육해야 합니다. 개인정보, 저작권, 편향, 허위정보 문제도 다루어야 합니다. AI가 청소년의 사고를 대신하는 도구가 아니라 생각과 표현을 확장하는 보조도구가 되도록 활용하겠습니다.",0],
    ["다문화청소년과 장애청소년의 참여권을 어떻게 보장하겠습니까?","다문화청소년을 하나의 동일한 집단으로 보거나 문화적 배경을 문제로 해석해서는 안 됩니다. 개인의 언어능력, 가족관계, 정체성, 차별경험을 개별적으로 이해하고 프로그램의 언어와 문화 접근성을 높여야 합니다. 장애청소년에게는 별도의 활동만 제공하기보다 일반 프로그램에 참여할 수 있도록 이동, 의사소통, 감각, 활동속도 등을 조정해야 합니다. 무엇보다 당사자의 의견을 직접 듣고 과도한 보호로 선택권을 제한하지 않겠습니다.",0],
    ["청소년상담사 자격이 있는데 왜 청소년지도사도 취득하려 하나요?","청소년상담이 심리적 어려움을 이해하고 회복을 돕는 과정이라면, 청소년지도는 활동과 참여를 통해 청소년의 강점과 역량을 키우는 과정이라고 생각합니다. 저는 상담이 필요한 청소년만을 만나는 것이 아니라 다양한 청소년과 예방적이고 성장지향적인 활동을 하고 싶습니다. 두 전문성을 연결하면 청소년의 내면적인 어려움뿐 아니라 관계, 진로, 사회참여까지 보다 입체적으로 지원할 수 있다고 생각합니다.",0],
    ["상담적 접근을 청소년활동 현장에 어떻게 활용하겠습니까?","청소년의 행동을 즉시 평가하거나 훈계하기보다 그 행동에 담긴 감정과 욕구를 이해하는 데 활용하겠습니다. 경청, 공감, 개방형 질문을 통해 참여동기와 어려움을 파악할 수 있습니다. 다만 모든 상황을 상담으로 만들거나 집단활동의 흐름을 지나치게 중단하지는 않겠습니다. 일상적인 정서적 지지는 제공하되 전문적인 개입이 필요한 경우에는 적절한 상담기관에 연계하겠습니다.",0],
    ["지도와 상담의 경계를 어떻게 설정하겠습니까?","지도는 활동참여, 규칙, 관계, 역량개발을 지원하는 역할이고 상담은 정서적 어려움과 심리문제를 전문적으로 다루는 역할입니다. 지도자로서 청소년의 말을 경청하고 기본적인 정서적 지지를 제공할 수 있습니다. 그러나 자해, 학대, 심각한 우울, 중독 등 지속적이고 전문적인 개입이 필요한 문제는 혼자 해결하지 않고 전문상담기관에 연계하겠습니다. 상담자격이 있더라도 기관의 직무범위, 윤리, 이중관계 가능성을 확인하겠습니다.",0],
    ["청소년의 행동을 지나치게 병리적으로 해석하지 않으려면 어떻게 해야 하나요?","청소년기의 감정변화나 반항, 충동적인 행동을 곧바로 장애나 문제로 규정하지 않겠습니다. 행동이 나타난 발달적 특성, 가족과 또래환경, 문화적 맥락, 최근의 스트레스와 청소년의 강점을 함께 살펴보겠습니다. 진단을 서두르기보다 현재 청소년에게 필요한 지원이 무엇인지 중심으로 접근하겠습니다. 전문적 평가가 필요한 경우에는 지도자가 임의로 판단하지 않고 적절한 기관에 연계하겠습니다.",0],

];

let current = 0;

function render(){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = sections.map((s,i)=>`<div class="tab ${i===current?'active':''} ${s.title==='개념정리'?'concept-tab':''}" data-i="${i}">${s.title}</div>`).join('');
  tabsEl.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{current=+t.dataset.i; render();}));

  const main = document.getElementById('main');
  main.innerHTML='';
  sections.forEach((s,i)=>{
    const sec = document.createElement('div');
    sec.className = 'section' + (i===current?' active':'');
    let html = `<div class="section-title"${s.title==='개념정리'?' style="color:#5c6b81"':''}>${s.title}${s.items.length? ` (${s.items.length}문항)`:''}</div>`;
    if(s.notes){ html += s.notes; }
    s.items.forEach((it,qi)=>{
      const id = `${i}_${qi}`;
      const badge = it[2] ? `<span class="badge">마청지</span>` : '';
      html += `
        <div class="qcard">
          <div class="qnum">Q${qi+1} ${badge}</div>
          <div class="qtext">${it[0]}</div>
          <div class="btnrow">
            <button class="toggle" data-id="${id}">모범답안 보기</button>
          </div>
          <div class="answer" id="ans_${id}">${it[1]}</div>
          <textarea id="ta_${id}" placeholder="여기에 직접 답변을 작성해보세요..." data-id="${id}"></textarea>
        </div>`;
    });

    if(s.title.startsWith("Ⅶ")){
      html += `
        <div class="structure-box">
          <h3>답변할 때 기억할 기본구조</h3>
          <div class="structure-flow">① 결론 → ② 이유 → ③ 구체적인 행동 → ④ 기관 및 전문가 연계</div>
          <div class="structure-example">예) 자해 청소년 대처 질문
「가장 먼저 청소년의 안전과 현재 위험도를 확인하겠습니다. 자해는 생명과 연결될 수 있기 때문입니다. 청소년을 혼자 두지 않고 자살생각과 계획, 수단 접근 여부를 확인한 뒤 기관의 위기대응 절차에 따라 보호자와 책임자에게 알리겠습니다. 즉각적인 위험이 있다면 119와 의료기관, 청소년상담복지센터 등에 신속히 연계하겠습니다.」</div>
        </div>`;
    }

    sec.innerHTML = html;
    main.appendChild(sec);
  });

  main.querySelectorAll('.toggle').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id = btn.dataset.id;
      const ans = document.getElementById('ans_'+id);
      ans.classList.toggle('show');
      btn.classList.toggle('shown');
      btn.textContent = ans.classList.contains('show') ? '모범답안 숨기기' : '모범답안 보기';
    });
  });

  main.querySelectorAll('textarea').forEach(ta=>{
    const saved = localStorage.getItem('exam_'+ta.dataset.id);
    if(saved) ta.value = saved;
    ta.addEventListener('input',()=>{
      localStorage.setItem('exam_'+ta.dataset.id, ta.value);
    });
  });

  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===sections.length-1;
  window.scrollTo(0,0);
}

document.getElementById('prevBtn').addEventListener('click',()=>{ if(current>0){current--; render();} });
document.getElementById('nextBtn').addEventListener('click',()=>{ if(current<sections.length-1){current++; render();} });

render();
</script>
</body>
</html>
