<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이상심리 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --wrong-bg:#f7e9e7;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .toolbar{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .btn{
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:8px 14px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .btn.active{color:var(--accent-dark);font-weight:600;}
  .progress-bar{
    height:8px;
    border-radius:6px;
    background:var(--shadow-dark);
    overflow:hidden;
    margin-bottom:8px;
    box-shadow:inset 2px 2px 4px var(--shadow-dark);
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{font-size:12px;color:var(--sub);margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{
    padding:3px 0;
    line-height:1.6;
  }
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .opt{
    text-align:left;
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
    transition:background .15s ease;
    white-space:pre-wrap;
  }
  .opt:hover{background:#eef1ee;}
  .opt.correct{background:var(--right-bg);color:var(--accent-dark);font-weight:600;box-shadow:none;}
  .opt.wrong{background:var(--wrong-bg);color:var(--wrong);font-weight:600;box-shadow:none;}
  .opt:disabled{cursor:default;}
  .opt:disabled:hover{background:var(--bg-base);}
  .opt.correct:disabled:hover{background:var(--right-bg);}
  .opt.wrong:disabled:hover{background:var(--wrong-bg);}
  .feedback{
    margin-top:12px;
    font-size:13px;
    font-weight:600;
  }
  .feedback.correct-mark{color:var(--accent-dark);}
  .feedback.wrong-mark{color:var(--wrong);}
  .explain{
    margin-top:8px;
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
  .empty{
    text-align:center;
    color:var(--sub);
    padding:60px 0;
    font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">‹ 목록으로</a>
  <h1>이상심리</h1>
  <div class="meta-line" id="metaLine"></div>
  <div class="toolbar">
    <button class="btn active" id="btn-all" onclick="setMode('all')">전체보기</button>
    <button class="btn" id="btn-wrong" onclick="setMode('wrong')">오답만 보기</button>
    <button class="btn" onclick="resetAll()">초기화</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div id="quizArea"></div>
</div>
<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "이상행동에 관한 생물학적 이론의 설명으로 옳은 것은?", "options": ["① 이상행동은 사고, 정서, 행동의 핵심인 인지과정에 의해 유발된다.", "② 내담자가 자신의 무의식적 갈등을 통찰하고 통찰내용을 실천하게 하는 훈습의 과정으로 구성된다.", "③ 정신장애를 유발하는 부적응적 인지도식에 초점을 맞추고 있다.", "④ 이상행동을 제거시키는 방법으로 소거, 처벌, 체계적 둔감법이 있다.", "⑤ 이상행동을 유전적 요인과 뇌의 구조적 결함 등으로 인한 질병으로 본다."], "answer": 4, "expl": "생물학적 이론은 이상행동을 유전적 요인, 뇌 구조·기능의 이상 등 생물학적 원인에서 비롯된 질병으로 설명한다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "이상행동의 분류와 평가의 장점에 관한 설명으로 옳지 않은 것은?", "options": ["① 예후와 치료의 효과성을 예측하는데 도움이 된다.", "② 심리장애의 유사성과 차이점을 구별하는데 도움을 준다.", "③ 치료자나 환자의 자기충족적 예언 결과가 발생할 수 있다.", "④ 정신건강 전문가 사이에 효과적인 의사소통을 가능하게 한다.", "⑤ 정신장애에 대한 과학적 연구와 이론개발을 위한 기초를 제공한다."], "answer": 2, "expl": "진단분류는 예후 예측, 장애 간 구별, 전문가 간 소통, 연구 기반 제공 등에 유용하지만, 자기충족적 예언(낙인효과)은 진단분류의 부작용이지 '장점'으로 볼 수 없다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "DSM-5의 신경발달장애에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 특정학습장애와 선택적 함구증은 신경발달장애의 하위 유형이다.\nㄴ. 사회적 의사소통장애는 DSM-5에서 처음으로 추가되었다.\nㄷ. 주의력결핍 과잉행동장애는 사회적 상호작용 결함이 지속적으로 나타난다.\nㄹ. 틱장애는 갑작스럽게 나타나고 반복적이고 비율동적인 운동 또는 음성 형태로 나타난다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄹ", "③ ㄷ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "특정학습장애·선택적 함구증은 각각 신경발달장애·불안장애로 분류되며(선택적 함구증은 불안장애), ADHD는 사회적 상호작용 결함이 아니라 부주의·과잉행동-충동성이 핵심이므로 ㄱ·ㄷ 모두 부정확해 실제로는 ㄴ·ㄹ이 옳다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "DSM-5의 우울장애에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 주요우울장애의 증상 가운데 적어도 하나는 우울한 기분이거나 흥미나 즐거움의 상실이어야 한다.\nㄴ. 파괴적 기분조절부전장애는 만성적이면서 지속적으로 과민한 특징을 보인다.\nㄷ. 월경전불쾌감장애의 필수 증상은 불안정한 기분, 과민함, 불쾌감, 불안이다.\nㄹ. 지속성 우울장애는 6개월 동안 우울한 기분이 없는 날보다 있는 날이 더 많으며 우울감이 지속되는 장애이다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "주요우울장애는 우울 기분 또는 흥미·즐거움 상실 중 최소 하나가 반드시 포함되어야 하며, 파괴적 기분조절부전장애·월경전불쾌감장애·지속성 우울장애의 증상 설명도 모두 DSM-5 기준과 일치한다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "DSM-5의 조현병 진단기준에 해당하는 것을 모두 고른 것은?\nㄱ. 망상 ㄴ. 환각 ㄷ. 공격성 ㄹ. 불안증상 ㅁ. 와해된 언어", "options": ["① ㄱ, ㄴ, ㅁ", "② ㄱ, ㄹ, ㅁ", "③ ㄴ, ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄹ, ㅁ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 0, "expl": "조현병의 핵심 진단기준(활성기 증상)은 망상, 환각, 와해된 언어, 와해된/긴장증적 행동, 음성증상이며 공격성이나 불안증상은 핵심 진단기준에 포함되지 않는다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "DSM-5의 불안장애에 관한 설명으로 옳은 것은?", "options": ["① 불안장애의 하위유형은 10가지이다.", "② 분리불안장애는 공황발작을 반복적으로 경험하는 경우를 말한다.", "③ 공황장애의 주요 특징은 다양한 사건이나 활동에 대해서 과도하게 불안해하고 걱정하는 것이다.", "④ 사회불안장애는 다른 사람들과 상호작용하는 사회적 상황을 두려워하여 회피하는 경우를 말한다.", "⑤ 범불안장애의 임상적 특징은 공포와 불안이 특정 상황과 대상에만 국한된다는 것이다."], "answer": 3, "expl": "사회불안장애는 타인에게 부정적으로 평가받을 것을 두려워해 사회적 상호작용 상황을 회피하는 것이 핵심 특징이다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "DSM-5의 양극성 관련 장애에 관한 설명으로 옳지 않은 것은?", "options": ["① 제Ⅰ형 양극성장애로 진단하기 위해서는 조증 삽화 진단기준이 충족되어야 한다.", "② 제Ⅱ형 양극성장애는 과거 또는 현재의 조증 삽화와 경조증 삽화의 진단기준을 동시에 만족해야 한다.", "③ 순환성장애는 경미한 형태의 조증 증상과 우울 증상이 2년 이상 번갈아 나타나는 만성적인 기분장애이다.", "④ 우울장애와 다른 범주로 분류되어 있다.", "⑤ 하위 유형으로 제Ⅰ형 양극성 장애, 제Ⅱ형 양극성 장애, 순환성장애가 있다."], "answer": 1, "expl": "제Ⅱ형 양극성장애는 주요우울삽화와 경조증삽화의 진단기준을 만족해야 하며, '조증 삽화'가 아닌 '경조증 삽화'가 기준이므로 이 설명이 옳지 않다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "DSM-5에서 제시된 공황장애 증상으로 옳지 않은 것은?", "options": ["① 발한", "② 심계 항진", "③ 불면증", "④ 감각이상", "⑤ 죽을 것 같은 공포"], "answer": 2, "expl": "불면증은 공황장애의 핵심 신체 증상 목록(심계항진, 발한, 떨림, 호흡곤란, 질식감, 흉통, 어지러움, 감각이상, 죽을 것 같은 공포 등)에 포함되지 않는다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "DSM-5의 뚜렛장애에 관한 설명으로 옳은 것은?", "options": ["① 18세 이후에 발병한다.", "② 운동성 틱 또는 음성 틱 중 한 가지의 틱이 1년 이상 지속적으로 나타난다.", "③ 목적이 없어 보이는 운동행동을 의도적으로 반복하는 특징을 보인다.", "④ 틱 증상은 빈도에 있어서 악화와 완화를 반복하지만 처음 틱이 나타난 시점으로부터 2년 이상 지속된다.", "⑤ 여러 가지 운동성 틱과 한 가지 이상의 음성 틱이 질병 경과 중 일부 기간 나타나지만, 동시에 나타나는 것은 아니다."], "answer": 4, "expl": "뚜렛장애는 여러 운동틱과 하나 이상의 음성틱이 질병 경과 중 함께 나타나되 반드시 동시에 나타날 필요는 없으며, 18세 이전 발병, 1년 이상 지속이 진단기준이다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "DSM-5의 망상장애에 관한 설명으로 옳지 않은 것은?", "options": ["① 적어도 1개월 동안 비영양성ㆍ비음식 물질을 계속 먹는다.", "② 망상장애 하위유형으로 과대형, 피해형, 질투형, 신체형 등이 있다.", "③ 1개월 이상의 지속 기간을 가진 한 가지 혹은 그 이상의 망상이 존재한다.", "④ 조증이나 주요우울 삽화가 일어난다면 망상 지속 기간에 비해 상대적으로 짧다.", "⑤ 망상의 영향이나 파생 결과를 제외한다면 기능이 현저하게 손상되지 않고 행동이 뚜렷하게 이상하거나 괴이하지 않다."], "answer": 0, "expl": "1개월 이상 비영양성 물질을 먹는 것은 이식증의 진단기준이며, 이는 망상장애가 아닌 급식 및 섭식장애 범주에 해당해 망상장애 설명으로는 옳지 않다."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "DSM-5의 지속성 우울장애 진단기준에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 분노 발작이 보통 일주일에 3번 이상 발생한다.\nㄴ. 다른 사람들로부터 부정적인 평가를 받을 수 있는 방식으로 행동을 하거나 불안증상을 나타내게 될까봐 두려워한다.\nㄷ. 식욕부진이나 과식, 절망감, 불면증이나 과다수면 등의 증상이 나타난다.\nㄹ. 주요우울장애 진단기준을 충족하는 증상이 2년간 지속적으로 나타날 수 있다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "파괴적 기분조절부전장애의 특징(분노발작, 3번 이상)과 사회불안 관련 설명(ㄴ)은 지속성 우울장애가 아닌 다른 장애의 특징이며, 지속성 우울장애 진단기준에는 식욕부진·절망감·수면문제 등 부수 증상(ㄷ)과 2년 지속(ㄹ)이 해당한다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "이상행동의 분류와 평가체계에 관한 설명으로 옳은 것은?", "options": ["① DSM-5는 다축체계를 폐지하였다.", "② 세계보건기구(WHO)가 DSM 체계를 개발하였다.", "③ 미국 정신의학회(APA)가 ICD 체계를 개발하였다.", "④ DSM-5는 장애의 증상보다 원인에 더 초점을 두었다.", "⑤ DSM-5는 연령, 성별, 문화적 차이를 고려하지 않았다."], "answer": 0, "expl": "DSM-5는 기존의 다축체계(5개 축 진단)를 폐지하고 단일 축 체계로 통합하였다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "DSM-5의 강박 및 관련장애에 해당하지 않는 것은?", "options": ["① 신체이형장애", "② 분리불안장애", "③ 저장장애", "④ 털뽑기장애", "⑤ 피부뜯기장애"], "answer": 1, "expl": "분리불안장애는 강박 및 관련장애가 아닌 불안장애 범주에 속하며, 강박 및 관련장애에는 강박장애, 신체이형장애, 저장장애, 털뽑기장애, 피부뜯기장애가 포함된다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "DSM-5의 외상 및 스트레스 관련장애의 하위유형에 관한 설명으로 옳지 않은 것은?", "options": ["① 반응성 애착장애: 아동이 보호자로 추정되는 사람과 애착이 없거나 명백하게 미발달되어 있다.", "② 탈억제성 사회적 유대감 장애: 양육자와의 애착 외상을 경험한 아동이 낯선 사람을 대상으로 문화적으로 부적절하고 과도하게 친숙한 행동을 보인다.", "③ 적응장애: 인식 가능한 스트레스 요인에 대한 반응으로 감정 또는 행동증상이 스트레스 요인이 시작된 지 3개월 이내에 발달한다.", "④ 외상후 스트레스장애: 충격적인 외상사건을 경험한 후 그 후유증으로 1개월 이상 반복적이고 불수의적이며 침습적으로 외상사건이 떠오르는 고통스러운 증상을 경험한다.", "⑤ 급성스트레스장애: 사별을 겪은 후 지나치게 심각한 애도 반응과 개인의 부적응 상태가 12개월 이상 지속되어 나타난다."], "answer": 4, "expl": "급성스트레스장애는 외상 후 3일~1개월 사이의 증상을 다루는 진단이며, 사별 후 12개월 이상 지속되는 심각한 애도 반응은 '지속성 복합 사별장애'에 해당해 급성스트레스장애 설명으로는 옳지 않다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "DSM-5의 해리성 정체감장애에 관한 설명으로 옳은 것은?", "options": ["① 자신의 생각, 감정, 감각, 신체 또는 행동에 관하여 외부관찰자가 된 것 같은 경험을 한다.", "② 일상적인 망각으로는 설명하기 어려운 외상성이거나 스트레스성인 자서전적 정보를 회상하는 능력을 상실한다.", "③ 둘 이상 다른 성격 상태를 특징적으로 나타내는 정체감의 분열을 보인다.", "④ 주변환경이 비현실적으로 느껴지거나 그것과 분리된 것 같은 느낌을 갖는다.", "⑤ 거의 또는 아예 없는 자극에도 과민한 행동이나 분노를 보이며 사람이나 물건을 대할 때 언어적ㆍ신체적 공격성을 나타낸다."], "answer": 2, "expl": "해리성 정체감장애는 둘 이상의 뚜렷이 구별되는 성격 상태(정체성)가 존재하는 정체감의 분열이 핵심 특징이다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "신체증상 및 관련 장애에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 질병불안장애는 자신이 어떤 심각한 질병에 걸려있다고 생각하고 개인적 건강 상태에 대해 매우 예민한 증상을 보인다.\nㄴ. 신체증상장애는 6개월 이상 한 개 이상의 신체 증상에 대한 지나친 생각, 불안, 행동을 보이거나 과도한 건강염려를 보인다.\nㄷ. 전환장애는 남성보다 여성에게서 2∼3배 더 흔하다.\nㄹ. 인위성장애는 명백한 외적 보상을 얻기 위해 기만적으로 병을 만든다.", "options": ["① ㄱ, ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "질병불안장애, 신체증상장애, 전환장애(여성에서 더 흔함), 인위성장애 각각의 설명 모두 DSM-5 기준과 일치한다."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "DSM-5의 이식증에 관한 설명으로 옳은 것은?", "options": ["① 섭취행동이 사회적 관습, 혹은 문화적 지지를 받지 못한다.", "② 최소 1개월 동안 급식 혹은 섭식 후 나타나는 음식물의 반복적인 역류가 있다.", "③ 음식섭취의 회피나 제한으로 인한 위장관 급식 혹은 경구 영양 보충제에 의존한다.", "④ 체중이 증가하거나 비만이 되는 것에 관한 극심한 두려움으로 인해 이를 막기 위한 지속적인 행동을 한다.", "⑤ 체중과 체형이 자기 평가에 과도한 영향을 미친다."], "answer": 0, "expl": "비영양성·비음식 물질을 최소 1개월 이상 지속적으로 섭취하고 이것이 발달수준에 부적절하며 사회문화적으로 허용되지 않는 것이 이식증의 핵심 진단기준이다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "사건수면(parasomnias)에 해당하는 것은?", "options": ["① 일주기리듬-수면각성장애", "② 불면장애", "③ 기면증", "④ 비REM수면 각성장애", "⑤ 중추성 수면무호흡증"], "answer": 3, "expl": "사건수면은 수면 중 발생하는 이상행동(잠꼬대, 몽유병, 야경증 등)을 의미하며, 비REM수면 각성장애(몽유병형/야경증형)가 대표적인 사건수면 유형이다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "다음에 해당하는 DSM-5의 성 관련 장애로 옳은 것은?\nB는 '굴욕과 매질을 당하거나 묶이거나 기타 다른 방식으로 고통을 경험하는 행위를 통해 강렬한 성적 흥분이 성적 공상, 성적 충동 또는 성적 행동으로 발현된다'며 이런 흥미에 대해 거리낌 없이 공개적으로 드러낸다.", "options": ["① 성적피학장애", "② 노출장애", "③ 관음장애", "④ 마찰도착장애", "⑤ 물품음란장애"], "answer": 0, "expl": "고통이나 굴욕을 당하는 것 자체에서 강렬한 성적 흥분을 느끼는 패턴은 성적피학장애의 정의에 해당한다."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "DSM-5의 적대적 반항장애에 관한 설명으로 옳지 않은 것은?", "options": ["① 아동이나 청소년의 경우 성인과 잦은 논쟁을 한다.", "② 권위자의 요구, 규칙을 무시하거나 거부하는 행동을 적극적으로 자주 한다.", "③ 자신의 실수나 잘못된 행동을 자주 남의 탓으로 돌린다.", "④ 자주 화를 내고 크게 분개한다.", "⑤ 사람과 동물에 대한 공격성을 보인다."], "answer": 4, "expl": "적대적 반항장애는 분노/과민한 기분, 논쟁적/반항적 행동, 보복적 특성이 핵심이며, 사람과 동물에 대한 신체적 공격성은 오히려 품행장애의 진단기준에 해당해 적대적 반항장애 설명으로는 옳지 않다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "DSM-5의 알코올 중독 진단 증상에 관한 내용으로 옳지 않은 것은?", "options": ["① 운동조정장애", "② 안구진탕", "③ 불분명한 언어", "④ 빈맥 혹은 심부정맥", "⑤ 집중력 또는 기억력 상실"], "answer": 3, "expl": "집중력·기억력 저하는 알코올 중독의 급성 증상이라기보다 만성적인 알코올 사용의 결과(코르사코프 증후군 등)에 가까워, 급성 중독 시의 신체 증상(운동조정장애, 안구진탕, 불분명한 언어, 빈맥 등)과는 구분된다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "DSM-5의 주의력결핍 과잉행동장애에 관한 설명으로 옳지 않은 것은?", "options": ["① 몇 가지의 부주의 또는 과잉행동-충동성 증상이 두 가지 또는 그 이상의 환경에서 존재한다.", "② 주의력결핍 과잉행동장애가 있는 아동은 품행장애 등 공존장애를 가지고 있는 경우가 있다.", "③ 성인기까지 지속되어 사회적ㆍ학업적ㆍ직업적 손상을 야기할 수 있다.", "④ 리탈린(Ritalin)과 같은 중추신경자극제가 치료약물로 사용된다.", "⑤ 학습에 필요한 준비물을 챙기지 못하는 것은 충동성 증상이다."], "answer": 4, "expl": "준비물을 챙기지 못하는 것은 충동성이 아니라 부주의(inattention) 증상에 해당한다."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "다음에 해당하는 DSM-5의 진단명으로 옳은 것은?\n○ 자신의 목적 달성을 위해 타인 이용\n○ 자신의 중요성에 관한 과장된 지각\n○ 거만하고 방자한 행동이나 태도를 보임\n○ 특별대우를 받을만한 이유가 없는데도 특별대우나 타인의 복종을 바람", "options": ["① 편집성 성격장애", "② 분열성 성격장애", "③ 자기애성 성격장애", "④ 반사회성 성격장애", "⑤ 의존성 성격장애"], "answer": 2, "expl": "타인 이용, 과장된 자기중요성, 거만한 태도, 특별대우 요구 등은 자기애성 성격장애의 대표적 특징이다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "DSM-5의 연극성 성격장애에 관한 설명으로 옳지 않은 것은?", "options": ["① 사회적으로 고립되어 있으며 타인과 가까운 대인관계를 맺지 못하고 기이한 생각과 행동이 나타난다.", "② 자신이 관심의 초점이 되지 못하는 상황에서 불편감을 느낀다.", "③ 다른 사람과의 관계에서 흔히 상황에 어울리지 않게 성적으로 유혹적이거나 도발적이다.", "④ 지나치게 인상적이고 세밀함이 결여된 형태의 언어를 사용한다.", "⑤ 타인과의 관계를 실제보다 더 가깝다고 생각해 거의 모든 지인을 친한 친구라고 표현한다."], "answer": 0, "expl": "사회적 고립, 대인관계 회피, 기이한 생각·행동은 조현성/조현형 성격장애의 특징이며, 연극성 성격장애는 오히려 관심 추구, 과도한 감정표현, 피상적 대인관계가 특징이라 정반대에 가깝다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "DSM-5의 '임상적 주의의 초점이 될 수 있는 기타의 상태' 중 '사회환경과 관련된 기타 문제'에 속하지 않는 것은?", "options": ["① 문화 적응의 어려움", "② 사회적 배척이나 거부", "③ 부정적 차별이나 박해의 표적", "④ 의학적 치료를 멀리함", "⑤ 혼자살기와 관련한 문제"], "answer": 3, "expl": "의학적 치료를 멀리하는 것은 '치료 순응과 관련된 문제'에 해당하며, 문화적응 어려움·사회적 배척·차별·혼자살기 문제는 사회환경 관련 문제 범주에 속한다."}, {"no": "23-76", "year": 2024, "qno": 1, "text": "이상심리의 행동주의 모형에 관한 설명으로 옳지 않은 것은?", "options": ["① 이상행동을 조건형성을 통해 설명한다.", "② 무의식적 욕구나 갈등은 가정하지 않는다.", "③ 개념들이 너무 추상적이어서 측정하기 어렵다.", "④ 이상행동을 잘못된 학습의 결과로 본다.", "⑤ 행동주의 모형에 입각한 치료에는 체계적 둔감법이 있다."], "answer": 2, "expl": "행동주의 모형은 관찰 가능한 행동과 구체적 조작적 개념을 사용하는 것이 특징이며, '추상적이어서 측정하기 어렵다'는 설명은 오히려 정신분석 모형에 대한 비판에 가깝다."}, {"no": "23-77", "year": 2024, "qno": 2, "text": "DSM-5에 포함되지 않은 정신장애는?", "options": ["① 지속적 비탄장애", "② 되새김장애", "③ 유뇨증", "④ 섬망", "⑤ 병적 방화"], "answer": 0, "expl": "지속적 비탄장애(지속성 복합 사별장애)는 DSM-5 본문 진단이 아니라 '추가연구가 필요한 진단적 상태'로 부록에 수록되어 있다."}, {"no": "23-78", "year": 2024, "qno": 3, "text": "정신장애 분류의 장점으로 옳지 않은 것은?", "options": ["① 상담자들과 연구자들이 일관성 있게 공통적인 용어를 사용할 수 있다.", "② 축적된 연구결과와 임상적 지식을 체계적으로 정리 및 전달할 수 있다.", "③ 정신장애의 공통적 특성과 원인에 대한 연구가 가능해진다.", "④ 진단된 장애 속성 이외에도 개인의 독특한 증상과 특성을 고려하며, 개인의 특수성에 초점을 맞출 수 있다.", "⑤ 심리장애들 간의 유사성과 차이점을 인식하는 데 도움을 줄 수 있다."], "answer": 3, "expl": "진단분류체계는 공통 범주로 묶는 특성상 개인의 고유한 특수성보다는 공통적 특징에 초점을 두므로, '개인의 특수성에 초점'이라는 설명은 분류체계의 한계이지 장점이 아니다."}, {"no": "23-79", "year": 2024, "qno": 4, "text": "DSM-5의 지적장애 중등도 수준에 해당하는 것을 모두 고른 것은?\nㄱ. 말 표현 시 어휘나 문법에 상당한 제한이 있다.\nㄴ. 학령 전기 아동에서는 언어와 학습 준비 기술이 느리게 발달한다.\nㄷ. 전 발달 영역에 걸쳐, 개념적 기술이 또래에 비해 현저히 뒤처진다.\nㄹ. 전 발달 과정에 걸쳐 사회적 행동과 의사소통 행동에서 또래들과 확연한 차이를\n보인다.", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "말과 문법의 제한(ㄱ), 학령전기 언어·학습 지연(ㄴ), 전 발달영역에서 뚜렷한 사회적 행동·의사소통 차이(ㄹ)는 중등도 수준의 특징이나, 개념적 기술이 '또래에 비해 현저히' 뒤처진다는 표현(ㄷ)은 중등도보다 더 심한 수준(고도)에 해당하는 기술에 가깝다."}, {"no": "23-80", "year": 2024, "qno": 5, "text": "다음 사례에 해당하는 DSM-5의 신경발달장애는?", "options": ["① 투렛장애", "② 잠정적 틱장애", "③ 발달성 협응장애", "④ 상동증적 운동장애", "⑤ 지속성 운동 또는 음성 틱장애"], "answer": 0, "expl": "여러 운동틱과 음성틱(중얼거림, 욕설)이 1년 이상 지속되는 사례는 투렛장애의 전형적인 임상양상이다."}, {"no": "23-81", "year": 2024, "qno": 6, "text": "DSM-5에서 조현병의 음성증상은?", "options": ["① 상황에 맞지 않는 부적절한 정서", "② 망상", "③ 환각", "④ 와해된 언어", "⑤ 정서적 둔마"], "answer": 4, "expl": "정서적 둔마(감정표현 감소)는 조현병의 대표적인 음성증상이며, 망상·환각·와해된 언어는 양성증상에 해당한다."}, {"no": "23-82", "year": 2024, "qno": 7, "text": "DSM-5의 망상장애 아형(Subtypes)으로 옳지 않은 것은?", "options": ["① 색정형", "② 과대형", "③ 공격형", "④ 피해형", "⑤ 질투형"], "answer": 2, "expl": "망상장애의 아형에는 색정형, 과대형, 질투형, 피해형, 신체형, 혼합형 등이 있으며 '공격형'은 이에 해당하지 않는다."}, {"no": "23-83", "year": 2024, "qno": 8, "text": "DSM-5의 각 조현병 스펙트럼 장애와 그 진단기준을 옳게 짝지은 것을 모두 고른 것은?\nㄱ. 조현병: 망상, 환각, 혼란스러운 언어, 심하게 혼란스러운 행동이나 긴장증적 행동,\n음성 증상들 중 최소 3가지 이상의 진단기준이 1개월간 지속되어야 한다.\nㄴ. 조현정동장애: 조현병의 증상과 더불어 주요 우울 또는 조증 삽화가 포함되어야 한다.\nㄷ. 망상장애: 1개월 이상의 지속 기간을 가진 한 가지 혹은 그 이상의 망상이 존재한다.\nㄹ. 단기 정신병적 장애: 망상, 환각, 와해된 언어, 극도로 와해된 또는 긴장성 행동의\n지속 기간이 1개월 이상 6개월 이내이다.", "options": ["① ㄱ", "② ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "조현병은 활성기 증상이 1개월간 지속되어야 하고(ㄱ), 조현정동장애는 기분삽화 동반(ㄴ), 망상장애는 1개월 이상의 망상(ㄷ), 단기정신병적장애는 1일~1개월 지속(1개월 이상 6개월 이내가 아님)이 기준이라 ㄹ의 기간 설명이 옳지 않아 ㄱ·ㄴ·ㄷ이 옳다."}, {"no": "23-84", "year": 2024, "qno": 9, "text": "DSM-5의 조증 삽화 진단기준으로 옳지 않은 것은?", "options": ["① 불면증", "② 사고의 비약", "③ 목표 지향적 활동의 증가", "④ 자존감의 증가 또는 과대감", "⑤ 고통스러운 결과를 초래할 가능성이 높은 활동에의 지나친 몰두"], "answer": 0, "expl": "불면증 자체가 조증 진단기준은 아니며, 조증에서는 '수면에 대한 욕구 감소'(적게 자도 개운함)가 진단기준에 해당해 불면증과는 구별된다."}, {"no": "23-85", "year": 2024, "qno": 10, "text": "다음에 해당하는 우울증의 유형은?", "options": ["① 반응성 우울증", "② 내인성 우울증", "③ 지체성 우울증", "④ 정신병적 우울증", "⑤ 신경증적 우울증"], "answer": 0, "expl": "사별, 실연, 실직 등 명확한 환경적 스트레스가 계기가 되어 발생하는 우울증은 반응성 우울증에 해당한다."}, {"no": "23-86", "year": 2024, "qno": 11, "text": "DSM-5의 불안장애 하위유형에 해당하는 것을 모두 고른 것은?\nㄱ. 선택적 함구증 ㄴ. 분리불안장애 ㄷ. 특정공포증\nㄹ. 범불안장애 ㅁ. 사회불안장애", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ, ㅁ", "③ ㄱ, ㄷ, ㄹ, ㅁ", "④ ㄴ, ㄷ, ㄹ, ㅁ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 4, "expl": "선택적함구증, 분리불안장애, 특정공포증, 범불안장애, 사회불안장애 모두 DSM-5 불안장애의 하위유형에 포함된다."}, {"no": "23-87", "year": 2024, "qno": 12, "text": "DSM-5의 공황장애에 관한 설명으로 옳지 않은 것은?", "options": ["① 반복적으로 예상하지 못한 공황발작이 일어난다.", "② 발작 혹은 그로 인한 지속적인 염려와 걱정, 발작과 관련한 심각한 부적응적인 행동들이 3개월 이상 나타나야 한다.", "③ 공황장애 3요인 인지이론은 공황장애가 불안 민감성, 파국적 오해석, 공황적 자기 효능감에 의해서 유발된다고 본다.", "④ 신경생물학적 관점에서는 청반핵과 노르에피네프린이 공황장애와 관련되어 있다고 본다.", "⑤ 대표적인 치료방법으로 공황통제치료(panic control treatment)가 있다."], "answer": 1, "expl": "공황장애 진단기준은 발작 후 염려나 부적응 행동이 '1개월' 이상 지속되어야 하며, '3개월 이상'이라는 기간은 진단기준과 다르다."}, {"no": "23-88", "year": 2024, "qno": 13, "text": "다음 사례에 해당하는 DSM-5의 장애는?", "options": ["① 적응장애", "② 공황장애", "③ 강박장애", "④ 급성스트레스장애", "⑤ 외상후 스트레스장애"], "answer": 3, "expl": "심각한 사고 후 3주가 지난 시점에서 플래시백, 불면, 회피 등이 지속되는 것은 증상 지속 기간(1개월 이상 지속 시 PTSD, 그 이전은 급성스트레스장애 기준)을 고려할 때 급성스트레스장애에 해당한다."}, {"no": "23-89", "year": 2024, "qno": 14, "text": "DSM-5의 강박장애에 관한 설명으로 옳지 않은 것은?", "options": ["① 강박사고나 강박행동은 시간을 소모하게 만든다.", "② 일반적으로 발병 연령은 남성이 여성보다 더 빠르다.", "③ 원하지 않은 불쾌한 생각이 자꾸 떠올라 그것을 제거하기 위한 행동을 반복하게 되는 장애이다.", "④ 심리적 치료방법으로 노출 및 반응방지법이 효과적이라고 알려져 있다.", "⑤ 강박사고와 강박행동 둘 중 하나가 존재하지 않는 경우 강박장애 진단을 내릴 수 없다."], "answer": 4, "expl": "강박장애는 강박사고와 강박행동 중 '하나만' 있어도 진단이 가능하며, 반드시 둘 다 존재해야 한다는 설명은 옳지 않다."}, {"no": "23-90", "year": 2024, "qno": 15, "text": "다음에 해당하는 해리성 정체감 장애 관련 이론은?", "options": ["① 외상 이론", "② 4요인 이론", "③ 신해리 이론", "④ 학습이론: 사회적 강화의 산물", "⑤ 빙의 이론"], "answer": 2, "expl": "억압과 구별되는 수직분할 방어기제로 해리를 설명하는 이론은 신해리 이론(neodissociation theory)이다."}, {"no": "23-91", "year": 2024, "qno": 16, "text": "다음에 해당하는 DSM-5의 신체증상 및 관련 장애는?", "options": ["① 신체증상장애", "② 꾀병", "③ 전환장애", "④ 인위성장애", "⑤ 질병불안장애"], "answer": 3, "expl": "명백한 보상 없이 스스로 증상을 조작하고 아픈 척하는 것은 인위성장애의 핵심 특징이다."}, {"no": "23-92", "year": 2024, "qno": 17, "text": "다음 사례에서 보이는 행동을 설명하는 DSM-5의 진단으로 옳은 것은?", "options": ["① 해리성 정체감 장애", "② 해리성 황홀경", "③ 비현실감 장애", "④ 이인증", "⑤ 해리성 기억상실: 해리성 둔주 동반"], "answer": 4, "expl": "심한 스트레스 후 갑자기 집을 떠나 낯선 곳에서 그간의 기억을 상실한 채 발견되는 사례는 해리성 둔주를 동반한 해리성 기억상실에 해당한다."}, {"no": "23-93", "year": 2024, "qno": 18, "text": "다음 사례에 해당하는 DSM-5의 급식 및 섭식장애는?", "options": ["① 이식증", "②  조현성 성격장애", "③ 조현형 성격장애", "④ 회피성 성격장애", "⑤ 반사회성 성격장애"], "answer": 0, "expl": "관계 욕구 부족과 고립된 생활, 오염에 대한 과도한 걱정과 기이한 행동(자신만의 정수 시스템, 옷 제작)은 조현형 성격장애의 특징적 사례이다."}, {"no": "23-100", "year": 2024, "qno": 25, "text": "'성격장애에 대한 대안적 DSM-5 모델'에서 도출될 수 있는 성격장애를 모두 고른 것은?\nㄱ. 경계선 성격장애 ㄴ. 강박성 성격장애\nㄷ. 의존성 성격장애 ㄹ. 자기애성 성격장애", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "DSM-5 대안모델에서 다루는 6개 성격장애는 경계선, 자기애성, 반사회성, 회피성, 강박성, 조현형이며, 이 중 경계선(ㄱ), 강박성(ㄴ), 자기애성(ㄹ)은 포함되지만 의존성 성격장애(ㄷ)는 대안모델에 포함되지 않는다."}];
const STORAGE_KEY = "ycs2_abnormal_v1";
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let mode = "all";

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function setMode(m){
  mode = m;
  document.getElementById('btn-all').classList.toggle('active', m==='all');
  document.getElementById('btn-wrong').classList.toggle('active', m==='wrong');
  render();
}

function resetAll(){
  if(confirm('푼 기록을 모두 초기화할까?')){
    state = {};
    saveState();
    render();
  }
}

function answer(qIdx, optIdx){
  const q = QUESTIONS[qIdx];
  if(state[q.no] !== undefined) return;
  state[q.no] = optIdx;
  saveState();
  render();
}

function updateMeta(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
}

function updateProgress(){
  const total = QUESTIONS.length;
  const done = QUESTIONS.filter(q => state[q.no] !== undefined).length;
  const correct = QUESTIONS.filter(q => state[q.no] === q.answer).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `${done}/${total} 문제 풀이 · 정답 ${correct}개` + (done>0 ? ` (정답률 ${Math.round(correct/done*100)}%)` : '');
}

function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

function render(){
  updateMeta();
  updateProgress();
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  let list = QUESTIONS;
  if(mode === 'wrong'){
    list = QUESTIONS.filter(q => state[q.no] !== undefined && state[q.no] !== q.answer);
  }
  if(list.length === 0){
    area.innerHTML = '<div class="empty">' + (mode==='wrong' ? '틀린 문제가 없어! 🌿' : '문제가 없어.') + '</div>';
    return;
  }
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const card = document.createElement('div');
    card.className = 'card';
    const answered = state[q.no] !== undefined;
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt';
      if(answered){
        if(i === q.answer) cls += ' correct';
        else if(i === state[q.no]) cls += ' wrong';
      }
      optsHtml += `<button class="${cls}" ${answered?'disabled':''} onclick="answer(${qIdx}, ${i})">${opt}</button>`;
    });
    let feedback = '';
    if(answered){
      const mark = state[q.no] === q.answer
        ? '<div class="feedback correct-mark">✅ 정답</div>'
        : `<div class="feedback wrong-mark">❌ 오답 (정답: ${q.answer+1}번)</div>`;
      const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
      feedback = mark + expl;
    }
    card.innerHTML = `
      <div class="qnum">${q.year} · 문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      ${feedback}
    `;
    area.appendChild(card);
  });
}

render();
</script>
</body>
</html>
