<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가족상담 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .cert-badge{
    display:inline-block;
    font-size:11px;
    color:var(--sub);
    margin:-4px 0 16px;
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .year-pills{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:20px;
  }
  .pill{
    background:var(--bg-base);
    border:none;
    border-radius:20px;
    padding:7px 16px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .pill.active{
    background:var(--accent);
    color:#fff;
    font-weight:600;
    box-shadow:none;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{padding:3px 0;line-height:1.6;}
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .opt-btn{
    display:block;
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    border-radius:10px;
    padding:9px 12px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    white-space:pre-wrap;
    font-family:inherit;
    cursor:pointer;
  }
  .opt-btn:hover:not(:disabled){background:rgba(0,0,0,0.045);}
  .opt-btn:disabled{cursor:default;}
  .opt-btn.correct-reveal{background:var(--right-bg);color:var(--accent-dark);font-weight:600;}
  .opt-btn.wrong-picked{background:#fbeceb;color:var(--wrong);font-weight:600;}
  .opt-btn.neutral-picked{background:#eef0ef;color:var(--text);font-weight:600;}
  .feedback{margin-top:12px;display:none;}
  .feedback.open{display:block;}
  .feedback-mark{font-size:13px;font-weight:600;color:var(--accent-dark);margin-bottom:8px;}
  .feedback-mark.wrong{color:var(--wrong);}
  .explain{
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
</style>
</head>

<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "가정폭력을 촉발하는 요인에 해당하지 않는 것은?", "options": ["① 성장기 가정폭력 경험", "② 과거 트라우마 사건으로 인한 정신장애", "③ 약물남용 및 알코올 중독", "④ 각종 스트레스로 인한 심리적 좌절", "⑤ 견고한 사회적 지지체계"], "answer": 4, "expl": "견고한 사회적 지지체계는 오히려 가정폭력 발생 위험을 낮추는 보호요인에 해당하므로 촉발요인으로 볼 수 없다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "사이버네틱스에 관한 내용으로 옳지 않은 것은?", "options": ["① 피드백 고리는 체계가 안정을 유지하기 위해 필요한 정보를 얻는 과정이다.", "② 잭슨(D. Jackson)에 의해 개발되었다.", "③ 자기조절 체계에서 피드백 기제에 관한 내용이다.", "④ 부적 피드백은 체계가 원래의 상태로 복귀하라는 신호를 보내 체계를 유지한다.", "⑤ 정적 피드백은 체계의 변화를 유도하고 다른 수준으로 조직하는 작용을 한다."], "answer": 1, "expl": "사이버네틱스 개념은 위너(N. Wiener)가 제안한 것으로, 잭슨은 가족항상성 등 가족치료 이론에 기여한 학자이지 사이버네틱스의 개발자가 아니다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "가정에서 중독 문제에 관한 내용으로 옳지 않은 것은?", "options": ["① 중독가정에서 중독자에게 의존되어 있는 사람을 동반의존자라고 한다.", "② DSM-5에서는 알코올 의존과 알코올 남용장애로 나누고, 5개 이상의 증상을 보일 때 가벼운 정도로 본다.", "③ 청소년 중독자의 경우 가족의 영향력이 강하기 때문에 가족상담적 접근이 필요하다.", "④ 가족원에게서 느끼는 소외와 외로움으로 인해 다른 대상에 의존함으로써 중독에 이를 수 있다.", "⑤ 중독이 장기화될수록 가정에는 우울과 절망감 등의 부정적인 정서가 심화된다."], "answer": 1, "expl": "DSM-5는 알코올 사용장애를 단일 진단범주로 통합하고 경도·중등도·고도로 심각도를 구분하며, '알코올 의존/남용'으로 나누던 방식은 DSM-IV의 분류 체계에 해당한다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "가족상담자의 윤리에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 가족과 개인의 복리를 증진시켜야 한다.\nㄴ. 성별, 장애, 나이, 종교 등을 이유로 내담자를 차별하여 상담한다.\nㄷ. 비밀보장의 의미와 한계를 고지한다.\nㄹ. 내담자와 이중관계를 피하기 위해 노력한다.\nㅁ. 자기 능력의 한계를 벗어난 문제에 대해 진단, 치료, 조언하지 않는다.", "options": ["① ㄱ, ㄴ, ㅁ", "② ㄴ, ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄹ, ㅁ", "④ ㄱ, ㄷ, ㄹ, ㅁ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 3, "expl": "가족과 개인의 복리 증진(ㄱ), 비밀보장 고지(ㄷ), 이중관계 회피(ㄹ), 능력 한계를 벗어난 개입 자제(ㅁ)는 윤리적 의무이며, 차별 금지가 원칙이므로 '차별하여 상담한다'(ㄴ)는 명백히 윤리 위반에 해당해 제외된다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "구조적 가족상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 가족구성원의 상호작용 방식을 조직화하는 보이지 않는 요구가 가족구조를 만든다.", "② '당신은 언제부터 아들의 알람시계였나요?'라는 것은 합류하기의 질문이다.", "③ 과대기능하는 모와 과소기능하는 아들 간 위계 조정을 위해 아들 편을 들면서 균형깨기를 한다.", "④ 침투적이고 모호한 경계선을 가진 가족은 강한 소속감 때문에 자율성이 방해를 받는다.", "⑤ 부모체계는 자녀의 발달단계에 맞는 규칙을 설정하고 부모의 권위를 적절히 사용해야 한다."], "answer": 1, "expl": "'당신은 언제부터 아들의 알람시계였나요?'는 가족의 반복적 상호작용 패턴을 재구성해 보여주는 재구조화(reframing) 질문에 가까우며 합류하기(joining)의 전형적 질문과는 결이 다르다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "다음은 인과관계의 순환성에 관한 내용이다. ( )에 들어갈 내용으로 옳은 것은?\n( )은 살아 있는 체계가 다양한 출발 상태에서 시작하여 여러 방식과 역동적 상호작용을 통해 동일한 특징적 결과에 이르는 경향이다.", "options": ["① 동일처리성", "② 비선형성", "③ 다귀결성", "④ 동일잠재성", "⑤ 동일결과성"], "answer": 4, "expl": "서로 다른 출발상태에서도 동일한 결과에 도달하는 체계의 경향성은 동일결과성(equifinality)이라 한다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "일반체계이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 체계란 일련의 상호작용적이며 상호의존적인 부분으로 구성된 조직적 통합체로 정의된다.\nㄴ. 블랙박스의 은유를 가족체계에 적용하였다.\nㄷ. 가족은 개인의 집합체 이상인 관계의 망이다.\nㄹ. 일반체계이론은 2차 사이버네틱스와 동일하다.", "options": ["① ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "체계는 상호작용하는 부분들의 통합체(ㄱ)이며, 내부 과정보다 투입-산출 관계에 주목하는 블랙박스 은유가 활용되었고(ㄴ), 가족은 개인의 합 이상의 관계망(ㄷ)으로 이해되지만, 일반체계이론과 2차 사이버네틱스는 서로 다른 개념이라 ㄹ은 옳지 않다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "보웬(M. Bowen)의 가족상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 기본분화 수준이 낮을수록 만성불안의 수준이 높다.", "② 완벽한 분화는 집단 안에서 한 개인이 된다는 것이다.", "③ 부모의 미숙함에 노출되는 자녀일수록 다른 자녀보다 융합의 정도가 높다.", "④ 보웬은 증상을 개인의 문제로 보지 않고, 체계의 문제로 보기 때문에 기법을 강조한다.", "⑤ 미분화 가족자아군은 가족이 감정적으로 한 덩어리가 되어 정서적으로 함께 고착되어 있는 상태를 말한다."], "answer": 3, "expl": "보웬 이론은 증상을 개인이 아닌 가족체계 전체의 문제로 보지만, 기법 중심이 아니라 상담자 자신의 분화 수준과 자연스러운 개입을 중시하는 이론이라 '기법을 강조한다'는 설명은 옳지 않다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "해결중심단기 가족상담의 목표 설정 원칙에 해당하지 않는 것은?", "options": ["① 부정적 문제행동 소거를 목표로 한다.", "② 구체적이고 행동적인 것을 목표로 한다.", "③ 지금 여기에서 시작하는 것을 목표로 한다.", "④ 내담자가 중요하다고 여기는 것을 목표로 한다.", "⑤ 목표 수행은 힘든 일이라는 것을 내담자가 인식하도록 한다."], "answer": 0, "expl": "해결중심상담은 부정적 문제 제거보다 내담자가 원하는 긍정적이고 구체적인 상태(목표)를 설정하는 것을 원칙으로 하므로 '부정적 문제행동 소거'를 목표로 한다는 설명은 이 접근의 철학과 맞지 않는다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "가족상담자의 역할에 관한 내용으로 옳은 것을 모두 고른 것은?\nㄱ. 가족의 주요 갈등에 대해 탐색하고 어떻게 대처해 왔는지 확인한다.\nㄴ. 가족의 관계과정에 대해 체계론적 관점으로 문제를 이해한다.\nㄷ. 상담 구조화에서는 상담목표를 설정하고 치료적 계획을 구체화한다.", "options": ["① ㄴ", "② ㄱ, ㄴ", "③ ㄱ, ㄷ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 4, "expl": "가족상담자는 체계론적 관점에서 문제를 이해하고(ㄴ), 상담 구조화 단계에서 목표와 계획을 구체화하며(ㄷ), 가족의 갈등 대처 과정을 탐색하는 것(ㄱ) 모두 가족상담자의 역할에 해당한다."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "다음은 리즈(T. Lidz)의 부부관계에 관한 내용이다. ( )에 들어갈 내용으로 옳은 것은?\n( ㄱ )은 부부가 꾸준히 서로의 ( ㄴ )를(을) 깎아 내리고 ( ㄷ )에게 충성과 애정을 얻기 위해 노골적으로 경쟁한다는 것이다.", "options": ["① ㄱ: 부부불균형, ㄴ: 가치, ㄷ: 배우자", "② ㄱ: 부부불균형, ㄴ: 단점, ㄷ: 자녀", "③ ㄱ: 부부균열, ㄴ: 장점, ㄷ: 배우자", "④ ㄱ: 부부균열, ㄴ: 가치, ㄷ: 자녀", "⑤ ㄱ: 부부폭력, ㄴ: 장점, ㄷ: 자녀"], "answer": 3, "expl": "리즈는 부부 간에 서로의 가치를 깎아내리며 자녀에게 충성과 애정을 얻기 위해 경쟁하는 양상을 부부균열(marital schism)로 설명하였다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "가족상담 초기단계에 관한 내용으로 옳지 않은 것은?", "options": ["① 상담에 참석해야 할 사람과 날짜, 장소, 시간을 구체적으로 정한다.", "② 가족상담자는 가족이 참여할 수 있도록 격려한다.", "③ 내담자 문제를 진단, 평가하고 호전될 수 있다는 확신을 준다.", "④ 가족들이 상담에 오기를 두려워할 때, 참여 독려전화를 하면 불참률을 낮출 수 있다.", "⑤ 첫 면담의 주요 목표는 라포형성과 정보 수집에 있다."], "answer": 2, "expl": "초기단계에서 상담자가 '호전될 수 있다는 확신'을 성급히 주는 것은 실제 평가 이전에 이루어지는 부적절한 개입이며, 초기단계의 핵심은 오히려 신뢰형성과 정보수집에 있다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "보웬(M. Bowen)의 가족상담에 관한 설명으로 옳지 않은 것을 모두 고른 것은?\nㄱ. 자기분화 수준이 높을수록 감정 반사적으로 반응한다.\nㄴ. 원가족에서 촉발 원인을 찾기 위해 인과론적인 사고에 기초한다.\nㄷ. 개인이 개별성과 연합성을 균형 있게 사용할 수 있을 때, 건강한 자아로 성장할 수 있다.\nㄹ. 정서적 프로그래밍은 관계와 학습을 통해 가족 내 여러 세대에 걸쳐 정보를 전달하는 과정에서 발생하는 현상이다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄹ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "자기분화 수준이 높을수록 오히려 감정에 덜 반사적으로 반응하며 이성적 대응이 가능하므로 ㄱ은 옳지 않고, 보웬 이론은 다세대 전수 등 인과론적 사고를 어느 정도 활용하므로(ㄴ) 이 조합이 옳지 않은 설명들에 해당한다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "전략적 가족상담 이론가와 상담기법의 연결로 옳지 않은 것은?", "options": ["① 헤일리(J. Haley) - 고된 체험기법", "② 보스조르메니-나지(I. Boszormenyi-Nagy) - 긍정적 의미부여", "③ 셀비니-파라졸리(M. Selvini-Palazzoli) - 의식(ritual)기법", "④ 마다네스(C. Madanes) - 가장기법", "⑤ 프라타(G. Prata) - 불변의 처방"], "answer": 1, "expl": "긍정적 의미부여는 밀란모델(셀비니-파라졸리 등)의 대표 기법이며, 보스조르메니-나지는 맥락적 치료에서 신뢰·공정성 개념을 강조한 학자로 이 연결은 옳지 않다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "해결중심단기 가족상담의 중심철학으로 옳은 것을 모두 고른 것은?\nㄱ. 효과가 있는 것을 알면 그것을 더 많이 한다.\nㄴ. 내담자가 문제 삼지 않은 것은 건드리지 않는다.\nㄷ. 효과가 없다면 그것을 하지 않고 대신 무언가 다른 것을 한다.\nㄹ. 내담자의 문제는 체계의 역동에서 촉발되므로 내담자와 협력한다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "해결중심 철학은 효과 있는 것을 더 하고(ㄱ), 효과 없으면 다른 것을 시도하며(ㄷ), 문제 삼지 않는 것은 건드리지 않는다(ㄴ)는 원칙에 기반하지만, 체계 역동에서 문제 원인을 찾는 것(ㄹ)은 오히려 문제중심적 사고에 가까워 해결중심 철학과는 맞지 않는다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "자해시도 청소년의 가족사정을 위해 사용할 수 있는 도구와 목적의 연결로 옳지 않은 것은?", "options": ["① FACES - 가족의 응집성과 적응성 측정", "② PREPARE - 부모의 부부관계 건강성 측정", "③ JTCI - 청소년 자녀의 기질 및 성격 특성 파악", "④ 생태도 - 청소년 자녀와 가족의 환경과의 연계 탐색", "⑤ 가족놀이가계도 - 가족구성원의 의사소통 패턴, 상호작용 유형 등을 파악"], "answer": 1, "expl": "PREPARE는 결혼 예비/신혼부부를 위한 부부관계 평가도구이며, 부모의 부부관계 건강성 자체를 측정하는 전용 도구로 한정하기보다 관계 전반의 적응력을 다루는 검사라 이 연결 설명은 다소 부정확하다."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "사티어(V. Satir)의 경험적 가족상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 경험적 치료과정에서는 내담자의 체험을 중시한다.", "② 빙산은 개인 및 가족의 심리 내적 경험을 이해할 수 있는 지도이다.", "③ 가족조각은 가족의 주요 사건을 그림으로 표현하여 가족의 역동을 살펴보는 기법이다.", "④ 가족규칙은 일종의 명령으로 원가족 삼인군의 경험에서 획득하여 내재화한 것이다.", "⑤ 자아존중감의 요소는 자기, 타인, 상황으로 낮은 자아존중감을 회복시키는 것이 목표이다."], "answer": 4, "expl": "가족조각은 그림이 아니라 가족구성원을 신체적으로 배치하여 관계 역동을 시각적·신체적으로 표현하는 기법이다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "다음에서 설명하고 있는 구조적 가족상담 기법은?\n○ 가족의 언어적 설명보다는 실제 상호교류를 주의 깊게 살펴본다.\n○ 가족으로 하여금 갈등이나 다른 상호작용을 연기하도록 요청한다.", "options": ["① 모방하기", "② 실연하기", "③ 추적하기", "④ 유지하기", "⑤ 경계선 세우기"], "answer": 3, "expl": "가족의 실제 상호작용을 관찰하기 위해 갈등 상황을 그 자리에서 재연하도록 요청하는 기법은 실연하기(enactment)이다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "카터(B. Carter)와 맥골드릭(M. McGoldrick)의 가족생활주기에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 가족생활주기는 6단계로 결혼으로 시작된다.\nㄴ. 가족생활주기에 현대 사회의 특성이 반영된 과제를 첨가해야 한다는 의미에서 이혼과 재혼가정을 포함시켰다.\nㄷ. 청소년기 자녀를 둔 가족은 자녀의 자립을 인정하는 가족경계가 확대되어야 한다.\nㄹ. 가족생활주기 변화에 따라 야기되는 긴장을 수평적, 수직적 긴장으로 구분하였다.", "options": ["① ㄷ, ㄹ", "② ㄱ, ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "가족생활주기는 결혼이 아닌 '독신 성인기'에서 시작하며, 이혼·재혼 가정을 포함시킨 점(ㄴ), 청소년기 자녀 가족의 경계 확대(ㄷ), 수평적·수직적 긴장 구분(ㄹ)은 카터와 맥골드릭 이론의 특징이 맞지만 시작단계(ㄱ)에 대한 설명은 옳지 않다."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "다음 사례에 대한 가족상담 개입에 관한 내용으로 옳지 않은 것은?\nY(여, 13세, 초6)는 최근 스마트폰 중독으로 인한 등교거부 문제로 가족상담에 의뢰되었다. Y의 모는 딸과 친하게 지내고 싶은데, 자신이 밤늦게까지 일을 해야 되고, 그것은 남편이 무능하기 때문이라고 한다. Y는 초4때 학교에 집중하지 못해 상담을 권유받아, 병원에서 소아우울증 진단을 받았다. Y는 하교하면 할머니와 밤늦게까지 있다가 부모가 데리러 오면 집으로 간다. 2년 전 Y를 매우 예뻐해 주시던 할아버지가 갑자기 돌아가셨다. 현재 Y는 할머니 말을 잘 듣지 않고 무시하는 편이며, 대부분의 시간은 스마트폰을 붙들고 지낸다.", "options": ["① 할아버지 상실에 대한 애도작업을 한다.", "② 핵가족 정서체계에서 부모의 부부관계를 다룬다.", "③ Y의 스마트폰 중독이 문제이므로 행동수정 작업만 한다.", "④ 어머니와의 친밀감 향상 등 관계 회복을 위한 작업을 한다.", "⑤ Y에 대해 할머니와 부모의 양육태도에서 갈등은 없는지 살핀다."], "answer": 0, "expl": "스마트폰 중독이라는 표면적 문제 이면에는 애도(할아버지 상실), 부부관계, 어머니와의 애착, 조모-부모 양육태도 갈등 등 복합적 가족역동이 얽혀 있어, 행동수정만으로 접근하는 것은 체계론적 관점에서 지나치게 단순한 개입이다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "가족상담의 기본 개념에 관한 내용으로 옳지 않은 것은?", "options": ["① 대칭적 관계는 평등성과 다중성을 기초로 한다.", "② 거짓상호성은 겉으로 드러난 가족원간의 친밀한 상호작용이 사실과 다른 모습이다.", "③ 고무울타리는 가족을 둘러싼 경계가 유동적이나 외부의 영향이 스며들지 않는 것을 말한다.", "④ 이중구속은 두 가지 모순된 메시지가 서로 다른 수준에서 전달되는 경우이다.", "⑤ 삼각관계는 두 사람 사이의 불안과 긴장을 해소하기 위하여 다른 사람이나 대상을 관계로 끌어들이는 것이다."], "answer": 3, "expl": "고무울타리(rubber fence)는 겉보기에 경계가 있는 듯 보이지만 실제로는 외부 정보나 영향이 자유롭게 침투하는 불안정한 경계를 의미하며, '외부 영향이 스며들지 않는다'는 설명은 정의와 반대된다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "이야기치료에 관한 설명으로 옳지 않은 것은?", "options": ["① 인간은 사회적 관계와 문화적 맥락 속에서 자신을 이해하고 정체성을 형성해 간다.", "② 우리가 살아가는 실재는 언어를 통해 구성되고 표현된다.", "③ 인간은 자신에게 일어나는 삶의 사건을 해석하고 그에 대해 의미를 부여한다.", "④ 문제가 되는 것은 문제를 갖고 있는 개인과 문제 그 자체이다.", "⑤ 내담자가 스스로 중요하게 여기는 가치와 의미에 기반한 선호된 이야기를 발견하도록 돕는다."], "answer": 0, "expl": "이야기치료는 문제와 사람을 분리해서 보는 문제의 외재화를 핵심 전제로 삼으며, '문제를 가진 개인과 문제 자체'를 동일시하는 관점은 이야기치료의 철학과 정반대이다."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "다음에서 이야기치료 상담자가 시도하고 있는 개입 기법은?\n○ 우울이라는 존재가 언제부터 당신 곁에 있었던 것 같나요?\n○ 우울이 나타날 때는 언제인지, 그 패턴을 알 수 있나요?\n○ 그 우울에 이름을 붙여 본다면 무엇이라고 할 수 있을까요?", "options": ["① 정의 예식", "② 독특한 결과", "③ 스캐폴딩 분석", "④ 문제의 외재화", "⑤ 다시 말하기"], "answer": 4, "expl": "문제(우울)를 하나의 독립된 존재로 이름 붙이고 그 영향력·패턴을 탐색하는 개입은 문제의 외재화 기법의 전형적인 예이다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "경험적 가족상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 휘태커(C. Whitaker)의 부조리치료(therapy of the absurd) 개입은 적극적이면서도 지시적이다.", "② 상징-경험적 상담의 휘태커(C. Whitaker)는 정서적 과정과 가족구조에 초점을 맞춘다.", "③ 상징-경험적 가족상담자들은 내담자들과의 관계 구축을 위해 따뜻함과 직면을 균형적으로 사용한다.", "④ 경험적 가족상담에서는 개인적 차원에서 체계를 다룬다.", "⑤ 내면가족체계치료는 원래 트라우마와 학대 생존자들을 위한 치료로 체계적 원리를 이용하여 개인의 내적인 부분들과 작업한다."], "answer": 1, "expl": "경험적 가족상담은 개인의 정서적 경험을 다루면서도 이를 가족체계 전체 맥락에서 이해하려 하므로, '개인적 차원에서만' 체계를 다룬다는 설명은 이 접근의 통합적 성격과 맞지 않는다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "가족상담자가 가정폭력 개입 시 고려해야 하는 사항으로 옳지 않은 것은?", "options": ["① 폭력이 확인되는 경우 우선 폭력을 중지시킨다.", "② 폭력행위와 행위자-피해자의 관계체계의 두 가지 측면을 파악하고 다룰 수 있어야 한다.", "③ 폭력 피해자의 두려움 정도, 관계 개선 의지 여부 등의 평가를 통해 상담진행 여부를 판단할 수 있다.", "④ 가정폭력의 원인을 규명하고 스트레스가 발생하는 이유에 대한 설명을 제공한다.", "⑤ 아동학대인 경우에 사실을 확인 후 관계기관에 알리고 바로 가정에 돌려보낸다."], "answer": 4, "expl": "아동학대가 확인된 경우에는 관계기관에 신고한 후 안전이 확보되지 않은 상태로 곧바로 가정에 돌려보내서는 안 되며, 안전 조치가 우선되어야 한다."}, {"no": "23-51", "year": 2024, "qno": 1, "text": "가족상담 초기단계의 상담자 역할로 옳지 않은 것은?", "options": ["① 가족구성원이 이해받고 존중받는 느낌을 갖도록 한다.", "② 가족구성원 간 상호작용을 지지하고 가족체계에 합류한다.", "③ 직면을 통해 문제에 관한 통찰을 유도한다.", "④ 상담자 역할의 범위와 가족의 행동규범에 관해 안내한다.", "⑤ 구체적인 상담 목표를 설정한다."], "answer": 2, "expl": "직면을 통한 통찰 유도는 신뢰관계가 형성된 중기단계에서 주로 이루어지며, 초기단계에서는 라포 형성과 합류가 우선이다."}, {"no": "23-52", "year": 2024, "qno": 2, "text": "경험적 가족상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 가족구성원의 정서적 경험과 표현에 중요한 가치를 둔다.", "② 지금-여기에서 일어나는 상호작용 과정을 중시한다.", "③ 대표 인물로 사티어(V. Satir)와 위태커(C. Whitaker)가 있다.", "④ 인본주의 심리학에 뿌리를 두고 있다.", "⑤ 가족의 경계와 위계를 파악하는 데 초점을 둔다."], "answer": 4, "expl": "가족의 경계와 위계를 다루는 것은 구조적 가족상담의 초점이며, 경험적 가족상담은 정서적 경험과 성장에 초점을 둔다."}, {"no": "23-53", "year": 2024, "qno": 3, "text": "구조적 가족상담의 주요 기법과 설명의 연결로 옳은 것은?", "options": ["① 실연하기 - 가족구성원 간의 교류를 상담 과정에서 실제로 재현시키는 기법", "② 경계선 만들기 - 가족원의 언어나 몸짓을 그대로 따라하는 기법", "③ 증상 과장하기 - 가족 상호작용의 규칙과 구조를 지지하고 따르는 기법", "④ 긴장고조 기법 - 가족의 긍정적인 면을 부각시키고 강화함으로써 상호작용 흐름의 방향을 바꾸는 기법", "⑤ 증상 재명명하기 - 가족이 기존의 상호작용을 계속하도록 격려하는 기법"], "answer": 0, "expl": "실연하기는 가족 간 상호작용을 상담 장면에서 실제로 재현시켜 관찰·개입하는 구조적 가족상담의 대표 기법이다."}, {"no": "23-54", "year": 2024, "qno": 4, "text": "보웬( . Bowen)의 가족상담에서 아래의 사례를 설명하는 개념으로 옳은 것은?", "options": ["① 사회적 정서과정", "② 부부균열", "③ 거짓적대성", "④ 삼각관계", "⑤ 정서적 단절"], "answer": 3, "expl": "부부갈등의 긴장을 해소하기 위해 자녀에게 과도하게 집중하는 것은 삼각관계 형성의 전형적인 사례이다."}, {"no": "23-55", "year": 2024, "qno": 5, "text": "가족상담자의 윤리에 관한 설명을 모두 고른 것은?\nㄱ. 내담자와 사업적 관계나 성적 관계 등을 맺지 않는다.\nㄴ. 내담자에게 비밀을 보장받을 권리와 한계에 관하여 안내한다.\nㄷ. 내담자에게 가족상담자 자신의 관점과 가치를 받아들이도록 요구한다.\nㄹ. 상담내용은 내담자의 동의 없이 연구 등 공공 목적을 위해 활용할 수 있다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "내담자와 사업적·성적 관계 금지(ㄱ), 비밀보장 한계 안내(ㄴ)는 윤리원칙에 해당하지만, 상담자의 가치를 강요(ㄷ)하거나 동의 없이 정보를 공공목적에 활용(ㄹ)하는 것은 윤리 위반이다."}, {"no": "23-56", "year": 2024, "qno": 6, "text": "다음 설명에 해당하는 보웬( . Bowen)의 가족상담 기법으로 옳은 것은?", "options": ["① 나 입장(I-position) 취하기", "② 관계실험", "③ 과정질문", "④ 코칭", "⑤ 가계도"], "answer": 1, "expl": "추적자-도망자 등 삼각관계 역할에 변화를 주어 새로운 반응방식을 경험하게 하는 기법은 관계실험이다."}, {"no": "23-57", "year": 2024, "qno": 7, "text": "후기 가족상담 이론에 영향을 준 사회구성주의에 관한 설명으로 옳지 않은 것은?", "options": ["① 실재(reality)는 언어를 통해 구성된다고 본다.", "② 그 누구도 객관적인 실재를 알 수 없다고 본다.", "③ 전문가의 전문적인 지식을 중요시하는 관점을 가진다.", "④ 실재는 상호작용을 통해 사회적으로 구성된다고 본다.", "⑤ 본질적인 진실이란 존재하지 않는다는 관점을 가진다."], "answer": 2, "expl": "사회구성주의는 전문가의 지식보다 내담자의 주관적 의미와 상호작용을 통한 구성을 중시하므로, '전문가의 지식을 중요시'한다는 설명은 사회구성주의의 관점과 반대된다."}, {"no": "23-58", "year": 2024, "qno": 8, "text": "가족상담 이론과 기법의 연결로 옳지 않은 것은?", "options": ["① 경험적 가족상담 - 가족조각기법", "② 보웬(M. Bowen) 가족상담 - 과정질문", "③ 구조적 가족상담 - 추적하기", "④ 전략적 가족상담 - 긍정적 의미부여", "⑤ 이야기치료 - 고된 체험기법"], "answer": 4, "expl": "고된 체험기법은 전략적 가족상담(헤일리)의 대표 기법이며, 이야기치료의 기법으로 연결하는 것은 옳지 않다."}, {"no": "23-59", "year": 2024, "qno": 9, "text": "보웬( . Bowen)의 가족상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 미분화 가족 자아군은 온 가족이 감정적으로 한 덩어리가 되어 고착되어 있는 상태\n이다.\nㄴ. 가족구성원의 자아분화 수준이 높을수록 자율성이 부족하며, 감정적으로 반응한다.\nㄷ. 가족투사과정은 미성숙한 부모가 취약한 자녀를 투사 대상으로 선택하는 과정이다.\nㄹ. 출생순위에 따른 형제자매 위치는 가족 정서체계 안에서 특정한 역할과 기능을 담당\n한다.\nㅁ. 개인의 문제는 그 개인이 속한 특정 세대의 역기능적 구조에 의해 발생한다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ, ㄹ", "③ ㄴ, ㄷ, ㅁ", "④ ㄱ, ㄷ, ㄹ, ㅁ", "⑤ ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 1, "expl": "미분화 가족자아군(ㄱ), 가족투사과정(ㄷ), 형제순위에 따른 역할(ㄹ)은 보웬 이론의 개념이 맞지만, 자아분화 수준이 높을수록 오히려 자율성이 높고 감정 반응이 낮으며(ㄴ은 반대), 문제를 특정 세대에 한정하지 않고 다세대에 걸쳐 이해하므로(ㅁ도 부정확) ㄱ·ㄷ·ㄹ이 옳다."}, {"no": "23-60", "year": 2024, "qno": 10, "text": "경험적 가족상담의 목표에 관한 설명으로 옳지 않은 것은?", "options": ["① 당면문제 해결", "② 정서 표현의 증진", "③ 자발성 증진", "④ 인간적 성장", "⑤ 경험의 확대"], "answer": 0, "expl": "경험적 가족상담은 단기적인 당면문제 해결보다 정서표현·자발성·인간적 성장 등 근본적인 성장에 초점을 두므로 '당면문제 해결'만을 목표로 강조하지 않는다."}, {"no": "23-61", "year": 2024, "qno": 11, "text": "다음의 설명에 해당하는 구조적 가족상담의 개념은?", "options": ["① 동맹(alliance)", "② 연합(coalition)", "③ 합류(joining)", "④ 추적(tracking)", "⑤ 밀착(enmeshment)"], "answer": 1, "expl": "두 사람이 제3자에게 맞서기 위해 힘을 합하는 것은 연합(coalition)의 정의에 해당한다."}, {"no": "23-62", "year": 2024, "qno": 12, "text": "맥매스터 모델( cMaster Model)에서 제시한 가족기능으로 옳은 것을 모두 고른 것은?\nㄱ. 문제해결 ㄴ. 의사소통 ㄷ. 행동통제\nㄹ. 정서적 반응성 ㅁ. 응집성", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ, ㄹ", "③ ㄴ, ㄹ, ㅁ", "④ ㄱ, ㄴ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 3, "expl": "맥매스터 모델의 가족기능에는 문제해결, 의사소통, 역할, 정서적 반응성, 정서적 관여, 행동통제가 포함되며, 문제해결·의사소통·행동통제·정서적반응성(ㄱ·ㄴ·ㄷ·ㄹ)이 여기에 해당한다."}, {"no": "23-63", "year": 2024, "qno": 13, "text": "다음 설명에 해당하는 카터(B. Carter)와 맥골드릭( . McGoldrick)의 가족생활주기단계는?", "options": ["① 신혼부부 단계", "② 어린 자녀를 둔 단계", "③ 사춘기 자녀를 둔 단계", "④ 자녀 독립 단계", "⑤ 노년기"], "answer": 3, "expl": "자녀의 자립 인정, 관계 재정립, 가족원 증감 수용, 부모의 의존과 죽음 대처는 자녀 독립 단계의 발달과업에 해당한다."}, {"no": "23-64", "year": 2024, "qno": 14, "text": "순환모델의 자기보고식 가족사정척도는?", "options": ["① BGT", "② KFD", "③ FACES", "④ ENRICH", "⑤ PREPARE"], "answer": 2, "expl": "가족응집성과 적응성의 순환모델을 기반으로 한 자기보고식 척도는 FACES이다."}, {"no": "23-65", "year": 2024, "qno": 15, "text": "다음 사례에서 가족상담자의 개입으로 옳지 않은 것은?", "options": ["① 학교 폭력과 가정 폭력이 있었는지 확인한다.", "② 가족조각을 활용하여 가족원간의 의사소통 체계를 탐색한다.", "③ 자해의 강도, 빈도 등을 확인하고 생명존중서약을 받는다.", "④ 지각과 결석 등 문제가 생길 무렵 가족내에 발생한 문제가 있었는지 확인한다.", "⑤ 내담자 개인의 행동 문제로 상담이 의뢰되었기 때문에 가족상담은 고려하지 않는다."], "answer": 4, "expl": "청소년의 문제행동은 가족체계 전체와 밀접히 연관되는 경우가 많아, 개인문제로만 국한하고 가족상담을 배제하는 것은 체계론적 관점에 어긋난다."}, {"no": "23-66", "year": 2024, "qno": 16, "text": "청소년의 집단따돌림에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 집단따돌림은 청소년 사이에서 일어나는 폭력의 한 형태이다.\nㄴ. 따돌림 피해 청소년은 대개 성인에게 도움을 요청하여 해결한다.\nㄷ. 집단따돌림에 영향을 주는 요인은 개인, 가족, 학교환경 등으로 분류된다.\nㄹ. 집단따돌림과 유사한 개념으로 왕따, 집단괴롭힘, 불링(bullying) 등이 있다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "집단따돌림은 폭력의 한 형태이고(ㄱ) 개인·가족·학교환경 등 다양한 요인의 영향을 받으며(ㄷ) 왕따·불링 등 유사개념이 있으나(ㄹ), 피해 청소년은 두려움과 낙인 우려로 성인에게 도움을 요청하기 어려운 경우가 많아 ㄴ은 옳지 않다."}, {"no": "23-67", "year": 2024, "qno": 17, "text": "가족상담의 실제에 관한 내용으로 옳은 것을 모두 고른 것은?\nㄱ. 모든 가족원이 상담에 참석하지 못하면 가족상담이 성립되지 않는다.\nㄴ. 부모가 자녀를 대신하여 이야기해서는 안 된다는 규칙을 정해 놓는 것은 도움이\n된다.\nㄷ. 가족상담 종결 후, 추후상담을 할 때는 전화, 편지, 메일 등을 통해서도 가능하다.\nㄹ. 상담 초기부터 가족상담자가 모든 상담과정을 엄격하게 통제하는 것이 좋다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄹ"], "answer": 2, "expl": "부모가 자녀 대신 말하지 않도록 규칙을 정하는 것(ㄴ)과 전화·편지 등을 통한 추후상담(ㄷ)은 실제적으로 도움이 되지만, 모든 가족원이 모여야만 가족상담이 성립하는 것은 아니며(ㄱ 옳지 않음), 상담자가 전 과정을 엄격히 통제하는 것도 바람직하지 않아(ㄹ 옳지 않음) ㄴ·ㄷ이 옳다."}, {"no": "23-68", "year": 2024, "qno": 18, "text": "가족상담적 관점에서 가족원의 중독문제에 관한 설명으로 옳지 않은 것은?", "options": ["① 중독의 원인을 가족의 체계나 구조에 있다고 전제한다.", "② 가족원에게서 느끼는 소외와 외로움으로 인해 다른 대상에 의존함으로써 중독에 이르게 된다고 본다.", "③ 청소년 중독자의 경우 가족의 영향력이 강하기 때문에 가족상담적 접근이 필요하다.", "④ 가족 내에 중독자가 생기면 온 가족이 중독자 중심으로 움직여야 한다.", "⑤ 중독문제는 가족의 부정적 상호작용 패턴에 의해 유지된다고 본다."], "answer": 3, "expl": "가족상담적 관점은 중독자 중심으로 온 가족이 맞춰가는 동반의존적 패턴을 오히려 문제로 보고 변화시키고자 하며, 이를 '그렇게 되어야 한다'는 규범으로 제시하지 않는다."}, {"no": "23-69", "year": 2024, "qno": 19, "text": "가정폭력 가족상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 개인의 폭력문제도 가족문제 중의 하나로 보고 가족체계에 초점을 두고 접근한다.", "② 가정폭력을 해결하기 위해서는 가족원간의 역기능적 상호작용 패턴과 관계구조를 변화시키는 것이 필요하다.", "③ 체계론적 입장에서 폭력은 가족을 비롯한 타인의 폭력행위를 모방함으로써 폭력을 학습하게 된다고 본다.", "④ 보웬(M. Bowen)의 가족상담에서는 가족의 폭력문제를 가족원의 낮은 자아분화 수준과 관련 있는 것으로 본다.", "⑤ 이야기치료에서는 폭력에 기여하는 가부장적 담론을 파악하고 해체하여 대안적 이야기를 구축한다."], "answer": 2, "expl": "폭력의 모방학습 설명은 체계론적 관점이 아니라 사회학습이론(반두라)의 관점에 해당해 이 연결은 옳지 않다."}, {"no": "23-70", "year": 2024, "qno": 20, "text": "이야기치료에 관한 설명으로 옳지 않은 것은?", "options": ["① 개인의 삶은 언어를 통한 이야기로 구성되고 창출된다.", "② 포스트모더니즘과 사회구성주의적인 시각에 근거한다.", "③ 이야기는 사회적 맥락 속에서 만들어진다고 본다.", "④ 문제는 결과적으로 사람에게 있다고 본다.", "⑤ 마지막 단계는 대안적 정체성을 구축하는 것이다."], "answer": 3, "expl": "이야기치료는 '사람이 문제가 아니라 문제가 문제'라는 문제의 외재화를 핵심 전제로 하므로, 문제가 사람에게 있다는 설명은 이 접근의 철학과 반대된다."}, {"no": "23-71", "year": 2024, "qno": 21, "text": "전략적 가족상담자로 분류되지 않는 학자는?", "options": ["① 헤일리(J. Haley)", "② 마다네스(C. Madanes)", "③ 파라졸리(M. Selvini-Palazzoli)", "④ 잭슨(D. Jackson)", "⑤ 컨버그(O. Kernberg)"], "answer": 4, "expl": "컨버그는 대상관계이론(정신분석)의 대표학자이며 전략적 가족상담자가 아니다."}, {"no": "23-72", "year": 2024, "qno": 22, "text": "대처질문에 관한 설명으로 옳은 것은?", "options": ["① 내담자가 어려움과 위기를 어떻게 극복하고 생존해 왔는지 그리고 희망을 버리지 않고 유지해 올 수 있었는지에 관하여 질문하는 동시에 생존능력을 인정하고 간접적으로 칭찬하는 기법이다.", "② 내담자들이 이미 효과적인 해결책을 사용하고 강점과 자원을 갖고 있으면서도 의식하지 못할 때 문제보다는 해결책을 모색하는 것으로 관심을 전환시키는데 도움이 되는 기법이다.", "③ 내담자가 인식하는 문제의 정도, 해결가능성, 상담의 진척 정도 등을 숫자로 표현하도록 하는 기법이다.", "④ 내담자와 중요한 관계에 있는 사람의 생각, 의견, 가치관, 반응 등에 관하여 질문하는 것으로 다른 사람의 관점에서 생각하고 이해하도록 돕기 위한 기법이다.", "⑤ 한국에서 해결중심모델을 적용하는 과정에서 명명된 질문으로 상담을 통해 어떤 상태가 되면 보람 있다고 생각하는지 질문하는 기법이다."], "answer": 0, "expl": "대처질문은 어려운 상황 속에서도 어떻게 버텨왔는지를 물어 생존능력을 인정하고 간접적으로 칭찬하는 해결중심상담의 대표 기법이다."}, {"no": "23-73", "year": 2024, "qno": 23, "text": "다음에서 설명하는 이야기치료 기법은?", "options": ["① 가족조각", "② 문제의 외재화", "③ 대안적 이야기", "④ 정의예식", "⑤ 독특한 결과 탐색"], "answer": 1, "expl": "문제를 사람과 분리시켜 표현을 바꾸는 것(예: '거짓말이 갈등을 일으켰다')은 문제의 외재화 기법이다."}, {"no": "23-74", "year": 2024, "qno": 24, "text": "체계론적 가족상담의 개입 특성에 관한 설명으로 옳지 않은 것은?", "options": ["① 가족 문제의 원인을 현재보다는 과거에서 파악하고자 한다.", "② 순환적 인과관계를 통해 문제를 이해하고자 한다.", "③ 가족구성원 간의 상호 관계성에 주목한다.", "④ 체계를 구성하는 개인 간 관계에 초점을 두고 개입한다.", "⑤ 가족구성원 간 행위의 연쇄적인 패턴을 파악하고자 한다."], "answer": 0, "expl": "체계론적 관점은 과거의 원인 규명보다 '지금-여기'의 순환적 상호작용 패턴에 초점을 두므로, 과거 원인 파악을 강조한다는 설명은 옳지 않다."}, {"no": "23-75", "year": 2024, "qno": 25, "text": "가족상담의 기본 개념에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 가족항상성(family homeostasis)은 가족체계가 변화에 저항하고 안정성을 그대로\n유지하고자 하는 특성을 의미한다.\nㄴ. 정적 피드백(positive feedback)은 체계가 변화를 거부하고 균형을 유지하도록 하\n는 피드백을 의미한다.\nㄷ. 2차 변화(second-order change)는 체계의 규칙 자체를 재설정하여 항상성을 재구\n조화하는 변화를 의미한다.\nㄹ. 대칭적(symmetrical) 관계는 가족구성원 각자가 서로 균형을 맞추거나 보완해주는\n역할을 하는 관계를 의미한다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄱ, ㄷ, ㄹ"], "answer": 1, "expl": "가족항상성(ㄱ)과 2차 변화(ㄷ)에 대한 설명은 옳지만, 정적 피드백은 변화를 촉진하는 피드백이고(ㄴ은 부적 피드백의 정의) 대칭적 관계는 서로 유사한 행동으로 경쟁하는 관계이지 보완관계는 상보적 관계에 해당해(ㄹ 부정확) ㄱ·ㄷ이 옳다."}, {"no": "22-51", "year": 2023, "qno": 1, "text": "보웬(M. Bowen)의 가족상담이론에 관한 설명으로 옳은 것은?", "options": ["① 핵가족 정서체계는 핵가족 내에서 가족이 정서적으로 기능하는 패턴을 말한다.", "② 자기분화는 개인이 불안을 관리하기 위해 가족구성원과 감정적 교류를 더 이상 하지 않는 것이다.", "③ 다세대 전수과정에서 증상의 유형과 정도는 외부의 스트레스 요소와 상관없이 분화수준에 의해 나타난다.", "④ 가족투사과정에서 부모는 가족체계를 안정시키기 위해 자녀 중 가장 성숙하고 안정된 자녀를 투사 대상으로 선택한다.", "⑤ 치료적 삼각관계는 두 사람의 관계가 불안정해졌을 때 제3의 사람이나 대상에게 다가감으로써 불안을 회피하는 행동이다."], "answer": 0, "expl": "핵가족 정서체계는 핵가족 내에서 가족원들이 정서적으로 상호작용하는 패턴을 설명하는 보웬 이론의 개념이다."}, {"no": "22-52", "year": 2023, "qno": 2, "text": "사티어(V. Satir)의 가족상담 이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 정서적 경험과 의사소통에 기초한 성장모델을 강조하였다.\nㄴ. 자아존중감은 생애 초기에 주 양육자와의 관계에서 학습되고 발달한다고 본다.\nㄷ. 부모가 역기능적으로 의사소통하거나 의사소통 내용이 부정적일 때 자녀의 자아존중감은 손상된다.\nㄹ. 은유(metaphor)기법은 간접적이고 비유적인 표현을 사용하기 때문에 내담자가 위협적으로 느낄 수 있다.", "options": ["① ㄱ, ㄷ", "② ㄴ, ㄹ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄹ"], "answer": 3, "expl": "정서적 경험 중심 성장모델(ㄱ), 초기 양육관계에서 형성되는 자아존중감(ㄴ), 부정적 의사소통에 의한 자아존중감 손상(ㄷ)은 사티어 이론의 핵심 내용이지만, 은유기법은 오히려 위협감을 줄이기 위해 간접적으로 접근하는 기법이라 ㄹ은 옳지 않다."}, {"no": "22-53", "year": 2023, "qno": 3, "text": "부모간 폭력이 있는 가정에서 성장한 청소년 자녀에게 나타날 수 있는 심리적 어려움에 해당하지 않는 것은?", "options": ["① 심한 수치심을 느끼고 자존감 형성에 부정적 영향을 받는다.", "② 폭력, 가출, 비행, 자살시도 등 심각한 부적응 행동을 표출할 가능성이 높아진다.", "③ 폭력을 행하는 부모뿐 아니라 폭력을 제지할 수 없는 자신의 무력함에도 분노를 느낀다.", "④ 언제 폭력이 발생할지, 자신이 폭력을 촉발시키지는 않을지 불안해하고 두려움을 느낀다.", "⑤ 폭력으로 문제를 해결하려는 부모에 대한 분노는 청소년에게 갈등해결에 집중하도록 하여 대인관계기술이 증진된다."], "answer": 4, "expl": "부모간 폭력을 목격한 청소년은 오히려 대인관계 기술 발달에 부정적 영향을 받는 경우가 많으므로, 분노가 대인관계기술을 증진시킨다는 설명은 옳지 않다."}, {"no": "22-54", "year": 2023, "qno": 4, "text": "사티어(V. Satir)의 의사소통 및 대처유형에 관한 설명으로 옳은 것은?", "options": ["① 회유형의 자원은 돌봄과 예민성이다.", "② 비난형은 자아존중감의 요소 중 타인과 상황을 무시한다.", "③ 초이성형의 자원은 강한 자기주장이다.", "④ 산만형의 행동은 창조적이고 생동적이다.", "⑤ 일치형은 말과 행동을 일치시키기 위해 경직된 태도를 보인다."], "answer": 0, "expl": "회유형은 타인의 감정을 살피고 돌보려는 예민성과 돌봄이 긍정적 자원으로 작용할 수 있다."}, {"no": "22-55", "year": 2023, "qno": 5, "text": "해결중심 단기 가족상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 탈이론적이고 비규범적이며 내담자의 견해를 존중한다.", "② 내담자의 강점과 자원은 물론 증상까지도 상담에 활용한다.", "③ 목표 수행은 힘든 일이라는 것을 내담자가 인식하도록 한다.", "④ 치료적 피드백 메시지는 칭찬, 연결문, 과제의 세 부분으로 구성되어 있다.", "⑤ 고객형 내담자는 문제를 인식하고 서술하지만, 상황변화를 위해 어떤 것도 하지 않고 또한 그렇게 할 의향도 없다."], "answer": 4, "expl": "문제를 인식하면서도 변화를 위한 행동을 하지 않으려는 것은 고객형이 아니라 불평형 내담자의 특징이므로 이 설명은 옳지 않다."}, {"no": "22-56", "year": 2023, "qno": 6, "text": "개인상담과 비교한 가족상담의 특징으로 옳은 것은?", "options": ["① 문제의 인과관계를 선형적으로 본다.", "② 내담자를 수동적이고 반응적인 존재로 본다.", "③ 문제의 진단과 해결과정에서 기계론적 세계관에 기초한다.", "④ 개인을 둘러싸고 있는 관계 속에서 일어나는 문제에 더 많은 관심을 가지고 있다.", "⑤ 문제 이해를 위해 내담자의 내면에서 무엇이 일어나고 있고 내담자의 어떤 행동으로 인해 문제가 생겼는지 탐색한다."], "answer": 3, "expl": "가족상담은 개인의 내면보다 개인을 둘러싼 관계와 상호작용 맥락 속에서 문제를 이해하는 것을 특징으로 한다."}, {"no": "22-57", "year": 2023, "qno": 7, "text": "가족상담의 개념에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 부부균열: 부부는 각자 자신의 기대와 욕구를 충족하기 위하여 상대방을 억누르고 상대방의 동기를 믿지 않으려고 함\nㄴ. 거짓적대성: 가족원 간에 안정을 추구하는 관계로서 표면적으로는 개방되고 상호이해하고 만족하는 것 같지만 실제는 그렇지 않은 모습\nㄷ. 가족항상성: 어떠한 상황에서도 안정성을 유지하려는 가족의 속성을 의미하는 것으로, 가족 안에서 발전시킨 상호작용 규칙에 의해 유지됨\nㄹ. 다귀결성: 다양한 출발에서 동일한 결과에 이른다는 것을 나타내며, 특정 원인이나 결과에 주목하기보다 체계의 과정에 주목할 필요가 있음을 강조함", "options": ["① ㄱ, ㄷ", "② ㄴ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "부부균열(ㄱ)과 가족항상성(ㄷ)의 정의는 옳지만, ㄴ의 설명은 거짓적대성이 아니라 거짓상호성의 정의이며 ㄹ의 설명은 다귀결성이 아니라 동일결과성의 정의라 옳지 않다."}, {"no": "22-58", "year": 2023, "qno": 8, "text": "다음 사례를 진행하면서 상담자가 취할 행동으로 옳지 않은 것은?\nY(13세, 여)는 수업시간에 집중하지 못하고 수업을 방해하며 교우관계에 어려움을 보여 상담에 의뢰되었다. 부모님은 자주 부부싸움을 하는데, 어머니는 남편과 갈등이 있을 때마다 Y에게 남편에 대한 비난을 했고, Y의 학업에 대해 집착하는 모습을 보였다. 아버지는 딸의 문제가 아내의 과보호와 부적절한 양육태도 때문이라고 비난하였다.", "options": ["① 가족 내 학대나 폭력 문제가 있는지 확인한다.", "② Y가 상담에 자발적으로 참여하였는지 확인한다.", "③ 가족들에게 상담 참여의 필요성과 과정을 설명한다.", "④ Y의 가족과 진행한 상담 내용을 학교 선생님들과 공유하여 학교에서 지지를 받을 수 있도록 돕는다.", "⑤ 가족상담에 참여한 모두가 동등하게 이야기하고 상호수용 가능한 의사결정을 내릴 수 있도록 힘의 균형을 유지한다."], "answer": 3, "expl": "가족의 상담 내용을 동의 없이 학교 선생님들과 공유하는 것은 비밀보장 원칙에 위배되므로 적절한 행동이 아니다."}, {"no": "22-59", "year": 2023, "qno": 9, "text": "다음 상담자 진술은 어떤 가족상담기법의 예인가?\n○ '아들이 귀가시간을 어겨 불안할 때 어떻게 반응하나요?'\n○ '당신의 그 불안한 행동에 대하여 아들은 어떻게 반응하지요?'\n○ '당신과 아들 사이에 다툼이 있을 때 남편은 어떤 반응을 보이나요?'\n○ '남편의 그러한 반응에 대하여 당신은 어떻게 대응하나요?'", "options": ["① 척도질문", "② 과정질문", "③ 긴장고조", "④ 예외질문", "⑤ 자기입장 지키기"], "answer": 1, "expl": "가족구성원 간 상호작용의 순환적 연쇄를 따라가며 질문하는 것은 보웬 가족상담의 과정질문에 해당한다."}, {"no": "22-60", "year": 2023, "qno": 10, "text": "해결중심 단기 가족상담의 질문기법과 그 예로 옳지 않은 것은?", "options": ["① 보람질문: '무엇이 좀 좋아지면 상담을 받은 것이 보람 있었다고 말할 수 있을까요?'", "② 척도질문: '엄마가 여기 있다면, 엄마는 그 문제가 해결될 가능성을 몇 점 정도라고 하실까?'", "③ 관계성질문: '어머니는 그 어려운 상황 속에서 어떻게 지금까지 견딜 수 있었습니까?'", "④ 예외질문: '지금까지 생활하면서 문제가 일어나지 않거나 덜 심각한 때는 언제였나요?'", "⑤ 첫 상담 전 변화에 관한 질문: '처음 상담을 약속했을 때부터 오늘 상담에 오기까지 혹시 어떤 변화가 있었나요?'"], "answer": 2, "expl": "제시된 질문은 관계성질문이 아니라 힘든 상황을 견뎌온 힘을 인정하는 대처질문의 예이므로 연결이 옳지 않다."}, {"no": "22-61", "year": 2023, "qno": 11, "text": "가족생활주기에서 청소년 자녀가 있는 가족의 특성에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 노인 세대를 돌보기 위한 준비 시작\nㄴ. 중년기 부부의 결혼생활 및 진로에 다시 초점을 둠\nㄷ. 부모, 조부모 역할이 포함되도록 확대가족과의 관계 형성\nㄹ. 청소년 자녀가 체계 안과 밖으로 출입할 것을 허용하는 부모-자녀 관계로 변화", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄹ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "청소년 자녀가 있는 가족은 자녀의 자율성을 허용하는 관계로 변화하고(ㄹ) 중년기 부부생활에 다시 초점을 두며(ㄴ) 노인세대 돌봄을 준비(ㄱ)하는 특징을 갖지만, 확대가족과의 관계형성(ㄷ)은 이보다 이른 단계(자녀출산기)의 과업에 가깝다."}, {"no": "22-62", "year": 2023, "qno": 12, "text": "가족체계이론에 관한 설명으로 옳지 않은 것은?", "options": ["① 체계는 일정한 규칙에 의해 유지되고 기능한다.", "② 순환적 인과관계 속에서 증상을 이해하려고 한다.", "③ 체계가 건강하게 기능하기 위해서는 엄격한(rigid) 경계선이 필요하다.", "④ 체계가 변화나 이탈을 거부하고 안정성을 유지하는 방향으로의 피드백을 부적(negative) 피드백이라고 한다.", "⑤ 체계는 상호작용하는 관계에 있는 부분들의 집합으로서, 가족체계는 가족원 개개인의 특성을 합한 것 그 이상이다."], "answer": 2, "expl": "건강한 가족체계는 엄격한 경계선이 아니라 명확하면서도 유연한 경계선을 필요로 하므로 이 설명은 옳지 않다."}, {"no": "22-63", "year": 2023, "qno": 13, "text": "다음 사례에 적용할 수 있는 가족상담 모델과 개입방법의 연결로 옳지 않은 것은?\nC(15세, 남)는 게임과 핸드폰 사용에 대한 통제로 어머니와 갈등하다 가출 후 쉼터에 자발적으로 찾아왔다. 부모님은 작년에 이혼했고, 그 후로 C는 어머니와 살고 있다.", "options": ["① 경험적 가족상담 - 가족조각 작업을 통해 C가 다른 가족원에게 느끼는 정서를 탐색한다.", "② 이야기치료 - 재저작 대화를 통해 C가 자신의 문제를 내면화 할 수 있도록 한다.", "③ 해결중심 단기 가족상담 - 기적질문을 통해 문제가 해결되어 있는 상황을 그려보도록 한다.", "④ 다세대 가족상담 - 관계실험을 통해 가족들이 가족체계의 과정을 인식하고 자신의 역할을 탐색하도록 한다.", "⑤ 전략적 가족상담 - 순환질문을 통해 가족들이 서로의 이야기를 경청하며 관계적 맥락에서 문제를 이해할 수 있도록 한다."], "answer": 1, "expl": "이야기치료의 재저작 대화는 문제를 '내면화'가 아니라 사람과 분리하는 '외재화'를 돕는 개입이므로 이 연결은 옳지 않다."}, {"no": "22-64", "year": 2023, "qno": 14, "text": "이야기치료의 기본 전제에 해당하는 것을 모두 고른 것은?\nㄱ. 개인의 정체성과 문제(증상)는 별개의 것으로 본다.\nㄴ. 개인적 삶의 이야기는 복합적인 내용을 포함하고 있다.\nㄷ. 개인이 속한 사회적 전제는 자신을 보는 방식에 영향을 미친다.\nㄹ. 인간은 자신의 경험을 특정한 방식으로 해석하고 의미를 부여한다.", "options": ["① ㄱ, ㄹ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "정체성과 문제의 분리(ㄱ), 복합적인 삶의 이야기(ㄴ), 사회적 맥락의 영향(ㄷ), 경험에 대한 해석과 의미부여(ㄹ) 모두 이야기치료의 기본 전제에 해당한다."}, {"no": "22-65", "year": 2023, "qno": 15, "text": "가족상담사의 윤리적 행동으로 옳지 않은 것은?", "options": ["① 내담자에게 상담사의 가치를 강요하지 않는다.", "② 사생활과 비밀보장의 원칙과 예외상황을 알린다.", "③ 내담자가 스스로 의사결정을 할 권리를 존중한다.", "④ 사적인 친밀관계, 성적 관계, 동업자관계 등의 관계를 맺지 않는다.", "⑤ 상담내용을 학술연구에 활용할 경우에는 내담자의 동의를 구하지 않는다."], "answer": 4, "expl": "상담내용을 학술연구에 활용할 때는 반드시 내담자의 동의를 구해야 하므로 이 설명은 윤리적 행동으로 옳지 않다."}, {"no": "22-66", "year": 2023, "qno": 16, "text": "전략적 가족상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 헤일리(J. Haley)는 고된 체험, 위장 기법 등의 역설적인 방법을 활용한다.", "② 밀란(Milan) 모델은 게임규칙에 초점을 두고 순환질문을 사용한다.", "③ 패터슨(G. Patterson)은 대상관계 패턴을 평가하고 대인관계 역동 분석을 중요하게 다룬다.", "④ MRI(Mental Research Institute) 모델은 가족의 의사소통에 초점을 두고 전략적으로 접근한다.", "⑤ 마다네스(C. Madanes)는 애정과 돌봄 역할에 관심을 두고 치료 작업을 한다."], "answer": 2, "expl": "패터슨은 행동주의적 관점에서 부모-자녀 상호작용의 강화 패턴을 분석한 학자이며, 대상관계 패턴 분석은 전략적 가족상담과 무관하다."}, {"no": "22-67", "year": 2023, "qno": 17, "text": "이야기치료에서 사용하는 기법으로 옳지 않은 것은?", "options": ["① 문제 해체하기", "② 경계의 명료화", "③ 재저작 대화", "④ 독특한 결과 탐색", "⑤ 문제의 영향력 평가"], "answer": 1, "expl": "경계의 명료화는 구조적 가족상담의 개념이며, 이야기치료에는 문제 해체, 재저작 대화, 독특한 결과 탐색, 문제의 영향력 평가 등의 기법이 있다."}, {"no": "22-68", "year": 2023, "qno": 18, "text": "다음에서 설명하는 가족상담의 기법은?\n○ 기존의 가족 상호작용에 거스르지 않고 합류하는 방법이다.\n○ 가족원이 계속 말을 할 수 있도록 물어보고 지지하는 활동이다.\n○ 가족의 언어와 가치에 참여하고, 핵심내용 반복하기와 명료화하는 질문 등을 한다.", "options": ["① 추적", "② 관찰", "③ 모방", "④ 연합", "⑤ 균형"], "answer": 0, "expl": "가족의 기존 방식을 따라가며 계속 이야기하도록 지지하고 핵심내용을 반복·명료화하는 것은 구조적 가족상담의 추적하기 기법이다."}, {"no": "22-69", "year": 2023, "qno": 19, "text": "다음 사례에 적용할 수 있는 가족상담 모델과 개입방법의 연결로 옳지 않은 것은?\nK(남, 고1)는 부모에게 반항하고 학교에도 가지 않으려는 이유로 부모님이 상담을 의뢰하였다. 부부는 서로의 역할에 불만을 표현하면서 부부간의 갈등이 심해졌고, 여동생(초4)을 포함한 가족 모두가 참여한 첫 회기에서 K는 계속 아무 말도 하지 않고 앉아 있었다.", "options": ["① 다세대 가족상담 - 자아분화 탐색", "② 경험적 가족상담 - 빙산 치료", "③ 이야기치료 - 가족갈등의 외재화", "④ 구조적 가족상담 - 가족 구조의 변화", "⑤ 해결중심 단기 가족상담 - 과거 문제 발달사"], "answer": 4, "expl": "해결중심 단기 가족상담은 과거 문제의 발달사를 캐묻기보다 예외상황과 해결책 구축에 초점을 두므로 이 연결은 옳지 않다."}, {"no": "22-70", "year": 2023, "qno": 20, "text": "가족생활주기에 관한 설명으로 옳지 않은 것은?", "options": ["① 가족생활주기의 각 단계마다 수행해야 할 과업을 제시한다.", "② 에릭슨(M. Erickson)은 자녀 양육기의 가족은 부모와 자녀를 분리하여 부부생활과 자녀양육 생활을 독립적으로 하도록 했다.", "③ 카터(B. Carter)와 맥골드릭(M. McGoldrick)은 가족생활주기의 결혼전기 단계에서 원가족과 분화가 필요하다고 했다.", "④ 듀발(E. Duvall)은 결혼, 출산, 자녀 성장, 사망 등 구성원의 증가 또는 감소를 축으로 하여 8단계로 나누었다.", "⑤ 노년기는 가족구성원이 감소하여 가장 안정된 가족경계를 이루는 시기이다."], "answer": 4, "expl": "노년기는 배우자 상실이나 은퇴 등 변화가 많은 시기로 오히려 재적응이 필요한 단계이며, '가장 안정된 가족경계'라는 설명은 옳지 않다."}, {"no": "22-71", "year": 2023, "qno": 21, "text": "다음 가족상담기법의 예로 옳은 것을 모두 고른 것은?\nㄱ. 증상처방: 아이를 과보호하는 어머니에게 '보다 더 보호하라'고 한다.\nㄴ. 의식(ritual): 아내를 비난하는 남편에게 일주일에 하루 시간을 정해놓고 아내를 비난하는 시간을 갖도록 한다.\nㄷ. 대처질문: '3일 후에 지금 겪고 있는 불안감이 해결되었다면 어떻게 알 수 있을까요?'라고 한다.\nㄹ. 실연화: '자녀의 우울증이 가족을 보호하는 기능을 하고 있어요' 라고 말한다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄹ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "증상처방(ㄱ)과 의식기법(ㄴ)의 예시는 적절하지만, ㄷ의 질문은 대처질문이 아니라 기적질문의 예이고 ㄹ의 진술은 실연화가 아니라 증상의 재정의(긍정적 의미부여)의 예라 옳지 않다."}, {"no": "22-72", "year": 2023, "qno": 22, "text": "가족사정에 관한 설명으로 옳지 않은 것은?", "options": ["① 가계도는 가족의 정서과정과 생활주기 및 가족원의 증상 등을 파악할 수 있다.", "② ENRICH 검사는 부부관계를 파악하고 원가족을 이해하는 데 도움을 준다.", "③ 비버즈(W. Beavers) 모델은 관계 양상을 구심성과 원심성, 혼합형으로 분류한다.", "④ 올슨(D. Olson)의 순환모델은 가족기능을 응집성과 상보성으로 평가한다.", "⑤ 맥매스터(McMaster)모델은 문제해결, 의사소통, 역할, 정서적 반응, 상호작용, 행동통제, 일반적 기능 등으로 평가한다."], "answer": 3, "expl": "올슨의 순환모델은 가족기능을 응집성과 적응성(상보성이 아님)의 두 차원으로 평가하므로 이 설명은 옳지 않다."}, {"no": "22-73", "year": 2023, "qno": 23, "text": "가족상담의 초기과정 작업으로 옳지 않은 것은?", "options": ["① 가족의 정서에 공감한다.", "② 과거의 문제 해결 경험에 대하여 질문한다.", "③ 증상이나 문제에 대한 가족의 지각을 알아본다.", "④ 구체적인 가족 사정을 위해 전이, 역전이를 탐색한다.", "⑤ 가족이 원하는 것을 구체적으로 표현하도록 한다."], "answer": 3, "expl": "전이·역전이 탐색은 상담관계가 어느 정도 형성된 이후 다루어지는 심층적 작업으로, 가족상담 초기과정의 핵심 작업으로 보기 어렵다."}, {"no": "22-74", "year": 2023, "qno": 24, "text": "다음 가계도에서 IP(Identified Patient)의 가족역동에 관한 설명으로 옳지 않은 것은?", "options": ["① IP는 부와 정서적으로 친밀하다.", "② IP의 모와 외조모는 갈등관계이다.", "③ IP의 부와 친조모는 밀착된 관계이다.", "④ IP의 외조부모는 정서적으로 단절되어 있다.", "⑤ IP의 조부와 부에게 알코올 문제가 이어지고 있다."], "answer": 0, "expl": "가계도 상 IP와 부 사이에는 친밀한 관계선이 아니라 소원하거나 갈등적인 관계선이 나타나 있으므로 '정서적으로 친밀하다'는 설명은 옳지 않다."}, {"no": "22-75", "year": 2023, "qno": 25, "text": "구조적 가족상담 이론에서 가족의 재구조화에 관한 내용으로 옳지 않은 것은?", "options": ["① 부모 하위체계와 별도로 부부 하위체계가 기능하도록 한다.", "② 부모가 서로에게 적응하고 자녀에게 일관된 모습을 보여야 한다.", "③ 자녀독립기에는 명확하고 독립적인 경계선을 확립하도록 한다.", "④ 적절한 위계는 부모가 권위와 책임을 바탕으로 세대 간 차이를 인정하는 구조이다.", "⑤ 밀착된 가족은 다른 하위체계의 분화가 필요하지 않다."], "answer": 4, "expl": "밀착된 가족은 오히려 하위체계 간 경계가 불분명하므로 분화를 촉진하는 개입이 필요하며, '분화가 필요하지 않다'는 설명은 옳지 않다."}, {"no": "21-51", "year": 2022, "qno": 1, "text": "일반체계이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 정적(positive) 피드백은 항상성의 개념과 동일하다.\nㄴ. 체계의 행동을 설명하기 위해 순환적 인과관계를 가정한다.\nㄷ. 사이버네틱스(cybernetics)와 동일한 관점과 세계관을 기초로 발전되었다.\nㄹ. 체계의 요소들은 개별적으로 존재하므로 독립적으로 이해할 수 있다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄹ", "③ ㄴ, ㄷ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "순환적 인과관계 가정(ㄴ)과 사이버네틱스에 기초한 발전(ㄷ)은 옳으나, 정적 피드백은 변화를 촉진하는 것으로 항상성(안정 유지, 부적 피드백)과는 다르며, 체계 요소는 상호의존적이므로 ㄱ, ㄹ은 옳지 않다."}, {"no": "21-52", "year": 2022, "qno": 2, "text": "청소년 자녀가 있는 가족의 발달과업으로 옳지 않은 것은?", "options": ["① 자녀의 발달과 변화에 대응하여 부모의 역할도 변해야 한다.", "② 부모는 자녀를 보호하고 양육하며 자녀가 원하는 것을 무조건 허용한다.", "③ 자녀가 책임감을 가지도록 가족의 구조와 조직을 변화시킨다.", "④ 자녀가 가족체계에 자유롭게 출입할 수 있도록 가족의 경계를 유연하게 설정한다.", "⑤ 결혼생활 중인 부모는 부부관계의 재적응과 재협상에도 주력한다."], "answer": 1, "expl": "청소년 자녀가 있는 가족은 자율성 증대에 맞춰 유연한 경계와 책임을 부여하는 것이 과업이며, 자녀가 원하는 것을 무조건 허용하는 것은 발달과업으로 옳지 않다."}, {"no": "21-53", "year": 2022, "qno": 3, "text": "가족상담 모델과 상담목표 또는 상담기법의 연결로 옳지 않은 것은?", "options": ["① 보웬(Bowen) 가족상담 - 탈삼각화", "② 경험적 가족상담 - 가족조각", "③ 구조적 가족상담 - 균형깨기", "④ 밀란(Milan) 가족상담 - 불변의 처방", "⑤ 전략적 가족상담 - 관계윤리 회복"], "answer": 4, "expl": "관계윤리 회복은 보스조르메니-나지의 맥락적(계약적) 가족치료의 목표이며, 전략적 가족상담의 대표 기법·목표가 아니다."}, {"no": "21-54", "year": 2022, "qno": 4, "text": "이야기치료의 기법에 관한 설명으로 옳은 것은?", "options": ["① 독특한 결과(unique outcome) 대화 - 개인의 정체성이 인생 클럽을 통해 회원 공동으로 생산되는 복합적 성격의 것임을 가정하는 대화", "② 정의예식(definitional ceremony) - 내담자가 자신이 선호하는 삶의 이야기를 청중 앞에서 사회적으로 인정받는 경험을 갖게 하는 기법", "③ 외부증인집단의 다시 말하기(re-telling) - 내담자의 이야기에 대해 은유를 중심으로 말하도록 돕는 대화", "④ 외재화(externalization) 대화 - 문제가 일어나지 않은 예외적 상황을 탐색하는데 초점을 두는 대화", "⑤ 회원재구성(re-membering) 대화 - 문제의 사회문화적 발생 맥락을 반영하여 문제를 사람과 분리시키는 기법"], "answer": 1, "expl": "정의예식은 내담자가 선호하는 삶의 이야기를 청중(외부증인집단) 앞에서 이야기하며 사회적으로 인정받는 경험을 하도록 돕는 이야기치료 기법이다."}, {"no": "21-55", "year": 2022, "qno": 5, "text": "다음 구조적 가족상담에서 상담자2의 질문 기법은?\n○ 딸(5세): (상담실을 돌아다니며, 이것저것 만진다.) 엄마, 나 이거 가지고 놀면 안돼? 나, 이거 갖고 싶어.\n○ 상담자1: 어머니, 아이가 어떻게 하면 좋겠어요?\n○ 엄 마: 가만히 앉아 있으면 좋겠어요.\n○ 상담자2: 어머니께서 아이가 그렇게 하도록 해 보세요.", "options": ["① 유지하기", "② 추적하기", "③ 실연하기", "④ 모방하기", "⑤ 증상을 과장하기"], "answer": 2, "expl": "상담 장면에서 실제 가족의 상호작용 패턴을 직접 행동으로 재현하도록 요청하는 것은 실연하기(enactment) 기법이다."}, {"no": "21-56", "year": 2022, "qno": 6, "text": "후기 가족상담의 발전에 영향을 미친 이론적 기초에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 실재(reality)는 사회적 상호작용을 통해 함께 구성하는 것이라고 전제하는 사회구성주의\nㄴ. 전문가가 개인 내면의 구성요소를 탐색하고 해석함으로써 진실을 밝힐 수 있다고 가정하는 후기구조주의\nㄷ. 체계와 환경의 상호작용 및 단순 피드백에 초점을 두고 체계를 이해하는 2차 사이버네틱스\nㄹ. 다양성과 차이 및 비본질주의를 강조하는 포스트모더니즘(post-modernism)", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄱ, ㄹ", "④ ㄴ, ㄷ", "⑤ ㄴ, ㄹ"], "answer": 2, "expl": "사회구성주의(ㄱ)와 포스트모더니즘(ㄹ)이 후기 가족상담의 이론적 기초에 해당하며, 후기구조주의는 전문가의 해석적 진실 규명을 부정하고, 2차 사이버네틱스는 관찰자도 체계의 일부로 포함하여 이해하므로 ㄴ, ㄷ은 옳지 않다."}, {"no": "21-57", "year": 2022, "qno": 7, "text": "다음 구조적 가족지도에 나타난 가족역동에 관한 설명으로 옳지 않은 것은?", "options": ["① 모와 자녀는 연합되어 있다.", "② 모-자녀 간에 위계구조가 형성되어 있다.", "③ 모와 자녀는 침투적이고 모호한 경계선을 이루고 있다.", "④ 재혼관계에서 부모간의 갈등이 자녀에게 우회되고 있다.", "⑤ 계부와 자녀 간에는 경직되고 유리된 경계선을 이루고 있다."], "answer": 1, "expl": "가족지도에서 모-자녀는 밀착된 연합관계로 나타나며, 이는 명확한 위계구조가 아니라 경계의 침투와 모호함을 보여주므로 위계구조 형성이라는 설명은 옳지 않다."}, {"no": "21-58", "year": 2022, "qno": 8, "text": "가족상담 이론가와 상담기법의 연결로 옳은 것은?", "options": ["① 화이트(M. White) - 가족의례", "② 헤일리(J. Haley) - 고된 체험기법", "③ 휘태커(C. Whitaker) - 다각적 편파성", "④ 마다네스(C. Madanes) - 영향력의 수레바퀴", "⑤ 보스조르메니-나지(I. Boszormenyi-Nagy) - 증상처방"], "answer": 1, "expl": "고된 체험기법(ordeal therapy)은 전략적 가족치료자인 헤일리의 대표적 기법이다."}, {"no": "21-59", "year": 2022, "qno": 9, "text": "보웬(M. Bowen)의 가족상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 만성불안에 대한 감정반사행동을 줄이는 것을 목표로 한다.", "② 가족의 비생산적 관계과정을 변화시키기 위해 관계실험을 한다.", "③ 가족투사과정은 부모가 자신들의 미성숙함을 자녀에게 투사하는 과정이다.", "④ 엉켜진 가족역동으로부터 구성원 개인의 명료하고 엄격한 분리를 통해 자기분화 수준을 높인다.", "⑤ 정서적 단절은 개인이 불안을 관리하기 위해 가족구성원과 감정적 교류를 더 이상 하지 않는 것이다."], "answer": 3, "expl": "자기분화는 가족과의 정서적 단절이 아니라, 정서적으로 연결된 상태를 유지하면서도 사고와 감정을 구분하는 능력을 높이는 것이므로 '엄격한 분리'라는 설명은 옳지 않다."}, {"no": "21-60", "year": 2022, "qno": 10, "text": "이야기치료에 관한 내용으로 옳은 것은?", "options": ["① 이야기치료는 발달 초기에 베이트슨(G. Bateson)의 영향을 받았다.", "② 인간의 정체성은 심층적인 자기의 외적 표현에 의해 구성된다고 가정한다.", "③ 이야기치료자는 중심적이고 영향력 있는 위치에서 내담자의 문제에 개입한다.", "④ 이야기 재저작(re-authoring)의 주요 목적은 경험의 의미를 진단하는 것이다.", "⑤ 공명하기(resonance) 대화는 문제 중심의 지배적 이야기와 맞지 않는 일련의 일화를 말하는 것이다."], "answer": 0, "expl": "이야기치료는 사회구성주의와 함께 베이트슨의 인식론적 관점의 영향을 받아 발전하였다."}, {"no": "21-61", "year": 2022, "qno": 11, "text": "해결중심 단기 가족상담에 관한 내용으로 옳은 것은?", "options": ["① 객관적인 사실과 실재를 믿는 과학적 낙관주의를 기초로 한다.", "② 문제 상황의 정확한 분석을 중시하므로 전문가가 해결의 방향을 인도한다.", "③ 과거에 관심을 두고 구성원의 원가족 경험을 진단하는데 주력한다.", "④ 비자발적인 방문형 내담자에게는 일반적으로 관찰 과제를 부여한다.", "⑤ 변화는 삶의 일부로서 불가피하며 계속적으로 일어난다고 가정한다."], "answer": 4, "expl": "해결중심상담은 변화가 삶의 일부이자 항상 일어나고 있는 것이라는 가정을 기본 철학으로 삼는다."}, {"no": "21-62", "year": 2022, "qno": 12, "text": "사티어(V. Satir)의 경험적 가족상담에 관한 설명으로 옳은 것은?", "options": ["① 회유형은 돌봄과 양육 및 민감성이라는 자원을 갖고 있다.", "② 비난형은 자아존중감의 상황 요소를 무시하는 성향을 보인다.", "③ 일치형은 규칙과 옳은 것을 중시하고 극단적으로 객관성을 보인다.", "④ 산만형은 유머가 풍부해 상담에서 심리적으로 접촉하기가 가장 쉬운 유형이다.", "⑤ 초이성형은 외적으로 공격적인 행동을 보이지만 내적으로 소외감을 느끼는 경향이 크다."], "answer": 0, "expl": "회유형은 겉으로 상대를 맞추고 순종적인 모습을 보이지만, 그 이면에 돌봄, 양육, 민감성이라는 긍정적 자원을 지니고 있다고 본다."}, {"no": "21-63", "year": 2022, "qno": 13, "text": "밀란(Milan) 모델에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 순환질문 같은 언어기반 접근들을 많이 사용한다.\nㄴ. 가족의 상호작용 패턴을 가족게임(family game)으로 보았다.\nㄷ. 장단기치료(long-brief therapy) 모델로 상담이 한 달에 한 번씩 진행되기도 한다.\nㄹ. 긍정적 의미부여(positive connotation)는 가족의 문제행동을 재구성하는 기법이다.", "options": ["① ㄴ, ㄹ", "② ㄱ, ㄴ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "순환질문(ㄱ), 가족게임 개념(ㄴ), 장단기치료 모델(ㄷ), 긍정적 의미부여(ㄹ)는 모두 밀란모델의 특징적 개념·기법에 해당한다."}, {"no": "21-64", "year": 2022, "qno": 14, "text": "해결중심 단기 가족상담의 목표 설정 시 고려해야 하는 원칙으로 옳지 않은 것은?", "options": ["① 구체적이고 측정할 수 있는 행동을 목표로 삼는다.", "② 상담자가 중요하다고 판단하는 것을 목표로 한다.", "③ 목표 수행이 힘들고 어려운 일이라고 인식하게 한다.", "④ 내담자의 현실 생활에서 성취 가능한 것을 목표로 삼는다.", "⑤ 문제를 없애는 것보다 새로운 행동을 시작하는 것을 목표로 한다."], "answer": 1, "expl": "해결중심상담의 목표는 상담자가 아니라 내담자가 중요하다고 여기는 것을 중심으로 설정해야 하므로 옳지 않다."}, {"no": "21-65", "year": 2022, "qno": 15, "text": "보웬(M. Bowen)의 가족상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 과정중심 치료로서 문제의 내용이 주요 초점은 아니다.\nㄴ. 상담자의 분화수준만큼 내담자도 그 정도로 분화된다고 가정한다.\nㄷ. 자기-입장(I-position)을 격려함으로써 분화수준을 높이는 것을 목표로 한다.\nㄹ. 분화수준이 높은 사람은 즉각적인 감정반사행동을 하지 않으므로 공감능력이나 감정 표현이 부족하다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "과정중심 치료(ㄱ)와 자기입장 격려를 통한 분화수준 향상(ㄷ)은 옳은 설명이나, 상담자 자신의 분화수준이 상담의 효과성에 영향을 줄 뿐 내담자가 상담자와 동일한 분화수준에 이른다는 가정(ㄴ)은 아니며, 분화수준이 높을수록 오히려 감정과 이성이 균형을 이뤄 공감능력이 부족하지 않으므로 ㄹ도 옳지 않다."}, {"no": "21-66", "year": 2022, "qno": 16, "text": "가족상담의 개념에 관한 설명으로 옳지 않은 것은?", "options": ["① 부부불균형(marital skew): 부부 중 한 사람은 지속적으로 약하고 다른 한 사람은 강한 위치에 있는 상황", "② 이중구속(double bind): 베르탈란피(L. Bertalanffy)가 소개하였으며 언어적 및 비언어적 메시지가 일치하지 않는 의사소통 상황", "③ 고무울타리(rubber fence): 가족원 개인의 정체성을 찾으려는 시도가 무시되고 가족이 함께해야 한다는 믿음으로 가족의 경계를 확장해 가는 상황", "④ 거짓적대성(pseudo-hostility): 윈(L. Wynne)이 소개하였으며 가족구성원들이 겉으로 거리를 두거나 적대적인 방식으로 상호작용하는 상황", "⑤ 부부균열(marital schism): 리즈(T. Lidz)가 소개하였으며 부부가 서로 역할을 교환할 수 없고 목표를 공유하거나 보완할 수 없는 상황"], "answer": 1, "expl": "이중구속 개념은 베이트슨(G. Bateson)이 소개한 것이며, 일반체계이론을 창시한 베르탈란피가 소개한 것이 아니므로 옳지 않다."}, {"no": "21-67", "year": 2022, "qno": 17, "text": "다음 사례에 대해 가족상담자가 M에게 할 수 있는 개입에 관한 설명으로 옳은 것은?\nM(17세)이 최근 집에서 물건을 집어 던져 분노를 표출하는 일이 잦아지자 상담에 의뢰되었다. M의 보고에 의하면, M의 행동을 둘러싸고 부모는 서로를 비난하며 다투다가 몸싸움을 하기도 하였고, 부모간의 싸움은 서로에 대한 저주와 자신의 고통을 하소연하는 것으로 자주 끝이 났다.", "options": ["① 그렇게 힘든 상황을 어떻게 견디었고 어떻게 해서 상황이 더 나빠지지 않을 수 있었는지 살펴보기 위해 대처질문을 한다.", "② 부모가 서로 비난하고 싸우는 상황에서 어떤 생각을 했는지 파악하기 위해 관계성질문을 한다.", "③ 자신의 삶에서 중요하게 생각하는 소망과 소신 등의 지향 상태를 파악하기 위해 예외질문을 한다.", "④ 자신이 지각한 가족구성원들 간의 상호작용에 대해 이야기하도록 하기 위해 위장기법(pretend technique)을 활용한다.", "⑤ 물건을 집어 던지며 분노를 표현하는 상황에 이름이나 제목을 붙여보라고 요청하는 과정질문을 한다."], "answer": 0, "expl": "힘든 상황에서도 상태가 더 나빠지지 않도록 견뎌온 방법을 탐색하는 질문은 대처질문에 해당한다."}, {"no": "21-68", "year": 2022, "qno": 18, "text": "가족생활주기에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 듀발(E. Duvall)과 힐(R. Hill)은 가족생활의 각 단계마다 수행해야 할 과업을 구분함으로써 발달론적 관점을 가족에 적용하였다.\nㄴ. 가족생활주기의 개념은 구성원 개인의 변화 뿐만 아니라, 가족의 단계별 변화에 적응하기 위해 재조직되어야 한다는 것을 의미한다.\nㄷ. 카터(B. Carter)와 맥골드릭(M. McGoldrick)의 가족생활주기는 결혼으로부터 시작되며, 이혼과 재혼의 단계를 고려하였다.\nㄹ. 에릭슨(M. Erickson)의 가족생활주기는 7단계로 나뉘며, 자녀독립기에는 자녀의 독립으로 가족의 안정성이 깨진다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄴ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄱ, ㄷ, ㄹ"], "answer": 3, "expl": "듀발과 힐의 발달과업 구분(ㄱ), 가족 재조직 개념(ㄴ), 카터와 맥골드릭의 이혼·재혼 단계 고려(ㄷ)는 옳지만, 카터와 맥골드릭의 가족생활주기는 결혼이 아니라 독립된 성인기(미혼 성인기)에서 시작되므로 ㄷ의 '결혼으로부터 시작'이라는 부분은 옳지 않아 실제로는 ㄱ,ㄴ이 옳다."}, {"no": "21-69", "year": 2022, "qno": 19, "text": "다음 사례에 대한 가족상담 개입으로 옳지 않은 것은?\nJ(15세)는 최근 등교를 거부하고, 아버지에게 대들고 반항하는 문제로 상담에 의뢰되었다. J는 부모의 이혼으로 8세부터 친할머니와 살다가 중학생이 되면서 아버지와 합가하게 되었고, 친할머니는 3개월 전 돌아가셨다. 어머니와는 어머니의 재혼 이후 자주 만나지 못하고 있다.", "options": ["① 친할머니의 상실에 대한 애도작업을 한다.", "② J의 부모에 대한 분열된 충성심을 다룬다.", "③ 아버지와의 친밀감 향상을 위한 작업을 한다.", "④ J의 반항행동이 문제이므로 행동수정 작업만 한다.", "⑤ 어머니와의 정서적 단절 이슈에 대해 작업한다."], "answer": 3, "expl": "이 사례는 상실, 분열된 충성심, 정서적 단절 등 복합적인 가족역동이 얽혀 있으므로 반항행동에 대한 행동수정 작업만 하는 것은 개입으로 옳지 않다."}, {"no": "21-70", "year": 2022, "qno": 20, "text": "사티어(V. Satir)의 경험적 가족상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 가족체계를 이해하는 과정에서 상호작용의 핵심 요소로서 의사소통에 초점을 둔다.", "② 개인의 성장과 가족의 기능에 방해가 되는 가족규칙을 수정하는 작업을 한다.", "③ 자아존중감은 생애 초기에 주 양육자와의 관계에서 학습되고 발달한다고 본다.", "④ 가족의 역기능을 자녀에 대한 부모의 투사과정의 관점에서 사정한다.", "⑤ 원가족 도표를 활용하여 가족의 역동과 의사소통 방식 및 세대 간의 유사점과 차이점을 파악한다."], "answer": 3, "expl": "가족투사과정 개념은 보웬 이론의 특징이며, 사티어의 경험적 가족상담은 의사소통 방식과 자아존중감을 중심으로 가족을 사정하므로 옳지 않다."}, {"no": "21-71", "year": 2022, "qno": 21, "text": "가족상담 초기단계에서 상담자의 역할에 관한 설명으로 옳지 않은 것은?", "options": ["① 문제에 대한 각 가족구성원의 관점을 탐색한다.", "② 각 구성원의 목표를 탐색하고 합의된 목표를 설정한다.", "③ 가족구성원 중 먼저 오는 사람 편에서 동맹관계를 맺는다.", "④ 가족의 상호교류방식을 존중하고 치료적 관계를 형성한다.", "⑤ 가족구성원 개인에게 공감하여 편안한 마음을 갖도록 한다."], "answer": 2, "expl": "가족상담자는 특정 구성원 편에 서지 않고 모든 구성원과 균형 있게 동맹을 맺어야 하므로, 먼저 온 사람 편에서 동맹을 맺는다는 설명은 옳지 않다."}, {"no": "21-72", "year": 2022, "qno": 22, "text": "다음 사례에 대한 가족상담의 개입으로 옳지 않은 것은?\nY(15세)는 집에서 거의 말을 하지 않고 자기 방에서 주로 지내는데, 부모의 반복적인 대화 시도에 무응답하거나 큰소리로 화를 내기도 한다. 부모는 신혼 초부터 갈등이 심했고, 부부싸움을 하고 나면 어머니는 막내인 Y에게 하소연을 자주 했고 아버지는 밖으로 나갔다가 늦게 귀가하곤 했다.", "options": ["① 가족구성원 개인의 내적 경험을 이해하기 위해 빙산기법을 활용한다.", "② 가계도를 활용하여 가족의 정서적 역동과 패턴을 살펴본다.", "③ 부모-자녀하위체계가 적절한 기능을 하는지 살펴본다.", "④ 가족의 부적절하고 역기능적인 위계구조를 살펴본다.", "⑤ 가족체계의 전체 역동과 특성을 파악하기 위해 구성원 개인별로 성격유형 검사를 실시한다."], "answer": 4, "expl": "이 사례는 가족 내 삼각관계, 위계, 하위체계의 역동을 살펴보는 것이 핵심이며, 개인별 성격유형 검사만으로는 가족체계 전체의 역동을 파악하기 어려워 개입으로 옳지 않다."}, {"no": "21-73", "year": 2022, "qno": 23, "text": "가족상담에서 활용되는 평가도구에 관한 설명으로 옳은 것은?", "options": ["① 순환모델의 FACES 척도는 가족기능을 측정한다.", "② ENRICH 검사는 부부의 응집력과 적응력을 측정한다.", "③ 가계도는 계량적 척도로 가족의 다세대 역동과 관계망을 평가한다.", "④ 생태도는 가족을 둘러싼 생물학적 환경과의 관계를 탐색하는데 사용한다.", "⑤ McMaster 모델의 가족사정척도(FAD)는 구성원들의 내적인 경험을 시각적으로 평가한다."], "answer": 0, "expl": "올슨(Olson)의 순환모델에 기반한 FACES 척도는 가족의 응집성과 적응성 등 가족기능을 측정하는 도구이다."}, {"no": "21-74", "year": 2022, "qno": 24, "text": "다음 가계도에서 IP(Identified Patient)의 가족역동에 관한 설명으로 옳지 않은 것은?", "options": ["① IP는 모와 친밀한 관계이다.", "② IP는 계부와 소원한 관계이다.", "③ IP는 이복 여동생과 갈등관계이다.", "④ IP의 이복 여동생은 친모와 단절되어 있다.", "⑤ IP의 모는 알코올 남용의 문제를 가지고 있다."], "answer": 3, "expl": "가계도에서 IP의 이복 여동생은 친모(계부의 배우자)와 함께 거주하는 관계로 나타나며 친모와 단절된 관계로 보기 어려워 옳지 않다."}, {"no": "21-75", "year": 2022, "qno": 25, "text": "가족상담을 시작하기 전에 내담자에게 고지하고 동의를 구해야 하는 내용을 모두 고른 것은?\nㄱ. 비밀보장의 범위와 한계\nㄴ. 내담자가 상담을 중단할 수 있는 권리\nㄷ. 상담 참여에 따르는 잠재적 이익과 위험\nㄹ. 상담 기록의 성격과 범위", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄱ, ㄴ, ㄹ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 4, "expl": "비밀보장의 범위와 한계, 상담 중단 권리, 잠재적 이익과 위험, 기록의 성격과 범위는 모두 사전동의(informed consent) 시 고지해야 할 사항이다."}, {"no": "20-1", "year": 2021, "qno": 1, "text": "다음이 설명하는 가족상담기법은?\n○ 이야기치료에서 사용되는 기법\n○ 문제를 외부로 추출해 내는 기법\n○ 개인의 문제를 문제로부터 개념적ㆍ언어적으로 분리시키는 기법", "options": ["① 과제부여", "② 가계도", "③ 외재화", "④ 예외질문", "⑤ 가족조각"], "answer": 2, "expl": "문제를 개인과 분리하여 외부의 것으로 다루는 이야기치료의 대표 기법은 외재화이다."}, {"no": "20-2", "year": 2021, "qno": 2, "text": "해결중심단기가족상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 미국 위스콘신주의 단기가족치료센터(BFTC)가 기초가 되었다.\nㄴ. 드 세이저(S. de Shazer)와 김인수가 개발하였다.\nㄷ. 귀납법적 과정이 활용되었다.\nㄹ. 병리적인 것을 주로 다룬다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "해결중심단기가족상담은 병리보다 강점과 해결책에 초점을 두므로 ㄹ은 옳지 않고, BFTC를 기초로 드 세이저와 김인수가 개발했으며 귀납적 과정을 활용한다는 ㄱㄴㄷ이 옳다."}, {"no": "20-3", "year": 2021, "qno": 3, "text": "보웬(M. Bowen)의 가족상담이론의 개념으로 옳은 것은?", "options": ["① 가족게임", "② 실연화", "③ 권력과 통제", "④ 하위체계", "⑤ 핵가족 정서체계"], "answer": 4, "expl": "핵가족 정서체계는 보웬의 가족체계이론을 구성하는 8가지 핵심 개념 중 하나이다."}, {"no": "20-4", "year": 2021, "qno": 4, "text": "해결중심단기가족상담의 중심철학으로 옳은 것을 모두 고른 것은?\nㄱ. 어떤 것이 잘 기능하면 고치지 않는다.\nㄴ. 가장 어려운 것부터 고친다.\nㄷ. 효과가 없으면 그것을 하지 않고 다른 것을 한다.\nㄹ. 효과가 있으면 그것을 더 많이 한다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "잘 기능하면 고치지 않고, 효과가 없으면 다른 것을 하며, 효과가 있으면 더 많이 하는 것이 해결중심상담의 3대 중심철학이며, '가장 어려운 것부터 고친다'는 원칙이 아니다."}, {"no": "20-5", "year": 2021, "qno": 5, "text": "다음은 가족상담이론의 질문기법이다. ( )에 들어갈 말은?\n문제가 해결된 상태를 상상해보고 해결하기 원하는 것들을 구체화하고 명료화하며, 상담목표를 현실적이고 구체적으로 설정하기 위해 사용하는 기법을 ( )질문이라고 한다.", "options": ["① 대처", "② 기적", "③ 관계성", "④ 보람", "⑤ 척도"], "answer": 1, "expl": "문제가 해결된 미래 상태를 상상하며 목표를 구체화하는 기법은 기적질문에 해당한다."}, {"no": "20-6", "year": 2021, "qno": 6, "text": "다음이 설명하는 카터(B. Carter)와 맥골드릭(M. McGoldrick)의 가족생활주기 단계는?\n○ 이 단계의 발달과제는 부모 - 자녀관계의 재정립이다.\n○ 자녀의 발달과 관심의 변화에 대응하여 부모의 역할도 변화해야 한다.\n○ 자녀의 자립과 의존 욕구 간의 충돌로 부모 - 자녀 간 갈등이 일어날 수 있다.", "options": ["① 새롭게 출발하는 가족", "② 어린 자녀를 둔 가족", "③ 청소년기 자녀를 둔 가족", "④ 자립하는 자녀를 둔 가족", "⑤ 노년기 가족"], "answer": 2, "expl": "자녀의 자립욕구와 부모-자녀관계 재정립은 청소년기 자녀를 둔 가족 단계의 발달과제이다."}, {"no": "20-7", "year": 2021, "qno": 7, "text": "이야기치료의 첫 번째 단계인 '문제의 경청과 해체의 단계'에 해당되지 않는 활동은?", "options": ["① 문제 이야기 경청", "② 문제 명명하기", "③ 문제의 영향 탐색", "④ 문제의 영향 평가", "⑤ 대안적 이야기 만들기"], "answer": 4, "expl": "대안적 이야기 만들기는 문제를 해체한 이후 진행되는 재저작 단계의 활동이며, 첫 단계인 경청과 해체 단계에 해당하지 않는다."}, {"no": "20-8", "year": 2021, "qno": 8, "text": "( )에 들어갈 내용을 바르게 연결한 것은?\n사티어(V. Satir)는 인간의 내면을 개인의 빙산에 비유하면서 겉으로 드러나는 행동이나 말은 빙산의 일각이며 내면은 '감정 - 감정에 대한 감정 - ( ㄱ ) - 기대 - ( ㄴ ) - 자기'의 순서로 이루어진다고 하였다.", "options": ["① ㄱ: 무의식, ㄴ: 열망", "② ㄱ: 지각, ㄴ: 자아", "③ ㄱ: 지각, ㄴ: 열망", "④ ㄱ: 이성, ㄴ: 자아", "⑤ ㄱ: 이성, ㄴ: 무의식"], "answer": 2, "expl": "사티어의 빙산 모델은 감정-감정에 대한 감정-지각-기대-열망-자기 순서로 구성된다."}, {"no": "20-9", "year": 2021, "qno": 9, "text": "가족사정에 관한 맥매스터 모델(McMaster Model)에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 가족기능을 문제해결, 의사소통, 역할, 정서적 반응성, 정서적 관여, 행동통제, 가족의 일반적 기능 등 7가지 측면에서 파악하였다.\nㄴ. 적합성은 가족원들의 균형을 유지하는 정도를 나타내는 것이다.\nㄷ. 엡스타인(N. Epstein)등이 개발한 가족전체의 기능을 파악하는 도구로서 질문지법을 활용한다.\nㄹ. 자아분화척도와 부모 - 자녀간 의사소통 척도를 통한 가족관계를 파악하기 위한 것이다.", "options": ["① ㄱ, ㄷ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "맥매스터 모델은 7가지 가족기능 영역(ㄱ)을 엡스타인 등이 질문지(FAD)로 측정하도록 개발하였으며(ㄷ), 자아분화척도는 보웬 이론의 개념이라 ㄹ은 옳지 않다."}, {"no": "20-10", "year": 2021, "qno": 10, "text": "이야기치료의 기본가정(전제)으로 옳지 않은 것은?", "options": ["① 세계와 인간경험은 개인이 해석하는 방식으로 존재한다.", "② 삶의 이야기는 단선적이며, 정해진 방향대로 간다.", "③ 우리가 살아가는 이야기는 사회적 맥락 속에서 만들어진다.", "④ 삶의 이야기 속에는 사회적 담론과 자기정체성이 포함된다.", "⑤ 지배적 이야기를 해체하는 것이 새로운 가능성을 높여준다."], "answer": 1, "expl": "이야기치료는 삶의 이야기가 다양하게 재구성될 수 있다고 보며, 단선적이고 정해진 방향으로만 간다는 가정은 이야기치료의 전제와 반대된다."}, {"no": "20-11", "year": 2021, "qno": 11, "text": "대상관계 가족상담에 기초를 둔 개입방법은?", "options": ["① 경계설정을 통한 가족의 재구성", "② 해석과 훈습을 통한 가족관계 역동의 통찰", "③ 빙산탐색을 통한 내면 이해", "④ 기적질문을 통한 관계의 명료화", "⑤ 문제의 재명명을 통한 문제 이해"], "answer": 1, "expl": "대상관계 가족상담은 정신분석적 전통에 기반하여 해석과 훈습을 통해 가족관계의 무의식적 역동을 통찰하도록 돕는다."}, {"no": "20-12", "year": 2021, "qno": 12, "text": "다음 중 전략적 가족상담으로 분류되는 학자로 옳은 것을 모두 고른 것은?\nㄱ. 코헛(H. Kohut) ㄴ. 헤일리(J. Haley) ㄷ. 말러(M. Mahler)\nㄹ. 마다네스(C. Madanes) ㅁ. 베이트슨(G. Bateson)", "options": ["① ㄱ, ㄷ", "② ㄴ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄴ, ㄹ, ㅁ", "⑤ ㄷ, ㄹ, ㅁ"], "answer": 3, "expl": "헤일리, 마다네스, 베이트슨은 전략적 가족상담의 대표 학자이며, 코헛과 말러는 대상관계·자기심리학 계열의 학자이다."}, {"no": "20-13", "year": 2021, "qno": 13, "text": "보웬(M. Bowen)의 가족상담 이론에 관한 설명으로 옳은 것은?", "options": ["① 정서적 단절은 물리적 단절을 전제한다.", "② 하위체계 사이의 위계를 변화시켜 재구조화한다.", "③ 분화수준이 높은 사람은 독립적이며 친밀한 관계를 맺지 않는다.", "④ 자기 위치 지키기(I-positioning)는 나 전달법(I-message)과 같은 기법이다.", "⑤ 출생순위 또는 형제자매 위치가 가족의 정서체계 안에서 특정한 역할과 기능을 한다."], "answer": 4, "expl": "보웬 이론에서 형제자매 위치(출생순위)는 가족의 정서체계 안에서 개인의 역할과 기능에 영향을 미치는 개념으로 다뤄진다."}, {"no": "20-14", "year": 2021, "qno": 14, "text": "구조적 가족상담 이론에서 역기능적 가족의 재구조화에 관한 내용으로 옳지 않은 것은?", "options": ["① 부모 하위체계와 별도로 부부 하위체계가 기능하도록 한다.", "② 부모가 서로 지원하고 서로에게 적응함으로써 자녀에게 일관된 모습을 보여야 한다.", "③ 부모는 자녀끼리 협상하고 갈등이나 차이를 해결하도록 지원한다.", "④ 적절한 위계는 부모가 권위와 책임을 바탕으로 세대 간 차이를 인정하는 구조이다.", "⑤ 경계선이 밀착된 가족은 가족원 간의 상호작용 빈도를 증가시킴으로써 서로에 대한 보살핌과 지원을 제공하도록 한다."], "answer": 4, "expl": "밀착된(엔메시먼트) 가족은 오히려 경계를 명확히 하고 상호작용을 적절히 조절해야 하므로, 상호작용 빈도를 증가시킨다는 설명은 옳지 않다."}, {"no": "20-15", "year": 2021, "qno": 15, "text": "가족상담의 개념에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 가족항상성(family homeostasis): 어떤 상황에서도 안정성을 유지하려는 가족의 속성이다.\nㄴ. 경계선(boundary): 눈에 보이지 않지만 개인과 하위체계의 안팎에 누가 어떻게 참여하는가를 규정하는 것이다.\nㄷ. 부부균열(marital schism): 부부간의 권력이 지나치게 불균형을 이룬 상황으로 강한 배우자가 약한 배우자를 지배하는 것이다.\nㄹ. 거짓상호성(pseudo-mutuality): 가족원 간의 친밀감과 사랑에 대한 욕구를 숨기고 겉으로 거리감을 두거나 적대적인 방식으로 상호작용하는 것이다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "부부균열은 부부간 힘의 불균형이 아니라 서로 경쟁하며 갈등하는 상황을 뜻하고(권력 불균형은 부부불균형), 거짓상호성은 겉으로 거리를 두는 것이 아니라 오히려 친밀함을 과시하는 것이므로 ㄷㄹ은 옳지 않고 ㄱㄴ이 옳다."}, {"no": "20-16", "year": 2021, "qno": 16, "text": "사티어(V. Satir) 가족상담에 관한 설명으로 옳은 것은?", "options": ["① 가족의 역기능 현상을 제거하여 안정된 현재 상황에 머무르게 한다.", "② 원가족 도표는 돌아가신 분들은 제외하고 현재 살아있는 가족원만 포함한다.", "③ 가족조각은 가족의 주요 생활사건을 연대별로 나열하여 그림으로 표현하는 기법이다.", "④ 원가족 삼인군에서 부여한 가족규칙을 따르도록 하여 가족결속력을 높인다.", "⑤ 경험적 가족치료자로서 갖춰야 될 3대 요소는 유능(Competent), 자신감(Confident), 일치(Congruent)의 3C이다."], "answer": 4, "expl": "사티어는 경험적 가족치료자가 갖춰야 할 요소로 유능성, 자신감, 일치성의 3C를 강조하였다."}, {"no": "20-17", "year": 2021, "qno": 17, "text": "가족체계이론에 관한 설명으로 옳지 않은 것은?", "options": ["① 가족원 각각의 개인적 특성보다 상호연결성과 관계에 더 초점을 둔다.", "② 부적(negative)피드백이 정적(positive)피드백보다 더 바람직하다.", "③ 가족체계는 가족원 개개인의 특성을 합한 것 그 이상이다.", "④ 가족원들은 개체로서 작용하며 일정한 속성을 가지고 상호작용한다.", "⑤ 가족체계가 건강하게 기능하기 위해서는 개방성과 폐쇄성 간의 적절한 균형을 이루어야 한다."], "answer": 1, "expl": "부적 피드백(안정 유지)과 정적 피드백(변화 촉진)은 각각 필요한 기능을 하므로, 부적 피드백이 무조건 더 바람직하다는 설명은 옳지 않다."}, {"no": "20-18", "year": 2021, "qno": 18, "text": "전략적 가족상담 기법으로 옳은 것을 모두 고른 것은?\nㄱ. 자유연상 ㄴ. 가장 기법 ㄷ. 역설적 개입\nㄹ. 고된 체험 기법 ㅁ. 긍정적 의미 부여", "options": ["① ㄱ, ㄴ, ㄷ", "② ㄴ, ㄹ, ㅁ", "③ ㄷ, ㄹ, ㅁ", "④ ㄴ, ㄷ, ㄹ, ㅁ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 3, "expl": "자유연상은 정신분석적 기법이며, 가장기법·역설적개입·고된체험기법·긍정적의미부여는 전략적 가족상담의 대표 기법이다."}, {"no": "20-19", "year": 2021, "qno": 19, "text": "가족상담 이론과 상담목표의 연결로 옳은 것은?", "options": ["① 경험적 가족상담 - 투사적 동일시를 통해 유지되어 온 가족관계를 이해한다.", "② 전략적 가족상담 - 가족들이 발달상에서 이루어야 할 자아통합을 이루도록 돕는다.", "③ 다세대 가족상담 - 내담자가 정서체계에 따라 행동하게 한다.", "④ 구조적 가족상담 - 역기능적인 가족구조를 재구조화 한다.", "⑤ 이야기 치료 - 내담자가 호소하는 문제와 자신을 동일시하여 사회문화적 기준에 따르도록 한다."], "answer": 3, "expl": "구조적 가족상담의 상담목표는 역기능적인 가족구조(경계, 위계 등)를 재구조화하는 것이다."}, {"no": "20-20", "year": 2021, "qno": 20, "text": "다음 대화에서 상담자가 시도하고 있는 상담기법은?\n○ 상담자: 성현이가 상담에 오기 전에 가장 힘들었을 때를 1점으로 하고, 원하는 대로 해결되는 최상의 상태를 10점이라고 하면, 오늘 상담하고 난 후 점수를 매긴다면 몇 점이라고 할 수 있을까?\n○ 내담자: 8점이요. 선생님이랑 얘기하고 나니까 가슴이 뻥 뚫렸어요.", "options": ["① 척도질문", "② 예외질문", "③ 대처질문", "④ 과정질문", "⑤ 관계성질문"], "answer": 0, "expl": "숫자로 현재 상태를 표현하도록 요청하는 것은 척도질문의 전형적 예이다."}, {"no": "20-21", "year": 2021, "qno": 21, "text": "다음 사례에 나타나는 가족역동을 가장 잘 설명하는 가족상담 개념은?\n부부싸움 후 어머니는 아들에게 와서 아버지에 대한 불평을 하곤 했다. 어머니가 아들과 밀착된 관계를 추구할수록 부부관계는 더욱 소원해졌다...", "options": ["① 삼각관계", "② 독특한 결과", "③ 기계론적 관점", "④ 선형적 인과관계", "⑤ 사회적 정서과정"], "answer": 0, "expl": "부부갈등을 자녀와의 밀착으로 우회하여 안정을 도모하는 이 사례는 보웬 이론의 삼각관계 개념으로 설명된다."}, {"no": "20-22", "year": 2021, "qno": 22, "text": "가족상담 기법에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 악몽질문(nightmare questioning): 증상이 나타날 때 내담자가 괴로워하는 정도에 대해 묻는 질문기법\nㄴ. 긍정적 의미부여(positive connotation): 가족의 부정적인 증상행동을 긍정적인 동기로 재구성하여 파괴적인 가족게임을 무력화시키는 치료기법\nㄷ. 역설적 개입(paradoxical intervention): 일상생활에서 성공적으로 잘하고 있으면서도 의식하지 못하는 것을 발견하여, 성공했던 행동을 의도적으로 하도록 강화시키는 기법\nㄹ. 순환질문(circular questioning): 각 가족원에게 돌아가며 가족상호작용에 대해 이야기하도록 함으로써 다른 가족원의 입장에서 새로운 인식을 도모하고 관계적 맥락에서 문제를 바라볼 수 있도록 하는 대화기법", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄹ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 1, "expl": "악몽질문은 최악의 상황을 상상하게 하는 기법이지 괴로움 정도를 묻는 것이 아니며, 역설적 개입은 성공행동 강화가 아니라 증상을 처방하는 기법이므로 ㄱㄷ은 옳지 않고 ㄴㄹ이 옳다."}, {"no": "20-23", "year": 2021, "qno": 23, "text": "가족상담 윤리에 관한 내용으로 옳지 않은 것은?", "options": ["① 내담자가 스스로 의사결정을 할 권리를 존중한다.", "② 인종, 성별, 출신국가 등에 관계없이 내담자를 공정하게 대우해야 한다.", "③ 상담자는 내담자와 사적인 친밀관계, 성적관계, 동업자관계 등을 피해야 한다.", "④ 비밀보장은 상담관계를 유지하는데 기본이 되는 원칙이기 때문에 예외 없이 지켜져야 한다.", "⑤ 상담을 시작하기 전에 내담자에게 자신의 권리와 책임에 대해 충분히 설명한 후 동의를 구해야 한다."], "answer": 3, "expl": "비밀보장은 자타해 위험 등 법적·윤리적 예외 상황이 존재하므로, 예외 없이 지켜져야 한다는 설명은 옳지 않다."}, {"no": "20-24", "year": 2021, "qno": 24, "text": "올슨(D. Olson) 등의 순환모델(Circumplex Model)에 관한 설명으로 옳지 않은 것은?", "options": ["① 적응력은 가족의 변화를 허용하는 정도를 의미한다.", "② 응집력은 가족원 사이의 정서적 결합의 정도를 의미한다.", "③ 적응력과 응집력은 높을수록 더 건강한 가족임을 의미한다.", "④ 순환모델을 바탕으로 개발된 평가도구는 FACES와 CRS가 있다.", "⑤ 가족체계이론을 바탕으로 가족기능을 개념을 분석하여 귀납적으로 발전시킨 모델이다."], "answer": 2, "expl": "순환모델은 적응력과 응집력이 무조건 높다고 건강한 것이 아니라 중간 수준의 균형을 이루는 것이 건강한 가족기능이라고 보므로 옳지 않다."}, {"no": "20-25", "year": 2021, "qno": 25, "text": "사티어(V. Satir) 가족상담의 의사소통 및 대처유형에 관한 설명으로 옳은 것은?", "options": ["① 회유형의 자원은 자기주장이다.", "② 비난형은 자아존중감 요소 중 자기를 무시한다.", "③ 초이성형의 내면은 쉽게 상처받고 소외감을 느낀다.", "④ 산만형은 재미있고 익살스러워 내면에 쉽게 접촉할 수 있다.", "⑤ 일치형은 스스로를 방어하고 상황을 통제하는데 효과적이다."], "answer": 2, "expl": "초이성형은 겉으로는 냉정하고 논리적으로 보이지만 내면은 쉽게 상처받고 소외감을 크게 느끼는 유형이다."}];

function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

let currentYear = 'all';

let answeredMap = {};

function selectOption(qIdx, optIdx){
  if(answeredMap[qIdx] !== undefined) return;
  answeredMap[qIdx] = optIdx;
  renderQuestions();
}

function setYear(y){
  currentYear = y;
  renderPills();
  renderQuestions();
}

function renderPills(){
  const years = [...new Set(QUESTIONS.map(q => q.year))].sort((a,b) => b-a);
  const pillsEl = document.getElementById('yearPills');
  let html = `<button class="pill ${currentYear==='all'?'active':''}" onclick="setYear('all')">전체</button>`;
  years.forEach(y => {
    html += `<button class="pill ${currentYear===y?'active':''}" onclick="setYear(${y})">${y}</button>`;
  });
  pillsEl.innerHTML = html;
}

function renderQuestions(){
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  const list = currentYear === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.year === currentYear);
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const picked = answeredMap[qIdx];
    const isAnswered = picked !== undefined;
    const isVoid = q.answer < 0;
    const isCorrect = isAnswered && !isVoid && picked === q.answer;

    const card = document.createElement('div');
    card.className = 'card';
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt-btn';
      if(isAnswered){
        if(isVoid && i === picked) cls += ' neutral-picked';
        if(!isVoid && i === q.answer) cls += ' correct-reveal';
        if(!isVoid && i === picked && picked !== q.answer) cls += ' wrong-picked';
      }
      const disabled = isAnswered ? 'disabled' : '';
      optsHtml += `<button class="${cls}" ${disabled} onclick="selectOption(${qIdx},${i})">${opt}</button>`;
    });
    const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
    let markHtml = '';
    if(isAnswered){
      if(isVoid){
        markHtml = `<div class="feedback-mark">📌 전항 정답 처리된 문항입니다</div>`;
      } else if(isCorrect){
        markHtml = `<div class="feedback-mark">✅ 정답입니다!</div>`;
      } else {
        markHtml = `<div class="feedback-mark wrong">❌ 오답입니다. 정답은 ${q.answer+1}번입니다.</div>`;
      }
    }
    card.innerHTML = `
      <div class="qnum">문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      <div class="feedback${isAnswered ? ' open' : ''}">
        ${markHtml}
        ${expl}
      </div>
    `;
    area.appendChild(card);
  });
}

function render(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
  renderPills();
  renderQuestions();
}

render();
</script>
