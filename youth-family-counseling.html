<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가족상담 - 청소년상담사 2급</title>
<style>
  :root{
    --bg-base:#f8f9f8;
    --accent:#5a6b7a;
    --accent-dark:#42505c;
    --text:#33392f;
    --sub:#5f6b58;
    --shadow-dark:#d9dbd6;
    --shadow-light:#ffffff;
    --wrong:#9a3a2e;
    --wrong-bg:#f7e9e7;
    --right-bg:#e9efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg-base);
    color:var(--text);
    padding:24px 16px 80px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .back{
    display:inline-block;
    margin-bottom:18px;
    color:var(--sub);
    text-decoration:none;
    font-size:14px;
  }
  .back:hover{color:var(--accent);}
  h1{font-size:20px;margin:0 0 4px;}
  .meta-line{color:var(--sub);font-size:12px;margin-bottom:20px;}
  .toolbar{
    display:flex;
    gap:8px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .btn{
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:8px 14px;
    font-size:13px;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  }
  .btn.active{color:var(--accent-dark);font-weight:600;}
  .progress-bar{
    height:8px;
    border-radius:6px;
    background:var(--shadow-dark);
    overflow:hidden;
    margin-bottom:8px;
    box-shadow:inset 2px 2px 4px var(--shadow-dark);
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{font-size:12px;color:var(--sub);margin-bottom:20px;}
  .card{
    background:var(--bg-base);
    border-radius:20px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  }
  .qnum{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    font-size:12px;
    font-weight:600;
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .qtext{
    font-size:15px;
    line-height:1.6;
    white-space:pre-wrap;
    margin-bottom:16px;
  }
  .stmt-box{
    border:1px solid rgba(0,0,0,0.08);
    background:rgba(0,0,0,0.025);
    border-radius:12px;
    padding:10px 14px;
    margin:6px 0 14px;
  }
  .stmt-line{
    padding:3px 0;
    line-height:1.6;
  }
  .qtext-line{margin-bottom:2px;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .opt{
    text-align:left;
    background:var(--bg-base);
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    cursor:pointer;
    box-shadow:4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
    transition:background .15s ease;
    white-space:pre-wrap;
  }
  .opt:hover{background:#eef1ee;}
  .opt.correct{background:var(--right-bg);color:var(--accent-dark);font-weight:600;box-shadow:none;}
  .opt.wrong{background:var(--wrong-bg);color:var(--wrong);font-weight:600;box-shadow:none;}
  .opt:disabled{cursor:default;}
  .opt:disabled:hover{background:var(--bg-base);}
  .opt.correct:disabled:hover{background:var(--right-bg);}
  .opt.wrong:disabled:hover{background:var(--wrong-bg);}
  .feedback{
    margin-top:12px;
    font-size:13px;
    font-weight:600;
  }
  .feedback.correct-mark{color:var(--accent-dark);}
  .feedback.wrong-mark{color:var(--wrong);}
  .explain{
    margin-top:8px;
    padding:12px 14px;
    background:#eef1ee;
    border-radius:10px;
    font-size:13px;
    line-height:1.6;
    color:var(--text);
    white-space:pre-wrap;
  }
  .empty{
    text-align:center;
    color:var(--sub);
    padding:60px 0;
    font-size:14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">‹ 목록으로</a>
  <h1>가족상담</h1>
  <div class="meta-line" id="metaLine"></div>
  <div class="toolbar">
    <button class="btn active" id="btn-all" onclick="setMode('all')">전체보기</button>
    <button class="btn" id="btn-wrong" onclick="setMode('wrong')">오답만 보기</button>
    <button class="btn" onclick="resetAll()">초기화</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div id="quizArea"></div>
</div>
<script>
const QUESTIONS = [{"no": "2025-1", "year": 2025, "qno": 1, "text": "가정폭력을 촉발하는 요인에 해당하지 않는 것은?", "options": ["① 성장기 가정폭력 경험", "② 과거 트라우마 사건으로 인한 정신장애", "③ 약물남용 및 알코올 중독", "④ 각종 스트레스로 인한 심리적 좌절", "⑤ 견고한 사회적 지지체계"], "answer": 4, "expl": "견고한 사회적 지지체계는 오히려 가정폭력 발생 위험을 낮추는 보호요인에 해당하므로 촉발요인으로 볼 수 없다."}, {"no": "2025-2", "year": 2025, "qno": 2, "text": "사이버네틱스에 관한 내용으로 옳지 않은 것은?", "options": ["① 피드백 고리는 체계가 안정을 유지하기 위해 필요한 정보를 얻는 과정이다.", "② 잭슨(D. Jackson)에 의해 개발되었다.", "③ 자기조절 체계에서 피드백 기제에 관한 내용이다.", "④ 부적 피드백은 체계가 원래의 상태로 복귀하라는 신호를 보내 체계를 유지한다.", "⑤ 정적 피드백은 체계의 변화를 유도하고 다른 수준으로 조직하는 작용을 한다."], "answer": 1, "expl": "사이버네틱스 개념은 위너(N. Wiener)가 제안한 것으로, 잭슨은 가족항상성 등 가족치료 이론에 기여한 학자이지 사이버네틱스의 개발자가 아니다."}, {"no": "2025-3", "year": 2025, "qno": 3, "text": "가정에서 중독 문제에 관한 내용으로 옳지 않은 것은?", "options": ["① 중독가정에서 중독자에게 의존되어 있는 사람을 동반의존자라고 한다.", "② DSM-5에서는 알코올 의존과 알코올 남용장애로 나누고, 5개 이상의 증상을 보일 때 가벼운 정도로 본다.", "③ 청소년 중독자의 경우 가족의 영향력이 강하기 때문에 가족상담적 접근이 필요하다.", "④ 가족원에게서 느끼는 소외와 외로움으로 인해 다른 대상에 의존함으로써 중독에 이를 수 있다.", "⑤ 중독이 장기화될수록 가정에는 우울과 절망감 등의 부정적인 정서가 심화된다."], "answer": 1, "expl": "DSM-5는 알코올 사용장애를 단일 진단범주로 통합하고 경도·중등도·고도로 심각도를 구분하며, '알코올 의존/남용'으로 나누던 방식은 DSM-IV의 분류 체계에 해당한다."}, {"no": "2025-4", "year": 2025, "qno": 4, "text": "가족상담자의 윤리에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 가족과 개인의 복리를 증진시켜야 한다.\nㄴ. 성별, 장애, 나이, 종교 등을 이유로 내담자를 차별하여 상담한다.\nㄷ. 비밀보장의 의미와 한계를 고지한다.\nㄹ. 내담자와 이중관계를 피하기 위해 노력한다.\nㅁ. 자기 능력의 한계를 벗어난 문제에 대해 진단, 치료, 조언하지 않는다.", "options": ["① ㄱ, ㄴ, ㅁ", "② ㄴ, ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄹ, ㅁ", "④ ㄱ, ㄷ, ㄹ, ㅁ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 3, "expl": "가족과 개인의 복리 증진(ㄱ), 비밀보장 고지(ㄷ), 이중관계 회피(ㄹ), 능력 한계를 벗어난 개입 자제(ㅁ)는 윤리적 의무이며, 차별 금지가 원칙이므로 '차별하여 상담한다'(ㄴ)는 명백히 윤리 위반에 해당해 제외된다."}, {"no": "2025-5", "year": 2025, "qno": 5, "text": "구조적 가족상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 가족구성원의 상호작용 방식을 조직화하는 보이지 않는 요구가 가족구조를 만든다.", "② '당신은 언제부터 아들의 알람시계였나요?'라는 것은 합류하기의 질문이다.", "③ 과대기능하는 모와 과소기능하는 아들 간 위계 조정을 위해 아들 편을 들면서 균형깨기를 한다.", "④ 침투적이고 모호한 경계선을 가진 가족은 강한 소속감 때문에 자율성이 방해를 받는다.", "⑤ 부모체계는 자녀의 발달단계에 맞는 규칙을 설정하고 부모의 권위를 적절히 사용해야 한다."], "answer": 1, "expl": "'당신은 언제부터 아들의 알람시계였나요?'는 가족의 반복적 상호작용 패턴을 재구성해 보여주는 재구조화(reframing) 질문에 가까우며 합류하기(joining)의 전형적 질문과는 결이 다르다."}, {"no": "2025-6", "year": 2025, "qno": 6, "text": "다음은 인과관계의 순환성에 관한 내용이다. ( )에 들어갈 내용으로 옳은 것은?\n( )은 살아 있는 체계가 다양한 출발 상태에서 시작하여 여러 방식과 역동적 상호작용을 통해 동일한 특징적 결과에 이르는 경향이다.", "options": ["① 동일처리성", "② 비선형성", "③ 다귀결성", "④ 동일잠재성", "⑤ 동일결과성"], "answer": 4, "expl": "서로 다른 출발상태에서도 동일한 결과에 도달하는 체계의 경향성은 동일결과성(equifinality)이라 한다."}, {"no": "2025-7", "year": 2025, "qno": 7, "text": "일반체계이론에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 체계란 일련의 상호작용적이며 상호의존적인 부분으로 구성된 조직적 통합체로 정의된다.\nㄴ. 블랙박스의 은유를 가족체계에 적용하였다.\nㄷ. 가족은 개인의 집합체 이상인 관계의 망이다.\nㄹ. 일반체계이론은 2차 사이버네틱스와 동일하다.", "options": ["① ㄴ", "② ㄷ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "체계는 상호작용하는 부분들의 통합체(ㄱ)이며, 내부 과정보다 투입-산출 관계에 주목하는 블랙박스 은유가 활용되었고(ㄴ), 가족은 개인의 합 이상의 관계망(ㄷ)으로 이해되지만, 일반체계이론과 2차 사이버네틱스는 서로 다른 개념이라 ㄹ은 옳지 않다."}, {"no": "2025-8", "year": 2025, "qno": 8, "text": "보웬(M. Bowen)의 가족상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 기본분화 수준이 낮을수록 만성불안의 수준이 높다.", "② 완벽한 분화는 집단 안에서 한 개인이 된다는 것이다.", "③ 부모의 미숙함에 노출되는 자녀일수록 다른 자녀보다 융합의 정도가 높다.", "④ 보웬은 증상을 개인의 문제로 보지 않고, 체계의 문제로 보기 때문에 기법을 강조한다.", "⑤ 미분화 가족자아군은 가족이 감정적으로 한 덩어리가 되어 정서적으로 함께 고착되어 있는 상태를 말한다."], "answer": 3, "expl": "보웬 이론은 증상을 개인이 아닌 가족체계 전체의 문제로 보지만, 기법 중심이 아니라 상담자 자신의 분화 수준과 자연스러운 개입을 중시하는 이론이라 '기법을 강조한다'는 설명은 옳지 않다."}, {"no": "2025-9", "year": 2025, "qno": 9, "text": "해결중심단기 가족상담의 목표 설정 원칙에 해당하지 않는 것은?", "options": ["① 부정적 문제행동 소거를 목표로 한다.", "② 구체적이고 행동적인 것을 목표로 한다.", "③ 지금 여기에서 시작하는 것을 목표로 한다.", "④ 내담자가 중요하다고 여기는 것을 목표로 한다.", "⑤ 목표 수행은 힘든 일이라는 것을 내담자가 인식하도록 한다."], "answer": 0, "expl": "해결중심상담은 부정적 문제 제거보다 내담자가 원하는 긍정적이고 구체적인 상태(목표)를 설정하는 것을 원칙으로 하므로 '부정적 문제행동 소거'를 목표로 한다는 설명은 이 접근의 철학과 맞지 않는다."}, {"no": "2025-10", "year": 2025, "qno": 10, "text": "가족상담자의 역할에 관한 내용으로 옳은 것을 모두 고른 것은?\nㄱ. 가족의 주요 갈등에 대해 탐색하고 어떻게 대처해 왔는지 확인한다.\nㄴ. 가족의 관계과정에 대해 체계론적 관점으로 문제를 이해한다.\nㄷ. 상담 구조화에서는 상담목표를 설정하고 치료적 계획을 구체화한다.", "options": ["① ㄴ", "② ㄱ, ㄴ", "③ ㄱ, ㄷ", "④ ㄴ, ㄷ", "⑤ ㄱ, ㄴ, ㄷ"], "answer": 4, "expl": "가족상담자는 체계론적 관점에서 문제를 이해하고(ㄴ), 상담 구조화 단계에서 목표와 계획을 구체화하며(ㄷ), 가족의 갈등 대처 과정을 탐색하는 것(ㄱ) 모두 가족상담자의 역할에 해당한다."}, {"no": "2025-11", "year": 2025, "qno": 11, "text": "다음은 리즈(T. Lidz)의 부부관계에 관한 내용이다. ( )에 들어갈 내용으로 옳은 것은?\n( ㄱ )은 부부가 꾸준히 서로의 ( ㄴ )를(을) 깎아 내리고 ( ㄷ )에게 충성과 애정을 얻기 위해 노골적으로 경쟁한다는 것이다.", "options": ["① ㄱ: 부부불균형, ㄴ: 가치, ㄷ: 배우자", "② ㄱ: 부부불균형, ㄴ: 단점, ㄷ: 자녀", "③ ㄱ: 부부균열, ㄴ: 장점, ㄷ: 배우자", "④ ㄱ: 부부균열, ㄴ: 가치, ㄷ: 자녀", "⑤ ㄱ: 부부폭력, ㄴ: 장점, ㄷ: 자녀"], "answer": 3, "expl": "리즈는 부부 간에 서로의 가치를 깎아내리며 자녀에게 충성과 애정을 얻기 위해 경쟁하는 양상을 부부균열(marital schism)로 설명하였다."}, {"no": "2025-12", "year": 2025, "qno": 12, "text": "가족상담 초기단계에 관한 내용으로 옳지 않은 것은?", "options": ["① 상담에 참석해야 할 사람과 날짜, 장소, 시간을 구체적으로 정한다.", "② 가족상담자는 가족이 참여할 수 있도록 격려한다.", "③ 내담자 문제를 진단, 평가하고 호전될 수 있다는 확신을 준다.", "④ 가족들이 상담에 오기를 두려워할 때, 참여 독려전화를 하면 불참률을 낮출 수 있다.", "⑤ 첫 면담의 주요 목표는 라포형성과 정보 수집에 있다."], "answer": 2, "expl": "초기단계에서 상담자가 '호전될 수 있다는 확신'을 성급히 주는 것은 실제 평가 이전에 이루어지는 부적절한 개입이며, 초기단계의 핵심은 오히려 신뢰형성과 정보수집에 있다."}, {"no": "2025-13", "year": 2025, "qno": 13, "text": "보웬(M. Bowen)의 가족상담에 관한 설명으로 옳지 않은 것을 모두 고른 것은?\nㄱ. 자기분화 수준이 높을수록 감정 반사적으로 반응한다.\nㄴ. 원가족에서 촉발 원인을 찾기 위해 인과론적인 사고에 기초한다.\nㄷ. 개인이 개별성과 연합성을 균형 있게 사용할 수 있을 때, 건강한 자아로 성장할 수 있다.\nㄹ. 정서적 프로그래밍은 관계와 학습을 통해 가족 내 여러 세대에 걸쳐 정보를 전달하는 과정에서 발생하는 현상이다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄹ", "③ ㄷ, ㄹ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "자기분화 수준이 높을수록 오히려 감정에 덜 반사적으로 반응하며 이성적 대응이 가능하므로 ㄱ은 옳지 않고, 보웬 이론은 다세대 전수 등 인과론적 사고를 어느 정도 활용하므로(ㄴ) 이 조합이 옳지 않은 설명들에 해당한다."}, {"no": "2025-14", "year": 2025, "qno": 14, "text": "전략적 가족상담 이론가와 상담기법의 연결로 옳지 않은 것은?", "options": ["① 헤일리(J. Haley) - 고된 체험기법", "② 보스조르메니-나지(I. Boszormenyi-Nagy) - 긍정적 의미부여", "③ 셀비니-파라졸리(M. Selvini-Palazzoli) - 의식(ritual)기법", "④ 마다네스(C. Madanes) - 가장기법", "⑤ 프라타(G. Prata) - 불변의 처방"], "answer": 1, "expl": "긍정적 의미부여는 밀란모델(셀비니-파라졸리 등)의 대표 기법이며, 보스조르메니-나지는 맥락적 치료에서 신뢰·공정성 개념을 강조한 학자로 이 연결은 옳지 않다."}, {"no": "2025-15", "year": 2025, "qno": 15, "text": "해결중심단기 가족상담의 중심철학으로 옳은 것을 모두 고른 것은?\nㄱ. 효과가 있는 것을 알면 그것을 더 많이 한다.\nㄴ. 내담자가 문제 삼지 않은 것은 건드리지 않는다.\nㄷ. 효과가 없다면 그것을 하지 않고 대신 무언가 다른 것을 한다.\nㄹ. 내담자의 문제는 체계의 역동에서 촉발되므로 내담자와 협력한다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄹ", "③ ㄱ, ㄴ, ㄷ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 2, "expl": "해결중심 철학은 효과 있는 것을 더 하고(ㄱ), 효과 없으면 다른 것을 시도하며(ㄷ), 문제 삼지 않는 것은 건드리지 않는다(ㄴ)는 원칙에 기반하지만, 체계 역동에서 문제 원인을 찾는 것(ㄹ)은 오히려 문제중심적 사고에 가까워 해결중심 철학과는 맞지 않는다."}, {"no": "2025-16", "year": 2025, "qno": 16, "text": "자해시도 청소년의 가족사정을 위해 사용할 수 있는 도구와 목적의 연결로 옳지 않은 것은?", "options": ["① FACES - 가족의 응집성과 적응성 측정", "② PREPARE - 부모의 부부관계 건강성 측정", "③ JTCI - 청소년 자녀의 기질 및 성격 특성 파악", "④ 생태도 - 청소년 자녀와 가족의 환경과의 연계 탐색", "⑤ 가족놀이가계도 - 가족구성원의 의사소통 패턴, 상호작용 유형 등을 파악"], "answer": 1, "expl": "PREPARE는 결혼 예비/신혼부부를 위한 부부관계 평가도구이며, 부모의 부부관계 건강성 자체를 측정하는 전용 도구로 한정하기보다 관계 전반의 적응력을 다루는 검사라 이 연결 설명은 다소 부정확하다."}, {"no": "2025-17", "year": 2025, "qno": 17, "text": "사티어(V. Satir)의 경험적 가족상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 경험적 치료과정에서는 내담자의 체험을 중시한다.", "② 빙산은 개인 및 가족의 심리 내적 경험을 이해할 수 있는 지도이다.", "③ 가족조각은 가족의 주요 사건을 그림으로 표현하여 가족의 역동을 살펴보는 기법이다.", "④ 가족규칙은 일종의 명령으로 원가족 삼인군의 경험에서 획득하여 내재화한 것이다.", "⑤ 자아존중감의 요소는 자기, 타인, 상황으로 낮은 자아존중감을 회복시키는 것이 목표이다."], "answer": 4, "expl": "가족조각은 그림이 아니라 가족구성원을 신체적으로 배치하여 관계 역동을 시각적·신체적으로 표현하는 기법이다."}, {"no": "2025-18", "year": 2025, "qno": 18, "text": "다음에서 설명하고 있는 구조적 가족상담 기법은?\n○ 가족의 언어적 설명보다는 실제 상호교류를 주의 깊게 살펴본다.\n○ 가족으로 하여금 갈등이나 다른 상호작용을 연기하도록 요청한다.", "options": ["① 모방하기", "② 실연하기", "③ 추적하기", "④ 유지하기", "⑤ 경계선 세우기"], "answer": 3, "expl": "가족의 실제 상호작용을 관찰하기 위해 갈등 상황을 그 자리에서 재연하도록 요청하는 기법은 실연하기(enactment)이다."}, {"no": "2025-19", "year": 2025, "qno": 19, "text": "카터(B. Carter)와 맥골드릭(M. McGoldrick)의 가족생활주기에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 가족생활주기는 6단계로 결혼으로 시작된다.\nㄴ. 가족생활주기에 현대 사회의 특성이 반영된 과제를 첨가해야 한다는 의미에서 이혼과 재혼가정을 포함시켰다.\nㄷ. 청소년기 자녀를 둔 가족은 자녀의 자립을 인정하는 가족경계가 확대되어야 한다.\nㄹ. 가족생활주기 변화에 따라 야기되는 긴장을 수평적, 수직적 긴장으로 구분하였다.", "options": ["① ㄷ, ㄹ", "② ㄱ, ㄴ, ㄷ", "③ ㄱ, ㄴ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "가족생활주기는 결혼이 아닌 '독신 성인기'에서 시작하며, 이혼·재혼 가정을 포함시킨 점(ㄴ), 청소년기 자녀 가족의 경계 확대(ㄷ), 수평적·수직적 긴장 구분(ㄹ)은 카터와 맥골드릭 이론의 특징이 맞지만 시작단계(ㄱ)에 대한 설명은 옳지 않다."}, {"no": "2025-20", "year": 2025, "qno": 20, "text": "다음 사례에 대한 가족상담 개입에 관한 내용으로 옳지 않은 것은?\nY(여, 13세, 초6)는 최근 스마트폰 중독으로 인한 등교거부 문제로 가족상담에 의뢰되었다. Y의 모는 딸과 친하게 지내고 싶은데, 자신이 밤늦게까지 일을 해야 되고, 그것은 남편이 무능하기 때문이라고 한다. Y는 초4때 학교에 집중하지 못해 상담을 권유받아, 병원에서 소아우울증 진단을 받았다. Y는 하교하면 할머니와 밤늦게까지 있다가 부모가 데리러 오면 집으로 간다. 2년 전 Y를 매우 예뻐해 주시던 할아버지가 갑자기 돌아가셨다. 현재 Y는 할머니 말을 잘 듣지 않고 무시하는 편이며, 대부분의 시간은 스마트폰을 붙들고 지낸다.", "options": ["① 할아버지 상실에 대한 애도작업을 한다.", "② 핵가족 정서체계에서 부모의 부부관계를 다룬다.", "③ Y의 스마트폰 중독이 문제이므로 행동수정 작업만 한다.", "④ 어머니와의 친밀감 향상 등 관계 회복을 위한 작업을 한다.", "⑤ Y에 대해 할머니와 부모의 양육태도에서 갈등은 없는지 살핀다."], "answer": 0, "expl": "스마트폰 중독이라는 표면적 문제 이면에는 애도(할아버지 상실), 부부관계, 어머니와의 애착, 조모-부모 양육태도 갈등 등 복합적 가족역동이 얽혀 있어, 행동수정만으로 접근하는 것은 체계론적 관점에서 지나치게 단순한 개입이다."}, {"no": "2025-21", "year": 2025, "qno": 21, "text": "가족상담의 기본 개념에 관한 내용으로 옳지 않은 것은?", "options": ["① 대칭적 관계는 평등성과 다중성을 기초로 한다.", "② 거짓상호성은 겉으로 드러난 가족원간의 친밀한 상호작용이 사실과 다른 모습이다.", "③ 고무울타리는 가족을 둘러싼 경계가 유동적이나 외부의 영향이 스며들지 않는 것을 말한다.", "④ 이중구속은 두 가지 모순된 메시지가 서로 다른 수준에서 전달되는 경우이다.", "⑤ 삼각관계는 두 사람 사이의 불안과 긴장을 해소하기 위하여 다른 사람이나 대상을 관계로 끌어들이는 것이다."], "answer": 3, "expl": "고무울타리(rubber fence)는 겉보기에 경계가 있는 듯 보이지만 실제로는 외부 정보나 영향이 자유롭게 침투하는 불안정한 경계를 의미하며, '외부 영향이 스며들지 않는다'는 설명은 정의와 반대된다."}, {"no": "2025-22", "year": 2025, "qno": 22, "text": "이야기치료에 관한 설명으로 옳지 않은 것은?", "options": ["① 인간은 사회적 관계와 문화적 맥락 속에서 자신을 이해하고 정체성을 형성해 간다.", "② 우리가 살아가는 실재는 언어를 통해 구성되고 표현된다.", "③ 인간은 자신에게 일어나는 삶의 사건을 해석하고 그에 대해 의미를 부여한다.", "④ 문제가 되는 것은 문제를 갖고 있는 개인과 문제 그 자체이다.", "⑤ 내담자가 스스로 중요하게 여기는 가치와 의미에 기반한 선호된 이야기를 발견하도록 돕는다."], "answer": 0, "expl": "이야기치료는 문제와 사람을 분리해서 보는 문제의 외재화를 핵심 전제로 삼으며, '문제를 가진 개인과 문제 자체'를 동일시하는 관점은 이야기치료의 철학과 정반대이다."}, {"no": "2025-23", "year": 2025, "qno": 23, "text": "다음에서 이야기치료 상담자가 시도하고 있는 개입 기법은?\n○ 우울이라는 존재가 언제부터 당신 곁에 있었던 것 같나요?\n○ 우울이 나타날 때는 언제인지, 그 패턴을 알 수 있나요?\n○ 그 우울에 이름을 붙여 본다면 무엇이라고 할 수 있을까요?", "options": ["① 정의 예식", "② 독특한 결과", "③ 스캐폴딩 분석", "④ 문제의 외재화", "⑤ 다시 말하기"], "answer": 4, "expl": "문제(우울)를 하나의 독립된 존재로 이름 붙이고 그 영향력·패턴을 탐색하는 개입은 문제의 외재화 기법의 전형적인 예이다."}, {"no": "2025-24", "year": 2025, "qno": 24, "text": "경험적 가족상담에 관한 내용으로 옳지 않은 것은?", "options": ["① 휘태커(C. Whitaker)의 부조리치료(therapy of the absurd) 개입은 적극적이면서도 지시적이다.", "② 상징-경험적 상담의 휘태커(C. Whitaker)는 정서적 과정과 가족구조에 초점을 맞춘다.", "③ 상징-경험적 가족상담자들은 내담자들과의 관계 구축을 위해 따뜻함과 직면을 균형적으로 사용한다.", "④ 경험적 가족상담에서는 개인적 차원에서 체계를 다룬다.", "⑤ 내면가족체계치료는 원래 트라우마와 학대 생존자들을 위한 치료로 체계적 원리를 이용하여 개인의 내적인 부분들과 작업한다."], "answer": 1, "expl": "경험적 가족상담은 개인의 정서적 경험을 다루면서도 이를 가족체계 전체 맥락에서 이해하려 하므로, '개인적 차원에서만' 체계를 다룬다는 설명은 이 접근의 통합적 성격과 맞지 않는다."}, {"no": "2025-25", "year": 2025, "qno": 25, "text": "가족상담자가 가정폭력 개입 시 고려해야 하는 사항으로 옳지 않은 것은?", "options": ["① 폭력이 확인되는 경우 우선 폭력을 중지시킨다.", "② 폭력행위와 행위자-피해자의 관계체계의 두 가지 측면을 파악하고 다룰 수 있어야 한다.", "③ 폭력 피해자의 두려움 정도, 관계 개선 의지 여부 등의 평가를 통해 상담진행 여부를 판단할 수 있다.", "④ 가정폭력의 원인을 규명하고 스트레스가 발생하는 이유에 대한 설명을 제공한다.", "⑤ 아동학대인 경우에 사실을 확인 후 관계기관에 알리고 바로 가정에 돌려보낸다."], "answer": 4, "expl": "아동학대가 확인된 경우에는 관계기관에 신고한 후 안전이 확보되지 않은 상태로 곧바로 가정에 돌려보내서는 안 되며, 안전 조치가 우선되어야 한다."}, {"no": "23-51", "year": 2024, "qno": 1, "text": "가족상담 초기단계의 상담자 역할로 옳지 않은 것은?", "options": ["① 가족구성원이 이해받고 존중받는 느낌을 갖도록 한다.", "② 가족구성원 간 상호작용을 지지하고 가족체계에 합류한다.", "③ 직면을 통해 문제에 관한 통찰을 유도한다.", "④ 상담자 역할의 범위와 가족의 행동규범에 관해 안내한다.", "⑤ 구체적인 상담 목표를 설정한다."], "answer": 2, "expl": "직면을 통한 통찰 유도는 신뢰관계가 형성된 중기단계에서 주로 이루어지며, 초기단계에서는 라포 형성과 합류가 우선이다."}, {"no": "23-52", "year": 2024, "qno": 2, "text": "경험적 가족상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 가족구성원의 정서적 경험과 표현에 중요한 가치를 둔다.", "② 지금-여기에서 일어나는 상호작용 과정을 중시한다.", "③ 대표 인물로 사티어(V. Satir)와 위태커(C. Whitaker)가 있다.", "④ 인본주의 심리학에 뿌리를 두고 있다.", "⑤ 가족의 경계와 위계를 파악하는 데 초점을 둔다."], "answer": 4, "expl": "가족의 경계와 위계를 다루는 것은 구조적 가족상담의 초점이며, 경험적 가족상담은 정서적 경험과 성장에 초점을 둔다."}, {"no": "23-53", "year": 2024, "qno": 3, "text": "구조적 가족상담의 주요 기법과 설명의 연결로 옳은 것은?", "options": ["① 실연하기 - 가족구성원 간의 교류를 상담 과정에서 실제로 재현시키는 기법", "② 경계선 만들기 - 가족원의 언어나 몸짓을 그대로 따라하는 기법", "③ 증상 과장하기 - 가족 상호작용의 규칙과 구조를 지지하고 따르는 기법", "④ 긴장고조 기법 - 가족의 긍정적인 면을 부각시키고 강화함으로써 상호작용 흐름의 방향을 바꾸는 기법", "⑤ 증상 재명명하기 - 가족이 기존의 상호작용을 계속하도록 격려하는 기법"], "answer": 0, "expl": "실연하기는 가족 간 상호작용을 상담 장면에서 실제로 재현시켜 관찰·개입하는 구조적 가족상담의 대표 기법이다."}, {"no": "23-54", "year": 2024, "qno": 4, "text": "보웬( . Bowen)의 가족상담에서 아래의 사례를 설명하는 개념으로 옳은 것은?", "options": ["① 사회적 정서과정", "② 부부균열", "③ 거짓적대성", "④ 삼각관계", "⑤ 정서적 단절"], "answer": 3, "expl": "부부갈등의 긴장을 해소하기 위해 자녀에게 과도하게 집중하는 것은 삼각관계 형성의 전형적인 사례이다."}, {"no": "23-55", "year": 2024, "qno": 5, "text": "가족상담자의 윤리에 관한 설명을 모두 고른 것은?\nㄱ. 내담자와 사업적 관계나 성적 관계 등을 맺지 않는다.\nㄴ. 내담자에게 비밀을 보장받을 권리와 한계에 관하여 안내한다.\nㄷ. 내담자에게 가족상담자 자신의 관점과 가치를 받아들이도록 요구한다.\nㄹ. 상담내용은 내담자의 동의 없이 연구 등 공공 목적을 위해 활용할 수 있다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ"], "answer": 0, "expl": "내담자와 사업적·성적 관계 금지(ㄱ), 비밀보장 한계 안내(ㄴ)는 윤리원칙에 해당하지만, 상담자의 가치를 강요(ㄷ)하거나 동의 없이 정보를 공공목적에 활용(ㄹ)하는 것은 윤리 위반이다."}, {"no": "23-56", "year": 2024, "qno": 6, "text": "다음 설명에 해당하는 보웬( . Bowen)의 가족상담 기법으로 옳은 것은?", "options": ["① 나 입장(I-position) 취하기", "② 관계실험", "③ 과정질문", "④ 코칭", "⑤ 가계도"], "answer": 1, "expl": "추적자-도망자 등 삼각관계 역할에 변화를 주어 새로운 반응방식을 경험하게 하는 기법은 관계실험이다."}, {"no": "23-57", "year": 2024, "qno": 7, "text": "후기 가족상담 이론에 영향을 준 사회구성주의에 관한 설명으로 옳지 않은 것은?", "options": ["① 실재(reality)는 언어를 통해 구성된다고 본다.", "② 그 누구도 객관적인 실재를 알 수 없다고 본다.", "③ 전문가의 전문적인 지식을 중요시하는 관점을 가진다.", "④ 실재는 상호작용을 통해 사회적으로 구성된다고 본다.", "⑤ 본질적인 진실이란 존재하지 않는다는 관점을 가진다."], "answer": 2, "expl": "사회구성주의는 전문가의 지식보다 내담자의 주관적 의미와 상호작용을 통한 구성을 중시하므로, '전문가의 지식을 중요시'한다는 설명은 사회구성주의의 관점과 반대된다."}, {"no": "23-58", "year": 2024, "qno": 8, "text": "가족상담 이론과 기법의 연결로 옳지 않은 것은?", "options": ["① 경험적 가족상담 - 가족조각기법", "② 보웬(M. Bowen) 가족상담 - 과정질문", "③ 구조적 가족상담 - 추적하기", "④ 전략적 가족상담 - 긍정적 의미부여", "⑤ 이야기치료 - 고된 체험기법"], "answer": 4, "expl": "고된 체험기법은 전략적 가족상담(헤일리)의 대표 기법이며, 이야기치료의 기법으로 연결하는 것은 옳지 않다."}, {"no": "23-59", "year": 2024, "qno": 9, "text": "보웬( . Bowen)의 가족상담에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 미분화 가족 자아군은 온 가족이 감정적으로 한 덩어리가 되어 고착되어 있는 상태\n이다.\nㄴ. 가족구성원의 자아분화 수준이 높을수록 자율성이 부족하며, 감정적으로 반응한다.\nㄷ. 가족투사과정은 미성숙한 부모가 취약한 자녀를 투사 대상으로 선택하는 과정이다.\nㄹ. 출생순위에 따른 형제자매 위치는 가족 정서체계 안에서 특정한 역할과 기능을 담당\n한다.\nㅁ. 개인의 문제는 그 개인이 속한 특정 세대의 역기능적 구조에 의해 발생한다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ, ㄹ", "③ ㄴ, ㄷ, ㅁ", "④ ㄱ, ㄷ, ㄹ, ㅁ", "⑤ ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 1, "expl": "미분화 가족자아군(ㄱ), 가족투사과정(ㄷ), 형제순위에 따른 역할(ㄹ)은 보웬 이론의 개념이 맞지만, 자아분화 수준이 높을수록 오히려 자율성이 높고 감정 반응이 낮으며(ㄴ은 반대), 문제를 특정 세대에 한정하지 않고 다세대에 걸쳐 이해하므로(ㅁ도 부정확) ㄱ·ㄷ·ㄹ이 옳다."}, {"no": "23-60", "year": 2024, "qno": 10, "text": "경험적 가족상담의 목표에 관한 설명으로 옳지 않은 것은?", "options": ["① 당면문제 해결", "② 정서 표현의 증진", "③ 자발성 증진", "④ 인간적 성장", "⑤ 경험의 확대"], "answer": 0, "expl": "경험적 가족상담은 단기적인 당면문제 해결보다 정서표현·자발성·인간적 성장 등 근본적인 성장에 초점을 두므로 '당면문제 해결'만을 목표로 강조하지 않는다."}, {"no": "23-61", "year": 2024, "qno": 11, "text": "다음의 설명에 해당하는 구조적 가족상담의 개념은?", "options": ["① 동맹(alliance)", "② 연합(coalition)", "③ 합류(joining)", "④ 추적(tracking)", "⑤ 밀착(enmeshment)"], "answer": 1, "expl": "두 사람이 제3자에게 맞서기 위해 힘을 합하는 것은 연합(coalition)의 정의에 해당한다."}, {"no": "23-62", "year": 2024, "qno": 12, "text": "맥매스터 모델( cMaster Model)에서 제시한 가족기능으로 옳은 것을 모두 고른 것은?\nㄱ. 문제해결 ㄴ. 의사소통 ㄷ. 행동통제\nㄹ. 정서적 반응성 ㅁ. 응집성", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ, ㄹ", "③ ㄴ, ㄹ, ㅁ", "④ ㄱ, ㄴ, ㄷ, ㄹ", "⑤ ㄴ, ㄷ, ㄹ, ㅁ"], "answer": 3, "expl": "맥매스터 모델의 가족기능에는 문제해결, 의사소통, 역할, 정서적 반응성, 정서적 관여, 행동통제가 포함되며, 문제해결·의사소통·행동통제·정서적반응성(ㄱ·ㄴ·ㄷ·ㄹ)이 여기에 해당한다."}, {"no": "23-63", "year": 2024, "qno": 13, "text": "다음 설명에 해당하는 카터(B. Carter)와 맥골드릭( . McGoldrick)의 가족생활주기단계는?", "options": ["① 신혼부부 단계", "② 어린 자녀를 둔 단계", "③ 사춘기 자녀를 둔 단계", "④ 자녀 독립 단계", "⑤ 노년기"], "answer": 3, "expl": "자녀의 자립 인정, 관계 재정립, 가족원 증감 수용, 부모의 의존과 죽음 대처는 자녀 독립 단계의 발달과업에 해당한다."}, {"no": "23-64", "year": 2024, "qno": 14, "text": "순환모델의 자기보고식 가족사정척도는?", "options": ["① BGT", "② KFD", "③ FACES", "④ ENRICH", "⑤ PREPARE"], "answer": 2, "expl": "가족응집성과 적응성의 순환모델을 기반으로 한 자기보고식 척도는 FACES이다."}, {"no": "23-65", "year": 2024, "qno": 15, "text": "다음 사례에서 가족상담자의 개입으로 옳지 않은 것은?", "options": ["① 학교 폭력과 가정 폭력이 있었는지 확인한다.", "② 가족조각을 활용하여 가족원간의 의사소통 체계를 탐색한다.", "③ 자해의 강도, 빈도 등을 확인하고 생명존중서약을 받는다.", "④ 지각과 결석 등 문제가 생길 무렵 가족내에 발생한 문제가 있었는지 확인한다.", "⑤ 내담자 개인의 행동 문제로 상담이 의뢰되었기 때문에 가족상담은 고려하지 않는다."], "answer": 4, "expl": "청소년의 문제행동은 가족체계 전체와 밀접히 연관되는 경우가 많아, 개인문제로만 국한하고 가족상담을 배제하는 것은 체계론적 관점에 어긋난다."}, {"no": "23-66", "year": 2024, "qno": 16, "text": "청소년의 집단따돌림에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 집단따돌림은 청소년 사이에서 일어나는 폭력의 한 형태이다.\nㄴ. 따돌림 피해 청소년은 대개 성인에게 도움을 요청하여 해결한다.\nㄷ. 집단따돌림에 영향을 주는 요인은 개인, 가족, 학교환경 등으로 분류된다.\nㄹ. 집단따돌림과 유사한 개념으로 왕따, 집단괴롭힘, 불링(bullying) 등이 있다.", "options": ["① ㄱ, ㄴ", "② ㄴ, ㄷ", "③ ㄷ, ㄹ", "④ ㄱ, ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄷ, ㄹ"], "answer": 3, "expl": "집단따돌림은 폭력의 한 형태이고(ㄱ) 개인·가족·학교환경 등 다양한 요인의 영향을 받으며(ㄷ) 왕따·불링 등 유사개념이 있으나(ㄹ), 피해 청소년은 두려움과 낙인 우려로 성인에게 도움을 요청하기 어려운 경우가 많아 ㄴ은 옳지 않다."}, {"no": "23-67", "year": 2024, "qno": 17, "text": "가족상담의 실제에 관한 내용으로 옳은 것을 모두 고른 것은?\nㄱ. 모든 가족원이 상담에 참석하지 못하면 가족상담이 성립되지 않는다.\nㄴ. 부모가 자녀를 대신하여 이야기해서는 안 된다는 규칙을 정해 놓는 것은 도움이\n된다.\nㄷ. 가족상담 종결 후, 추후상담을 할 때는 전화, 편지, 메일 등을 통해서도 가능하다.\nㄹ. 상담 초기부터 가족상담자가 모든 상담과정을 엄격하게 통제하는 것이 좋다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄷ, ㄹ", "⑤ ㄱ, ㄴ, ㄹ"], "answer": 2, "expl": "부모가 자녀 대신 말하지 않도록 규칙을 정하는 것(ㄴ)과 전화·편지 등을 통한 추후상담(ㄷ)은 실제적으로 도움이 되지만, 모든 가족원이 모여야만 가족상담이 성립하는 것은 아니며(ㄱ 옳지 않음), 상담자가 전 과정을 엄격히 통제하는 것도 바람직하지 않아(ㄹ 옳지 않음) ㄴ·ㄷ이 옳다."}, {"no": "23-68", "year": 2024, "qno": 18, "text": "가족상담적 관점에서 가족원의 중독문제에 관한 설명으로 옳지 않은 것은?", "options": ["① 중독의 원인을 가족의 체계나 구조에 있다고 전제한다.", "② 가족원에게서 느끼는 소외와 외로움으로 인해 다른 대상에 의존함으로써 중독에 이르게 된다고 본다.", "③ 청소년 중독자의 경우 가족의 영향력이 강하기 때문에 가족상담적 접근이 필요하다.", "④ 가족 내에 중독자가 생기면 온 가족이 중독자 중심으로 움직여야 한다.", "⑤ 중독문제는 가족의 부정적 상호작용 패턴에 의해 유지된다고 본다."], "answer": 3, "expl": "가족상담적 관점은 중독자 중심으로 온 가족이 맞춰가는 동반의존적 패턴을 오히려 문제로 보고 변화시키고자 하며, 이를 '그렇게 되어야 한다'는 규범으로 제시하지 않는다."}, {"no": "23-69", "year": 2024, "qno": 19, "text": "가정폭력 가족상담에 관한 설명으로 옳지 않은 것은?", "options": ["① 개인의 폭력문제도 가족문제 중의 하나로 보고 가족체계에 초점을 두고 접근한다.", "② 가정폭력을 해결하기 위해서는 가족원간의 역기능적 상호작용 패턴과 관계구조를 변화시키는 것이 필요하다.", "③ 체계론적 입장에서 폭력은 가족을 비롯한 타인의 폭력행위를 모방함으로써 폭력을 학습하게 된다고 본다.", "④ 보웬(M. Bowen)의 가족상담에서는 가족의 폭력문제를 가족원의 낮은 자아분화 수준과 관련 있는 것으로 본다.", "⑤ 이야기치료에서는 폭력에 기여하는 가부장적 담론을 파악하고 해체하여 대안적 이야기를 구축한다."], "answer": 2, "expl": "폭력의 모방학습 설명은 체계론적 관점이 아니라 사회학습이론(반두라)의 관점에 해당해 이 연결은 옳지 않다."}, {"no": "23-70", "year": 2024, "qno": 20, "text": "이야기치료에 관한 설명으로 옳지 않은 것은?", "options": ["① 개인의 삶은 언어를 통한 이야기로 구성되고 창출된다.", "② 포스트모더니즘과 사회구성주의적인 시각에 근거한다.", "③ 이야기는 사회적 맥락 속에서 만들어진다고 본다.", "④ 문제는 결과적으로 사람에게 있다고 본다.", "⑤ 마지막 단계는 대안적 정체성을 구축하는 것이다."], "answer": 3, "expl": "이야기치료는 '사람이 문제가 아니라 문제가 문제'라는 문제의 외재화를 핵심 전제로 하므로, 문제가 사람에게 있다는 설명은 이 접근의 철학과 반대된다."}, {"no": "23-71", "year": 2024, "qno": 21, "text": "전략적 가족상담자로 분류되지 않는 학자는?", "options": ["① 헤일리(J. Haley)", "② 마다네스(C. Madanes)", "③ 파라졸리(M. Selvini-Palazzoli)", "④ 잭슨(D. Jackson)", "⑤ 컨버그(O. Kernberg)"], "answer": 4, "expl": "컨버그는 대상관계이론(정신분석)의 대표학자이며 전략적 가족상담자가 아니다."}, {"no": "23-72", "year": 2024, "qno": 22, "text": "대처질문에 관한 설명으로 옳은 것은?", "options": ["① 내담자가 어려움과 위기를 어떻게 극복하고 생존해 왔는지 그리고 희망을 버리지 않고 유지해 올 수 있었는지에 관하여 질문하는 동시에 생존능력을 인정하고 간접적으로 칭찬하는 기법이다.", "② 내담자들이 이미 효과적인 해결책을 사용하고 강점과 자원을 갖고 있으면서도 의식하지 못할 때 문제보다는 해결책을 모색하는 것으로 관심을 전환시키는데 도움이 되는 기법이다.", "③ 내담자가 인식하는 문제의 정도, 해결가능성, 상담의 진척 정도 등을 숫자로 표현하도록 하는 기법이다.", "④ 내담자와 중요한 관계에 있는 사람의 생각, 의견, 가치관, 반응 등에 관하여 질문하는 것으로 다른 사람의 관점에서 생각하고 이해하도록 돕기 위한 기법이다.", "⑤ 한국에서 해결중심모델을 적용하는 과정에서 명명된 질문으로 상담을 통해 어떤 상태가 되면 보람 있다고 생각하는지 질문하는 기법이다."], "answer": 0, "expl": "대처질문은 어려운 상황 속에서도 어떻게 버텨왔는지를 물어 생존능력을 인정하고 간접적으로 칭찬하는 해결중심상담의 대표 기법이다."}, {"no": "23-73", "year": 2024, "qno": 23, "text": "다음에서 설명하는 이야기치료 기법은?", "options": ["① 가족조각", "② 문제의 외재화", "③ 대안적 이야기", "④ 정의예식", "⑤ 독특한 결과 탐색"], "answer": 1, "expl": "문제를 사람과 분리시켜 표현을 바꾸는 것(예: '거짓말이 갈등을 일으켰다')은 문제의 외재화 기법이다."}, {"no": "23-74", "year": 2024, "qno": 24, "text": "체계론적 가족상담의 개입 특성에 관한 설명으로 옳지 않은 것은?", "options": ["① 가족 문제의 원인을 현재보다는 과거에서 파악하고자 한다.", "② 순환적 인과관계를 통해 문제를 이해하고자 한다.", "③ 가족구성원 간의 상호 관계성에 주목한다.", "④ 체계를 구성하는 개인 간 관계에 초점을 두고 개입한다.", "⑤ 가족구성원 간 행위의 연쇄적인 패턴을 파악하고자 한다."], "answer": 0, "expl": "체계론적 관점은 과거의 원인 규명보다 '지금-여기'의 순환적 상호작용 패턴에 초점을 두므로, 과거 원인 파악을 강조한다는 설명은 옳지 않다."}, {"no": "23-75", "year": 2024, "qno": 25, "text": "가족상담의 기본 개념에 관한 설명으로 옳은 것을 모두 고른 것은?\nㄱ. 가족항상성(family homeostasis)은 가족체계가 변화에 저항하고 안정성을 그대로\n유지하고자 하는 특성을 의미한다.\nㄴ. 정적 피드백(positive feedback)은 체계가 변화를 거부하고 균형을 유지하도록 하\n는 피드백을 의미한다.\nㄷ. 2차 변화(second-order change)는 체계의 규칙 자체를 재설정하여 항상성을 재구\n조화하는 변화를 의미한다.\nㄹ. 대칭적(symmetrical) 관계는 가족구성원 각자가 서로 균형을 맞추거나 보완해주는\n역할을 하는 관계를 의미한다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄴ, ㄷ", "④ ㄱ, ㄴ, ㄹ", "⑤ ㄱ, ㄷ, ㄹ"], "answer": 1, "expl": "가족항상성(ㄱ)과 2차 변화(ㄷ)에 대한 설명은 옳지만, 정적 피드백은 변화를 촉진하는 피드백이고(ㄴ은 부적 피드백의 정의) 대칭적 관계는 서로 유사한 행동으로 경쟁하는 관계이지 보완관계는 상보적 관계에 해당해(ㄹ 부정확) ㄱ·ㄷ이 옳다."}];
const STORAGE_KEY = "ycs2_family_v1";
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let mode = "all";

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function setMode(m){
  mode = m;
  document.getElementById('btn-all').classList.toggle('active', m==='all');
  document.getElementById('btn-wrong').classList.toggle('active', m==='wrong');
  render();
}

function resetAll(){
  if(confirm('푼 기록을 모두 초기화할까?')){
    state = {};
    saveState();
    render();
  }
}

function answer(qIdx, optIdx){
  const q = QUESTIONS[qIdx];
  if(state[q.no] !== undefined) return;
  state[q.no] = optIdx;
  saveState();
  render();
}

function updateMeta(){
  const years = [...new Set(QUESTIONS.map(q => q.year))];
  document.getElementById('metaLine').textContent =
    `${years.length}개년 · 총 ${QUESTIONS.length}문항`;
}

function updateProgress(){
  const total = QUESTIONS.length;
  const done = QUESTIONS.filter(q => state[q.no] !== undefined).length;
  const correct = QUESTIONS.filter(q => state[q.no] === q.answer).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `${done}/${total} 문제 풀이 · 정답 ${correct}개` + (done>0 ? ` (정답률 ${Math.round(correct/done*100)}%)` : '');
}

function formatQText(text){
  const lines = String(text).split('\n');
  if(lines.length <= 1){
    return '<div class="qtext-line">' + text + '</div>';
  }
  const first = lines[0];
  const rest = lines.slice(1);
  let html = '<div class="qtext-line">' + first + '</div>';
  html += '<div class="stmt-box">' + rest.map(function(l){return '<div class="stmt-line">'+l+'</div>';}).join('') + '</div>';
  return html;
}

function render(){
  updateMeta();
  updateProgress();
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  let list = QUESTIONS;
  if(mode === 'wrong'){
    list = QUESTIONS.filter(q => state[q.no] !== undefined && state[q.no] !== q.answer);
  }
  if(list.length === 0){
    area.innerHTML = '<div class="empty">' + (mode==='wrong' ? '틀린 문제가 없어! 🌿' : '문제가 없어.') + '</div>';
    return;
  }
  list.forEach((q) => {
    const qIdx = QUESTIONS.indexOf(q);
    const card = document.createElement('div');
    card.className = 'card';
    const answered = state[q.no] !== undefined;
    let optsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'opt';
      if(answered){
        if(i === q.answer) cls += ' correct';
        else if(i === state[q.no]) cls += ' wrong';
      }
      optsHtml += `<button class="${cls}" ${answered?'disabled':''} onclick="answer(${qIdx}, ${i})">${opt}</button>`;
    });
    let feedback = '';
    if(answered){
      const mark = state[q.no] === q.answer
        ? '<div class="feedback correct-mark">✅ 정답</div>'
        : `<div class="feedback wrong-mark">❌ 오답 (정답: ${q.answer+1}번)</div>`;
      const expl = q.expl ? `<div class="explain">${q.expl}</div>` : '';
      feedback = mark + expl;
    }
    card.innerHTML = `
      <div class="qnum">${q.year} · 문제${q.qno}</div>
      <div class="qtext">${formatQText(q.text)}</div>
      <div class="options">${optsHtml}</div>
      ${feedback}
    `;
    area.appendChild(card);
  });
}

render();
</script>
</body>
</html>
